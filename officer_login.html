<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 30px; }
        .header { background: #1a1a2e; color: white; padding: 25px; text-align: center; }
        .container { padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; background: #2400b7; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .status-badge { float: right; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #eef2ff; color: #2400b7; }
        .officer-panel { background: #fff9e6; border: 1px dashed #ffa000; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .flow-item { border-left: 2px solid #2400b7; padding-left: 10px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="title">Officer Login</h2>
    <p id="subTitle">Official Redressal Portal</p>
</div>

<div class="container">
    <div id="loginSection" class="card">
        <select id="loginDesig">
            <option>Section Officer</option><option>Assistant Engineer (AE)</option>
            <option>Executive Engineer (EE)</option><option>Division Manager</option>
        </select>
        <input type="password" id="loginKey" placeholder="Enter Login Key">
        <button class="btn" onclick="doLogin()">Login to Dashboard</button>
        <button class="btn" style="background:#666" onclick="window.location.href='grievance.html'">Back to Employee Portal</button>
    </div>

    <div id="dashboard" style="display:none;">
        <button class="btn" style="background:#cc0000; margin-bottom:15px;" onclick="location.reload()">Logout</button>
        <div id="grievanceList"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeYQkb84pjRJvNyzDhceex2FvVb05r2f7eduxUY1S-18V4jfK10HPLvy96hWKXuBAs/exec";
    let loggedOfficer = null;

    async function doLogin() {
        const payload = {
            action: "login",
            designation: document.getElementById('loginDesig').value,
            loginKey: document.getElementById('loginKey').value
        };
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.status === "success") {
            loggedOfficer = { name: result.name, designation: payload.designation };
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('dashboard').style.display = "block";
            document.getElementById('title').innerText = "Officer Panel";
            document.getElementById('subTitle').innerText = loggedOfficer.name + " (" + loggedOfficer.designation + ")";
            loadTickets();
        } else { alert("Login Failed"); }
    }

    async function loadTickets() {
        const container = document.getElementById('grievanceList');
        container.innerHTML = "Loading...";
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        container.innerHTML = data.reverse().map(item => {
            const isHandler = item.handler === loggedOfficer.designation && item.status !== "Resolved";
            return `
                <div class="card">
                    <span class="status-badge">${item.status}</span>
                    <strong>#${item.id}</strong> | ${item.user}
                    <p style="font-size:14px; margin:5px 0;">${item.sub}</p>
                    <div style="font-size:12px; border-top:1px solid #eee; padding-top:10px;">
                        ${item.history.map(h => `<div class="flow-item"><b>${h.officer}:</b> ${h.note}</div>`).join('')}
                    </div>
                    ${isHandler ? `
                        <div class="officer-panel">
                            <textarea id="op-${item.id}" placeholder="Your remarks..."></textarea>
                            <select id="fw-${item.id}">
                                <option>Assistant Engineer (AE)</option><option>Executive Engineer (EE)</option>
                                <option>Division Manager</option><option value="Resolved">RESOLVE & CLOSE</option>
                            </select>
                            <button class="btn" style="background:#ffa000" onclick="updateTicket('${item.id}')">Submit & Forward</button>
                        </div>
                    ` : `<p style="font-size:11px; color:#999; text-align:center;">With: ${item.handler}</p>`}
                </div>
            `;
        }).join('');
    }

    async function updateTicket(id) {
        const fw = document.getElementById(`fw-${id}`).value;
        const payload = {
            action: "update",
            id: id,
            officerName: loggedOfficer.name,
            designation: loggedOfficer.designation,
            opinion: document.getElementById(`op-${id}`).value,
            newStatus: fw === "Resolved" ? "Resolved" : "Forwarded",
            forwardTo: fw === "Resolved" ? "Closed" : fw
        };
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("Action Saved");
        loadTickets();
    }
</script>
</body>
</html>
