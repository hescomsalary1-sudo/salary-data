<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI';
background: linear-gradient(135deg,#eef2ff,#e0e7ff);
}

/* HEADER */
.top{
background: linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
padding:25px 20px 80px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
position:relative;
overflow:hidden;
}

.header-img{
position:absolute;
right:10px;
bottom:10px;
width:120px;
opacity:0.9;
}

.top h1{
margin:10px 0 5px;
font-size:26px;
}

.top p{
opacity:0.9;
}

/* CONTAINER */
.container{
padding:15px;
margin-top:-60px;
}

/* CONTACT CARDS */
.cards{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:10px;
}

.card{
flex:1;
background:white;
border-radius:20px;
padding:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.icon-circle{
width:50px;
height:50px;
border-radius:50%;
background:#eef2ff;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:22px;
color:#2563eb;
}

.card h4{
margin:10px 0 5px;
color:#2563eb;
}

.card p{
font-size:12px;
color:#555;
}

/* FORM */
.form{
background:white;
margin-top:20px;
padding:18px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.form h3{
color:#2563eb;
margin-bottom:10px;
}

.input-box{
display:flex;
align-items:center;
gap:10px;
background:#f1f5ff;
border-radius:12px;
padding:10px;
margin-top:10px;
}

.input-box input,
.input-box textarea{
border:none;
outline:none;
background:none;
width:100%;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:25px;
background: linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
font-weight:600;
font-size:15px;
}

/* LINK */
.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#2563eb;
font-weight:600;
text-decoration:none;
}

  /* ===== FIX LOADER ===== */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

/* ===== FIX POPUP ===== */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:10000;
}

.popup-box{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
width:80%;
max-width:300px;
animation:scale 0.3s ease;
}

@keyframes scale{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.check{
font-size:40px;
color:#28a745;
}

/* ===== TEXTAREA FIX ===== */
textarea{
min-height:80px;
resize:none;
}

/* ===== MOBILE FIX ===== */
@media(max-width:600px){
.cards{
grid-template-columns: repeat(2, 1fr);
}
}

.card{
flex:1 1 45%;
}
}
  .card{
min-width:0;
}
</style>
</head>

<body>

<div class="top">
  <h1>Contact Us</h1>
  <p>We are here to help you</p>

  <img class="header-img" src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
</div>

<div class="container">

<div class="cards">

<div class="card">
<div class="icon-circle">📞</div>
<h4>Call Us</h4>
<p>+91 9663781340</p>
</div>

<div class="card">
<div class="icon-circle">✉️</div>
<h4>Email</h4>
<p>support@yourapp.com</p>
</div>

<div class="card">
<div class="icon-circle">📍</div>
<h4>Address</h4>
<p>O & M Division, Hescom, Sirsi</p>
</div>

</div>

<div class="form">
<h3>💬 Send Message</h3>

<div class="input-box">
<span>👤</span>
<input id="name" placeholder="Your Name">
</div>

<div class="input-box">
<span>✉️</span>
<input id="email" placeholder="Your Email">
</div>

<div class="input-box">
<span>🏷️</span>
<input id="subject" placeholder="Subject">
</div>

<div class="input-box">
<span>✏️</span>
<textarea id="message" placeholder="Your Message"></textarea>
</div>

<button id="sendBtn" onclick="sendMessage()">Send Message</button>

<div class="link">
<a href="my_messages.html">View Your Messages →</a>
</div>

</div>

</div>

<div id="loader"><div class="spinner"></div></div>

<div id="popup" class="popup">
<div class="popup-box">
<div class="check">✔</div>
<h3>Success</h3>
<p>Your message has been sent</p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>

// ✅ SINGLE user variable
const user = localStorage.getItem("currentUser");

if(!user){
alert("User not logged in");
window.location = "login.html";
}



const API_URL = "https://script.google.com/macros/s/AKfycbxVyQy7X52wHDexkvBqfODTLAM6fIwW5HBRJEGhBkKmrR6hGjeFePyEVsWxjno4nwPO/exec";

function sendMessage(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let subject = document.getElementById("subject").value.trim();
let message = document.getElementById("message").value.trim();

if(email=="" || subject=="" || message==""){
alert("Please fill all fields");
return;
}

// disable button
document.getElementById("sendBtn").disabled = true;
document.getElementById("sendBtn").innerText = "Sending...";

// show loader
document.getElementById("loader").style.display="flex";

fetch(API_URL,{
method:"POST",
body: JSON.stringify({
user,
name,
email,
subject,
message
})
})
.then(res=>res.json())
.then(()=>{

document.getElementById("loader").style.display="none";
showPopup();
clearForm();

document.getElementById("sendBtn").disabled = false;
document.getElementById("sendBtn").innerText = "Send Message";

})
.catch(()=>{

document.getElementById("loader").style.display="none";
alert("Error sending message");

document.getElementById("sendBtn").disabled = false;
document.getElementById("sendBtn").innerText = "Send Message";

});

}

function showPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function clearForm(){
document.getElementById("email").value="";
document.getElementById("subject").value="";
document.getElementById("message").value="";
}

</script>
<script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
  window.location.replace("forum.html");
};
</script>
</body>
</html>
