<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelFix | Master Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #0052cc;
    --secondary: #00d4ff;
    --bg: #f4f7fe;
    --white: #ffffff;
    --text-main: #1b2559;
    --text-muted: #a3aed0;
    --shadow: 14px 17px 40px rgba(112,144,176,0.08);
    --border: #e0e5f2;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }

body { background:var(--bg); display:flex; min-height:100vh; }

/* Header */
header {
    position:fixed;
    top:0; left:0; right:0;
    height:80px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 5%;
    border-bottom:1px solid var(--border);
    z-index:1000;
}

.logo { font-size:1.5rem; font-weight:800; color:var(--primary); }
.nav-buttons { display:flex; gap:15px; }

.nav-btn {
    background:white;
    padding:10px 18px;
    border-radius:12px;
    border:1px solid var(--border);
    text-decoration:none;
    font-weight:700;
    font-size:0.85rem;
    color:var(--text-main);
}

.nav-btn:hover {
    background:var(--primary);
    color:white;
}

/* Main */
main { margin-top:100px; padding:20px 5%; width:100%; }

.grid {
    display:grid;
    grid-template-columns:1.5fr 1fr;
    gap:25px;
}

.card {
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:var(--shadow);
}

/* Inputs */
input {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid var(--border);
    margin-bottom:10px;
}

input:focus { border-color:var(--primary); outline:none; }

/* Button */
.btn {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#0052cc,#00d4ff);
    color:white;
    transition:0.3s;
}

.btn:hover {
    transform:translateY(-2px);
}

/* Loader */
#loader {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(255,255,255,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner {
    width:50px;
    height:50px;
    border:5px solid #eee;
    border-top:5px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    100% { transform:rotate(360deg); }
}

</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<header>
    <div class="logo">PIXELFIX</div>
    <div class="nav-buttons">
        <a href="inventory.html" class="nav-btn">Inventory</a>
        <a href="salary_reports.html" class="nav-btn">Salaries</a>
        <a href="promotions.html" class="nav-btn">Promotions</a>
    </div>
</header>

<main>

<div class="grid">

<!-- Search -->
<div class="card">
    <h2>Customer Search</h2>
    <input type="text" id="searchInput" placeholder="Search...">
    <button class="btn" onclick="search()">Search</button>
    <div id="results"></div>
</div>

<!-- Invoice -->
<div class="card">
    <h2>Generate Invoice</h2>

    <input type="text" id="custName" placeholder="Customer Name">
    <input type="text" id="tvModel" placeholder="TV Model">
    <input type="number" id="amount" placeholder="Service Amount">

    <button class="btn" onclick="generateInvoice()">Generate Invoice</button>
</div>

</div>

</main>

<script>

/* Search (dummy) */
function search(){
    const q=document.getElementById("searchInput").value;
    document.getElementById("results").innerHTML =
    `<p style="margin-top:10px;">Searching for "${q}"...</p>`;
}

/* Invoice */
function generateInvoice(){

    const name=document.getElementById("custName").value;
    const model=document.getElementById("tvModel").value;
    const amount=document.getElementById("amount").value;

    if(!name || !amount){
        alert("Enter required fields");
        return;
    }

    document.getElementById("loader").style.display="flex";

    // 6 digit invoice
    const invoiceNo = Math.floor(100000 + Math.random()*900000);

    const data = {
        invoice: invoiceNo,
        name: name,
        model: model,
        amount: amount,
        date: new Date().toLocaleDateString()
    };

    // 🔴 PUT YOUR GOOGLE SCRIPT URL HERE
    fetch("https://script.google.com/macros/s/AKfycbw907SGf-_6RTt6E_VSHuUJREkX_70ip43E7bqHCc2sKSCTLuyKJxvzM5HDsLtWrL-r/exec",{
        method:"POST",
        body:JSON.stringify(data)
    })
    .then(res=>res.json())
    .then(()=>{

        localStorage.setItem("invoiceData", JSON.stringify(data));

        setTimeout(()=>{
            window.location.href="invoice.html";
        },800);

    })
    .catch(()=>{
        alert("Error saving");
        document.getElementById("loader").style.display="none";
    });

}

</script>

</body>
</html>
