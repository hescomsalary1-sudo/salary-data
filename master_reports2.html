<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 400px;
        animation: fadeIn 1s ease-in-out;
    }

    .icon {
        font-size: 60px;
        margin-bottom: 15px;
        animation: bounce 2s infinite;
    }

    h1 {
        font-size: 26px;
        color: #fff;
        margin-bottom: 10px;
    }

    p {
        color: #f1f1f1;
        font-size: 15px;
        margin-bottom: 25px;
    }

    .btn {
        display: inline-block;
        padding: 12px 25px;
        border-radius: 30px;
        background: #fff;
        color: #333;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn:hover {
        background: #333;
        color: #fff;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

</style>
</head>

<body>

<div class="container">
    <div class="icon">🚧</div>
    <h1>Coming Soon</h1>
    <p>This feature is currently under development.<br>
       Stay tuned for updates!</p>

    <a href="master_reports.html" class="btn">Go Back</a>
</div>

</body>
</html>
