<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f3f4f8;
color:#111827;
padding-bottom:40px;
}

/* FIXED TOP PROFILE */

.fixed-top{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background: linear-gradient(135deg,#0d1b8f,#1a2edb);
border-bottom-left-radius:34px;
border-bottom-right-radius:34px;
overflow:hidden;
box-shadow:0 10px 30px rgba(76,37,255,0.30);
}

.fixed-top::before{
content:"";
position:absolute;
width:320px;
height:320px;
background:rgba(255,255,255,0.06);
border-radius:50%;
right:-120px;
top:-100px;
}

.fixed-top::after{
content:"";
position:absolute;
width:260px;
height:260px;
background:rgba(255,255,255,0.04);
border-radius:50%;
left:-120px;
bottom:-140px;
}

.topbar{
padding:18px 18px 10px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
z-index:2;
}

.top-left{
display:flex;
align-items:center;
gap:14px;
}

.back-btn{
width:46px;
height:46px;
border-radius:16px;
background:rgba(255,255,255,0.14);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.back-btn:active{
transform:scale(0.95);
}

.top-title h2{
font-size:18px;
font-weight:800;
color:#fff;
margin-bottom:2px;
}

.top-title p{
font-size:13px;
color:rgba(255,255,255,0.85);
}

.edit-btn{
width:46px;
height:46px;
border-radius:16px;
background:rgba(255,255,255,0.14);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#fff;
}

/* PROFILE */
.profile-section{
padding:10px 20px 24px;
position:relative;
z-index:2;
}
.profile-top{
display:flex;
align-items:center;
justify-content:space-between;
gap:18px;
}

.profile-left{
display:flex;
align-items:center;
gap:16px;
flex:1;
min-width:0;
}

.profile-right{
flex:1;
display:grid;
grid-template-columns:1fr;
gap:14px;
padding-left:20px;
border-left:1px solid rgba(255,255,255,0.18);
}

.avatar{
width:82px;
height:82px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:800;
color:#4c25ff;
border:4px solid rgba(255,255,255,0.22);
box-shadow:0 10px 20px rgba(0,0,0,0.18);
}

.camera{
position:absolute;
right:-2px;
bottom:-2px;
width:30px;
height:30px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
color:#5b2eff;
font-weight:700;
}

.profile-name{
font-size:28px;
font-weight:800;
line-height:1.1;
margin-bottom:10px;
}

.top-badges{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-top:8px;
}

.emp-id,
.active{
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,0.12);
padding:10px 14px;
border-radius:14px;
font-size:13px;
backdrop-filter:blur(10px);
white-space:nowrap;
}

.contact-item{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
color:#fff;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

@media(max-width:700px){

.profile-top{
display:grid;
grid-template-columns:88px 1fr;
gap:14px;
align-items:start;
}

.profile-left{
display:contents;
}

.profile-right{
grid-column:2;
border-left:none;
padding-left:0;
padding-top:4px;
gap:10px;
}

.profile-name{
font-size:22px;
}

.contact-item{
font-size:13px;
}

.emp-id,
.active{
font-size:12px;
padding:8px 12px;
}

}
.profile-info{
min-width:0;
color:#fff;
}
/* PAGE CONTENT */

.content{
padding:230px 16px 24px;
}



/* MODERN HIGHLIGHTS */

.highlight-card{
background:transparent;
margin-bottom:12px;
}

.highlight-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
width:100%;
}

.highlight-box{
position:relative;
overflow:hidden;
border-radius:24px;
padding:14px 12px;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:138px;
backdrop-filter:blur(14px);
box-shadow:
0 10px 24px rgba(0,0,0,0.08),
inset 0 1px 0 rgba(255,255,255,0.3);
transition:0.25s ease;
}

.highlight-box:active{
transform:scale(0.98);
}

.highlight-box::before{
content:"";
position:absolute;
width:140px;
height:140px;
border-radius:50%;
top:-70px;
right:-50px;
background:rgba(255,255,255,0.12);
}

.highlight-box::after{
content:"";
position:absolute;
width:90px;
height:90px;
border-radius:50%;
bottom:-40px;
left:-30px;
background:rgba(255,255,255,0.08);
}

/* SERVICE CARD */

.purple{
background:
linear-gradient(135deg,
#4520ff 0%,
#693bff 55%,
#8b5dff 100%);
color:#fff;
}

/* RETIREMENT CARD */

.green{
background:
linear-gradient(135deg,
#0fa958 0%,
#14c767 55%,
#29dd7d 100%);
color:#fff;
}

.highlight-top{
display:flex;
justify-content:space-between;
align-items:flex-start;
position:relative;
z-index:2;
}

.icon-circle{
width:46px;
height:46px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(10px);
box-shadow:
inset 0 1px 0 rgba(255,255,255,0.25),
0 8px 20px rgba(0,0,0,0.12);
flex-shrink:0;
}

.highlight-badge{
padding:6px 10px;
border-radius:999px;
font-size:10px;
font-weight:700;
background:rgba(255,255,255,0.14);
backdrop-filter:blur(10px);
letter-spacing:0.5px;
}

.highlight-content{
position:relative;
z-index:2;
margin-top:12px;
}

.highlight-content label{
display:block;
font-size:12px;
font-weight:700;
opacity:0.85;
margin-bottom:8px;
letter-spacing:0.3px;
}

.highlight-content h2{
font-size:17px;
font-weight:800;
line-height:1.2;
word-break:break-word;
}

.highlight-content p{
margin-top:5px;
font-size:10px;
font-weight:600;
opacity:0.92;
}

.highlight-line{
width:100%;
height:5px;
border-radius:999px;
background:rgba(255,255,255,0.18);
margin-top:14px;
overflow:hidden;
position:relative;
z-index:2;
}

.highlight-line span{
display:block;
height:100%;
border-radius:999px;
background:#fff;
opacity:0.9;
}

/* MOBILE */

@media(max-width:420px){

.highlight-grid{
gap:10px;
}

.highlight-box{
padding:14px 12px;
min-height:150px;
border-radius:24px;
}

.icon-circle{
width:48px;
height:48px;
font-size:22px;
border-radius:16px;
}

.highlight-content{
margin-top:14px;
}

.highlight-content label{
font-size:11px;
}

.highlight-content h2{
font-size:15px;
}

.highlight-content p{
font-size:10px;
}

.highlight-badge{
font-size:9px;
padding:5px 8px;
}

}

/* SECTION TITLE */

.section-title{
display:flex;
justify-content:space-between;
align-items:center;
margin:20px 4px 14px;
}

.section-title h3{
font-size:28px;
font-weight:800;
}

.section-title span{
font-size:15px;
font-weight:700;
color:#5825ff;
}

/* TABS */

.tabs{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:16px;
}

.tab{
background:#fff;
padding:18px 10px;
border-radius:22px;
text-align:center;
font-size:15px;
font-weight:700;
color:#6b7280;
cursor:pointer;
box-shadow:0 10px 25px rgba(15,23,42,0.05);
transition:0.2s;
}

.tab.active{
background:linear-gradient(135deg,#5825ff,#7346ff);
color:#fff;
transform:translateY(-2px);
}

/* DETAILS CARD */

.details-card{
background:#fff;
border-radius:28px;
padding:22px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
}

.details-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.details-left{
display:flex;
gap:14px;
align-items:center;
}

.details-icon{
width:58px;
height:58px;
border-radius:18px;
background:linear-gradient(135deg,#5825ff,#7c4dff);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#fff;
}

.details-head h4{
font-size:28px;
font-weight:800;
margin-bottom:4px;
}

.details-head p{
font-size:14px;
color:#6b7280;
}

.view-btn{
padding:10px 16px;
border-radius:14px;
background:#f3efff;
color:#5825ff;
font-size:14px;
font-weight:700;
}

.info-row{
display:flex;
justify-content:space-between;
gap:20px;
padding:16px 0;
border-top:1px solid #eef2f7;
}

.info-row:first-of-type{
border-top:none;
}

.info-label{
font-size:15px;
font-weight:600;
color:#6b7280;
}

.info-value{
font-size:15px;
font-weight:700;
color:#111827;
text-align:right;
}

/* DARK MODE */

.dark-mode{
background:#0f172a;
color:#fff;
}

.dark-mode .highlight-card,
.dark-mode .details-card,
.dark-mode .tab{
background:#1e293b;
}

.dark-mode .info-value,
.dark-mode .section-title h3,
.dark-mode .highlight-head h3,
.dark-mode .details-head h4{
color:#fff;
}

.dark-mode .tab{
color:#cbd5e1;
}

.dark-mode .tab.active{
background:linear-gradient(135deg,#5825ff,#7346ff);
}

/* MOBILE */

@media(max-width:700px){

.content{
padding-top:390px;
}

.highlight-grid{
grid-template-columns:1fr 1fr;
}

.profile-top{
align-items:flex-start;
}

.profile-name{
font-size:25px;
}

.highlight-content h2{
font-size:18px;
}

.info-row{
flex-direction:column;
gap:6px;
}

.info-value{
text-align:left;
}

.details-head{
flex-direction:column;
align-items:flex-start;
gap:14px;
}

}

</style>
</head>

<body>

<div class="fixed-top">

<div class="topbar">

<div class="top-left">

<div class="back-btn" onclick="goBack()">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</div>

<div class="top-title">
<h2>My Profile</h2>
<p>Your information at a glance</p>
</div>

</div>



</div>

<div id="profileHeader"></div>

</div>

<div class="content">

<div id="data"></div>

</div>

<script>

let user = localStorage.getItem("currentUser");

if(!user){
window.location="login.html";
}

function parseDate(dateStr){

if(!dateStr) return null;

let parts = dateStr.split("-");

if(parts.length === 3){

let day = parseInt(parts[0]);
let month = parseInt(parts[1]) - 1;
let year = parseInt(parts[2]);

return new Date(year, month, day);

}

return new Date(dateStr);

}

function calculateService(joinDate){

let start = parseDate(joinDate);
let today = new Date();

if(!start) return "";

let years = today.getFullYear() - start.getFullYear();
let months = today.getMonth() - start.getMonth();
let days = today.getDate() - start.getDate();

if(days < 0){
months--;
let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

return years+"Y "+months+"M "+days+"D";

}

function retirementCountdown(retDate){

let retire = parseDate(retDate);
let today = new Date();

if(!retire) return "";

let years = retire.getFullYear() - today.getFullYear();
let months = retire.getMonth() - today.getMonth();
let days = retire.getDate() - today.getDate();

if(days < 0){
months--;
let prevMonth = new Date(retire.getFullYear(), retire.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

return years+"Y "+months+"M "+days+"D";

}

/* TAB SWITCH */

function openTab(tab){

document.querySelectorAll(".tab").forEach(btn=>{
btn.classList.remove("active");
});

document.querySelectorAll(".tab-content").forEach(box=>{
box.style.display="none";
});

document.getElementById(tab+"Btn").classList.add("active");
document.getElementById(tab).style.display="block";

}

async function loadProfile(){

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");

let text = await response.text();

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0].trim() === user.trim()){

let service = calculateService(cols[18]);

let retirement = retirementCountdown(cols[6]);

/* FIXED PROFILE */

document.getElementById("profileHeader").innerHTML = `

<div class="profile-section">

<div class="profile-top">

<div class="profile-left">

<div class="avatar-wrap">
<div class="avatar">${cols[1].charAt(0)}</div>

</div>

<div class="profile-info">

<div class="profile-name">${cols[1]}</div>

<div class="top-badges">

<div class="emp-id">
Employee ID : ${cols[0]}
</div>

<div class="active">
<div class="dot"></div>
Active Employee
</div>

</div>

</div>

</div>

<div class="profile-right">

<div class="contact-item">
📧 ${cols[8]}
</div>

<div class="contact-item">
📞 ${cols[4]}
</div>

<div class="contact-item">
📍 ${cols[3]}
</div>

</div>

</div>

</div>

`;

/* MAIN CONTENT */

document.getElementById("data").innerHTML = `

<div class="highlight-card">

<div class="highlight-grid">

<div class="highlight-box purple">

<div class="highlight-top">

<div class="icon-circle">⏳</div>

<div class="highlight-badge">
SERVICE
</div>

</div>

<div class="highlight-content">

<label>Service Length</label>

<h2>${service}</h2>

<p>Total completed service period</p>

<div class="highlight-line">
<span style="width:75%"></span>
</div>

</div>

</div>



<div class="highlight-box green">

<div class="highlight-top">

<div class="icon-circle">🏁</div>

<div class="highlight-badge">
RETIREMENT
</div>

</div>

<div class="highlight-content">

<label>Retirement In</label>

<h2>${retirement}</h2>

<p>Remaining service duration</p>

<div class="highlight-line">
<span style="width:55%"></span>
</div>

</div>

</div>

</div>

</div>


<div class="section-title">
<h3>Profile Information</h3>

</div>


<div class="tabs">

<div class="tab active" id="basicBtn" onclick="openTab('basic')">
👤 Basic Info
</div>

<div class="tab" id="personalBtn" onclick="openTab('personal')">
🧾 Personal Info
</div>

<div class="tab" id="serviceBtn" onclick="openTab('service')">
💼 Service Details
</div>

</div>


<!-- BASIC -->

<div class="details-card tab-content" id="basic">

<div class="details-head">

<div class="details-left">

<div class="details-icon">👤</div>

<div>
<h4>Basic Information</h4>
<p>Primary work related information</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>

<div class="info-row">
<div class="info-label">Full Name</div>
<div class="info-value">${cols[1]}</div>
</div>

<div class="info-row">
<div class="info-label">Employee ID</div>
<div class="info-value">${cols[0]}</div>
</div>

<div class="info-row">
<div class="info-label">Designation</div>
<div class="info-value">${cols[23]}</div>
</div>

<div class="info-row">
<div class="info-label">Work Location</div>
<div class="info-value">${cols[3]}</div>
</div>

<div class="info-row">
<div class="info-label">District</div>
<div class="info-value">${cols[16]}</div>
</div>

</div>


<!-- PERSONAL -->

<div class="details-card tab-content" id="personal" style="display:none;">

<div class="details-head">

<div class="details-left">

<div class="details-icon">🧾</div>

<div>
<h4>Personal Information</h4>
<p>Employee personal details</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>

<div class="info-row">
<div class="info-label">Mobile Number</div>
<div class="info-value">${cols[4]}</div>
</div>

<div class="info-row">
<div class="info-label">Email Address</div>
<div class="info-value">${cols[8]}</div>
</div>

<div class="info-row">
<div class="info-label">Date of Birth</div>
<div class="info-value">${cols[5]}</div>
</div>

<div class="info-row">
<div class="info-label">Marital Status</div>
<div class="info-value">${cols[11]}</div>
</div>

<div class="info-row">
<div class="info-label">Qualification</div>
<div class="info-value">${cols[12]}</div>
</div>

</div>


<!-- SERVICE -->

<div class="details-card tab-content" id="service" style="display:none;">

<div class="details-head">

<div class="details-left">

<div class="details-icon">💼</div>

<div>
<h4>Service Details</h4>
<p>Official service information</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>

<div class="info-row">
<div class="info-label">Joining Date</div>
<div class="info-value">${cols[18]}</div>
</div>

<div class="info-row">
<div class="info-label">Joining Designation</div>
<div class="info-value">${cols[19]}</div>
</div>

<div class="info-row">
<div class="info-label">Retirement Date</div>
<div class="info-value">${cols[6]}</div>
</div>

<div class="info-row">
<div class="info-label">Pension Type</div>
<div class="info-value">${cols[26]}</div>
</div>

<div class="info-row">
<div class="info-label">Working From</div>
<div class="info-value">${cols[28]}</div>
</div>

</div>

`;

return;

}

}

document.getElementById("data").innerHTML="User not found.";

}

loadProfile();

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

function goBack(){
window.history.back();
}

</script>

</body>
</html>
