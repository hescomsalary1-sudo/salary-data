<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f3f4f8;
color:#111827;
padding-bottom:40px;
}

/* TOP HEADER */

.top{
height:85px;
background:linear-gradient(135deg,#2d0cc8,#5f2dff);
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
overflow:hidden;
}

.top::before{
content:"";
position:absolute;
width:280px;
height:280px;
background:rgba(255,255,255,0.05);
border-radius:50%;
right:-120px;
top:-80px;
}

.top-left{
display:flex;
align-items:center;
gap:12px;
z-index:2;
}

.back-btn{
width:44px;
height:44px;
border-radius:16px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.back-btn:active{
transform:scale(0.95);
}

.top-title{
color:#fff;
}

.top-title h2{
font-size:26px;
font-weight:800;
margin-bottom:2px;
}

.top-title p{
font-size:14px;
opacity:0.85;
}

.edit-btn{
width:44px;
height:44px;
border-radius:16px;
background:rgba(255,255,255,0.12);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:20px;
z-index:2;
}

/* CONTENT */

.content{
padding:16px;
margin-top:-10px;
}

/* PROFILE HEADER */

.profile-card{
background:linear-gradient(135deg,#2d0cc8,#6a38ff);
border-radius:30px;
padding:22px;
position:relative;
overflow:hidden;
color:#fff;
box-shadow:0 12px 30px rgba(71,32,255,0.25);
margin-bottom:18px;
}

.profile-card::before{
content:"";
position:absolute;
width:320px;
height:320px;
background:rgba(255,255,255,0.05);
border-radius:50%;
right:-150px;
bottom:-160px;
}

.profile-top{
display:flex;
gap:18px;
align-items:center;
position:relative;
z-index:2;
}

.avatar-wrap{
position:relative;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:800;
color:#3b1eff;
border:5px solid rgba(255,255,255,0.25);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.camera{
position:absolute;
bottom:0;
right:0;
width:36px;
height:36px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
color:#5b2eff;
font-size:16px;
font-weight:700;
}

.profile-info{
flex:1;
}

.profile-name{
font-size:30px;
font-weight:800;
margin-bottom:8px;
line-height:1.1;
}

.emp-id{
display:inline-flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,0.12);
padding:10px 14px;
border-radius:14px;
font-size:15px;
margin-bottom:12px;
backdrop-filter:blur(10px);
}

.active{
display:inline-flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,0.12);
padding:10px 14px;
border-radius:14px;
font-size:14px;
font-weight:600;
}

.active-dot{
width:10px;
height:10px;
background:#22c55e;
border-radius:50%;
}

.profile-contact{
margin-top:18px;
display:grid;
grid-template-columns:1fr;
gap:10px;
position:relative;
z-index:2;
}

.contact-item{
display:flex;
align-items:center;
gap:12px;
font-size:15px;
opacity:0.95;
}

/* HIGHLIGHTS */

.highlight-card{
background:#fff;
border-radius:28px;
padding:18px;
margin-bottom:18px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
}

.highlight-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.highlight-head h3{
font-size:24px;
font-weight:800;
color:#111827;
}

.updated{
font-size:13px;
color:#6b7280;
}

.highlight-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.highlight-box{
border-radius:24px;
padding:18px;
display:flex;
gap:14px;
align-items:center;
}

.highlight-box.purple{
background:#f3efff;
}

.highlight-box.green{
background:#eefcf1;
}

.icon-circle{
width:68px;
height:68px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
color:#fff;
flex-shrink:0;
}

.purple .icon-circle{
background:linear-gradient(135deg,#5825ff,#7c4dff);
}

.green .icon-circle{
background:linear-gradient(135deg,#16c75f,#1db954);
}

.highlight-content label{
font-size:15px;
font-weight:600;
color:#4b5563;
display:block;
margin-bottom:6px;
}

.highlight-content h2{
font-size:26px;
font-weight:800;
margin-bottom:6px;
}

.purple h2{
color:#4f2dff;
}

.green h2{
color:#16a34a;
}

.highlight-content p{
font-size:14px;
font-weight:600;
}

.purple p{
color:#6d28d9;
}

.green p{
color:#16a34a;
}

/* SECTION */

.section-title{
display:flex;
justify-content:space-between;
align-items:center;
margin:18px 4px 16px;
}

.section-title h3{
font-size:28px;
font-weight:800;
color:#111827;
}

.section-title span{
font-size:15px;
font-weight:700;
color:#4f2dff;
}

/* TABS */

.tabs{
background:#fff;
border-radius:24px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
overflow:hidden;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
margin-bottom:16px;
}

.tab{
padding:18px 10px;
text-align:center;
font-weight:700;
font-size:15px;
color:#6b7280;
border-bottom:3px solid transparent;
}

.tab.active{
color:#4f2dff;
border-bottom:3px solid #4f2dff;
background:#faf8ff;
}

/* DETAILS CARD */

.details-card{
background:#fff;
border-radius:28px;
padding:22px;
box-shadow:0 10px 30px rgba(15,23,42,0.06);
}

.details-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.details-left{
display:flex;
gap:14px;
align-items:center;
}

.details-icon{
width:58px;
height:58px;
border-radius:18px;
background:linear-gradient(135deg,#5825ff,#7c4dff);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#fff;
}

.details-head h4{
font-size:30px;
font-weight:800;
margin-bottom:4px;
color:#111827;
}

.details-head p{
font-size:14px;
color:#6b7280;
}

.view-btn{
padding:10px 16px;
border-radius:14px;
background:#f4f1ff;
color:#4f2dff;
font-weight:700;
font-size:14px;
}

.info-row{
display:flex;
justify-content:space-between;
gap:20px;
padding:16px 0;
border-top:1px solid #eef2f7;
}

.info-row:first-of-type{
border-top:none;
}

.info-label{
font-size:15px;
font-weight:600;
color:#6b7280;
}

.info-value{
font-size:15px;
font-weight:700;
color:#111827;
text-align:right;
}

/* DARK MODE */

.dark-mode{
background:#0f172a;
color:#fff;
}

.dark-mode .highlight-card,
.dark-mode .details-card,
.dark-mode .tabs{
background:#1e293b;
}

.dark-mode .info-value,
.dark-mode .details-head h4,
.dark-mode .section-title h3,
.dark-mode .highlight-head h3{
color:#fff;
}

@media(max-width:700px){

.profile-top{
flex-direction:column;
align-items:flex-start;
}

.highlight-grid{
grid-template-columns:1fr;
}

.profile-name{
font-size:26px;
}

.details-head{
flex-direction:column;
align-items:flex-start;
gap:14px;
}

.info-row{
flex-direction:column;
gap:6px;
}

.info-value{
text-align:left;
}

}

</style>
</head>

<body>

<div class="top">

<div class="top-left">

<div class="back-btn" onclick="goBack()">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</div>

<div class="top-title">
<h2>My Profile</h2>
<p>Your information at a glance</p>
</div>

</div>

<div class="edit-btn">✎</div>

</div>

<div class="content">
<div id="data"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");

if(!user){
window.location="login.html";
}

function parseDate(dateStr){
if(!dateStr) return null;

let parts = dateStr.split("-");

if(parts.length === 3){
let day = parseInt(parts[0]);
let month = parseInt(parts[1]) - 1;
let year = parseInt(parts[2]);

return new Date(year, month, day);
}

return new Date(dateStr);
}

function calculateService(joinDate){

let start = parseDate(joinDate);
let today = new Date();

if(!start) return "";

let years = today.getFullYear() - start.getFullYear();
let months = today.getMonth() - start.getMonth();
let days = today.getDate() - start.getDate();

if(days < 0){
months--;
let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

return years+"Y "+months+"M "+days+"D";
}

function retirementCountdown(retDate){

let retire = parseDate(retDate);
let today = new Date();

if(!retire) return "";

let years = retire.getFullYear() - today.getFullYear();
let months = retire.getMonth() - today.getMonth();
let days = retire.getDate() - today.getDate();

if(days < 0){
months--;
let prevMonth = new Date(retire.getFullYear(), retire.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

return years+"Y "+months+"M "+days+"D";
}

async function loadProfile(){

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");

let text = await response.text();

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0].trim() === user.trim()){

let service = calculateService(cols[18]);

let retirement = retirementCountdown(cols[6]);

document.getElementById("data").innerHTML = `

<div class="profile-card">

<div class="profile-top">

<div class="avatar-wrap">
<div class="avatar">${cols[1].charAt(0)}</div>
<div class="camera">📷</div>
</div>

<div class="profile-info">

<div class="profile-name">${cols[1]}</div>

<div class="emp-id">
Employee ID : ${cols[0]}
</div>

<div class="active">
<div class="active-dot"></div>
Active Employee
</div>

</div>

</div>

<div class="profile-contact">

<div class="contact-item">
📧 ${cols[8]}
</div>

<div class="contact-item">
📞 ${cols[4]}
</div>

<div class="contact-item">
📍 ${cols[3]}
</div>

</div>

</div>


<div class="highlight-card">

<div class="highlight-head">
<h3>Key Highlights</h3>
<div class="updated">
Last updated: Today
</div>
</div>

<div class="highlight-grid">

<div class="highlight-box purple">

<div class="icon-circle">⏳</div>

<div class="highlight-content">
<label>Service Length</label>
<h2>${service}</h2>
<p>Completed Service</p>
</div>

</div>

<div class="highlight-box green">

<div class="icon-circle">🏁</div>

<div class="highlight-content">
<label>Retirement In</label>
<h2>${retirement}</h2>
<p>Remaining Service</p>
</div>

</div>

</div>

</div>


<div class="section-title">
<h3>Profile Information</h3>
<span>40+ Details</span>
</div>


<div class="tabs">

<div class="tab active">
👤 Basic Info
</div>

<div class="tab">
🧾 Personal Info
</div>

<div class="tab">
💼 Service Details
</div>

</div>


<div class="details-card">

<div class="details-head">

<div class="details-left">

<div class="details-icon">🪪</div>

<div>
<h4>Basic Information</h4>
<p>Primary work related information</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>


<div class="info-row">
<div class="info-label">Full Name</div>
<div class="info-value">${cols[1]}</div>
</div>

<div class="info-row">
<div class="info-label">Employee ID</div>
<div class="info-value">${cols[0]}</div>
</div>

<div class="info-row">
<div class="info-label">Department</div>
<div class="info-value">${cols[16]}</div>
</div>

<div class="info-row">
<div class="info-label">Designation</div>
<div class="info-value">${cols[23]}</div>
</div>

<div class="info-row">
<div class="info-label">Date of Joining</div>
<div class="info-value">${cols[18]}</div>
</div>

<div class="info-row">
<div class="info-label">Work Location</div>
<div class="info-value">${cols[3]}</div>
</div>

<div class="info-row">
<div class="info-label">Mobile Number</div>
<div class="info-value">${cols[4]}</div>
</div>

<div class="info-row">
<div class="info-label">Email Address</div>
<div class="info-value">${cols[8]}</div>
</div>

<div class="info-row">
<div class="info-label">Date of Birth</div>
<div class="info-value">${cols[5]}</div>
</div>

<div class="info-row">
<div class="info-label">Retirement Date</div>
<div class="info-value">${cols[6]}</div>
</div>

</div>

`;

return;
}
}

document.getElementById("data").innerHTML="User not found.";

}

loadProfile();

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

function goBack(){
window.history.back();
}

</script>

</body>
</html>
