<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f3f4f8;
color:#111827;
padding-bottom:40px;
}

/* TOP SECTION */

.fixed-top{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background:linear-gradient(135deg,#0d1b8f,#1a2edb);
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
overflow:hidden;
box-shadow:0 10px 25px rgba(76,37,255,0.25);
}

.fixed-top::before{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;
background:rgba(255,255,255,0.05);
right:-120px;
top:-120px;
}

.fixed-top::after{
content:"";
position:absolute;
width:220px;
height:220px;
border-radius:50%;
background:rgba(255,255,255,0.04);
left:-100px;
bottom:-120px;
}

/* PROFILE */

.profile-section{
padding:16px 16px 14px;
position:relative;
z-index:2;
}

.profile-header-row{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.back-btn{
width:42px;
height:42px;
border-radius:14px;
background:rgba(255,255,255,0.14);
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(10px);
cursor:pointer;
flex-shrink:0;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:800;
color:#4c25ff;
border:3px solid rgba(255,255,255,0.20);
box-shadow:0 8px 18px rgba(0,0,0,0.18);
flex-shrink:0;
}

.profile-main-name{
font-size:20px;
font-weight:800;
color:#fff;
line-height:1.2;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
flex:1;
}

.profile-sub-details{
padding-left:108px;
}

.profile-basic{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.contact-item{
display:flex;
align-items:center;
gap:6px;
font-size:11px;
font-weight:600;
color:#fff;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* CONTENT */

.content{
padding:160px 14px 20px;
}

/* HIGHLIGHT SECTION */

.highlight-card{
margin-bottom:12px;
}

.highlight-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.highlight-box{
position:relative;
overflow:hidden;
border-radius:20px;
padding:12px 11px;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:118px;
backdrop-filter:blur(14px);
box-shadow:
0 8px 18px rgba(0,0,0,0.08),
inset 0 1px 0 rgba(255,255,255,0.25);
}

.highlight-box::before{
content:"";
position:absolute;
width:120px;
height:120px;
border-radius:50%;
top:-60px;
right:-50px;
background:rgba(255,255,255,0.10);
}

.highlight-box::after{
content:"";
position:absolute;
width:80px;
height:80px;
border-radius:50%;
bottom:-35px;
left:-25px;
background:rgba(255,255,255,0.08);
}

.purple{
background:linear-gradient(135deg,#4520ff,#693bff,#8b5dff);
color:#fff;
}

.green{
background:linear-gradient(135deg,#0fa958,#14c767,#29dd7d);
color:#fff;
}

.highlight-top{
display:flex;
justify-content:space-between;
align-items:flex-start;
position:relative;
z-index:2;
}

.icon-circle{
width:40px;
height:40px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
background:rgba(255,255,255,0.18);
}

.highlight-badge{
padding:5px 8px;
border-radius:999px;
font-size:9px;
font-weight:700;
background:rgba(255,255,255,0.14);
}

.highlight-content{
margin-top:8px;
position:relative;
z-index:2;
}

.highlight-content label{
display:block;
font-size:10px;
font-weight:700;
opacity:0.88;
margin-bottom:6px;
}

.highlight-content h2{
font-size:15px;
font-weight:800;
line-height:1.2;
}

.highlight-content p{
margin-top:4px;
font-size:9px;
font-weight:600;
opacity:0.92;
}

.highlight-line{
width:100%;
height:4px;
border-radius:999px;
background:rgba(255,255,255,0.18);
margin-top:10px;
overflow:hidden;
}

.highlight-line span{
display:block;
height:100%;
border-radius:999px;
background:#fff;
}

/* TITLE */

.section-title{
margin:16px 2px 10px;
}

.section-title h3{
font-size:20px;
font-weight:800;
}

/* TABS */

.tabs{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-bottom:12px;
}

.tab{
background:#fff;
padding:13px 6px;
border-radius:18px;
text-align:center;
font-size:12px;
font-weight:700;
color:#6b7280;
cursor:pointer;
box-shadow:0 6px 18px rgba(15,23,42,0.05);
}

.tab.active{
background:linear-gradient(135deg,#5825ff,#7346ff);
color:#fff;
}

/* DETAILS CARD */

.details-card{
background:#fff;
border-radius:22px;
padding:16px;
box-shadow:0 8px 24px rgba(15,23,42,0.06);
margin-bottom:12px;
}

.details-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.details-left{
display:flex;
gap:10px;
align-items:center;
}

.details-icon{
width:46px;
height:46px;
border-radius:14px;
background:linear-gradient(135deg,#5825ff,#7c4dff);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#fff;
}

.details-head h4{
font-size:20px;
font-weight:800;
margin-bottom:2px;
}

.details-head p{
font-size:11px;
color:#6b7280;
}

.view-btn{
padding:8px 12px;
border-radius:12px;
background:#f3efff;
color:#5825ff;
font-size:11px;
font-weight:700;
}

.info-row{
display:flex;
justify-content:space-between;
gap:12px;
padding:12px 0;
border-top:1px solid #eef2f7;
}

.info-row:first-of-type{
border-top:none;
}

.info-label{
font-size:13px;
font-weight:600;
color:#6b7280;
}

.info-value{
font-size:13px;
font-weight:700;
color:#111827;
text-align:right;
word-break:break-word;
}

/* DARK MODE */

.dark-mode{
background:#0f172a;
color:#fff;
}

.dark-mode .details-card,
.dark-mode .tab{
background:#1e293b;
}

.dark-mode .info-value,
.dark-mode .section-title h3,
.dark-mode .details-head h4{
color:#fff;
}

.dark-mode .tab{
color:#cbd5e1;
}

/* MOBILE */

@media(max-width:700px){

.content{
padding-top:165px;
}

.profile-main-name{
font-size:18px;
}

.profile-sub-details{
padding-left:108px;
}

.details-head{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.info-row{
flex-direction:column;
gap:4px;
}

.info-value{
text-align:left;
}

}
/* CONTAINER */
.container {
    padding: 0px;
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="fixed-top">
<div id="profileHeader"></div>
</div>

<div class="content">
<div id="data"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");

if(!user){
window.location="login.html";
}

function parseDate(dateStr){

if(!dateStr) return null;

let parts = dateStr.split("-");

if(parts.length === 3){

let day = parseInt(parts[0]);
let month = parseInt(parts[1]) - 1;
let year = parseInt(parts[2]);

return new Date(year, month, day);

}

return new Date(dateStr);

}

function calculateService(joinDate){

let start = parseDate(joinDate);
let today = new Date();

if(!start) return "";

let years = today.getFullYear() - start.getFullYear();
let months = today.getMonth() - start.getMonth();
let days = today.getDate() - start.getDate();

if(days < 0){
months--;
let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

return years+"Y "+months+"M "+days+"D";

}

function retirementCountdown(retDate){

let retire = parseDate(retDate);
let today = new Date();

if(!retire) return "";

let years = retire.getFullYear() - today.getFullYear();
let months = retire.getMonth() - today.getMonth();
let days = retire.getDate() - today.getDate();

if(days < 0){
months--;
let prevMonth = new Date(retire.getFullYear(), retire.getMonth(), 0);
days += prevMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

return years+"Y "+months+"M "+days+"D";

}

function openTab(tab){

document.querySelectorAll(".tab").forEach(btn=>{
btn.classList.remove("active");
});

document.querySelectorAll(".tab-content").forEach(box=>{
box.style.display="none";
});

document.getElementById(tab+"Btn").classList.add("active");
document.getElementById(tab).style.display="block";

}

async function loadProfile(){

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");

let text = await response.text();

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0].trim() === user.trim()){

let service = calculateService(cols[18]);
let retirement = retirementCountdown(cols[6]);

document.getElementById("profileHeader").innerHTML = `

<div class="profile-section">

<div class="profile-header-row">

<div class="back-btn" onclick="goBack()">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</div>

<div class="avatar">
${cols[1].charAt(0)}
</div>

<div class="profile-main-name">
${cols[1]}
</div>

</div>

<div class="profile-sub-details">

<div class="profile-basic">

<div class="contact-item">
📧 ${cols[8]}
</div>

<div class="contact-item">
📞 ${cols[4]}
</div>

<div class="contact-item">
📍 ${cols[3]}
</div>

</div>

</div>

</div>

`;

document.getElementById("data").innerHTML = `
<div class="container">
<div class="highlight-card">

<div class="highlight-grid">

<div class="highlight-box purple">

<div class="highlight-top">

<div class="icon-circle">⏳</div>

<div class="highlight-badge">
SERVICE
</div>

</div>

<div class="highlight-content">

<label>Service Length</label>

<h2>${service}</h2>

<p>Total completed service period</p>

<div class="highlight-line">
<span style="width:75%"></span>
</div>

</div>

</div>

<div class="highlight-box green">

<div class="highlight-top">

<div class="icon-circle">🏁</div>

<div class="highlight-badge">
RETIREMENT
</div>

</div>

<div class="highlight-content">

<label>Retirement In</label>

<h2>${retirement}</h2>

<p>Remaining service duration</p>

<div class="highlight-line">
<span style="width:55%"></span>
</div>

</div>

</div>

</div>

</div>

<div class="section-title">
<h3>Profile Information</h3>
</div>

<div class="tabs">

<div class="tab active" id="basicBtn" onclick="openTab('basic')">
👤 Basic Info
</div>

<div class="tab" id="personalBtn" onclick="openTab('personal')">
🧾 Personal Info
</div>

<div class="tab" id="serviceBtn" onclick="openTab('service')">
💼 Service Details
</div>

</div>

<div class="details-card tab-content" id="basic">

<div class="details-head">

<div class="details-left">

<div class="details-icon">👤</div>

<div>
<h4>Basic Information</h4>
<p>Primary work related information</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>

<div class="info-row">
<div class="info-label">Full Name</div>
<div class="info-value">${cols[1]}</div>
</div>

<div class="info-row">
<div class="info-label">Employee ID</div>
<div class="info-value">${cols[0]}</div>
</div>

<div class="info-row">
<div class="info-label">Designation</div>
<div class="info-value">${cols[23]}</div>
</div>

<div class="info-row">
<div class="info-label">Work Location</div>
<div class="info-value">${cols[3]}</div>
</div>

<div class="info-row">
<div class="info-label">District</div>
<div class="info-value">${cols[16]}</div>
</div>

</div>

<div class="details-card tab-content" id="personal" style="display:none;">

<div class="details-head">

<div class="details-left">

<div class="details-icon">🧾</div>

<div>
<h4>Personal Information</h4>
<p>Employee personal details</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>

<div class="info-row">
<div class="info-label">Mobile Number</div>
<div class="info-value">${cols[4]}</div>
</div>

<div class="info-row">
<div class="info-label">Email Address</div>
<div class="info-value">${cols[8]}</div>
</div>

<div class="info-row">
<div class="info-label">Date of Birth</div>
<div class="info-value">${cols[5]}</div>
</div>

<div class="info-row">
<div class="info-label">Marital Status</div>
<div class="info-value">${cols[11]}</div>
</div>

<div class="info-row">
<div class="info-label">Qualification</div>
<div class="info-value">${cols[12]}</div>
</div>

</div>

<div class="details-card tab-content" id="service" style="display:none;">

<div class="details-head">

<div class="details-left">

<div class="details-icon">💼</div>

<div>
<h4>Service Details</h4>
<p>Official service information</p>
</div>

</div>

<div class="view-btn">View All</div>

</div>

<div class="info-row">
<div class="info-label">Joining Date</div>
<div class="info-value">${cols[18]}</div>
</div>

<div class="info-row">
<div class="info-label">Joining Designation</div>
<div class="info-value">${cols[19]}</div>
</div>

<div class="info-row">
<div class="info-label">Retirement Date</div>
<div class="info-value">${cols[6]}</div>
</div>

<div class="info-row">
<div class="info-label">Pension Type</div>
<div class="info-value">${cols[26]}</div>
</div>

<div class="info-row">
<div class="info-label">Working From</div>
<div class="info-value">${cols[28]}</div>
</div>

</div>
</div>
`;

return;

}

}

document.getElementById("data").innerHTML="User not found.";

}

loadProfile();

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

function goBack(){
window.history.back();
}

</script>

</body>
</html>
