<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* TOP BAR */
.top{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
}

.back-btn{
    width:42px;
    height:42px;
    border-radius:12px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* PROFILE HEADER */
.profile-header{
    background:linear-gradient(135deg,#0f2ea6,#1e40ff);
    border-radius:22px;
    padding:20px;
    color:#fff;
    display:flex;
    align-items:center;
    gap:15px;
    margin:10px;
    position:relative;
    overflow:hidden;
}

.profile-header::after{
    content:"";
    position:absolute;
    right:-40px;
    bottom:-40px;
    width:200px;
    height:200px;
    background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);
}

.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
}

.profile-name{
    font-size:22px;
    font-weight:700;
}

.profile-desg{
    opacity:0.9;
}

.active-badge{
    margin-top:6px;
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    background:#10b981;
    font-size:12px;
}

/* CARDS */
.stats{
    display:flex;
    gap:12px;
    padding:10px;
}

.stat-card{
    flex:1;
    background:#fff;
    border-radius:18px;
    padding:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.stat-blue{ border-top:4px solid #2563eb; }
.stat-orange{ border-top:4px solid #f97316; }

.stat-title{
    font-size:12px;
    color:#64748b;
    margin-bottom:6px;
}

.stat-value{
    font-size:18px;
    font-weight:bold;
}

/* SECTION */
.section{
    background:#fff;
    margin:12px;
    border-radius:18px;
    padding:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.section-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-weight:600;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.item{
    display:flex;
    gap:10px;
    align-items:center;
}

.icon{
    width:40px;
    height:40px;
    border-radius:12px;
    background:#eef2ff;
    display:flex;
    align-items:center;
    justify-content:center;
}

.item-text small{
    color:#64748b;
    font-size:11px;
}

.item-text p{
    margin:0;
    font-weight:600;
    font-size:13px;
}

</style>
</head>

<body>

<div class="top">
  <div class="back-btn" onclick="goBack()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M15 18L9 12L15 6" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="icon">👤</div>
  <h2>Employee Profile</h2>
</div>
<div class="container">
<div class="content">
<div class="card">
<div id="data"></div>
</div>
</div>
</div>
<script>
let user = localStorage.getItem("currentUser");

if(!user){
window.location="login.html";
}

function parseDate(dateStr){
if(!dateStr) return null;
let parts = dateStr.split("-");
if(parts.length === 3){
let day = parseInt(parts[0]);
let month = parseInt(parts[1]) - 1;
let year = parseInt(parts[2]);
return new Date(year, month, day);
}
return new Date(dateStr);
}

function calculateService(joinDate){
let start = parseDate(joinDate);
let today = new Date();
if(!start) return "";
let years = today.getFullYear() - start.getFullYear();
let months = today.getMonth() - start.getMonth();
let days = today.getDate() - start.getDate();
if(days < 0){
months--;
let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
days += prevMonth.getDate();
}
if(months < 0){
years--;
months += 12;
}
return years+"Years "+months+"Months "+days+"Days";
}

function retirementCountdown(retDate){
let retire = parseDate(retDate);
let today = new Date();
if(!retire) return "";
let years = retire.getFullYear() - today.getFullYear();
let months = retire.getMonth() - today.getMonth();
let days = retire.getDate() - today.getDate();
if(days < 0){
months--;
let prevMonth = new Date(retire.getFullYear(), retire.getMonth(), 0);
days += prevMonth.getDate();
}
if(months < 0){
years--;
months += 12;
}
return years+"Years "+months+"Months "+days+"Days";
}

async function loadProfile(){
let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
let text = await response.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){
let cols = rows[i].split(",");
if(cols[0].trim() === user.trim()){
let service = calculateService(cols[18]);
let retirement = retirementCountdown(cols[6]);

document.getElementById("data").innerHTML = `

<div class="profile-header">
    <div class="avatar">${cols[1].charAt(0)}</div>
    <div>
        <div class="profile-name">${cols[1]}</div>
        <div class="profile-desg">${cols[2]}</div>
        <div class="active-badge">ACTIVE</div>
    </div>
</div>

<div class="stats">
    <div class="stat-card stat-blue">
        <div class="stat-title">SERVICE LENGTH</div>
        <div class="stat-value">${service}</div>
    </div>

    <div class="stat-card stat-orange">
        <div class="stat-title">RETIREMENT IN</div>
        <div class="stat-value">${retirement}</div>
    </div>
</div>

<div class="section">
    <div class="section-header">
        <span>BASIC INFORMATION</span>
        <span style="color:#2563eb;">View all</span>
    </div>

    <div class="grid">
        <div class="item">
            <div class="icon">💼</div>
            <div class="item-text">
                <small>Designation</small>
                <p>${cols[23]}</p>
            </div>
        </div>

        <div class="item">
            <div class="icon">🏢</div>
            <div class="item-text">
                <small>Working Place</small>
                <p>${cols[3]}</p>
            </div>
        </div>

        <div class="item">
            <div class="icon">📍</div>
            <div class="item-text">
                <small>District</small>
                <p>${cols[16]}</p>
            </div>
        </div>

        <div class="item">
            <div class="icon">🏠</div>
            <div class="item-text">
                <small>Home Town</small>
                <p>${cols[17]}</p>
            </div>
        </div>
    </div>
</div>

<div class="section">
    <div class="section-header">
        <span>PERSONAL DETAILS</span>
        <span style="color:#2563eb;">View all</span>
    </div>

    <div class="grid">
        <div class="item"><div class="icon">📞</div><div class="item-text"><small>Mobile</small><p>${cols[4]}</p></div></div>
        <div class="item"><div class="icon">✉️</div><div class="item-text"><small>Email</small><p>${cols[8]}</p></div></div>
        <div class="item"><div class="icon">📅</div><div class="item-text"><small>DOB</small><p>${cols[5]}</p></div></div>
        <div class="item"><div class="icon">❤️</div><div class="item-text"><small>Status</small><p>${cols[11]}</p></div></div>
        <div class="item"><div class="icon">🎓</div><div class="item-text"><small>Qualification</small><p>${cols[12]}</p></div></div>
        <div class="item"><div class="icon">🕉️</div><div class="item-text"><small>Religion</small><p>${cols[13]}</p></div></div>
    </div>
</div>

<div class="section">
    <div class="section-header">
        <span>SERVICE DETAILS</span>
        <span style="color:#2563eb;">View all</span>
    </div>

    <div class="grid">
        <div class="item"><div class="icon">📅</div><div class="item-text"><small>Joining</small><p>${cols[18]}</p></div></div>
        <div class="item"><div class="icon">👤</div><div class="item-text"><small>Joining Desg</small><p>${cols[19]}</p></div></div>
        <div class="item"><div class="icon">⏳</div><div class="item-text"><small>Retirement</small><p>${cols[6]}</p></div></div>
    </div>
</div>
`;
return;
}
}
document.getElementById("data").innerHTML="User not found.";
}

loadProfile();

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}
function goBack(){ window.history.back(); }
</script>

</body>
</html>
