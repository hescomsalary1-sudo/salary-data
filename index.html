<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Prompt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(180deg,#d7d8ff 0%,#fff2ec 55%,#2400b7 100%);
}

/* Decorations */

.top-leaves{
    position:absolute;
    top:-10px;
    left:-10px;
    font-size:50px;
    opacity:.18;
    color:#3d20d8;
}

.top-dots{
    position:absolute;
    right:20px;
    top:60px;
    width:80px;
    height:80px;
    background:
    radial-gradient(#9f86ff 18%,transparent 20%);
    background-size:10px 10px;
    opacity:.30;
}

/* Main Container */

.container{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding-top:35px;
}

/* Logo */

.logo-box{
    position:relative;
}

.orbit{
    position:absolute;
    width:140px;
    height:140px;
    border:1.5px dashed rgba(130,90,255,.5);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:rotate 18s linear infinite;
}

.logo{
    width:100px;
    height:100px;

    background:linear-gradient(145deg,#2400b7,#4b2dd8);

    border-radius:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:55px;
    font-weight:bold;

    box-shadow:
    0 0 0 4px rgba(255,220,130,.7),
    0 0 20px rgba(90,50,255,.35);

    animation:pulse 2s infinite;
}

/* Title */

h1{
    margin-top:18px;
    font-size:40px;
    color:#2100a8;
}

.subtitle{
    font-size:15px;
    color:#1e2085;
    margin-top:4px;
}

/* Welcome Card */

.card{
    width:88%;
    max-width:500px;

    margin-top:18px;

    background:rgba(255,255,255,.92);

    border-radius:24px;

    padding:18px 16px;

    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card h2{
    font-size:20px;
    color:#241d88;
}

.card p{
    font-size:15px;
    color:#241d88;
    margin-top:5px;
}

.hescom{
    font-size:42px;
    font-weight:800;
    color:#4c28e0;
    margin:5px 0;
}

/* Features */

.features{
    width:100%;

    margin-top:auto;

    padding:0 12px 95px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:8px;
}

.feature{
    background:rgba(80,50,220,.25);

    backdrop-filter:blur(10px);

    border-radius:14px;

    color:white;

    padding:10px 4px;

    min-height:78px;
}

.feature .icon{
    font-size:22px;
}

.feature .title{
    margin-top:4px;
    font-size:11px;
    font-weight:600;
}

.feature .kn{
    font-size:9px;
    margin-top:2px;
}

/* Loader */

.loader{
    position:absolute;

    bottom:48px;

    left:50%;

    transform:translateX(-50%);

    width:38px;
    height:38px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.4);

    border-top-color:#7f5bff;

    animation:spin 1s linear infinite;
}

.loading-text{
    position:absolute;

    bottom:12px;

    width:100%;

    text-align:center;

    color:#241f92;
}

.loading-text h3{
    font-size:15px;
    font-weight:500;
}

.loading-text p{
    font-size:12px;
    font-style:italic;
}

/* Animations */

@keyframes spin{
    to{
        transform:translateX(-50%) rotate(360deg);
    }
}

@keyframes rotate{
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

@keyframes pulse{
    50%{
        transform:scale(1.04);
    }
}

/* Small Phones */

@media(max-width:400px){

    .container{
        padding-top:28px;
    }

    .logo{
        width:90px;
        height:90px;
        font-size:48px;
    }

    .orbit{
        width:125px;
        height:125px;
    }

    h1{
        font-size:34px;
    }

    .subtitle{
        font-size:13px;
    }

    .hescom{
        font-size:36px;
    }

    .card h2{
        font-size:18px;
    }

    .card p{
        font-size:13px;
    }

    .feature{
        min-height:72px;
    }

    .feature .icon{
        font-size:20px;
    }

    .feature .title{
        font-size:10px;
    }

    .feature .kn{
        font-size:8px;
    }
}

</style>
</head>

<body>

<div class="top-leaves">❀ ❀ ❀</div>

<div class="top-dots"></div>

<div class="container">

    <div class="logo-box">
        <div class="orbit"></div>

        <div class="logo">
            ₹
        </div>
    </div>

    <h1>Salary Prompt</h1>

    <div class="subtitle">
        Smart & Secure Salary Management
    </div>

    <div class="card">

        <h2>ಸ್ವಾಗತ!</h2>

        <p>ಕಾರ್ಯ ಮತ್ತು ಪಾಲನಾ ವಿಭಾಗ</p>

        <div class="hescom">
            ಹೆಸ್ಕಾಂ
        </div>

        <p>ಶಿರಸಿ</p>

        <p style="margin-top:10px;">
            ನಾವು ಜನರಿಗೆ - ನಮ್ಮ ಹೆಮ್ಮೆಗೆ
        </p>

    </div>

    <div class="features">

        <div class="feature">
            <div class="icon">🛡️</div>
            <div class="title">Secure</div>
            <div class="kn">ಸುರಕ್ಷತೆ</div>
        </div>

        <div class="feature">
            <div class="icon">🤝</div>
            <div class="title">Reliable</div>
            <div class="kn">ವಿಶ್ವಾಸಾರ್ಹ</div>
        </div>

        <div class="feature">
            <div class="icon">📈</div>
            <div class="title">Efficient</div>
            <div class="kn">ದಕ್ಷತೆ</div>
        </div>

        <div class="feature">
            <div class="icon">👥</div>
            <div class="title">Employee First</div>
            <div class="kn">ಕೇಂದ್ರಬಿಂದು</div>
        </div>

    </div>

</div>

<div class="loader"></div>

<div class="loading-text">
    <h3>Loading...</h3>
    <p>Empowering Every Employee</p>
</div>

<script>
setTimeout(function() {
    window.location.href = "login.html";
}, 3000);
</script>

</body>
</html>
