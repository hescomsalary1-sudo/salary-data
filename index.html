<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Salary Prompt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#d9d8ff 0%,#fff4ef 55%,#1a008a 100%);
position:relative;
}
body:before{
content:"";position:absolute;inset:0;
background:
radial-gradient(circle at 50% 15%,rgba(255,255,255,.9),transparent 25%),
linear-gradient(180deg,transparent 60%,rgba(28,0,120,.85) 100%);
}
.leaves{position:absolute;top:0;left:0;color:#4d2cff;font-size:42px;opacity:.35}
.dots{position:absolute;top:90px;right:50px;width:120px;height:120px;
background:radial-gradient(#8b6bff 15%,transparent 16%);
background-size:12px 12px;opacity:.3;border-radius:50%}
.wrap{
position:relative;z-index:2;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
padding-top:60px;text-align:center;
}
.logo{
width:145px;height:145px;border-radius:36px;
background:linear-gradient(135deg,#2200b8,#4b2dd8);
display:flex;align-items:center;justify-content:center;
font-size:80px;color:#fff;font-weight:700;
box-shadow:0 0 0 6px rgba(255,214,120,.45),0 0 35px rgba(88,42,255,.5);
animation:pulse 2s infinite;
}
.logo-ring{
position:absolute;width:180px;height:180px;border:2px dashed #9b7dff;border-radius:50%;
animation:spin 18s linear infinite;
}
.logo-box{position:relative;display:flex;align-items:center;justify-content:center}
h1{font-size:64px;color:#2200aa;margin-top:28px;font-weight:800}
.tag{font-size:18px;color:#1d2088;margin-top:8px}
.welcome{
margin-top:28px;background:rgba(255,255,255,.9);
width:82%;max-width:620px;border-radius:28px;padding:28px 20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);color:#1f1a80
}
.welcome h2{font-size:28px;margin-bottom:10px}
.welcome h3{font-size:52px;color:#4622e0}
.welcome p{font-size:20px}
.features{
margin-top:auto;width:100%;padding:0 18px 120px;
display:flex;justify-content:center;gap:16px
}
.card{
width:110px;background:rgba(78,53,210,.28);backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.15);border-radius:18px;
padding:16px 8px;color:#fff
}
.card .i{font-size:32px}
.card b{display:block;margin-top:8px}
.bottom-wave{
position:absolute;left:0;right:0;bottom:0;height:210px;
background:
radial-gradient(120% 100% at 50% 100%,#fff 35%,transparent 36%),
linear-gradient(180deg,transparent 0,#2200aa 10%,#1a007a 100%);
}
.loader{
position:absolute;bottom:58px;left:50%;transform:translateX(-50%);
width:52px;height:52px;border-radius:50%;
border:5px solid rgba(255,255,255,.35);
border-top-color:#8d6cff;animation:spin 1s linear infinite;
z-index:3
}
.loadtxt{
position:absolute;bottom:18px;left:0;right:0;text-align:center;
z-index:3;color:#3126a3
}
.loadtxt small{display:block;font-style:italic}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{
50%{transform:scale(1.05)}
}
</style>
</head>
<body>
<div class="leaves">❋ ❋ ❋</div>
<div class="dots"></div>

<div class="wrap">
  <div class="logo-box">
    <div class="logo-ring"></div>
    <div class="logo">₹</div>
  </div>

  <h1>Salary Prompt</h1>
  <div class="tag">Smart &amp; Secure Salary Management</div>

  <div class="welcome">
      <h2>ಸ್ವಾಗತ!</h2>
      <p>ಕಾರ್ಯ ಮತ್ತು ಪಾಲನಾ ವಿಭಾಗ</p>
      <h3>ಹೆಸ್ಕಾಂ</h3>
      <p>ಶಿರಸಿ</p>
      <p style="margin-top:14px">ನಾವು ಜನರಿಗೆ - ನಮ್ಮ ಹೆಮ್ಮೆಗೆ</p>
  </div>

  <div class="features">
      <div class="card"><div class="i">🛡️</div><b>Secure</b><div>ಸುರಕ್ಷತೆ</div></div>
      <div class="card"><div class="i">🤝</div><b>Reliable</b><div>ವಿಶ್ವಾಸಾರ್ಹ</div></div>
      <div class="card"><div class="i">📈</div><b>Efficient</b><div>ದಕ್ಷತೆ</div></div>
      <div class="card"><div class="i">👥</div><b>Employee First</b><div>ಕೇಂದ್ರಬಿಂದು</div></div>
  </div>
</div>

<div class="bottom-wave"></div>
<div class="loader"></div>
<div class="loadtxt">
  <div>Loading...</div>
  <small>Empowering Every Employee</small>
</div>

<script>
setTimeout(function() {
    window.location.href = "login.html";
}, 3000);
</script>

</body>
</html>
