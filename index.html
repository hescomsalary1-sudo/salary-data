<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Salary Prompt</title>
<style>
/* --- PREMIUM REFINED DESIGN SYSTEM --- */
:root {
    --primary-gradient: radial-gradient(circle at 50% 50%, #1e6eff 0%, #0c3fc2 35%, #062280 70%, #020d35 100%);
    --accent-blue: #4db4ff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: var(--primary-gradient);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* --- PREMIUM AMBIENT LIGHT MESH --- */
.bg1, .bg2 {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(77,180,255,0.12) 0%, rgba(19,104,255,0) 70%);
    pointer-events: none;
    z-index: 1;
}
.bg1 {
    width: 450px;
    height: 450px;
    left: -100px;
    top: -100px;
    animation: ambientFloat 8s ease-in-out infinite alternate;
}
.bg2 {
    width: 350px;
    height: 350px;
    right: -100px;
    bottom: -100px;
    animation: ambientFloat 12s ease-in-out infinite alternate-reverse;
}

/* --- CENTRAL BRAND ARCHITECTURE --- */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logoWrap {
    position: relative;
}

/* --- RUNNING INNER DASHED TRACK --- */
.ring {
    position: absolute;
    inset: -15px;
    border: 1.5px dashed rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    animation: spinRing 24s linear infinite;
}

/* --- PREMIUM STATIONARY OUTER TRACK --- */
.ring-outer {
    position: absolute;
    inset: -22px;
    border: 1px solid rgba(77, 180, 255, 0.1);
    border-radius: 50%;
}

/* --- INDEPENDENT WAVE RE Reveal LOGO --- */
.logo {
    width: 100px;
    height: 100px;
    border-radius: 28px;
    background: linear-gradient(135deg, #0b45d8 0%, #1368ff 50%, #3fa4ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 52px;
    font-weight: 700;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2), 0 15px 35px rgba(19, 104, 255, 0.4);
    animation: floatingPulse 3s ease-in-out infinite;
    user-select: none;
}

/* --- HIGH-END KEYFRAME SYSTEMS --- */
@keyframes spinRing {
    to { transform: rotate(360deg); }
}

@keyframes floatingPulse {
    0% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.02); }
    100% { transform: translateY(0) scale(1); }
}

@keyframes ambientFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, 20px) scale(1.1); }
}

/* --- OPTIMIZATION BREAKPOINT --- */
@media(max-width: 400px){
    .logo { width: 85px; height: 85px; font-size: 44px; border-radius: 24px; }
    .ring { inset: -12px; }
    .ring-outer { inset: -18px; }
}
</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">
    <div class="logoWrap">
        <div class="ring-outer"></div>
        <div class="ring"></div>
        <div class="logo">&#8377;</div>
    </div>
</div>

<!-- RUNTIME ROUTING TRIGGER -->
<script>
setTimeout(function(){window.location.href="login.html";},3000);
</script>
</body>
</html>
