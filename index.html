<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Prompt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(180deg,#d7d8ff 0%,#fff2ec 50%,#2400b7 100%);
}

/* TOP DECORATION */

.top-leaves{
    position:absolute;
    top:-20px;
    left:-20px;
    font-size:70px;
    opacity:.25;
    color:#3d20d8;
}

.top-dots{
    position:absolute;
    right:25px;
    top:80px;
    width:120px;
    height:120px;
    background:
    radial-gradient(#9f86ff 20%,transparent 22%);
    background-size:12px 12px;
    opacity:.35;
}

/* MAIN */

.container{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding-top:60px;
}

/* LOGO */

.logo-box{
    position:relative;
}

.orbit{
    position:absolute;
    width:180px;
    height:180px;
    border:2px dashed rgba(130,90,255,.5);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:rotate 18s linear infinite;
}

.logo{
    width:130px;
    height:130px;

    background:
    linear-gradient(145deg,#2400b7,#4b2dd8);

    border-radius:35px;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:70px;
    font-weight:bold;

    box-shadow:
    0 0 0 5px rgba(255,220,130,.7),
    0 0 30px rgba(90,50,255,.45);

    animation:pulse 2s infinite;
}

/* TITLE */

h1{
    margin-top:25px;
    font-size:52px;
    color:#2100a8;
}

.subtitle{
    font-size:18px;
    color:#1e2085;
    margin-top:6px;
}

/* WELCOME CARD */

.card{

    width:85%;
    max-width:600px;

    margin-top:25px;

    background:rgba(255,255,255,.92);

    border-radius:30px;

    padding:25px 20px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card h2{
    font-size:24px;
    color:#241d88;
}

.card p{
    font-size:18px;
    color:#241d88;
    margin-top:8px;
}

.hescom{
    font-size:58px;
    font-weight:800;
    color:#4c28e0;
    margin:8px 0;
}

/* FEATURES */

.features{

    width:100%;

    margin-top:auto;

    padding:0 15px 120px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:10px;
}

.feature{

    background:
    rgba(80,50,220,.25);

    backdrop-filter:blur(10px);

    border-radius:18px;

    color:white;

    padding:12px 6px;

    min-height:95px;
}

.feature .icon{
    font-size:28px;
}

.feature .title{
    margin-top:6px;
    font-size:14px;
    font-weight:600;
}

.feature .kn{
    font-size:11px;
    margin-top:3px;
}

/* LOADER */

.loader{

    position:absolute;

    bottom:60px;

    left:50%;

    transform:translateX(-50%);

    width:48px;

    height:48px;

    border-radius:50%;

    border:4px solid rgba(255,255,255,.4);

    border-top-color:#7f5bff;

    animation:spin 1s linear infinite;
}

.loading-text{

    position:absolute;

    bottom:18px;

    width:100%;

    text-align:center;

    color:#241f92;
}

.loading-text h3{
    font-size:18px;
    font-weight:500;
}

.loading-text p{
    font-size:14px;
    font-style:italic;
}

/* ANIMATIONS */

@keyframes spin{
    to{
        transform:translateX(-50%) rotate(360deg);
    }
}

@keyframes rotate{
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

@keyframes pulse{

    50%{
        transform:scale(1.05);
    }
}

/* SMALL PHONES */

@media(max-width:400px){

    h1{
        font-size:42px;
    }

    .subtitle{
        font-size:15px;
    }

    .hescom{
        font-size:48px;
    }

    .feature .title{
        font-size:12px;
    }

    .feature .kn{
        font-size:10px;
    }
}

</style>
</head>

<body>

<div class="top-leaves">❀ ❀ ❀</div>

<div class="top-dots"></div>

<div class="container">

    <div class="logo-box">

        <div class="orbit"></div>

        <div class="logo">
            ₹
        </div>

    </div>

    <h1>Salary Prompt</h1>

    <div class="subtitle">
        Smart & Secure Salary Management
    </div>

    <div class="card">

        <h2>ಸ್ವಾಗತ!</h2>

        <p>ಕಾರ್ಯ ಮತ್ತು ಪಾಲನಾ ವಿಭಾಗ</p>

        <div class="hescom">
            ಹೆಸ್ಕಾಂ
        </div>

        <p>ಶಿರಸಿ</p>

        <p style="margin-top:15px;">
            ನಾವು ಜನರಿಗೆ - ನಮ್ಮ ಹೆಮ್ಮೆಗೆ
        </p>

    </div>

    <div class="features">

        <div class="feature">
            <div class="icon">🛡️</div>
            <div class="title">Secure</div>
            <div class="kn">ಸುರಕ್ಷತೆ</div>
        </div>

        <div class="feature">
            <div class="icon">🤝</div>
            <div class="title">Reliable</div>
            <div class="kn">ವಿಶ್ವಾಸಾರ್ಹ</div>
        </div>

        <div class="feature">
            <div class="icon">📈</div>
            <div class="title">Efficient</div>
            <div class="kn">ದಕ್ಷತೆ</div>
        </div>

        <div class="feature">
            <div class="icon">👥</div>
            <div class="title">Employee First</div>
            <div class="kn">ಕೇಂದ್ರಬಿಂದು</div>
        </div>

    </div>

</div>

<div class="loader"></div>

<div class="loading-text">
    <h3>Loading...</h3>
    <p>Empowering Every Employee</p>
</div>

<script>
setTimeout(function() {
    window.location.href = "login.html";
}, 3000);
</script>

</body>
</html>
