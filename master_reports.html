<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #f8faff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* --- THE LOADER CONTAINER --- */
        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- MODERN PREMIUM SPINNER --- */
        .premium-spinner {
            position: relative;
            width: 60px;
            height: 60px;
        }

        /* The Outer Glowing Ring */
        .premium-spinner::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: 4px solid rgba(36, 0, 183, 0.1); /* Very faint primary */
            border-top: 4px solid #2400b7; /* Solid Primary */
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* The Inner Pulsing Dot */
        .premium-spinner::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 12px;
            height: 12px;
            background: #2400b7;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* TEXT UNDER SPINNER */
        .loader-text {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #2400b7;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* ANIMATIONS */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
        }

    </style>
</head>
<body>

    <div class="loader-wrapper">
        <div class="premium-spinner"></div>
        <div class="loader-text">Loading</div>
    </div>

</body>
</html>
