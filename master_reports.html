<!DOCTYPE html>
<html>
<head>
<title>Master Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background:#f4f4f9;
}

.top{
padding:18px;
background:#4b2dd8;
color:white;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.content{
padding:15px;
}

/* SLIDER */
.report-slider{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px 5px;
}

.report-slider::-webkit-scrollbar{
display:none;
}

.slide-btn{
min-width:140px;
padding:14px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
font-weight:600;
font-size:13px;
cursor:pointer;
flex-shrink:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.slide-btn span{
font-size:20px;
}

.slide-btn:active{
transform:scale(0.92);
}
</style>
</head>

<body>

<div class="top">
<h3>🧠 Master Employee Report</h3>
</div>

<div class="content">

<div class="report-slider">

<button class="slide-btn" onclick="openReport('all')">
<span>📊</span> Full Data
</button>

<button class="slide-btn" onclick="openReport('Male')">
<span>👨</span> Male
</button>

<button class="slide-btn" onclick="openReport('Female')">
<span>👩</span> Female
</button>

<button class="slide-btn" onclick="openReport('PH')">
<span>♿</span> Disabled
</button>

<button class="slide-btn" onclick="openReport('Leave')">
<span>📅</span> Leave
</button>

<button class="slide-btn" onclick="openReport('Other')">
<span>📂</span> Other
</button>

<button class="slide-btn" onclick="downloadCSV()">
<span>⬇</span> Download
</button>

</div>

</div>

<script>

function openReport(type){
window.location.href = "view_master_reports.html?type=" + type;
}

function downloadCSV(){
window.location.href = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
}

</script>

</body>
</html>
