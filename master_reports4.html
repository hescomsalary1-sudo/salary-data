<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HESCOM HR Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --sc-theme: #ef4444;
            --st-theme: #f59e0b;
            --other-theme: #10b981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--bg); color: var(--text-dark);
            padding-bottom: 50px;
        }

        header {
            width: 100%; padding: 35px 20px; background: #1e293b;
            color: white; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        header p { margin: 8px 0 0 0; font-size: 12px; opacity: 0.7; font-weight: 600; text-transform: uppercase; }

        .container { width: 92%; max-width: 500px; margin: -30px auto 0 auto; display: flex; flex-direction: column; gap: 15px; }

        /* --- Stats Overview --- */
        .hero-stats {
            background: var(--card-bg); border-radius: 24px; padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hero-stats .main-count { font-size: 34px; font-weight: 800; color: var(--primary); display: block; }
        .hero-stats .label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

        /* --- Section Cards --- */
        .card {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .card-title {
            font-size: 13px; font-weight: 800; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px; color: var(--text-dark);
        }

        /* --- Group Rows --- */
        .group-row { margin-bottom: 15px; }
        .row-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; font-weight: 700; }
        .progress-container { height: 10px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); border-radius: 10px; transition: width 1s ease; }

        /* --- Category Pill Grid --- */
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .pill { padding: 12px 5px; border-radius: 16px; text-align: center; border: 1px solid transparent; }
        .pill span { display: block; font-size: 9px; font-weight: 800; margin-bottom: 2px; opacity: 0.7; }
        .pill b { font-size: 18px; font-weight: 800; }

        .pill-sc { background: #fef2f2; border-color: #fee2e2; color: var(--sc-theme); }
        .pill-st { background: #fffbeb; border-color: #fef3c7; color: var(--st-theme); }
        .pill-oth { background: #f0fdf4; border-color: #dcfce7; color: var(--other-theme); }

        #loading-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader { width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen"><div class="loader"></div><p style="font-weight: 700; font-size: 12px; margin-top: 10px;">ANALYZING CSV...</p></div>

<header>
    <h1>HESCOM Analytics</h1>
    <p>Division Workforce Report</p>
</header>

<div class="container">
    
    <div class="hero-stats">
        <div>
            <span class="label">Total Working Personnel</span>
            <span class="main-count" id="totalCount">0</span>
        </div>
        <div style="text-align: right;">
            <i class="fas fa-users-check fa-2x" style="color: #e2e8f0;"></i>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-chart-line"></i> GROUP DISTRIBUTION</div>
        <div id="groupContainer"></div>
    </div>

    <div id="categoryContainer"></div>

</div>

<script>
    // Link to your CSV
    const CSV_PATH = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";

    window.onload = () => {
        Papa.parse(CSV_PATH, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                renderDashboard(results.data);
                document.getElementById('loading-screen').style.display = 'none';
            }
        });
    };

    function renderDashboard(data) {
        const stats = {};
        let totalWorking = 0;

        data.forEach(row => {
            // Check for "working" in the working_post column
            const isWorking = (row.working_post || '').toLowerCase().trim() === 'working';
            
            if (isWorking) {
                totalWorking++;
                
                // Get Group (Default to 'Unknown' if column is blank)
                let grp = (row.group || 'Unknown').toUpperCase().trim();
                let cat = (row.Category || '').toUpperCase().trim();

                if (!stats[grp]) {
                    stats[grp] = { total: 0, sc: 0, st: 0, others: 0 };
                }

                stats[grp].total++;

                // Category Logic
                if (cat.includes('SC')) stats[grp].sc++;
                else if (cat.includes('ST')) stats[grp].st++;
                else stats[grp].others++;
            }
        });

        document.getElementById('totalCount').innerText = totalWorking;

        const groupList = document.getElementById('groupContainer');
        const catList = document.getElementById('categoryContainer');
        
        groupList.innerHTML = '';
        catList.innerHTML = '';

        // Sort groups alphabetically (A, B, C, D, Unknown)
        const sortedGroups = Object.keys(stats).sort();

        sortedGroups.forEach(g => {
            const s = stats[g];
            const percent = ((s.total / totalWorking) * 100).toFixed(1);

            // Group Row
            groupList.innerHTML += `
                <div class="group-row">
                    <div class="row-info">
                        <span>Group ${g}</span>
                        <span>${s.total} <small style="color:var(--text-light)">(${percent}%)</small></span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;

            // Category Breakdown Card
            catList.innerHTML += `
                <div class="card" style="margin-bottom:15px;">
                    <div class="card-title"><i class="fas fa-filter"></i> GROUP ${g} CATEGORIES</div>
                    <div class="grid-3">
                        <div class="pill pill-sc"><span>SC</span><b>${s.sc}</b></div>
                        <div class="pill pill-st"><span>ST</span><b>${s.st}</b></div>
                        <div class="pill pill-oth"><span>OTHERS</span><b>${s.others}</b></div>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
