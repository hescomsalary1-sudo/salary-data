<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff; /* Pure white background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- THE LIQUID BLOB --- */
        .blob-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 15px 30px rgba(75, 45, 216, 0.2));
        }

        .blob-svg {
            width: 100%;
            height: 100%;
            fill: url(#liquid-gradient);
            /* This animation handles the smooth shape-shifting */
            animation: morph 4s ease-in-out infinite;
            transform-origin: center;
        }

        /* --- TEXT --- */
        .brand-text {
            margin-top: 35px;
            font-size: 12px;
            font-weight: 700;
            color: #4b2dd8;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.8;
            animation: text-pulse 2s ease-in-out infinite;
        }

        /* --- ANIMATIONS --- */
        
        /* The Secret: We animate the 'd' attribute (the path data) */
        /* Note: For pure CSS morphing, the number of points in the path must match */
        @keyframes morph {
            0%, 100% {
                border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
                transform: rotate(0deg) scale(1);
            }
            33% {
                border-radius: 70% 30% 46% 54% / 30% 29% 71% 70%;
                transform: rotate(120deg) scale(1.1);
            }
            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: rotate(240deg) scale(0.95);
            }
        }

        @keyframes text-pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }

        /* --- THE GRADIENT --- */
        .liquid-shape {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #4b2dd8, #00c9a7);
            animation: morph 6s linear infinite alternate;
        }

    </style>
</head>
<body>

    <div class="loader-content">
        <div class="blob-wrapper">
            <div class="liquid-shape"></div>
        </div>
        <div class="brand-text">HESCOM</div>
    </div>

</body>
</html>
