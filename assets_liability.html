<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --primary: #4b2dd8;
    --primary-light: #6c39ff;
    --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #2d3436;
    --text-muted: #636e72;
  }

  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: var(--bg-gradient);
    color: var(--text-main);
    line-height: 1.6;
  }

  /* MODERN HEADER */
  .top {
    background: #ffffff;
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top h2 {
    margin: 0;
    font-size: 24px;
    background: linear-gradient(to right, #4b2dd8, #9b6dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .top p {
    margin: 5px 0 0;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* CONTENT CONTAINER */
  .content {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  /* FLOATING FILTER CARD */
  .filter-card {
    background: var(--card-bg);
    padding: 24px;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
    margin-top: -15px; /* Slight overlap with header */
    border: 1px solid rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
  }

  .filter-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-align: center;
  }

  /* SLEEK INPUTS */
  .date-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }

  .input-box {
    flex: 1;
    background: #f1f3f9;
    border-radius: 16px;
    padding: 10px 16px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
  }

  .input-box:focus-within {
    background: #ffffff;
    border-color: var(--primary-light);
    box-shadow: 0 8px 20px rgba(75, 45, 216, 0.1);
  }

  .input-box label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .input-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 15px;
    font-weight: 600;
    color: #222;
    outline: none;
    padding: 5px 0;
  }

  /* ACTION BUTTON */
  .check-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #6c39ff 0%, #4b2dd8 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(75, 45, 216, 0.25);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .check-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(75, 45, 216, 0.35);
  }

  .check-btn:active {
    transform: scale(0.98);
  }

  /* TABLE REFINEMENT */
  .table-container {
    margin-top: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    overflow: hidden;
    background: white;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  th {
    background: #f8f9ff;
    color: var(--primary);
    font-weight: 700;
    padding: 15px;
    font-size: 13px;
    border-bottom: 2px solid #eee;
  }

  td {
    padding: 14px;
    border-bottom: 1px solid #f0f0f0;
    color: #444;
  }

  /* SUMMARY CARDS */
  .summary {
    margin-top: 20px;
    padding: 22px;
    border-radius: 24px;
    color: white;
    box-shadow: 0 12px 24px rgba(0,0,0,0.1);
  }

  .summary.main { background: linear-gradient(135deg, #4b2dd8, #8e44ad); }
  .summary.income { background: linear-gradient(135deg, #0984e3, #00cec9); }
  .summary.breakdown { 
    background: #ffffff; 
    color: #2d3436; 
    border: 1px solid #eee;
  }

  .row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
  }

  .total {
    border-top: 1px solid rgba(255,255,255,0.2);
    margin-top: 10px;
    padding-top: 15px;
    font-size: 18px;
    font-weight: 800;
  }

  /* LOADER STYLES */
  #loader {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(5px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
  }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>
  <div id="loader"><div class="spinner"></div></div>

  <div class="top">
    <h2>Assets & Liability</h2>
    <p>Financial Dashboard</p>
  </div>

  <div class="content">
    <div class="filter-card">
      <div class="filter-title">Select Reporting Period</div>
      <div class="date-row">
        <div class="input-box">
          <label>STARTING FROM</label>
          <input type="month" id="fromDate">
        </div>
        <div class="input-box">
          <label>ENDING AT</label>
          <input type="month" id="toDate">
        </div>
      </div>
      <button class="check-btn" onclick="loadData()">Generate Report</button>
    </div>

    <div class="table-container">
      <div id="tableData"></div>
    </div>

    <div id="summaryBox"></div>
  </div>

<script>

let user = localStorage.getItem("currentUser");

/* HEADERS */
let headers = [
"Month","Basic","Dearness","HRA","CCA","Personal","Special Pay",
"Conveyance","Washing","SFTA","Locality","MWA","Hill","Charge",
"Pension","LWF Company","Cash Duty","Other Earn",
"LIC","Income Tax","PT","Society","PLI","Union","SC/ST",
"House Rent","Urban Bank","Family Fund","Festival","PC10","PC14","LWF",
"Recovery","Other Ded"
];

function inRange(year,month,from,to){
let current = year + "-" + month.padStart(2,"0");
return current >= from && current <= to;
}

/* ✅ NEW: CHECK YEAR RANGE FOR OTHER INCOME */
function inYearRange(year,from,to){
let fromYear = from.split("-")[0];
let toYear = to.split("-")[0];
return year >= fromYear && year <= toYear;
}

async function loadData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

/* ✅ SHOW LOADER */
loader.style.display = "flex";

/* ================= SALARY ================= */

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await res.text();

let rows = data.trim().split("\n");

let filteredRows = [];
let colUsed = new Array(headers.length).fill(false);

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let year = c[1];
let month = c[2];

if(c[0] === user && inRange(year,month,from,to)){

let row = [];
row.push(month+"-"+year);

for(let j=3;j<=35;j++){
let val = +c[j];
row.push(val>0 ? val : "");
if(val>0) colUsed[j-2] = true;
}

filteredRows.push(row);

}
}

/* TABLE */
let tableHTML = "<table><tr>";

headers.forEach((h,i)=>{
if(i==0 || colUsed[i]){
tableHTML += `<th>${h}</th>`;
}
});

tableHTML += "</tr>";

let totalE=0,totalD=0;

filteredRows.forEach(r=>{

tableHTML += "<tr>";

r.forEach((val,i)=>{
if(i==0 || colUsed[i]){
tableHTML += `<td>${val}</td>`;
}
});

tableHTML += "</tr>";

for(let i=1;i<=17;i++) totalE += +r[i] || 0;
for(let i=18;i<r.length;i++) totalD += +r[i] || 0;

});

tableHTML += "</table>";

/* ================= OTHER INCOME ================= */

let incomeFiles = {
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

let incomeBreakdown = {};
let totalOtherIncome = 0;

for(let type in incomeFiles){

let file = incomeFiles[type];
let typeTotal = 0;

try{
let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/" + file);
let text = await res.text();

if(!text.trim()) continue;

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let amount = +c[2] || 0;

if(username === user && inYearRange(year,from,to)){
typeTotal += amount;
}

}

if(typeTotal > 0){
incomeBreakdown[type] = typeTotal;
totalOtherIncome += typeTotal;
}

}catch(e){
console.log("Error loading",file);
}

}

/* ================= SUMMARY ================= */

let summaryHTML = `
<div class="summary main">

<div class="row">
<span>Total Earnings</span>
<span>₹ ${totalE}</span>
</div>

<div class="row">
<span>Total Deduction</span>
<span>₹ ${totalD}</span>
</div>

<div class="row total">
<span>Net Amount</span>
<span>₹ ${totalE - totalD}</span>
</div>

</div>

<div class="summary income">

<div class="row total">
<span>Other Income Total</span>
<span>₹ ${totalOtherIncome}</span>
</div>

</div>
`;

/* ✅ BREAKDOWN TABLE */
summaryHTML += `<div class="summary breakdown">`;

for(let type in incomeBreakdown){
summaryHTML += `
<div style="display:flex;justify-content:space-between;margin:6px 0;">
<span>${type}</span>
<span>₹ ${incomeBreakdown[type]}</span>
</div>
`;
}

summaryHTML += `</div>`;

/* DISPLAY */
document.getElementById("tableData").innerHTML = tableHTML;
document.getElementById("summaryBox").innerHTML = summaryHTML;

/* ✅ HIDE LOADER */
loader.style.display = "none";

}

</script>

</body>
</html>
