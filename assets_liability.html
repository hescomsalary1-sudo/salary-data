<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f7ff;
}

/* HEADER */
.top{
padding:20px;
background:#4b2dd8;
color:white;
text-align:center;
}

/* CONTENT */
.content{
padding:20px;
}

/* INPUTS */
input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
font-size:14px;
}

th{
background:#eee9ff;
color:#4b2dd8;
}

/* SUMMARY */
.summary{
margin-top:20px;
background:#4b2dd8;
color:white;
padding:15px;
border-radius:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
<h2>Assets & Liability</h2>
</div>

<div class="content">

<label>From:</label>
<input type="month" id="fromDate">

<label>To:</label>
<input type="month" id="toDate">

<button onclick="loadData()">Check</button>

<div id="result"></div>

</div>

<script>

let user = localStorage.getItem("currentUser");

/* FILTER FUNCTION */
function inRange(year,month,from,to){
let current = year + "-" + month.padStart(2,"0");
return current >= from && current <= to;
}

async function loadData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await res.text();

let rows = data.trim().split("\n");

let html = `
<table>
<tr>
<th>Month</th>
<th>Earnings</th>
<th>Deduction</th>
<th>Net</th>
</tr>
`;

let totalE = 0;
let totalD = 0;
let totalN = 0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let year = c[1];
let month = c[2];

if(c[0] === user && inRange(year,month,from,to)){

let earnings = 0;
let deduction = 0;

/* earnings cols */
for(let j=3;j<=19;j++){
if(+c[j]>0) earnings += +c[j];
}

/* deduction cols */
for(let j=20;j<=35;j++){
if(+c[j]>0) deduction += +c[j];
}

let net = earnings - deduction;

totalE += earnings;
totalD += deduction;
totalN += net;

html += `
<tr>
<td>${month}-${year}</td>
<td>₹ ${earnings}</td>
<td>₹ ${deduction}</td>
<td>₹ ${net}</td>
</tr>
`;

}

}

html += `</table>`;

html += `
<div class="summary">
Total Earnings: ₹ ${totalE} <br>
Total Deduction: ₹ ${totalD} <br>
Net Amount: ₹ ${totalN}
</div>
`;

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
