<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f7ff;
}

.top{
padding:20px;
background:#4b2dd8;
color:white;
text-align:center;
}

.content{
padding:20px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h4{
color:#4b2dd8;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
padding:6px 0;
font-size:14px;
}

.summary{
margin-top:20px;
background:#4b2dd8;
color:white;
padding:15px;
border-radius:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
<h2>Assets & Liability</h2>
</div>

<div class="content">

<label>From:</label>
<input type="month" id="fromDate">

<label>To:</label>
<input type="month" id="toDate">

<button onclick="loadData()">Check</button>

<div id="result"></div>

</div>

<script>

let user = localStorage.getItem("currentUser");

function inRange(year,month,from,to){
let current = year + "-" + month.padStart(2,"0");
return current >= from && current <= to;
}

/* FIELD NAMES */
let earningNames = [
"Basic","Dearness Pay","HRA","CCA","Personal Pay","Special Pay",
"Conveyance","Washing","SFTA","Locality","MWA","Hill",
"Charge","Pension","LWF Company","Cash Duty","Other Earnings"
];

let deductionNames = [
"LIC","Income Tax","Professional Tax","Society","PLI","Union",
"SC/ST Union","House Rent","Urban Bank","Family Fund",
"Festival Advance","PC 10%","PC 14%","LWF","Recovery","Other Deduction"
];

async function loadData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await res.text();

let rows = data.trim().split("\n");

let html = "";

let totalE = 0;
let totalD = 0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let year = c[1];
let month = c[2];

if(c[0] === user && inRange(year,month,from,to)){

let earningsHTML = "";
let deductionHTML = "";

let earnings = 0;
let deduction = 0;

/* EARNINGS */
for(let j=3;j<=19;j++){
let val = +c[j];
if(val>0){
earnings += val;
earningsHTML += `
<div class="row">
<span>${earningNames[j-3]}</span>
<span>₹ ${val}</span>
</div>`;
}
}

/* DEDUCTIONS */
for(let j=20;j<=35;j++){
let val = +c[j];
if(val>0){
deduction += val;
deductionHTML += `
<div class="row">
<span>${deductionNames[j-20]}</span>
<span>₹ ${val}</span>
</div>`;
}
}

let net = earnings - deduction;

totalE += earnings;
totalD += deduction;

html += `

<div class="card">

<h4>${month}-${year}</h4>

<b>Earnings</b>
${earningsHTML}

<b>Deductions</b>
${deductionHTML}

<div class="row" style="font-weight:bold;">
<span>Net</span>
<span>₹ ${net}</span>
</div>

</div>

`;

}

}

html += `
<div class="summary">
Total Earnings: ₹ ${totalE} <br>
Total Deduction: ₹ ${totalD} <br>
Net Amount: ₹ ${totalE - totalD}
</div>
`;

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
