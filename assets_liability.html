<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --primary: #4b2dd8;
    --primary-light: #6c39ff;
    --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #2d3436;
    --text-muted: #636e72;
    --border-color: #e0e0e0;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: var(--bg-gradient);
    color: var(--text-main);
    overflow-x: hidden;
    padding-top: 70px; /* Space for the fixed header */
  }

  /* FIXED HEADER SECTION */
  .top {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px); /* Modern blur effect */
    padding: 15px 0;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    z-index: 1000;
  }

  .top h2 {
    margin: 0;
    font-size: 20px;
    background: linear-gradient(to right, #4b2dd8, #9b6dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .top p {
    margin: 2px 0 0;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .content {
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* FILTER CARD */
  .filter-card {
    background: white;
    padding: 18px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 25px;
    border: 1px solid rgba(0,0,0,0.05);
  }

  .filter-title {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
  }

  .date-row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .input-box {
    flex: 1;
    background: #f8f9ff;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 6px 12px;
  }

  .input-box label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .input-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    outline: none;
    color: #333;
  }

  /* BUTTON */
  .check-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6c39ff, #4b2dd8);
    color: white;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(75, 45, 216, 0.2);
    transition: 0.2s;
  }

  .check-btn:active { transform: scale(0.98); }

  /* DATA TABLE - SMALLER FONT */
  .table-container {
    width: 100%;
    overflow-x: auto;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    background: white;
    border: 1px solid var(--border-color);
  }

  table {
    width: 100%;
    min-width: 1100px; 
    border-collapse: collapse;
    font-size: 11px; /* Even smaller font as requested */
  }

  th, td {
    padding: 8px 6px; /* Tightened padding */
    text-align: center;
    border: 1px solid #eeeeee; 
  }

  th {
    background: #f4f6ff;
    color: var(--primary);
    font-weight: 700;
    white-space: nowrap;
  }

  td { color: #444; }

  tr:nth-child(even) { background: #fafbff; }

  /* SUMMARY BOXES */
  #summaryBox { margin-top: 20px; }

  .summary {
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    font-weight: 600;
    font-size: 13px;
  }

  .summary.main { background: linear-gradient(135deg,#6c39ff,#4b2dd8); color: white; }
  .summary.income { background: linear-gradient(135deg,#1e88e5,#1565c0); color: white; }
  .summary.breakdown { background: #ffffff; color: #333; border: 1px solid #eee; }

  .row { display: flex; justify-content: space-between; margin: 5px 0; }
  .total { border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px; margin-top: 8px; font-size: 15px; }

  /* SCROLLBAR */
  .table-container::-webkit-scrollbar { height: 6px; }
  .table-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

  /* LOADER */
  #loader { position: fixed; inset: 0; background: white; display: none; justify-content: center; align-items: center; z-index: 9999; }
  .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>
<div id="loader"><div class="spinner"></div></div>

<div class="top">
    <h2>Assets & Liability</h2>
    <p>Financial Data Summary</p>
</div>

<div class="content">
  <div class="filter-card">
    <div class="filter-title">Select Custom Period</div>
    <div class="date-row">
      <div class="input-box">
        <label>FROM</label>
        <input type="month" id="fromDate">
      </div>
      <div class="input-box">
        <label>TO</label>
        <input type="month" id="toDate">
      </div>
    </div>
    <button class="check-btn" onclick="loadData()">Generate Report</button>
  </div>

  <div class="table-container">
    <div id="tableData"></div>
  </div>

  <div id="summaryBox"></div>
</div>

<script>
// Logic remains identical to your original to preserve data integrity
let user = localStorage.getItem("currentUser");
let headers = ["Month","Basic","Dearness","HRA","CCA","Personal","Special Pay","Conveyance","Washing","SFTA","Locality","MWA","Hill","Charge","Pension","LWF Company","Cash Duty","Other Earn","LIC","Income Tax","PT","Society","PLI","Union","SC/ST","House Rent","Urban Bank","Family Fund","Festival","PC10","PC14","LWF","Recovery","Other Ded"];

function inRange(year,month,from,to){
  let current = year + "-" + month.padStart(2,"0");
  return current >= from && current <= to;
}

function inYearRange(year,from,to){
  let fromYear = from.split("-")[0];
  let toYear = to.split("-")[0];
  return year >= fromYear && year <= toYear;
}

async function loadData(){
  let from = document.getElementById("fromDate").value;
  let to = document.getElementById("toDate").value;
  if(!from || !to){ alert("Select date range"); return; }
  document.getElementById("loader").style.display = "flex";

  try {
    let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
    let data = await res.text();
    let rows = data.trim().split("\n");

    let filteredRows = [];
    let colUsed = new Array(headers.length).fill(false);

    for(let i=1;i<rows.length;i++){
      let c = rows[i].split(",");
      let year = c[1];
      let month = c[2];
      if(c[0] === user && inRange(year,month,from,to)){
        let row = [];
        row.push(month+"-"+year);
        for(let j=3;j<=35;j++){
          let val = +c[j];
          row.push(val>0 ? val : "");
          if(val>0) colUsed[j-2] = true;
        }
        filteredRows.push(row);
      }
    }

    let tableHTML = "<table><tr>";
    headers.forEach((h,i)=>{ if(i==0 || colUsed[i]) tableHTML += `<th>${h}</th>`; });
    tableHTML += "</tr>";

    let totalE=0, totalD=0;
    filteredRows.forEach(r=>{
      tableHTML += "<tr>";
      r.forEach((val,i)=>{ if(i==0 || colUsed[i]) tableHTML += `<td>${val}</td>`; });
      tableHTML += "</tr>";
      for(let i=1;i<=17;i++) totalE += +r[i] || 0;
      for(let i=18;i<r.length;i++) totalD += +r[i] || 0;
    });
    tableHTML += "</table>";

    let incomeFiles = {"Supplementary Salary":"supplementary.csv","DA Arrears":"da_arrears.csv","Double Wages":"double_wages.csv","Medical Bills":"medical_bills.csv","TA Bills":"ta_bills.csv","ELS Bills":"els_bills.csv","Others":"others.csv"};
    let incomeBreakdown = {};
    let totalOtherIncome = 0;

    for(let type in incomeFiles){
      try {
        let resInc = await fetch("https://hescomsalary1-sudo.github.io/salary-data/" + incomeFiles[type]);
        let text = await resInc.text();
        if(!text.trim()) continue;
        let incRows = text.trim().split("\n");
        let typeTotal = 0;
        for(let i=1;i<incRows.length;i++){
          let c = incRows[i].split(",");
          if(c[0] === user && inYearRange(c[1], from, to)) typeTotal += (+c[2] || 0);
        }
        if(typeTotal > 0){ incomeBreakdown[type] = typeTotal; totalOtherIncome += typeTotal; }
      } catch(e) {}
    }

    let summaryHTML = `
      <div class="summary main">
        <div class="row"><span>Total Earnings</span><span>₹ ${totalE}</span></div>
        <div class="row"><span>Total Deduction</span><span>₹ ${totalD}</span></div>
        <div class="row total"><span>Net Amount</span><span>₹ ${totalE - totalD}</span></div>
      </div>
      
      <div class="summary breakdown">`;
    for(let type in incomeBreakdown){ summaryHTML += `<div class="row"><span>${type}</span><span>₹ ${incomeBreakdown[type]}</span></div>`; }
    summaryHTML += `</div>`;

    document.getElementById("tableData").innerHTML = tableHTML;
    document.getElementById("summaryBox").innerHTML = summaryHTML;
  } catch (error) { console.error(error); }
  document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
