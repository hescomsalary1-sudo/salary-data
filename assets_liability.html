<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(135deg,#eef2ff,#f8fbff);
overflow-x:hidden;
}

/* HEADER */
.top{
padding:0;
background:linear-gradient(135deg,#6c39ff,#4b2dd8);
border-radius:0 0 30px 30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.top-content{
padding:25px 15px 35px;
text-align:center;
color:white;
}

.top h2{
margin:0;
font-size:22px;
font-weight:700;
letter-spacing:0.5px;
}

.top p{
margin-top:6px;
font-size:13px;
opacity:0.85;
}

/* CONTENT */
.content{
padding:18px;
}

/* INPUT */
input{
padding:12px;
margin:6px;
border-radius:12px;
border:1px solid #ddd;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
font-size:14px;
}

/* BUTTON */
button{
padding:12px 18px;
background:linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 15px rgba(75,45,216,0.3);
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* TABLE SCROLL */
.table-container{
width:100%;
overflow-x:auto;
margin-top:15px;
border-radius:15px;
}

/* TABLE */
table{
min-width:1000px;
border-collapse:collapse;
background:white;
font-size:13px;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ADD THIS */
th,td{
padding:10px;
text-align:center;
border:1px solid #e6e6e6;  /* ✅ THIS FIXES LINES */
}

th{
background:#f0edff;
color:#4b2dd8;
position:sticky;
top:0;
font-weight:600;
}

td{
border-top:1px solid #eee;
}
  tr:nth-child(even){
background:#fafbff;
}

/* SUMMARY BOX */
#summaryBox{
margin-top:15px;
}

/* MODERN CARD */
.summary{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
border-radius:18px;
padding:18px;
margin-bottom:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
font-weight:600;
color:#333;
}

/* COLOR VARIANTS */
.summary.main{
background:linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
}

.summary.income{
background:linear-gradient(135deg,#1e88e5,#1565c0);
color:white;
}

.summary.breakdown{
background:linear-gradient(135deg,#009688,#00796b);
color:white;
}

/* SCROLLBAR */
.table-container::-webkit-scrollbar{
height:6px;
}
.table-container::-webkit-scrollbar-thumb{
background:#bbb;
border-radius:10px;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:45px;
height:45px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

  /* ROW ALIGNMENT (FIX) */
.row{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
font-size:14px;
}

.row span:first-child{
opacity:0.9;
}

.row span:last-child{
font-weight:700;
}

/* NET / TOTAL HIGHLIGHT */
.total{
border-top:1px solid rgba(255,255,255,0.3);
padding-top:10px;
margin-top:10px;
font-size:16px;
}

  /* FILTER CARD */
/* FILTER CARD */
.filter-card{
background:#ffffff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-top:-25px;
position:relative;
z-index:5;
}

/* HEADING */
.filter-title{
text-align:center;
font-size:15px;
font-weight:600;
color:#4b2dd8;
margin-bottom:15px;
}

/* ROW */
.date-row{
display:flex;
gap:12px;
}

/* INPUT BOX STYLE */
.input-box{
flex:1;
background:#f9f9ff;
border:1px solid #ddd;
border-radius:12px;
padding:10px;
box-shadow:inset 0 2px 4px rgba(0,0,0,0.03);
}

/* LABEL */
.input-box label{
display:block;
font-size:12px;
color:#666;
margin-bottom:4px;
}

/* INPUT */
.input-box input{
width:100%;
border:none;
background:transparent;
font-size:14px;
outline:none;
}

/* FOCUS EFFECT */
.input-box:focus-within{
border-color:#6c39ff;
box-shadow:0 0 0 2px rgba(108,57,255,0.1);
}

/* BUTTON */
.check-btn{
width:100%;
margin-top:15px;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 15px rgba(75,45,216,0.3);
transition:0.2s;
}

.check-btn:hover{
transform:translateY(-2px);
}

.check-btn:active{
transform:scale(0.97);
}
</style>
</head>

<body>
<div id="loader">
  <div class="spinner"></div>
</div>
<div class="top">
  <div class="top-content">
    <h2>Assets & Liability</h2>
    <p>View your financial summary</p>
  </div>
</div>

<div class="content">

<div class="filter-card">

  <div class="filter-title">Please Select Custom Period</div>

  <div class="date-row">
    <div class="input-box">
      <label>From</label>
      <input type="month" id="fromDate">
    </div>

    <div class="input-box">
      <label>To</label>
      <input type="month" id="toDate">
    </div>
  </div>

  <button class="check-btn" onclick="loadData()">Check Report</button>

</div>

<!-- ✅ ONLY TABLE SCROLL -->
<div class="table-container">
<div id="tableData"></div>
</div>

<!-- ✅ FIXED SUMMARY -->
<div id="summaryBox"></div>

</div>

<script>

let user = localStorage.getItem("currentUser");

/* HEADERS */
let headers = [
"Month","Basic","Dearness","HRA","CCA","Personal","Special Pay",
"Conveyance","Washing","SFTA","Locality","MWA","Hill","Charge",
"Pension","LWF Company","Cash Duty","Other Earn",
"LIC","Income Tax","PT","Society","PLI","Union","SC/ST",
"House Rent","Urban Bank","Family Fund","Festival","PC10","PC14","LWF",
"Recovery","Other Ded"
];

function inRange(year,month,from,to){
let current = year + "-" + month.padStart(2,"0");
return current >= from && current <= to;
}

/* ✅ NEW: CHECK YEAR RANGE FOR OTHER INCOME */
function inYearRange(year,from,to){
let fromYear = from.split("-")[0];
let toYear = to.split("-")[0];
return year >= fromYear && year <= toYear;
}

async function loadData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

/* ✅ SHOW LOADER */
loader.style.display = "flex";

/* ================= SALARY ================= */

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await res.text();

let rows = data.trim().split("\n");

let filteredRows = [];
let colUsed = new Array(headers.length).fill(false);

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let year = c[1];
let month = c[2];

if(c[0] === user && inRange(year,month,from,to)){

let row = [];
row.push(month+"-"+year);

for(let j=3;j<=35;j++){
let val = +c[j];
row.push(val>0 ? val : "");
if(val>0) colUsed[j-2] = true;
}

filteredRows.push(row);

}
}

/* TABLE */
let tableHTML = "<table><tr>";

headers.forEach((h,i)=>{
if(i==0 || colUsed[i]){
tableHTML += `<th>${h}</th>`;
}
});

tableHTML += "</tr>";

let totalE=0,totalD=0;

filteredRows.forEach(r=>{

tableHTML += "<tr>";

r.forEach((val,i)=>{
if(i==0 || colUsed[i]){
tableHTML += `<td>${val}</td>`;
}
});

tableHTML += "</tr>";

for(let i=1;i<=17;i++) totalE += +r[i] || 0;
for(let i=18;i<r.length;i++) totalD += +r[i] || 0;

});

tableHTML += "</table>";

/* ================= OTHER INCOME ================= */

let incomeFiles = {
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

let incomeBreakdown = {};
let totalOtherIncome = 0;

for(let type in incomeFiles){

let file = incomeFiles[type];
let typeTotal = 0;

try{
let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/" + file);
let text = await res.text();

if(!text.trim()) continue;

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let amount = +c[2] || 0;

if(username === user && inYearRange(year,from,to)){
typeTotal += amount;
}

}

if(typeTotal > 0){
incomeBreakdown[type] = typeTotal;
totalOtherIncome += typeTotal;
}

}catch(e){
console.log("Error loading",file);
}

}

/* ================= SUMMARY ================= */

let summaryHTML = `
<div class="summary main">

<div class="row">
<span>Total Earnings</span>
<span>₹ ${totalE}</span>
</div>

<div class="row">
<span>Total Deduction</span>
<span>₹ ${totalD}</span>
</div>

<div class="row total">
<span>Net Amount</span>
<span>₹ ${totalE - totalD}</span>
</div>

</div>

<div class="summary income">

<div class="row total">
<span>Other Income Total</span>
<span>₹ ${totalOtherIncome}</span>
</div>

</div>
`;

/* ✅ BREAKDOWN TABLE */
summaryHTML += `<div class="summary breakdown">`;

for(let type in incomeBreakdown){
summaryHTML += `
<div style="display:flex;justify-content:space-between;margin:6px 0;">
<span>${type}</span>
<span>₹ ${incomeBreakdown[type]}</span>
</div>
`;
}

summaryHTML += `</div>`;

/* DISPLAY */
document.getElementById("tableData").innerHTML = tableHTML;
document.getElementById("summaryBox").innerHTML = summaryHTML;

/* ✅ HIDE LOADER */
loader.style.display = "none";

}

</script>

</body>
</html>
