<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f7ff;
overflow-x:hidden;
}

/* HEADER */
.top{
padding:20px;
background:#4b2dd8;
color:white;
text-align:center;
}

/* CONTENT */
.content{
padding:20px;
}

/* INPUT */
input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* TABLE SCROLL ONLY */
.table-container{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
margin-top:15px;
}

table{
min-width:1000px;
border-collapse:collapse;
background:white;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#eee9ff;
color:#4b2dd8;
position:sticky;
top:0;
}

/* SUMMARY FIXED */
#summaryBox{
margin-top:15px;
}

/* CARD STYLE */
.summary{
background:#4b2dd8;
color:white;
padding:15px;
border-radius:12px;
font-weight:bold;
}

/* SCROLLBAR */
.table-container::-webkit-scrollbar{
height:6px;
}
.table-container::-webkit-scrollbar-thumb{
background:#bbb;
border-radius:10px;
}
/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>
<div id="loader">
  <div class="spinner"></div>
</div>
<div class="top">
<h2>Assets & Liability</h2>
</div>

<div class="content">

<label>From:</label>
<input type="month" id="fromDate">

<label>To:</label>
<input type="month" id="toDate">

<button onclick="loadData()">Check</button>

<!-- ✅ ONLY TABLE SCROLL -->
<div class="table-container">
<div id="tableData"></div>
</div>

<!-- ✅ FIXED SUMMARY -->
<div id="summaryBox"></div>

</div>

<script>

let user = localStorage.getItem("currentUser");

/* HEADERS */
let headers = [
"Month","Basic","Dearness","HRA","CCA","Personal","Special Pay",
"Conveyance","Washing","SFTA","Locality","MWA","Hill","Charge",
"Pension","LWF Company","Cash Duty","Other Earn",
"LIC","Income Tax","PT","Society","PLI","Union","SC/ST",
"House Rent","Urban Bank","Family Fund","Festival","PC10","PC14","LWF",
"Recovery","Other Ded"
];

function inRange(year,month,from,to){
let current = year + "-" + month.padStart(2,"0");
return current >= from && current <= to;
}

/* ✅ NEW: CHECK YEAR RANGE FOR OTHER INCOME */
function inYearRange(year,from,to){
let fromYear = from.split("-")[0];
let toYear = to.split("-")[0];
return year >= fromYear && year <= toYear;
}

async function loadData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

/* ✅ SHOW LOADER */
loader.style.display = "flex";

/* ================= SALARY ================= */

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await res.text();

let rows = data.trim().split("\n");

let filteredRows = [];
let colUsed = new Array(headers.length).fill(false);

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let year = c[1];
let month = c[2];

if(c[0] === user && inRange(year,month,from,to)){

let row = [];
row.push(month+"-"+year);

for(let j=3;j<=35;j++){
let val = +c[j];
row.push(val>0 ? val : "");
if(val>0) colUsed[j-2] = true;
}

filteredRows.push(row);

}
}

/* TABLE */
let tableHTML = "<table><tr>";

headers.forEach((h,i)=>{
if(i==0 || colUsed[i]){
tableHTML += `<th>${h}</th>`;
}
});

tableHTML += "</tr>";

let totalE=0,totalD=0;

filteredRows.forEach(r=>{

tableHTML += "<tr>";

r.forEach((val,i)=>{
if(i==0 || colUsed[i]){
tableHTML += `<td>${val}</td>`;
}
});

tableHTML += "</tr>";

for(let i=1;i<=17;i++) totalE += +r[i] || 0;
for(let i=18;i<r.length;i++) totalD += +r[i] || 0;

});

tableHTML += "</table>";

/* ================= OTHER INCOME ================= */

let incomeFiles = {
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

let incomeBreakdown = {};
let totalOtherIncome = 0;

for(let type in incomeFiles){

let file = incomeFiles[type];
let typeTotal = 0;

try{
let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/" + file);
let text = await res.text();

if(!text.trim()) continue;

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let amount = +c[2] || 0;

if(username === user && inYearRange(year,from,to)){
typeTotal += amount;
}

}

if(typeTotal > 0){
incomeBreakdown[type] = typeTotal;
totalOtherIncome += typeTotal;
}

}catch(e){
console.log("Error loading",file);
}

}

/* ================= SUMMARY ================= */

let summaryHTML = `
<div class="summary">
Total Earnings: ₹ ${totalE} <br>
Total Deduction: ₹ ${totalD} <br>
Net Amount: ₹ ${totalE - totalD}
</div>

<br>

<div class="summary" style="background:#1e88e5;">
<b>Other Income Total:</b> ₹ ${totalOtherIncome}
</div>
`;

/* ✅ BREAKDOWN TABLE */
if(Object.keys(incomeBreakdown).length > 0){

summaryHTML += `<br><div class="summary" style="background:#009688;">`;

for(let type in incomeBreakdown){
summaryHTML += `${type}: ₹ ${incomeBreakdown[type]} <br>`;
}

summaryHTML += `</div>`;
}

/* DISPLAY */
document.getElementById("tableData").innerHTML = tableHTML;
document.getElementById("summaryBox").innerHTML = summaryHTML;

/* ✅ HIDE LOADER */
loader.style.display = "none";

}

</script>

</body>
</html>
