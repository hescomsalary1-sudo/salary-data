<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --primary: #4b2dd8;
    --primary-light: #6c39ff;
    --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #2d3436;
    --text-muted: #636e72;
    --border-color: #e0e0e0;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: var(--bg-gradient);
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* HEADER */
  .top {
    background: #ffffff;
    padding: 30px 15px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
  }

  .top h2 {
    margin: 0;
    font-size: 24px;
    background: linear-gradient(to right, #4b2dd8, #9b6dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .top p {
    margin: 5px 0 0;
    font-size: 13px;
    color: var(--text-muted);
  }

  .content {
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* FILTER CARD */
  .filter-card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-top: -35px;
    position: relative;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.8);
  }

  .filter-title {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 15px;
    text-transform: uppercase;
  }

  .date-row {
    display: flex;
    gap: 12px;
    margin-bottom: 15px;
  }

  .input-box {
    flex: 1;
    background: #f8f9ff;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 8px 12px;
  }

  .input-box label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .input-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    color: #333;
  }

  /* BUTTON */
  .check-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c39ff, #4b2dd8);
    color: white;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(75, 45, 216, 0.3);
    transition: 0.3s;
  }

  .check-btn:hover { transform: translateY(-2px); }

  /* DATA TABLE - SCROLLING RE-ENABLED */
  .table-container {
    width: 100%;
    overflow-x: auto;
    margin-top: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    background: white;
    border: 1px solid var(--border-color);
  }

  table {
    width: 100%;
    min-width: 1200px; /* Forces scroll for many columns */
    border-collapse: collapse;
    font-size: 13px;
  }

  th, td {
    padding: 12px 10px;
    text-align: center;
    border: 1px solid #e6e6e6; /* Restored table lines */
  }

  th {
    background: #f0edff;
    color: var(--primary);
    font-weight: 700;
    position: sticky;
    top: 0;
  }

  tr:nth-child(even) { background: #fafbff; }

  /* SUMMARY SECTION */
  #summaryBox { margin-top: 20px; }

  .summary {
    padding: 18px;
    border-radius: 18px;
    margin-bottom: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    font-weight: 600;
  }

  .summary.main { background: linear-gradient(135deg,#6c39ff,#4b2dd8); color: white; }
  .summary.income { background: linear-gradient(135deg,#1e88e5,#1565c0); color: white; }
  .summary.breakdown { background: linear-gradient(135deg,#009688,#00796b); color: white; }

  .row { display: flex; justify-content: space-between; margin: 8px 0; }
  .total { border-top: 1px solid rgba(255,255,255,0.3); padding-top: 10px; margin-top: 10px; font-size: 16px; }

  /* SCROLLBAR */
  .table-container::-webkit-scrollbar { height: 8px; }
  .table-container::-webkit-scrollbar-thumb { background: #bbb; border-radius: 10px; }

  /* LOADER */
  #loader { position: fixed; inset: 0; background: white; display: none; justify-content: center; align-items: center; z-index: 9999; }
  .spinner { width: 45px; height: 45px; border: 5px solid #ddd; border-top: 5px solid #4b2dd8; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>
<div id="loader"><div class="spinner"></div></div>

<div class="top">
  <div class="top-content">
    <h2>Assets & Liability</h2>
    <p>Financial Dashboard & Reporting</p>
  </div>
</div>

<div class="content">
  <div class="filter-card">
    <div class="filter-title">Select Custom Period</div>
    <div class="date-row">
      <div class="input-box">
        <label>From</label>
        <input type="month" id="fromDate">
      </div>
      <div class="input-box">
        <label>To</label>
        <input type="month" id="toDate">
      </div>
    </div>
    <button class="check-btn" onclick="loadData()">Check Report</button>
  </div>

  <div class="table-container">
    <div id="tableData"></div>
  </div>

  <div id="summaryBox"></div>
</div>

<script>
let user = localStorage.getItem("currentUser");

let headers = [
  "Month","Basic","Dearness","HRA","CCA","Personal","Special Pay",
  "Conveyance","Washing","SFTA","Locality","MWA","Hill","Charge",
  "Pension","LWF Company","Cash Duty","Other Earn",
  "LIC","Income Tax","PT","Society","PLI","Union","SC/ST",
  "House Rent","Urban Bank","Family Fund","Festival","PC10","PC14","LWF",
  "Recovery","Other Ded"
];

function inRange(year,month,from,to){
  let current = year + "-" + month.padStart(2,"0");
  return current >= from && current <= to;
}

function inYearRange(year,from,to){
  let fromYear = from.split("-")[0];
  let toYear = to.split("-")[0];
  return year >= fromYear && year <= toYear;
}

async function loadData(){
  let from = document.getElementById("fromDate").value;
  let to = document.getElementById("toDate").value;

  if(!from || !to){
    alert("Select date range");
    return;
  }

  document.getElementById("loader").style.display = "flex";

  try {
    // 1. SALARY DATA
    let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
    let data = await res.text();
    let rows = data.trim().split("\n");

    let filteredRows = [];
    let colUsed = new Array(headers.length).fill(false);

    for(let i=1;i<rows.length;i++){
      let c = rows[i].split(",");
      let year = c[1];
      let month = c[2];
      if(c[0] === user && inRange(year,month,from,to)){
        let row = [];
        row.push(month+"-"+year);
        for(let j=3;j<=35;j++){
          let val = +c[j];
          row.push(val>0 ? val : "");
          if(val>0) colUsed[j-2] = true;
        }
        filteredRows.push(row);
      }
    }

    let tableHTML = "<table><tr>";
    headers.forEach((h,i)=>{ if(i==0 || colUsed[i]) tableHTML += `<th>${h}</th>`; });
    tableHTML += "</tr>";

    let totalE=0, totalD=0;
    filteredRows.forEach(r=>{
      tableHTML += "<tr>";
      r.forEach((val,i)=>{ if(i==0 || colUsed[i]) tableHTML += `<td>${val}</td>`; });
      tableHTML += "</tr>";
      for(let i=1;i<=17;i++) totalE += +r[i] || 0;
      for(let i=18;i<r.length;i++) totalD += +r[i] || 0;
    });
    tableHTML += "</table>";

    // 2. OTHER INCOME DATA
    let incomeFiles = {
      "Supplementary Salary":"supplementary.csv",
      "DA Arrears":"da_arrears.csv",
      "Double Wages":"double_wages.csv",
      "Medical Bills":"medical_bills.csv",
      "TA Bills":"ta_bills.csv",
      "ELS Bills":"els_bills.csv",
      "Others":"others.csv"
    };

    let incomeBreakdown = {};
    let totalOtherIncome = 0;

    for(let type in incomeFiles){
      try {
        let resInc = await fetch("https://hescomsalary1-sudo.github.io/salary-data/" + incomeFiles[type]);
        let text = await resInc.text();
        if(!text.trim()) continue;
        let incRows = text.trim().split("\n");
        let typeTotal = 0;
        for(let i=1;i<incRows.length;i++){
          let c = incRows[i].split(",");
          if(c[0] === user && inYearRange(c[1], from, to)){
            typeTotal += (+c[2] || 0);
          }
        }
        if(typeTotal > 0){
          incomeBreakdown[type] = typeTotal;
          totalOtherIncome += typeTotal;
        }
      } catch(e) { console.log("Missing file:", type); }
    }

    // 3. GENERATE SUMMARY HTML
    let summaryHTML = `
      <div class="summary main">
        <div class="row"><span>Total Earnings</span><span>₹ ${totalE}</span></div>
        <div class="row"><span>Total Deduction</span><span>₹ ${totalD}</span></div>
        <div class="row total"><span>Net Amount</span><span>₹ ${totalE - totalD}</span></div>
      </div>
      <div class="summary income">
        <div class="row total"><span>Other Income Total</span><span>₹ ${totalOtherIncome}</span></div>
      </div>
      <div class="summary breakdown">`;
    
    for(let type in incomeBreakdown){
      summaryHTML += `<div class="row"><span>${type}</span><span>₹ ${incomeBreakdown[type]}</span></div>`;
    }
    summaryHTML += `</div>`;

    document.getElementById("tableData").innerHTML = tableHTML;
    document.getElementById("summaryBox").innerHTML = summaryHTML;

  } catch (error) {
    alert("Error loading data");
    console.error(error);
  }

  document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
