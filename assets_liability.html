<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f5f7ff;
}

.top{
padding:20px;
background:#4b2dd8;
color:white;
text-align:center;
}

.content{
padding:20px;
}

/* INPUT */
input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#eee9ff;
color:#4b2dd8;
position:sticky;
top:0;
}

/* SUMMARY */
.summary{
margin-top:20px;
background:#4b2dd8;
color:white;
padding:15px;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
<h2>Assets & Liability</h2>
</div>

<div class="content">

<label>From:</label>
<input type="month" id="fromDate">

<label>To:</label>
<input type="month" id="toDate">

<button onclick="loadData()">Check</button>

<div id="result"></div>

</div>

<script>

let user = localStorage.getItem("currentUser");

/* COLUMN NAMES SAME AS CSV */
let headers = [
"Month","Basic","Dearness","HRA","CCA","Personal","Special Pay",
"Conveyance","Washing","SFTA","Locality","MWA","Hill","Charge",
"Pension","LWF Company","Cash Duty","Other Earn",
"LIC","Income Tax","PT","Society","PLI","Union","SC/ST",
"House Rent","Urban Bank","Family Fund","Festival","PC10","PC14","LWF",
"Recovery","Other Ded"
];

function inRange(year,month,from,to){
let current = year + "-" + month.padStart(2,"0");
return current >= from && current <= to;
}

async function loadData(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

if(!from || !to){
alert("Select date range");
return;
}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await res.text();

let rows = data.trim().split("\n");

/* store rows */
let filteredRows = [];
let colUsed = new Array(headers.length).fill(false);

/* process */
for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let year = c[1];
let month = c[2];

if(c[0] === user && inRange(year,month,from,to)){

let row = [];
row.push(month+"-"+year);

/* earnings + deduction */
for(let j=3;j<=35;j++){
let val = +c[j];
row.push(val>0 ? val : "");
if(val>0) colUsed[j-2] = true;
}

filteredRows.push(row);

}
}

/* BUILD TABLE */
let html = "<table><tr>";

headers.forEach((h,i)=>{
if(i==0 || colUsed[i]){
html += `<th>${h}</th>`;
}
});

html += "</tr>";

let totalE=0,totalD=0;

/* rows */
filteredRows.forEach(r=>{

html += "<tr>";

r.forEach((val,i)=>{
if(i==0 || colUsed[i]){
html += `<td>${val}</td>`;
}
});

html += "</tr>";

/* totals */
for(let i=1;i<=17;i++) totalE += +r[i] || 0;
for(let i=18;i<r.length;i++) totalD += +r[i] || 0;

});

html += "</table>";

html += `
<div class="summary">
Total Earnings: ₹ ${totalE} <br>
Total Deduction: ₹ ${totalD} <br>
Net Amount: ₹ ${totalE - totalD}
</div>
`;

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
