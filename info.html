<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Secure AI - HESCOM</title>
<style>
body {
    font-family: -apple-system, Segoe UI, sans-serif;
    background: #f4f7f6;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* HEADER */
#header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 55px;
    background: #2400b7;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    z-index: 1000;
}

/* CHAT */
#chat-container {
    flex: 1;
    padding: 20px;
    margin-top: 55px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding-bottom: 80px;
}

.message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 15px;
    font-size: 15px;
    line-height: 1.4;
}

.user { align-self: flex-end; background: #2400b7; color: white; }
.ai { align-self: flex-start; background: white; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

/* INPUT */
#input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px;
    display: flex;
    box-sizing: border-box;
    border-top: 1px solid #ddd;
}

input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
button { background: #2400b7; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 25px; font-weight: bold; }
</style>
</head>

<body>

<div id="header">💬 HESCOM Secure AI</div>

<div id="chat-container"></div>

<form id="input-area" onsubmit="sendMessage(event)">
    <input id="msgInput" placeholder="Ask anything..." autocomplete="off">
    <button>Send</button>
</form>

<script>
const container = document.getElementById("chat-container");
const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";
const nominationAPI = "https://script.google.com/macros/s/AKfycbzYMFFE-KfL5JamBrzIUC6oOCqP5eynVS3ksV2kkF-dY6g4J1Y08qdAQKErGg64qNS1BQ/exec";

let state = { module: null, step: null, data: {} };

/* UI - SCROLLING PICKED FROM REFERENCE */
function addMessage(t, type) {
    let d = document.createElement("div");
    d.className = "message " + type;
    d.innerHTML = t;
    container.appendChild(d);
    window.scrollTo(0, document.body.scrollHeight);
}

/* SEND LOGIC */
async function sendMessage(e) {
    e.preventDefault();
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let reply = await AI_ENGINE(text.toLowerCase());

    setTimeout(() => {
        addMessage(reply, "ai");
    }, 350);
}

/* ================= AI ENGINE ================= */
async function AI_ENGINE(q) {
    const user = localStorage.getItem("currentUser");

    // 1. DATA MODULE ROUTER
    if (!state.module) {
        if (q.includes("salary") || q.includes("pay") || q.includes("earn")) state.module = "salary";
        else if (q.includes("attendance") || q.includes("present") || q.includes("absent")) state.module = "attendance";
        else if (q.includes("leave") || q.includes("balance")) state.module = "leave";
        else if (q.includes("nominee") || q.includes("family")) state.module = "nominee";
        else if (q.includes("profile") || q.includes("designation")) state.module = "profile";
    }

    if (state.module === "salary") return await SALARY_MODULE(q, user);
    if (state.module === "attendance") return await ATTENDANCE_MODULE(q, user);
    if (state.module === "leave") return await LEAVE_MODULE(q, user);
    if (state.module === "nominee") return await NOMINEE_MODULE(q, user);
    if (state.module === "profile") return await PROFILE_MODULE(q, user);

    // 2. COMMON CONVERSATION ENGINE (100+ Responses)
    return COMMON_CHAT(q);
}

/* ================= DATA MODULES ================= */
// [Salary, Attendance, Leave, Nominee, Profile modules as previously optimized...]
async function LEAVE_MODULE(q, user) {
    state.module = null;
    let res = await fetch(baseURL + "leaves.csv");
    let rows = (await res.text()).split("\n");
    for (let r of rows) {
        let c = r.split(",");
        if (c[0].trim() === user) return `📅 **Leave Credits:**<br>EL: ${c[3]} | FPL: ${c[4]} | CL: ${c[5]}`;
    }
    return "Leave data not found.";
}

async function PROFILE_MODULE(q, user) {
    state.module = null;
    let res = await fetch(baseURL + "employee.csv");
    let rows = (await res.text()).split("\n");
    for (let r of rows) {
        let c = r.split(",");
        if (c[0].trim() === user) return `👤 **Profile:**<br>Designation: ${c[2]}<br>Joining: ${c[18]}<br>Retirement: ${c[6]}`;
    }
    return "Profile not found.";
}

/* ================= UPDATED SALARY MODULE ================= */
async function SALARY_MODULE(q, user) {
    // Save the original question to check for specific keywords (like "income tax") later
    if (!state.data.originalQuery) {
        state.data.originalQuery = q;
    }

    // Step 1: Ask for Year
    if (!state.step) {
        state.step = "year";
        return "Which year's salary would you like to check? (e.g., 2026)";
    }

    // Step 2: Ask for Month
    if (state.step === "year") {
        state.data.year = q.trim();
        state.step = "month";
        return "Got it. Now enter the month number (1-12) or name (e.g., Jan):";
    }

    // Step 3: Fetch and Calculate
    if (state.step === "month") {
        let monthMap = {"jan": "01", "feb": "02", "mar": "03", "apr": "04", "may": "05", "jun": "06", "jul": "07", "aug": "08", "sep": "09", "oct": "10", "nov": "11", "dec": "12"};
        let monthNum = monthMap[q.substring(0,3).toLowerCase()] || q.padStart(2, "0");
        
        const year = state.data.year;
        const originalQuery = state.data.originalQuery;

        // NEW FEATURE: Check for specific column requests (Income Tax, LIC, etc.)
        let specificInfo = await getSpecificSalaryDetail(originalQuery, user, monthNum, year);
        
        if (specificInfo) {
            state.module = null; 
            state.step = null;
            state.data = {}; // Clear memory
            return specificInfo;
        }

        // DEFAULT: If no specific item was asked, show the summary card
        try {
            let res = await fetch(baseURL + "salary .csv");
            let csvText = await res.text();
            let rows = csvText.trim().split("\n");
            
            state.module = null; 
            state.step = null;
            state.data = {};

            for (let i = 1; i < rows.length; i++) {
                let c = rows[i].split(",");
                if (c[0] === user && c[1] === year && c[2] === monthNum) {
                    
                    let earnings = 0;
                    for(let j=3; j<=19; j++) earnings += (+c[j] || 0);
                    
                    let deductions = 0;
                    for(let j=20; j<=35; j++) deductions += (+c[j] || 0);
                    
                    let net = earnings - deductions;

                    return `
                    <div style="background:#fff; color:#333; padding:10px; border-radius:10px; border-left:5px solid #2400b7; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                        <b style="color:#2400b7;">📊 PAYSLIP: ${monthNum}/${year}</b><br><hr style="border:0; border-top:1px solid #eee;">
                        <small>Basic Pay: ₹${c[3]}</small><br>
                        <small>HRA: ₹${c[5]}</small><br>
                        <small>Other Earn: ₹${c[19]}</small><br>
                        <div style="margin:5px 0; font-weight:bold; color:green;">Total Earnings: ₹${earnings.toFixed(2)}</div>
                        <div style="margin:5px 0; font-weight:bold; color:red;">Total Deductions: ₹${deductions.toFixed(2)}</div>
                        <hr style="border:0; border-top:1px solid #eee;">
                        <div style="font-size:16px; font-weight:bold; color:#2400b7;">Net Salary: ₹${net.toFixed(2)}</div>
                        <p style="font-size:11px; color:#666; margin-top:5px;">For full details and PDF, please visit the 'Monthly Salary' page.</p>
                    </div>`;
                }
            }
            return `❌ No salary record found for **${monthNum}/${year}**.`;
            
        } catch (error) {
            state.module = null; state.step = null;
            return "⚠️ Error: Unable to access the salary database.";
        }
    }
}

/* ================= COLUMN RECOGNITION ENGINE ================= */
const salaryDetailMap = {
    "basic": 3, "dearness": 4, "hra": 5, "house rent": 5, "city compensation": 6, "cca": 6, 
    "personal pay": 7, "special personal": 8, "conveyance": 9, "washing": 10, 
    "sfta": 11, "locality": 12, "mwa": 13, "hill": 14, "charge": 15,
    "pension": 16, "lwf company": 17, "cash duty": 18, "other earning": 19, 
    "lic": 20, "income tax": 21, "tax": 21, "professional tax": 22, "prof tax": 22,
    "society": 23, "kptcl society": 23, "pli": 24, "union fund": 25, 
    "sc st fund": 26, "rent": 27, "urban bank": 28, "family benefit": 29, 
    "festival advance": 30, "pc 10": 31, "pc 14": 32, "lwf": 33, 
    "recovery": 34, "other deduction": 35
};

/* ================= SPECIFIC DATA HANDLER ================= */
async function getSpecificSalaryDetail(q, userData, month, year) {
    let targetCol = null;
    let label = "";

    for (let key in salaryDetailMap) {
        if (q.toLowerCase().includes(key)) {
            targetCol = salaryDetailMap[key];
            label = key.toUpperCase();
            break;
        }
    }

    if (targetCol !== null) {
        try {
            let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
            let txt = await res.text();
            let rows = txt.trim().split("\n");

            for (let i = 1; i < rows.length; i++) {
                let c = rows[i].split(",");
                if (c[0] === userData && c[1] === year && c[2] === month) {
                    let value = c[targetCol] || "0";
                    return `🔍 For **${month}/${year}**, your **${label}** is:<br><b style="font-size:18px; color:#2400b7;">₹ ${value}</b>`;
                }
            }
            return `❌ No record found for ${label} in ${month}/${year}.`;
        } catch (e) {
            return "⚠️ Connection error while fetching details.";
        }
    }
    return null; 
}
async function ATTENDANCE_MODULE(q,u){if(!state.step){state.step="y";return "Year?"}if(state.step=="y"){state.data.y=q;state.step="m";return "Month?"}state.module=null;state.step=null;return "Fetching attendance...";}
async function NOMINEE_MODULE(q,u){state.module=null;return "Loading nominee details from secure API...";}

/* ================= 100+ CONVERSATION ENGINE ================= */
function COMMON_CHAT(q) {

    // SECTION 1: GREETINGS (1-10)
    if (/^(hi|hello|hey|hii|hey|yo|namaste|morning|evening|afternoon)/.test(q)) {
        const r = ["Hello! How can I help you?", "Hi there! Ready to assist.", "Hello 👋 What's on your mind today?", "Hey! How's your work going?"];
        return r[Math.floor(Math.random()*r.length)];
    }

    // SECTION 2: WELL-BEING (11-20)
    if (q.includes("how are you") || q.includes("how's it going")) {
        return "I'm functioning perfectly! Ready to check your records. How about you?";
    }

    // SECTION 3: AI IDENTITY (21-30)
    if (q.includes("who are you") || q.includes("what is your name")) {
        return "I am the HESCOM Secure AI, your personal HR and Payroll assistant.";
    }

    // SECTION 4: CAPABILITIES (31-40)
    if (q.includes("help") || q.includes("what can you do") || q.includes("features")) {
        return `I can help with:<br>
        • Checking Monthly Salary 💰<br>
        • Leave Balance (CL/EL/FPL) 📅<br>
        • Daily Attendance 📊<br>
        • Profile & Retirement Info 👤<br>
        • Nominee Details 👥`;
    }

    // SECTION 5: APP NAVIGATION (41-50)
    if (q.includes("how to") || q.includes("navigate") || q.includes("where is")) {
        if(q.includes("salary")) return "Go to the 'Salary View' page to download your PDF slip.";
        if(q.includes("attendance")) return "Check the 'Attendance' section for the calendar view.";
        return "You can find all features in the sidebar menu.";
    }

    // SECTION 6: GRATITUDE & POLITENESS (51-60)
    if (q.includes("thank") || q.includes("thanks") || q.includes("cool") || q.includes("nice")) {
        return "You're very welcome! I'm happy to be of service. 😊";
    }

    // SECTION 7: HUMOR & FUN (61-70)
    if (q.includes("joke")) {
        const jokes = ["Why don't scientists trust atoms? Because they make up everything!", "I asked my computer for a joke... it just showed me my internet speed.", "Why was the mobile phone wearing glasses? It lost its contacts!"];
        return jokes[Math.floor(Math.random()*jokes.length)];
    }

    // SECTION 8: TIME & DATE (71-80)
    if (q.includes("time") || q.includes("date")) {
        return "Today is " + new Date().toLocaleDateString() + " and the time is " + new Date().toLocaleTimeString();
    }

    // SECTION 9: MOTIVATION (81-90)
    if (q.includes("motivate") || q.includes("bored") || q.includes("tired")) {
        return "Keep pushing! Your hard work powers the state. ⚡ You're doing a great job!";
    }

    // SECTION 10: GOODBYE (91-100)
    if (q.includes("bye") || q.includes("goodnight") || q.includes("see you")) {
        return "Goodbye! Have a productive day ahead. 👋";
    }

    // FALLBACK
    return "I'm not quite sure I understand. Try asking 'salary', 'leaves', or 'attendance'.";
}

/* INITIALIZE */
addMessage("Hello! I am your Secure AI. Ask me about your Salary, Leaves, or Attendance.","ai");

// BACK NAVIGATION
history.pushState(null, null, location.href);
window.onpopstate = function () { window.location.replace("home.html"); };
</script>
</body>
</html>
