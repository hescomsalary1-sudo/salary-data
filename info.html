<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure AI - HESCOM</title>
<style>
body {
    font-family: -apple-system, Segoe UI, sans-serif;
    background: #f4f7f6;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* HEADER */
#header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 55px;
    background: #2400b7;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* CHAT CONTAINER */
#chat-container {
    flex: 1;
    padding: 20px;
    margin-top: 55px;
    margin-bottom: 75px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
}

.message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.4;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.user {
    align-self: flex-end;
    background: #2400b7;
    color: white;
    border-bottom-right-radius: 2px;
}

.ai {
    align-self: flex-start;
    background: white;
    color: #333;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    border-bottom-left-radius: 2px;
}

/* FLOATING NAV BUTTONS */
.scroll-nav {
    position: fixed;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 999;
}

#scrollUp { bottom: 135px; }
#scrollDown { bottom: 85px; }

.nav-btn {
    width: 40px;
    height: 40px;
    background: rgba(36, 0, 183, 0.7);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    border: none;
}

/* INPUT AREA */
#input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 12px 15px;
    display: flex;
    box-sizing: border-box;
    border-top: 1px solid #eee;
    z-index: 1000;
}

input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 25px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 15px;
}

button[type="submit"] {
    background: #2400b7;
    color: white;
    border: none;
    padding: 0 22px;
    margin-left: 10px;
    border-radius: 25px;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="header">🤖 Secure AI Assistant</div>

<button class="nav-btn" id="scrollUp" onclick="scrollToTop()">↑</button>
<button class="nav-btn" id="scrollDown" onclick="scrollToBottom()">↓</button>

<div id="chat-container"></div>

<form id="input-area" onsubmit="sendMessage(event)">
    <input id="msgInput" placeholder="Ask about salary, leaves..." autocomplete="off">
    <button type="submit">Send</button>
</form>

<script>
const container = document.getElementById("chat-container");
const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";
const nominationAPI = "https://script.google.com/macros/s/AKfycbzYMFFE-KfL5JamBrzIUC6oOCqP5eynVS3ksV2kkF-dY6g4J1Y08qdAQKErGg64qNS1BQ/exec";

let state = { module: null, step: null, data: {} };

/* MANUAL SCROLL FUNCTIONS */
function scrollToTop() {
    container.scrollTo({ top: 0, behavior: 'smooth' });
}

function scrollToBottom() {
    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
}

/* UI - ADD MESSAGE & AUTO-SCROLL */
function addMessage(t, type) {
    let d = document.createElement("div");
    d.className = "message " + type;
    d.innerHTML = t;
    container.appendChild(d);
    
    // Auto-scroll logic
    setTimeout(() => {
        container.scrollTo({
            top: container.scrollHeight,
            behavior: 'smooth'
        });
    }, 100);
}

/* SEND MESSAGE */
async function sendMessage(e) {
    e.preventDefault();
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let reply = await AI_ENGINE(text.toLowerCase());
    
    setTimeout(() => {
        addMessage(reply, "ai");
    }, 450);
}

/* ================= AI MODULES (HESCOM DATA) ================= */
async function AI_ENGINE(q) {
    const user = localStorage.getItem("currentUser");

    if (!state.module) {
        if (q.includes("salary") || q.includes("pay")) state.module = "salary";
        else if (q.includes("attendance") || q.includes("present")) state.module = "attendance";
        else if (q.includes("leave") || q.includes("balance")) state.module = "leave";
        else if (q.includes("nominee") || q.includes("nomination")) state.module = "nominee";
        else if (q.includes("profile") || q.includes("designation")) state.module = "profile";
    }

    if (state.module === "salary") return await SALARY_MODULE(q, user);
    if (state.module === "attendance") return await ATTENDANCE_MODULE(q, user);
    if (state.module === "leave") return await LEAVE_MODULE(q, user);
    if (state.module === "nominee") return await NOMINEE_MODULE(q, user);
    if (state.module === "profile") return await PROFILE_MODULE(q, user);

    return COMMON_CHAT(q);
}

async function SALARY_MODULE(q, user) {
    if (!state.step) { state.step = "year"; return "Which year? (e.g. 2026)"; }
    if (state.step === "year") { state.data.year = q; state.step = "month"; return "Enter month number (01-12):"; }
    if (state.step === "month") {
        state.data.month = q.padStart(2, "0");
        let res = await fetch(baseURL + "salary .csv");
        let rows = (await res.text()).split("\n");
        state.module = null; state.step = null;
        for (let r of rows) {
            let c = r.split(",");
            if (c[0] === user && c[1] === state.data.year && c[2] === state.data.month) {
                return `💰 **Salary Found:**<br>Basic: ₹${c[3]}<br>Gross: ₹${c[19]}<br>Net: ₹${+c[19] - (+c[35] || 0)}`;
            }
        }
        return "❌ Salary record not found.";
    }
}

async function ATTENDANCE_MODULE(q, user) {
    if (!state.step) { state.step = "year"; return "Which year?"; }
    if (state.step === "year") { state.data.year = q; state.step = "month"; return "Which month? (e.g. Jan)"; }
    if (state.step === "month") {
        let res = await fetch(baseURL + "attendance.csv");
        let rows = (await res.text()).split("\n");
        let p=0, a=0, l=0;
        state.module = null; state.step = null;
        for (let r of rows) {
            let c = r.split(",");
            if (c[0] === user && c[1] === state.data.year && c[2].toLowerCase().includes(q.substring(0,3))) {
                for (let i=3; i<34; i++) { if (c[i] === "P") p++; else if (c[i] === "A") a++; else if (c[i] && c[i] !== "") l++; }
                return `📊 **Attendance (${q}):**<br>Present: ${p}<br>Absent: ${a}<br>Leaves: ${l}`;
            }
        }
        return "❌ Attendance not found.";
    }
}

async function LEAVE_MODULE(q, user) {
    state.module = null;
    let res = await fetch(baseURL + "leaves.csv");
    let rows = (await res.text()).split("\n");
    for (let r of rows) {
        let c = r.split(",");
        if (c[0].trim() === user) return `📅 **Leave Balance:**<br>EL: ${c[3]} | FPL: ${c[4]} | CL: ${c[5]}<br>Updated: ${c[6]}`;
    }
    return "❌ Leave record not found.";
}

async function NOMINEE_MODULE(q, user) {
    state.module = null;
    try {
        let res = await fetch(nominationAPI + "?user=" + user);
        let data = await res.json();
        if (data.length > 0) return `👥 **Nominees:**<br>` + data.map(n => `• ${n.name} (${n.relation}) - ${n.share}%`).join("<br>");
    } catch(e) { return "❌ Error fetching data."; }
    return "❌ No nomination details.";
}

async function PROFILE_MODULE(q, user) {
    state.module = null;
    let res = await fetch(baseURL + "employee.csv");
    let rows = (await res.text()).split("\n");
    for (let r of rows) {
        let c = r.split(",");
        if (c[0].trim() === user) return `👤 **Profile:**<br>Designation: ${c[2]}<br>Joined: ${c[18]}<br>Retirement: ${c[6]}`;
    }
    return "❌ Profile not found.";
}

function COMMON_CHAT(q) {
    if (q.includes("hi") || q.includes("hello")) return "Hello! 👋 How can I assist you today?";
    return "I'm your HESCOM Secure AI. Ask about salary, attendance, or leaves! 😊";
}

window.onload = () => { addMessage("Hello 👋 Ask me about your app data.", "ai"); };

history.pushState(null, null, location.href);
window.onpopstate = function () { window.location.replace("home.html"); };
</script>
</body>
</html>
