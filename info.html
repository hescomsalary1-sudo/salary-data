<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Info</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1f2937,#111827);
  color:#fff;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* CARD */
.card{
  max-width:340px;
  margin:20px auto;
  background:#fff;
  color:#000;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

/* TOP */
.top{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:#fff;
  text-align:center;
  padding:18px;
}

.top h2{
  margin:0;
  font-size:18px;
}

.top span{
  font-size:13px;
  opacity:0.9;
}

/* BODY */
.body{
  padding:15px;
}

/* GRID DETAILS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  font-size:12px;
}

.grid div{
  background:#f3f4f6;
  padding:6px;
  border-radius:8px;
}

/* FULL WIDTH */
.full{
  grid-column:1 / 3;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">⚡ Employee Info</div>

<div id="status" class="status">⏳ Loading...</div>

<div class="card" id="card" style="display:none;">

<div class="top">
  <h2 id="name"></h2>
  <span id="designation"></span>
</div>

<div class="body">

<div class="grid">
  <div><b>User:</b><br><span id="username"></span></div>
  <div><b>Mobile:</b><br><span id="mobile"></span></div>

  <div class="full"><b>Email:</b><br><span id="email"></span></div>

  <div><b>Place:</b><br><span id="place"></span></div>
  <div><b>DOB:</b><br><span id="dob"></span></div>

  <div><b>District:</b><br><span id="district"></span></div>
  <div><b>Category:</b><br><span id="category"></span></div>

  <div class="full"><b>Joining Date:</b><br><span id="joining"></span></div>
  <div class="full"><b>Current Designation:</b><br><span id="current"></span></div>
</div>

</div>

</div>

<script>

/* ✅ CSV PARSER (handles quotes + commas) */
function parseCSV(text){
  let rows = [];
  let lines = text.trim().split("\n");

  for(let line of lines){
    let row = [];
    let current = "";
    let insideQuotes = false;

    for(let i=0;i<line.length;i++){
      let char = line[i];

      if(char === '"'){
        insideQuotes = !insideQuotes;
      }
      else if(char === ',' && !insideQuotes){
        row.push(current);
        current = "";
      }
      else{
        current += char;
      }
    }

    row.push(current);
    rows.push(row);
  }

  return rows;
}

/* LOAD DATA */
async function loadData(){

let user = localStorage.getItem("currentUser");

if(!user){
  document.getElementById("status").innerText="❌ Login required";
  return;
}

try{

let url = "YOUR_GITHUB_RAW_CSV_URL";  // 🔥 PUT YOUR LINK

let res = await fetch(url + "?v=" + Date.now());
let text = await res.text();

let rows = parseCSV(text);

for(let i=1;i<rows.length;i++){

let cols = rows[i];

let username = (cols[0] || "").trim();

if(username === user.trim()){

document.getElementById("status").innerText="";
document.getElementById("card").style.display="block";

/* FILL DATA */
document.getElementById("username").innerText = cols[0] || "";
document.getElementById("name").innerText = cols[1] || "";
document.getElementById("designation").innerText = cols[2] || "";
document.getElementById("place").innerText = cols[3] || "";
document.getElementById("mobile").innerText = cols[4] || "";
document.getElementById("dob").innerText = cols[5] || "";
document.getElementById("email").innerText = cols[8] || "";
document.getElementById("category").innerText = cols[14] || "";
document.getElementById("district").innerText = cols[16] || "";
document.getElementById("joining").innerText = cols[19] || "";
document.getElementById("current").innerText = cols[23] || "";

return;
}
}

document.getElementById("status").innerText="⚠️ User not found";

}catch(e){
document.getElementById("status").innerText="❌ Error loading data";
console.error(e);
}

}

loadData();

</script>

</body>
</html>
