<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Test</title>
    <style>
        /* CRITICAL: Let the body handle the scroll so Android can detect it */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 80px; /* Space for input */
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background-color: #2400b7;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai {
            align-self: flex-start;
            background-color: white;
            color: #333;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 15px;
            display: flex;
            box-sizing: border-box;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: #2400b7;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        .debug-hint {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="debug-hint">Scroll down to see the fix!</div>
        
        <script>
            const container = document.getElementById('chat-container');
            for (let i = 1; i <= 25; i++) {
                container.innerHTML += `
                    <div class="message ai">Hello! This is message #${i} from the AI. Scroll down to check if refresh is disabled.</div>
                    <div class="message user">User response to message #${i}.</div>
                `;
            }
        </script>
    </div>

    <form id="input-area" onsubmit="sendMessage(event)">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button type="submit">Send</button>
    </form>

    <script>
        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            const container = document.getElementById('chat-container');
            
            if (input.value.trim() !== "") {
                // Add User Message
                const userDiv = document.createElement('div');
                userDiv.className = 'message user';
                userDiv.innerText = input.value;
                container.appendChild(userDiv);

                // Clear Input
                const val = input.value;
                input.value = "";

                // Scroll to bottom after sending
                window.scrollTo(0, document.body.scrollHeight);

                // Simulate AI Response
                setTimeout(() => {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'message ai';
                    aiDiv.innerText = "You said: " + val + ". I am a simple AI test.";
                    container.appendChild(aiDiv);
                    window.scrollTo(0, document.body.scrollHeight);
                }, 1000);
            }
        }
    </script>
</body>
</html>
