<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden; /* 🚫 no page scroll */
  font-family: Segoe UI;
  background: #0f172a;
  color: white;
}

/* HEADER */
#header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: #1e293b;
  text-align: center;
  line-height: 50px;
}

/* 🔥 SCROLL AREA */
#chat {
  position: absolute;
  top: 50px;
  bottom: 60px;
  left: 0;
  right: 0;
  overflow-y: scroll;   /* 🔥 FORCE SCROLL */
  padding: 10px;
}

/* INPUT */
#inputBar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  display: flex;
  padding: 10px;
  background: #1e293b;
}

/* MESSAGE */
.msg {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #3b82f6;
  margin-left: auto;
}

.bot {
  background: #334155;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 6px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div id="header">🤖 AI Assistant</div>

<div id="chat"></div>

<div id="inputBar">
  <input id="input" placeholder="Type message">
  <button onclick="send()">Send</button>
</div>

<script>
let chat = document.getElementById("chat");
let input = document.getElementById("input");

/* ADD MESSAGE */
function add(text, type) {
  let d = document.createElement("div");
  d.className = "msg " + type;
  d.innerText = text;
  chat.appendChild(d);
}

/* SEND */
function send() {
  let text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  add("Reply...", "bot");
}

/* 🔥 ADD MANY MESSAGES TO TEST SCROLL */
for (let i = 1; i <= 100; i++) {
  add("Old message " + i, "bot");
}

/* 🔥 BLOCK REFRESH */
let startY = 0;

chat.addEventListener("touchstart", function(e){
  startY = e.touches[0].clientY;
}, { passive: false });

chat.addEventListener("touchmove", function(e){
  let currentY = e.touches[0].clientY;

  if (chat.scrollTop === 0 && currentY > startY) {
    e.preventDefault();
  }
}, { passive: false });
</script>

</body>
</html>
