<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<style>
:root{
  --bg1:#0f172a; --bg2:#1e293b; --accent:#4f46e5; --accent2:#22c55e; --muted:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:Segoe UI, sans-serif; height:100vh; display:flex; flex-direction:column;
  background:linear-gradient(135deg,var(--bg1),var(--bg2)); color:#fff;
}
header{
  padding:14px; text-align:center; font-weight:700; letter-spacing:.5px;
  background:rgba(255,255,255,.05); backdrop-filter:blur(10px);
}
#chat{
  flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column;
}
.msg{max-width:78%; padding:12px 14px; border-radius:16px; margin:6px 0; line-height:1.45}
.user{background:#3b82f6; align-self:flex-end}
.bot{background:rgba(255,255,255,.08); align-self:flex-start}
.typing{opacity:.7; font-style:italic}
#inputBar{display:flex; gap:8px; padding:10px; background:rgba(255,255,255,.06)}
#input{flex:1; padding:10px; border-radius:10px; border:none; outline:none}
button{padding:10px 14px; border:none; border-radius:10px; cursor:pointer; background:var(--accent2); color:#fff}
button:active{transform:scale(.96)}
.suggest{display:flex; gap:8px; flex-wrap:wrap; padding:8px}
.suggest button{background:#334155; font-size:12px}
</style>
</head>
<body>

<header>⚡ Smart App Assistant</header>

<div id="chat"></div>

<div class="suggest" id="suggestBox">
  <button onclick="quick('salary')">Salary</button>
  <button onclick="quick('attendance')">Attendance</button>
  <button onclick="quick('leave')">Leave</button>
  <button onclick="quick('profile')">Profile</button>
  <button onclick="quick('income')">Income</button>
</div>

<div id="inputBar">
  <input id="input" placeholder="Ask about your app...">
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function add(text, type){
  let d=document.createElement('div');
  d.className='msg '+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  let d=document.createElement('div');
  d.className='msg bot typing';
  d.innerText='Typing...';
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
  return d;
}

function send(){
  let text=input.value.trim();
  if(!text) return;
  add(text,'user');
  input.value='';
  let t=typing();

  setTimeout(()=>{
    t.remove();
    add(reply(text.toLowerCase()),'bot');
  },700);
}

input.addEventListener('keypress',e=>{if(e.key==='Enter') send();});

function quick(q){input.value=q; send();}

function reply(q){
  let user=localStorage.getItem('currentUser')||'User';

  if(q.includes('name')||q.includes('who am i')){
    return 'You are logged in as '+user;
  }

  if(q.includes('salary')){
    return 'Go to Salary → select month to view details. Your net salary is shown on home screen.';
  }

  if(q.includes('attendance')){
    return 'Open Attendance page → select month & year → view summary and daily records.';
  }

  if(q.includes('leave')){
    return 'Check Leave Dashboard for EL, CL, FPL balance and history.';
  }

  if(q.includes('profile')){
    return 'Your profile page shows personal, service and retirement details.';
  }

  if(q.includes('income')){
    return 'Other Income page shows DA arrears, bills and payments status.';
  }

  if(q.includes('nomination')){
    return 'Nomination page allows you to view and edit nominee details. Share must be 100%.';
  }

  if(q.includes('open salary')){
    window.location='salary.html'; return 'Opening Salary page...';
  }

  if(q.includes('open attendance')){
    window.location='attendance.html'; return 'Opening Attendance...';
  }

  return 'I can answer only about your app (salary, attendance, leave, profile, income).';
}

add('Hello '+(localStorage.getItem('currentUser')||'User')+' 👋 Ask me anything about your app.','bot');
</script>

</body>
</html>
