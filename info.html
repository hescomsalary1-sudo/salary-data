<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section AI Assistant</title>

<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;height:100vh;display:flex;flex-direction:column}
header{padding:10px;text-align:center;font-weight:bold;background:rgba(255,255,255,.05)}

#sections{display:flex;overflow-x:auto;padding:8px;gap:8px;background:rgba(255,255,255,.05)}
.sec{padding:8px 12px;background:#334155;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap}
.sec.active{background:#22c55e}

#chat{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column}
.msg{max-width:80%;padding:10px;border-radius:14px;margin:6px 0}
.user{background:#3b82f6;align-self:flex-end}
.bot{background:rgba(255,255,255,.1)}

#inputBar{display:flex;padding:10px;background:rgba(255,255,255,.05)}
#input{flex:1;padding:10px;border-radius:10px;border:none}
button{margin-left:6px;padding:10px;border:none;border-radius:10px;background:#22c55e;color:white}
</style>
</head>
<body>

<header>⚡ Section Based AI</header>

<div id="sections">
<div class="sec active" onclick="setSection('salary',this)">Salary</div>
<div class="sec" onclick="setSection('profile',this)">Profile</div>
<div class="sec" onclick="setSection('leave',this)">Leaves</div>
<div class="sec" onclick="setSection('income',this)">Income</div>
<div class="sec" onclick="setSection('nomination',this)">Nomination</div>
<div class="sec" onclick="setSection('attendance',this)">Attendance</div>
<div class="sec" onclick="setSection('seniority',this)">Seniority</div>
<div class="sec" onclick="setSection('promotion',this)">Promotion</div>
</div>

<div id="chat"></div>

<div id="inputBar">
<input id="input" placeholder="Ask based on selected section...">
<button onclick="send()">Send</button>
</div>

<script>
let chat=document.getElementById('chat');
let input=document.getElementById('input');

let currentSection='salary';
let state={step:null,data:{}};

function setSection(sec,el){
currentSection=sec;
state={step:null,data:{}};
document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
el.classList.add('active');
add('Switched to '+sec+' section','bot');
}

function add(t,type){let d=document.createElement('div');d.className='msg '+type;d.innerText=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}

async function send(){
let text=input.value.trim();
if(!text) return;
add(text,'user');
input.value='';
let res=await process(text.toLowerCase());
add(res,'bot');
}

input.addEventListener('keypress',e=>{if(e.key==='Enter') send()});

async function process(q){
let user=localStorage.getItem('currentUser');

// ===== SALARY =====
if(currentSection==='salary'){
if(!state.step){state.step='year';return 'Enter year';}
if(state.step==='year'){state.data.year=q;state.step='month';return 'Enter month number';}
if(state.step==='month'){
state.data.month=q.padStart(2,'0');state.step=null;
let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/salary.csv');
let txt=await res.text();
let rows=txt.split('\n');
for(let r of rows){let c=r.split(',');
if(c[0]===user && c[1]===state.data.year && c[2]===state.data.month){
let earn=0,ded=0;
for(let i=3;i<=19;i++) earn+=+c[i];
for(let i=20;i<=35;i++) ded+=+c[i];
return `Earnings ₹${earn}\nDeductions ₹${ded}\nNet ₹${earn-ded}`;
}}
return 'No data found';
}
}

// ===== ATTENDANCE =====
if(currentSection==='attendance'){
if(!state.step){state.step='year';return 'Enter year';}
if(state.step==='year'){state.data.year=q;state.step='month';return 'Enter month (Jan)';}
if(state.step==='month'){
let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/attendance.csv');
let txt=await res.text();
let rows=txt.split('\n');
let p=0,a=0,l=0;
for(let r of rows){let c=r.split(',');
if(c[0]===user && c[1]===state.data.year && c[2].toLowerCase()===q){
for(let i=3;i<34;i++){if(c[i]==='P')p++; else if(c[i]==='A')a++; else if(c[i])l++;}
}}
state.step=null;
return `Present ${p}, Absent ${a}, Leave ${l}`;
}
}

// ===== PROFILE =====
if(currentSection==='profile'){
return 'Profile includes name, designation, service and retirement details.';
}

// ===== LEAVE =====
if(currentSection==='leave'){
return 'Leave dashboard shows EL, CL, FPL balance and history.';
}

// ===== INCOME =====
if(currentSection==='income'){
return 'Other income shows arrears, bills and payment status.';
}

// ===== NOMINATION =====
if(currentSection==='nomination'){
return 'Nomination contains nominee details and share distribution.';
}

return 'Ask related to selected section.';
}

add('Select a section and start asking 👇','bot');
</script>

</body>
</html>
