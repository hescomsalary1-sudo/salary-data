<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate AI Assistant</title>

<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;height:100vh;display:flex;flex-direction:column}
header{padding:12px;text-align:center;font-weight:bold;background:rgba(255,255,255,.05)}
#chat{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column}
.msg{max-width:80%;padding:10px;border-radius:14px;margin:6px 0;line-height:1.4}
.user{background:#3b82f6;align-self:flex-end}
.bot{background:rgba(255,255,255,.1)}
#inputBar{display:flex;padding:10px;background:rgba(255,255,255,.05)}
#input{flex:1;padding:10px;border-radius:10px;border:none}
button{margin-left:6px;padding:10px;border:none;border-radius:10px;background:#22c55e;color:white}
</style>
</head>
<body>

<header>🤖 Smart App AI</header>
<div id="chat"></div>
<div id="inputBar">
<input id="input" placeholder="Ask anything about your app...">
<button onclick="send()">Send</button>
</div>

<script>
let chat=document.getElementById('chat');
let input=document.getElementById('input');

let state={module:null,step:null,data:{}};

function add(t,type){let d=document.createElement('div');d.className='msg '+type;d.innerText=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}

async function send(){
let text=input.value.trim();
if(!text) return;
add(text,'user');
input.value='';
let res=await process(text.toLowerCase());
add(res,'bot');
}

input.addEventListener('keypress',e=>{if(e.key==='Enter') send()});

// ================= MAIN AI =================
async function process(q){

// detect module
if(!state.module){
if(q.includes('salary')) state.module='salary';
else if(q.includes('attendance')) state.module='attendance';
else if(q.includes('leave')) state.module='leave';
else if(q.includes('profile')||q.includes('name')) state.module='profile';
else if(q.includes('income')) state.module='income';
else if(q.includes('nomination')) state.module='nomination';
}

// ================= SALARY MODULE =================
if(state.module==='salary'){
if(!state.step){state.step='year';return 'Tell me year (e.g., 2026)';}
if(state.step==='year'){state.data.year=q;state.step='month';return 'Enter month (1-12)';}
if(state.step==='month'){
state.data.month=q.padStart(2,'0');state.step=null;state.module=null;

let user=localStorage.getItem('currentUser');
let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/salary .csv');
let txt=await res.text();
let rows=txt.split('\n');

for(let r of rows){
let c=r.split(',');
if(c[0]===user && c[1]===state.data.year && c[2]===state.data.month){
let earn=0,ded=0;
for(let i=3;i<=19;i++) earn+=+c[i];
for(let i=20;i<=35;i++) ded+=+c[i];
return `Salary ${state.data.month}-${state.data.year}\nEarnings ₹${earn}\nDeductions ₹${ded}\nNet ₹${earn-ded}`;
}}
return 'No salary data found';
}
}

// ================= ATTENDANCE MODULE =================
if(state.module==='attendance'){
if(!state.step){state.step='year';return 'Enter year';}
if(state.step==='year'){state.data.year=q;state.step='month';return 'Enter month (Jan)';}
if(state.step==='month'){
let user=localStorage.getItem('currentUser');
let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/attendance.csv');
let txt=await res.text();
let rows=txt.split('\n');
let p=0,a=0,l=0;
for(let r of rows){let c=r.split(',');
if(c[0]===user && c[1]===state.data.year && c[2].toLowerCase()===q){
for(let i=3;i<34;i++){if(c[i]==='P')p++; else if(c[i]==='A')a++; else if(c[i])l++;}
}}
state.module=null;state.step=null;
return `Attendance Summary\nPresent ${p}\nAbsent ${a}\nLeave ${l}`;
}
}

// ================= PROFILE MODULE =================
if(state.module==='profile'){
state.module=null;
return 'Your profile contains personal details, designation, service length and retirement info.';
}

// ================= LEAVE MODULE =================
if(state.module==='leave'){
state.module=null;
return 'Leave dashboard shows EL, CL, FPL balances and history.';
}

// ================= INCOME MODULE =================
if(state.module==='income'){
state.module=null;
return 'Other income includes DA arrears, bills and payment status.';
}

// ================= NOMINATION MODULE =================
if(state.module==='nomination'){
state.module=null;
return 'Nomination contains nominee list and share percentage (must be 100%).';
}

// ================= COMMON CONVERSATION =================
if(q.includes('hi')||q.includes('hello')) return 'Hello 👋 How can I help you?';
if(q.includes('how are you')) return 'I am your app assistant, ready to help.';
if(q.includes('what can you do')) return 'I can help with salary, attendance, leave, profile, income and more.';
if(q.includes('help')) return 'Try asking: salary, attendance, leave, income, profile.';

return 'Please ask about salary, attendance, leave, income, nomination or profile.';
}

add('Hello 👋 Ask me anything about your app.','bot');
</script>

</body>
</html>
