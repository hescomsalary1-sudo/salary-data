<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden; /* 🚫 no page scroll */
  font-family: Segoe UI;
  background: #0f172a;
  color: white;
}

/* MAIN APP */
.app {
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  height: 50px;
  flex-shrink: 0;
  background: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🔥 SCROLL CONTAINER */
.chat-container {
  flex: 1;
  min-height: 0; /* 🔥 IMPORTANT */
  overflow-y: auto; /* ✅ ONLY THIS SCROLLS */
  padding: 10px;
}

/* MESSAGE */
.msg {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #3b82f6;
  margin-left: auto;
}

.bot {
  background: #334155;
}

/* INPUT */
.inputBar {
  flex-shrink: 0;
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 6px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">🤖 AI Assistant</div>

  <!-- 🔥 ONLY THIS SCROLLS -->
  <div id="chat" class="chat-container"></div>

  <div class="inputBar">
    <input id="input" placeholder="Type message">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
let chat = document.getElementById("chat");
let input = document.getElementById("input");

/* ADD MESSAGE */
function add(text, type) {
  let d = document.createElement("div");
  d.className = "msg " + type;
  d.innerText = text;
  chat.appendChild(d);

  // auto scroll only inside container
  chat.scrollTop = chat.scrollHeight;
}

/* SEND */
function send() {
  let text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  add("Reply...", "bot");
}

/* TEST DATA (to confirm scroll works) */
for (let i = 1; i <= 100; i++) {
  add("Old message " + i, "bot");
}

/* 🔥 BLOCK PULL-TO-REFRESH */
let startY = 0;

chat.addEventListener("touchstart", function(e){
  startY = e.touches[0].clientY;
}, { passive: false });

chat.addEventListener("touchmove", function(e){
  let currentY = e.touches[0].clientY;

  if (chat.scrollTop === 0 && currentY > startY) {
    e.preventDefault();
  }
}, { passive: false });
</script>

</body>
</html>
