<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Info</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* CARD */
.id-card{
  max-width:320px;
  margin:20px auto;
  background:#fff;
  color:#000;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* TOP */
.top{
  background:linear-gradient(135deg,#0f9d58,#34a853);
  color:#fff;
  padding:15px;
  text-align:center;
}

.top h2{
  margin:0;
  font-size:18px;
}

/* BODY */
.body{
  padding:15px;
  text-align:center;
}

.photo{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#ddd;
  margin:auto;
  margin-bottom:10px;
}

/* DETAILS */
.details{
  font-size:13px;
  text-align:left;
  margin-top:10px;
}

.details p{
  margin:4px 0;
}

/* FOOTER */
.footer{
  background:#f5f5f5;
  padding:10px;
  font-size:12px;
  text-align:center;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">⚡ Employee Info</div>

<div id="status" class="status">⏳ Loading...</div>

<div class="id-card" id="card" style="display:none;">

<div class="top">
  <h2 id="name"></h2>
  <div id="designation"></div>
</div>

<div class="body">

<div class="photo"></div>

<div class="details">
  <p><b>Username:</b> <span id="username"></span></p>
  <p><b>Mobile:</b> <span id="mobile"></span></p>
  <p><b>Email:</b> <span id="email"></span></p>
  <p><b>Place:</b> <span id="place"></span></p>
  <p><b>DOB:</b> <span id="dob"></span></p>
  <p><b>Joining:</b> <span id="joining"></span></p>
  <p><b>Current Role:</b> <span id="current"></span></p>
  <p><b>Category:</b> <span id="category"></span></p>
  <p><b>District:</b> <span id="district"></span></p>
</div>

</div>

<div class="footer">
  Employee Information System
</div>

</div>

<script>

async function loadData(){

let user = localStorage.getItem("currentUser");

if(!user){
  document.getElementById("status").innerText="❌ Not logged in";
  return;
}

try{

let res = await fetch(""https://hescomsalary1-sudo.github.io/salary-data/employee.csv"&v="+Date.now());
let text = await res.text();

let rows = text.split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let username = cols[0];

if(username && username.trim() === user.trim()){

document.getElementById("status").innerText="";

/* FILL DATA */
document.getElementById("card").style.display="block";

document.getElementById("username").innerText = cols[0] || "";
document.getElementById("name").innerText = cols[1] || "";
document.getElementById("designation").innerText = cols[2] || "";
document.getElementById("place").innerText = cols[3] || "";
document.getElementById("mobile").innerText = cols[4] || "";
document.getElementById("dob").innerText = cols[5] || "";
document.getElementById("email").innerText = cols[8] || "";
document.getElementById("category").innerText = cols[14] || "";
document.getElementById("district").innerText = cols[16] || "";
document.getElementById("joining").innerText = cols[19] || "";
document.getElementById("current").innerText = cols[23] || "";

return;
}
}

document.getElementById("status").innerText="⚠️ Employee not found";

}catch(e){
document.getElementById("status").innerText="Error loading data";
console.log(e);
}

}

loadData();

</script>

</body>
</html>
