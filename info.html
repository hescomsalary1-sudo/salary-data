<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
body{
font-family:-apple-system,Segoe UI;
background:#f4f7f6;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */
#header{
position:fixed;
top:0;
width:100%;
height:55px;
background:#2400b7;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
z-index:1000;
}

/* CHAT */
#chat-container{
flex:1;
padding:20px;
margin-top:55px;
display:flex;
flex-direction:column;
gap:15px;
padding-bottom:80px;
}

.message{
max-width:80%;
padding:12px 16px;
border-radius:15px;
font-size:15px;
}

.user{
align-self:flex-end;
background:#2400b7;
color:white;
}

.ai{
align-self:flex-start;
background:white;
color:#333;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* INPUT */
#input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px;
    display: flex;
    box-sizing: border-box;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ddd;
}

button {
    background: #2400b7;
    color: white;
    border: none;
    padding: 0 20px;
    margin-left: 10px;
    border-radius: 25px;
}
</style>
</head>
<body>

<div class="ai-header">
    <div style="font-size: 24px;">🤖</div>
    <div style="font-weight: 700;">HESCOM Secure AI</div>
    <div style="font-size: 11px; opacity: 0.8;">Integrated Employee Intelligence</div>
</div>

<div id="chat-box">
    <div class="msg bot">Hello! I am your Secure AI. I have access to your Payroll, Attendance, Leaves, and Nominations. How can I help you today?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask about salary, leaves, or nominees...">
    <button onclick="askAI()">➔</button>
</div>

<script>
    const user = localStorage.getItem("currentUser");
    const chatBox = document.getElementById("chat-box");

    async function askAI() {
        const input = document.getElementById("userInput");
        const query = input.value.toLowerCase();
        if (!query) return;

        addMessage(input.value, "user");
        input.value = "";

        // SHOW THINKING
        const loadingMsg = addMessage("Analyzing secure data...", "bot");

        try {
            const response = await processQuery(query);
            loadingMsg.innerHTML = response;
        } catch (e) {
            loadingMsg.innerHTML = "I'm sorry, I couldn't retrieve that data right now.";
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addMessage(text, side) {
        const div = document.createElement("div");
        div.className = `msg ${side}`;
        div.innerHTML = text;
        chatBox.appendChild(div);
        return div;
    }

    async function processQuery(q) {
        // 1. LEAVE MODULE (Based on leaves.html logic)
        if (q.includes("leave") || q.includes("balance")) {
            const res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
            const data = await res.text();
            const row = data.split("\n").find(r => r.startsWith(user));
            if (row) {
                const c = row.split(",");
                return `📊 **Your Leave Credits:**<br>EL: ${c[3]} | FPL: ${c[4]} | CL: ${c[5]}<br><small>Updated as on ${c[6]}</small>`;
            }
        }

        // 2. NOMINATION MODULE (Based on view_nomation.html API)
        if (q.includes("nominee") || q.includes("family")) {
            const api = "https://script.google.com/macros/s/AKfycbzYMFFE-KfL5JamBrzIUC6oOCqP5eynVS3ksV2kkF-dY6g4J1Y08qdAQKErGg64qNS1BQ/exec";
            const res = await fetch(`${api}?user=${user}`);
            const data = await res.json();
            if (data.length > 0) {
                let list = data.map(n => `• ${n.name} (${n.relation}) - ${n.share}%`).join("<br>");
                return `👥 **Current Nominees:**<br>${list}`;
            }
        }

        // 3. SALARY MODULE (Based on salary_view.html logic)
        if (q.includes("salary") || q.includes("earn") || q.includes("pay")) {
            const res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
            const data = await res.text();
            // Get latest record for user
            const rows = data.split("\n").filter(r => r.startsWith(user));
            const latest = rows[rows.length - 1].split(",");
            const net = parseInt(latest[3]) + parseInt(latest[4]) + parseInt(latest[5]) - 1000; // Simplified logic
            return `💰 **Latest Pay Info:**<br>Year: ${latest[1]}, Month: ${latest[2]}<br>Basic: ₹${latest[3]}<br>Estimated Net: ₹${net}`;
        }

        // 4. RETIREMENT MODULE (Based on page1.html logic)
        if (q.includes("retire") || q.includes("service")) {
            const res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
            const data = await res.text();
            const row = data.split("\n").find(r => r.startsWith(user));
            if (row) {
                const c = row.split(",");
                return `📅 **Service Record:**<br>Joined: ${c[18]}<br>Retirement Date: ${c[6]}<br>Place: ${c[3]}`;
            }
        }

        return "❓ I'm not sure about that. Try asking about your **salary**, **leave balance**, **nominees**, or **retirement date**.";
    }
</script>

</body>
</html>
