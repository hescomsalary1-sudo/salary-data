<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee ID Card</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1f2937,#111827);
  color:#fff;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* ID CARD */
.card{
  width:260px;
  margin:20px auto;
  background:#fff;
  color:#000;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* HEADER */
.top{
  background:linear-gradient(135deg,#0f9d58,#34a853);
  color:#fff;
  text-align:center;
  padding:12px;
}

.top::before{
  content:"EMPLOYEE ID CARD";
  display:block;
  font-size:11px;
}

.top h2{
  margin:5px 0 0;
  font-size:16px;
}

.top span{
  font-size:12px;
}

/* BODY */
.body{
  padding:12px;
  text-align:center;
}

/* PHOTO */
.photo{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#ccc;
  margin:-40px auto 10px auto;
  border:3px solid #fff;
}

/* DETAILS */
.details{
  font-size:12px;
  text-align:left;
  margin-top:10px;
}

.details p{
  margin:5px 0;
  border-bottom:1px solid #eee;
  padding-bottom:4px;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">⚡ Employee Info</div>

<div id="status" class="status">⏳ Loading...</div>

<div class="card" id="card" style="display:none;">

<div class="top">
  <h2 id="name"></h2>
  <span id="designation"></span>
</div>

<div class="body">

<div class="photo"></div>

<div style="font-size:12px; color:#666;">Govt Employee</div>

<div class="details">
  <p><b>ID:</b> <span id="username"></span></p>
  <p><b>Mobile:</b> <span id="mobile"></span></p>
  <p><b>Email:</b> <span id="email"></span></p>
  <p><b>Place:</b> <span id="place"></span></p>
  <p><b>DOB:</b> <span id="dob"></span></p>
  <p><b>District:</b> <span id="district"></span></p>
  <p><b>Category:</b> <span id="category"></span></p>
  <p><b>Joining:</b> <span id="joining"></span></p>
  <p><b>Current:</b> <span id="current"></span></p>
</div>

</div>

</div>

<script>

/* CSV PARSER */
function parseCSV(text){
  let rows = [];
  let lines = text.trim().split("\n");

  for(let line of lines){
    let row = [];
    let current = "";
    let insideQuotes = false;

    for(let i=0;i<line.length;i++){
      let char = line[i];

      if(char === '"'){
        insideQuotes = !insideQuotes;
      }
      else if(char === ',' && !insideQuotes){
        row.push(current);
        current = "";
      }
      else{
        current += char;
      }
    }

    row.push(current);
    rows.push(row);
  }

  return rows;
}

/* LOAD DATA */
async function loadData(){

let user = localStorage.getItem("currentUser");

if(!user){
  document.getElementById("status").innerText="❌ Login required";
  return;
}

try{

let url = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";

let res = await fetch(url + "?v=" + Date.now());
let text = await res.text();

let rows = parseCSV(text);

for(let i=1;i<rows.length;i++){

let cols = rows[i];
let username = (cols[0] || "").trim();

if(username === user.trim()){

document.getElementById("status").innerText="";
document.getElementById("card").style.display="block";

/* FILL DATA */
document.getElementById("username").innerText = cols[0] || "";
document.getElementById("name").innerText = cols[1] || "";
document.getElementById("designation").innerText = cols[2] || "";
document.getElementById("place").innerText = cols[3] || "";
document.getElementById("mobile").innerText = cols[4] || "";
document.getElementById("dob").innerText = cols[5] || "";
document.getElementById("email").innerText = cols[8] || "";
document.getElementById("category").innerText = cols[14] || "";
document.getElementById("district").innerText = cols[16] || "";
document.getElementById("joining").innerText = cols[19] || "";
document.getElementById("current").innerText = cols[23] || "";

return;
}
}

document.getElementById("status").innerText="⚠️ User not found";

}catch(e){
document.getElementById("status").innerText="❌ Error loading data";
console.log(e);
}

}

loadData();

</script>

</body>
</html>
