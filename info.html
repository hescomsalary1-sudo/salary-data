<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Center</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

.card {
  background: rgba(255,255,255,0.08);
  margin: 15px;
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.info-box { font-size: 14px; line-height: 1.6; }

.points { font-size: 26px; font-weight: bold; }
.level { margin-top: 5px; font-size: 16px; color: #ffd700; }

.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress {
  height: 100%;
  background: #00ffcc;
  width: 0%;
}

.input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
}

.btn-gen {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#0f9d58,#34a853);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.id-box {
  background: white;
  color: #000;
  padding: 15px;
  border-radius: 15px;
  width: 220px;
  margin: auto;
  text-align: center;
}

.id-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover; /* keeps full image */
  border: 2px solid #0f9d58;
}

.sign-img {
  width: 120px;
  height: 50px;
  object-fit: contain; /* prevents cutting */
  background: #fff;
  padding: 3px;
  border-radius: 5px;
}

.small {
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">⚡ Info Center</div>

<!-- INFO -->
<div class="card">
  <div class="info-box">
    💡 Tip: Maintain full attendance to earn bonus points!<br>
    📢 Notice: Salary will be credited on 5th
  </div>
</div>

<!-- REWARDS -->
<div class="card">  
  <div class="points" id="points">0 Points</div>
  <div class="level" id="level">Bronze</div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="small" id="summary"></div>
</div>

<!-- FORM -->
<div class="card" id="formCard">
  <h3>🪪 Create ID Card</h3>

<input type="text" id="name" placeholder="Enter Name" class="input">
<input type="text" id="empId" placeholder="Employee ID" class="input">
<input type="text" id="desg" placeholder="Designation" class="input">

<label class="small">Upload Photo</label>
<input type="file" id="photo" accept="image/*" class="input">

<label class="small">Upload Signature</label>
<input type="file" id="sign" accept="image/*" class="input">

<button onclick="submitID()" class="btn-gen">Submit for Approval</button>

<div id="status" class="small">⚠️ Checking...</div>
</div>

<!-- ID CARD -->
<div class="card" id="idCard" style="display:none;">
<div class="id-box">

<h3>Company ID</h3>

<img id="previewPhoto" class="id-photo"><br><br>

<h3 id="cardName"></h3>
<p id="cardId"></p>
<p id="cardDesg"></p>

<br>
<img id="previewSign" class="sign-img">
<div class="small">Authorized Signature</div>

</div>
</div>
<div style="text-align:center; margin-top:10px;">
  <button onclick="editCard()" class="btn-gen" id="editBtn" style="display:none;">
    ✏️ Edit ID Card
  </button>
</div>
<script>

/* REWARD */
let present=18, leave=2, absent=1;
let points=(present*10)+(leave*5);
if(absent===0) points+=50;
if(absent<=1) points+=20;

let level="🥉 Bronze", progress=points/2;
if(points>=200){level="🥈 Silver";progress=(points-200)/3;}
if(points>=500){level="🥇 Gold";progress=(points-500)/5;}
if(points>=1000){level="💎 Platinum";progress=100;}

document.getElementById("points").innerText=points+" Points";
document.getElementById("level").innerText=level;
document.getElementById("progress").style.width=progress+"%";
document.getElementById("summary").innerText=
"Present: "+present+" | Leave: "+leave+" | Absent: "+absent;

/* SUBMIT */
async function submitID(){

let name=nameEl.value, empId=empIdEl.value, desg=desgEl.value;
let photo=photoEl.files[0], sign=signEl.files[0];

if(!photo||!sign){alert("Upload photo & signature");return;}

let p64=await toBase64(photo);
let s64=await toBase64(sign);

let user=localStorage.getItem("currentUser");

await fetch("https://script.google.com/macros/s/AKfycbwF3t1DXO_jyRDN-NoBZhRc-zbKOD4sjqs3ftiedS_hzbdm_KR1JL_UCBNyoeBrZsELFw/exec",{
method:"POST",
body:JSON.stringify({username:user,name,empId,designation:desg,photo:p64,signature:s64})
});

status.innerText="⏳ Pending Approval";
}

/* BASE64 */
function toBase64(f){
return new Promise(r=>{
let rd=new FileReader();
rd.onload=()=>r(rd.result);
rd.readAsDataURL(f);
});
}

/* CHECK APPROVAL */
async function checkApproval(){

let user=localStorage.getItem("currentUser");
if(!user) return;

try{

let res=await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT1-Gy_Ia2JDR0MSPQ18bwGVv3vCtt-Bf7YhxCTDghZtAOiaE-LMuNoVxLHrvSpM37nxHvYEljfGqgw/pub?output=csv&v="+Date.now());
let text=await res.text();

let rows=text.split("\n");

for(let i=1;i<rows.length;i++){

let row=rows[i].trim();

if(row.toLowerCase().includes(user.toLowerCase())){

if(row.toLowerCase().includes("approved")){
// ✅ hide form
document.getElementById("formCard").style.display = "none";

// ✅ show edit button
document.getElementById("editBtn").style.display = "block";
status.innerText="✅ Approved";

/* BASIC INFO */
let parts=row.split(",");
cardName.innerText=parts[1]||"";
cardId.innerText="ID: "+(parts[2]||"");
cardDesg.innerText=parts[3]||"";

/* IMAGES */
// 🔥 extract full base64 safely
let matches = row.match(/data:image\/[a-zA-Z]+;base64,[A-Za-z0-9+/=]+/g);

if(matches && matches.length > 0){
  document.getElementById("previewPhoto").src = matches[0];
}

if(matches && matches.length > 1){
  document.getElementById("previewSign").src = matches[1];
}

idCard.style.display="block";

}else{
status.innerText="⏳ Pending Approval";
  document.getElementById("formCard").style.display = "block";
document.getElementById("editBtn").style.display = "none";
  // reset UI
document.getElementById("idCard").style.display = "none";
document.getElementById("editBtn").style.display = "none";
document.getElementById("formCard").style.display = "block";
}

return;
}
}

status.innerText="⚠️ Not Found";

}catch(e){
status.innerText="Error loading";
console.log(e);
}
}

/* RUN */
checkApproval();

</script>
<script>
function editCard(){

// show form again
document.getElementById("formCard").style.display = "block";

// hide card
document.getElementById("idCard").style.display = "none";

// hide edit button
document.getElementById("editBtn").style.display = "none";

// update status
document.getElementById("status").innerText = "✏️ Edit and resubmit";

}
</script>
</body>
</html>
