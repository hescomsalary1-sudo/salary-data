<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info AI Chat</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.message {
  max-width: 75%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 15px;
  line-height: 1.4;
}

.user {
  background: #3b82f6;
  align-self: flex-end;
  margin-left: auto;
}

.bot {
  background: rgba(255,255,255,0.1);
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: rgba(255,255,255,0.05);
}

#userInput {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>🤖 Smart Info Assistant</header>

<div id="chatBox"></div>

<div id="inputArea">
  <input type="text" id="userInput" placeholder="Ask about app...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chatBox = document.getElementById("chatBox");

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = getBotReply(text.toLowerCase());
    addMessage(reply, "bot");
  }, 500);
}

function getBotReply(input) {

  // Restricted answers ONLY about your app

  if (input.includes("salary")) {
    return "You can check salary details in the Last Salary page.";
  }

  if (input.includes("attendance")) {
    return "Attendance data is available in the employee section.";
  }

  if (input.includes("id card")) {
    return "You can create or view ID cards from the ID Card page.";
  }

  if (input.includes("leave")) {
    return "Leave details are managed inside the employee panel.";
  }

  if (input.includes("help") || input.includes("how")) {
    return "Use the navbar to navigate between Salary, Forum, Resources, and Employee Info sections.";
  }

  if (input.includes("who are you")) {
    return "I am your app assistant. I only provide information related to this secure app.";
  }

  // Default restricted response
  return "Sorry, I can only answer questions related to this app.";
}

// Enter key support

document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

// Welcome message
addMessage("Hello! Ask me anything about this app.", "bot");
</script>

</body>
</html>
