<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart AI Assistant</title>

<style>
html, body{
  margin:0;
  height:100%;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  overflow:hidden; /* ❌ prevent page scroll */
  overscroll-behavior:none; /* ❌ disable pull refresh */
}

.wrapper{
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  padding:12px;
  text-align:center;
  background:rgba(255,255,255,.05);
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto; /* ✅ only chat scroll */
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  -webkit-overflow-scrolling:touch;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:14px;
  line-height:1.4;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.bot{
  background:rgba(255,255,255,.1);
}

#inputBar{
  display:flex;
  padding:10px;
  background:rgba(255,255,255,.05);
}

#input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  margin-left:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="wrapper">

<header>🤖 Smart App AI</header>

<div id="chat"></div>

<div id="inputBar">
<input id="input" placeholder="Ask about salary, attendance, leave...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
let chat=document.getElementById('chat');
let input=document.getElementById('input');

let state={module:null,step:null,data:{}};

function add(text,type){
  let d=document.createElement('div');
  d.className='msg '+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

async function send(){
  let text=input.value.trim();
  if(!text) return;

  add(text,'user');
  input.value='';

  let res=await process(text.toLowerCase());
  add(res,'bot');
}

input.addEventListener('keypress',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    send();
  }
});

// ===== AI ENGINE =====
async function process(q){

// detect module
if(!state.module){
  if(q.includes('salary')) state.module='salary';
  else if(q.includes('attendance')) state.module='attendance';
  else if(q.includes('leave')) state.module='leave';
  else if(q.includes('profile')||q.includes('name')) state.module='profile';
  else if(q.includes('income')) state.module='income';
  else if(q.includes('nomination')) state.module='nomination';
}

// ===== SALARY =====
if(state.module==='salary'){
  if(!state.step){state.step='year';return 'Enter year (e.g., 2026)';}
  if(state.step==='year'){state.data.year=q;state.step='month';return 'Enter month (1-12)';}

  if(state.step==='month'){
    state.data.month=q.padStart(2,'0');
    state.step=null;
    state.module=null;

    let user=localStorage.getItem('currentUser');
    let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/salary.csv');
    let txt=await res.text();
    let rows=txt.split('\n');

    for(let r of rows){
      let c=r.split(',');
      if(c[0]===user && c[1]===state.data.year && c[2]===state.data.month){
        let earn=0,ded=0;
        for(let i=3;i<=19;i++) earn+=+c[i];
        for(let i=20;i<=35;i++) ded+=+c[i];

        return `Salary ${state.data.month}-${state.data.year}\n\nEarnings ₹${earn}\nDeductions ₹${ded}\nNet ₹${earn-ded}`;
      }
    }

    return 'No salary data found';
  }
}

// ===== ATTENDANCE =====
if(state.module==='attendance'){
  if(!state.step){state.step='year';return 'Enter year';}
  if(state.step==='year'){state.data.year=q;state.step='month';return 'Enter month (Jan)';}

  if(state.step==='month'){
    let user=localStorage.getItem('currentUser');
    let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/attendance.csv');
    let txt=await res.text();
    let rows=txt.split('\n');

    let p=0,a=0,l=0;

    for(let r of rows){
      let c=r.split(',');
      if(c[0]===user && c[1]===state.data.year && c[2].toLowerCase()===q){
        for(let i=3;i<34;i++){
          if(c[i]==='P') p++;
          else if(c[i]==='A') a++;
          else if(c[i]) l++;
        }
      }
    }

    state.module=null;
    state.step=null;

    return `Attendance\nPresent: ${p}\nAbsent: ${a}\nLeave: ${l}`;
  }
}

// ===== OTHER MODULES =====
if(state.module==='leave'){state.module=null;return 'Check Leave Dashboard for EL, CL, FPL details.';}
if(state.module==='profile'){state.module=null;return 'Profile shows personal and service details.';}
if(state.module==='income'){state.module=null;return 'Other income shows arrears and bills.';}
if(state.module==='nomination'){state.module=null;return 'Nomination shows nominee details and share.';}

// ===== COMMON CHAT =====
if(q.includes('hi')||q.includes('hello')) return 'Hello 👋 How can I help you?';
if(q.includes('help')) return 'Ask about salary, attendance, leave, profile or income.';

return 'Please ask something related to your app.';
}

add('Hello 👋 Ask me anything about your app.','bot');

</script>

</body>
</html>
