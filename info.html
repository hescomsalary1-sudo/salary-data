<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden; /* no page scroll */
  font-family: Segoe UI;
  background: #0f172a;
  color: white;
}

/* HEADER */
#header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: #1e293b;
  text-align: center;
  line-height: 50px;
  font-weight: bold;
}

/* 🔥 CHAT SCROLL AREA */
#chat {
  position: absolute;
  top: 50px;
  bottom: 60px;
  left: 0;
  right: 0;
  overflow-y: auto;
  padding: 10px;
  -webkit-overflow-scrolling: touch;
}

/* MESSAGE */
.msg {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #3b82f6;
  margin-left: auto;
}

.bot {
  background: #334155;
}

/* INPUT */
#inputBar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  display: flex;
  padding: 10px;
  background: #1e293b;
}

#input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  margin-left: 6px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div id="header">🤖 Smart AI Assistant</div>

<div id="chat"></div>

<div id="inputBar">
  <input id="input" placeholder="Ask about salary, attendance...">
  <button onclick="send()">Send</button>
</div>

<script>
let chat = document.getElementById("chat");
let input = document.getElementById("input");

let state = { module:null, step:null, data:{} };

/* ADD MESSAGE */
function add(text, type){
  let d = document.createElement("div");
  d.className = "msg " + type;
  d.innerText = text;
  chat.appendChild(d);

  chat.scrollTop = chat.scrollHeight;
}

/* SEND */
async function send(){
  let text = input.value.trim();
  if(!text) return;

  add(text, "user");
  input.value = "";

  let reply = await process(text.toLowerCase());
  add(reply, "bot");
}

input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

/* ================= AI LOGIC ================= */

async function process(q){

// detect module
if(!state.module){
  if(q.includes("salary")) state.module="salary";
  else if(q.includes("attendance")) state.module="attendance";
  else if(q.includes("leave")) state.module="leave";
  else if(q.includes("profile")||q.includes("name")) state.module="profile";
  else if(q.includes("income")) state.module="income";
  else if(q.includes("nomination")) state.module="nomination";
}

// ===== SALARY =====
if(state.module==="salary"){
  if(!state.step){ state.step="year"; return "Enter year (e.g., 2026)"; }
  if(state.step==="year"){ state.data.year=q; state.step="month"; return "Enter month (1-12)"; }

  if(state.step==="month"){
    state.data.month=q.padStart(2,"0");
    state.module=null; state.step=null;

    let user=localStorage.getItem("currentUser");

    let res=await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary.csv");
    let txt=await res.text();
    let rows=txt.split("\\n");

    for(let r of rows){
      let c=r.split(",");
      if(c[0]===user && c[1]===state.data.year && c[2]===state.data.month){
        let earn=0, ded=0;
        for(let i=3;i<=19;i++) earn+=+c[i];
        for(let i=20;i<=35;i++) ded+=+c[i];

        return `Salary ${state.data.month}-${state.data.year}\n\nEarnings ₹${earn}\nDeductions ₹${ded}\nNet ₹${earn-ded}`;
      }
    }

    return "No salary data found";
  }
}

// ===== ATTENDANCE =====
if(state.module==="attendance"){
  if(!state.step){ state.step="year"; return "Enter year"; }
  if(state.step==="year"){ state.data.year=q; state.step="month"; return "Enter month (Jan)"; }

  if(state.step==="month"){
    let user=localStorage.getItem("currentUser");

    let res=await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
    let txt=await res.text();
    let rows=txt.split("\\n");

    let p=0,a=0,l=0;

    for(let r of rows){
      let c=r.split(",");
      if(c[0]===user && c[1]===state.data.year && c[2].toLowerCase()===q){
        for(let i=3;i<34;i++){
          if(c[i]==="P") p++;
          else if(c[i]==="A") a++;
          else if(c[i]) l++;
        }
      }
    }

    state.module=null; state.step=null;

    return `Attendance\nPresent: ${p}\nAbsent: ${a}\nLeave: ${l}`;
  }
}

// ===== OTHER MODULES =====
if(state.module==="leave"){ state.module=null; return "Check Leave Dashboard"; }
if(state.module==="profile"){ state.module=null; return "Open profile page"; }
if(state.module==="income"){ state.module=null; return "Check Other Income"; }
if(state.module==="nomination"){ state.module=null; return "Open nomination page"; }

// ===== COMMON CHAT =====
if(q.includes("hi")||q.includes("hello")) return "Hello 👋";
if(q.includes("help")) return "Ask about salary, attendance, leave, profile";

return "Ask something related to your app";
}

/* ================= REFRESH BLOCK (ONLY CHAT) ================= */

let startY = 0;

chat.addEventListener("touchstart", function(e){
  startY = e.touches[0].clientY;
}, { passive:false });

chat.addEventListener("touchmove", function(e){
  let currentY = e.touches[0].clientY;

  let isTop = chat.scrollTop === 0;
  let pullingDown = currentY > startY;

  if(isTop && pullingDown){
    e.preventDefault(); // 🚫 block refresh only here
  }
}, { passive:false });

/* welcome */
add("Hello 👋 Ask me anything about your app", "bot");
</script>

</body>
</html>
