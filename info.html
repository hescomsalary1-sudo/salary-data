<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI Assistant</title>

<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;height:100vh;display:flex;flex-direction:column}
header{padding:12px;text-align:center;font-weight:bold;background:rgba(255,255,255,.05)}
#chat{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column}
.msg{max-width:80%;padding:10px;border-radius:14px;margin:6px 0}
.user{background:#3b82f6;align-self:flex-end}
.bot{background:rgba(255,255,255,.1)}
#inputBar{display:flex;padding:10px;background:rgba(255,255,255,.05)}
#input{flex:1;padding:10px;border-radius:10px;border:none}
button{margin-left:6px;padding:10px;border:none;border-radius:10px;background:#22c55e;color:white}
</style>
</head>
<body>

<header>⚡ Smart Assistant</header>
<div id="chat"></div>
<div id="inputBar">
<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>
</div>

<script>
let chat=document.getElementById('chat');
let input=document.getElementById('input');

let state={mode:null,data:{}};

function add(t,type){let d=document.createElement('div');d.className='msg '+type;d.innerText=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}

async function send(){
let text=input.value.trim();
if(!text) return;
add(text,'user');
input.value='';

let response = await process(text.toLowerCase());
add(response,'bot');
}

input.addEventListener('keypress',e=>{if(e.key==='Enter') send()});

async function process(q){

// ===== SALARY FLOW =====
if(q.includes('salary') && !state.mode){
state.mode='salary_year';
return 'Please enter year (e.g., 2026)';
}

if(state.mode==='salary_year'){
state.data.year=q;
state.mode='salary_month';
return 'Enter month number (1-12)';
}

if(state.mode==='salary_month'){
state.data.month=q.padStart(2,'0');
state.mode=null;

let user=localStorage.getItem('currentUser');
let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/salary .csv');
let txt=await res.text();
let rows=txt.split('\n');

for(let i=1;i<rows.length;i++){
let c=rows[i].split(',');
if(c[0]===user && c[1]===state.data.year && c[2]===state.data.month){
let net=0;
for(let j=3;j<=19;j++) net+=+c[j];
for(let j=20;j<=35;j++) net-=+c[j];
return `Net Salary for ${state.data.month}-${state.data.year} is ₹${net}`;
}
}
return 'No salary data found';
}

// ===== ATTENDANCE FLOW =====
if(q.includes('attendance') && !state.mode){
state.mode='att_year';
return 'Enter year';
}

if(state.mode==='att_year'){
state.data.year=q;
state.mode='att_month';
return 'Enter month (Jan, Feb...)';
}

if(state.mode==='att_month'){
let user=localStorage.getItem('currentUser');
let res=await fetch('https://hescomsalary1-sudo.github.io/salary-data/attendance.csv');
let txt=await res.text();
let rows=txt.split('\n');

let p=0,a=0,l=0;
for(let i=1;i<rows.length;i++){
let c=rows[i].split(',');
if(c[0]===user && c[1]===state.data.year && c[2].toLowerCase()===q){
for(let j=3;j<34;j++){
if(c[j]==='P')p++; else if(c[j]==='A')a++; else if(c[j])l++;
}
}
}
state.mode=null;
return `Present: ${p}, Absent: ${a}, Leave: ${l}`;
}

// ===== LEAVE =====
if(q.includes('leave')){
return 'Open Leave Dashboard to see EL, CL, FPL balance and details.';
}

// ===== PROFILE =====
if(q.includes('profile')||q.includes('name')){
return 'Profile page shows your personal and service details.';
}

// ===== INCOME =====
if(q.includes('income')){
return 'Check Other Income page for arrears and bills.';
}

return 'Ask about salary, attendance, leave, profile or income.';
}

add('Hello 👋 Ask me anything about your data.','bot');
</script>

</body>
</html>
