<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden; /* 🚫 prevent refresh */
  font-family: Segoe UI;
}

/* Header */
.header {
  height: 55px;
  line-height: 55px;
  text-align: center;
  background: #1e293b;
  color: white;
  font-weight: bold;
}

/* iframe container */
.container {
  position: absolute;
  top: 55px;
  bottom: 0;
  left: 0;
  right: 0;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="header">🤖 Smart AI Assistant</div>

<div class="container">
  <iframe src="chat.html"></iframe>
</div>

</body>
</html>
