<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Secure AI - HESCOM</title>
<style>
body {
    font-family: -apple-system, Segoe UI, sans-serif;
    background: #f4f7f6;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* HEADER */
#header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 55px;
    background: #2400b7;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    z-index: 1000;
}

/* CHAT */
#chat-container {
    flex: 1;
    padding: 20px;
    margin-top: 55px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding-bottom: 80px;
}

.message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 15px;
    font-size: 15px;
    line-height: 1.4;
}

.user {
    align-self: flex-end;
    background: #2400b7;
    color: white;
}

.ai {
    align-self: flex-start;
    background: white;
    color: #333;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* INPUT area fixed at bottom */
#input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px;
    display: flex;
    box-sizing: border-box;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ddd;
    outline: none;
}

button {
    background: #2400b7;
    color: white;
    border: none;
    padding: 0 20px;
    margin-left: 10px;
    border-radius: 25px;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="header">💬 Chat with Secure AI</div>

<div id="chat-container"></div>

<form id="input-area" onsubmit="sendMessage(event)">
    <input id="msgInput" placeholder="Ask anything..." autocomplete="off">
    <button>Send</button>
</form>

<script>
const container = document.getElementById("chat-container");
const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";
const nominationAPI = "https://script.google.com/macros/s/AKfycbzYMFFE-KfL5JamBrzIUC6oOCqP5eynVS3ksV2kkF-dY6g4J1Y08qdAQKErGg64qNS1BQ/exec";

let state = { module: null, step: null, data: {} };

/* UI - SCROLLING LOGIC PICKED FROM REFERENCE */
function addMessage(t, type) {
    let d = document.createElement("div");
    d.className = "message " + type;
    d.innerHTML = t;
    container.appendChild(d);
    
    // SCROLLING CODE FROM REFERENCE:
    window.scrollTo(0, document.body.scrollHeight);
}

/* SEND LOGIC */
async function sendMessage(e) {
    e.preventDefault();
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // Process through AI
    let reply = await AI_ENGINE(text.toLowerCase());

    setTimeout(() => {
        addMessage(reply, "ai");
    }, 300);
}

/* ================= AI ENGINE (Integrated) ================= */
async function AI_ENGINE(q) {
    const user = localStorage.getItem("currentUser");

    if (!state.module) {
        if (q.includes("salary") || q.includes("pay")) state.module = "salary";
        else if (q.includes("attendance") || q.includes("present")) state.module = "attendance";
        else if (q.includes("leave") || q.includes("balance")) state.module = "leave";
        else if (q.includes("nominee") || q.includes("nomination")) state.module = "nominee";
        else if (q.includes("profile") || q.includes("joined")) state.module = "profile";
    }

    if (state.module === "salary") return await SALARY_MODULE(q, user);
    if (state.module === "attendance") return await ATTENDANCE_MODULE(q, user);
    if (state.module === "leave") return await LEAVE_MODULE(q, user);
    if (state.module === "nominee") return await NOMINEE_MODULE(q, user);
    if (state.module === "profile") return await PROFILE_MODULE(q, user);

    return COMMON_CHAT(q);
}

/* MODULES PULLING DATA FROM YOUR SHARED FILES */
async function SALARY_MODULE(q, user) {
    if (!state.step) { state.step = "year"; return "Which year? (e.g. 2026)"; }
    if (state.step === "year") { state.data.year = q; state.step = "month"; return "Enter month (01-12):"; }
    if (state.step === "month") {
        state.data.month = q.padStart(2, "0");
        let res = await fetch(baseURL + "salary .csv");
        let rows = (await res.text()).split("\n");
        state.module = null; state.step = null;
        for (let r of rows) {
            let c = r.split(",");
            if (c[0] === user && c[1] === state.data.year && c[2] === state.data.month) {
                return `💰 **Salary Record:**<br>Basic: ₹${c[3]}<br>Gross Earned: ₹${c[19]}`;
            }
        }
        return "No salary data found for " + state.data.month + "/" + state.data.year;
    }
}

async function ATTENDANCE_MODULE(q, user) {
    if (!state.step) { state.step = "year"; return "Enter Year:"; }
    if (state.step === "year") { state.data.year = q; state.step = "month"; return "Enter Month (Jan/Feb):"; }
    if (state.step === "month") {
        let res = await fetch(baseURL + "attendance.csv");
        let rows = (await res.text()).split("\n");
        let p=0, a=0, l=0;
        state.module = null; state.step = null;
        for (let r of rows) {
            let c = r.split(",");
            if (c[0] === user && c[1] === state.data.year && c[2].toLowerCase().includes(q.substring(0,3))) {
                for (let i=3; i<34; i++) { if (c[i] === "P") p++; else if (c[i] === "A") a++; else if (c[i] && c[i]!=="") l++; }
                return `📊 **Attendance:**<br>Present: ${p}<br>Absent: ${a}<br>Leave: ${l}`;
            }
        }
        return "No attendance records found.";
    }
}

async function LEAVE_MODULE(q, user) {
    state.module = null;
    let res = await fetch(baseURL + "leaves.csv");
    let rows = (await res.text()).split("\n");
    for (let r of rows) {
        let c = r.split(",");
        if (c[0].trim() === user) return `📅 **Leave Credits:**<br>EL: ${c[3]} | FPL: ${c[4]} | CL: ${c[5]}`;
    }
    return "Leave data not found.";
}

async function NOMINEE_MODULE(q, user) {
    state.module = null;
    try {
        let res = await fetch(nominationAPI + "?user=" + user);
        let data = await res.json();
        if (data.length > 0) return `👥 **Nominees:**<br>` + data.map(n => `• ${n.name} (${n.share}%)`).join("<br>");
    } catch(e) { return "Error loading nominees."; }
    return "No records found.";
}

async function PROFILE_MODULE(q, user) {
    state.module = null;
    let res = await fetch(baseURL + "employee.csv");
    let rows = (await res.text()).split("\n");
    for (let r of rows) {
        let c = r.split(",");
        if (c[0].trim() === user) return `👤 **Profile:**<br>Designation: ${c[2]}<br>Joining: ${c[18]}<br>Retirement: ${c[6]}`;
    }
    return "Profile not found.";
}

function COMMON_CHAT(q) {
    if (q.includes("hi") || q.includes("hello")) return "Hello 👋 How can I assist you today?";
    return "I'm your Secure AI. Ask me about salary, attendance, or leaves!";
}

/* START */
addMessage("Hello 👋 I am your Secure AI assistant.","ai");

// BACK NAVIGATION
history.pushState(null, null, location.href);
window.onpopstate = function () { window.location.replace("home.html"); };
</script>
</body>
</html>
