<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Center</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

.header { text-align:center; padding:20px; font-size:20px; font-weight:bold; }

.card {
  background: rgba(255,255,255,0.08);
  margin: 15px;
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
}

.input {
  width:100%; padding:10px; margin:6px 0;
  border:none; border-radius:10px;
}

.btn-gen {
  width:100%; padding:10px; margin-top:10px;
  border:none; border-radius:10px;
  background: linear-gradient(135deg,#0f9d58,#34a853);
  color:white; font-weight:bold;
}

.id-box {
  background:white; color:#000;
  padding:15px; border-radius:15px;
  width:220px; margin:auto; text-align:center;
}

.id-photo {
  width:90px; height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #0f9d58;
}

.sign-img {
  width:130px; height:60px;
  object-fit:contain;
  background:#fff;
  padding:3px;
  border-radius:5px;
}

.small { font-size:13px; opacity:0.8; }
</style>
</head>

<body>

<div class="header">⚡ Info Center</div>

<!-- FORM -->
<div class="card" id="formCard">

<h3>🪪 Create ID Card</h3>

<input type="text" id="name" placeholder="Enter Name" class="input">
<input type="text" id="empId" placeholder="Employee ID" class="input">
<input type="text" id="desg" placeholder="Designation" class="input">

<label class="small">Upload Photo</label>
<input type="file" id="photo" accept="image/*" class="input">

<label class="small">Upload Signature</label>
<input type="file" id="sign" accept="image/*" class="input">

<button onclick="submitID()" class="btn-gen">Submit</button>

<div id="status" class="small">⚠️ Checking...</div>

</div>

<!-- ID CARD -->
<div class="card" id="idCard" style="display:none;">
<div class="id-box">

<h3>Company ID</h3>

<img id="previewPhoto" class="id-photo"><br><br>

<h3 id="cardName"></h3>
<p id="cardId"></p>
<p id="cardDesg"></p>

<br>
<img id="previewSign" class="sign-img">
<div class="small">Authorized Signature</div>

</div>

<div style="text-align:center; margin-top:10px;">
<button onclick="editCard()" class="btn-gen" id="editBtn" style="display:none;">
✏️ Edit ID Card
</button>
</div>

</div>

<script>

/* BASE64 */
function toBase64(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
});
}

/* SUBMIT */
async function submitID(){

let name=document.getElementById("name").value;
let empId=document.getElementById("empId").value;
let desg=document.getElementById("desg").value;

let photo=document.getElementById("photo").files[0];
let sign=document.getElementById("sign").files[0];

if(!photo || !sign){
alert("Upload photo & signature");
return;
}

let p64=await toBase64(photo);
let s64=await toBase64(sign);

let user=localStorage.getItem("currentUser");

await fetch("YOUR_APPSCRIPT_URL",{
method:"POST",
body:JSON.stringify({
username:user,
name:name,
empId:empId,
designation:desg,
photo:p64,
signature:s64
})
});

document.getElementById("status").innerText="⏳ Pending Approval";

/* reset UI */
document.getElementById("idCard").style.display="none";
document.getElementById("editBtn").style.display="none";
document.getElementById("formCard").style.display="block";
}

/* CHECK APPROVAL */
async function checkApproval(){

let user=localStorage.getItem("currentUser");
if(!user) return;

try{

let res=await fetch("YOUR_CSV_URL&v="+Date.now());
let text=await res.text();

let rows=text.split("\n");

for(let i=1;i<rows.length;i++){

let row=rows[i].trim();

if(row.toLowerCase().includes(user.toLowerCase())){

if(row.toLowerCase().includes("approved")){

document.getElementById("status").innerText="✅ Approved";

/* hide form */
document.getElementById("formCard").style.display="none";

/* show card */
document.getElementById("idCard").style.display="block";
document.getElementById("editBtn").style.display="block";

/* basic data */
let parts=row.split(",");
cardName.innerText=parts[1]||"";
cardId.innerText="ID: "+(parts[2]||"");
cardDesg.innerText=parts[3]||"";

/* images */
let imgs=row.match(/data:image\/[a-zA-Z]+;base64,[A-Za-z0-9+/=]+/g);

if(imgs){
previewPhoto.src=imgs[0];
previewSign.src=imgs[1];
}

}else{

document.getElementById("status").innerText="⏳ Pending Approval";
document.getElementById("formCard").style.display="block";
}

return;
}
}

document.getElementById("status").innerText="⚠️ Not Found";

}catch(e){
document.getElementById("status").innerText="Error loading";
console.log(e);
}

}

/* EDIT */
function editCard(){

document.getElementById("formCard").style.display="block";
document.getElementById("idCard").style.display="none";
document.getElementById("editBtn").style.display="none";

document.getElementById("status").innerText="✏️ Edit and resubmit";

}

/* RUN */
checkApproval();

</script>

</body>
</html>
