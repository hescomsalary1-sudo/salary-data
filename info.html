<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Assistant</title>

<style>
html, body{
  margin:0;
  height:100%;
  overflow:hidden; /* prevent full page scroll */
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.wrapper{
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  padding:12px;
  text-align:center;
  background:rgba(255,255,255,.05);
}

.chat-container{
  flex:1;
  overflow-y:auto; /* ✅ ONLY THIS SCROLLS */
  padding:12px;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:14px;
  margin:6px 0;
}
.user{background:#3b82f6;margin-left:auto}
.bot{background:rgba(255,255,255,.1)}

#inputBar{
  display:flex;
  padding:10px;
  background:rgba(255,255,255,.05);
}

#input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-left:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>
</head>
<body>

<div class="wrapper">

<header>🤖 AI Assistant</header>

<div id="chat" class="chat-container"></div>

<div id="inputBar">
<input id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
let chat=document.getElementById('chat');
let input=document.getElementById('input');

function add(t,type){
  let d=document.createElement('div');
  d.className='msg '+type;
  d.innerText=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight; /* auto scroll */
}

async function send(){
  let text=input.value.trim();
  if(!text) return;
  add(text,'user');
  input.value='';
  add('Processing...','bot');
}

input.addEventListener('keypress',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    send();
  }
});

add('Now scrolling will work perfectly 👍','bot');
</script>

</body>
</html>
