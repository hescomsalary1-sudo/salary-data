<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Chat</title>

<style>
/* SAME DESIGN */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background-color: #f4f7f6;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

#chat-container {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding-bottom: 80px;
}

.message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 15px;
    font-size: 15px;
}

.user {
    align-self: flex-end;
    background-color: #2400b7;
    color: white;
}

.ai {
    align-self: flex-start;
    background-color: white;
    color: #333;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

#input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px;
    display: flex;
    box-sizing: border-box;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ddd;
}

button {
    background: #2400b7;
    color: white;
    border: none;
    padding: 0 20px;
    margin-left: 10px;
    border-radius: 25px;
}
</style>
</head>

<body>

<div id="chat-container"></div>

<form id="input-area" onsubmit="sendMessage(event)">
<input type="text" id="msgInput" placeholder="Ask anything..." autocomplete="off">
<button type="submit">Send</button>
</form>

<script>
const container = document.getElementById('chat-container');

let state = { module:null, step:null, data:{} };

/* ================= UI ================= */

function addMessage(text, type){
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerText = text;
    container.appendChild(div);
}

function scrollBottom(){
    window.scrollTo(0, document.body.scrollHeight);
}

/* ================= MAIN SEND ================= */

async function sendMessage(e){
    e.preventDefault();

    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text) return;

    addMessage(text,'user');
    input.value="";
    scrollBottom();

    let reply = await AI_ENGINE(text.toLowerCase());

    setTimeout(()=>{
        addMessage(reply,'ai');
        scrollBottom();
    },400);
}

/* ================= AI ENGINE ================= */

async function AI_ENGINE(q){

/* ===== MODULE DETECTION ===== */
if(!state.module){
    if(q.includes("salary")) state.module="salary";
    else if(q.includes("attendance")) state.module="attendance";
    else if(q.includes("leave")) state.module="leave";
    else if(q.includes("profile")||q.includes("name")) state.module="profile";
    else if(q.includes("income")) state.module="income";
    else if(q.includes("nomination")) state.module="nomination";
}

/* ===== CALL MODULE ===== */
if(state.module==="salary") return await SALARY_MODULE(q);
if(state.module==="attendance") return await ATTENDANCE_MODULE(q);
if(state.module==="leave") return LEAVE_MODULE(q);
if(state.module==="profile") return PROFILE_MODULE(q);
if(state.module==="income") return INCOME_MODULE(q);
if(state.module==="nomination") return NOMINATION_MODULE(q);

/* ===== COMMON ===== */
return COMMON_CHAT(q);
}

/* ================= MODULES ================= */

/* 🔥 SALARY MODULE */
async function SALARY_MODULE(q){

if(!state.step){ state.step="year"; return "Enter year (e.g., 2026)"; }
if(state.step==="year"){ state.data.year=q; state.step="month"; return "Enter month (1-12)"; }

if(state.step==="month"){
    state.data.month=q.padStart(2,"0");
    state.module=null; state.step=null;

    let user=localStorage.getItem("currentUser");

    let res=await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary.csv");
    let txt=await res.text();
    let rows=txt.split("\\n");

    for(let r of rows){
        let c=r.split(",");
        if(c[0]===user && c[1]===state.data.year && c[2]===state.data.month){
            let earn=0, ded=0;
            for(let i=3;i<=19;i++) earn+=+c[i];
            for(let i=20;i<=35;i++) ded+=+c[i];

            return `Salary ${state.data.month}-${state.data.year}
Earnings ₹${earn}
Deductions ₹${ded}
Net ₹${earn-ded}`;
        }
    }

    return "No salary data found";
}
}

/* 🔥 ATTENDANCE MODULE */
async function ATTENDANCE_MODULE(q){

if(!state.step){ state.step="year"; return "Enter year"; }
if(state.step==="year"){ state.data.year=q; state.step="month"; return "Enter month (Jan)"; }

if(state.step==="month"){
    let user=localStorage.getItem("currentUser");

    let res=await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
    let txt=await res.text();

    let rows=txt.split("\\n");
    let p=0,a=0,l=0;

    for(let r of rows){
        let c=r.split(",");
        if(c[0]===user && c[1]===state.data.year && c[2].toLowerCase()===q){
            for(let i=3;i<34;i++){
                if(c[i]==="P") p++;
                else if(c[i]==="A") a++;
                else if(c[i]) l++;
            }
        }
    }

    state.module=null; state.step=null;
    return `Attendance
Present: ${p}
Absent: ${a}
Leave: ${l}`;
}
}

/* 🔥 LEAVE MODULE */
function LEAVE_MODULE(q){
state.module=null;
return "Leave dashboard shows EL, CL, FPL balances and history.";
}

/* 🔥 PROFILE MODULE */
function PROFILE_MODULE(q){
state.module=null;
return "Profile includes personal details, designation and service info.";
}

/* 🔥 INCOME MODULE */
function INCOME_MODULE(q){
state.module=null;
return "Other income shows arrears, bills and payment status.";
}

/* 🔥 NOMINATION MODULE */
function NOMINATION_MODULE(q){
state.module=null;
return "Nomination shows nominee details and share percentage.";
}

/* ================= COMMON CHAT ================= */

function COMMON_CHAT(q){

if(q.includes("hi")||q.includes("hello")) return "Hello 👋 How can I help you?";
if(q.includes("how are you")) return "I am your smart assistant 😊";
if(q.includes("what can you do")) return "I can help with salary, attendance, leave, profile and more.";
if(q.includes("thank")) return "You're welcome 👍";
if(q.includes("help")) return "Try: salary, attendance, leave, income, profile.";
if(q.includes("who are you")) return "I am your app AI assistant.";

return "Please ask about your app (salary, attendance, leave, etc.)";
}

/* ================= START ================= */

addMessage("Hello 👋 I am your smart assistant. Ask anything about your app.","ai");
scrollBottom();

</script>

</body>
</html>
