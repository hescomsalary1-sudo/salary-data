<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

header{
  height:50px;
  line-height:50px;
  text-align:center;
  background:#1e293b;
  font-weight:bold;
}

#chat{
  position:fixed;
  top:50px;
  bottom:60px;
  left:0;
  right:0;
  overflow-y:scroll;   /* 🔥 FORCE SCROLL */
  padding:10px;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:12px;
  margin:6px 0;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.bot{
  background:#334155;
}

#inputBar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  padding:10px;
  background:#1e293b;
}

#input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-left:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>
</head>
<body>

<header>AI Assistant</header>

<div id="chat"></div>

<div id="inputBar">
<input id="input" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

<script>
let chat=document.getElementById('chat');
let input=document.getElementById('input');

function add(text,type){
  let d=document.createElement('div');
  d.className='msg '+type;
  d.innerText=text;
  chat.appendChild(d);
}

function send(){
  let text=input.value.trim();
  if(!text) return;
  add(text,'user');
  input.value='';
  add('Reply coming...','bot');
}

// TEST: add many messages to confirm scroll works
for(let i=1;i<=30;i++){
  add('Old message '+i,'bot');
}
</script>
<script>
let startY = 0;

document.addEventListener("touchstart", function(e){
  startY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener("touchmove", function(e){
  let currentY = e.touches[0].clientY;

  // if pulling down from top → block it
  if (currentY > startY && document.getElementById("chat").scrollTop === 0) {
    e.preventDefault();  // 🚫 STOP REFRESH
  }
}, { passive: false });
</script>
</body>
</html>
