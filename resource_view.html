<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Records</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
        font-family: Arial, sans-serif;
        color: blue;
    }

    .container {
        text-align: center;
        animation: fadeIn 0.8s ease-in-out;
    }

    .icon {
        font-size: 60px;
        margin-bottom: 15px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 8px;
    }

    p {
        font-size: 25px;
        color: red;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="icon">📄</div>
    <h1>No Records Found</h1>
    <p>It will be updated soon</p>
</div>

</body>
</html>
