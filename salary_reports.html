<!DOCTYPE html>
<html>
<head>
<title>Salary Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f4f4f9;
}

/* HEADER */
.top{
padding:18px;
background:#4b2dd8;
color:white;
border-radius:0 0 25px 25px;
text-align:center;
}

/* CONTENT */
.content{
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:15px;
}

/* INPUT */
select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4b2dd8;
color:white;
font-weight:bold;
border:none;
cursor:pointer;
}

/* TABLE */
.table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.table td{
padding:8px;
border-bottom:1px solid #eee;
font-size:14px;
}

.amount{
text-align:right;
font-weight:600;
}

/* RESULT BOX */
.resultBox{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
margin-top:15px;
}

/* TOTAL */
.total{
font-weight:bold;
color:#4b2dd8;
}

/* LOADER */
#loader{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">
<h3>💰 Salary Reports</h3>
</div>

<div class="content">

<div class="card">
<label>Select Year</label>
<select id="year"></select>

<button onclick="generateReport()">Generate Report</button>
</div>

<div id="result"></div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<script>

const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";

/* LOAD CSV */
async function loadCSV(file){
let res = await fetch(baseURL + file);
let text = await res.text();
text = text.replace(/^\uFEFF/, '');
return text.trim().split("\n").map(r => r.split(","));
}

/* INIT YEAR */
async function init(){

let user = localStorage.getItem("currentUser")?.trim();
let role = localStorage.getItem("role");

let data = await loadCSV("salary%20.csv");

let years = new Set();

data.slice(1).forEach(r=>{
let u = r[0]?.trim();
let y = r[1]?.trim();

if(role !== "admin" && u !== user) return;
if(y) years.add(y);
});

year.innerHTML="";
years.forEach(y=> year.innerHTML += `<option>${y}</option>`);

}
init();

/* REPORT */
async function generateReport(){

loader.style.display="flex";

let user = localStorage.getItem("currentUser")?.trim();
let role = localStorage.getItem("role");
let selectedYear = year.value;

let salary = await loadCSV("salary%20.csv");

let files = {
"TA Bills":"ta_bills.csv",
"Supplementary":"supplementary.csv",
"Medical":"medical_bills.csv",
"ELS":"els_bills.csv",
"Double Wages":"double_wages.csv",
"DA Arrears":"da_arrears.csv",
"Others":"others.csv"
};

let totalSalary = 0;
let totalTax = 0;

/* SALARY */
salary.slice(1).forEach(r=>{

let u = r[0]?.trim();
let y = r[1]?.trim();

if(role !== "admin" && u !== user) return;
if(y !== selectedYear) return;

/* earnings */
for(let j=3;j<=19;j++){
totalSalary += Number(r[j] || 0);
}

/* Income Tax (index 21) */
totalTax += Number(r[21] || 0);

});

/* BILLS */
let billRows = "";
let totalBills = 0;

for(let key in files){

let data = await loadCSV(files[key]);

let sum = 0;

data.slice(1).forEach(r=>{

let u = r[0]?.trim();
let y = r[1]?.trim();
let amount = Number(r[2] || 0);

if(role !== "admin" && u !== user) return;
if(y !== selectedYear) return;

sum += amount;

});

totalBills += sum;

billRows += `
<tr>
<td>${key}</td>
<td class="amount">₹${sum.toFixed(2)}</td>
</tr>`;
}

/* FINAL */
let totalIncome = totalSalary + totalBills;

/* DISPLAY */

result.innerHTML = `

<div class="resultBox">

<table class="table">

<tr><td>Salary Earnings</td><td class="amount">₹${totalSalary.toFixed(2)}</td></tr>

${billRows}

<tr class="total"><td>Total Other Earnings</td><td class="amount">₹${totalBills.toFixed(2)}</td></tr>

<tr class="total"><td>Total Income</td><td class="amount">₹${totalIncome.toFixed(2)}</td></tr>

<tr><td>Income Tax</td><td class="amount">₹${totalTax.toFixed(2)}</td></tr>

</table>

</div>

`;

loader.style.display="none";

}

</script>

</body>
</html>
