<!DOCTYPE html>
<html lang="en">
<head>
    <title>Salary Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #4b2dd8;
            --primary-light: #7a5cff;
            --bg: #f8f9fd;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER */
        .top {
            padding: 25px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-radius: 0 0 30px 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(75, 45, 216, 0.2);
        }

        .top h3 { margin: 0; font-weight: 600; letter-spacing: 0.5px; }

        .content { padding: 20px; }

        /* MODERN YEAR SELECTOR (CHIPS) */
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
            margin-bottom: 20px;
        }

        .label-text {
            font-size: 14px;
            font-weight: 600;
            color: #636e72;
            margin-bottom: 12px;
            display: block;
        }

        .year-chips {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 2px 15px 2px;
            scrollbar-width: none;
        }
        .year-chips::-webkit-scrollbar { display: none; }

        .chip {
            padding: 12px 24px;
            background: #f0edff;
            color: var(--primary);
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .chip.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 15px rgba(75, 45, 216, 0.3);
            transform: translateY(-2px);
        }

        /* TABLE & RESULTS */
        .resultBox {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            margin-top: 10px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .table { width: 100%; border-collapse: collapse; }

        .table td {
            padding: 16px 0;
            border-bottom: 1px solid #f1f2f6;
            font-size: 14px;
        }

        .amount { text-align: right; font-weight: 700; color: #2d3436; }

        .total-row {
            font-weight: bold;
            color: var(--primary);
        }
        
        .total-row td { border-bottom: none; padding: 18px 10px; border-radius: 12px; }

        .tax-cell { color: #d63031; }

        /* LOADER */
        #loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            justify-content: center; align-items: center; z-index: 9999;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>

<body>

<div class="top">
    <h3>💰 Salary Reports</h3>
</div>

<div class="content">
    <div class="card">
        <span class="label-text">Select Year to View Report</span>
        <div class="year-chips" id="yearContainer"></div>
        <input type="hidden" id="year">
    </div>

    <div id="result"></div>
</div>

<div id="loader"><div class="spinner"></div></div>

<script>
const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";

async function loadCSV(file){
    try {
        let res = await fetch(baseURL + file);
        let text = await res.text();
        text = text.replace(/^\uFEFF/, '');
        return text.trim().split("\n").map(r => r.split(","));
    } catch(e) { return []; }
}

async function init(){
    let user = localStorage.getItem("currentUser")?.trim();
    let role = localStorage.getItem("role");
    let data = await loadCSV("salary%20.csv");
    let years = new Set();

    data.slice(1).forEach(r=>{
        let u = r[0]?.trim();
        let y = r[1]?.trim();
        if(role !== "admin" && u !== user) return;
        if(y) years.add(y);
    });

    const container = document.getElementById("yearContainer");
    const hiddenInput = document.getElementById("year");
    container.innerHTML = "";
    
    const sortedYears = Array.from(years).sort((a,b) => b - a);

    sortedYears.forEach((y, index) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerText = y;
        
        chip.onclick = function() {
            if(this.classList.contains('active')) return;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            hiddenInput.value = y;
            generateReport(); // Trigger automatically
        };
        
        container.appendChild(chip);

        // Auto-load the first year on startup
        if(index === 0) {
            chip.classList.add('active');
            hiddenInput.value = y;
            generateReport();
        }
    });
}
init();

async function generateReport(){
    const loader = document.getElementById("loader");
    const result = document.getElementById("result");
    const selectedYear = document.getElementById("year").value;

    if(!selectedYear) return;

    loader.style.display="flex";

    let user = localStorage.getItem("currentUser")?.trim();
    let role = localStorage.getItem("role");

    let salary = await loadCSV("salary%20.csv");

    let files = {
        "TA Bills":"ta_bills.csv",
        "Supplementary":"supplementary.csv",
        "Medical":"medical_bills.csv",
        "ELS":"els_bills.csv",
        "Double Wages":"double_wages.csv",
        "DA Arrears":"da_arrears.csv",
        "Others":"others.csv"
    };

    let totalSalary = 0;
    let totalTax = 0;

    salary.slice(1).forEach(r=>{
        let u = r[0]?.trim();
        let y = r[1]?.trim();
        if(role !== "admin" && u !== user) return;
        if(y !== selectedYear) return;
        for(let j=3; j<=19; j++){ totalSalary += Number(r[j] || 0); }
        totalTax += Number(r[21] || 0);
    });

    let billRows = "";
    let totalBills = 0;

    for(let key in files){
        let data = await loadCSV(files[key]);
        let sum = 0;
        data.slice(1).forEach(r=>{
            let u = r[0]?.trim();
            let y = r[1]?.trim();
            let amount = Number(r[2] || 0);
            if(role !== "admin" && u !== user) return;
            if(y !== selectedYear) return;
            sum += amount;
        });
        totalBills += sum;
        billRows += `<tr><td>${key}</td><td class="amount">₹${sum.toFixed(2)}</td></tr>`;
    }

    let totalIncome = totalSalary + totalBills;

    result.innerHTML = `
    <div class="resultBox">
        <table class="table">
            <tr><td>Annual Salary</td><td class="amount">₹${totalSalary.toFixed(2)}</td></tr>
            ${billRows}
            <tr class="total-row"><td>Other Earnings Total</td><td class="amount">₹${totalBills.toFixed(2)}</td></tr>
            <tr class="total-row" style="background:#eef1ff"><td>Gross Total Income</td><td class="amount">₹${totalIncome.toFixed(2)}</td></tr>
            <tr><td>Income Tax Paid</td><td class="amount tax-cell">₹${totalTax.toFixed(2)}</td></tr>
        </table>
    </div>`;

    loader.style.display="none";
}
</script>

</body>
</html>
