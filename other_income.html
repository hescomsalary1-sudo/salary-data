<!DOCTYPE html>
<html>
<head>
<title>Other Income</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #eef2ff, #f3e8ff);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:22px;
background:#4b2dd8;
color:white;
border-radius:0 0 35px 35px;
text-align:center;
font-size:20px;
font-weight:600;
}

/* CONTENT */
.content{
padding:20px;
}

/* SUMMARY */
.summary{
background: linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

/* BUTTON */
.download-btn{
margin-top:12px;
padding:10px;
background:white;
color:#4b2dd8;
border-radius:10px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

/* CARD */
.card{
background: rgba(255,255,255,0.95);
border-radius:15px;
padding:15px;
margin-bottom:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.label{color:#777;}
.value{font-weight:600;}

/* STATUS */
.status{
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* ✅ POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.popup-box{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
width:80%;
max-width:320px;
animation:fadeIn 0.3s ease;
}

.popup-box h2{
margin:10px 0;
}

.popup-box p{
color:#666;
font-size:14px;
}

.popup-box button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#4b2dd8;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

@keyframes fadeIn{
from{transform:scale(0.8); opacity:0;}
to{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<div class="top" id="title">Other Income</div>

<div id="loader"><div class="spinner"></div></div>

<div class="content" id="resultBox">Loading...</div>

<!-- ✅ POPUP -->
<div id="noDataPopup" class="popup">
  <div class="popup-box">
    <h2>No Records Found</h2>
    <p>No data available for this category.</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>

const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";

let user = localStorage.getItem("currentUser");
let type = localStorage.getItem("incomeType");

if(!user){
window.location.replace("login.html");
}

/* FILE MAP */
let fileMap={
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

window.onload = function(){

if(!type){
resultBox.innerHTML="No data selected";
return;
}

title.innerText = type;

loadIncome(type);

};

/* ✅ POPUP FUNCTIONS */
function showPopup(){
document.getElementById("noDataPopup").style.display="flex";
}

function closePopup(){
document.getElementById("noDataPopup").style.display="none";

/* GO BACK TO PAGE3 */
window.location.href = "page3.html";
}


/* MAIN FUNCTION */
async function loadIncome(type){

loader.style.display="flex";

let fileName = fileMap[type];
let output = "";

/* ================= ELS SPECIAL ================= */

if(type==="ELS Bills"){

let leaves = await fetch(baseURL+"leaves.csv");
let ltext = await leaves.text();
let lrows = ltext.trim().split("\n");

let elCredit=0;

for(let i=1;i<lrows.length;i++){
let c=lrows[i].split(",");
if(c[0].trim()===user.trim()){
elCredit = Number(c[3] || 0);
}
}

let eligible = elCredit - 15;

/* SUMMARY */
output += `
<div class="summary">
<b>EL Credit:</b> ${elCredit}<br>
<b>Eligible EL:</b> ${eligible}

<div class="download-btn" onclick="downloadELS()">
📄 Download ELS Application Form
</div>

</div>
`;

}

/* ================= DATA ================= */

let res = await fetch(baseURL+fileName);
let text = await res.text();
text = text.replace(/^\uFEFF/, '');

/* ✅ CHECK EMPTY FILE */
if(!text || text.trim()===""){
loader.style.display="none";
showPopup();
return;
}

let rows = text.trim().split("\n");

/* ✅ CHECK NO ROWS */
if(rows.length<=1){
loader.style.display="none";
showPopup();
return;
}

let found=false;
let hasAmount=false;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let amount = c[2];
let period = c[3];
let status = c[4];
let remarks = c[5];

if(username.trim()===user.trim()){

if(amount && amount.trim()!==""){
hasAmount=true;
}

let color = status.toLowerCase()==="paid" ? "#2e7d32" : "#d32f2f";

output += `
<div class="card">

<div class="row">
<span class="label">Amount</span>
<span class="value">₹${amount}</span>
</div>

<div class="row">
<span class="label">Year</span>
<span class="value">${year}</span>
</div>

<div class="row">
<span class="label">Period</span>
<span class="value">${period}</span>
</div>

<div class="row">
<span class="label">Status</span>
<span class="status" style="background:${color}">
${status}
</span>
</div>

<div class="row">
<span class="label">Remarks</span>
<span class="value">${remarks}</span>
</div>

</div>
`;

found=true;
}
}

/* ✅ FINAL CHECK */
if(!found || !hasAmount){
loader.style.display="none";
showPopup();
return;
}

resultBox.innerHTML = output;
loader.style.display="none";

}

/* DOWNLOAD */
function downloadELS(){
window.location.href = baseURL + "els_format.pdf";
}

</script>

</body>
</html>
