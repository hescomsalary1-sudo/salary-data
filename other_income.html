<!DOCTYPE html>
<html>
<head>
<title>Other Income</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:22px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
border-radius:0 0 35px 35px;
text-align:center;
font-size:20px;
font-weight:600;
}

/* CONTENT */
.content{
padding:20px;
}

/* SUMMARY */
.summary{
background: linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

/* BUTTON */
.download-btn{
margin-top:12px;
padding:10px;
background:white;
color:#4b2dd8;
border-radius:10px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

/* MODERN CARD */
.card{
background: rgba(255,255,255,0.85);
backdrop-filter: blur(10px);
border-radius:18px;
padding:18px;
margin-bottom:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
animation:fadeUp 0.3s ease;
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

/* LABEL */
.label{
color:#888;
font-size:13px;
}

/* VALUE */
.value{
font-weight:600;
font-size:15px;
color:#333;
}

/* AMOUNT SPECIAL */
.row:first-child .value{
font-size:20px;
font-weight:700;
color:#4b2dd8;
}

/* STATUS */
.status{
padding:5px 12px;
border-radius:20px;
font-size:12px;
color:white;
font-weight:600;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* CARD ANIMATION */
@keyframes fadeUp{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="top" id="title">Other Income</div>

<div id="loader"><div class="spinner"></div></div>

<div class="content" id="resultBox">Loading...</div>

<script>

const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";

let user = localStorage.getItem("currentUser");
let type = localStorage.getItem("incomeType");

if(!user){
window.location.replace("login.html");
}

/* FILE MAP */
let fileMap={
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

window.onload = function(){

if(!type){
resultBox.innerHTML="No data selected";
return;
}

title.innerText = type;

loadIncome(type);

};

/* MAIN FUNCTION */
async function loadIncome(type){

loader.style.display="flex";

let fileName = fileMap[type];
let output = "";

/* ================= ELS SPECIAL ================= */

if(type==="ELS Bills"){

let leaves = await fetch(baseURL+"leaves.csv");
let ltext = await leaves.text();
let lrows = ltext.trim().split("\n");

let elCredit=0;

for(let i=1;i<lrows.length;i++){
let c=lrows[i].split(",");
if(c[0].trim()===user.trim()){
elCredit = Number(c[3] || 0);
}
}

let eligible = elCredit - 15;

/* SUMMARY */
output += `
<div class="summary">
<b>EL Credit:</b> ${elCredit}<br>
<b>Eligible EL:</b> ${eligible}

<div class="download-btn" onclick="downloadELS()">
📄 Download ELS Application Form
</div>

</div>
`;

}

/* ================= DATA ================= */

let res = await fetch(baseURL+fileName);
let text = await res.text();
text = text.replace(/^\uFEFF/, '');

/* EMPTY FILE */
if(!text || text.trim()===""){
showNoData();
return;
}

let rows = text.trim().split("\n");

/* NO ROWS */
if(rows.length<=1){
showNoData();
return;
}

let found=false;
let hasAmount=false;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let amount = c[2];
let period = c[3];
let status = c[4];
let remarks = c[5];

if(username.trim()===user.trim()){

if(amount && amount.trim()!==""){
hasAmount=true;
}

let color = status.toLowerCase()==="paid" ? "#2e7d32" : "#d32f2f";

output += `
<div class="card">

<div class="row">
<span class="label">💰 Amount</span>
<span class="value">₹${amount}</span>
</div>

<div class="row">
<span class="label">📅 Year</span>
<span class="value">${year}</span>
</div>

<div class="row">
<span class="label">🗓 Period</span>
<span class="value">${period}</span>
</div>

<div class="row">
<span class="label">📌 Status</span>
<span class="status" style="background:${color}">
${status}
</span>
</div>

<div class="row">
<span class="label">📝 Remarks</span>
<span class="value">${remarks}</span>
</div>

</div>
`;

found=true;
}
}

/* FINAL CHECK */
if(!found || !hasAmount){
showNoData();
return;
}

resultBox.innerHTML = output;
loader.style.display="none";

}

/* NO DATA UI */
function showNoData(){

loader.style.display="none";

resultBox.innerHTML = `
<div style="
text-align:center;
margin-top:60px;
padding:25px;
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
">

<div style="font-size:65px;">📭</div>

<h2 style="color:#4b2dd8;margin:10px 0;">
No Records Found
</h2>

<p style="color:#777;font-size:14px;">
No data available for this category
</p>

</div>
`;
}

/* DOWNLOAD */
function downloadELS(){
window.location.href = baseURL + "els_format.pdf";
}

</script>

</body>
</html>
