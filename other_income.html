<!DOCTYPE html>
<html>
<head>
<title>Other Income</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f3f5ff;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:22px;
background:#4b2dd8;
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
text-align:center;
font-size:20px;
font-weight:600;
}

/* CONTENT */
.content{
padding:20px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:14px;
}

.label{
color:#777;
}

.value{
font-weight:600;
}

/* STATUS */
.status{
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top" id="title">Other Income</div>

<div id="loader"><div class="spinner"></div></div>

<div class="content" id="resultBox">
Loading...
</div>

<script>

let user = localStorage.getItem("currentUser");
let type = localStorage.getItem("incomeType");

if(!user){
window.location.replace("login.html");
}

/* FILE MAP */
let fileMap={
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

window.onload = function(){

if(!type){
document.getElementById("resultBox").innerHTML="No data selected";
return;
}

document.getElementById("title").innerText = type;

loadIncome(type);

};

async function loadIncome(type){

loader.style.display="flex";

let fileName = fileMap[type];

try{

let res = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/"+fileName
);

let text = await res.text();
let rows = text.trim().split("\n");

let output = "";

let found=false;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let amount = c[2];
let period = c[3];
let status = c[4];
let remarks = c[5];

if(username.trim()===user.trim()){

let color = status.toLowerCase()==="paid" ? "#2e7d32" : "#d32f2f";

output+=`

<div class="card">

<div class="row">
<span class="label">Amount</span>
<span class="value">₹${amount}</span>
</div>

<div class="row">
<span class="label">Period</span>
<span class="value">${period}</span>
</div>

<div class="row">
<span class="label">Status</span>
<span class="status" style="background:${color}">
${status}
</span>
</div>

<div class="row">
<span class="label">Remarks</span>
<span class="value">${remarks}</span>
</div>

</div>

`;

found=true;
}

}

if(!found){
output="<p>No data found</p>";
}

document.getElementById("resultBox").innerHTML = output;

}catch(e){

document.getElementById("resultBox").innerHTML="Error loading data";

}

loader.style.display="none";

}

</script>

</body>
</html>
