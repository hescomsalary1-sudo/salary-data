<!DOCTYPE html>
<html>
<head>
<title>Other Incomes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg,#eef2ff,#f3f0ff);
padding-bottom:90px;
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* HEADER */
.header{
padding:20px;
display:flex;
align-items:center;
gap:12px;
}

.back-btn{
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;
}

.title-box{
padding:0 20px 10px;
}

.title-box h1{
margin:0;
font-size:26px;
color:#111827;
}

.title-box p{
margin:5px 0 0;
color:#6b7280;
font-size:14px;
}

/* CONTENT */
.content{
padding:15px;
}

/* SUMMARY */
.summary{
background: linear-gradient(135deg,#6c39ff,#4b2dd8);
color:white;
border-radius:18px;
padding:16px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.download-btn{
margin-top:12px;
padding:10px;
background:white;
color:#4b2dd8;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
}

/* CARD (NEW DESIGN) */
.card{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:15px;
margin-bottom:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
animation:fadeUp 0.3s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* LEFT */
.left{
display:flex;
gap:12px;
align-items:center;
}

/* ICON */
.icon{
width:50px;
height:50px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
}

/* COLORS */
.green{background:#22c55e;}
.blue{background:#3b82f6;}
.orange{background:#f59e0b;}
.red{background:#ef4444;}
.purple{background:#8b5cf6;}
.cyan{background:#06b6d4;}
.gray{background:#64748b;}

/* TEXT */
.text b{
font-size:15px;
color:#111827;
}

.text p{
margin:2px 0 0;
font-size:12px;
color:#6b7280;
}

/* RIGHT */
.right{
text-align:right;
}

.amount{
font-size:18px;
font-weight:700;
color:#4b2dd8;
}

.status{
margin-top:5px;
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:11px;
color:white;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* FOOTER */
.footer{
position:fixed;
bottom:15px;
left:0;
right:0;
text-align:center;
font-size:13px;
color:#6b7280;
}

.footer span{
color:#4f46e5;
font-weight:600;
}

</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">⬅</div>
</div>

<div class="title-box">
  <h1 id="title">Other Income</h1>
  <p>Select income category</p>
</div>

<div id="loader"><div class="spinner"></div></div>

<div class="content" id="resultBox">Loading...</div>

<div class="footer">
🛡️ Your data is <span>100% secure</span> and private
</div>

<script>

const baseURL = "https://hescomsalary1-sudo.github.io/salary-data/";

let user = localStorage.getItem("currentUser");
let type = localStorage.getItem("incomeType");

if(!user){
window.location.replace("login.html");
}

/* FILE MAP */
let fileMap={
"Supplementary Salary":"supplementary.csv",
"DA Arrears":"da_arrears.csv",
"Double Wages":"double_wages.csv",
"Medical Bills":"medical_bills.csv",
"TA Bills":"ta_bills.csv",
"ELS Bills":"els_bills.csv",
"Others":"others.csv"
};

window.onload = function(){

if(!type){
resultBox.innerHTML="No data selected";
return;
}

title.innerText = type;

loadIncome(type);

};

/* MAIN FUNCTION */
async function loadIncome(type){

loader.style.display="flex";

let fileName = fileMap[type];
let output = "";

/* ELS SPECIAL */
if(type==="ELS Bills"){

let leaves = await fetch(baseURL+"leaves.csv");
let ltext = await leaves.text();
let lrows = ltext.trim().split("\n");

let elCredit=0;

for(let i=1;i<lrows.length;i++){
let c=lrows[i].split(",");
if(c[0].trim()===user.trim()){
elCredit = Number(c[3] || 0);
}
}

let eligible = elCredit - 15;

output += `
<div class="summary">
<b>EL Credit:</b> ${elCredit}<br>
<b>Eligible EL:</b> ${eligible}

<div class="download-btn" onclick="downloadELS()">
📄 Download ELS Application Form
</div>
</div>`;
}

/* DATA */
let res = await fetch(baseURL+fileName);
let text = await res.text();
text = text.replace(/^\uFEFF/, '');

if(!text || text.trim()===""){
showNoData();
return;
}

let rows = text.trim().split("\n");

if(rows.length<=1){
showNoData();
return;
}

let found=false;
let hasAmount=false;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let amount = c[2];
let period = c[3];
let status = c[4];
let remarks = c[5];

if(username.trim()===user.trim()){

if(amount && amount.trim()!==""){
hasAmount=true;
}

let color = status.toLowerCase()==="paid" ? "#22c55e" : "#ef4444";

output += `
<div class="card">

<div class="left">
  <div class="icon blue">₹</div>
  <div class="text">
    <b>${type}</b>
    <p>${period} • ${year}</p>
  </div>
</div>

<div class="right">
  <div class="amount">₹${amount}</div>
  <div class="status" style="background:${color}">
    ${status}
  </div>
</div>

</div>
`;

found=true;
}
}

if(!found || !hasAmount){
showNoData();
return;
}

resultBox.innerHTML = output;
loader.style.display="none";

}

function showNoData(){
loader.style.display="none";

resultBox.innerHTML = `
<div style="text-align:center;margin-top:60px;">
<div style="font-size:60px;">📭</div>
<h2 style="color:#4b2dd8;">No Records Found</h2>
<p style="color:#777;">No data available</p>
</div>`;
}

function downloadELS(){
window.location.href = baseURL + "els_format.pdf";
}

function goBack(){
window.history.back();
}

</script>

</body>
</html>
