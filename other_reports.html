<!DOCTYPE html>
<html>
<head>
<title>Other Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #eef2ff, #f8fafc);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:22px;
text-align:center;
font-size:22px;
font-weight:700;
color:#4b2dd8;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

/* MODERN BUTTON */
.card-btn{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(12px);
border-radius:20px;
padding:22px;
text-align:center;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
cursor:pointer;
transition:all 0.25s ease;
position:relative;
overflow:hidden;
}

/* ICON */
.icon{
font-size:26px;
display:block;
margin-bottom:8px;
}

/* HOVER */
.card-btn:hover{
transform:translateY(-5px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

/* CLICK EFFECT */
.card-btn:active{
transform:scale(0.95);
}

/* SKELETON LOADER OVERLAY */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:none;
z-index:9999;
padding:20px;
}

/* SKELETON BOX */
.skeleton{
height:80px;
border-radius:15px;
margin-bottom:15px;
background: linear-gradient(
90deg,
#eeeeee 25%,
#dddddd 37%,
#eeeeee 63%
);
background-size:400% 100%;
animation:skeletonLoading 1.4s infinite;
}

@keyframes skeletonLoading{
0%{background-position:100% 50%;}
100%{background-position:0 50%;}
}

</style>
</head>

<body>

<div class="top">📊 Other Reports</div>

<div class="grid">
<div class="card-btn" onclick="openReport('LIC')">
<span class="icon">💼</span>
LIC Reports
</div>

<div class="card-btn" onclick="openReport('income_tax')">
<span class="icon">💰</span>
Income Tax
</div>

<div class="card-btn" onclick="openReport('society')">
<span class="icon">🏦</span>
Society Deduction
</div>

<div class="card-btn" onclick="openReport('PLI')">
<span class="icon">📑</span>
PLI Reports
</div>

<div class="card-btn" onclick="openReport('festival_advance')">
<span class="icon">🎉</span>
Festival Advance
</div>

<div class="card-btn" onclick="openReport('house_rent')">
<span class="icon">🏠</span>
House Rent
</div>
</div>

<!-- SKELETON LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

function openReport(type){

// show loader
document.getElementById("loader").style.display="block";

// store type
localStorage.setItem("reportType", type);

// delay for smooth feel
setTimeout(()=>{
window.location.href="view_other_reports.html";
},800);

}

</script>

</body>
</html>
