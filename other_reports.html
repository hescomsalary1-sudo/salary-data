<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info Center</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* CARD STYLE */
.card {
  background: rgba(255,255,255,0.08);
  margin: 15px;
  padding: 15px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* TIP + NOTICE */
.info-box {
  font-size: 14px;
  line-height: 1.6;
}

/* POINTS SECTION */
.points {
  font-size: 26px;
  font-weight: bold;
}

.level {
  margin-top: 5px;
  font-size: 16px;
  color: #ffd700;
}

/* PROGRESS BAR */
.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress {
  height: 100%;
  background: #00ffcc;
  width: 0%;
}

/* GRID BUTTONS */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 10px;
}

.btn {
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  background: rgba(255,255,255,0.12);
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.05);
}

/* SMALL TEXT */
.small {
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">⚡ Info Center</div>

<!-- FUN + INFO -->
<div class="card">
  <div class="info-box">
    💡 Tip: Maintain full attendance to earn bonus points!<br>
    📢 Notice: Salary will be credited on 5th
  </div>
</div>

<!-- REWARDS -->
<div class="card">
  <div class="points" id="points">0 Points</div>
  <div class="level" id="level">Bronze</div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="small" id="summary"></div>
</div>

<!-- QUICK ACTIONS -->
<div class="card">
  <div class="grid">
    <div class="btn" onclick="go('salary.html')">💰 Salary</div>
    <div class="btn" onclick="go('attendance.html')">📅 Attendance</div>
    <div class="btn" onclick="go('seniority.html')">📊 Seniority</div>
    <div class="btn" onclick="go('forum.html')">💬 Forum</div>
  </div>
</div>

<script>

/* SAMPLE DATA (Replace later with real data from CSV) */
let present = 18;
let leave = 2;
let absent = 1;

/* POINT CALCULATION */
let points =
  (present * 10) +
  (leave * 5) +
  (absent * 0);

/* BONUS */
if(absent === 0) points += 50; // monthly bonus
if(absent <= 1) points += 20; // weekly consistency

/* LEVEL SYSTEM */
let level = "Bronze";
let progress = 0;

if(points >= 1000){
  level = "💎 Platinum";
  progress = 100;
}else if(points >= 500){
  level = "🥇 Gold";
  progress = (points - 500) / 5;
}else if(points >= 200){
  level = "🥈 Silver";
  progress = (points - 200) / 3;
}else{
  level = "🥉 Bronze";
  progress = points / 2;
}

/* UPDATE UI */
document.getElementById("points").innerText = points + " Points";
document.getElementById("level").innerText = level;
document.getElementById("progress").style.width = progress + "%";

document.getElementById("summary").innerText =
  "Present: " + present +
  " | Leave: " + leave +
  " | Absent: " + absent;

/* NAVIGATION */
function go(page){
  window.location.replace(page);
}

</script>

</body>
</html>
