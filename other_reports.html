<!DOCTYPE html>
<html>
<head>
<title>Other Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* HEADER */
.top{
padding:22px;
text-align:center;
font-size:22px;
font-weight:700;
color:#4b2dd8;
}

/* LIST CONTAINER */
.list{
padding:15px;
}

/* MODERN LIST BUTTON */
.card-btn{
display:flex;
align-items:center;
justify-content:space-between;
background: rgba(255,255,255,0.75);
backdrop-filter: blur(12px);
border-radius:18px;
padding:16px;
margin-bottom:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
cursor:pointer;
transition:all 0.25s ease;
}

/* LEFT SIDE */
.left{
display:flex;
align-items:center;
gap:12px;
}

/* ICON */
.icon{
font-size:22px;
}

/* TEXT */
.text{
font-weight:600;
color:#333;
}

/* ARROW */
.arrow{
font-size:18px;
color:#999;
}

/* HOVER */
.card-btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

/* CLICK */
.card-btn:active{
transform:scale(0.96);
}

/* SKELETON */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
z-index:9999;
padding:15px;
}

.skeleton{
height:70px;
border-radius:15px;
margin-bottom:12px;
background: linear-gradient(90deg,#eee 25%,#ddd 37%,#eee 63%);
background-size:400% 100%;
animation:skeleton 1.4s infinite;
}

@keyframes skeleton{
0%{background-position:100% 50%;}
100%{background-position:0 50%;}
}

</style>
</head>

<body>

<div class="top">📊 Other Reports</div>

<div class="list">

<div class="card-btn" onclick="openReport('LIC')">
<div class="left">
<span class="icon">💼</span>
<span class="text">LIC Reports</span>
</div>
<span class="arrow">›</span>
</div>

<div class="card-btn" onclick="openReport('income_tax')">
<div class="left">
<span class="icon">💰</span>
<span class="text">Income Tax Reports</span>
</div>
<span class="arrow">›</span>
</div>

<div class="card-btn" onclick="openReport('society')">
<div class="left">
<span class="icon">🏦</span>
<span class="text">Society Deduction</span>
</div>
<span class="arrow">›</span>
</div>

<div class="card-btn" onclick="openReport('PLI')">
<div class="left">
<span class="icon">📑</span>
<span class="text">PLI Reports</span>
</div>
<span class="arrow">›</span>
</div>

<div class="card-btn" onclick="openReport('festival_advance')">
<div class="left">
<span class="icon">🎉</span>
<span class="text">Festival Advance</span>
</div>
<span class="arrow">›</span>
</div>

<div class="card-btn" onclick="openReport('house_rent')">
<div class="left">
<span class="icon">🏠</span>
<span class="text">House Rent</span>
</div>
<span class="arrow">›</span>
</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

function openReport(type){

document.getElementById("loader").style.display="block";

localStorage.setItem("reportType", type);

setTimeout(()=>{
window.location.href="view_other_reports.html";
},700);

}

</script>
<script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
  window.location.replace("forum.html");
};
</script>
</body>
</html>
