<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Other Reports</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);margin:0;color:#fff}
.container{padding:20px}
h1{text-align:center;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
.btn{padding:20px;border:none;border-radius:15px;background:#ffffff10;color:#fff;font-size:16px;cursor:pointer;backdrop-filter:blur(10px);transition:0.3s}
.btn:hover{transform:scale(1.05);background:#ffffff25}
</style>
</head>
<body>
<div class="container">
<h1>Other Reports</h1>
<div class="grid">
<button class="btn" onclick="openReport('LIC')">LIC Reports</button>
<button class="btn" onclick="openReport('income_tax')">Income Tax</button>
<button class="btn" onclick="openReport('society')">Society Deduction</button>
<button class="btn" onclick="openReport('PLI')">PLI Reports</button>
<button class="btn" onclick="openReport('festival_advance')">Festival Advance</button>
<button class="btn" onclick="openReport('house_rent')">House Rent</button>
</div>
</div>

<script>
function openReport(type){
    localStorage.setItem("reportType", type);
    window.location.href = "view_other_reports.html";
}
</script>
</body>
</html>
