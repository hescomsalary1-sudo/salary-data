<!DOCTYPE html>
<html>
<head>
<title>Other Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

.top{
padding:22px;
color:#2400b7;
text-align:center;
font-size:20px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card-btn{
background:white;
border-radius:18px;
padding:20px;
text-align:center;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
}

.card-btn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="top">Other Reports</div>

<div class="grid">
<div class="card-btn" onclick="openReport('LIC')">LIC Reports</div>
<div class="card-btn" onclick="openReport('income_tax')">Income Tax</div>
<div class="card-btn" onclick="openReport('society')">Society Deduction</div>
<div class="card-btn" onclick="openReport('PLI')">PLI Reports</div>
<div class="card-btn" onclick="openReport('festival_advance')">Festival Advance</div>
<div class="card-btn" onclick="openReport('house_rent')">House Rent</div>
</div>

<script>
function openReport(type){
localStorage.setItem("reportType", type);
window.location.href="view_other_reports.html";
}
</script>

</body>
</html>
