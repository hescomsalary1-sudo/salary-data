<!DOCTYPE html>
<html>
<head>
<title>Other Income</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
padding-bottom:90px;
}

/* HEADER */
.top{
display:flex;
align-items:center;
gap:12px;
padding:20px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:#2400b7;
border-radius:0 0 35px 35px;
}

.top h2{
margin:0;
font-size:22px;
}

.top p{
margin:5px 0 0;
font-size:13px;
opacity:0.85;
}

/* CONTENT */
.content{
padding:18px;
}
/* CONTAINER */
.container {
  
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
/* CARD BUTTON */
.list-btn{
display:flex;
align-items:center;
justify-content:space-between;
background: rgba(255,255,255,0.9);
backdrop-filter: blur(10px);
padding:16px;
border-radius:15px;
margin-top:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.list-btn:hover{
transform:translateY(-2px);
}

.list-btn:active{
transform:scale(0.96);
}

/* LEFT ICON */
.left{
display:flex;
align-items:center;
gap:12px;
}

.icon{
font-size:22px;
background:#f0ecff;
padding:10px;
border-radius:12px;
}

/* TEXT */
.text{
font-weight:600;
color:#4b2dd8;
}

/* ARROW */
.arrow{
font-size:18px;
color:#999;
}


/* BACK BUTTON */
.back-btn{
width:40px;
height:40px;
border-radius:50%;
background:rgba(255,255,255,0.9);
backdrop-filter: blur(8px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.25s;
flex-shrink:0;
}

.back-btn:hover{
transform:scale(1.1);
}

.back-btn svg{
transition:0.2s;
}

.back-btn:hover svg{
transform:translateX(-2px);
}

/* HEADER TEXT */
.header-text h2{
margin:0;
font-size:22px;
}

.header-text p{
margin:5px 0 0;
font-size:13px;
opacity:0.85;
}
</style>
</head>

<body>

<div class="top">

  <div class="back-btn" onclick="goBack()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M15 18L9 12L15 6" 
            stroke="#2400b7" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="header-text">
    <h2>Other Income</h2>
    <p>Select income category</p>
  </div>

</div>
<div class="container">
<div class="content">

<div class="list-btn" onclick="openIncome('Supplementary Salary')">
<div class="left">
<div class="icon">💵</div>
<div class="text">Supplementary Salary</div>
</div>
<div class="arrow">›</div>
</div>

<div class="list-btn" onclick="openIncome('DA Arrears')">
<div class="left">
<div class="icon">📊</div>
<div class="text">DA Arrears</div>
</div>
<div class="arrow">›</div>
</div>

<div class="list-btn" onclick="openIncome('Double Wages')">
<div class="left">
<div class="icon">💰</div>
<div class="text">Double Wages</div>
</div>
<div class="arrow">›</div>
</div>

<div class="list-btn" onclick="openIncome('Medical Bills')">
<div class="left">
<div class="icon">🏥</div>
<div class="text">Medical Bills</div>
</div>
<div class="arrow">›</div>
</div>

<div class="list-btn" onclick="openIncome('TA Bills')">
<div class="left">
<div class="icon">🚕</div>
<div class="text">TA Bills</div>
</div>
<div class="arrow">›</div>
</div>

<div class="list-btn" onclick="openIncome('ELS Bills')">
<div class="left">
<div class="icon">📄</div>
<div class="text">ELS Bills</div>
</div>
<div class="arrow">›</div>
</div>

<div class="list-btn" onclick="openIncome('Others')">
<div class="left">
<div class="icon">📦</div>
<div class="text">Others</div>
</div>
<div class="arrow">›</div>
</div>

</div>
</div>


<script>

let user = localStorage.getItem("currentUser");
if(!user){
window.location.replace("login.html");
}

/* REDIRECT FUNCTION */
function openIncome(type){
localStorage.setItem("incomeType", type);
window.location.href = "other_income.html";
}
function goBack(){
  window.history.back();
}
</script>

</body>
</html>
