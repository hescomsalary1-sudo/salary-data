<!DOCTYPE html>
<html>
<head>
<title>Other Income</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:'Segoe UI',sans-serif;margin:0;background:#f3f5ff;padding-bottom:90px;}
.top{padding:22px;background:#4b2dd8;color:white;border-bottom-left-radius:35px;border-bottom-right-radius:35px;text-align:center;font-size:20px;font-weight:600;}
.content{padding:20px;}
.list-btn{
background:white;padding:15px;border-radius:12px;margin-top:12px;font-weight:600;color:#4b2dd8;

}
.list-btn:active{transform:scale(0.97);background:#ece8ff;}
.footer{
position:fixed;bottom:0;width:100%;background:#fff;
display:flex;justify-content:space-around;padding:10px 0;
box-shadow:0 -3px 15px rgba(0,0,0,0.1);
}
.footer a{text-decoration:none;display:flex;flex-direction:column;align-items:center;color:#4b2dd8;}
</style>
</head>

<body>

<div class="top">Other Income</div>

<div class="content">

<div class="list-btn" onclick="openIncome('Supplementary Salary')">Supplementary Salary</div>
<div class="list-btn" onclick="openIncome('DA Arrears')">DA Arrears</div>
<div class="list-btn" onclick="openIncome('Double Wages')">Double Wages</div>
<div class="list-btn" onclick="openIncome('Medical Bills')">Medical Bills</div>
<div class="list-btn" onclick="openIncome('TA Bills')">TA Bills</div>

</div>

<div class="footer">
<a href="home.html">🏠<small>Home</small></a>
<a href="page1.html">👤<small>Profile</small></a>

</div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){
window.location.replace("login.html");
}

/* 🔥 REDIRECT FUNCTION */
function openIncome(type){
localStorage.setItem("incomeType", type);
window.location.href = "other_income.html";
}

</script>

</body>
</html>
