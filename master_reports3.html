<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Summary Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4338ca;
            --bg: #f1f5f9;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg);
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* Abstract Cards */
        .abstract-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.2s;
        }

        .abstract-card:hover { transform: translateY(-5px); }

        .abstract-card h2 {
            margin: 0 0 20px 0;
            font-size: 16px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .stats-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-item {
            flex: 1;
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #f1f5f9;
        }

        .stat-item span { display: block; font-size: 11px; color: #64748b; margin-bottom: 5px; }
        .stat-item b { font-size: 24px; color: #1e293b; }

        /* Premium Buttons */
        .view-btn {
            width: 100%;
            background: linear-gradient(135deg, #4338ca, #6366f1);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.2);
        }

        .view-btn:active { transform: scale(0.98); }

        /* Loader Overlay */
        #loader {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
    </div>

    <div class="container">
        <div class="abstract-card">
            <h2><i class="fas fa-venus-mars"></i> Gender Abstract</h2>
            <div class="stats-display">
                <div class="stat-item"><span>MALE</span><b id="male-count">0</b></div>
                <div class="stat-item"><span>FEMALE</span><b id="female-count">0</b></div>
            </div>
            <button class="view-btn" onclick="openReport('gender')">
                <i class="fas fa-list-ul"></i> View Gender Details
            </button>
        </div>

        <div class="abstract-card">
            <h2><i class="fas fa-accessible-icon"></i> Disability Abstract</h2>
            <div class="stats-display">
                <div class="stat-item" style="flex: none; width: 100%;">
                    <span>Physically Challenged Persons</span>
                    <b id="pwd-count">0</b>
                </div>
            </div>
            <button class="view-btn" onclick="openReport('pwd')" style="background: linear-gradient(135deg, #059669, #10b981);">
                <i class="fas fa-file-invoice"></i> View Full Abstract
            </button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
        let employeeData = [];

        window.onload = () => {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    employeeData = results.data;
                    calculateStats();
                    document.getElementById('loader').style.display = 'none';
                }
            });
        };

        function calculateStats() {
            const counts = employeeData.reduce((acc, row) => {
                const gender = String(row.male_or_female || "").toLowerCase();
                const isPwd = String(row.Physically_Disablity || "").toLowerCase() === 'yes';
                
                if(gender === 'male') acc.male++;
                if(gender === 'female') acc.female++;
                if(isPwd) acc.pwd++;
                
                return acc;
            }, { male: 0, female: 0, pwd: 0 });

            document.getElementById('male-count').textContent = counts.male;
            document.getElementById('female-count').textContent = counts.female;
            document.getElementById('pwd-count').textContent = counts.pwd;
        }

        function openReport(type) {
            // This will navigate to your existing reporting page with the specific filter
            // Adjust the URL below to match your master_reports1.html or similar
            const baseUrl = "view_master_reports.html"; 
            window.location.href = `${baseUrl}?reportType=${type}`;
        }
    </script>
</body>
</html>
