<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Master App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --accent: #10b981;
            --dark: #0f172a;
            --bg: #f3f4f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--dark);
            min-height: 100vh;
        }

        header {
            background: var(--dark);
            color: white;
            padding: 18px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { margin: 0; font-size: 18px; letter-spacing: 0.5px; }

        /* Summary Area */
        .summary-container {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
        }

        .abstract-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .val-row { display: flex; gap: 20px; margin-bottom: 12px; }
        .val-row b { font-size: 24px; color: var(--dark); }
        .val-row span { font-size: 10px; color: #94a3b8; display: block; }

        .btn-flex { display: flex; gap: 8px; }
        .nav-btn {
            flex: 1; border: none; padding: 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; color: white; cursor: pointer;
        }
        .btn-indigo { background: var(--primary); }
        .btn-blue { background: var(--secondary); }
        .btn-green { background: var(--accent); }

        /* Results List */
        .list-section { padding: 15px; display: none; flex-direction: column; gap: 12px; }
        .list-title { font-size: 14px; font-weight: 700; margin-bottom: 5px; color: var(--primary); }

        /* Individual Data Cards */
        .emp-card {
            background: #fff;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .emp-card:active { transform: scale(0.98); border-color: var(--primary); }

        .card-main { display: flex; align-items: center; gap: 15px; }
        .si-no { width: 32px; height: 32px; background: #eef2ff; color: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        
        .info-core { flex: 1; }
        .name { font-size: 14px; font-weight: 700; color: #111827; }
        .sub-text { font-size: 12px; color: #6b7280; }

        /* Expandable Details */
        .details-pane {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
            border-top: 0 solid #f1f5f9;
        }

        .emp-card.expanded .details-pane {
            max-height: 300px;
            margin-top: 15px;
            padding-top: 15px;
            border-top-width: 1px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .detail-item { font-size: 11px; }
        .detail-item label { display: block; color: #94a3b8; font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
        .detail-item p { margin: 0; color: #374151; font-weight: 600; }

        #loader { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i></div>

    <header><h1>HR Master Directory</h1></header>

    <section class="summary-container">
        <div class="abstract-card">
            <span class="stat-label">Staff Gender Abstract</span>
            <div class="val-row">
                <div><b><span id="m-val">0</span></b><span>MALE</span></div>
                <div><b><span id="f-val">0</span></b><span>FEMALE</span></div>
            </div>
            <div class="btn-flex">
                <button class="nav-btn btn-indigo" onclick="showList('male')">MALE LIST</button>
                <button class="nav-btn btn-blue" onclick="showList('female')">FEMALE LIST</button>
            </div>
        </div>

        <div class="abstract-card">
            <span class="stat-label">Disability Abstract</span>
            <div class="val-row">
                <div><b><span id="ph-val">0</span></b><span>PH (Y)</span></div>
            </div>
            <div class="btn-flex">
                <button class="nav-btn btn-green" onclick="showList('ph')">VIEW PH LIST</button>
            </div>
        </div>
    </section>

    <main class="list-section" id="listSection">
        <div class="list-title" id="listHeader">List View</div>
        <div id="cardsContainer"></div>
    </main>

    <script>
        const CSV_FILE = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
        let records = [];

        window.onload = () => {
            Papa.parse(CSV_FILE, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(res) {
                    records = res.data;
                    updateSummary();
                    document.getElementById('loader').style.display = 'none';
                }
            });
        };

        function getVal(row, keys) {
            const found = Object.keys(row).find(k => keys.includes(k.trim().toLowerCase()));
            return found ? row[found] : 'N/A';
        }

        function updateSummary() {
            let m = 0, f = 0, ph = 0;
            records.forEach(r => {
                const g = String(getVal(r, ['male_or_female'])).toLowerCase().trim();
                const d = String(getVal(r, ['phisically_disability', 'physically_disablity'])).toUpperCase().trim();
                if(g === 'male') m++;
                if(g === 'female') f++;
                if(d === 'Y') ph++;
            });
            document.getElementById('m-val').innerText = m;
            document.getElementById('f-val').innerText = f;
            document.getElementById('ph-val').innerText = ph;
        }

        function showList(type) {
            const section = document.getElementById('listSection');
            const header = document.getElementById('listHeader');
            const container = document.getElementById('cardsContainer');
            
            section.style.display = 'flex';
            container.innerHTML = "";

            let filtered = [];
            if(type === 'male') {
                header.innerText = "Male Employees";
                filtered = records.filter(r => String(getVal(r, ['male_or_female'])).toLowerCase().trim() === 'male');
            } else if(type === 'female') {
                header.innerText = "Female Employees";
                filtered = records.filter(r => String(getVal(r, ['male_or_female'])).toLowerCase().trim() === 'female');
            } else {
                header.innerText = "Physically Challenged Staff (Y)";
                filtered = records.filter(r => String(getVal(r, ['phisically_disability', 'physically_disablity'])).toUpperCase().trim() === 'Y');
            }

            filtered.forEach((r, i) => {
                const card = document.createElement('div');
                card.className = 'emp-card';
                card.onclick = () => card.classList.toggle('expanded');

                // Core Data
                const name = getVal(r, ['name', 'employee_name']);
                const desig = getCol(r, ['current_designation', 'designation']);
                const place = getCol(r, ['lien_office', 'working_place']);
                
                // Important Additional Data (Revealed on click)
                const phone = getVal(r, ['mobile_no', 'phone', 'contact']);
                const dob = getVal(r, ['date_of_birth', 'dob']);
                const kgid = getVal(r, ['kgid_no', 'kgid']);
                const joinDate = getVal(r, ['date_of_joining', 'doj']);

                card.innerHTML = `
                    <div class="card-main">
                        <div class="si-no">${i + 1}</div>
                        <div class="info-core">
                            <div class="name">${name}</div>
                            <div class="sub-text">${desig}</div>
                            <div class="sub-text" style="font-size:10px; color:#94a3b8;"><i class="fas fa-location-dot"></i> ${place}</div>
                        </div>
                        <i class="fas fa-chevron-down" style="color:#d1d5db; font-size:12px;"></i>
                    </div>
                    <div class="details-pane">
                        <div class="detail-grid">
                            <div class="detail-item"><label>Contact</label><p>${phone}</p></div>
                            <div class="detail-item"><label>KGID No</label><p>${kgid}</p></div>
                            <div class="detail-item"><label>Birth Date</label><p>${dob}</p></div>
                            <div class="detail-item"><label>Join Date</label><p>${joinDate}</p></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            section.scrollIntoView({ behavior: 'smooth' });
        }

        function getCol(r, keys) { return getVal(r, keys); }
    </script>
</body>
</html>
