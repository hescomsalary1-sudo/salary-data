<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Abstract Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4338ca;
            --secondary: #059669;
            --bg: #f3f4f6;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Header Area */
        .top-section {
            width: 100%;
            background: white;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .abstract-grid {
            width: 95%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        /* Premium Abstract Cards */
        .abstract-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 15px 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-meta h3 { margin: 0; font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

        .stat-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .stat-box b { font-size: 24px; color: #1e293b; display: block; }
        .stat-box span { font-size: 11px; color: #94a3b8; font-weight: 600; }

        .view-btn {
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: all 0.2s;
        }

        .btn-indigo { background: var(--primary); }
        .btn-green { background: var(--secondary); }
        .view-btn:active { transform: scale(0.97); }

        /* Table Section Area (Below) */
        .content-area {
            width: 95%;
            max-width: 1100px;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        .data-container {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: none; /* Hidden until button click */
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .table-header {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 { margin: 0; font-size: 15px; }

        .table-scroll {
            overflow: auto;
            max-height: 60vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            border-right: 1px solid var(--border);
            color: #475569;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
        }

        tr:nth-child(even) { background: #fbfcfd; }
        tr:hover { background: #f1f5f9; }

        /* Loader */
        #loader {
            display: flex;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary);"></i></div>

    <div class="top-section">
        <div class="abstract-grid">
            <div class="abstract-card">
                <div class="card-meta">
                    <h3>Gender Abstract</h3>
                    <i class="fas fa-venus-mars" style="color: var(--primary)"></i>
                </div>
                <div class="stat-group">
                    <div class="stat-box"><b id="male-count">0</b><span>MALE</span></div>
                    <div class="stat-box"><b id="female-count">0</b><span>FEMALE</span></div>
                </div>
                <button class="view-btn btn-indigo" onclick="showReport('gender')">
                    VIEW DETAILS <i class="fas fa-chevron-down"></i>
                </button>
            </div>

            <div class="abstract-card">
                <div class="card-meta">
                    <h3>Disability Abstract</h3>
                    <i class="fas fa-wheelchair" style="color: var(--secondary)"></i>
                </div>
                <div class="stat-group">
                    <div class="stat-box"><b id="pwd-count">0</b><span>PHYSICALLY CHALLENGED</span></div>
                </div>
                <button class="view-btn btn-green" onclick="showReport('pwd')">
                    VIEW FULL REPORT <i class="fas fa-chevron-down"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div id="data-container" class="data-container">
            <div class="table-header">
                <h2 id="report-title">Report View</h2>
                <input type="text" id="tableSearch" placeholder="Search this data..." oninput="filterTable()" 
                       style="padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; outline: none;">
            </div>
            <div class="table-scroll">
                <table id="mainTable">
                    <thead><tr id="tableHead"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
        let masterData = [];

        window.onload = () => {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    masterData = results.data;
                    updateCounts();
                    document.getElementById('loader').style.display = 'none';
                }
            });
        };

        function updateCounts() {
            let m = 0, f = 0, p = 0;
            masterData.forEach(row => {
                if(String(row.male_or_female).toLowerCase() === 'male') m++;
                if(String(row.male_or_female).toLowerCase() === 'female') f++;
                // Checking for column Physically_Disablity
                if(String(row.Physically_Disablity || row.Physically_Disability).toLowerCase() === 'yes') p++;
            });
            document.getElementById('male-count').textContent = m;
            document.getElementById('female-count').textContent = f;
            document.getElementById('pwd-count').textContent = p;
        }

        function showReport(type) {
            const container = document.getElementById('data-container');
            const title = document.getElementById('report-title');
            container.style.display = 'block';

            let displayData = [];
            let columns = [];

            if(type === 'gender') {
                title.textContent = "Gender Detailed Report";
                columns = ["username", "name", "Current_designation", "Lien_office", "male_or_female"];
                displayData = masterData;
            } else {
                title.textContent = "Physically Challenged Employee Abstract";
                columns = ["username","name","Current_designation","Lien_office","mobile","Date_of_birth","Retirement_date","PIN","E_mail","PAN_No.","Physically_Disablity","Marital_status","Qualification","Religion","Category","Caste_name","District","Home_town","Joining_date","Joining_designation","Appointment_type","Probationary_period_declaration","Probationary_period_declaration_date","Curent_designation_Date_of_entry","Entry_quota_current_designation","Pension_type","NDCPS_No.","Working_from_date","group","Counted_posts_within_division","Counted_posts_other_division","sanctioned_post","working_post","vacant_post","male_or_female"];
                displayData = masterData.filter(d => String(d.Physically_Disablity || d.Physically_Disability).toLowerCase() === 'yes');
            }

            renderTable(displayData, columns);
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderTable(data, cols) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            head.innerHTML = "<th>SI.No</th>";
            body.innerHTML = "";

            cols.forEach(c => {
                let th = document.createElement('th');
                th.textContent = c.replace(/_/g, ' ');
                head.appendChild(th);
            });

            const fragment = document.createDocumentFragment();
            data.forEach((row, i) => {
                let tr = document.createElement('tr');
                let tdSi = document.createElement('td'); tdSi.textContent = i + 1; tr.appendChild(tdSi);
                cols.forEach(c => {
                    let td = document.createElement('td');
                    td.textContent = row[c] || '-';
                    tr.appendChild(td);
                });
                fragment.appendChild(tr);
            });
            body.appendChild(fragment);
        }

        function filterTable() {
            let input = document.getElementById("tableSearch").value.toUpperCase();
            let tr = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                tr[i].style.display = tr[i].innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
