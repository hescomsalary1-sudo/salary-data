<!DOCTYPE html>
<html>
<head>
    <title>Leave Report - PDF & CSV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #4b2dd8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9ff; }

        .top { padding: 15px; background: var(--primary); color: white; display: flex; align-items: center; gap: 10px; }
        
        .search-container { padding: 15px; }
        .search-box {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;
            font-size: 14px; box-sizing: border-box; outline: none;
        }

        .download-box { display: flex; gap: 10px; padding: 0 15px 15px 15px; }
        .download-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white; font-weight: 600; cursor: pointer; font-size: 13px;
            transition: 0.2s; text-align: center;
        }
        .download-btn:active { transform: scale(0.95); }
        .pdf { background: #e74c3c; }
        .csv { background: #27ae60; }

        .tableBox { margin: 0 15px 15px 15px; border-radius: 12px; overflow-x: auto; background: white; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f4f4f9; color: var(--primary); padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #f1f1f1; text-align: center; }
        td:nth-child(2) { text-align: left; font-weight: 600; }
        
        #loader {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 35px; height: 35px; border: 4px solid rgba(75, 45, 216, 0.1);
            border-left-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:var(--primary); font-size:12px; margin-top:10px; font-weight:600;">Loading...</p>
    </div>

    <div class="top">
        <div onclick="window.history.back()" style="cursor:pointer;">⬅</div>
        <h3>Leave Report</h3>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search name or ID..." onkeyup="filterTable()">
    </div>

    <div class="download-box">
        <button class="download-btn pdf" onclick="downloadPDF()">⬇ Download PDF</button>
        <button class="download-btn csv" onclick="downloadCSV()">⬇ Download CSV</button>
    </div>

    <div class="tableBox" id="tableArea"></div>

    <script>
        function filterTable() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let tr = document.querySelectorAll("#leaveTable tbody tr");
            tr.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(input) ? "" : "none";
            });
        }

        async function loadData() {
            try {
                const [lRes, eRes] = await Promise.all([
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv?v=" + Date.now()),
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v=" + Date.now())
                ]);
                const lRows = (await lRes.text()).trim().split("\n");
                const eRows = (await eRes.text()).trim().split("\n");

                let uMap = {};
                eRows.slice(1).forEach(r => { let c = r.split(","); if(c[0]) uMap[c[0].trim()] = c[1]?.trim() || "-"; });

                let html = "<table id='leaveTable'><thead><tr><th>User ID</th><th>Name</th><th>EL</th><th>FPL</th></tr></thead><tbody>";
                let is2H = new Date().getMonth() >= 6;

                lRows.slice(1).forEach(r => {
                    let c = r.split(",");
                    if (c.length < 2) return;
                    let u = c[0].trim();
                    let el = (parseInt(c[3]) || 0) + (is2H ? 30 : 15);
                    let fpl = (parseInt(c[4]) || 0) + (is2H ? 10 : 5);
                    html += `<tr><td>${u}</td><td>${uMap[u]||"-"}</td><td>${el}</td><td>${fpl}</td></tr>`;
                });
                html += "</tbody></table>";
                document.getElementById("tableArea").innerHTML = html;
            } finally {
                document.getElementById("loader").style.display = "none";
            }
        }

        // --- PDF LOGIC ---
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            doc.setFontSize(18); doc.setTextColor(75, 45, 216);
            doc.text("HESCOM Leave Report", 40, 40);
            doc.autoTable({
                html: '#leaveTable', startY: 70, theme: 'grid',
                headStyles: { fillColor: [75, 45, 216] }
            });
            doc.save("Leave_Report.pdf");
        }

        // --- FIXED CSV LOGIC (FORCES TEXT DOWNLOAD) ---
        function downloadCSV() {
            let table = document.getElementById("leaveTable");
            let rows = table.querySelectorAll("tr");
            let csv = [];

            rows.forEach(row => {
                let data = [];
                // Process only visible rows (handles the search filter)
                if (row.style.display !== "none") {
                    row.querySelectorAll("th, td").forEach(cell => {
                        // Remove commas within text to keep CSV clean
                        data.push(cell.innerText.replace(/,/g, " "));
                    });
                    csv.push(data.join(","));
                }
            });

            const csvContent = csv.join("\n");
            
            // We use Base64 encoding to force mobile browsers to handle it as a new file
            const base64Content = btoa(unescape(encodeURIComponent(csvContent)));
            const link = document.createElement("a");
            
            // Explicitly set the MIME type to text/csv
            link.href = "data:text/csv;base64," + base64Content;
            link.download = "HESCOM_Leave_Report.csv";
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = loadData;
    </script>
</body>
</html>
