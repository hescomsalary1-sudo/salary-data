<!DOCTYPE html>
<html>
<head>
    <title>Leave Report - PDF Ready</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #4b2dd8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #ffffff; }

        /* HEADER */
        .top {
            padding: 15px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* BUTTONS */
        .download-box { display: flex; gap: 10px; padding: 15px; }
        .download-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white; font-weight: 600; cursor: pointer;
        }
        .pdf { background: #e74c3c; }
        .csv { background: #27ae60; }

        /* TABLE AREA */
        .tableBox { margin: 15px; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f4f4f9; color: var(--primary); padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        td:nth-child(2) { text-align: left; font-weight: 600; }

        /* --- SIMPLE PREMIUM SPINNER --- */
        #loader {
            display: flex; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: white;
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(75, 45, 216, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 🔥 A4 PDF PRINT LOGIC --- */
        @media print {
            @page { size: A4; margin: 1cm; }
            body { background: white; }
            .top, .download-box, #loader { display: none !important; }
            .tableBox { margin: 0; border: none; box-shadow: none; overflow: visible; }
            table { width: 100%; border: 1px solid #000; font-size: 11px; }
            th, td { border: 1px solid #000; padding: 8px; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:var(--primary); font-size:12px; margin-top:10px; font-weight:600;">Processing...</p>
    </div>

    <div class="top">
        <div onclick="window.history.back()" style="cursor:pointer;">⬅</div>
        <h3>Leave Report</h3>
    </div>

    <div class="download-box">
        <button class="download-btn pdf" onclick="downloadPDF()">📄 Print PDF (A4)</button>
        <button class="download-btn csv" onclick="downloadCSVReport()">⬇ Download CSV</button>
    </div>

    <div class="print-header">
        <h2 style="margin:0;">HESCOM</h2>
        <p style="margin:5px 0;">Official Leave Summary Report</p>
        <hr>
    </div>

    <div id="tableArea" class="tableBox"></div>

    <script>
        async function loadData() {
            try {
                const [leaveRes, empRes] = await Promise.all([
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv?v=" + Date.now()),
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v=" + Date.now())
                ]);

                const leaveRows = (await leaveRes.text()).trim().split("\n");
                const empRows = (await empRes.text()).trim().split("\n");

                let userMap = {};
                empRows.slice(1).forEach(row => {
                    let c = row.split(",");
                    if(c[0]) userMap[c[0].trim()] = c[1]?.trim() || "-";
                });

                let html = "<table><thead><tr><th>User ID</th><th>Employee Name</th><th>EL</th><th>FPL</th></tr></thead><tbody>";

                let today = new Date();
                let isSecondHalf = today.getMonth() >= 6; // July or later

                leaveRows.slice(1).forEach(row => {
                    let c = row.split(",");
                    if (c.length < 2) return;

                    let user = c[0].trim();
                    let el = parseInt(c[3]) || 0;
                    let fpl = parseInt(c[4]) || 0;

                    // Credit Rules
                    el += isSecondHalf ? 30 : 15;
                    fpl += isSecondHalf ? 10 : 5;

                    html += `<tr>
                        <td>${user}</td>
                        <td>${userMap[user] || "-"}</td>
                        <td>${el}</td>
                        <td>${fpl}</td>
                    </tr>`;
                });

                html += "</tbody></table>";
                document.getElementById("tableArea").innerHTML = html;
            } catch (e) {
                document.getElementById("tableArea").innerHTML = "Error loading data.";
            } finally {
                document.getElementById("loader").style.display = "none";
            }
        }

        function downloadPDF() {
            // Simply trigger the browser's high-quality print engine
            // The @media print CSS will format it to A4 automatically
            window.print();
        }

        function downloadCSVReport() {
            let csv = [];
            document.querySelectorAll("table tr").forEach(row => {
                let data = [];
                row.querySelectorAll("th,td").forEach(cell => data.push(cell.innerText));
                csv.push(data.join(","));
            });
            let blob = new Blob([csv.join("\n")], { type: "text/csv" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Leave_Report.csv";
            a.click();
        }

        window.onload = loadData;
    </script>
</body>
</html>
