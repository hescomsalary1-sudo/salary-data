<!DOCTYPE html>
<html>
<head>
    <title>Leave Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #4b2dd8;
            --accent: #00c9a7;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #ffffff;
        }

        /* HEADER */
        .top {
            padding: 20px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 12px rgba(75, 45, 216, 0.2);
        }

        .back {
            font-size: 22px;
            cursor: pointer;
        }

        /* TABLE STYLING */
        .tableBox {
            margin: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            background: white;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8f9ff;
            color: var(--primary);
            padding: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #eee;
            text-align: center;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #f1f1f1;
            text-align: center;
            color: #444;
        }

        /* NAME COLUMN */
        td:nth-child(2) {
            text-align: left;
            font-weight: 600;
            color: #1a1a1a;
        }

        /* DOWNLOAD BUTTONS */
        .download-box {
            display: flex;
            gap: 12px;
            padding: 15px;
        }

        .download-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pdf { background: linear-gradient(135deg, #ff4b2b, #ff0000); }
        .csv { background: linear-gradient(135deg, #00c853, #009624); }
        
        .download-btn:active { transform: scale(0.96); }

        /* --- PREMIUM LIQUID LOADER --- */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .blob-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 10px 20px rgba(75, 45, 216, 0.2));
        }

        .liquid-shape {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            animation: morph 4s ease-in-out infinite;
        }

        @keyframes morph {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: rotate(0deg); }
            33% { border-radius: 70% 30% 46% 54% / 30% 29% 71% 70%; transform: rotate(120deg); }
            66% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; transform: rotate(240deg); }
        }

        .loader-text {
            margin-top: 25px;
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="blob-wrapper">
            <div class="liquid-shape"></div>
        </div>
        <div class="loader-text">Generating Report</div>
    </div>

    <div class="top">
        <div class="back" onclick="goBack()">⬅</div>
        <h3 id="title">Leave Report</h3>
    </div>

    <div class="download-box">
        <button class="download-btn pdf" onclick="downloadPDF()">📄 PDF</button>
        <button class="download-btn csv" onclick="downloadCSVReport()">⬇ CSV</button>
    </div>

    <div id="tableArea" class="tableBox"></div>

    <script>
        function goBack() { window.history.back(); }

        async function loadData() {
            try {
                /* FETCH LEAVES AND EMPLOYEE DATA */
                const [leaveRes, empRes] = await Promise.all([
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv?v=" + new Date().getTime()),
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v=" + new Date().getTime())
                ]);

                const leaveText = await leaveRes.text();
                const empText = await empRes.text();

                const leaveRows = leaveText.trim().split("\n");
                const empRows = empText.trim().split("\n");

                /* CREATE USER → NAME MAP */
                let userMap = {};
                for (let i = 1; i < empRows.length; i++) {
                    let c = empRows[i].split(",");
                    if (c[0]) userMap[c[0].trim()] = c[1]?.trim() || "-";
                }

                /* TABLE GENERATION */
                let html = "<table><thead><tr><th>User</th><th>Name</th><th>EL</th><th>FPL</th></tr></thead><tbody>";

                let today = new Date();
                let year = today.getFullYear();
                let jan1 = new Date(year, 0, 1);
                let july1 = new Date(year, 6, 1);

                for (let i = 1; i < leaveRows.length; i++) {
                    let c = leaveRows[i].split(",");
                    if (c.length < 2) continue;

                    let user = c[0].trim();
                    let el = parseInt(c[3]) || 0;
                    let fpl = parseInt(c[4]) || 0;

                    /* CREDIT RULES */
                    if (today >= jan1 && today < july1) { el += 15; fpl += 5; }
                    if (today >= july1) { el += 30; fpl += 10; }

                    html += `<tr>
                        <td>${user}</td>
                        <td>${userMap[user] || "-"}</td>
                        <td>${el}</td>
                        <td>${fpl}</td>
                    </tr>`;
                }

                html += "</tbody></table>";
                document.getElementById("tableArea").innerHTML = html;
            } catch (e) {
                console.error("Error loading data", e);
                document.getElementById("tableArea").innerHTML = "<p style='padding:20px; color:red;'>Failed to load report data.</p>";
            } finally {
                document.getElementById("loader").style.display = "none";
            }
        }

        // CSV DOWNLOAD
        function downloadCSVReport() {
            let table = document.querySelector("table");
            if (!table) return alert("No data");
            
            let csv = [];
            table.querySelectorAll("tr").forEach(row => {
                let data = [];
                row.querySelectorAll("th,td").forEach(col => data.push(col.innerText.replace(/,/g, " ")));
                csv.push(data.join(","));
            });

            let blob = new Blob([csv.join("\n")], { type: "text/csv" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Leave_Report.csv";
            a.click();
        }

        // PDF DOWNLOAD (PRINT)
        function downloadPDF() {
            const table = document.getElementById("tableArea").innerHTML;
            const originalBody = document.body.innerHTML;
            document.body.innerHTML = `<h2 style="text-align:center; color:#4b2dd8;">Leave Report</h2>${table}`;
            window.print();
            document.body.innerHTML = originalBody;
            location.reload();
        }

        window.onload = loadData;
    </script>
</body>
</html>
