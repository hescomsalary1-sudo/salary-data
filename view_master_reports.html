<!DOCTYPE html>
<html>
<head>
    <title>Leave Report - Download Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #4b2dd8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #ffffff; }

        .top { padding: 15px; background: var(--primary); color: white; display: flex; align-items: center; gap: 10px; }
        .download-box { display: flex; gap: 10px; padding: 15px; }
        .download-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .download-btn:active { transform: scale(0.95); }
        .pdf { background: #e74c3c; }
        .csv { background: #27ae60; }

        .tableBox { margin: 15px; border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f4f4f9; color: var(--primary); padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        td:nth-child(2) { text-align: left; font-weight: 600; }

        /* SIMPLE MODERN SPINNER */
        #loader {
            display: flex; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: white;
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 35px; height: 35px;
            border: 4px solid rgba(75, 45, 216, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:var(--primary); font-size:12px; margin-top:10px; font-weight:600;">Preparing Report...</p>
    </div>

    <div class="top">
        <div onclick="window.history.back()" style="cursor:pointer;">⬅</div>
        <h3>Leave Summary</h3>
    </div>

    <div class="download-box">
        <button class="download-btn pdf" onclick="downloadPDF()">⬇ Download PDF</button>
        <button class="download-btn csv" onclick="downloadCSVReport()">⬇ Download CSV</button>
    </div>

    <div id="tableArea" class="tableBox"></div>

    <script>
        async function loadData() {
            try {
                const [leaveRes, empRes] = await Promise.all([
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv?v=" + Date.now()),
                    fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v=" + Date.now())
                ]);

                const leaveRows = (await leaveRes.text()).trim().split("\n");
                const empRows = (await empRes.text()).trim().split("\n");

                let userMap = {};
                empRows.slice(1).forEach(row => {
                    let c = row.split(",");
                    if(c[0]) userMap[c[0].trim()] = c[1]?.trim() || "-";
                });

                let html = "<table id='leaveTable'><thead><tr><th>User ID</th><th>Name</th><th>EL</th><th>FPL</th></tr></thead><tbody>";
                let today = new Date();
                let isSecondHalf = today.getMonth() >= 6;

                leaveRows.slice(1).forEach(row => {
                    let c = row.split(",");
                    if (c.length < 2) return;
                    let user = c[0].trim();
                    let el = (parseInt(c[3]) || 0) + (isSecondHalf ? 30 : 15);
                    let fpl = (parseInt(c[4]) || 0) + (isSecondHalf ? 10 : 5);

                    html += `<tr><td>${user}</td><td>${userMap[user] || "-"}</td><td>${el}</td><td>${fpl}</td></tr>`;
                });

                html += "</tbody></table>";
                document.getElementById("tableArea").innerHTML = html;
            } catch (e) {
                document.getElementById("tableArea").innerHTML = "Error loading report.";
            } finally {
                document.getElementById("loader").style.display = "none";
            }
        }

        // REAL PDF DOWNLOAD LOGIC
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');

            // Add Header Text
            doc.setFontSize(18);
            doc.setTextColor(75, 45, 216); // Brand Color
            doc.text("HESCOM Leave Report", 40, 40);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 40, 55);

            // AutoTable handles the A4 scaling and formatting automatically
            doc.autoTable({
                html: '#leaveTable',
                startY: 70,
                theme: 'grid',
                headStyles: { fillColor: [75, 45, 216] },
                styles: { fontSize: 9, cellPadding: 8 }
            });

            doc.save("HESCOM_Leave_Report.pdf");
        }

        function downloadCSVReport() {
            let csv = [];
            document.querySelectorAll("table tr").forEach(row => {
                let data = [];
                row.querySelectorAll("th,td").forEach(cell => data.push(cell.innerText));
                csv.push(data.join(","));
            });
            let blob = new Blob([csv.join("\n")], { type: "text/csv" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Leave_Report.csv";
            a.click();
        }

        window.onload = loadData;
    </script>
</body>
</html>
