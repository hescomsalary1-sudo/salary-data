<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ELS Form</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Noto Sans Kannada', sans-serif;
    background:#f5f6fb;
}

/* MOBILE CARD */
.card{
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

/* FORM ROW */
.row{
    margin-bottom:15px;
    font-size:14px;
}

.line-input{
    width:100%;
    border:none;
    border-bottom:1px solid #000;
    padding:6px;
    font-size:15px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#4b2dd8;
    color:#fff;
    border:none;
    border-radius:8px;
    margin-top:10px;
}

/* ---------- PDF TEMPLATE ---------- */
#pdfTemplate{
    position:absolute;
    left:-9999px;
    width:210mm;
    min-height:297mm;
    padding:15mm;
    background:#fff;
    color:#000;
    font-size:14px;
    line-height:1.8;
}
.line{
    border-bottom:1px solid #000;
    display:inline-block;
    width:70%;
}
</style>
</head>

<body>

<div class="card">

<h3 style="text-align:center;">ELS Application</h3>

<div class="row">1. ಹೆಸರು :
<input id="name" class="line-input"></div>

<div class="row">2. 
<input id="field2" class="line-input"></div>

<div class="row">3. ಹುದ್ದೆ :
<input id="designation" class="line-input"></div>

<div class="row">4. ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಸ್ಥಳ :
<input id="place" class="line-input"></div>

<div class="row">5. 
<input id="field5" class="line-input"></div>

<div class="row">6. ವಿವರ :
<textarea id="field6" class="line-input"></textarea></div>

<div class="row">7. 
<input id="field7" class="line-input"></div>

<div class="row">8. 
<input id="field8" class="line-input"></div>

<div class="row">9. 
<input id="field9" class="line-input"></div>

<div class="row">ದಿನಾಂಕ :
<input id="date" type="date" class="line-input"></div>

<button onclick="generatePDF()">Submit & Generate PDF</button>

</div>

<!-- EXACT PDF STRUCTURE -->
<div id="pdfTemplate">

<h3 style="text-align:center;">ಕರ್ನಾಟಕ ವಿದ್ಯುತ್ ಪ್ರಸರಣ ನಿಗಮ ನಿಯಮಿತ</h3>
<p style="text-align:center;">ಗಳಿಸಿದ ರಜೆ ಸರ್ಪಣೆ ಅರ್ಜಿ</p>

<p>1. ಅಧಿಕಾರಿಯ ಹೆಸರು : <span class="line" id="p1"></span></p>
<p>2. <span class="line" id="p2"></span></p>
<p>3. ಹುದ್ದೆ : <span class="line" id="p3"></span></p>
<p>4. ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಸ್ಥಳ : <span class="line" id="p4"></span></p>
<p>5. <span class="line" id="p5"></span></p>

<p>6. ವಿವರ :</p>
<p style="border-bottom:1px solid #000;" id="p6"></p>

<p>7. <span class="line" id="p7"></span></p>
<p>8. <span class="line" id="p8"></span></p>
<p>9. <span class="line" id="p9"></span></p>

<br><br>

<p>ದಿನಾಂಕ : <span id="pdate"></span></p>

<br><br>

<p style="text-align:right;">ಅಧಿಕಾರಿಯ ಸಹಿ</p>

</div>

<script>

const username = localStorage.getItem("username") || "emp1";

/* AUTO LOAD EMPLOYEE */
async function loadEmp(){

    const res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v="+Date.now());
    const text = await res.text();

    let rows = text.trim().split("\n");

    rows.slice(1).forEach(r=>{
        let c = r.split(",");

        if(c[0].trim() === username){

            name.value = c[1]?.trim();
            designation.value = c[2]?.trim();
            place.value = c[3]?.trim();
        }
    });
}

/* FILL PDF */
function fillPDF(){

    p1.innerText = name.value;
    p2.innerText = field2.value;
    p3.innerText = designation.value;
    p4.innerText = place.value;
    p5.innerText = field5.value;
    p6.innerText = field6.value;
    p7.innerText = field7.value;
    p8.innerText = field8.value;
    p9.innerText = field9.value;
    pdate.innerText = date.value;
}

/* PERFECT PDF */
async function generatePDF(){

    fillPDF();

    const { jsPDF } = window.jspdf;
    const element = document.getElementById("pdfTemplate");

    const canvas = await html2canvas(element,{scale:3});

    const img = canvas.toDataURL("image/jpeg",1);

    const pdf = new jsPDF('p','mm','a4');

    pdf.addImage(img,'JPEG',0,0,210,297);

    pdf.save("ELS_Form.pdf");
}

/* INIT */
loadEmp();

</script>

</body>
</html>
