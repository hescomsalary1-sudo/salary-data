<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELS Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#f4f6fb;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#3f2b96,#6a11cb);
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:18px;
    font-weight:600;
    position:sticky;
    top:0;
}

/* CARD */
.card{
    background:#fff;
    margin:15px;
    padding:18px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* TITLE */
.title{
    font-weight:600;
    font-size:16px;
    margin-bottom:10px;
}

/* FLEX */
.row{
    display:flex;
    gap:10px;
}

/* STAT BOX */
.stat{
    flex:1;
    padding:15px;
    border-radius:14px;
    background:#f1f3ff;
    text-align:center;
}

.stat.green{
    background:#e9f8ef;
}

.stat h2{
    margin:5px 0 0;
    color:#3f2b96;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:15px;
    margin-top:12px;
    cursor:pointer;
}

.btn-green{
    background:#16a34a;
    color:#fff;
}

.btn-blue{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:#fff;
}

/* PERIOD */
.period{
    background:#fdecec;
    padding:12px;
    border-radius:10px;
    margin-top:12px;
    color:#e11d48;
    font-weight:500;
}

/* DATE INPUT */
.inputBox{
    flex:1;
    background:#f8fafc;
    padding:10px;
    border-radius:10px;
}

input{
    width:100%;
    border:none;
    background:none;
    font-size:14px;
}

/* TOTAL DAYS */
.totalBox{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th{
    background:#eef2ff;
    padding:10px;
    font-size:12px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #eee;
}

.status{
    background:#dcfce7;
    color:#16a34a;
    padding:4px 10px;
    border-radius:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">ELS APPLICATION</div>

<!-- CARD 1 -->
<div class="card">
<div class="title">EL Credit Overview</div>

<div class="row">
    <div class="stat">
        <div>Total EL</div>
        <h2 id="totalEL">0</h2>
    </div>

    <div class="stat green">
        <div>Eligible</div>
        <h2 id="eligibleEL">0</h2>
    </div>
</div>

<button class="btn btn-green" onclick="showELSBox()">
Apply for EL Surrender
</button>

<div id="elsBox" style="display:none">

<div class="period">
Last ELS Period: <span id="lastPeriod"></span>
</div>

<div class="row">
    <div class="inputBox">
        <label>From</label>
        <input type="date" id="fromDate">
    </div>

    <div class="inputBox">
        <label>To</label>
        <input type="date" id="toDate">
    </div>
</div>

<div class="totalBox">
    <div>Total Days: <b id="totalDays">0</b></div>
    <button class="btn btn-blue" onclick="validateDates()">Check</button>
</div>

</div>
</div>

<!-- CARD 2 -->
<div class="card">
<div class="title">ELS Bills</div>

<table>
<thead>
<tr>
<th>Year</th>
<th>Amount</th>
<th>Period</th>
<th>Status</th>
<th>Days</th>
</tr>
</thead>

<tbody id="billBody"></tbody>

</table>
</div>

<script>

const username = localStorage.getItem("username") || "emp1";
let lastToDate=null;

/* LOADER */
function showLoader(text){
    loader.style.display="flex";
    loaderText.innerText=text;
}
function hideLoader(){
    loader.style.display="none";
}

/* EL */
async function loadEL(){
    let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
    let t=await r.text();

    let is2H = new Date().getMonth() >= 6;

    t.split("\n").slice(1).forEach(x=>{
        let c=x.split(",");
        if(c[0].trim()==username){
            let base=parseInt(c[3])||0;
            let total=base+(is2H?30:15);
            totalEL.innerText=total;
            eligibleEL.innerText=total-15;
        }
    });
}

/* EMP */
async function loadEmp(){

    try{
        const res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v="+Date.now());
        const text = await res.text();

        let rows = text.trim().split("\n");

        let found = false;

        rows.slice(1).forEach(r=>{
            let c = r.split(",");

            if(c[0].trim() === username){

                document.getElementById("name").value = c[1]?.trim() || "";
                document.getElementById("designation").value = c[2]?.trim() || "";
                document.getElementById("place").value = c[3]?.trim() || "";

                found = true;
            }
        });

        if(!found){
            console.log("User not found in employee.csv");
        }

    }catch(e){
        console.error("EMP LOAD ERROR:", e);
    }
}

/* BILLS */
async function loadBills(){
    let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");
    let t=await r.text();

    let html="";
    t.split("\n").slice(1).forEach(x=>{
        let c=x.split(",");
        if(c[0].trim()==username){
            html+=`<tr>
            <td>${c[1]}</td>
            <td>${c[2]}</td>
            <td>${c[3]}</td>
            <td>${c[4]}</td>
            <td>${c[6]}</td>
            </tr>`;
        }
    });
    billBody.innerHTML=html;
}

/* LAST ELS */
async function loadLastELS(){
    let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");
    let t=await r.text();

    t.split("\n").slice(1).forEach(x=>{
        let c=x.split(",");
        if(c[0].trim()==username && c[3].includes("to")){
            lastPeriod.innerText=c[3];
            let d=c[3].split("to")[1].trim().split(".");
            lastToDate=new Date(d[2],d[1]-1,d[0]);
        }
    });
}

/* UI */
function showELSBox(){
    elsBox.style.display="block";
}

/* VALIDATE */
function validateDates(){

    let f = fromDate.value;
    let t = toDate.value;

    validationMsg.style.display = "none";
    proceedBtn.style.display = "none";

    if(!f || !t){
        showPopup("Please select both dates");
        return;
    }

    let from = new Date(f);
    let to = new Date(t);

    if(lastToDate){
        let next = new Date(lastToDate);
        next.setFullYear(next.getFullYear()+1);

        if(from < next){
            showPopup("Not eligible yet (1 year rule)");
            return;
        }
    }

    let daysCount = (to - from) / (1000*60*60*24) + 1;

    if(daysCount <= 0){
        showPopup("Invalid date range");
        return;
    }

    // ❌ LESS THAN 30
    if(daysCount < 30){
        totalDays.innerHTML = `<span style="color:red;">${daysCount}</span>`;
        validationMsg.innerHTML = "Minimum 30 days required";
        validationMsg.style.color = "red";
        validationMsg.style.display = "block";
        showPopup("Minimum 30 days required");
        return;
    }

    // ❌ MORE THAN 60
    if(daysCount > 60){
        totalDays.innerHTML = `<span style="color:red;">${daysCount}</span>`;
        validationMsg.innerHTML = "Maximum 60 days allowed";
        validationMsg.style.color = "red";
        validationMsg.style.display = "block";
        showPopup("Maximum 60 days allowed");
        return;
    }

    // ✅ VALID
    totalDays.innerHTML = `<span style="color:green;">${daysCount}</span>`;
    validationMsg.style.display = "none";
    proceedBtn.style.display = "block";
}

/* OPEN FORM */
async function openForm(){

    showLoader("Loading Application...");

    // show form first
    formContainer.style.display = "block";

    // small delay for smooth UI
    await new Promise(r => setTimeout(r, 300));

    // NOW load employee data
    await loadEmp();

    // fill period & days
    document.getElementById("period").value =
        fromDate.value + " to " + toDate.value;

    document.getElementById("days").value =
        totalDays.innerText;

    hideLoader();
}

/* PDF */
/* ---------- PERFECT PDF ---------- */
async function generatePDF(){

    const { jsPDF } = window.jspdf;
    const element = document.getElementById("pdfArea");

    // Force width for high quality capture even if screen is small
    const canvas = await html2canvas(element,{
        scale: 3,  
        useCORS: true,
        windowWidth: 794 // Approx width of A4 in pixels at 96 DPI
    });

    const imgData = canvas.toDataURL("image/jpeg",1.0);

    const pdf = new jsPDF('p','mm','a4');

    const pageWidth = 210;
    const pageHeight = 297;

    const imgWidth = pageWidth - 20; // margins
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let position = 10;

    if(imgHeight <= pageHeight){
        pdf.addImage(imgData,'JPEG',10,position,imgWidth,imgHeight);
    }else{
        let heightLeft = imgHeight;
        let y = 10;

        pdf.addImage(imgData,'JPEG',10,y,imgWidth,imgHeight);
        heightLeft -= pageHeight;

        while(heightLeft > 0){
            pdf.addPage();
            y = heightLeft - imgHeight + 10;
            pdf.addImage(imgData,'JPEG',10,y,imgWidth,imgHeight);
            heightLeft -= pageHeight;
        }
    }

    pdf.save("ELS_Form.pdf");
}

/* INIT */
loadEL();
loadEmp();
loadBills();
loadLastELS();
function showPopup(msg){
    popup.style.display = "flex";
    popupText.innerText = msg;
}

function closePopup(){
    popup.style.display = "none";
}

</script>

</body>
</html>
