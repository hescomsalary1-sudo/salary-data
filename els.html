<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELS Module</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Noto Sans Kannada', sans-serif;
    background:#f5f6fb;
}

/* HEADER */
.header{
    background:#4b2dd8;
    color:#fff;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

/* CARD */
.card{
    background:#fff;
    margin:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

/* INPUT */
input, textarea{
    width:100%;
    border:none;
    border-bottom:1px solid #000;
    padding:6px;
    margin-top:5px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#4b2dd8;
    color:#fff;
    border:none;
    border-radius:8px;
    margin-top:15px;
}

/* LOADER */
#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid #ddd;
    border-top:4px solid #4b2dd8;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}

/* PDF AREA */
#pdfArea{
    width:100%;
    max-width:210mm;
    margin:auto;
    background:#fff;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">ELS APPLICATION</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
<p id="loaderText">Loading...</p>
</div>

<!-- EL DETAILS -->
<div class="card">
<p>Total EL: <b id="totalEL">0</b></p>
<p>Eligible: <b id="eligibleEL">0</b></p>

<button onclick="showELSBox()" style="background:#27ae60;">
Apply for EL Surrender
</button>

<div id="elsBox" style="display:none;">

<p style="color:red;">Last Period: <span id="lastPeriod"></span></p>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<p>Total Days: <b id="totalDays">0</b></p>

<button onclick="validateDates()">Check</button>
<button id="proceedBtn" style="display:none;" onclick="openForm()">Proceed</button>

</div>
</div>

<!-- FORM (HIDDEN INITIALLY) -->
<div class="card" id="formContainer" style="display:none;">

<div id="pdfArea">

<h3 style="text-align:center;">KPTCL</h3>

<p>1. Name <input id="name"></p>
<p>2. Designation <input id="designation"></p>
<p>3. Place <input id="place"></p>

<p>7. Period <input id="period"></p>
<p>8. Days <input id="days"></p>

<p>Date <input id="date"></p>

</div>

<button onclick="generatePDF()">Generate PDF</button>

</div>

<script>

const username = localStorage.getItem("username") || "emp1";
let lastToDate = null;

/* LOADER CONTROL */
function showLoader(text="Loading..."){
    loader.style.display="flex";
    loaderText.innerText=text;
}

function hideLoader(){
    loader.style.display="none";
}

/* EL */
async function loadEL(){
    let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
    let t=await r.text();

    t.split("\n").slice(1).forEach(x=>{
        let c=x.split(",");
        if(c[0]==username){
            let el=parseInt(c[3]||0)+15;
            totalEL.innerText=el;
            eligibleEL.innerText=el-15;
        }
    });
}

/* EMP LOAD */
async function loadEmp(){
    let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
    let t=await r.text();

    t.split("\n").slice(1).forEach(x=>{
        let c=x.split(",");
        if(c[0]==username){
            name.value=c[1]||"";
            designation.value=c[2]||"";
            place.value=c[3]||"";
        }
    });
}

/* LAST ELS */
async function loadLastELS(){
    let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");
    let t=await r.text();

    t.split("\n").slice(1).forEach(x=>{
        let c=x.split(",");
        if(c[0]==username && c[3].includes("to")){
            lastPeriod.innerText=c[3];

            let d=c[3].split("to")[1].trim().split(".");
            lastToDate=new Date(d[2],d[1]-1,d[0]);
        }
    });
}

/* SHOW BOX */
function showELSBox(){
    elsBox.style.display="block";
}

/* VALIDATE */
function validateDates(){

    let f=fromDate.value;
    let t=toDate.value;

    if(!f||!t){ alert("Select dates"); return; }

    let from=new Date(f);
    let to=new Date(t);

    let next=new Date(lastToDate);
    next.setFullYear(next.getFullYear()+1);

    if(from<next){
        alert("Not eligible yet");
        return;
    }

    let days=(to-from)/(1000*60*60*24)+1;

    totalDays.innerText=days;
    proceedBtn.style.display="block";
}

/* OPEN FORM WITH LOADER */
async function openForm(){

    showLoader("Loading Application...");

    await new Promise(r=>setTimeout(r,800)); // smooth effect

    formContainer.style.display="block";

    await loadEmp();

    period.value=fromDate.value+" to "+toDate.value;
    days.value=totalDays.innerText;

    hideLoader();
}

/* PDF */
async function generatePDF(){

    showLoader("Generating PDF...");

    const { jsPDF } = window.jspdf;

    const canvas = await html2canvas(pdfArea,{scale:3});
    const img = canvas.toDataURL("image/jpeg");

    const pdf = new jsPDF('p','mm','a4');
    pdf.addImage(img,'JPEG',10,10,190,0);

    pdf.save("ELS.pdf");

    hideLoader();
}

/* INIT */
loadEL();
loadLastELS();

</script>

</body>
</html>
