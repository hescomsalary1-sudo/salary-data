<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ELS Application</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Noto Sans Kannada', sans-serif;
    background:#f5f6fb;
}

/* HEADER */
.header{
    background:#4b2dd8;
    color:#fff;
    padding:15px;
    text-align:center;
}

/* CARD */
.card{
    background:#fff;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#4b2dd8;
    color:#fff;
    border:none;
    border-radius:10px;
    margin-top:15px;
}

/* ----------- HIDDEN A4 TEMPLATE ----------- */
#pdfTemplate{
    width:210mm;
    min-height:297mm;
    padding:15mm;
    background:#fff;
    position:absolute;
    left:-9999px; /* hide */
    top:0;
}
</style>
</head>

<body>

<div class="header">ELS APPLICATION</div>

<!-- MOBILE FORM -->
<div class="card">

<h3>ELS Application</h3>

<input id="name" placeholder="Name">
<input id="designation" placeholder="Designation">
<input id="place" placeholder="Working Place">
<input id="salary" placeholder="Salary">
<input id="service" placeholder="Service">

<textarea id="leaveDetails" placeholder="Leave Details"></textarea>

<input id="period" placeholder="Period">
<input id="days" placeholder="Days">
<input id="reason" placeholder="Reason">

<input id="date" type="date">

<button onclick="generatePDF()">Submit & Generate PDF</button>

</div>

<!-- HIDDEN PDF TEMPLATE -->
<div id="pdfTemplate">

<h3 style="text-align:center;">ಕರ್ನಾಟಕ ವಿದ್ಯುತ್ ಪ್ರಸರಣ ನಿಗಮ ನಿಯಮಿತ</h3>
<p style="text-align:center;">ಗಳಿಸಿದ ರಜೆ ಸರ್ಪಣೆ ಅರ್ಜಿ</p>

<p>1. ಹೆಸರು : <span id="p_name"></span></p>
<p>2. ಹುದ್ದೆ : <span id="p_designation"></span></p>
<p>3. ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಸ್ಥಳ : <span id="p_place"></span></p>
<p>4. ವೇತನ : <span id="p_salary"></span></p>
<p>5. ಸೇವೆ : <span id="p_service"></span></p>

<p>6. ರಜೆ ವಿವರ :</p>
<p id="p_leave"></p>

<p>7. ಅವಧಿ : <span id="p_period"></span></p>
<p>8. ದಿನಗಳು : <span id="p_days"></span></p>
<p>9. ಕಾರಣ : <span id="p_reason"></span></p>

<br><br>

<p>ದಿನಾಂಕ : <span id="p_date"></span></p>

<br><br>

<p style="text-align:right;">ಸಹಿ</p>

</div>

<script>

/* COPY DATA TO PDF TEMPLATE */
function fillPDF(){

    p_name.innerText = name.value;
    p_designation.innerText = designation.value;
    p_place.innerText = place.value;
    p_salary.innerText = salary.value;
    p_service.innerText = service.value;
    p_leave.innerText = leaveDetails.value;
    p_period.innerText = period.value;
    p_days.innerText = days.value;
    p_reason.innerText = reason.value;
    p_date.innerText = date.value;
}

/* PERFECT A4 PDF */
async function generatePDF(){

    fillPDF();

    const { jsPDF } = window.jspdf;
    const element = document.getElementById("pdfTemplate");

    const canvas = await html2canvas(element,{
        scale:3,
        useCORS:true
    });

    const imgData = canvas.toDataURL("image/jpeg",1);

    const pdf = new jsPDF('p','mm','a4');

    pdf.addImage(imgData,'JPEG',0,0,210,297);

    pdf.save("ELS_Form.pdf");
}

</script>

</body>
</html>
