<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:20px;
text-align:center;
}

/* LIST */
.container{
padding:15px;
}

.item{
display:flex;
align-items:center;
gap:15px;
background:white;
border-radius:18px;
padding:15px;
margin-bottom:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
cursor:pointer;
}

.item img{
width:40px;
}

.text{
flex:1;
}

.text h4{
margin:0;
font-size:15px;
}

.text p{
margin:3px 0 0;
font-size:12px;
color:#777;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

.skeleton{
height:60px;
border-radius:12px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}
</style>
</head>

<body>

<div class="top">
<h2>📊 Seniority</h2>
</div>

<div class="container">

<div class="item" onclick="openPage('Mech.Gr-2.html')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<div class="text">
<h4>Mech.Gr-2</h4>
<p>Mechanical group seniority list</p>
</div>
</div>

<div class="item" onclick="openPage('powerman.html')">
<img src="https://cdn-icons-png.flaticon.com/512/942/942748.png">
<div class="text">
<h4>Powerman</h4>
<p>Powerman seniority list</p>
</div>
</div>

<div class="item" onclick="openPage('Assistant_powerman.html')">
<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">
<div class="text">
<h4>Assistant Powerman</h4>
<p>Assistant Powerman details</p>
</div>
</div>

<div class="item" onclick="openPage('Junior_powerman.html')">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
<div class="text">
<h4>Junior Powerman</h4>
<p>Junior level details</p>
</div>
</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

function openPage(url){

document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location = url;
},600);

}

</script>

</body>
</html>
