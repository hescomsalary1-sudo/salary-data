<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#e6ecff,#dfe7ff,#f0ebff);
padding-bottom:70px;
overflow-x:hidden;
color:#111827;
}

/* HEADER */

.top{
padding:15px 22px;
background:linear-gradient(135deg,#0d1b8f,#1a2edb);
display:flex;
align-items:center;
gap:10px;
border-bottom-left-radius:22px;
border-bottom-right-radius:22px;
box-shadow:0 6px 18px rgba(0,0,0,0.10);
color:white;
}

.icon{
width:36px;
height:36px;
background:white;
color:#4f46e5;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.top h2{
font-size:28px;
color:white;
font-weight:700;
}

/* BACK BUTTON */

.back-btn{
width:36px;
height:36px;
border-radius:12px;
background:rgba(255,255,255,0.92);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.10);
transition:.2s;
flex-shrink:0;
}

.back-btn:active{
transform:scale(.94);
}

/* SEARCH CONTAINER */

.container{
background:rgba(255,255,255,0.72);
backdrop-filter:blur(14px);
margin:14px;
padding:14px;
border-radius:22px;
box-shadow:0 8px 22px rgba(0,0,0,0.06);
animation:slideUp .4s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.row{
display:flex;
gap:8px;
}

select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:12px;
border:none;
background:#f1f5f9;
font-size:13px;
font-weight:600;
outline:none;
}

button{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
}

/* SUMMARY CARDS */

.summaryCards{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.summaryCard{
padding:12px;
border-radius:16px;
color:white;
text-align:center;
box-shadow:0 5px 14px rgba(0,0,0,0.08);
position:relative;
overflow:hidden;
}

.summaryCard::before{
content:"";
position:absolute;
right:-18px;
top:-18px;
width:65px;
height:65px;
background:rgba(255,255,255,0.14);
border-radius:50%;
}

.sumCount{
font-size:19px;
font-weight:800;
margin-bottom:3px;
}

.presentCard{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.leaveCard{
background:linear-gradient(135deg,#f59e0b,#facc15);
color:#333;
}

.absentCard{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.holidayCard{
background:linear-gradient(135deg,#2563eb,#3b82f6);
}

/* ATTENDANCE WRAPPER */

.attendanceWrapper{
margin:14px;
padding:14px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
border-radius:24px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
position:relative;
overflow:hidden;
display:none;
}

.attendanceWrapper::before{
content:"";
position:absolute;
left:0;
top:25px;
bottom:25px;
width:7px;
border-radius:20px;
background:linear-gradient(180deg,#2400c8,#5b39ff);
}

/* HEADING */

.attendanceHeading{
display:flex;
align-items:center;
gap:10px;
margin-bottom:14px;
padding-bottom:12px;
border-bottom:1px solid #e5e7eb;
}

.attendanceHeadingIcon{
width:42px;
height:42px;
border-radius:14px;
background:linear-gradient(135deg,#2400c8,#5b39ff);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
box-shadow:0 6px 14px rgba(91,57,255,0.20);
}

.attendanceTitle{
font-size:20px;
font-weight:800;
color:#2400b7;
line-height:1.1;
}

.attendanceSub{
font-size:11px;
color:#6b7280;
margin-top:2px;
}

/* GRID */

#attendanceList{
display:grid;
grid-template-columns:repeat(6,minmax(0,1fr));
gap:7px;
}

/* SMALL PREMIUM DAY CARD */

.attCard{
border-radius:15px;
padding:8px 2px;
min-height:66px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
border:1px solid rgba(255,255,255,0.9);
box-shadow:
0 4px 10px rgba(80,90,180,0.06),
inset 0 1px 0 rgba(255,255,255,0.7);
animation:fadeUp .35s ease;
backdrop-filter:blur(10px);
}

/* PREMIUM BACKGROUNDS */

.presentCardBar{
background:linear-gradient(145deg,#effff4,#d9ffe6);
}

.absentCardBar{
background:linear-gradient(145deg,#fff1f1,#ffdede);
}

.leaveCardBar{
background:linear-gradient(145deg,#fff8e8,#ffe8b5);
}

.holidayCardBar{
background:linear-gradient(145deg,#eef3ff,#dce7ff);
}

/* TOP LINE */

.attCard::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
border-radius:20px;
}

.presentCardBar::before{
background:#16a34a;
}

.absentCardBar::before{
background:#ef4444;
}

.leaveCardBar::before{
background:#f59e0b;
}

.holidayCardBar::before{
background:#2563eb;
}

/* GLOW */

.presentCardBar::after,
.absentCardBar::after,
.leaveCardBar::after,
.holidayCardBar::after{
content:"";
position:absolute;
top:-18px;
right:-18px;
width:55px;
height:55px;
border-radius:50%;
opacity:.15;
}

.presentCardBar::after{
background:#22c55e;
}

.absentCardBar::after{
background:#ef4444;
}

.leaveCardBar::after{
background:#f59e0b;
}

.holidayCardBar::after{
background:#2563eb;
}

/* DATE */

.attDate{
font-size:15px;
font-weight:800;
margin-bottom:5px;
line-height:1;
position:relative;
z-index:2;
}

/* TYPE */

.attType{
font-size:11px;
font-weight:700;
position:relative;
z-index:2;
}

/* COLORS */

.presentCardBar .attDate,
.presentCardBar .attType{
color:#15803d;
}

.absentCardBar .attDate,
.absentCardBar .attType{
color:#dc2626;
}

.leaveCardBar .attDate,
.leaveCardBar .attType{
color:#d97706;
}

.holidayCardBar .attDate,
.holidayCardBar .attType{
color:#1d4ed8;
}

/* SUMMARY TABLE */

.summaryTable{
margin-top:18px;
border-radius:18px;
overflow:hidden;
background:white;
box-shadow:0 5px 14px rgba(0,0,0,0.05);
border:1px solid #eef2ff;
}

.summaryTableHeader{
padding:13px 16px;
font-size:15px;
font-weight:800;
background:linear-gradient(135deg,#2400c8,#5b39ff);
color:white;
}

.summaryRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
border-bottom:1px solid #f1f5f9;
font-size:13px;
font-weight:700;
}

.summaryRow:last-child{
border-bottom:none;
}

.summaryLeft{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.green{
background:#16a34a;
}

.red{
background:#ef4444;
}

.orange{
background:#f59e0b;
}

.blue{
background:#2563eb;
}

/* PAGINATION */

.pagination{
display:none;
justify-content:center;
gap:15px;
margin:18px;
}

.pageBtn{
padding:8px 16px;
border-radius:10px;
background:#4f46e5;
color:white;
border:none;
}

/* LOADING */

.loadingBg,.popupBg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.loaderBox,.popup{
background:white;
padding:22px;
border-radius:16px;
text-align:center;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:480px){

.attendanceWrapper{
padding:12px;
border-radius:22px;
}

#attendanceList{
gap:6px;
}

.attCard{
min-height:62px;
border-radius:14px;
}

.attDate{
font-size:14px;
}

.attType{
font-size:10px;
}

.attendanceTitle{
font-size:18px;
}

.summaryRow{
padding:11px 14px;
font-size:12px;
}

}

</style>
</head>

<body>

<div class="top">

<div class="back-btn" onclick="goBack()">

<svg width="18" height="18" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6"
stroke="#2400b7"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<div class="icon">📅</div>

<h2>Attendance</h2>

</div>

<div class="container">

<div class="row">

<select id="year">
<option value="">Year</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>
</select>

<select id="month">
<option value="">Month</option>
<option>Jan</option>
<option>Feb</option>
<option>Mar</option>
<option>Apr</option>
<option>May</option>
<option>Jun</option>
<option>Jul</option>
<option>Aug</option>
<option>Sep</option>
<option>Oct</option>
<option>Nov</option>
<option>Dec</option>
</select>

</div>

<button onclick="searchAttendance()">Search</button>

<div class="summaryCards">

<div class="summaryCard presentCard">
<div id="presentCount" class="sumCount">0</div>
Present
</div>

<div class="summaryCard leaveCard">
<div id="leaveCount" class="sumCount">0</div>
Leave
</div>

<div class="summaryCard absentCard">
<div id="absentCount" class="sumCount">0</div>
Absent
</div>

<div class="summaryCard holidayCard">
<div id="holidayWork" class="sumCount">0</div>
Holiday Work
</div>

</div>

</div>

<div class="attendanceWrapper" id="attendanceWrapper">

<div class="attendanceHeading">

<div class="attendanceHeadingIcon">📊</div>

<div>

<div class="attendanceTitle" id="attendanceMonthTitle">
Attendance
</div>

<div class="attendanceSub">
Monthly attendance overview
</div>

</div>

</div>

<div id="attendanceList"></div>

<div class="summaryTable">

<div class="summaryTableHeader">
Attendance Summary
</div>

<div class="summaryRow">
<div class="summaryLeft">
<div class="dot green"></div>
Present Days
</div>
<div id="tablePresent">0</div>
</div>

<div class="summaryRow">
<div class="summaryLeft">
<div class="dot red"></div>
Absent Days
</div>
<div id="tableAbsent">0</div>
</div>

<div class="summaryRow">
<div class="summaryLeft">
<div class="dot orange"></div>
Leave Days
</div>
<div id="tableLeave">0</div>
</div>

<div class="summaryRow">
<div class="summaryLeft">
<div class="dot blue"></div>
Holiday Work
</div>
<div id="tableHoliday">0</div>
</div>

</div>

</div>

<div class="pagination" id="pagination">
<button class="pageBtn" onclick="prevPage()">Prev</button>
<button class="pageBtn" onclick="nextPage()">Next</button>
</div>

<div class="loadingBg" id="loadingBg">
<div class="loaderBox">Loading...</div>
</div>

<div class="popupBg" id="popupBg">
<div class="popup">
<h3>No Data</h3>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>

let user=localStorage.getItem("currentUser");
if(!user){window.location="login.html";}

let allRows=[],page=0,perPage=31;

function closePopup(){
document.getElementById("popupBg").style.display="none";
}

function renderPage(){

let start=page*perPage,end=start+perPage;
let html="";

for(let i=start;i<end&&i<allRows.length;i++){
html+=allRows[i];
}

document.getElementById("attendanceList").innerHTML=html;
}

function nextPage(){
if((page+1)*perPage<allRows.length){
page++;
renderPage();
}
}

function prevPage(){
if(page>0){
page--;
renderPage();
}
}

function searchAttendance(){

document.getElementById("loadingBg").style.display="flex";

page=0;
allRows=[];

let year=document.getElementById("year").value.trim();
let month=document.getElementById("month").value.trim();

document.getElementById("attendanceMonthTitle").innerText=`Attendance ${month} ${year}`;

Promise.all([

fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv").then(r=>r.text()),

fetch("https://hescomsalary1-sudo.github.io/salary-data/holidays.csv").then(r=>r.text())

]).then(([attendanceData,holidayData])=>{

document.getElementById("loadingBg").style.display="none";

let holidayMap={};

holidayData.trim().split("\n").slice(1).forEach(r=>{

let c=r.split(",");
holidayMap[c[0].trim()]=c[1];

});

let rows=attendanceData.trim().split("\n");

let present=0,leave=0,absent=0,holidayWork=0;

let monthNumber={
Jan:"01",Feb:"02",Mar:"03",Apr:"04",
May:"05",Jun:"06",Jul:"07",Aug:"08",
Sep:"09",Oct:"10",Nov:"11",Dec:"12"
};

for(let i=1;i<rows.length;i++){

let col=rows[i].split(",");

if(col[0]===user && col[1]===year && col[2]===month){

for(let d=0;d<31;d++){

let code=col[3+d]?.trim();

if(!code) continue;

let fullDate=`${d+1}`;

let type="-",bar="";

let isHolidayCSV=holidayMap[`${("0"+(d+1)).slice(-2)}-${monthNumber[month]}-${year}`];

let isHolidayCode=(code==="GH"||code==="CH"||code==="WH"||code==="MCL");

if(isHolidayCSV || isHolidayCode){

if(code==="P"){
holidayWork++;
type="P";
}else{
type=code;
}

bar="holidayCardBar";

}else{

if(code==="P"){
present++;
type="P";
bar="presentCardBar";
}

else if(code==="A"){
absent++;
type="A";
bar="absentCardBar";
}

else{
leave++;
type=code;
bar="leaveCardBar";
}

}

allRows.push(`

<div class="attCard ${bar}">

<div class="attDate">${fullDate}</div>

<div class="attType">${type}</div>

</div>

`);

}

}

}

document.getElementById("presentCount").innerText=present;
document.getElementById("leaveCount").innerText=leave;
document.getElementById("absentCount").innerText=absent;
document.getElementById("holidayWork").innerText=holidayWork;

document.getElementById("tablePresent").innerText=present;
document.getElementById("tableLeave").innerText=leave;
document.getElementById("tableAbsent").innerText=absent;
document.getElementById("tableHoliday").innerText=holidayWork;

if(allRows.length===0){

document.getElementById("popupBg").style.display="flex";

}else{

document.getElementById("attendanceWrapper").style.display="block";
document.getElementById("pagination").style.display="none";

renderPage();

}

});

}

function goBack(){
window.history.back();
}

</script>

</body>
</html>
