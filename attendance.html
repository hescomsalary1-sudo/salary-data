<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Attendance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:#0b1b55;
overflow-x:hidden;
padding-bottom:30px;
   padding-top:10px;
}

/* TOP */

.topSection{
background: linear-gradient(135deg,#0d1b8f,#1a2edb);
padding:18px 22px 82px;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:10;
overflow:hidden;
}

.topSection::before{
content:"";
position:absolute;
right:-70px;
top:-70px;
width:220px;
height:220px;
background:rgba(255,255,255,0.08);
border-radius:50%;
}

.headerRow{
display:flex;
align-items:center;
justify-content:space-between;
}

.iconBtn{
width:42px;
height:42px;
border-radius:14px;
background:rgba(255,255,255,0.16);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
}

.title{
font-size:20px;
font-weight:700;
color:white;
}

/* PROFILE */

.profileCard{
margin:92px 18px 18px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
border-radius:26px;
padding:18px;
display:flex;
align-items:center;
gap:16px;
box-shadow:0 10px 28px rgba(0,0,0,0.08);
position:sticky;
top:72px;
z-index:100;
}
.avatar{
width:82px;
height:82px;
border-radius:50%;
background:linear-gradient(135deg,#0057ff,#0c38d9);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:700;
color:#fff;
position:relative;
flex-shrink:0;
}

.onlineDot{
position:absolute;
right:4px;
bottom:5px;
width:18px;
height:18px;
border-radius:50%;
background:#1ecb59;
border:3px solid #fff;
}

.profileName{
font-size:20px;
font-weight:700;
margin-bottom:3px;
}

.empId{
font-size:13px;
color:#7a819f;
margin-bottom:8px;
}

.profileInfo{
display:flex;
align-items:center;
gap:10px;
font-size:13px;
color:#67718d;
flex-wrap:wrap;
}

.blueDot{
width:6px;
height:6px;
border-radius:50%;
background:#0057ff;
}

/* CALENDAR */

.calendarCard{
background:#f0ebff;
margin:0 18px 18px;
border-radius:28px;
padding:20px 16px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.calendarHeader{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
}

.monthTitle{
font-size:20px;
font-weight:700;
}

.arrowBtn{
width:40px;
height:40px;
border:none;
border-radius:14px;
background:#f1f5ff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.weekNames{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:8px;
}

.weekNames div{
text-align:center;
font-size:12px;
font-weight:600;
padding:8px 0;
}

.sun,.sat{
color:#0057ff;
}

.calendarGrid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px 0;
}

.day{
height:62px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

.dayNum{
font-size:14px;
font-weight:600;
margin-bottom:7px;
}

.dim{
color:#c3c7d6;
}

.statusBadge{
min-width:26px;
height:24px;
padding:0 6px;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:700;
color:white;
}

.present{
background:#16b34b;
}

.leave{
background:#ff8800;
}

.weekoff{
background:#8b90a6;
}

.absent{
background:#ef4444;
}

/* SUMMARY */

.summaryCard{
background:#fff;
margin:0 18px;
border-radius:28px;
padding:18px 14px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.summaryTop{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
}

.summaryTitle{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
font-weight:700;
}

.summaryMonth{
display:flex;
align-items:center;
gap:5px;
color:#0057ff;
font-weight:600;
font-size:14px;
}

.summaryGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
border-top:1px solid #edf0fa;
border-left:1px solid #edf0fa;
}

.summaryItem{
padding:10px 6px;
border-right:1px solid #edf0fa;
border-bottom:1px solid #edf0fa;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
text-align:center;
min-height:95px;
}

.summaryIcon{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.summaryLabel{
font-size:10px;
color:#67718d;
line-height:1.2;
}

.summaryValue{
font-size:15px;
font-weight:700;
color:#0057ff;
}

@media(max-width:480px){

.profileCard{
padding:16px;
}

.avatar{
width:74px;
height:74px;
font-size:28px;
}

.profileName{
font-size:18px;
}

.day{
height:58px;
}

.summaryItem{
min-height:88px;
padding:8px 4px;
}

}
/* CONTAINER */
.container {
    padding: 0px;
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- TOP -->

<div class="topSection">

<div class="headerRow">

<div class="iconBtn" onclick="history.back()">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6"
stroke="white"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<div class="title">My Attendance</div>

<div style="width:42px;height:42px;"></div>

</div>

</div>

<!-- PROFILE -->

<div class="profileCard">

<div class="avatar">
RS
<div class="onlineDot"></div>
</div>

<div>

<div class="profileName" id="empName">Loading...</div>

<div class="empId" id="empCode">----</div>

<div class="profileInfo">
<span id="designation">----</span>
<div class="blueDot"></div>
<span id="workPlace">----</span>
</div>

</div>

</div>
<div class="container">
<!-- CALENDAR -->

<div class="calendarCard">

<div class="calendarHeader">

<button class="arrowBtn" onclick="prevMonth()">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6" stroke="#0b1b55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

</button>

<div class="monthTitle" id="monthTitle">May 2024</div>

<button class="arrowBtn" onclick="nextMonth()">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M9 18L15 12L9 6" stroke="#0b1b55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

</button>

</div>

<div class="weekNames">
<div class="sun">Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div class="sat">Sat</div>
</div>

<div class="calendarGrid" id="calendarGrid"></div>

</div>

<!-- SUMMARY -->

<div class="summaryCard">

<div class="summaryTop">

<div class="summaryTitle">

<svg width="24" height="24" viewBox="0 0 24 24" fill="none">
<rect x="3" y="10" width="4" height="10" rx="2" fill="#0057ff"/>
<rect x="10" y="4" width="4" height="16" rx="2" fill="#0057ff"/>
<rect x="17" y="7" width="4" height="13" rx="2" fill="#0057ff"/>
</svg>

Attendance Summary

</div>

<div class="summaryMonth">
This Month
</div>

</div>

<div class="summaryGrid" id="summaryGrid"></div>

</div>
</div>
<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location = "login.html";
}

/* =========================================================
   MONTHS
========================================================= */

const months = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const monthShort = {
January:"Jan",
February:"Feb",
March:"Mar",
April:"Apr",
May:"May",
June:"Jun",
July:"Jul",
August:"Aug",
September:"Sep",
October:"Oct",
November:"Nov",
December:"Dec"
};

let today = new Date();

let currentMonth = today.getMonth();

let currentYear = today.getFullYear();

/* =========================================================
   STATUS DETAILS
========================================================= */

const leaveStatuses = [
"CL","EL","FPL","IL","MDL","ML","PL","SPL"
];

const weekoffStatuses = [
"GH","WH"
];

const statusColors = {

P:"#16b34b",
A:"#ef4444",

CL:"#ff8800",
EL:"#ff8800",
FPL:"#ff8800",
IL:"#ff8800",
MDL:"#ff8800",
ML:"#ff8800",
PL:"#ff8800",
SPL:"#ff8800",

GH:"#8b90a6",
WH:"#8b90a6"

};

const statusNames = {

P:"Present",
A:"Absent",

CL:"Casual Leave",
EL:"Earn Leave",
FPL:"Full Pay Leave",
IL:"Injury Leave",
MDL:"Medical Leave",
ML:"Maternity Leave",
PL:"Paternity Leave",
SPL:"Special Leave",

GH:"Government Holiday",
WH:"Week Off"

};

/* =========================================================
   LOAD USER PROFILE
========================================================= */

async function loadUserProfile(){

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/employee.csv"
);

let text = await response.text();

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0]?.trim() === currentUser){

document.getElementById("empName").innerText =
cols[1] || "Employee";

document.getElementById("designation").innerText =
cols[2] || "Not Available";

document.getElementById("workPlace").innerText =
cols[3] || "Not Available";

document.getElementById("empCode").innerText =
cols[0] || "--";

let initials = (cols[1] || "E")
.split(" ")
.map(v=>v.charAt(0))
.join("")
.substring(0,2)
.toUpperCase();

document.querySelector(".avatar").innerHTML = `
${initials}
<div class="onlineDot"></div>
`;

break;

}

}

}catch(e){

console.log("PROFILE ERROR",e);

}

}

/* =========================================================
   LOAD ATTENDANCE
========================================================= */

async function loadAttendance(monthName,year){

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/attendance.csv"
);

let text = await response.text();

let rows = text.trim().split("\n");

let found = false;

let attendanceData = {};

let statusCounts = {};

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let empId = cols[0]?.trim();

let csvYear = cols[1]?.trim();

let csvMonth = cols[2]?.trim();

if(
empId === currentUser &&
csvYear == year &&
csvMonth === monthShort[monthName]
){

found = true;

for(let day=1; day<=31; day++){

let status = cols[day+2]?.trim();

if(!status) continue;

attendanceData[day] = status;

statusCounts[status] =
(statusCounts[status] || 0) + 1;

}

break;

}

}

/* SUMMARY */

let summaryHTML = "";

for(let key in statusCounts){

summaryHTML += `

<div class="summaryItem">

<div class="summaryIcon"
style="
background:${statusColors[key] || '#0057ff'}20;
">

<div style="
width:28px;
height:28px;
border-radius:50%;
background:${statusColors[key] || '#0057ff'};
display:flex;
align-items:center;
justify-content:center;
font-size:9px;
font-weight:700;
color:white;
">

${key}

</div>

</div>

<div>

<div class="summaryLabel">
${statusNames[key] || key}
</div>

<div class="summaryValue">
${statusCounts[key]}
</div>

</div>

</div>

`;

}

document.getElementById("summaryGrid").innerHTML =
summaryHTML;

/* NO DATA */

if(!found){

document.getElementById("monthTitle").innerText =
monthName + " " + year;

document.getElementById("calendarGrid").innerHTML = `
<div style="
grid-column:span 7;
padding:55px 10px;
text-align:center;
font-size:15px;
font-weight:600;
color:#7a819f;
">
No attendance available for this month
</div>
`;

return;

}

/* CALENDAR */

generateCalendar(
monthName,
year,
attendanceData
);

}catch(e){

console.log("ATTENDANCE ERROR",e);

}

}

/* =========================================================
   GENERATE CALENDAR
========================================================= */

function generateCalendar(
monthName,
year,
attendanceData
){

let monthIndex = months.indexOf(monthName);

document.getElementById("monthTitle").innerText =
monthName + " " + year;

const grid =
document.getElementById("calendarGrid");

grid.innerHTML = "";

const firstDay =
new Date(year,monthIndex,1).getDay();

const daysInMonth =
new Date(year,monthIndex+1,0).getDate();

const prevMonthDays =
new Date(year,monthIndex,0).getDate();

/* PREVIOUS DAYS */

for(let i=firstDay-1;i>=0;i--){

grid.innerHTML += `
<div class="day">
<div class="dayNum dim">
${prevMonthDays-i}
</div>
</div>
`;

}

/* CURRENT DAYS */

for(let day=1; day<=daysInMonth; day++){

let status = attendanceData[day] || "";

let badgeClass = "";

if(status === "P"){

badgeClass = "present";

}

else if(status === "A"){

badgeClass = "absent";

}

else if(leaveStatuses.includes(status)){

badgeClass = "leave";

}

else if(weekoffStatuses.includes(status)){

badgeClass = "weekoff";

}

grid.innerHTML += `

<div class="day">

<div class="dayNum">
${day}
</div>

${status ? `
<div class="statusBadge ${badgeClass}">
${status}
</div>
` : ""}

</div>

`;

}

/* NEXT DAYS */

let totalCells = firstDay + daysInMonth;

let nextDays = 42-totalCells;

for(let i=1;i<=nextDays;i++){

grid.innerHTML += `
<div class="day">
<div class="dayNum dim">
${i}
</div>
</div>
`;

}

}

/* =========================================================
   MONTH NAVIGATION
========================================================= */

function prevMonth(){

currentMonth--;

if(currentMonth < 0){

currentMonth = 11;
currentYear--;

}

loadAttendance(
months[currentMonth],
currentYear
);

}

function nextMonth(){

currentMonth++;

if(currentMonth > 11){

currentMonth = 0;
currentYear++;

}

loadAttendance(
months[currentMonth],
currentYear
);

}

/* =========================================================
   INITIAL LOAD
========================================================= */

loadUserProfile();

loadAttendance(
months[currentMonth],
currentYear
);

</script>

</body>
</html>
