<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Attendance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background:#f4f7ff;
color:#0b1b55;
overflow-x:hidden;
padding-bottom:30px;
}

/* TOP HEADER */

.topSection{
background:linear-gradient(135deg,#0057ff,#003fd9);
padding:18px 22px 105px;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
position:relative;
overflow:hidden;
}

.topSection::before{
content:"";
position:absolute;
right:-70px;
top:-70px;
width:220px;
height:220px;
background:rgba(255,255,255,0.08);
border-radius:50%;
}

.statusBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
color:#fff;
font-size:18px;
font-weight:600;
}

.headerRow{
display:flex;
align-items:center;
justify-content:space-between;
}

.iconBtn{
width:42px;
height:42px;
border-radius:14px;
background:rgba(255,255,255,0.16);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
}

.title{
font-size:20px;
font-weight:700;
color:white;
}

/* PROFILE CARD */

.profileCard{
margin:-72px 18px 18px;
background:#fff;
border-radius:26px;
padding:20px;
display:flex;
align-items:center;
gap:16px;
box-shadow:0 10px 28px rgba(0,0,0,0.08);
position:relative;
z-index:10;
}

.avatar{
width:86px;
height:86px;
border-radius:50%;
background:linear-gradient(135deg,#0057ff,#0c38d9);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:700;
color:#fff;
position:relative;
flex-shrink:0;
}

.onlineDot{
position:absolute;
right:4px;
bottom:5px;
width:18px;
height:18px;
border-radius:50%;
background:#1ecb59;
border:3px solid #fff;
}

.profileName{
font-size:20px;
font-weight:700;
margin-bottom:3px;
}

.empId{
font-size:14px;
color:#7a819f;
margin-bottom:8px;
}

.profileInfo{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
color:#67718d;
flex-wrap:wrap;
}

.blueDot{
width:6px;
height:6px;
border-radius:50%;
background:#0057ff;
}

/* STATS */

.statsCard{
background:#fff;
margin:0 18px 18px;
border-radius:26px;
padding:12px 0;
display:grid;
grid-template-columns:repeat(4,1fr);
box-shadow:0 8px 22px rgba(0,0,0,0.06);
}

.statItem{
text-align:center;
padding:10px 5px;
position:relative;
}

.statItem:not(:last-child)::after{
content:"";
position:absolute;
right:0;
top:15px;
width:1px;
height:72%;
background:#edf0fa;
}

.statIcon{
width:58px;
height:58px;
border-radius:18px;
background:#f2f6ff;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 12px;
}

.statLabel{
font-size:13px;
font-weight:600;
margin-bottom:6px;
}

.statValue{
font-size:26px;
font-weight:700;
color:#0057ff;
}

/* CALENDAR */

.calendarCard{
background:#fff;
margin:0 18px 18px;
border-radius:28px;
padding:20px 18px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.calendarHeader{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
}

.monthTitle{
font-size:20px;
font-weight:700;
}

.arrowBtn{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:#f1f5ff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.weekNames{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:8px;
}

.weekNames div{
text-align:center;
font-size:13px;
font-weight:600;
padding:8px 0;
}

.sun,.sat{
color:#0057ff;
}

.calendarGrid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px 0;
}

.day{
height:70px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
position:relative;
}

.dayNum{
font-size:15px;
font-weight:600;
margin-bottom:7px;
}

.dim{
color:#c3c7d6;
}

.statusBadge{
min-width:26px;
height:26px;
padding:0 6px;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
color:white;
}

.present{
background:#16b34b;
}

.leave{
background:#ff8800;
}

.half{
background:#0057ff;
}

.weekoff{
background:#8b90a6;
}

.selected{
width:52px;
height:52px;
border-radius:50%;
background:#0057ff;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

.selected .statusBadge{
margin-top:3px;
background:#17bf53;
}

.legend{
margin-top:20px;
border:1px solid #edf0fa;
border-radius:22px;
padding:12px 10px;
display:flex;
justify-content:space-between;
gap:8px;
flex-wrap:wrap;
}

.legendItem{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
font-weight:600;
color:#66708d;
}

/* SUMMARY */

.summaryCard{
background:#fff;
margin:0 18px;
border-radius:28px;
padding:22px 18px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.summaryTop{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:22px;
}

.summaryTitle{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:700;
}

.summaryMonth{
display:flex;
align-items:center;
gap:5px;
color:#0057ff;
font-weight:600;
font-size:15px;
}

.summaryGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
border-top:1px solid #edf0fa;
border-left:1px solid #edf0fa;
gap:0;
}

.summaryItem{
padding:10px 6px;
border-right:1px solid #edf0fa;
border-bottom:1px solid #edf0fa;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
text-align:center;
min-height:100px;
}

.summaryIcon{
width:40px;
height:40px;
border-radius:50%;
background:#f3f6ff;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.summaryLabel{
font-size:10px;
color:#67718d;
line-height:1.2;
}
.summaryValue{
font-size:15px;
font-weight:700;
color:#0057ff;
margin-top:2px;
}

@media(max-width:480px){

.profileName{
font-size:18px;
}

.avatar{
width:78px;
height:78px;
font-size:30px;
}

.statValue{
font-size:22px;
}

.day{
height:64px;
}

.summaryItem{
padding:15px 10px;
gap:10px;
}

.summaryValue{
font-size:17px;
}

}
.absent{
background:#ef4444;
}
</style>
</head>

<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location = "login.html";
}

/* =========================================================
   MONTHS
========================================================= */

const months = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const monthShort = {
January:"Jan",
February:"Feb",
March:"Mar",
April:"Apr",
May:"May",
June:"Jun",
July:"Jul",
August:"Aug",
September:"Sep",
October:"Oct",
November:"Nov",
December:"Dec"
};

let today = new Date();

let currentMonth = today.getMonth();

let currentYear = today.getFullYear();

/* =========================================================
   STATUS DETAILS
========================================================= */

const leaveStatuses = [
"CL","EL","FPL","IL","MDL","ML","PL","SPL"
];

const weekoffStatuses = [
"GH","WH"
];

const statusColors = {

P:"#16b34b",
A:"#ef4444",

CL:"#ff8800",
EL:"#ff8800",
FPL:"#ff8800",
IL:"#ff8800",
MDL:"#ff8800",
ML:"#ff8800",
PL:"#ff8800",
SPL:"#ff8800",

GH:"#8b90a6",
WH:"#8b90a6"

};

const statusNames = {

P:"Present",
A:"Absent",

CL:"Casual Leave",
EL:"Earn Leave",
FPL:"Full Pay Leave",
IL:"Injury Leave",
MDL:"Medical Leave",
ML:"Maternity Leave",
PL:"Paternity Leave",
SPL:"Special Leave",

GH:"Government Holiday",
WH:"Week Off"

};

/* =========================================================
   LOAD USER PROFILE
========================================================= */

async function loadUserProfile(){

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/employee.csv"
);

let text = await response.text();

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0]?.trim() === currentUser){

document.getElementById("empName").innerText =
cols[1] || "Employee";

document.getElementById("designation").innerText =
cols[2] || "Not Available";

document.getElementById("workPlace").innerText =
cols[3] || "Not Available";

document.getElementById("empCode").innerText =
cols[0] || "--";

let initials = (cols[1] || "E")
.split(" ")
.map(v=>v.charAt(0))
.join("")
.substring(0,2)
.toUpperCase();

document.querySelector(".avatar").innerHTML = `
${initials}
<div class="onlineDot"></div>
`;

break;

}

}

}catch(e){

console.log("PROFILE ERROR",e);

}

}

/* =========================================================
   LOAD ATTENDANCE
========================================================= */

async function loadAttendance(monthName,year){

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/attendance.csv"
);

let text = await response.text();

let rows = text.trim().split("\n");

let found = false;

let attendanceData = {};

let present = 0;
let absent = 0;
let leave = 0;
let weekoff = 0;

let statusCounts = {};

/* LOOP CSV */

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let empId = cols[0]?.trim();

let csvYear = cols[1]?.trim();

let csvMonth = cols[2]?.trim();

if(
empId === currentUser &&
csvYear == year &&
csvMonth === monthShort[monthName]
){

found = true;

/* DAYS */

for(let day=1; day<=31; day++){

let status = cols[day+2]?.trim();

if(!status) continue;

/* SAVE STATUS */

attendanceData[day] = status;

/* DYNAMIC COUNTS */

statusCounts[status] =
(statusCounts[status] || 0) + 1;

/* TOP COUNTS */

if(status === "P"){

present++;

}

else if(status === "A"){

absent++;

}

else if(leaveStatuses.includes(status)){

leave++;

}

else if(weekoffStatuses.includes(status)){

weekoff++;

}

}

break;

}

}

/* TOP SUMMARY */

document.getElementById("presentCount").innerText =
present;

document.getElementById("leaveCount").innerText =
leave;

document.getElementById("halfCount").innerText =
absent;

document.getElementById("weekOffCount").innerText =
weekoff;

/* DYNAMIC SUMMARY CARD */

let summaryHTML = "";

for(let key in statusCounts){

summaryHTML += `

<div class="summaryItem">

<div class="summaryIcon"
style="
background:${statusColors[key] || '#0057ff'}20;
">

<div style="
width:28px;
height:28px;
border-radius:50%;
background:${statusColors[key] || '#0057ff'};
display:flex;
align-items:center;
justify-content:center;
font-size:9px;
font-weight:700;
color:white;
">

${key}

</div>

</div>

<div>

<div class="summaryLabel">
${statusNames[key] || key}
</div>

<div class="summaryValue">
${statusCounts[key]}
</div>

</div>

</div>

`;

}

document.getElementById("summaryGrid").innerHTML =
summaryHTML;

/* NO DATA */

if(!found){

document.getElementById("monthTitle").innerText =
monthName + " " + year;

document.getElementById("calendarGrid").innerHTML = `

<div style="
grid-column:span 7;
padding:55px 10px;
text-align:center;
font-size:15px;
font-weight:600;
color:#7a819f;
">

No attendance available for this month

</div>

`;

document.getElementById("summaryGrid").innerHTML = "";

return;

}

/* GENERATE CALENDAR */

generateCalendar(
monthName,
year,
attendanceData
);

}catch(e){

console.log("ATTENDANCE ERROR",e);

}

}

/* =========================================================
   GENERATE CALENDAR
========================================================= */

function generateCalendar(
monthName,
year,
attendanceData
){

let monthIndex = months.indexOf(monthName);

document.getElementById("monthTitle").innerText =
monthName + " " + year;

const grid =
document.getElementById("calendarGrid");

grid.innerHTML = "";

const firstDay =
new Date(year,monthIndex,1).getDay();

const daysInMonth =
new Date(year,monthIndex+1,0).getDate();

const prevMonthDays =
new Date(year,monthIndex,0).getDate();

/* PREVIOUS DAYS */

for(let i=firstDay-1;i>=0;i--){

grid.innerHTML += `
<div class="day">
<div class="dayNum dim">
${prevMonthDays-i}
</div>
</div>
`;

}

/* CURRENT DAYS */

for(let day=1; day<=daysInMonth; day++){

let status = attendanceData[day] || "";

let badgeClass = "";

/* STATUS COLORS */

if(status === "P"){

badgeClass = "present";

}

else if(status === "A"){

badgeClass = "absent";

}

else if(leaveStatuses.includes(status)){

badgeClass = "leave";

}

else if(weekoffStatuses.includes(status)){

badgeClass = "weekoff";

}

/* DAY CARD */

grid.innerHTML += `

<div class="day">

<div class="dayNum">
${day}
</div>

${status ? `

<div class="statusBadge ${badgeClass}">
${status}
</div>

` : ""}

</div>

`;

}

/* NEXT MONTH DAYS */

let totalCells = firstDay + daysInMonth;

let nextDays = 42-totalCells;

for(let i=1;i<=nextDays;i++){

grid.innerHTML += `
<div class="day">
<div class="dayNum dim">
${i}
</div>
</div>
`;

}

}

/* =========================================================
   PREVIOUS MONTH
========================================================= */

function prevMonth(){

currentMonth--;

if(currentMonth < 0){

currentMonth = 11;
currentYear--;

}

loadAttendance(
months[currentMonth],
currentYear
);

}

/* =========================================================
   NEXT MONTH
========================================================= */

function nextMonth(){

currentMonth++;

if(currentMonth > 11){

currentMonth = 0;
currentYear++;

}

loadAttendance(
months[currentMonth],
currentYear
);

}

/* =========================================================
   INITIAL LOAD
========================================================= */

loadUserProfile();

loadAttendance(
months[currentMonth],
currentYear
);

</script>
</body>
</html>
