<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:10px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:#2400b7;
display:flex;
align-items:center;
gap:12px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.icon{
width:38px;
height:38px;
background:white;
color:#4f46e5;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

/* CONTAINER */
.container{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
margin:18px;
padding:18px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.container {
    
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
/* INPUT */
.row{
display:flex;
gap:10px;
}

select,button{
width:100%;
padding:11px;
margin-top:10px;
border-radius:12px;
border:none;
background:#f1f5f9;
font-size:14px;
}

/* BUTTON */
button{
background: linear-gradient(135deg, #2400b7, #3b1eff);
color:white;
font-weight:bold;
}

/* SUMMARY */
.summaryCards{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:15px;
}

.summaryCard{
padding:14px;
border-radius:16px;
color:white;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.sumCount{font-size:22px;font-weight:bold;}

.presentCard{background:#22c55e;}
.leaveCard{background:#facc15;color:#333;}
.absentCard{background:#ef4444;}
.holidayCard{background:#3b82f6;}

/* LIST */
.attCard{
margin:12px;
padding:14px;
border-radius:16px;
background:white;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

/* LEFT COLOR STRIP */
.attCard::before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:5px;
border-radius:10px;
}

/* COLORS */
.presentCardBar::before{background:#22c55e;}
.absentCardBar::before{background:#ef4444;}
.leaveCardBar::before{background:#facc15;}
.holidayCardBar::before{background:#3b82f6;}

/* TEXT */
.attDate{
font-size:14px;
font-weight:600;
color:#111;
}

.attType{
font-size:12px;
color:#666;
margin-top:3px;
}

/* STATUS CHIP */
.attStatus{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.badge-present{background:#dcfce7;color:#166534;}
.badge-absent{background:#fee2e2;color:#991b1b;}
.badge-leave{background:#fef9c3;color:#854d0e;}
.badge-holiday{background:#dbeafe;color:#1e40af;}
.badge-other{background:#e5e7eb;color:#374151;}

/* PAGINATION */
.pagination{
display:none;
justify-content:center;
gap:15px;
margin:20px;
}

.pageBtn{
padding:8px 16px;
border-radius:10px;
background:#4f46e5;
color:white;
border:none;
}

/* LOADING */
.loadingBg,.popupBg{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.loaderBox,.popup{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
}
/* BACK BUTTON */

.back-btn{
width:40px;
height:40px;
border-radius:50%;
background:rgba(255,255,255,0.85);
backdrop-filter: blur(8px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.25s;
}

.back-btn:hover{
transform:scale(1.1);
background:white;
}

.back-btn svg{
transition:0.2s;
}

.back-btn:hover svg{
transform:translateX(-2px);
}
</style>
</head>

<body>


<div class="top">
  
  <!-- BACK BUTTON -->
  <div class="back-btn" onclick="goBack()">
    
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M15 18L9 12L15 6" 
            stroke="#2400b7" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </svg>

  </div>
<div class="icon">📅</div>
<h2>Attendance</h2>
</div>

<div class="container">

<div class="row">
<select id="year">
<option value="">Year</option>
<option>2024</option><option>2025</option><option>2026</option>
</select>

<select id="month">
<option value="">Month</option>
<option>Jan</option><option>Feb</option><option>Mar</option>
<option>Apr</option><option>May</option><option>Jun</option>
<option>Jul</option><option>Aug</option><option>Sep</option>
<option>Oct</option><option>Nov</option><option>Dec</option>
</select>
</div>

<button onclick="searchAttendance()">Search</button>

<div class="summaryCards">
<div class="summaryCard presentCard"><div id="presentCount" class="sumCount">0</div>Present</div>
<div class="summaryCard leaveCard"><div id="leaveCount" class="sumCount">0</div>Leave</div>
<div class="summaryCard absentCard"><div id="absentCount" class="sumCount">0</div>Absent</div>
<div class="summaryCard holidayCard"><div id="holidayWork" class="sumCount">0</div>Holiday Work</div>
</div>

</div>

<div id="attendanceList"></div>

<div class="pagination" id="pagination">
<button class="pageBtn" onclick="prevPage()">Prev</button>
<button class="pageBtn" onclick="nextPage()">Next</button>
</div>

<div class="loadingBg" id="loadingBg">
<div class="loaderBox">Loading...</div>
</div>

<div class="popupBg" id="popupBg">
<div class="popup">
<h3>No Data</h3>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>

let user=localStorage.getItem("currentUser");
if(!user){window.location="login.html";}

let allRows=[],page=0,perPage=10;

function closePopup(){document.getElementById("popupBg").style.display="none";}

function renderPage(){
let start=page*perPage,end=start+perPage;
let html="";
for(let i=start;i<end&&i<allRows.length;i++){html+=allRows[i];}
document.getElementById("attendanceList").innerHTML=html;
}

function nextPage(){if((page+1)*perPage<allRows.length){page++;renderPage();}}
function prevPage(){if(page>0){page--;renderPage();}}

function searchAttendance(){

document.getElementById("loadingBg").style.display="flex";
page=0;allRows=[];

let year=document.getElementById("year").value.trim();
let month=document.getElementById("month").value.trim();

Promise.all([
fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv").then(r=>r.text()),
fetch("https://hescomsalary1-sudo.github.io/salary-data/holidays.csv").then(r=>r.text())
]).then(([attendanceData,holidayData])=>{

document.getElementById("loadingBg").style.display="none";

let holidayMap={};
holidayData.trim().split("\n").slice(1).forEach(r=>{
let c=r.split(",");
holidayMap[c[0].trim()]=c[1];
});

let rows=attendanceData.trim().split("\n");

let present=0,leave=0,absent=0,holidayWork=0;

let monthNumber={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};

for(let i=1;i<rows.length;i++){

let col=rows[i].split(",");

if(col[0]===user && col[1]===year && col[2]===month){

for(let d=0;d<31;d++){

let code=col[3+d]?.trim();
if(!code) continue;

let day=("0"+(d+1)).slice(-2);
let fullDate=`${day}-${monthNumber[month]}-${year}`;

let status="",type="-",badge="",bar="";

/* HOLIDAY */
let isHolidayCSV=holidayMap[fullDate];
let isHolidayCode=(code==="GH"||code==="CH"||code==="WH"||code==="MCL");

if(isHolidayCSV || isHolidayCode){

let holidayName=holidayMap[fullDate] || "Holiday";

if(code==="P"){
status="Holiday Work";holidayWork++;
}else{
status="Holiday";
}

type=holidayName;
badge="badge-holiday";
bar="holidayCardBar";

}else{

if(code==="P"){status="Present";present++;badge="badge-present";bar="presentCardBar";}
else if(code==="A"){status="Absent";absent++;badge="badge-absent";bar="absentCardBar";}
else{status="Leave";leave++;badge="badge-leave";bar="leaveCardBar";type=code;}

}

allRows.push(`
<div class="attCard ${bar}">
  <div>
    <div class="attDate">${fullDate}</div>
    <div class="attType">${type}</div>
  </div>
  <div class="attStatus ${badge}">${status}</div>
</div>
`);

}

}

}

document.getElementById("presentCount").innerText=present;
document.getElementById("leaveCount").innerText=leave;
document.getElementById("absentCount").innerText=absent;
document.getElementById("holidayWork").innerText=holidayWork;

if(allRows.length===0){
document.getElementById("popupBg").style.display="flex";
}else{
document.getElementById("attendanceList").style.display="block";
document.getElementById("pagination").style.display="flex";
renderPage();
}

});

}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
