<!DOCTYPE html>
<html>
<head>
<title>Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

.top{
padding:22px;
color:#2400b7;
text-align:center;
font-size:20px;
font-weight:600;
}

.content{
padding:20px;
}

.card{
background: rgba(255,255,255,0.85);
backdrop-filter: blur(10px);
border-radius:18px;
padding:18px;
margin-bottom:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.label{
color:#888;
font-size:13px;
}

.value{
font-weight:600;
color:#333;
}

.amount{
font-size:20px;
font-weight:700;
color:#4b2dd8;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top" id="title">Report</div>

<div id="loader"><div class="spinner"></div></div>

<div class="content" id="resultBox">Loading...</div>

<script>

const csvUrl = "https://hescomsalary1-sudo.github.io/salary-data/salary .csv"; // ⚠️ change this

let user = localStorage.getItem("currentUser");
let type = localStorage.getItem("reportType");

if(!user){
window.location.replace("login.html");
}

/* COLUMN MAP */
const map={
LIC:"LIC",
income_tax:"income_tax",
society:"KPTCL_employes_society",
PLI:"PLI",
festival_advance:"festival_advance",
house_rent:"house_rent"
};

const titles={
LIC:"LIC Reports",
income_tax:"Income Tax Reports",
society:"Society Reports",
PLI:"PLI Reports",
festival_advance:"Festival Advance",
house_rent:"House Rent"
};

title.innerText = titles[type] || "Report";

window.onload = loadData;

async function loadData(){

loader.style.display="flex";

let res = await fetch(csvUrl);
let text = await res.text();

text = text.replace(/^\uFEFF/, '');

let rows = text.trim().split("\n");

let headers = rows[0].split(",");

let index = headers.indexOf(map[type]);

if(index===-1){
showNoData();
return;
}

let output="";
let found=false;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let month = c[2];
let value = c[index];

if(username.trim()===user.trim() && value && value!=="0"){

output += `
<div class="card">

<div class="row">
<span class="label">Amount</span>
<span class="amount">₹${value}</span>
</div>

<div class="row">
<span class="label">Year</span>
<span class="value">${year}</span>
</div>

<div class="row">
<span class="label">Month</span>
<span class="value">${month}</span>
</div>

</div>
`;

found=true;
}
}

if(!found){
showNoData();
return;
}

resultBox.innerHTML=output;
loader.style.display="none";

}

/* NO DATA */
function showNoData(){

loader.style.display="none";

resultBox.innerHTML=`
<div style="text-align:center;margin-top:60px;background:white;padding:25px;border-radius:20px;">
<div style="font-size:60px;">📭</div>
<h2 style="color:#4b2dd8;">No Records Found</h2>
<p style="color:#777;">No data available</p>
</div>
`;
}

</script>

</body>
</html>
