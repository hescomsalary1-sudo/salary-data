<!DOCTYPE html>
<html>
<head>
<title>Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

.top{
padding:22px;
color:#2400b7;
text-align:center;
font-size:20px;
font-weight:600;
}

.content{
padding:20px;
}

/* YEAR FILTER BOX */
.filter-box{
background:white;
border-radius:18px;
padding:15px;
margin:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.year-text{
font-size:18px;
font-weight:600;
color:#4b2dd8;
margin-bottom:10px;
}

input[type=range]{
width:100%;
}

.search-btn{
margin-top:12px;
padding:10px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* MONTH CARD */
.month-card{
background: rgba(255,255,255,0.9);
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.month-title{
font-weight:700;
color:#4b2dd8;
margin-bottom:10px;
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.label{
color:#888;
font-size:13px;
}

.value{
font-weight:600;
color:#333;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top" id="title">Report</div>

<!-- FILTER -->
<div class="filter-box">
<div class="year-text">Year: <span id="yearValue">2024</span></div>
<input type="range" min="2020" max="2030" value="2024" id="yearSlider">
<button class="search-btn" onclick="loadData()">Search</button>
</div>

<div id="loader"><div class="spinner"></div></div>

<div class="content" id="resultBox"></div>

<script>

const csvUrl = "https://hescomsalary1-sudo.github.io/salary-data/salary.csv";

let user = localStorage.getItem("currentUser");
let type = localStorage.getItem("reportType");

if(!user){
window.location.replace("login.html");
}

/* MAP */
const map={
LIC:"LIC",
income_tax:"income_tax",
society:"KPTCL_employes_society",
PLI:"PLI",
festival_advance:"festival_advance",
house_rent:"house_rent"
};

const titles={
LIC:"LIC Reports",
income_tax:"Income Tax Reports",
society:"Society Reports",
PLI:"PLI Reports",
festival_advance:"Festival Advance",
house_rent:"House Rent"
};

title.innerText = titles[type] || "Report";

/* SLIDER */
const slider = document.getElementById("yearSlider");
const yearValue = document.getElementById("yearValue");

slider.oninput = () => {
yearValue.innerText = slider.value;
};

/* MAIN */
async function loadData(){

let selectedYear = slider.value;

loader.style.display="flex";

let res = await fetch(csvUrl);
let text = await res.text();

text = text.replace(/^\uFEFF/, '');

let rows = text.trim().split("\n");
let headers = rows[0].split(",");
let index = headers.indexOf(map[type]);

if(index===-1){
showNoData();
return;
}

/* MONTH GROUP */
let monthData = {};
let found=false;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

let username = c[0];
let year = c[1];
let month = c[2];
let value = c[index];

if(username.trim()===user.trim() && year==selectedYear && value && value!=="0"){

if(!monthData[month]){
monthData[month]=[];
}

monthData[month].push({
amount:value,
year:year
});

found=true;
}
}

/* NO DATA */
if(!found){
showNoData();
return;
}

/* BUILD UI */
let output="";

for(let m in monthData){

output += `<div class="month-card">
<div class="month-title">📅 ${m}</div>`;

monthData[m].forEach(item=>{
output += `
<div class="row">
<span class="label">Amount</span>
<span class="value">₹${item.amount}</span>
</div>`;
});

output += `</div>`;
}

resultBox.innerHTML=output;
loader.style.display="none";

}

/* NO DATA */
function showNoData(){

loader.style.display="none";

resultBox.innerHTML=`
<div style="text-align:center;margin-top:60px;background:white;padding:25px;border-radius:20px;">
<div style="font-size:60px;">📭</div>
<h2 style="color:#4b2dd8;">No Records Found</h2>
<p style="color:#777;">No data available</p>
</div>
`;
}

</script>

</body>
</html>
