<!DOCTYPE html>
<html>
<head>
<title>Advanced Reports Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Segoe UI';margin:0;background:linear-gradient(135deg,#eef2ff,#f8fafc)}
.top{padding:20px;text-align:center;font-weight:700;color:#4b2dd8}
.filter{background:white;margin:15px;padding:15px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.summary{background:linear-gradient(135deg,#6c39ff,#4b2dd8);color:#fff;margin:15px;padding:15px;border-radius:15px}
canvas{background:white;margin:15px;border-radius:15px;padding:10px}
.month{background:white;margin:15px;padding:15px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.btn{margin-top:10px;padding:8px 12px;border:none;border-radius:8px;background:#4b2dd8;color:white;cursor:pointer}
</style>
</head>

<body>

<div class="top" id="title">Advanced Reports</div>

<div class="filter">
Year: <span id="y">2025</span>
<input type="range" min="2025" max="2030" value="2025" id="slider">

<br><br>
Compare With:
<select id="compareYear">
<option value="">None</option>
<option>2025</option>
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
</select>

<button class="btn" onclick="downloadChart()">Download Chart</button>
</div>

<div id="summary"></div>

<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>

<div id="list"></div>

<script>
const csvUrl="https://hescomsalary1-sudo.github.io/salary-data/salary .csv";
let user=localStorage.getItem("currentUser");
let type=localStorage.getItem("reportType");

const map={LIC:"LIC",income_tax:"income_tax",society:"KPTCL_employes_society",PLI:"PLI",festival_advance:"festival_advance",house_rent:"house_rent"};

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let barChart,pieChart;

slider.oninput=()=>{y.innerText=slider.value;load();}
compareYear.onchange=load;

async function load(){
let year=slider.value;
let compare=compareYear.value;

let res=await fetch(csvUrl);
let text=await res.text();
let rows=text.trim().split("\n");
let headers=rows[0].split(",");
let idx=headers.indexOf(map[type]);

let data=Array(12).fill(0);
let data2=Array(12).fill(0);

for(let i=1;i<rows.length;i++){
let c=rows[i].split(",");
let u=c[0],y=c[1],m=parseInt(c[2])-1,v=Number(c[idx]);

if(u===user && v>0){
if(y==year) data[m]+=v;
if(compare && y==compare) data2[m]+=v;
}
}

let total=data.reduce((a,b)=>a+b,0);
summary.innerHTML=`<div class='summary'>Total: ₹${total}</div>`;

if(barChart) barChart.destroy();
barChart=new Chart(barChartCanvas(),{
type:'bar',
data:{labels:months,datasets:[{label:year,data:data},{label:compare,data:data2}]}
});

if(pieChart) pieChart.destroy();
pieChart=new Chart(pieChartCanvas(),{
type:'pie',
data:{labels:months,datasets:[{data:data}]}
});

let out="";
data.forEach((v,i)=>{
if(v>0){
out+=`<div class='month'>${months[i]} : ₹${v}</div>`;
}
});
list.innerHTML=out;
}

function barChartCanvas(){return document.getElementById("barChart");}
function pieChartCanvas(){return document.getElementById("pieChart");}

function downloadChart(){
    try{
        let url = barChart.toBase64Image();

        // create hidden link
        let a = document.createElement('a');
        a.href = url;
        a.download = 'report_chart.png';
        a.style.display = 'none';

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

    }catch(e){
        alert('Download failed. Please try again.');
    }
}

load();
</script>

</body>
</html>
