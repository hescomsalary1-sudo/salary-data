<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; background: #fff; overflow: hidden; }
        .menu-header { padding: 45px 20px 25px; background: linear-gradient(135deg, #2400b7, #3b1eff); color: #fff; border-bottom-right-radius: 40px; }
        .nav-item { display: flex; align-items: center; padding: 15px; margin: 10px; background: #f8f9ff; border-radius: 12px; text-decoration: none; color: #333; font-weight: 600; }
    </style>
</head>
<body>

    <div class="menu-header">
        <div style="font-size:24px; cursor:pointer;" onclick="requestClose()">✕</div>
        <h3>Menu</h3>
    </div>

    <div class="menu-links">
        <a href="home.html" class="nav-item" target="_parent">🏠 Home</a>
        <a href="resources.html" class="nav-item" target="_parent">📂 Resources</a>
    </div>

    <script>
        function requestClose() {
            // Tell the parent window to go back (which closes the menu)
            window.parent.postMessage('closeSideMenu', '*');
        }

        // SWIPE GESTURE LOGIC
        let startX = 0;
        let startY = 0;

        document.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener("touchend", e => {
            let diffX = e.changedTouches[0].clientX - startX;
            let diffY = Math.abs(e.changedTouches[0].clientY - startY);

            // If swiped Left (negative diffX) and horizontal
            if (diffX < -50 && diffY < 50) {
                requestClose();
            }
        });
    </script>
</body>
</html>
