<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Navigation</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #ffffff;
            color: #333;
            height: 100vh;
        }

        /* HEADER */
        .menu-header {
            padding: 40px 20px 20px;
            background: linear-gradient(135deg, #2400b7, #3b1eff);
            color: white;
            border-bottom-right-radius: 40px;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-block;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-area img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
        }

        /* LIST */
        .menu-list {
            padding: 20px 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: #444;
            background: #f8f9ff;
            font-weight: 600;
            transition: 0.2s;
        }

        .menu-item:active {
            background: #eef0ff;
            transform: scale(0.96);
        }

        .icon {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }

        /* LOGOUT */
        .logout-section {
            position: absolute;
            bottom: 30px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .btn-logout {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #fff0f0;
            color: #ff3d3d;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="menu-header">
        <div class="close-btn" onclick="window.parent.closeSidePage()">✕</div>
        <div class="profile-area">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <div>
                <div id="sideName" style="font-weight: bold;">Loading...</div>
                <div style="font-size: 12px; opacity: 0.8;">HESCOM Employee</div>
            </div>
        </div>
    </div>

    <div class="menu-list">
        <a href="home.html" class="menu-item" target="_parent">
            <span class="icon">🏠</span> Home
        </a>
        
        <a href="resources.html" class="menu-item" target="_parent">
            <span class="icon">📂</span> Resources
        </a>

        <a href="employee_info.html" class="menu-item" target="_parent">
            <span class="icon">👤</span> My Profile
        </a>

        <a href="forum.html" class="menu-item" target="_parent">
            <span class="icon">💬</span> Forum
        </a>
    </div>

    <div class="logout-section">
        <button class="btn-logout" onclick="window.parent.logout()">🔓 Logout</button>
    </div>

    <script>
        // Sync the name from local storage
        document.addEventListener("DOMContentLoaded", () => {
            const user = localStorage.getItem("currentUser");
            if(user) document.getElementById("sideName").innerText = user;
        });
    </script>

</body>
</html>
