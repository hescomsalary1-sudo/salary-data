<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotion Navigation</title>

<style>
:root {
    --accent: #6366f1;
}

/* BODY */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
    color: blue;
}

/* 🔥 ORBIT LOADER (hidden by default) */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #020617;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.orbit {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.1);
    position: relative;
}

.orbit::before {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: #6366f1;
    border-radius: 50%;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg) translateX(25px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(25px) rotate(-360deg); }
}

/* TOP BAR */
.top-nav {
    display: flex;
    align-items: center;
    padding: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
}

.back-link {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    font-size: 20px;
}

.back-link:hover {
    background: var(--accent);
    transform: scale(1.1);
}

/* CONTAINER */
.container {
    padding: 20px;
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
h2 {
    margin: 10px 0;
    font-size: 26px;
}

p {
    color: #94a3b8;
}

/* CARDS */
.nav-grid {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.nav-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    background: white;
    backdrop-filter: blur(12px);
    text-decoration: none;
    color: black;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.08);
}

.nav-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(99,102,241,0.3);
}

.left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.icon {
    font-size: 24px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
}

.arrow {
    font-size: 20px;
    opacity: 0.6;
}

.nav-card:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div class="loader" id="loader">
    <div class="orbit"></div>
</div>

<!-- TOP NAV -->
<div class="top-nav">
    <div class="back-link" onclick="goBack()">←</div>
</div>

<!-- CONTENT -->
<div class="container">
    <h2>Promotion Orders</h2>
    <p>Select your cadre</p>

    <div class="nav-grid">

        <a href="circle_cadre_promotion.html" class="nav-card" onclick="openPage(event, this.href)">
            <div class="left">
                <div class="icon">🏢</div>
                <div>
                    <b>Circle Cadre</b><br>
                    <small>JE, Sr. Asst, Jr. Asst</small>
                </div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="division_cadre_promotion.html" class="nav-card" onclick="openPage(event, this.href)">
            <div class="left">
                <div class="icon">🛠️</div>
                <div>
                    <b>Divisional Cadre</b><br>
                    <small>Mech, Powerman, Asst.</small>
                </div>
            </div>
            <div class="arrow">›</div>
        </a>

    </div>
</div>

<script>
/* BACK BUTTON FIX */
function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}

/* 🔥 SHOW LOADER ONLY ON CLICK */
function openPage(event, url) {
    event.preventDefault();

    const loader = document.getElementById("loader");
    loader.style.display = "flex";

    setTimeout(() => {
        window.location.href = url;
    }, 500);
}
</script>

</body>
</html>
