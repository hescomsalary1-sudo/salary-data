<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Navigation</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f0f4ff 0%, #f5f3ff 100%);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* THE BEAUTIFUL BUTTON CARDS */
        .nav-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none; /* Removes underline from <a> tag */
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        /* Hover & Active States */
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.15);
            border-color: var(--accent);
        }

        .nav-card:active {
            transform: scale(0.96);
        }

        .info h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .info p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .icon-box {
            width: 52px;
            height: 52px;
            background: #f1f5f9;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
        }

        .nav-card:hover .icon-box {
            background: var(--accent);
            transform: rotate(-10deg);
        }

        .nav-card:hover .info h3 {
            color: var(--accent);
        }

        /* Arrow animation */
        .arrow {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
            color: var(--accent);
            font-weight: bold;
        }

        .nav-card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h2>Promotions</h2>
            <p>Select your cadre to view orders</p>
        </div>

        <div class="nav-grid">
            
            <!-- BUTTON 1: Redirects to circle.html -->
            <a href="circle_cadre_promotion.html" class="nav-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-box">🏢</div>
                    <div class="info">
                        <h3>Circle Cadre</h3>
                        <p>JE, Sr. Asst, Jr. Asst</p>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <!-- BUTTON 2: Redirects to divisional.html -->
            <a href="divisional.html" class="nav-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-box">🛠️</div>
                    <div class="info">
                        <h3>Divisional Cadre</h3>
                        <p>Mech, Powerman, Asst.</p>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

        </div>
    </div>

</body>
</html>
