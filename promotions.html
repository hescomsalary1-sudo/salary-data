<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotion Navigation</title>

<style>
:root {
    --accent: #6366f1;
}

/* Background */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
}

/* Top Bar */
.top-nav {
    display: flex;
    align-items: center;
    padding: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
}

.back-link {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
}

.back-link:hover {
    background: var(--accent);
    transform: scale(1.1);
}

/* Container */
.container {
    padding: 20px;
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Header */
h2 {
    margin: 10px 0;
    font-size: 26px;
}

p {
    color: #94a3b8;
}

/* Cards */
.nav-grid {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.nav-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.08);
}

.nav-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(99,102,241,0.3);
}

.left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.icon {
    font-size: 24px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
}

.arrow {
    font-size: 20px;
    opacity: 0.6;
}

/* Press effect */
.nav-card:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<div class="top-nav">
    <div class="back-link" onclick="goBack()">
        ←
    </div>
</div>

<div class="container">
    <h2>Promotion Orders</h2>
    <p>Select your cadre</p>

    <div class="nav-grid">

        <a href="circle_cadre_promotion.html" class="nav-card">
            <div class="left">
                <div class="icon">🏢</div>
                <div>
                    <b>Circle Cadre</b><br>
                    <small>JE, Sr. Asst, Jr. Asst</small>
                </div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="divisional.html" class="nav-card">
            <div class="left">
                <div class="icon">🛠️</div>
                <div>
                    <b>Divisional Cadre</b><br>
                    <small>Mech, Powerman, Asst.</small>
                </div>
            </div>
            <div class="arrow">›</div>
        </a>

    </div>
</div>

<script>
function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
