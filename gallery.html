<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f4fa;
}

/* HEADER */
.header{
padding:20px;
background:linear-gradient(135deg,#4B2DD8,#6A42E8);
color:white;
font-size:20px;
font-weight:bold;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

/* GALLERY GRID */
.gallery{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

/* IMAGE CARD */
.card{
position:relative;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* OVERLAY TEXT */
.overlay{
position:absolute;
bottom:0;
width:100%;
padding:8px;
background:linear-gradient(to top, rgba(0,0,0,0.6), transparent);
color:white;
font-size:13px;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup img{
width:90%;
border-radius:10px;
}

/* SKELETON LOADER */
#loader{
display:flex;
flex-direction:column;
gap:12px;
padding:15px;
}

.skeleton{
height:140px;
border-radius:15px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

</style>
</head>

<body>

<div class="header">📸 Gallery</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery" style="display:none;"></div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeImage()">
<img id="popupImg">
</div>

<script>

/* SAMPLE IMAGES (you can change later) */

let images = [
{
url:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d",
title:"Team Meeting"
},
{
url:"https://images.unsplash.com/photo-1529333166437-7750a6dd5a70",
title:"Office Celebration"
},
{
url:"https://images.unsplash.com/photo-1504384308090-c894fdcc538d",
title:"Work Session"
},
{
url:"https://images.unsplash.com/photo-1492724441997-5dc865305da7",
title:"Office Event"
},
{
url:"https://images.unsplash.com/photo-1515169067865-5387ec356754",
title:"Birthday Celebration"
},
{
url:"https://images.unsplash.com/photo-1503428593586-e225b39bddfe",
title:"Group Photo"
}
];

/* LOAD GALLERY */

function loadGallery(){

let gallery = document.getElementById("gallery");

let html = "";

images.forEach(img => {

html += `
<div class="card" onclick="openImage('${img.url}')">
<img src="${img.url}" loading="lazy">
<div class="overlay">${img.title}</div>
</div>
`;

});

gallery.innerHTML = html;

/* hide loader */
document.getElementById("loader").style.display="none";
gallery.style.display="grid";

}

/* IMAGE POPUP */

function openImage(src){
document.getElementById("popupImg").src = src;
document.getElementById("popup").style.display="flex";
}

function closeImage(){
document.getElementById("popup").style.display="none";
}

/* DELAY (simulate loading) */
setTimeout(loadGallery,800);

</script>

</body>
</html>
