<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Asset Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --accent: #3b82f6;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- Header Design --- */
        header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at top, #1e293b 0%, #030712 70%);
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
        }

        header p {
            color: #94a3b8;
            margin-top: 10px;
        }

        /* --- Grid View --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .photo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Keeps grid uniform */
            display: block;
        }

        .photo-desc {
            padding: 15px;
            font-size: 0.85rem;
            color: #cbd5e1;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        /* --- Lightbox (Max Size View) --- */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .lightbox-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-download { background: var(--accent); color: white; }
        .btn-close { background: #334155; color: white; }

        /* --- Loader --- */
        #loader { text-align: center; padding: 100px; color: var(--accent); }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>Media Portfolio</h1>
        <p>Live Assets from Google Drive</p>
    </header>

    <div id="loader"><div class="spinner"></div>Loading Gallery...</div>
    <div class="gallery-grid" id="gallery"></div>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="Full size">
        <div class="lightbox-controls">
            <a id="download-link" href="#" class="btn btn-download" download>Download Image</a>
            <button class="btn btn-close" onclick="closeLightbox()">Close</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlmhlCzSc1GNYp_CSXc9gU36rorQfRdNZGW4hXoe0Ccz4aMwdqdjHbd21tVMsntp345w/exec';

        async function loadGallery() {
            try {
                const response = await fetch(SCRIPT_URL);
                const photos = await response.json();
                const gallery = document.getElementById('gallery');
                document.getElementById('loader').style.display = 'none';

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    const imgUrl = `https://lh3.googleusercontent.com/d/${photo.id}`;
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${photo.id}`;

                    card.innerHTML = `
                        <img src="${imgUrl}" loading="lazy">
                        <div class="photo-desc">${photo.name || 'View Image'}</div>
                    `;

                    card.onclick = () => openLightbox(imgUrl, downloadUrl);
                    gallery.appendChild(card);
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function openLightbox(src, downloadUrl) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('download-link').href = downloadUrl;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        loadGallery();
    </script>
</body>
</html>
