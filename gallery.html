<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Photo Gallery</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --bg: #0f172a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .photo-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Media Assets</h2>

    <div class="gallery-container" id="gallery">
        </div>

    <script>
        // Replace these with your actual Google Drive File IDs
        const photoIds = [
            '1c0wUc24-IBaBt7DIt0taYsmhM8rPCyPU',
            'FILE_ID_2',
            'FILE_ID_3'
        ];

        const gallery = document.getElementById('gallery');

        photoIds.forEach(id => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            // The URL structure to bypass the Drive viewer and get the raw image
            const imgUrl = `https://lh3.googleusercontent.com/d/${id}`;

            card.innerHTML = `
                <img src="${imgUrl}" alt="Gallery Image" loading="lazy">
                <div class="photo-info">View Full Resolution</div>
            `;
            gallery.appendChild(card);
        });
    </script>
</body>
</html>
