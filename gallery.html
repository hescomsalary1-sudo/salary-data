<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Asset Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            /* White Gradient Background */
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #0f172a;
        }

        /* --- Side-by-Side Grid Layout --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 0 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column; /* Stacked internally, but cards are side-by-side in grid */
            border: 1px solid #e2e8f0;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .image-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #f8fafc;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .photo-card:hover img {
            transform: scale(1.08);
        }

        /* --- Description Container --- */
        .info-box {
            padding: 20px;
            background: #ffffff;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-box h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info-box p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin: 0 0 20px 0;
            line-height: 1.5;
        }

        .action-area {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-view { background: var(--primary); color: white; border: none; }
        .btn-view:hover { background: #1d4ed8; }

        .btn-save { background: #f1f5f9; color: var(--text-dark); border: 1px solid #e2e8f0; }
        .btn-save:hover { background: #e2e8f0; }

        /* Mobile View */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                padding: 0 20px;
            }
        }

        #loader { text-align: center; padding: 100px; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <h1>Media Assets</h1>
        <p>Explore and manage your cloud-hosted images</p>
    </header>

    <div id="loader">Loading your gallery...</div>
    <div class="gallery-grid" id="gallery"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlmhlCzSc1GNYp_CSXc9gU36rorQfRdNZGW4hXoe0Ccz4aMwdqdjHbd21tVMsntp345w/exec';

        async function loadGallery() {
            try {
                const response = await fetch(SCRIPT_URL);
                const photos = await response.json();
                const gallery = document.getElementById('gallery');
                document.getElementById('loader').style.display = 'none';

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    const imgUrl = `https://lh3.googleusercontent.com/d/${photo.id}`;
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${photo.id}`;

                    card.innerHTML = `
                        <div class="image-container">
                            <img src="${imgUrl}" alt="${photo.name}" loading="lazy">
                        </div>
                        <div class="info-box">
                            <div>
                                <h3>${photo.name}</h3>
                                <p>Source: Google Drive Asset</p>
                            </div>
                            <div class="action-area">
                                <a href="https://drive.google.com/file/d/${photo.id}/view" target="_blank" class="btn btn-view">Maximize</a>
                                <a href="${downloadUrl}" class="btn btn-save">Download</a>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loader').innerText = "Failed to load photos. Please check your Drive permissions.";
            }
        }

        loadGallery();
    </script>
</body>
</html>
