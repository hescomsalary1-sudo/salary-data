<!DOCTYPE html>
<html>
<head>
<title>Forum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f4fa;
padding-bottom:80px;
}

/* HEADER */

.top{
padding:20px;
background:#4b2dd8;
color:white;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

/* POSTS */

.container{
padding:20px;
}

.post{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.post-title{
font-weight:bold;
color:#4b2dd8;
margin-bottom:5px;
}

.post-date{
font-size:12px;
color:#777;
margin-bottom:8px;
}

/* NAVBAR */

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -4px 15px rgba(0,0,0,0.12);
}

.nav-item{
flex:1;
text-align:center;
cursor:pointer;
font-size:11px;
}

.nav-item i{
font-size:20px;
color:#777;
}

.nav-item span{
display:block;
color:#777;
}

.nav-item.active i,
.nav-item.active span{
color:#4b2dd8;
}

</style>
</head>

<body>

<div class="top">Employee Forum</div>

<div class="container">

<div class="post">
<div class="post-title">Salary Update</div>
<div class="post-date">10 Mar 2026</div>
Salary will be credited on 12th March.
</div>

<div class="post">
<div class="post-title">Attendance Correction</div>
<div class="post-date">8 Mar 2026</div>
Please contact admin for attendance corrections.
</div>

</div>

<div class="navbar">

<div class="nav-item" onclick="location='home.html'">
<i>🏠</i>
<span>Home</span>
</div>

<div class="nav-item active">
<i>💬</i>
<span>Forum</span>
</div>

<div class="nav-item" onclick="location='employee_info.html'">
<i>👤</i>
<span>Employee</span>
</div>

<div class="nav-item" onclick="location='resources.html'">
<i>📂</i>
<span>Resources</span>
</div>

</div>

</body>
</html>
