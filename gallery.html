<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Folder Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Premium Masonry - Fixes the "Cut" issue */
        .gallery-wrapper {
            columns: 3 250px;
            column-gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 15px;
            background: var(--glass);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        #loader {
            text-align: center;
            padding: 50px;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <h1 style="text-align:center; font-weight:300;">Media Assets</h1>
    <div id="loader">Fetching photos from Drive...</div>
    <div class="gallery-wrapper" id="gallery"></div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT URL HERE
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlmhlCzSc1GNYp_CSXc9gU36rorQfRdNZGW4hXoe0Ccz4aMwdqdjHbd21tVMsntp345w/exec';

        async function loadGallery() {
            try {
                const response = await fetch(SCRIPT_URL);
                const photos = await response.json();
                const gallery = document.getElementById('gallery');
                const loader = document.getElementById('loader');

                loader.style.display = 'none';

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    // Direct Link Format
                    const imgUrl = `https://drive.google.com/uc?export=view&id=${photo.id}`;

                    card.innerHTML = `<img src="${imgUrl}" loading="lazy">`;
                    gallery.appendChild(card);
                });
            } catch (error) {
                document.getElementById('loader').innerText = "Error loading folder. Check permissions.";
            }
        }

        loadGallery();
    </script>
</body>
</html>
