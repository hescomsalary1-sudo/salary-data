<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Media Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-gradient: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            background: var(--bg-gradient);
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        /* --- 2-Line (2-Column) Grid View --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Forces exactly 2 columns */
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .photo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            width: 100%;
            height: 280px;
            background: #f1f5f9;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Prevents image cutting/stretching */
        }

        /* --- Info & Description --- */
        .info-container {
            padding: 20px;
            flex-grow: 1;
        }

        .info-container h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #0f172a;
        }

        .info-container p {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 20px;
        }

        /* --- Animated Download Button --- */
        .download-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .download-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* --- Button Spinner --- */
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            display: none; /* Hidden by default */
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; } /* Stacks on mobile */
        }

        #page-loader { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <h1>Resource Library</h1>
        <p>Managed Cloud Assets</p>
    </header>

    <div id="page-loader">Connecting to Drive...</div>
    <div class="gallery-grid" id="gallery"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlmhlCzSc1GNYp_CSXc9gU36rorQfRdNZGW4hXoe0Ccz4aMwdqdjHbd21tVMsntp345w/exec';

        async function loadGallery() {
            try {
                const response = await fetch(SCRIPT_URL);
                const photos = await response.json();
                const gallery = document.getElementById('gallery');
                document.getElementById('page-loader').style.display = 'none';

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    const imgUrl = `https://lh3.googleusercontent.com/d/${photo.id}`;
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${photo.id}`;

                    card.innerHTML = `
                        <div class="image-container">
                            <img src="${imgUrl}" alt="${photo.name}" loading="lazy">
                        </div>
                        <div class="info-container">
                            <h3>${photo.name}</h3>
                            <p>Premium high-resolution asset.</p>
                            <button class="download-btn" onclick="handleDownload(this, '${downloadUrl}')">
                                <span class="btn-spinner"></span>
                                <span class="btn-text">Download Image</span>
                            </button>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                document.getElementById('page-loader').innerText = "Error loading files.";
            }
        }

        // --- Handle Button Spinner & Download ---
        function handleDownload(btn, url) {
            const spinner = btn.querySelector('.btn-spinner');
            const text = btn.querySelector('.btn-text');

            // Show Spinner
            btn.disabled = true;
            spinner.style.display = 'block';
            text.innerText = "Processing...";

            // Simulate server lag for 2 seconds then trigger download
            setTimeout(() => {
                window.location.href = url;

                // Reset button after download starts
                setTimeout(() => {
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    text.innerText = "Download Image";
                }, 1000);
            }, 1500);
        }

        loadGallery();
    </script>
</body>
</html>
