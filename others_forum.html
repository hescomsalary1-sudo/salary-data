<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: #3b1eff;
    --accent: #2575fc;
    --bg: #f4f6fb;
    --text: #333;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
.top {
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.back-btn {
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.2);
    width: 35px;
    height: 35px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-right: 15px;
    font-size: 20px;
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.4);
}

.top h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 600;
}

/* CONTAINER */
.container {
    padding: 15px;
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    line-height: 1.7;
}

/* ACCORDION (Org Chart) */
.accordion {
    background: white;
    border-radius: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    overflow: hidden;
}

.acc-header {
    padding: 15px;
    font-weight: 600;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.acc-content {
    display: none;
    padding: 10px;
    background: #f9faff;
}

.section {
    background: white;
    padding: 10px 15px;
    margin: 5px 0;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    font-size: 14px;
    border-left: 3px solid var(--accent);
}

ul { padding-left: 20px; }
li { margin-bottom: 5px; }
b { color: var(--primary); }
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
    <a href="forum.html" class="back-btn">←</a>
    <h2 id="title">Loading...</h2>
</div>

<!-- CONTENT -->
<div class="container">
    <div class="card" id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

let title = "";
let content = "";

if(type === "privacy"){
    title = "Privacy Policy";
    content = `

    All data is handled via secure scripts and is never shared with third-party advertisers. Access is restricted to authorized HR personnel.
    `;
}

if(type === "terms"){
    title = "Terms & Conditions";
    content = `
    <b>Terms & Conditions of Use</b><br>
    <small>Effective Date: 01 May 2026</small>
    <br><br>

    <b>1. Purpose & Authorized Access</b><br>
    This portal is strictly for the use of employees under the HESCOM O&M Division. Users must access the portal using only their assigned credentials. Unauthorized access or attempting to bypass security protocols is a violation of organizational policy.

    <br><br>
    <b>2. Data Accuracy & Integrity</b><br>
    Users are responsible for the accuracy of any data submitted via the portal (e.g., grievance reports, profile updates). Submitting false information or deliberately tampering with official records via this interface may lead to disciplinary action.

    <br><br>
    <b>3. Cybersecurity & Prohibited Actions</b><br>
    To ensure the stability of the 2026 deployment, users agree NOT to:

        <li>Use automated scripts or bots to scrape salary data.</li>
        <li>Share sensitive screenshots of Master Reports on public forums.</li>
        <li>Attempt to reverse-engineer the "Premium Portal" UI logic or backend Google Apps Script triggers.</li>
    </ul>

    <br>
    <b>4. Service Availability</b><br>
    While we strive for 24/7 uptime, maintenance for the Google Sheets backend or GitHub Pages deployment may cause temporary outages. The organization is not liable for delays in data synchronization during these periods.

    <br><br>
    <b>5. Confidentiality of Payroll Information</b><br>
    All salary structures, cadre-based promotion data, and financial records displayed are strictly confidential. Sharing this data outside of authorized HESCOM channels is prohibited.

    <br><br>
    <b>6. Intellectual Property</b><br>
    The unique UI design (including glassmorphism effects and touch-gesture logic) is a proprietary asset. Users may not copy the source code for personal or external commercial projects.

    <br><br>
    <b>7. Updates to Terms</b><br>
    These terms are subject to change as per new 2026 labor code compliance requirements. Continued use of the portal after updates constitutes acceptance of the new terms.

    <br><br>
    <b>8. Contact & Support</b><br>
    For legal or technical inquiries regarding these terms, please contact the IT Administration section at the Sirsi Division office.
    `;
}

if(type === "copyright"){
    title = "Copyright Policy";
    content = `
    <b>Copyright © 2026</b><br><br>
    All rights reserved. The design, UI components (including premium mobile transitions), and the centralized reporting logic are the intellectual property of the organization.
    <br><br>
    Unauthorized reproduction of the portal source code or layout for external use is prohibited.
    `;
}

if(type === "org"){
    title = "Organization Chart";
    content = `
    <div class="accordion">
    <div class="acc-header" onclick="toggle(this)">🏢 O & M Division - HESCOM, Sirsi <span>+</span></div>
    <div class="acc-content">

    <!-- Sirsi -->
    <div class="accordion">
    <div class="acc-header" onclick="toggle(this)">Sirsi Subdivision <span>+</span></div>
    <div class="acc-content">
    <div class="section">R-1 Section</div>
    <div class="section">R-2 Section</div>
    <div class="section">Hulekal</div>
    <div class="section">Banavasi</div>
    </div>
    </div>

    <!-- Siddapur -->
    <div class="accordion">
    <div class="acc-header" onclick="toggle(this)">Siddapur Subdivision <span>+</span></div>
    <div class="acc-content">
    <div class="section">Town Section</div>
    <div class="section">Rural Section</div>
    <div class="section">Herur</div>
    <div class="section">Bilagi</div>
    </div>
    </div>

    <!-- Yellapur -->
    <div class="accordion">
    <div class="acc-header" onclick="toggle(this)">Yellapur Subdivision <span>+</span></div>
    <div class="acc-content">
    <div class="section">Town Section</div>
    <div class="section">Rural Section</div>
    <div class="section">Manchikeri</div>
    <div class="section">Kiravatti</div>
    </div>
    </div>

    <!-- Mundgod -->
    <div class="accordion">
    <div class="acc-header" onclick="toggle(this)">Mundgod Subdivision <span>+</span></div>
    <div class="acc-content">
    <div class="section">Mundgod Section</div>
    <div class="section">Malgi Section</div>
    </div>
    </div>

    <!-- Accounting -->
    <div class="accordion">
    <div class="acc-header" onclick="toggle(this)">Sirsi Accounting Section <span>+</span></div>
    <div class="acc-content">
    <div class="section">Accounts & Billing</div>
    </div>
    </div>

    </div>
    </div>
    `;
}

document.getElementById("title").innerText = title;
document.getElementById("content").innerHTML = content;

function toggle(el){
    let content = el.nextElementSibling;
    if(content.style.display === "block"){
        content.style.display = "none";
        el.querySelector("span").innerText = "+";
    }else{
        content.style.display = "block";
        el.querySelector("span").innerText = "-";
    }
}

// BACK GESTURE HANDLING
history.pushState(null, null, location.href);
window.onpopstate = function () {
    window.location.replace("forum.html");
};
</script>
</body>
</html>
