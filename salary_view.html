<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<title>Salary Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* SMOOTH ENTRANCE ANIMATION */
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin:0;
    background: linear-gradient(135deg, #f7f8fc, #edf5ff);
    padding-bottom:90px;
    animation: pageFadeIn 0.6s ease-out;
}

/* BEAUTIFUL HEADER */
.top {
    padding: 25px 20px;
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    color: white;
    display: flex;
    align-items: center;
    gap: 15px;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
    box-shadow: 0 4px 15px rgba(36, 0, 183, 0.2);
}

.top .icon {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
    color: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.top h2 {
    margin: 0;
    font-size: 20px;
    letter-spacing: 0.5px;
}

/* CONTENT */
.content{
    padding:15px;
}

/* TABLE STYLING */
.salary-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e0e6ed;
    margin-bottom: 20px;
}

.salary-table th {
    background: #f8fafc;
    text-align: left;
    padding: 12px 15px;
    color: #4b2dd8;
    font-size: 14px;
    border-bottom: 2px solid #e0e6ed;
}

.salary-table td {
    padding: 10px 15px;
    font-size: 14px;
    border-bottom: 1px solid #f0f3f7;
    color: #334155;
}

.salary-table tr:last-child td {
    border-bottom: none;
}

.salary-table .label-cell {
    font-weight: 500;
}

.salary-table .amount-cell {
    text-align: right;
    font-family: 'Courier New', Courier, monospace;
    font-weight: 600;
}

.total-row {
    background: #f1f5f9;
    font-weight: bold !important;
    color: #1e293b !important;
}

/* ACTION BUTTONS */
.action-buttons{
    margin: 15px 0;
    display:flex;
    gap:12px;
    justify-content:center;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button:nth-child(1){ background: #48bb78; color:white; }
button:nth-child(2){ background: #ed8936; color:white; }

button:active{ transform:scale(0.95); }

/* NET CARD */
.net-card {
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    color: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    box-shadow: 0 10px 20px rgba(36, 0, 183, 0.3);
    margin-top: 20px;
    border: 2px solid rgba(255,255,255,0.1);
}

/* LOADER */
.loader{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.9);
    z-index:9999;
    align-items:center;
    justify-content:center;
}

.spinner{
    border:4px solid #f3f3f3;
    border-top:4px solid #2400b7;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

#selectedInfo {
    color: #64748b;
    font-size: 14px;
    margin: 10px 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
}

</style>
</head>

<body>

<div class="top">
    <div class="icon">₹</div>
    <h2>Salary Statement</h2>
</div>

<div class="content">
    <div class="action-buttons" id="pdfButtons" style="display:none;">
        <button onclick="printSalary()">🖨 Print</button>
        <button onclick="downloadPDF()">📄 Download PDF</button>
    </div>

    <h3 id="selectedInfo" style="text-align:center;"></h3>
    <div id="result"></div>
</div>

<script>
let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

function showRow(name,value){
    if(value>0){
        return `<tr><td class="label-cell">${name}</td><td class="amount-cell">₹ ${value}</td></tr>`;
    }
    return "";
}

async function loadSalary(){
    document.getElementById("loader").style.display="flex";

    let year = localStorage.getItem("selectedYear");
    let month = localStorage.getItem("selectedMonth");

    month = month.toString().padStart(2,"0");
    let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    document.getElementById("selectedInfo").innerText = names[month-1] + " " + year;

    try {
        let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
        let data = await response.text();
        let rows = data.trim().split("\n");

        for(let i=1;i<rows.length;i++){
            let cols = rows[i].split(",");
            if(cols[0] === user && cols[1] === year && cols[2] === month){

                let basic = +cols[3];
                let dearness_pay = +cols[4];
                let rouse_rent_allowances = +cols[5];
                let city_compensation_allowances = +cols[6];
                let personal_pay = +cols[7];
                let special_personal_pay = +cols[8];
                let conveyance_allowances = +cols[9];
                let washing_allowances = +cols[10];
                let sfta = +cols[11];
                let special_locality_allowances = +cols[12];
                let mwa = +cols[13];
                let hill_allowances = +cols[14];
                let charge_allowances = +cols[15];
                let pension_contribution_14_percent = +cols[16];
                let labour_welfare_fund_company_contribution = +cols[17];
                let cash_duty_allowances = +cols[18];
                let other_earnings = +cols[19];

                let LIC = +cols[20];
                let income_tax = +cols[21];
                let professional_tax = +cols[22];
                let KPTCL_employes_society = +cols[23];
                let PLI = +cols[24];
                let union_fund = +cols[25];
                let sc_st_union_fund = +cols[26];
                let house_rent = +cols[27];
                let urban_bank = +cols[28];
                let family_benefit_fund = +cols[29];
                let festival_advance = +cols[30];
                let PC_10_contribution = +cols[31];
                let PC_14_contribution = +cols[32];
                let LWF = +cols[33];
                let recovery_any = +cols[34];
                let other_deduction = +cols[35];

                let totalEarning = basic+dearness_pay+rouse_rent_allowances+city_compensation_allowances+personal_pay+special_personal_pay+conveyance_allowances+washing_allowances+sfta+special_locality_allowances+mwa+hill_allowances+charge_allowances+pension_contribution_14_percent+labour_welfare_fund_company_contribution+cash_duty_allowances+other_earnings;
                let totalDeduction = LIC+income_tax+professional_tax+KPTCL_employes_society+PLI+union_fund+sc_st_union_fund+house_rent+urban_bank+family_benefit_fund+festival_advance+PC_10_contribution+PC_14_contribution+LWF+recovery_any+other_deduction;
                let net = totalEarning-totalDeduction;

                window.salaryData={
                    basic,dearness_pay,rouse_rent_allowances,city_compensation_allowances,personal_pay,special_personal_pay,conveyance_allowances,washing_allowances,sfta,special_locality_allowances,mwa,hill_allowances,charge_allowances,pension_contribution_14_percent,labour_welfare_fund_company_contribution,cash_duty_allowances,other_earnings,LIC,income_tax,professional_tax,KPTCL_employes_society,PLI,union_fund,sc_st_union_fund,house_rent,urban_bank,family_benefit_fund,festival_advance,PC_10_contribution,PC_14_contribution,LWF,recovery_any,other_deduction,totalEarning,totalDeduction,net
                };

                let s = window.salaryData;
                document.getElementById("loader").style.display="none";
                document.getElementById("pdfButtons").style.display="flex";

                document.getElementById("result").innerHTML = `
                    <table class="salary-table">
                        <thead><tr><th colspan="2">EARNINGS</th></tr></thead>
                        <tbody>
                            ${showRow("Basic Pay", s.basic)}
                            ${showRow("Dearness Pay", s.dearness_pay)}
                            ${showRow("House Rent Allowance", s.rouse_rent_allowances)}
                            ${showRow("City Comp. Allowance", s.city_compensation_allowances)}
                            ${showRow("Personal Pay", s.personal_pay)}
                            ${showRow("Special Personal Pay", s.special_personal_pay)}
                            ${showRow("Conveyance Allowance", s.conveyance_allowances)}
                            ${showRow("Washing Allowance", s.washing_allowances)}
                            ${showRow("SFTA", s.sfta)}
                            ${showRow("Special Locality", s.special_locality_allowances)}
                            ${showRow("MWA", s.mwa)}
                            ${showRow("Hill Allowance", s.hill_allowances)}
                            ${showRow("Charge Allowance", s.charge_allowances)}
                            ${showRow("Pension (14%)", s.pension_contribution_14_percent)}
                            ${showRow("LWF Company Cont.", s.labour_welfare_fund_company_contribution)}
                            ${showRow("Cash Duty", s.cash_duty_allowances)}
                            ${showRow("Other Earnings", s.other_earnings)}
                            <tr class="total-row"><td>Gross Earnings</td><td class="amount-cell">₹ ${s.totalEarning}</td></tr>
                        </tbody>
                    </table>

                    <table class="salary-table">
                        <thead><tr><th colspan="2">DEDUCTIONS</th></tr></thead>
                        <tbody>
                            ${showRow("LIC", s.LIC)}
                            ${showRow("Income Tax", s.income_tax)}
                            ${showRow("Professional Tax", s.professional_tax)}
                            ${showRow("Society", s.KPTCL_employes_society)}
                            ${showRow("PLI", s.PLI)}
                            ${showRow("Union Fund", s.union_fund)}
                            ${showRow("SC/ST Fund", s.sc_st_union_fund)}
                            ${showRow("House Rent", s.house_rent)}
                            ${showRow("Urban Bank", s.urban_bank)}
                            ${showRow("FBF", s.family_benefit_fund)}
                            ${showRow("Festival Advance", s.festival_advance)}
                            ${showRow("PC 10%", s.PC_10_contribution)}
                            ${showRow("PC 14%", s.PC_14_contribution)}
                            ${showRow("LWF", s.LWF)}
                            ${showRow("Recovery", s.recovery_any)}
                            ${showRow("Other Deductions", s.other_deduction)}
                            <tr class="total-row"><td>Total Deductions</td><td class="amount-cell">₹ ${s.totalDeduction}</td></tr>
                        </tbody>
                    </table>

                    <div class="net-card">
                        <small style="display:block; font-size:12px; opacity:0.8; font-weight:normal">Take Home Salary</small>
                        ₹ ${s.net}
                    </div>
                `;
                return;
            }
        }
    } catch(e) { console.error(e); }

    document.getElementById("loader").style.display="none";
    document.getElementById("result").innerHTML="<p style='text-align:center; padding:20px;'>No salary record found.</p>";
}

function printSalary(){
    let content=document.getElementById("result").innerHTML;
    let win=window.open('', '', 'width=800,height=600');
    win.document.write(`<html><head><title>Print Salary</title><style>body{font-family:sans-serif;padding:20px;}.salary-table{width:100%;border-collapse:collapse;margin-bottom:20px;}.salary-table td,th{border:1px solid #ddd;padding:8px;}.amount-cell{text-align:right;}</style></head><body>${content}</body></html>`);
    win.document.close();
    setTimeout(()=>{ win.print(); },500);
}

async function downloadPDF(){
    let s = window.salaryData;
    let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
    let data = await response.text();
    let rows = data.trim().split("\n");
    let empName = user, empDesignation = "", empPlace = "";

    for(let i=1;i<rows.length;i++){
        let cols = rows[i].split(",");
        if(cols[0] === user){
            empName = cols[1]; empDesignation = cols[2]; empPlace = cols[3];
            break;
        }
    }

    let year = localStorage.getItem("selectedYear");
    let monthNum = localStorage.getItem("selectedMonth");
    let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let month = names[monthNum-1];

    function pdfRow(name,value){
        return value > 0 ? `<tr><td style="padding:4px; border:1px solid #eee;">${name}</td><td style="text-align:right; padding:4px; border:1px solid #eee;">₹ ${value}</td></tr>` : "";
    }

    let pdfContent = `
        <div style="font-family:sans-serif; padding:30px; border:1px solid #eee;">
            <div style="text-align:center;">
                <h2 style="margin:0; color:#2400b7;">HUBLI ELECTRICITY SUPPLY COMPANY LTD.</h2>
                <h4 style="margin:5px 0;">O & M Division, Sirsi</h4>
                <hr>
                <table style="width:100%; font-size:12px; margin:10px 0;">
                    <tr><td><b>Name:</b> ${empName}</td><td style="text-align:right"><b>Month:</b> ${month} ${year}</td></tr>
                    <tr><td><b>Designation:</b> ${empDesignation}</td><td style="text-align:right"><b>Place:</b> ${empPlace}</td></tr>
                </table>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:11px;">
                <thead><tr style="background:#f1f1f1;"><th>Earnings</th><th>Deductions</th></tr></thead>
                <tbody>
                    <tr>
                        <td style="vertical-align:top; width:50%;">
                            <table style="width:100%; border-collapse:collapse;">
                                ${pdfRow("Basic",s.basic)} ${pdfRow("DA",s.dearness_pay)} ${pdfRow("HRA",s.rouse_rent_allowances)}
                                <tr><td style="padding:4px; font-weight:bold;">Total</td><td style="text-align:right; font-weight:bold;">₹ ${s.totalEarning}</td></tr>
                            </table>
                        </td>
                        <td style="vertical-align:top; width:50%;">
                            <table style="width:100%; border-collapse:collapse;">
                                ${pdfRow("LIC",s.LIC)} ${pdfRow("IT",s.income_tax)} ${pdfRow("PT",s.professional_tax)}
                                <tr><td style="padding:4px; font-weight:bold;">Total</td><td style="text-align:right; font-weight:bold;">₹ ${s.totalDeduction}</td></tr>
                            </table>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="text-align:right; margin-top:20px; font-size:18px; font-weight:bold;">Net Salary: ₹ ${s.net}</div>
        </div>`;

    let div=document.createElement("div");
    div.innerHTML=pdfContent;
    html2pdf().set({ margin:0.5, filename:'Salary_Slip.pdf', jsPDF:{unit:'in', format:'a4'} }).from(div).save();
}

window.onload = function(){ loadSalary(); }
</script>

<div class="loader" id="loader"><div class="spinner"></div></div>
</body>
</html>
