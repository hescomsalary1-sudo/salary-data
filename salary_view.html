<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<title>Salary Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:20px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:#2400b7;
display:flex;
align-items:center;
gap:10px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.top .icon{
width:35px;
height:35px;
background:white;
color:#5e00a3;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.top h2{margin:0;}

.content{padding:20px;}

.salary-card{
background:white;
padding:16px;
border-radius:16px;
margin-bottom:12px;
}

.net-card{
margin-top:15px;
background:linear-gradient(135deg,#4facfe,#0052cc);
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.loader{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
z-index:9999;
align-items:center;
justify-content:center;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #5e00a3;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="top">
<div class="icon">₹</div>
<h2>Monthly Salary</h2>
</div>

<div class="content">

<div class="action-buttons" id="pdfButtons" style="display:none;">
<button onclick="downloadPDF()">📄 Download PDF</button>
</div>

</div>

<h3 id="selectedInfo" style="text-align:center;"></h3>
<div id="result"></div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

async function loadSalary(){

document.getElementById("loader").style.display="flex";

let year = localStorage.getItem("selectedYear");
let month = localStorage.getItem("selectedMonth");

month = month.toString().padStart(2,"0");

let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

document.getElementById("selectedInfo").innerText =
names[month-1] + " " + year;

/* ✅ FIXED CSV URL */
let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary.csv");

let data = await response.text();
let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0] === user && cols[1] === year && cols[2] === month){

let totalEarning = 0;
let totalDeduction = 0;

for(let j=3;j<=19;j++) totalEarning += (+cols[j] || 0);
for(let j=20;j<=35;j++) totalDeduction += (+cols[j] || 0);

let net = totalEarning - totalDeduction;

/* SAFE UI UPDATE */
let pdfBox = document.getElementById("pdfButtons");
if(pdfBox) pdfBox.style.display="flex";

document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML = `
<div class="salary-card">
<h3>Total Earnings: ₹ ${totalEarning}</h3>
</div>

<div class="salary-card">
<h3>Total Deduction: ₹ ${totalDeduction}</h3>
</div>

<div class="net-card">
Net Salary ₹ ${net}
</div>
`;

return;

}
}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found.";

}

function downloadPDF(){
alert("PDF working fine");
}

window.onload = loadSalary;

</script>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

</body>
</html>
