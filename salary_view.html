<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<title>Salary Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f3f4f9;
padding-bottom:100px;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#4b2dd8,#2400b7);
color:white;
padding:20px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.header-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.header-icon{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.download-btn{
background:linear-gradient(135deg,#7a5cff,#4b2dd8);
color:white;
padding:10px 14px;
border-radius:12px;
font-size:14px;
border:none;
}

/* SUMMARY CARD */
.summary-card{
margin:15px;
background:linear-gradient(135deg,#4b2dd8,#2400b7);
color:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.summary-main{
font-size:32px;
font-weight:bold;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

/* CARD */
.card{
background:white;
margin:15px;
border-radius:20px;
padding:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.card-title{
font-size:18px;
font-weight:bold;
color:#4b2dd8;
}

.badge{
background:#e6f7ec;
color:#1b8f4c;
padding:8px 12px;
border-radius:12px;
font-weight:bold;
}

.badge.red{
background:#ffe5e5;
color:#d32f2f;
}

/* LIST */
.list-row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.total-row{
margin-top:10px;
background:#e6f7ec;
padding:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

.total-row.red{
background:#ffe5e5;
}

/* NET */
.net-card{
margin:15px;
background:linear-gradient(135deg,#4b2dd8,#2400b7);
color:white;
padding:18px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">

<div class="header-row">

<div class="header-left">
<div class="header-icon">₹</div>
<div>
<h2 style="margin:0;">Monthly Salary</h2>
<div id="selectedInfo"></div>
</div>
</div>

<button class="download-btn" onclick="downloadPDF()">Download PDF</button>

</div>
</div>

<!-- SUMMARY -->
<div class="summary-card">
<div>Total Take Home</div>
<div class="summary-main" id="netAmount">₹ 0</div>

<div class="summary-row">
<div>Total Earnings</div>
<div id="totalE">₹ 0</div>
</div>

<div class="summary-row">
<div>Total Deductions</div>
<div id="totalD">₹ 0</div>
</div>
</div>

<div id="result"></div>

<div class="net-card">
<div>Net Take Home</div>
<div id="netBottom">₹ 0</div>
</div>

</div>



<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

function showRow(name,value){
if(value>0){
return name + " ₹" + value + "<br>";
}
return "";
}

async function loadSalary(){
document.getElementById("loader").style.display="flex";
let year = localStorage.getItem("selectedYear");
let month = localStorage.getItem("selectedMonth");

// ✅ FIX FORMAT
month = month.toString().padStart(2,"0");
let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

document.getElementById("selectedInfo").innerText =
names[month-1] + " " + year;

/* FIXED CSV URL */
let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await response.text();

let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0] === user && cols[1] === year && cols[2] === month){

let basic = +cols[3];
let dearness_pay = +cols[4];
let rouse_rent_allowances = +cols[5];
let city_compensation_allowances = +cols[6];
let personal_pay = +cols[7];
let special_personal_pay = +cols[8];
let conveyance_allowances = +cols[9];
let washing_allowances = +cols[10];
let sfta = +cols[11];
let special_locality_allowances = +cols[12];
let mwa = +cols[13];
let hill_allowances = +cols[14];
let charge_allowances = +cols[15];
let pension_contribution_14_percent = +cols[16];
let labour_welfare_fund_company_contribution = +cols[17];
let cash_duty_allowances = +cols[18];
let other_earnings = +cols[19];

let LIC = +cols[20];
let income_tax = +cols[21];
let professional_tax = +cols[22];
let KPTCL_employes_society = +cols[23];
let PLI = +cols[24];
let union_fund = +cols[25];
let sc_st_union_fund = +cols[26];
let house_rent = +cols[27];
let urban_bank = +cols[28];
let family_benefit_fund = +cols[29];
let festival_advance = +cols[30];
let PC_10_contribution = +cols[31];
let PC_14_contribution = +cols[32];
let LWF = +cols[33];
let recovery_any = +cols[34];
let other_deduction = +cols[35];

let totalEarning =
basic+dearness_pay+rouse_rent_allowances+city_compensation_allowances+
personal_pay+special_personal_pay+conveyance_allowances+washing_allowances+
sfta+special_locality_allowances+mwa+hill_allowances+charge_allowances+
pension_contribution_14_percent+labour_welfare_fund_company_contribution+
cash_duty_allowances+other_earnings;

let totalDeduction =
LIC+income_tax+professional_tax+KPTCL_employes_society+PLI+
union_fund+sc_st_union_fund+house_rent+urban_bank+family_benefit_fund+
festival_advance+PC_10_contribution+PC_14_contribution+LWF+
recovery_any+other_deduction;

let net = totalEarning-totalDeduction;

window.salaryData={
basic,dearness_pay,rouse_rent_allowances,city_compensation_allowances,
personal_pay,special_personal_pay,conveyance_allowances,washing_allowances,
sfta,special_locality_allowances,mwa,hill_allowances,charge_allowances,
pension_contribution_14_percent,labour_welfare_fund_company_contribution,
cash_duty_allowances,other_earnings,
LIC,income_tax,professional_tax,KPTCL_employes_society,PLI,union_fund,
sc_st_union_fund,house_rent,urban_bank,family_benefit_fund,festival_advance,
PC_10_contribution,PC_14_contribution,LWF,recovery_any,other_deduction,
totalEarning,totalDeduction,net
};

let s = window.salaryData;
document.getElementById("loader").style.display="none";
document.getElementById("pdfButtons").style.display="flex";

document.getElementById("netAmount").innerText = "₹ " + s.net;
document.getElementById("netBottom").innerText = "₹ " + s.net;
document.getElementById("totalE").innerText = "₹ " + s.totalEarning;
document.getElementById("totalD").innerText = "₹ " + s.totalDeduction;

document.getElementById("result").innerHTML = `

<div class="card">

<div class="card-header">
<div class="card-title">Earnings</div>
<div class="badge">₹ ${s.totalEarning}</div>
</div>

${s.basic>0?`<div class="list-row"><span>Basic</span><span>₹ ${s.basic}</span></div>`:''}
${s.dearness_pay>0?`<div class="list-row"><span>Dearness Pay</span><span>₹ ${s.dearness_pay}</span></div>`:''}
${s.rouse_rent_allowances>0?`<div class="list-row"><span>House Rent Allowance</span><span>₹ ${s.rouse_rent_allowances}</span></div>`:''}
${s.city_compensation_allowances>0?`<div class="list-row"><span>City Compensation</span><span>₹ ${s.city_compensation_allowances}</span></div>`:''}
${s.personal_pay>0?`<div class="list-row"><span>Personal Pay</span><span>₹ ${s.personal_pay}</span></div>`:''}
${s.special_personal_pay>0?`<div class="list-row"><span>Special Pay</span><span>₹ ${s.special_personal_pay}</span></div>`:''}

<div class="total-row">
<span>Total Earnings</span>
<span>₹ ${s.totalEarning}</span>
</div>

</div>

<div class="card">

<div class="card-header">
<div class="card-title">Deductions</div>
<div class="badge red">₹ ${s.totalDeduction}</div>
</div>

${s.LIC>0?`<div class="list-row"><span>LIC</span><span>₹ ${s.LIC}</span></div>`:''}
${s.income_tax>0?`<div class="list-row"><span>Income Tax</span><span>₹ ${s.income_tax}</span></div>`:''}

<div class="total-row red">
<span>Total Deduction</span>
<span>₹ ${s.totalDeduction}</span>
</div>

</div>
`;

return;

}

}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found.";
document.getElementById("pdfButtons").style.display="none";

}

function printSalary(){
let content=document.getElementById("result").innerHTML;

let win=window.open('', '', 'width=800,height=600');

win.document.write(`
<html>
<head>
<title>Print</title>
<style>
body{font-family:sans-serif;padding:20px;}
</style>
</head>
<body>
${content}
</body>
</html>
`);

win.document.close();

// ✅ IMPORTANT FIX
setTimeout(()=>{
win.print();
},500);
}

async function downloadPDF(){

let s = window.salaryData;

/* fetch employee details */

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
let data = await response.text();

let rows = data.trim().split("\n");

let empName = user;
let empDesignation = "";
let empPlace = "";

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0] === user){
empName = cols[1];
empDesignation = cols[2];
empPlace = cols[3];
break;
}

}

let year = localStorage.getItem("selectedYear");
let monthNum = localStorage.getItem("selectedMonth");

let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let month = names[monthNum-1];


/* row generator */

function pdfRow(name,value){
if(value>0){
return `
<tr>
<td style="padding:4px 6px">${name}</td>
<td style="text-align:right;padding:4px 6px">₹ ${value}</td>
</tr>`;
}
return "";
}

let pdfContent = `

<div style="font-family:sans-serif;padding:20px">

<div style="text-align:center">
<h2>HUBLI ELECTRICITY SUPPLY COMPANY LTD.</h2>
<h4>O & M Division, Sirsi</h4>

<div style="display:flex;justify-content:space-between;margin-top:10px">
<p><b>Name :</b> ${empName}</p>
<p><b>Designation :</b> ${empDesignation}</p>
</div>

<div style="display:flex;justify-content:space-between">
<p><b>Working Place :</b> ${empPlace}</p>
<p><b>Month :</b> ${month} ${year}</p>
</div>

<hr>
</div>

<table style="width:100%;border-collapse:collapse;margin-top:20px">

<tr>
<th style="background:#5e00a3;color:white;padding:8px">Earnings</th>
<th style="background:#5e00a3;color:white;padding:8px">Deductions</th>
</tr>

<tr>

<td style="padding:10px;border-right:1px solid #ddd;vertical-align:top">

<table style="width:100%;border-collapse:collapse;font-size:14px">

${pdfRow("Basic",s.basic)}
${pdfRow("Dearness Pay",s.dearness_pay)}
${pdfRow("House Rent Allowance",s.rouse_rent_allowances)}
${pdfRow("City Compensation Allowance",s.city_compensation_allowances)}
${pdfRow("Personal Pay",s.personal_pay)}
${pdfRow("Special Personal Pay",s.special_personal_pay)}
${pdfRow("Conveyance Allowance",s.conveyance_allowances)}
${pdfRow("Washing Allowance",s.washing_allowances)}
${pdfRow("SFTA",s.sfta)}
${pdfRow("Special Locality Allowance",s.special_locality_allowances)}
${pdfRow("MWA",s.mwa)}
${pdfRow("Hill Allowance",s.hill_allowances)}
${pdfRow("Charge Allowance",s.charge_allowances)}
${pdfRow("Pension Contribution",s.pension_contribution_14_percent)}
${pdfRow("LWF Company Contribution",s.labour_welfare_fund_company_contribution)}
${pdfRow("Cash Duty Allowance",s.cash_duty_allowances)}
${pdfRow("Other Earnings",s.other_earnings)}

<tr style="border-top:1px solid #000;font-weight:bold">
<td>Total Earnings</td>
<td style="text-align:right">₹ ${s.totalEarning}</td>
</tr>

</table>

</td>


<td style="padding:10px;vertical-align:top">

<table style="width:100%;border-collapse:collapse;font-size:14px">

${pdfRow("LIC",s.LIC)}
${pdfRow("Income Tax",s.income_tax)}
${pdfRow("Professional Tax",s.professional_tax)}
${pdfRow("KPTCL Employee Society",s.KPTCL_employes_society)}
${pdfRow("PLI",s.PLI)}
${pdfRow("Union Fund",s.union_fund)}
${pdfRow("SC/ST Union Fund",s.sc_st_union_fund)}
${pdfRow("House Rent",s.house_rent)}
${pdfRow("Urban Bank",s.urban_bank)}
${pdfRow("Family Benefit Fund",s.family_benefit_fund)}
${pdfRow("Festival Advance",s.festival_advance)}
${pdfRow("PC 10% Contribution",s.PC_10_contribution)}
${pdfRow("PC 14% Contribution",s.PC_14_contribution)}
${pdfRow("LWF",s.LWF)}
${pdfRow("Recovery",s.recovery_any)}
${pdfRow("Other Deduction",s.other_deduction)}

<tr style="border-top:1px solid #000;font-weight:bold">
<td>Total Deduction</td>
<td style="text-align:right">₹ ${s.totalDeduction}</td>
</tr>

</table>

</td>

</tr>

</table>

<hr style="margin-top:20px">

<div style="text-align:right;font-size:22px;font-weight:bold;margin-top:20px">
Net Salary : ₹ ${s.net}
</div>

</div>
`;

let div=document.createElement("div");
div.innerHTML=pdfContent;

let opt={
margin:0.8,
filename:'Salary.pdf',
image:{type:'jpeg',quality:0.98},
html2canvas:{scale:2},
pagebreak:{mode:['avoid-all','css','legacy']},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
};

html2pdf().set(opt).from(div).save();

}

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}
// ✅ AUTO LOAD WHEN PAGE OPENS
window.onload = function(){
loadSalary();
}
</script>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>
</body>
</html>
