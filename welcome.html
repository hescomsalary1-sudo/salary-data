<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome | Secure Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0062ff;
            --bg-start: #ffffff;
            --bg-end: #f0f4f8;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; 
            min-height: 100vh;
            width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Animated Background Glow */
        .bg-glow {
            position: fixed; top: -10%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(0, 98, 255, 0.05) 0%, transparent 70%);
            z-index: -1; filter: blur(80px);
        }

        .marquee {
            width: 100%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); padding: 14px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            overflow: hidden; flex-shrink: 0;
            z-index: 10;
        }
        .marquee-content {
            display: inline-block; white-space: nowrap;
            animation: marquee 30s linear infinite;
            color: var(--primary); font-size: 11px;
            font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-wrapper {
            flex: 1; display: flex; align-items: center;
            justify-content: center; padding: 25px;
        }

        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 50px 35px; border-radius: 35px;
            text-align: center; width: 100%; max-width: 420px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-box {
            width: 80px; height: 80px;
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px auto;
            font-size: 34px; color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.1);
            animation: float 4s ease-in-out infinite;
        }

        h1 { font-size: 2rem; margin: 0 0 12px 0; font-weight: 800; letter-spacing: -1px; }
        p { color: var(--text-muted); line-height: 1.6; font-size: 1rem; margin-bottom: 40px; }

        .btn-action {
            background: var(--text-dark); color: white; padding: 18px;
            border-radius: 18px; font-weight: 700; font-size: 16px;
            border: none; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; transition: all 0.3s ease;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }
        .btn-action:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 98, 255, 0.25); }
        .btn-action:disabled { opacity: 0.8; cursor: not-allowed; }

        .spinner-sm {
            width: 18px; height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="marquee">
        <div class="marquee-content">
            SECURITY PROTOCOL ACTIVE • AUTHORIZED ACCESS ONLY • GRIEVANCE DATABASE CONNECTED • REAL-TIME TRACKING ONLINE • ENCRYPTED SESSION •
        </div>
    </div>

    <div class="main-wrapper">
        <div class="hero-card">
            <div class="icon-box">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1>Secure Portal</h1>
            <p>Access your organizational dashboard to manage payroll details and report workplace grievances securely.</p>

            <button class="btn-action" id="enterBtn" onclick="initiateSystem()">
                <span id="enterTxt">INITIALIZE SYSTEM</span>
                <i class="fa-solid fa-chevron-right" id="enterIcon"></i>
                <div class="spinner-sm" id="enterSpin"></div>
            </button>
        </div>
    </div>

    <script>
        function initiateSystem() {
            const btn = document.getElementById('enterBtn');
            const icon = document.getElementById('enterIcon');
            const spin = document.getElementById('enterSpin');
            const txt = document.getElementById('enterTxt');

            // Button Loading State
            btn.disabled = true;
            icon.style.display = 'none';
            spin.style.display = 'block';
            txt.innerText = "AUTHENTICATING...";

            // Direct smooth navigation after simulated "security check"
            setTimeout(() => {
                window.location.href = 'home_grievance.html';
            }, 1200);
        }

        // Prevent accidental back-navigation loops
        history.pushState(null, null, location.href);
        window.onpopstate = () => { history.pushState(null, null, location.href); };
    </script>
</body>
</html>
