<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome | Nexus Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --accent: #10b981;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            min-height: 100vh;
            width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Status Bar */
        .status-bar {
            width: 100%;
            padding: 12px 25px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-dim);
            z-index: 100;
        }
        .live-indicator { display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Modern Glass Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 40px;
            text-align: center;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 5;
            animation: cardReveal 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 35px;
            font-size: 38px; color: white;
            box-shadow: 0 20px 40px var(--primary-glow);
            transform: rotate(-5deg);
            animation: iconFloat 6s ease-in-out infinite;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom right, #fff 50%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 45px;
            padding: 0 10px;
        }

        /* Advanced Button Action */
        .btn-launch {
            position: relative;
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 15px;
            border: none;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-launch:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .btn-launch:active { transform: scale(0.98); }

        .btn-launch:disabled { opacity: 0.7; cursor: wait; }

        /* Footer Info */
        .footer-note {
            position: absolute; bottom: 30px;
            font-size: 11px; color: var(--text-dim);
            letter-spacing: 2px; text-transform: uppercase;
            opacity: 0.5;
        }

        /* Animations */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes iconFloat { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        @keyframes cardReveal { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* Loading Spinner */
        .loader-ring {
            width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="status-bar">
        <div class="live-indicator"><div class="dot"></div> SYSTEM ONLINE</div>
        <div>V2.0.4 • ENCRYPTED</div>
    </div>

    <div class="main-container">
        <div class="glass-card">
            <div class="brand-icon">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h1>Grievance Portal</h1>
            <p>Smart Support for a Seamless Workplace</p>

            <button class="btn-launch" id="launchBtn" onclick="handleLaunch()">
                <span id="btnLabel">Establish Connection</span>
                <i class="fa-solid fa-arrow-right-long" id="btnIcon"></i>
                <div class="loader-ring" id="btnLoader"></div>
            </button>
        </div>

        <div class="footer-note">Organizational Integrity System</div>
    </div>

    <script>
        function handleLaunch() {
            const btn = document.getElementById('launchBtn');
            const label = document.getElementById('btnLabel');
            const icon = document.getElementById('btnIcon');
            const loader = document.getElementById('btnLoader');

            // Set loading state
            btn.disabled = true;
            label.innerText = "Connecting...";
            icon.style.display = "none";
            loader.style.display = "block";
            
            // Minimal haptic-like feel
            if (window.navigator.vibrate) window.navigator.vibrate(20);

            setTimeout(() => {
                window.location.href = 'home_grievance.html';
            }, 1400);
        }

        // Lock history to prevent accidental logout/back navigation
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.pushState(null, null, location.href);
        };
    </script>
</body>
</html>
