<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome | Secure Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0062ff;
            --bg-start: #ffffff;
            --bg-end: #f0f4f8;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; 
            min-height: 100vh;
            width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed; top: -10%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(0, 98, 255, 0.05) 0%, transparent 70%);
            z-index: -1; filter: blur(80px);
        }

        .marquee {
            width: 100%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); padding: 14px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            overflow: hidden; flex-shrink: 0;
            z-index: 10;
        }
        .marquee-content {
            display: inline-block; white-space: nowrap;
            animation: marquee 30s linear infinite;
            color: var(--primary); font-size: 11px;
            font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-wrapper {
            flex: 1; display: flex; align-items: center;
            justify-content: center; padding: 25px;
        }

        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px; border-radius: 35px;
            text-align: center; width: 100%; max-width: 420px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-box {
            width: 70px; height: 70px;
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px auto;
            font-size: 30px; color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.1);
            animation: float 4s ease-in-out infinite;
        }

        h1 { font-size: 1.8rem; margin: 0 0 10px 0; font-weight: 800; letter-spacing: -1px; }
        p { color: var(--text-muted); line-height: 1.5; font-size: 0.95rem; margin-bottom: 30px; }

        .btn-action {
            background: var(--text-dark); color: #fff; padding: 18px;
            border-radius: 18px; font-weight: 700; font-size: 15px;
            border: none; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .btn-action:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-action:disabled { opacity: 0.8; cursor: not-allowed; }

        /* Integrated Stats Styling */
        .stats-inline {
            display: none; /* Shown after initialization */
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }
        .stat-grid { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-item {
            flex: 1; background: white; padding: 15px 5px;
            border-radius: 20px; border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-num { font-size: 1.8rem; font-weight: 800; display: block; }
        .stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }

        .spinner-sm {
            width: 18px; height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="marquee">
        <div class="marquee-content">
            SECURITY PROTOCOL ACTIVE • AUTHORIZED ACCESS ONLY • GRIEVANCE DATABASE CONNECTED • REAL-TIME TRACKING ONLINE •
        </div>
    </div>

    <div class="main-wrapper">
        <div class="hero-card">
            <div class="icon-box">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1>Secure Portal</h1>
            <p>Authorized access to organizational grievance metrics and payroll management systems.</p>

            <button class="btn-action" id="initBtn" onclick="fetchData()">
                <span id="btnText">INITIALIZE SYSTEM</span>
                <i class="fa-solid fa-bolt" id="btnIcon"></i>
                <div class="spinner-sm" id="btnSpin"></div>
            </button>

            <div class="stats-inline" id="statsContainer">
                <div class="stat-grid">
                    <div class="stat-item" style="border-bottom: 3px solid #ff4d4d;">
                        <span class="stat-num" style="color: #ff4d4d;" id="pCount">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                    <div class="stat-item" style="border-bottom: 3px solid #00c853;">
                        <span class="stat-num" style="color: #00c853;" id="rCount">0</span>
                        <span class="stat-label">Resolved</span>
                    </div>
                </div>
                
                <button class="btn-action" style="background: var(--primary);" onclick="enterHome()">
                    CONTINUE TO HOME <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOqDDARIyXSnqaJth9fE2HSVGr7Vs1uYCEgYmX1gDIxxRcAoitVqed1HkqaLmK3SL2/exec";

        async function fetchData() {
            const btn = document.getElementById('initBtn');
            const icon = document.getElementById('btnIcon');
            const spin = document.getElementById('btnSpin');
            const txt = document.getElementById('btnText');

            // Button Loading State
            btn.disabled = true;
            icon.style.display = 'none';
            spin.style.display = 'block';
            txt.innerText = "AUTHENTICATING...";

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                const pending = data.filter(i => i.status !== 'Resolved').length;
                const resolved = data.filter(i => i.status === 'Resolved').length;

                document.getElementById('pCount').innerText = pending;
                document.getElementById('rCount').innerText = resolved;

                // Hide Init Button and Show Stats Inline
                btn.style.display = 'none';
                document.getElementById('statsContainer').style.display = 'block';
            } catch (error) {
                txt.innerText = "CONNECTION ERROR";
                btn.disabled = false;
                spin.style.display = 'none';
                icon.style.display = 'block';
            }
        }

        function enterHome() {
            window.location.href = 'home_grievance.html';
        }

        // Standard Back-interception
        history.pushState(null, null, location.href);
        window.onpopstate = () => { history.pushState(null, null, location.href); };
    </script>
</body>
</html>
