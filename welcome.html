<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Grievance Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2400b7;
            --accent: #00d4ff;
            --bg: #0b0f19;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- BACKGROUND EFFECTS --- */
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(36, 0, 183, 0.2) 0%, transparent 70%);
            z-index: -1; filter: blur(80px); animation: pulse 10s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.4); } }

        /* --- HERO CARD --- */
        .hero-card {
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(20px); padding: 50px;
            border-radius: 40px; text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        .main-icon { font-size: 70px; color: var(--accent); margin-bottom: 20px; display: block; }
        h1 { font-size: 2rem; margin: 10px 0; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }

        .btn-portal {
            background: #fff; color: #000; padding: 18px 40px;
            border-radius: 20px; font-weight: 800; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%;
            transition: 0.3s;
        }
        .btn-portal:hover { background: var(--accent); transform: translateY(-3px); }

        /* --- FULL SCREEN DASHBOARD POPUP --- */
        .overlay-summary {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(30px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; animation: fadeIn 0.5s ease;
        }

        .summary-content { text-align: center; width: 90%; max-width: 500px; }
        .summary-grid { display: flex; gap: 20px; margin: 40px 0; }
        .stat-box {
            flex: 1; background: var(--glass); border: 1px solid var(--border);
            padding: 30px 20px; border-radius: 25px;
        }
        .stat-box i { font-size: 30px; margin-bottom: 10px; }
        .stat-val { font-size: 2.5rem; font-weight: 800; display: block; }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .loading-dots { font-size: 20px; letter-spacing: 5px; color: var(--accent); }

        .btn-continue {
            background: var(--accent); color: #000; padding: 15px 50px;
            border-radius: 50px; font-weight: bold; border: none; cursor: pointer;
            text-decoration: none; display: inline-block; transition: 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .spin { animation: fa-spin 2s infinite linear; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="hero-card">
        <i class="fa-solid fa-fingerprint main-icon"></i>
        <h1>Security Portal</h1>
        <p>Your workspace, secured. Connect to the Grievance Redressal Ecosystem to track and manage organizational concerns.</p>

        <button class="btn-portal" onclick="showDashboard()">
            <span>ENTER SYSTEM</span>
            <i class="fa-solid fa-arrow-right-long"></i>
        </button>
    </div>

    <div id="summaryOverlay" class="overlay-summary">
        <div class="summary-content">
            <h2 style="font-size: 1.8rem; margin-bottom: 5px;">Portal Insights</h2>
            <p style="margin-top: 0;">Real-time Redressal Status Overview</p>

            <div id="loadingView">
                <i class="fa-solid fa-circle-notch spin" style="font-size: 40px; color: var(--accent);"></i>
                <p class="loading-dots">FETCHING DATA...</p>
            </div>

            <div id="dataView" style="display: none;">
                <div class="summary-grid">
                    <div class="stat-box" style="border-bottom: 4px solid #ef4444;">
                        <i class="fa-solid fa-clock-rotate-left" style="color: #ef4444;"></i>
                        <span class="stat-val" id="pendingCount">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                    <div class="stat-box" style="border-bottom: 4px solid #22c55e;">
                        <i class="fa-solid fa-circle-check" style="color: #22c55e;"></i>
                        <span class="stat-val" id="resolvedCount">0</span>
                        <span class="stat-label">Resolved</span>
                    </div>
                </div>
                <button class="btn-continue" onclick="window.location.href='grievance.html'">PROCEED TO PORTAL</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOqDDARIyXSnqaJth9fE2HSVGr7Vs1uYCEgYmX1gDIxxRcAoitVqed1HkqaLmK3SL2/exec"; // Use the same URL from your Grievance system

        async function showDashboard() {
            const overlay = document.getElementById('summaryOverlay');
            overlay.style.display = 'flex';

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                // Calculate Pending vs Resolved
                const pending = data.filter(item => item.status !== 'Resolved').length;
                const resolved = data.filter(item => item.status === 'Resolved').length;

                // Update UI
                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('resolvedCount').innerText = resolved;

                // Toggle Views
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('dataView').style.display = 'block';

            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('loadingView').innerHTML = `
                    <p style="color:#ef4444">Error connecting to server.</p>
                    <button class="btn-continue" onclick="location.reload()">Retry</button>
                `;
            }
        }
    </script>
</body>
</html>
