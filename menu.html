<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f3f5ff;
padding-bottom:90px;
}

/* HEADER */

.top{
padding:22px;
background:#4b2dd8;
color:white;
display:flex;
align-items:center;
gap:12px;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.top .icon{
width:38px;
height:38px;
background:white;
color:#4b2dd8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.top h2{
margin:0;
font-weight:600;
}

/* CONTENT */

.content{
padding:22px;
margin-top:15px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

/* CARD */

.card{
background:white;
padding:26px 10px;
border-radius:22px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border:1px solid rgba(0,0,0,0.04);
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

.card span{
font-size:34px;
}

.card p{
margin-top:10px;
color:#4b2dd8;
font-weight:600;
font-size:14px;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:#ffffff;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 15px rgba(0,0,0,0.1);
}

.footer a{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#4b2dd8;
font-size:20px;
}

.footer small{
font-size:11px;
margin-top:4px;
color:#4b2dd8;
font-weight:600;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<div class="icon">₹</div>
<h2>Salary Menu</h2>
</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<!-- CONTENT -->

<div class="content">

<div class="grid">

<div class="card" onclick="showLoader('salary.html')">
<span>💰</span>
<p>Salary</p>
</div>

<div class="card" onclick="showLoader('reports_menu.html')">
<span>📊</span>
<p>Reports</p>
</div>

<div class="card" onclick="showLoader('holidays.html')">
<span>🎉</span>
<p>Holiday List</p>
</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<a href="home.html">
<div>🏠</div>
<small>Home</small>
</a>

<a href="page1.html">
<div>👤</div>
<small>Profile</small>
</a>

<a href="menu.html">
<div>💰</div>
<small>Salary</small>
</a>

<a href="page3.html">
<div>📅</div>
<small>Attendance</small>
</a>

<a href="page4.html">
<div>⚙</div>
<small>Settings</small>
</a>

</div>

<script>

// LOGIN CHECK
let user = localStorage.getItem("currentUser");
if(!user){
window.location.replace("login.html");
}

// LOADER NAVIGATION
function showLoader(url){
document.getElementById("loader").style.display="flex";
setTimeout(function(){
window.location = url;
},700);
}

</script>

</body>
</html>
