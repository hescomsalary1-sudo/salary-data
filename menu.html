<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f3f5ff;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:22px;
background:#4b2dd8;
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.top-row{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:38px;
height:38px;
background:white;
color:#4b2dd8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.top h2{
margin:0;
font-weight:600;
}

.subtitle{
font-size:12px;
opacity:0.8;
margin-top:4px;
}

/* WELCOME CARD */
.welcome{
margin:20px;
padding:16px;
background:white;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
font-weight:600;
color:#4b2dd8;
}

/* CONTENT */
.content{
padding:10px 20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

/* CARD */
.card{
background:linear-gradient(135deg,#ffffff,#f1efff);
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:active{
transform:scale(0.96);
}

.circle{
width:55px;
height:55px;
border-radius:50%;
background:#4b2dd8;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
margin-bottom:8px;
box-shadow:0 6px 14px rgba(75,45,216,0.3);
}

.card p{
margin:0;
font-size:14px;
font-weight:600;
color:#4b2dd8;
}

/* ✅ SKELETON LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#f3f5ff;
display:none;
flex-direction:column;
padding:20px;
gap:15px;
z-index:99999;
}

/* shimmer */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:20px;
border-radius:6px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-circle{width:50px;height:50px;border-radius:50%;}
.skel-card{height:90px;border-radius:20px;}
.skel-line{height:14px;}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:#ffffff;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 15px rgba(0,0,0,0.1);
}

.footer a{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#4b2dd8;
font-size:20px;
}

.footer small{
font-size:11px;
margin-top:4px;
font-weight:600;
}

.info-card{
margin:20px;
padding:18px;
background:white;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.info-card h3{
margin:0;
color:#4b2dd8;
font-size:16px;
}

.info-card p{
margin-top:6px;
font-size:13px;
color:#555;
line-height:1.5;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<div class="top-row">
<div class="icon">₹</div>
<h2>Salary Menu</h2>
</div>
<div class="subtitle">Employee Salary Services</div>
</div>

<!-- INFO -->
<div class="info-card">
<h3>Salary Services</h3>
<p>
Access your salary information, generate detailed reports, and view the official holiday list. 
</p>
</div>

<!-- ✅ SKELETON LOADER -->
<div id="loader">

<div style="display:flex;align-items:center;gap:10px;">
<div class="skeleton skel-circle"></div>
<div style="flex:1;">
<div class="skeleton skel-line" style="width:60%;margin-bottom:6px;"></div>
<div class="skeleton skel-line" style="width:40%;"></div>
</div>
</div>

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
</div>

</div>

<!-- CONTENT -->
<div class="content">
<div class="grid">

<div class="card" onclick="showLoader('salary.html')">
<div class="circle">💰</div>
<p>Salary</p>
</div>

<div class="card" onclick="showLoader('reports_menu.html')">
<div class="circle">📊</div>
<p>Reports</p>
</div>

<div class="card" onclick="showLoader('holidays.html')">
<div class="circle">🎉</div>
<p>Holiday List</p>
</div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html"><div>🏠</div><small>Home</small></a>
<a href="page1.html"><div>👤</div><small>Profile</small></a>
<a href="menu.html"><div>💰</div><small>Salary</small></a>
<a href="page3.html"><div>📅</div><small>Attendance</small></a>
<a href="page4.html"><div>⚙</div><small>Settings</small></a>
</div>

<script>

// LOGIN CHECK
let user = localStorage.getItem("currentUser");
if(!user){
window.location.replace("login.html");
}

// LOADER NAVIGATION
function showLoader(url){
document.getElementById("loader").style.display="flex";
document.body.style.overflow="hidden";

setTimeout(function(){
window.location = url;
},700);
}

// hide loader after load
window.onload=function(){
document.getElementById("loader").style.display="none";
document.body.style.overflow="auto";
};

</script>

</body>
</html>
