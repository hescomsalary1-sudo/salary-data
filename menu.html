<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
}

/* HEADER */
.top{
padding:18px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* OVERVIEW CARD */
.overview{
margin:12px;
padding:15px;
background:white;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.overview h3{
margin:0;
color:#4b2dd8;
}

.overview p{
margin:6px 0 0;
font-size:18px;
font-weight:bold;
}

/* CHART */
.chart-card{
margin:12px;
padding:15px;
background:white;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
position:relative;
}

.chart{
height:160px;
display:flex;
align-items:flex-end;
justify-content:space-around;
position:relative;
}

/* BAR */
.bar{
width:18%;
background:linear-gradient(180deg,#9fd3ff,#0052cc);
border-radius:6px;
}

/* SVG */
svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

circle{
fill:white;
stroke:#f4a300;
stroke-width:2;
}

/* COIN */
.coin{
position:absolute;
top:-10px;
right:10px;
background:#f4a300;
color:white;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* SKELETON */
.skeleton{
animation:shimmer 1.2s infinite linear;
background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
background-size:200% 100%;
border-radius:10px;
}

@keyframes shimmer{
0%{background-position:-200%}
100%{background-position:200%}
}

/* BUTTONS */
.content{
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
cursor:pointer;
}

.circle{
width:45px;
height:45px;
background:#4b2dd8;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:6px;
}

</style>
</head>

<body>

<div class="top">
<h2>Salary Menu</h2>
</div>

<!-- SALARY OVERVIEW -->
<div class="overview">
<h3>Net Salary</h3>
<p id="netSalary">Loading...</p>
</div>

<!-- CHART -->
<div class="chart-card">

<div id="chart" class="chart skeleton"></div>
<div class="coin">₹</div>

</div>

<!-- BUTTONS -->
<div class="content">
<div class="grid">

<div class="card" onclick="showLoader('salary.html')">
<div class="circle">💰</div>
<p>Salary</p>
</div>

<div class="card" onclick="showLoader('reports_menu.html')">
<div class="circle">📊</div>
<p>Reports</p>
</div>

<div class="card" onclick="showLoader('holidays.html')">
<div class="circle">🎉</div>
<p>Holiday List</p>
</div>

</div>
</div>

<script>

fetch("salary.csv")
.then(res => res.text())
.then(data => {

let rows = data.trim().split("\n").slice(1);

let monthly = {};
let lastNet = 0;

rows.forEach(r=>{
let cols = r.split(",");

let month = cols[2];

// earnings
let earnings = 0;
for(let i=3;i<=19;i++){
earnings += Number(cols[i]) || 0;
}

// deductions
let deductions = 0;
for(let i=20;i<cols.length;i++){
deductions += Number(cols[i]) || 0;
}

let net = earnings - deductions;

monthly[month] = net;
lastNet = net;
});

// show net salary
document.getElementById("netSalary").innerText = "₹ " + lastNet;

// CHART
let chart = document.getElementById("chart");
chart.classList.remove("skeleton");

let values = Object.values(monthly);
let max = Math.max(...values);

values.forEach((v)=>{
let bar = document.createElement("div");
bar.className="bar";
bar.style.height = (v/max*100)+"%";
chart.appendChild(bar);
});

// SVG LINE
let svg = document.createElementNS("http://www.w3.org/2000/svg","svg");

let poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");

let points = values.map((v,i)=>{
let x = (i/(values.length-1))*100;
let y = 100-(v/max*100);
return `${x},${y}`;
}).join(" ");

poly.setAttribute("points",points);
poly.setAttribute("fill","none");
poly.setAttribute("stroke","#f4a300");
poly.setAttribute("stroke-width","2");

svg.appendChild(poly);
chart.appendChild(svg);

});

function showLoader(url){
window.location = url;
}

</script>

</body>
</html>
