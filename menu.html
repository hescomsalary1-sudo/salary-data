<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

.title{
padding:18px;
font-size:22px;
font-weight:600;
}

.top{
display:grid;
gap:12px;
padding:0 12px;
}

.card{
background:#eef2f7;
border-radius:15px;
padding:12px;
box-shadow:6px 6px 15px rgba(0,0,0,0.08);
position:relative;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
padding:10px;
background:#e9edf4;
border-radius:10px;
}

.box p{margin:4px 0 0;font-weight:bold;}

.net{
margin-top:10px;
padding:10px;
background:#e9edf4;
border-radius:10px;
}

.float{
position:absolute;
left:50%;
top:60%;
transform:translate(-50%,-50%);
width:40px;height:40px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.chart{
height:150px;
display:flex;
align-items:flex-end;
justify-content:space-around;
position:relative;
}

.bar{
width:18%;
background:#4b2dd8;
border-radius:6px;
}

.line{
position:absolute;
width:100%;
height:100%;
}

.coin{
position:absolute;
top:-10px;
right:10px;
background:#f4a300;
color:white;
width:40px;height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.skeleton{
background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
background-size:200%;
animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
0%{background-position:-200%}
100%{background-position:200%}
}

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.btn{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
}

</style>
</head>

<body>

<div class="title">Salary Overview</div>

<div class="top">

<div class="card">
<div class="grid2">
<div class="box">
<h4>Current Salary</h4>
<p id="currentSalary">₹ 0</p>
</div>
<div class="box">
<h4>Deductions</h4>
<p id="deduction">₹ 0</p>
</div>
</div>

<div class="net">
<h4>Net Salary</h4>
<p id="netSalary">₹ 0</p>
</div>

<div class="float">₹</div>
</div>

<div class="card">
<div class="chart" id="chart"></div>
<div class="coin">₹</div>
</div>

</div>

<div class="buttons">
<div class="btn">Salary</div>
<div class="btn">Reports</div>
<div class="btn">Holiday</div>
<div class="btn">Details</div>
</div>

<script>

let user = localStorage.getItem("currentUser") || "demo";

// 🔥 FALLBACK DATA (always shows something)
let monthly = {
Jan:50000, Feb:52000, Mar:54000, Apr:56000
};

// TRY CSV LOAD
fetch("salary.csv")
.then(res => res.text())
.then(data => {

let rows = data.trim().split("\n").slice(1);

let temp = {};
let last = null;

rows.forEach(r=>{
let cols = r.split(",");

if(cols[0] !== user) return;

let month = cols[2];

// earnings
let earnings = 0;
for(let i=3;i<=19;i++){
earnings += Number(cols[i])||0;
}

// deductions
let deductions = 0;
for(let i=20;i<cols.length;i++){
deductions += Number(cols[i])||0;
}

let net = earnings - deductions;

temp[month] = net;
last = {earnings,deductions,net};
});

if(Object.keys(temp).length > 0){
monthly = temp;
document.getElementById("currentSalary").innerText = "₹ "+last.earnings;
document.getElementById("deduction").innerText = "₹ "+last.deductions;
document.getElementById("netSalary").innerText = "₹ "+last.net;
}

})
.catch(()=>{
console.log("CSV load failed → using demo data");
});

// DRAW CHART (always runs)
setTimeout(drawChart,300);

function drawChart(){

let chart = document.getElementById("chart");
chart.innerHTML = "";

let values = Object.values(monthly);
let max = Math.max(...values);

values.forEach(v=>{
let bar = document.createElement("div");
bar.className="bar";
bar.style.height = (v/max*100)+"%";
chart.appendChild(bar);
});

// SVG
let svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
svg.setAttribute("class","line");

let points = values.map((v,i)=>{
let x = (i/(values.length-1))*100;
let y = 100-(v/max*100);
return `${x},${y}`;
}).join(" ");

let poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");
poly.setAttribute("points",points);
poly.setAttribute("fill","none");
poly.setAttribute("stroke","#f4a300");
poly.setAttribute("stroke-width","2");

svg.appendChild(poly);
chart.appendChild(svg);

}

</script>

</body>
</html>
