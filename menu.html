<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:22px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.top-row{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:38px;
height:38px;
background:white;
color:#2400b7;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

/* CONTENT */
.content{
padding:10px 20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

/* CARD */
.card{
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
}

.circle{
width:55px;
height:55px;
border-radius:50%;
background:#4b2dd8;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
margin-bottom:8px;
}

/* DASHBOARD */

.salary-dashboard{
margin:20px 0;
padding:20px;
background:linear-gradient(135deg,#ffffff,#f4f6ff);
border-radius:24px;
box-shadow:0 12px 30px rgba(0,0,0,0.12);
text-align:center;
}

/* GRAPH */
#miniChart{
height:130px !important;
margin-bottom:15px;
}

/* DONUT */
.donut-big{
width:140px;
height:140px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.donut-center{
width:95px;
height:95px;
background:white;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.donut-center span{
font-size:20px;
font-weight:bold;
color:#2400b7;
}

.donut-center p{
font-size:12px;
margin:0;
color:#777;
}

</style>
</head>

<body>

<div class="top">
<div class="top-row">
<div class="icon">₹</div>
<h2>Salary Menu</h2>
</div>
</div>

<div class="content">

<div class="grid">

<div class="card"><div class="circle">💰</div><p>Salary</p></div>
<div class="card"><div class="circle">📊</div><p>Reports</p></div>
<div class="card"><div class="circle">🎉</div><p>Holiday</p></div>

</div>

<!-- DASHBOARD -->
<div class="salary-dashboard">

<canvas id="miniChart"></canvas>

<div class="donut-big" id="salaryDonut">
<div class="donut-center">
<span id="perfText">0%</span>
<p>Growth</p>
</div>
</div>

</div>

</div>

<script>

async function loadSalaryDashboard(){

let user = localStorage.getItem("currentUser");
if(!user) return;

user = user.trim().toLowerCase(); // FIX

let res = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/salary.csv?v=" + new Date().getTime()
);

let text = await res.text();
let rows = text.trim().split("\n");

let months=[];
let netSalary=[];

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let csvUser = cols[0]?.trim().toLowerCase();

if(csvUser === user){

let month = cols[2].padStart(2,"0");

// earnings
let earning=0;
for(let j=3;j<=19;j++){
earning += +cols[j] || 0;
}

// deduction
let deduction=0;
for(let j=20;j<=35;j++){
deduction += +cols[j] || 0;
}

let net = earning - deduction;

months.push(month);
netSalary.push(net);

}

}

// DEBUG
console.log(months, netSalary);

// NO DATA
if(netSalary.length < 1){
document.getElementById("perfText").innerText="0%";
return;
}

// SORT
let combined = months.map((m,i)=>({m,n:netSalary[i]}));
combined.sort((a,b)=>a.m - b.m);

months = combined.map(x=>x.m);
netSalary = combined.map(x=>x.n);

// GRAPH
let ctx = document.getElementById("miniChart").getContext("2d");

let gradient = ctx.createLinearGradient(0,0,0,120);
gradient.addColorStop(0,"rgba(36,0,183,0.4)");
gradient.addColorStop(1,"rgba(36,0,183,0)");

new Chart(ctx,{
type:"line",
data:{
labels:months,
datasets:[{
data:netSalary,
borderColor:"#2400b7",
backgroundColor:gradient,
fill:true,
tension:0.5,
pointRadius:4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});

// GROWTH
let last = netSalary[netSalary.length-1];
let prev = netSalary.length>1 ? netSalary[netSalary.length-2] : last;

let growth = 0;

if(prev>0){
growth = Math.round(((last-prev)/prev)*100);
}

// LIMIT
if(growth>100) growth=100;
if(growth<-100) growth=-100;

// TEXT
document.getElementById("perfText").innerText = growth + "%";

// COLOR
let color="#4caf50";

if(growth<0) color="#f44336";
else if(growth<10) color="#ffc107";

// DONUT
let value = Math.min(Math.abs(growth),100);

document.getElementById("salaryDonut").style.background =
`conic-gradient(${color} ${value}%, #e6e6e6 0%)`;

}

loadSalaryDashboard();

</script>

</body>
</html>
