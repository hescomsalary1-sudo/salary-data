<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>

/* --- SAME YOUR CSS (NO CHANGE) --- */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.content{
  animation: slideUp 0.4s ease;
}

/* TITLE */
.title{
padding:70px 15px 8px; /* top increased */
font-size:22px;
font-weight:600;
color:#2d3748;
}
/* MOBILE TOP */
.top{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:0 12px;
  background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
}


/* CARD */
.card{
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
border-radius:18px;
padding:14px;
box-shadow:
8px 8px 20px rgba(0,0,0,0.08),
-8px -8px 20px rgba(255,255,255,0.9);
position:relative;
}

/* SALARY */
/* 🔥 MODERN SALARY CARDS */

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px; /* smaller gap */
}

.box{
padding:8px;
border-radius:14px;
background:linear-gradient(145deg,#ffffff,#e6ebf3);
box-shadow:
4px 4px 10px rgba(0,0,0,0.08),
-4px -4px 10px rgba(255,255,255,0.9);
transition:0.2s;
}

.box h4{
margin:0;
font-size:11px;
color:#6b7280;
}

.box p{
margin:3px 0 0;
font-size:15px; /* smaller */
font-weight:600;
}

/* NET CARD (highlight) */
.net{
margin-top:8px;
padding:10px;
border-radius:14px;
background:linear-gradient(135deg, #2400b7, #3b1eff);
color:white;
text-align:center;
box-shadow:0 6px 15px rgba(0,82,204,0.3);
}

.net h4{
margin:0;
font-size:12px;
opacity:0.9;
}

.net p{
margin:4px 0 0;
font-size:18px;
font-weight:700;
}

/* FLOAT */
.float{
position:absolute;
left:50%;
top:58%;
transform:translate(-50%,-50%);
width:45px;
height:45px;
border-radius:50%;
background:#eef2f7;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#2b6cb0;
box-shadow:
6px 6px 14px rgba(0,0,0,0.15),
-6px -6px 14px rgba(255,255,255,0.9);
}

/* CHART */
.chart{
position:relative;
height:160px;
display:flex;
align-items:flex-end;
justify-content:space-between; /* better spacing */
gap:6px; /* ✅ add gap */
padding:0 5px; /* small side spacing */
}

/* BAR */
.bar{
width:10px;
border-radius:8px;
background:green;
}

/* SVG */
.line{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.line circle{
fill:white;
stroke:#f4a300;
stroke-width:2;
}

/* COIN */
.coin{
position:absolute;
top:-8px;
right:10px;
width:45px;
height:45px;
border-radius:50%;
background:linear-gradient(145deg,#ffd54f,#f4a300);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
}

/* BUTTONS */
/* 🔥 MODERN BUTTONS */

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:15px 12px;
}

.btn{
position:relative;
padding:14px;
border-radius:20px;
background:linear-gradient(145deg,#ffffff,#e6ebf3);
box-shadow:
6px 6px 16px rgba(0,0,0,0.08),
-6px -6px 16px rgba(255,255,255,0.9);
text-align:center;
cursor:pointer;
transition:all 0.25s ease;
overflow:hidden;
}

/* ICON CIRCLE */
.icon{
width:50px;
height:50px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:8px;
font-size:20px;
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* GRADIENT COLORS */
.blue-bg{background:linear-gradient(135deg,#4facfe,#0052cc);}
.purple-bg{background:linear-gradient(135deg,#a18cd1,#6b46c1);}
.orange-bg{background:linear-gradient(135deg,#f6ad55,#dd6b20);}
.green-bg{background:linear-gradient(135deg,#48bb78,#2f855a);}

/* TEXT */
.btn p{
margin:0;
font-size:13px;
font-weight:600;
color:#2d3748;
}

/* HOVER EFFECT */
.btn:active{
transform:scale(0.95);
box-shadow:inset 4px 4px 10px rgba(0,0,0,0.1),
           inset -4px -4px 10px rgba(255,255,255,0.8);
}

/* LIGHT SHINE EFFECT */
.btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:0.5s;
}

.btn:hover::before{
left:100%;
}

/* SKELETON */
#loader {
    position: fixed;
    top: 85px;  /* Below Fixed Header */
    bottom: 70px; /* Above Fixed Footer */
    left: 0;
    width: 100%;
    background: rgba(243, 244, 250, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 900;
}

/* FLUID ORBIT DESIGN */
.fluid-loader {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.orbit {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #2400b7;
    border-bottom-color: #00c9a7;
    animation: rotate-orbit 1.5s linear infinite;
}

.orbit:nth-child(2) {
    width: 70%;
    height: 70%;
    border-top-color: #6a5cff;
    border-bottom-color: #ff4e8a;
    animation-duration: 1s;
    animation-direction: reverse;
}

.orbit:nth-child(3) {
    width: 40%;
    height: 40%;
    border-top-color: #00e0b8;
    border-bottom-color: #2400b7;
    animation-duration: 2s;
}

.core {
    width: 15px;
    height: 15px;
    background: #2400b7;
    border-radius: 50%;
    box-shadow: 0 0 15px #2400b7, 0 0 30px #00c9a7;
    animation: pulse-core 1.5s ease-in-out infinite;
}

/* TEXT STYLE */
.loader-text {
    margin-top: 30px;
    font-weight: 700;
    color: #2400b7;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
}

/* ANIMATIONS */
@keyframes rotate-orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes pulse-core {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.3); opacity: 1; }
}


@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:20px;
border-radius:6px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-big{height:80px;border-radius:20px;}
.skel-circle{width:55px;height:55px;border-radius:50%;}
.skel-line{height:15px;}
.skel-card{height:90px;border-radius:20px;}

 .chart-title{
margin:0 0 10px;
font-size:16px;
font-weight:600;
color:#2d3748;
text-align:center;
letter-spacing:0.5px;
} 


   /* BACK BUTTON (FLOATING STYLE) */

.back-btn{
position:fixed;
top:15px;
left:12px;
width:42px;
height:42px;
border-radius:50%;
background:rgba(255,255,255,0.9);
backdrop-filter: blur(8px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
z-index:999;
transition:0.25s;
}

.back-btn:hover{
transform:scale(1.1);
background:white;
}

.back-btn svg{
transition:0.2s;
}

.back-btn:hover svg{
transform:translateX(-2px);
} 

  .header{
display:flex;
align-items:center;
gap:12px;
padding:15px 12px;
position:sticky;
top:0;
z-index:999;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

/* remove fixed from back button */
.back-btn{
position:relative;
top:0;
left:0;
width:40px;
height:40px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* adjust title */
.title{
padding:0;
font-size:20px;
font-weight:600;
}
</style>
</head>

<body>
<!-- BACK BUTTON -->
<div class="header">
  
  <div class="back-btn" onclick="goBack()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M15 18L9 12L15 6"
        stroke="#2400b7"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="title">Salary Overview</div>

</div>
<!-- ✅ SKELETON CONTENT ADDED -->
<div id="loader">
    <div class="fluid-loader">
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="core"></div>
    </div>
    <div class="loader-text">Syncing Secure Data...</div>
</div>



<div class="top">

<div class="card">
<div class="grid2">
<div class="box">
<h4>Last Month Salary</h4>
<p class="blue" id="currentSalary">Loading...</p>
</div>

<div class="box">
<h4>Deductions</h4>
<p class="red" id="deduction">Loading...</p>
</div>
</div>

<div class="net">
<h4>Net Salary:</h4>
<p class="green" id="netSalary" style="font-size:22px;">Loading...</p>
</div>


</div>

<div class="card">
<h3 class="chart-title">Salary Growth</h3>
<div style="display:flex;">

<!-- Y AXIS -->
<div id="yAxis" style="width:40px;font-size:10px;color:#6b7280;"></div>

<!-- CHART AREA -->
<div style="flex:1;">
<div class="chart" id="chart">
<svg class="line" id="line"></svg>

</div>

<!-- X AXIS -->
<div id="xAxis" style="display:flex;justify-content:space-around;font-size:10px;color:#6b7280;margin-top:4px;"></div>
</div>

</div>

</div>

</div>

<div class="buttons">

<div class="btn" onclick="showLoader('salary.html')">
<div class="icon blue-bg">💰</div>
<p>Salary</p>
</div>

<div class="btn" onclick="showLoader('reports_menu.html')">
<div class="icon purple-bg">📊</div>
<p>Reports</p>
</div>

<div class="btn" onclick="showLoader('holidays.html')">
<div class="icon orange-bg">📅</div>
<p>Holiday List</p>
</div>

<div class="btn" onclick="showLoader('assets_liability.html')">
<div class="icon green-bg">📄</div>
<p>Assets and Liabilities</p>
</div>

</div>

<script>

let user = localStorage.getItem("currentUser");

// show loader on page load
document.getElementById("loader").style.display="flex";

// FIXED URL
let url = "https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv";

function showLoader(url){
document.getElementById("loader").style.display="flex";
setTimeout(()=>{ window.location=url },800);
}

fetch(url)
.then(res => res.text())
.then(data => {

let rows = data.trim().split("\n").slice(1);

let monthly = [];

rows.forEach(r=>{
let cols = r.split(",");

if(cols[0] !== user) return;

let year = Number(cols[1]);
let month = Number(cols[2]);

let earnings = 0;
for(let i=3;i<=19;i++){
earnings += Number(cols[i]) || 0;
}

let deductions = 0;
for(let i=20;i<cols.length;i++){
deductions += Number(cols[i])||0;
}

let net = earnings - deductions;

monthly.push({year,month,net,earnings,deductions});
});

monthly.sort((a,b)=>a.year-b.year||a.month-b.month);

// sort properly
monthly.sort((a,b)=>{
return (a.year*100 + a.month) - (b.year*100 + b.month);
});

// ✅ get previous month
let last = null;

if(monthly.length >= 2){
last = monthly[monthly.length - 2]; // previous month
}else if(monthly.length === 1){
last = monthly[0]; // fallback
}

if(last){
document.getElementById("currentSalary").innerText="₹ "+last.earnings;
document.getElementById("deduction").innerText="₹ "+last.deductions;
document.getElementById("netSalary").innerText="₹ "+last.net;
}

let chart=document.getElementById("chart");
chart.querySelectorAll(".bar").forEach(b=>b.remove());
document.getElementById("line").innerHTML="";

let last12 = monthly.slice(-12);
let values = last12.map(m=>m.net);
let months = last12.map(m=>m.month);
let years = last12.map(m=>m.year);
            // ✅ AXIS ADD

let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* Y AXIS */
let step = 25000;

let maxVal = Math.max(...values);
let yMax = Math.ceil(maxVal/step)*step;

let yAxis=document.getElementById("yAxis");
yAxis.innerHTML="";

for(let i=yMax;i>=0;i-=step){
let d=document.createElement("div");
d.style.height = (160 / (yMax/step)) + "px";
d.innerText=(i/1000)+"K";
yAxis.appendChild(d);
}

yAxis.style.display = "flex";
yAxis.style.flexDirection = "column";
yAxis.style.justifyContent = "space-between";

/* X AXIS */
let xAxis=document.getElementById("xAxis");
xAxis.innerHTML="";

months.forEach((m,i)=>{
let d=document.createElement("div");

// ✅ Month + Year
d.innerHTML = names[m-1] + "<br>" + years[i];
d.style.textAlign = "center";
d.style.fontSize = "9px";

// optional: make it smaller
d.style.textAlign="center";
d.style.fontSize="9px";

xAxis.appendChild(d);
});

let max=Math.max(...values);


values.forEach(v=>{
let bar=document.createElement("div");
bar.className="bar";
bar.style.height=(v/yMax)*100+"%";
chart.appendChild(bar);
});

let svg=document.getElementById("line");

let points=values.map((v,i)=>{
let x=(i/(values.length-1))*280+10;
let y = 140 - (v / yMax) * 120;
return `${x},${y}`;
}).join(" ");

let poly=document.createElementNS("http://www.w3.org/2000/svg","polyline");
poly.setAttribute("points",points);
poly.setAttribute("fill","none");
poly.setAttribute("stroke","#f4a300");
poly.setAttribute("stroke-width","2");

svg.appendChild(poly);

// hide loader
document.getElementById("loader").style.display="none";

});
function goBack(){
  window.history.back();
}

   function navigateSmooth(url){
  document.getElementById("loader").style.display="flex";
  setTimeout(()=>{
    window.location.href = url;
  },500);
}

  function refreshApp(){
    // Show the "Middle" loader
    document.getElementById("loader").style.display = "flex";
    
    // Optional: add a slight fade to the content area only
    document.querySelector('.content').style.opacity = "0.4";

    setTimeout(function(){
        location.reload(true);
    }, 1000);
}
</script>

</body>
</html>
