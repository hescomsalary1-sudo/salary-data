<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Overview</title>
    <style>
        :root {
            --primary: #4b2dd8;
            --primary-dark: #2400b7;
            --accent: #9b6dff;
            --bg-body: #f8faff;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #718096;
            --border-light: rgba(226, 232, 240, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* PREMIUM BLOOM ENTRANCE */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-body);
            z-index: 999999;
            pointer-events: none;
            animation: bloomReveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes bloomReveal {
            0% { clip-path: circle(0% at 50% 50%); }
            100% { clip-path: circle(150% at 50% 50%); }
        }

        /* TITLE SECTION */
        .title {
            padding: 85px 20px 15px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* BACK BUTTON */
        .back-btn {
            position: fixed;
            top: 18px;
            left: 18px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-light);
            z-index: 1000;
            transition: 0.3s;
        }

        .back-btn:active { transform: scale(0.9); }

        /* CONTAINERS */
        .top {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border-light);
            box-shadow: 0 10px 30px rgba(75, 45, 216, 0.04);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SALARY DATA DISPLAY */
        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .box {
            padding: 15px;
            border-radius: 18px;
            background: #f1f3ff;
            border: 1px solid rgba(75, 45, 216, 0.05);
        }

        .box h4 { margin: 0; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .box p { margin: 5px 0 0; font-size: 16px; font-weight: 700; color: var(--primary-dark); }

        .net {
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(36, 0, 183, 0.2);
        }

        .net h4 { margin: 0; font-size: 12px; opacity: 0.8; }
        .net p { margin: 8px 0 0; font-size: 26px; font-weight: 800; }

        /* CHART */
        .chart-title { margin: 0 0 15px; font-size: 16px; font-weight: 700; color: var(--primary-dark); }
        .chart {
            position: relative;
            height: 160px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
        }

        .bar {
            width: 10px;
            border-radius: 5px 5px 0 0;
            background: var(--primary);
            opacity: 0.15;
        }

        .line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* BUTTONS */
        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 25px 16px;
        }

        .btn {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .btn:active { transform: scale(0.95); }

        .icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .blue-bg { background: #f1f3ff; color: var(--primary); }
        .purple-bg { background: #f7f1ff; color: #8a3ffc; }
        .orange-bg { background: #fff7ed; color: #f97316; }
        .green-bg { background: #f0fdf4; color: #22c55e; }

        .btn p { margin: 0; font-size: 14px; font-weight: 700; color: var(--primary-dark); }

        /* SKELETON LOADER */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-body);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 9999999;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f2f5 25%, #e2e8f0 50%, #f0f2f5 75%);
            background-size: 400px 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="skeleton" style="width: 50%; height: 30px; margin-top: 60px;"></div>
    <div class="skeleton" style="height: 180px; border-radius: 24px;"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="skeleton" style="height: 120px; border-radius: 24px;"></div>
        <div class="skeleton" style="height: 120px; border-radius: 24px;"></div>
    </div>
</div>

<div class="back-btn" onclick="goBack()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="var(--primary-dark)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</div>

<div class="title">Salary Overview</div>

<div class="top">
    <div class="card" style="animation-delay: 0.1s;">
        <div class="grid2">
            <div class="box">
                <h4>Last Earnings</h4>
                <p id="currentSalary">₹ 0</p>
            </div>
            <div class="box">
                <h4>Deductions</h4>
                <p id="deduction" style="color: #ef4444;">₹ 0</p>
            </div>
        </div>
        <div class="net">
            <h4>Net Salary Disbursed</h4>
            <p id="netSalary">₹ 0</p>
        </div>
    </div>

    <div class="card" style="animation-delay: 0.2s;">
        <h3 class="chart-title">Salary Growth</h3>
        <div style="display:flex;">
            <div id="yAxis" style="width:40px; font-size:9px; color:var(--text-muted); font-weight:bold; display:flex; flex-direction:column; justify-content:space-between;"></div>
            <div style="flex:1;">
                <div class="chart" id="chart">
                    <svg class="line" id="line"></svg>
                </div>
                <div id="xAxis" style="display:flex; justify-content:space-around; font-size:9px; color:var(--text-muted); margin-top:10px;"></div>
            </div>
        </div>
    </div>
</div>

<div class="buttons">
    <div class="btn" style="animation-delay: 0.3s;" onclick="showLoader('salary.html')">
        <div class="icon blue-bg">💰</div>
        <p>Salary Slip</p>
    </div>
    <div class="btn" style="animation-delay: 0.4s;" onclick="showLoader('reports_menu.html')">
        <div class="icon purple-bg">📊</div>
        <p>Reports</p>
    </div>
    <div class="btn" style="animation-delay: 0.5s;" onclick="showLoader('holidays.html')">
        <div class="icon orange-bg">📅</div>
        <p>Holiday List</p>
    </div>
    <div class="btn" style="animation-delay: 0.6s;" onclick="showLoader('assets_liability.html')">
        <div class="icon green-bg">📄</div>
        <p>Assets & Liab.</p>
    </div>
</div>

<script>
    const user = localStorage.getItem("currentUser") || "";
    const url = "https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv";

    function showLoader(nextUrl) {
        document.getElementById("loader").style.display = "flex";
        setTimeout(() => { window.location = nextUrl }, 800);
    }

    function goBack() { window.history.back(); }

    fetch(url)
        .then(res => res.text())
        .then(data => {
            const rows = data.trim().split("\n").slice(1);
            let monthly = [];

            rows.forEach(r => {
                const cols = r.split(",");
                if (cols[0].trim() !== user.trim()) return;

                let earnings = 0;
                for (let i = 3; i <= 19; i++) { earnings += Number(cols[i]) || 0; }
                let deductions = 0;
                for (let i = 20; i < cols.length; i++) { deductions += Number(cols[i]) || 0; }
                
                monthly.push({
                    year: Number(cols[1]),
                    month: Number(cols[2]),
                    earnings,
                    deductions,
                    net: earnings - deductions
                });
            });

            if (monthly.length === 0) {
                document.getElementById("loader").style.display = "none";
                document.getElementById("netSalary").innerText = "Not Found";
                return;
            }

            monthly.sort((a, b) => a.year - b.year || a.month - b.month);
            const last = monthly[monthly.length - 1];

            document.getElementById("currentSalary").innerText = "₹ " + last.earnings.toLocaleString();
            document.getElementById("deduction").innerText = "₹ " + last.deductions.toLocaleString();
            document.getElementById("netSalary").innerText = "₹ " + last.net.toLocaleString();

            // CHART LOGIC
            const last12 = monthly.slice(-12);
            const values = last12.map(m => m.net);
            const names = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            
            const step = 25000;
            const maxVal = Math.max(...values, 50000);
            const yMax = Math.ceil(maxVal / step) * step;

            const yAxis = document.getElementById("yAxis");
            for (let i = yMax; i >= 0; i -= step) {
                const d = document.createElement("div");
                d.innerText = (i / 1000) + "K";
                yAxis.appendChild(d);
            }

            const xAxis = document.getElementById("xAxis");
            const chart = document.getElementById("chart");
            last12.forEach((m, i) => {
                const xDiv = document.createElement("div");
                xDiv.innerHTML = `${names[m.month - 1]}<br>${m.year}`;
                xAxis.appendChild(xDiv);

                const bar = document.createElement("div");
                bar.className = "bar";
                bar.style.height = (m.net / yMax * 100) + "%";
                chart.appendChild(bar);
            });

            const svg = document.getElementById("line");
            const points = values.map((v, i) => {
                const x = (i / (values.length - 1)) * (chart.clientWidth - 20) + 10;
                const y = 160 - (v / yMax * 160);
                return `${x},${y}`;
            }).join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            poly.setAttribute("points", points);
            poly.setAttribute("fill", "none");
            poly.setAttribute("stroke", "#4b2dd8");
            poly.setAttribute("stroke-width", "3");
            poly.setAttribute("stroke-linecap", "round");
            svg.appendChild(poly);

            document.getElementById("loader").style.display = "none";
        })
        .catch(() => {
            document.getElementById("loader").style.display = "none";
        });
</script>
</body>
</html>
