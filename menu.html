<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>

/* SAME DESIGN */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

.title{
padding:18px 15px 8px;
font-size:22px;
font-weight:600;
color:#2d3748;
}

.top{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:0 12px;
}

.card{
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
border-radius:18px;
padding:14px;
box-shadow:8px 8px 20px rgba(0,0,0,0.08),
-8px -8px 20px rgba(255,255,255,0.9);
position:relative;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
padding:10px;
border-radius:12px;
background:#e9edf4;
box-shadow: inset 3px 3px 8px rgba(0,0,0,0.05),
            inset -3px -3px 8px rgba(255,255,255,0.8);
}

.box p{margin:4px 0 0;font-size:18px;font-weight:600;}
.net{margin-top:10px;padding:12px;background:#e9edf4;border-radius:12px;}

.float{
position:absolute;left:50%;top:58%;
transform:translate(-50%,-50%);
width:45px;height:45px;border-radius:50%;
background:#eef2f7;
display:flex;align-items:center;justify-content:center;
}

.chart{
height:160px;
display:flex;
flex-direction:column;
gap:6px;
}

.bar{
height:10px;
border-radius:6px;
background:linear-gradient(90deg,#9fd3ff,#0052cc);
}

.row{
display:flex;
align-items:center;
gap:6px;
}

.month{
width:30px;
font-size:10px;
color:#555;
}

.axis{
display:flex;
justify-content:space-between;
font-size:10px;
color:#666;
}

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.btn{
padding:18px;
border-radius:18px;
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
text-align:center;
cursor:pointer;
}

.icon{
width:55px;height:55px;margin:auto;border-radius:16px;margin-bottom:8px;
}

.blue-bg{background:#3182ce;}
.purple-bg{background:#6b46c1;}
.orange-bg{background:#dd6b20;}
.green-bg{background:#2f855a;}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f3f4fa;
display:none;
flex-direction:column;
padding:20px;
z-index:99999;
}

</style>
</head>

<body>

<!-- SKELETON -->
<div id="loader">
<div style="height:20px;background:#ddd;margin-bottom:10px;"></div>
<div style="height:80px;background:#ddd;margin-bottom:10px;"></div>
<div style="height:100px;background:#ddd;"></div>
</div>

<div class="title">Salary Overview</div>

<div class="top">

<div class="card">
<div class="grid2">
<div class="box">
<h4>Current Salary</h4>
<p id="currentSalary">Loading...</p>
</div>

<div class="box">
<h4>Deductions</h4>
<p id="deduction">Loading...</p>
</div>
</div>

<div class="net">
<h4>Net Salary:</h4>
<p id="netSalary">Loading...</p>
</div>

<div class="float">₹</div>
</div>

<div class="card">
<div class="chart" id="chart"></div>
</div>

</div>

<div class="buttons">
<div class="btn" onclick="showLoader('salary.html')"><div class="icon blue-bg"></div><p>Salary</p></div>
<div class="btn" onclick="showLoader('reports_menu.html')"><div class="icon purple-bg"></div><p>Reports</p></div>
<div class="btn" onclick="showLoader('holidays.html')"><div class="icon orange-bg"></div><p>Holiday</p></div>
<div class="btn" onclick="showLoader('salary_details.html')"><div class="icon green-bg"></div><p>Details</p></div>
</div>

<script>

let user = localStorage.getItem("currentUser");
let url = "https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv";

function showLoader(url){
document.getElementById("loader").style.display="flex";
setTimeout(()=>{window.location=url},800);
}

// show loader on load
document.getElementById("loader").style.display="flex";

fetch(url)
.then(res=>res.text())
.then(data=>{

let rows=data.trim().split("\n").slice(1);
let monthly=[];

rows.forEach(r=>{
let cols=r.split(",");
if(cols[0]!==user) return;

let earnings=0;
for(let i=3;i<=19;i++){
earnings+=Number(cols[i])||0;
}

let deductions=0;
for(let i=20;i<cols.length;i++){
deductions+=Number(cols[i])||0;
}

let net=earnings-deductions;

monthly.push({
year:Number(cols[1]),
month:Number(cols[2]),
net,earnings,deductions
});
});

monthly.sort((a,b)=>a.year-b.year||a.month-b.month);

// previous month
let last = monthly.length>=2 ? monthly[monthly.length-2] : monthly[0];

if(last){
currentSalary.innerText="₹ "+last.earnings;
deduction.innerText="₹ "+last.deductions;
netSalary.innerText="₹ "+last.net;
}

// chart
let chart=document.getElementById("chart");

let data12=monthly.slice(-12);
let values=data12.map(m=>m.net);
let max=Math.max(...values);

// axis
let axis=document.createElement("div");
axis.className="axis";

for(let i=0;i<=5;i++){
let val=Math.round((max/5)*i/1000)*1000;
let span=document.createElement("span");
span.innerText="₹"+(val/1000)+"K";
axis.appendChild(span);
}

chart.appendChild(axis);

let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

data12.forEach(m=>{
let row=document.createElement("div");
row.className="row";

let label=document.createElement("div");
label.className="month";
label.innerText=names[m.month-1];

let bar=document.createElement("div");
bar.className="bar";
bar.style.width=(m.net/max*100)+"%";

row.appendChild(label);
row.appendChild(bar);
chart.appendChild(row);
});

// hide loader
document.getElementById("loader").style.display="none";

});

</script>

</body>
</html>
