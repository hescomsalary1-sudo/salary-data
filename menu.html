<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Menu</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#e9efff,#dfe7f5);
}

/* HEADER */
.top{
padding:18px;
text-align:center;
font-weight:bold;
font-size:20px;
}

/* SUMMARY */
.summary{
display:flex;
gap:10px;
padding:10px;
}

.card{
flex:1;
background:#f4f7fc;
padding:12px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* NET */
.net{
margin:10px;
padding:18px;
background:linear-gradient(135deg,#1e63ff,#0039cb);
color:white;
border-radius:20px;
text-align:center;
font-size:18px;
}

/* PIE */
.chart-card{
margin:10px;
background:#f4f7fc;
padding:15px;
border-radius:20px;
}

.pie{
width:150px;
height:150px;
border-radius:50%;
margin:auto;
}

/* LEGEND */
.legend{
margin-top:10px;
font-size:13px;
}

.legend-item{
display:flex;
justify-content:space-between;
padding:3px 0;
}

.color{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

/* BUTTONS */
.buttons{
padding:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
background:#f4f7fc;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
cursor:pointer;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid #1e63ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<div class="top">Salary Overview</div>

<!-- SUMMARY -->
<div class="summary">
<div class="card">
Last Month<br>
<b id="earn">₹ 0</b>
</div>

<div class="card">
Deductions<br>
<b id="ded">₹ 0</b>
</div>
</div>

<!-- NET -->
<div class="net">
Net Salary: ₹ <span id="net">0</span>
</div>

<!-- PIE -->
<div class="chart-card">
<h3 style="text-align:center;">Distribution</h3>
<div id="pie" class="pie"></div>
<div id="legend" class="legend"></div>
</div>

<!-- BUTTONS -->
<div class="buttons">

<div class="btn" onclick="go('salary.html')">Salary ›</div>
<div class="btn" onclick="go('reports_menu.html')">Reports ›</div>
<div class="btn" onclick="go('holidays.html')">Holidays ›</div>
<div class="btn" onclick="go('assets_liability.html')">Assets ›</div>

</div>

<script>

function go(page){
document.getElementById("loader").style.display="flex";
setTimeout(()=>{location=page},600);
}

let user = localStorage.getItem("currentUser");

/* PREVIOUS MONTH */
let d=new Date();
d.setMonth(d.getMonth()-1);
let year=d.getFullYear();
let month=String(d.getMonth()+1).padStart(2,"0");

fetch("https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv")
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n");
let row=null;

for(let i=1;i<rows.length;i++){
let c=rows[i].split(",");
if(c[0]===user && c[1]==year && c[2]==month){
row=c;
break;
}
}

if(!row){
loader.style.display="none";
alert("No data found");
return;
}

function num(v){return Number(v)||0}

/* EARNINGS */
let earn=0;
for(let i=3;i<=19;i++) earn+=num(row[i]);

/* DEDUCTIONS */
let list=[
["LIC",20],["IT",21],["PT",22],["Society",23],["PLI",24],
["Union",25],["SC/ST",26],["Rent",27],["Bank",28],
["Family",29],["Festival",30],["PC10",31],["PC14",32],
["LWF",33],["Recovery",34],["Other",35]
];

let deductions=[];

list.forEach(d=>{
let val=num(row[d[1]]);
if(val>0) deductions.push({name:d[0],value:val});
});

let totalDed=deductions.reduce((a,b)=>a+b.value,0);
let net=earn-totalDed;

/* UI */
earn.innerText="₹ "+earn;
ded.innerText="₹ "+totalDed;
netSpan.innerText=net;

/* PIE */
let dataArr=[
{name:"Earnings",value:earn,color:"#00c853"},
...deductions.map((d,i)=>({
name:d.name,
value:d.value,
color:`hsl(${i*25},70%,50%)`
}))
];

let total=dataArr.reduce((a,b)=>a+b.value,0);
let angle=0;
let grad=[];

dataArr.forEach(d=>{
let p=(d.value/total)*100;
grad.push(`${d.color} ${angle}% ${angle+p}%`);
angle+=p;
});

pie.style.background=`conic-gradient(${grad.join(",")})`;

/* LEGEND */
let html="";
dataArr.forEach(d=>{
html+=`
<div class="legend-item">
<span><span class="color" style="background:${d.color}"></span>${d.name}</span>
<span>₹ ${d.value}</span>
</div>`;
});

legend.innerHTML=html;

loader.style.display="none";

});

</script>

</body>
</html>
