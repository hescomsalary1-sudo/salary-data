<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

/* TITLE */
.title{
padding:18px 15px 8px;
font-size:22px;
font-weight:600;
color:#2d3748;
}

/* CARD */
.card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
border-radius:18px;
padding:14px;
margin:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* SALARY BOX */
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
padding:10px;
border-radius:12px;
background:#eef2f7;
}

.blue{color:#2b6cb0;}
.red{color:#c53030;}
.green{color:#2f855a;}

/* CHART */
#chart{
height:180px;
display:flex;
align-items:flex-end;
gap:6px;
}

/* BUTTONS */
.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}

.btn{
padding:16px;
border-radius:20px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.96);
}
</style>
</head>

<body>

<div class="title">Salary Overview</div>

<!-- ✅ USER PREVIEW -->
<div class="card">
<h4 id="userName"></h4>
<p id="monthYear"></p>
<h2 id="netHighlight"></h2>
</div>

<!-- ✅ SALARY -->
<div class="card">
<div class="grid2">
<div class="box">
<p>Current Salary</p>
<h3 id="currentSalary"></h3>
</div>

<div class="box">
<p>Deductions</p>
<h3 id="deduction"></h3>
</div>
</div>

<p style="margin-top:10px;">Net Salary</p>
<h2 class="green" id="netSalary"></h2>
</div>

<!-- ✅ CHART -->
<div class="card">

<div style="display:flex;">

<!-- Y AXIS -->
<div id="yAxis" style="width:40px;font-size:10px;"></div>

<!-- CHART -->
<div style="flex:1;">
<div id="chart"></div>
<div id="xAxis" style="display:flex;justify-content:space-between;font-size:10px;margin-top:6px;"></div>
</div>

</div>

</div>

<!-- ✅ BUTTONS -->
<div class="buttons">
<div class="btn" onclick="go('salary.html')">Salary</div>
<div class="btn" onclick="go('reports_menu.html')">Reports</div>
<div class="btn" onclick="go('holidays.html')">Holiday List</div>
<div class="btn" onclick="go('salary_details.html')">Salary Details</div>
</div>

<script>

let user = localStorage.getItem("currentUser");
let url = "https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv";

function go(u){ window.location=u; }

fetch(url)
.then(res=>res.text())
.then(data=>{

let rows=data.trim().split("\n").slice(1);
let monthly=[];

rows.forEach(r=>{
let c=r.split(",");
if(c[0]!==user) return;

let year=+c[1];
let month=+c[2];

let earn=0;
for(let i=3;i<=19;i++) earn+=+c[i]||0;

let ded=0;
for(let i=20;i<c.length;i++) ded+=+c[i]||0;

monthly.push({year,month,earn,ded,net:earn-ded});
});

monthly.sort((a,b)=>(a.year*100+a.month)-(b.year*100+b.month));

let last = monthly.length>=2 ? monthly[monthly.length-2] : monthly[0];

let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* USER PREVIEW */
if(last){
document.getElementById("userName").innerText=user;
document.getElementById("monthYear").innerText=names[last.month-1]+" "+last.year;
document.getElementById("netHighlight").innerText="₹ "+last.net;

document.getElementById("currentSalary").innerText="₹ "+last.earn;
document.getElementById("deduction").innerText="₹ "+last.ded;
document.getElementById("netSalary").innerText="₹ "+last.net;
}

/* CHART */
let last12=monthly.slice(-12);
let values=last12.map(m=>m.net);
let months=last12.map(m=>m.month);

let max=Math.max(...values);
let yMax=Math.ceil(max/10000)*10000;

/* Y AXIS */
let yAxis=document.getElementById("yAxis");
for(let i=yMax;i>=0;i-=10000){
let d=document.createElement("div");
d.style.height="25px";
d.innerText=(i/1000)+"K";
yAxis.appendChild(d);
}

/* BARS */
let chart=document.getElementById("chart");
values.forEach(v=>{
let bar=document.createElement("div");
bar.style.flex="1";
bar.style.height=(v/yMax)*100+"%";
bar.style.background="linear-gradient(180deg,#4facfe,#0052cc)";
bar.style.borderRadius="8px";
chart.appendChild(bar);
});

/* X AXIS */
let xAxis=document.getElementById("xAxis");
months.forEach(m=>{
let d=document.createElement("div");
d.innerText=names[m-1];
xAxis.appendChild(d);
});

});

</script>

</body>
</html>
