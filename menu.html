<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

/* TITLE */
.title{
padding:18px 15px 8px;
font-size:22px;
font-weight:600;
color:#2d3748;
}

/* MOBILE TOP */
.top{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:0 12px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
border-radius:18px;
padding:14px;
box-shadow:
8px 8px 20px rgba(0,0,0,0.08),
-8px -8px 20px rgba(255,255,255,0.9);
position:relative;
}

/* SALARY */
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
padding:10px;
border-radius:12px;
background:#e9edf4;
box-shadow: inset 3px 3px 8px rgba(0,0,0,0.05),
            inset -3px -3px 8px rgba(255,255,255,0.8);
}

.box h4{
margin:0;
font-size:12px;
color:#6b7280;
}

.box p{
margin:4px 0 0;
font-size:18px;
font-weight:600;
}

.blue{color:#2b6cb0;}
.red{color:#c53030;}
.green{color:#2f855a;}

.net{
margin-top:10px;
padding:12px;
border-radius:12px;
background:#e9edf4;
box-shadow: inset 3px 3px 8px rgba(0,0,0,0.05),
            inset -3px -3px 8px rgba(255,255,255,0.8);
}

/* FLOAT */
.float{
position:absolute;
left:50%;
top:58%;
transform:translate(-50%,-50%);
width:45px;
height:45px;
border-radius:50%;
background:#eef2f7;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#2b6cb0;
box-shadow:
6px 6px 14px rgba(0,0,0,0.15),
-6px -6px 14px rgba(255,255,255,0.9);
}

/* CHART */
.chart{
position:relative;
height:160px;
display:flex;
align-items:flex-end;
justify-content:space-around;
}

/* BAR */
.bar{
width:18%;
border-radius:8px;
background:linear-gradient(180deg,#9fd3ff,#0052cc);
}

/* SVG */
.line{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.line circle{
fill:white;
stroke:#f4a300;
stroke-width:2;
}

/* COIN */
.coin{
position:absolute;
top:-8px;
right:10px;
width:45px;
height:45px;
border-radius:50%;
background:linear-gradient(145deg,#ffd54f,#f4a300);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
}

/* BUTTONS */
.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px 12px;
}

.btn{
padding:18px;
border-radius:18px;
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
text-align:center;
box-shadow:
8px 8px 18px rgba(0,0,0,0.08),
-8px -8px 18px rgba(255,255,255,0.9);
cursor:pointer;
}

.icon{
width:55px;
height:55px;
margin:auto;
border-radius:16px;
margin-bottom:8px;
}

.blue-bg{background:linear-gradient(145deg,#90cdf4,#3182ce);}
.purple-bg{background:linear-gradient(145deg,#b794f4,#6b46c1);}
.orange-bg{background:linear-gradient(145deg,#f6ad55,#dd6b20);}
.green-bg{background:linear-gradient(145deg,#68d391,#2f855a);}

.btn p{
margin:0;
font-size:13px;
font-weight:600;
}

#loader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#f3f4fa;
display:none;
flex-direction:column;
padding:20px;
gap:15px;
z-index:99999; /* 🔥 very important */
overflow:hidden;
}

/* shimmer */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:20px;
border-radius:6px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-big{height:80px;border-radius:20px;}
.skel-circle{
width:55px;
height:55px;
border-radius:50%;
}
.skel-line{height:15px;}
.skel-card{height:90px;border-radius:20px;}

</style>
</head>

<body>

<div class="title">Salary Overview</div>

<div class="top">

<!-- SALARY CARD -->
<div class="card">

<div class="grid2">
<div class="box">
<h4>Current Salary</h4>
<p class="blue" id="currentSalary">Loading...</p>
</div>

<div class="box">
<h4>Deductions</h4>
<p class="red" id="deduction">Loading...</p>
</div>
</div>

<div class="net">
<h4>Net Salary:</h4>
<p class="green" id="netSalary" style="font-size:22px;">Loading...</p>
</div>

<div class="float">₹</div>

</div>

<!-- CHART -->
<div class="card">
<div class="chart" id="chart">

<div id="loader">

<!-- header -->
<div style="display:flex;align-items:center;gap:10px;">
<div class="skeleton skel-circle"></div>
<div style="flex:1;">
<div class="skeleton skel-line" style="width:60%;margin-bottom:6px;"></div>
<div class="skeleton skel-line" style="width:40%;"></div>
</div>
</div>

<!-- salary card -->
<div class="skeleton skel-big"></div>

<!-- grid -->
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
</div>

<!-- news -->
<div class="skeleton skel-line" style="width:70%;"></div>
<div class="skeleton skel-line"></div>
<div class="skeleton skel-line" style="width:90%;"></div>
  <div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>
<div class="skeleton skel-card"></div>

</div>

<svg class="line" id="line"></svg>

<div class="coin">₹</div>

</div>
</div>

</div>

<!-- BUTTONS -->
<div class="buttons">

<div class="btn" onclick="showLoader('salary.html')">
<div class="icon blue-bg"></div>
<p>Salary</p>
</div>

<div class="btn" onclick="showLoader('reports_menu.html')">
<div class="icon purple-bg"></div>
<p>Reports</p>
</div>

<div class="btn" onclick="showLoader('holidays.html')">
<div class="icon orange-bg"></div>
<p>Holiday List</p>
</div>

<div class="btn" onclick="showLoader('salary_details.html')">
<div class="icon green-bg"></div>
<p>Salary Details</p>
</div>

</div>

<script>

let user = localStorage.getItem("currentUser");

// ✅ FIXED URL (removed space)
let url = "https://hescomsalary1-sudo.github.io/salary-data/salary .csv";


// ✅ SINGLE showLoader (fixed)
function showLoader(url){
let loader = document.createElement("div");
loader.style.position="fixed";
loader.style.top="0";
loader.style.left="0";
loader.style.width="100%";
loader.style.height="100%";
loader.style.background="white";
loader.style.display="flex";
loader.style.alignItems="center";
loader.style.justifyContent="center";
loader.style.zIndex="99999";

loader.innerHTML = `
<div style="
width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #4b2dd8;
border-radius:50%;
animation:spin 1s linear infinite;
"></div>

<style>
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
`;

document.body.appendChild(loader);

setTimeout(()=>{ window.location = url },500);
}


// FETCH CSV
fetch(url)
.then(res => res.text())
.then(data => {

if(!data){
console.log("No data");
return;
}

let rows = data.trim().split("\n").slice(1);

let monthly = [];

rows.forEach(r=>{
let cols = r.split(",");

// user filter
if(cols[0] !== user) return;

let year = Number(cols[1]);
let month = Number(cols[2]);

let earnings = 0;
for(let i=3;i<=19;i++){
earnings += Number(cols[i]) || 0;
}

let deductions = 0;
for(let i=20;i<cols.length;i++){
deductions += Number(cols[i]) || 0;
}

let net = earnings - deductions;

monthly.push({year, month, net, earnings, deductions});
});


// SORT + LAST 12 MONTHS
monthly.sort((a,b)=> a.year - b.year || a.month - b.month);
monthly = monthly.slice(-12);


// UPDATE SALARY
let last = monthly[monthly.length-1];

if(last){
document.getElementById("currentSalary").innerText = "₹ " + last.earnings;
document.getElementById("deduction").innerText = "₹ " + last.deductions;
document.getElementById("netSalary").innerText = "₹ " + last.net;
}


// CHART
let chart = document.getElementById("chart");

// ✅ REMOVE ONLY LOADER (not full UI)
let loader = document.getElementById("loader");
if(loader) loader.style.display = "none";

// clear old bars only
chart.querySelectorAll(".bar").forEach(b => b.remove());

// clear svg
document.getElementById("line").innerHTML = "";

let values = monthly.map(m => m.net);

if(values.length === 0){
console.log("No user data");
return;
}

let max = Math.max(...values);
let min = Math.min(...values);

// BARS
values.forEach(v=>{
let bar = document.createElement("div");
bar.className="bar";

let h = ((v - min)/(max - min || 1))*80 + 20;
bar.style.height = h + "%";

chart.appendChild(bar);
});

// LINE
let svg = document.getElementById("line");

let points = values.map((v,i)=>{
let x = (i/(values.length-1))*280+10;
let y = 140 - (((v - min)/(max - min || 1))*120);
return `${x},${y}`;
}).join(" ");

let poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");
poly.setAttribute("points",points);
poly.setAttribute("fill","none");
poly.setAttribute("stroke","#f4a300");
poly.setAttribute("stroke-width","2");

svg.appendChild(poly);

// DOTS
values.forEach((v,i)=>{
let cx = (i/(values.length-1))*280+10;
let cy = 140 - (((v - min)/(max - min || 1))*120);

let c = document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",cx);
c.setAttribute("cy",cy);
c.setAttribute("r","4");

svg.appendChild(c);
});

})
.catch(err=>{
console.log("CSV error:", err);

// fallback → remove loader
let loader = document.getElementById("loader");
if(loader) loader.style.display = "none";
});

</script>

</body>
</html>
