<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

/* HEADER */

.top{
padding:25px 20px 110px 20px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.top-row{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:38px;
height:38px;
background:white;
color:#4b2dd8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.top h2{
margin:0;
font-weight:600;
}

.subtitle{
font-size:12px;
opacity:0.8;
margin-top:4px;
}

/* WELCOME CARD */

.welcome{
margin:20px;
padding:16px;
background:white;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
font-weight:600;
color:#4b2dd8;
}

/* CONTENT */

.content{
padding:10px 20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

/* PREMIUM BUTTON */

.card{
background:linear-gradient(135deg,#ffffff,#f1efff);
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:active{
transform:scale(0.96);
}

/* ICON CIRCLE */

.circle{
width:55px;
height:55px;
border-radius:50%;
background:#4b2dd8;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
margin-bottom:8px;
box-shadow:0 6px 14px rgba(75,45,216,0.3);
}

.card p{
margin:0;
font-size:14px;
font-weight:600;
color:#4b2dd8;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner{
  width:35px;
  height:35px;
  border:6px solid #ddd;
  border-top:6px solid #5e00a3;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:#ffffff;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 15px rgba(0,0,0,0.1);
}

.footer a{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#4b2dd8;
font-size:20px;
}

.footer small{
font-size:11px;
margin-top:4px;
font-weight:600;
}

  .info-card{
margin:20px;
padding:18px;
background:white;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.info-card h3{
margin:0;
color:#4b2dd8;
font-size:16px;
}

.info-card p{
margin-top:6px;
font-size:13px;
color:#555;
line-height:1.5;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="top">

<div class="top-row">
<div class="icon">₹</div>
<h2>Salary Menu</h2>
</div>

<div class="subtitle">Employee Salary Services</div>

</div>

<!-- WELCOME CARD -->



<!-- LOADER -->

<div id="loader">
<div class="spinner"></div>
</div>

<!-- CONTENT -->

<div class="content">

<div class="grid">

<div class="card" onclick="showLoader('salary.html')">
<div class="circle">💰</div>
<p>Salary</p>
</div>

<div class="card" onclick="showLoader('reports_menu.html')">
<div class="circle">📊</div>
<p>Reports</p>
</div>

<div class="card" onclick="showLoader('holidays.html')">
<div class="circle">🎉</div>
<p>Holiday List</p>
</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<a href="home.html">
<div>🏠</div>
<small>Home</small>
</a>

<a href="page1.html">
<div>👤</div>
<small>Profile</small>
</a>

<a href="menu.html">
<div>💰</div>
<small>Salary</small>
</a>

<a href="page3.html">
<div>📅</div>
<small>Attendance</small>
</a>

<a href="page4.html">
<div>⚙</div>
<small>Settings</small>
</a>

</div>

<script>

// LOGIN CHECK
let user = localStorage.getItem("currentUser");
if(!user){
window.location.replace("login.html");
}

// SHOW USER NAME
document.getElementById("userName").innerText = user;

// LOADER NAVIGATION
function showLoader(url){
document.getElementById("loader").style.display="flex";
setTimeout(function(){
window.location = url;
},700);
}

</script>

</body>
</html>
