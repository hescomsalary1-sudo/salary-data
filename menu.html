<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Menu</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#e9efff,#dfe7f5);
}

/* HEADER */
.top{
padding:18px;
text-align:center;
font-size:20px;
font-weight:700;
color:#1e2a4a;
}

/* COMMON CARD */
.container{
margin:12px;
padding:15px;
background:#ffffff;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* SUMMARY (TOP) */
.summary{
display:flex;
gap:10px;
}

.card{
flex:1;
text-align:center;
padding:12px;
border-radius:15px;
background:#f4f7fc;
}

.card b{
font-size:16px;
}

.net{
background:linear-gradient(135deg,#1e63ff,#0039cb);
color:white;
}

/* PIE SECTION */
.chart-flex{
display:flex;
gap:15px;
align-items:center;
}

/* PIE */
.pie{
width:140px;
height:140px;
border-radius:50%;
}

/* LIST */
.list{
flex:1;
font-size:13px;
max-height:150px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
padding:5px 0;
border-bottom:1px solid #eee;
}

/* BUTTON GRID */
.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px;
  border-radius:18px;
  background:#ffffff;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.03);
}

/* LEFT SIDE */
.btn-left{
  display:flex;
  align-items:center;
  gap:10px;
}

/* ICON */
.icon{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
}

/* COLORS */
.blue{background:#3b82f6;}
.purple{background:#7c3aed;}
.orange{background:#f97316;}
.green{background:#22c55e;}

/* TEXT */
.btn-title{
  font-weight:600;
  font-size:14px;
}

.btn-sub{
  font-size:11px;
  color:#6b7280;
}

/* ARROW */
.arrow{
  font-size:18px;
  color:#9ca3af;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
justify-content:center;
align-items:center;
}

.spinner{
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid #1e63ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:600px){
.chart-flex{
flex-direction:row;
}
}

  .top-bar{
  display:flex;
  align-items:center;
  padding:15px;
  gap:10px;
}

.top-title{
  font-size:20px;
  font-weight:700;
  color:#1e2a4a;
}

.back-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 12px rgba(0,0,0,0.1);
  cursor:pointer;
}
  .section-title{
  font-size:15px;
  font-weight:600;
  margin-bottom:10px;
  color:#333;
}
  body{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
  .color-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<div class="top-bar">

  <div class="back-btn" onclick="goBack()">⬅</div>

  <div class="top-title">Salary Overview</div>

</div>

<!-- TOP CONTAINER -->
<div class="container">
  <h3 class="section-title">Last Month Summary</h3>
<div class="summary">
<div class="card">
Earnings<br><b id="earn">₹0</b>
</div>

<div class="card">
Deductions<br><b id="ded">₹0</b>
</div>

<div class="card net">
Net<br><b id="net">₹0</b>
</div>
</div>
</div>

<!-- PIE + LIST CONTAINER -->
<div class="container">
  <h3 class="section-title">Salary Distribution</h3>
<div class="chart-flex">

<div id="pie" class="pie"></div>

<div id="list" class="list"></div>

</div>
</div>

<!-- BUTTON CONTAINER -->
<div class="container">
  <h3 class="section-title">Quick Actions</h3>
<div class="buttons">

<div class="btn" onclick="go('salary.html')">
  <div class="btn-left">
    <div class="icon blue">💰</div>
    <div>
      <div class="btn-title">Salary</div>
      <div class="btn-sub">View details</div>
    </div>
  </div>
  <div class="arrow">›</div>
</div>

<div class="btn" onclick="go('reports_menu.html')">
  <div class="btn-left">
    <div class="icon purple">📊</div>
    <div>
      <div class="btn-title">Reports</div>
      <div class="btn-sub">Monthly reports</div>
    </div>
  </div>
  <div class="arrow">›</div>
</div>

<div class="btn" onclick="go('holidays.html')">
  <div class="btn-left">
    <div class="icon orange">📅</div>
    <div>
      <div class="btn-title">Holidays</div>
      <div class="btn-sub">Check list</div>
    </div>
  </div>
  <div class="arrow">›</div>
</div>

<div class="btn" onclick="go('assets_liability.html')">
  <div class="btn-left">
    <div class="icon green">📄</div>
    <div>
      <div class="btn-title">Assets</div>
      <div class="btn-sub">View assets</div>
    </div>
  </div>
  <div class="arrow">›</div>
</div>

</div>
</div>

<script>
const loader=document.getElementById("loader");

function go(p){
loader.style.display="flex";
setTimeout(()=>location=p,600);
}

let user=localStorage.getItem("currentUser");

/* PREVIOUS MONTH */
let d=new Date();
d.setMonth(d.getMonth()-1);
let year=d.getFullYear();
let month=String(d.getMonth()+1).padStart(2,"0");

fetch("https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv")
.then(r=>r.text())
.then(data=>{

let rows=data.trim().split("\n");
let row=null;

for(let i=1;i<rows.length;i++){
let c=rows[i].split(",");
if(c[0]===user && c[1]==year && c[2]==month){
row=c; break;
}
}

if(!row){ loader.style.display="none"; return; }

function num(v){return Number(v)||0}

/* EARNINGS */
let earn=0;
for(let i=3;i<=19;i++) earn+=num(row[i]);

/* DEDUCTIONS */
let names=[
"LIC","IT","PT","Society","PLI","Union","SC/ST","Rent",
"Bank","Family","Festival","PC10","PC14","LWF","Recovery","Other"
];

let deductions=[];
for(let i=20;i<=35;i++){
let v=num(row[i]);
if(v>0) deductions.push({name:names[i-20],value:v});
}

let totalDed=deductions.reduce((a,b)=>a+b.value,0);
let net=earn-totalDed;

/* UI */
earnElem=document.getElementById("earn");
dedElem=document.getElementById("ded");
netElem=document.getElementById("net");

earnElem.innerText="₹"+earn;
dedElem.innerText="₹"+totalDed;
netElem.innerText="₹"+net;

/* PIE */
let dataArr=[{value:earn,color:"#00c853"},
...deductions.map((d,i)=>({value:d.value,color:`hsl(${i*25},70%,50%)`}))
];

let total=dataArr.reduce((a,b)=>a+b.value,0);
let angle=0,grad=[];

dataArr.forEach(d=>{
let p=(d.value/total)*100;
grad.push(`${d.color} ${angle}% ${angle+p}%`);
angle+=p;
});

document.getElementById("pie").style.background=
`conic-gradient(${grad.join(",")})`;

/* LIST */
let html="";
deductions.forEach((d,i)=>{
html+=`
<div class="item">
  <span>
    <span class="color-dot" style="background:hsl(${i*25},70%,50%)"></span>
    ${d.name}
  </span>
  <span>₹${d.value}</span>
</div>`;
});
document.getElementById("list").innerHTML=html;

loader.style.display="none";

})
.catch(()=>{ loader.style.display="none"; });

  function goBack(){
  loader.style.display="flex";
  setTimeout(()=>{ history.back(); },500);
}
</script>

</body>
</html>
