<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>
/* --- SHARED PREMIUM VARIABLES --- */
:root {
    --primary: #4b2dd8;
    --primary-dark: #2400b7;
    --accent: #9b6dff;
    --bg-body: #f8faff;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-muted: #718096;
    --border-light: rgba(226, 232, 240, 0.8);
}

/* --- BLOOM ENTRANCE EFFECT --- */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-body);
    z-index: 10000;
    pointer-events: none;
    animation: bloomReveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes bloomReveal {
    0% { clip-path: circle(0% at 50% 50%); }
    100% { clip-path: circle(150% at 50% 50%); }
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg-body);
    color: var(--text-main);
    padding-bottom: 30px;
}

/* --- PREMIUM GLASS HEADER --- */
.top-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 18px 0;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border-light);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    z-index: 1000;
}

.back-btn {
    position: absolute;
    left: 15px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f3ff;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.back-btn:active { transform: scale(0.9); }

.header-title {
    width: 100%;
    text-align: center;
}

.header-title h2 {
    margin: 0;
    font-size: 19px;
    background: linear-gradient(135deg, var(--primary-dark), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
}

/* --- CONTENT SPACING --- */
.container {
    padding: 95px 16px 20px;
    max-width: 500px;
    margin: 0 auto;
}

/* --- MODERN CARD STYLING --- */
.card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(75, 45, 216, 0.04);
    margin-bottom: 20px;
    border: 1px solid var(--border-light);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* SALARY SUMMARY GRID */
.grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.box {
    padding: 15px;
    border-radius: 18px;
    background: #f9faff;
    border: 1px solid rgba(75, 45, 216, 0.05);
}

.box h4 { margin: 0; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.box p { margin: 5px 0 0; font-size: 16px; font-weight: 700; color: var(--primary-dark); }

/* NET SALARY HIGHLIGHT */
.net {
    margin-top: 15px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    text-align: center;
    box-shadow: 0 10px 20px rgba(36, 0, 183, 0.2);
}

.net h4 { margin: 0; font-size: 12px; opacity: 0.8; font-weight: 500; }
.net p { margin: 5px 0 0; font-size: 24px; font-weight: 800; }

/* --- CHART AREA --- */
.chart-title { font-size: 16px; font-weight: 700; color: var(--primary-dark); margin-bottom: 15px; text-align: left; }

.chart {
    position: relative;
    height: 160px;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 4px;
}

.bar {
    width: 12px;
    border-radius: 6px 6px 0 0;
    background: linear-gradient(to top, var(--primary), var(--accent));
    min-height: 2px;
}

.line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* --- NAVIGATION BUTTONS --- */
.buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 10px;
}

.btn {
    background: var(--card-bg);
    padding: 20px 10px;
    border-radius: 22px;
    text-align: center;
    border: 1px solid var(--border-light);
    box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    transition: 0.2s;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.btn:active { transform: scale(0.95); }

.icon {
    width: 50px;
    height: 50px;
    margin: 0 auto 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: white;
}

.btn p { margin: 0; font-size: 13px; font-weight: 700; color: var(--text-main); }

.blue-bg { background: linear-gradient(135deg, #4facfe, #0052cc); }
.purple-bg { background: linear-gradient(135deg, #a18cd1, #6b46c1); }
.orange-bg { background: linear-gradient(135deg, #f6ad55, #dd6b20); }
.green-bg { background: linear-gradient(135deg, #48bb78, #2f855a); }

/* --- SKELETON LOADER --- */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-body);
    display: none;
    flex-direction: column;
    padding: 100px 20px;
    gap: 15px;
    z-index: 99999;
}

.skeleton {
    background: linear-gradient(90deg, #ececf1 25%, #f5f5f7 50%, #ececf1 75%);
    background-size: 400px 100%;
    animation: shimmer 1.5s infinite linear;
    border-radius: 12px;
}

@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skel-card { height: 180px; border-radius: 24px; }
.skel-btn { height: 120px; border-radius: 22px; }

</style>
</head>

<body>

<!-- NAVIGATION HEADER -->
<div class="top-nav">
    <div class="back-btn" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M15 18L9 12L15 6" stroke="#2400b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <div class="header-title">
        <h2>Salary Overview</h2>
    </div>
</div>

<!-- SKELETON LOADER -->
<div id="loader">
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card" style="height: 220px;"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="skeleton skel-btn"></div>
        <div class="skeleton skel-btn"></div>
    </div>
</div>

<div class="container">
    <!-- SUMMARY CARD -->
    <div class="card" style="animation-delay: 0.1s;">
        <div class="grid2">
            <div class="box">
                <h4>Earnings</h4>
                <p id="currentSalary">Loading...</p>
            </div>
            <div class="box">
                <h4>Deductions</h4>
                <p id="deduction" style="color: #e53e3e;">Loading...</p>
            </div>
        </div>
        <div class="net">
            <h4>Net Payable Salary</h4>
            <p id="netSalary">Loading...</p>
        </div>
    </div>

    <!-- CHART CARD -->
    <div class="card" style="animation-delay: 0.2s;">
        <h3 class="chart-title">Growth Analytics</h3>
        <div style="display:flex; gap: 10px;">
            <!-- Y AXIS -->
            <div id="yAxis" style="width:35px; font-size:10px; color:var(--text-muted); display: flex; flex-direction: column; justify-content: space-between; text-align: right; padding-right: 5px;"></div>
            
            <div style="flex:1;">
                <div class="chart" id="chart">
                    <svg class="line" id="line"></svg>
                </div>
                <!-- X AXIS -->
                <div id="xAxis" style="display:flex; justify-content:space-around; font-size:9px; color:var(--text-muted); margin-top:8px; font-weight: 600;"></div>
            </div>
        </div>
    </div>

    <!-- BUTTON GRID -->
    <div class="buttons">
        <div class="btn" onclick="showLoader('salary.html')" style="animation-delay: 0.3s;">
            <div class="icon blue-bg">💰</div>
            <p>Salary Slip</p>
        </div>
        <div class="btn" onclick="showLoader('reports_menu.html')" style="animation-delay: 0.4s;">
            <div class="icon purple-bg">📊</div>
            <p>Reports</p>
        </div>
        <div class="btn" onclick="showLoader('holidays.html')" style="animation-delay: 0.5s;">
            <div class="icon orange-bg">📅</div>
            <p>Holidays</p>
        </div>
        <div class="btn" onclick="showLoader('assets_liability.html')" style="animation-delay: 0.6s;">
            <div class="icon green-bg">📄</div>
            <p>A & L Forms</p>
        </div>
    </div>
</div>

<script>
let user = localStorage.getItem("currentUser");
document.getElementById("loader").style.display="flex";

let url = "https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv";

function showLoader(url){
    document.getElementById("loader").style.display="flex";
    setTimeout(()=>{ window.location=url },800);
}

function goBack(){
    window.history.back();
}

fetch(url)
.then(res => res.text())
.then(data => {
    let rows = data.trim().split("\n").slice(1);
    let monthly = [];

    rows.forEach(r=>{
        let cols = r.split(",");
        if(cols[0] !== user) return;
        let year = Number(cols[1]);
        let month = Number(cols[2]);
        let earnings = 0;
        for(let i=3;i<=19;i++){ earnings += Number(cols[i]) || 0; }
        let deductions = 0;
        for(let i=20;i<cols.length;i++){ deductions += Number(cols[i])||0; }
        let net = earnings - deductions;
        monthly.push({year,month,net,earnings,deductions});
    });

    monthly.sort((a,b)=> (a.year*100 + a.month) - (b.year*100 + b.month));

    let last = monthly.length >= 2 ? monthly[monthly.length - 2] : (monthly.length === 1 ? monthly[0] : null);

    if(last){
        document.getElementById("currentSalary").innerText="₹ "+last.earnings.toLocaleString();
        document.getElementById("deduction").innerText="₹ "+last.deductions.toLocaleString();
        document.getElementById("netSalary").innerText="₹ "+last.net.toLocaleString();
    }

    // Chart Logic
    let chart=document.getElementById("chart");
    let last12 = monthly.slice(-12);
    let values = last12.map(m=>m.net);
    let months = last12.map(m=>m.month);
    let years = last12.map(m=>m.year);
    let names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    let step = 25000;
    let maxVal = Math.max(...values, 50000);
    let yMax = Math.ceil(maxVal/step)*step;

    let yAxis=document.getElementById("yAxis");
    yAxis.innerHTML="";
    for(let i=yMax; i>=0; i-=step){
        let d=document.createElement("div");
        d.innerText=(i/1000)+"K";
        yAxis.appendChild(d);
    }

    let xAxis=document.getElementById("xAxis");
    xAxis.innerHTML="";
    months.forEach((m,i)=>{
        let d=document.createElement("div");
        d.innerHTML = names[m-1] + "<br>" + years[i].toString().substr(-2);
        xAxis.appendChild(d);
    });

    values.forEach(v=>{
        let bar=document.createElement("div");
        bar.className="bar";
        bar.style.height=(v/yMax)*100+"%";
        chart.appendChild(bar);
    });

    let svg=document.getElementById("line");
    let points=values.map((v,i)=>{
        let x=(i/(values.length-1))* (chart.clientWidth - 20) + 10;
        let y = 160 - (v / yMax) * 160;
        return `${x},${y}`;
    }).join(" ");

    let poly=document.createElementNS("http://www.w3.org/2000/svg","polyline");
    poly.setAttribute("points",points);
    poly.setAttribute("fill","none");
    poly.setAttribute("stroke","#9b6dff");
    poly.setAttribute("stroke-width","3");
    poly.setAttribute("stroke-linecap","round");
    svg.appendChild(poly);

    document.getElementById("loader").style.display="none";
});
</script>

</body>
</html>
