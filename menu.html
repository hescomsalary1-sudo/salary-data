<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Menu</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#e9efff,#dfe7f5);
}

/* HEADER */
.top{
padding:18px;
text-align:center;
font-size:20px;
font-weight:700;
}

/* SUMMARY */
.summary{
display:flex;
gap:10px;
padding:10px;
}

.card{
flex:1;
background:#f4f7fc;
padding:12px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* NET */
.net{
margin:10px;
padding:18px;
background:linear-gradient(135deg,#1e63ff,#0039cb);
color:white;
border-radius:20px;
text-align:center;
font-size:18px;
}

/* PIE */
.chart-card{
margin:10px;
background:#f4f7fc;
padding:15px;
border-radius:20px;
}

.pie{
width:150px;
height:150px;
border-radius:50%;
margin:auto;
}

/* LEGEND */
.legend{
margin-top:10px;
font-size:13px;
}

.legend-item{
display:flex;
justify-content:space-between;
padding:3px 0;
}

.color{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

/* BUTTONS */
.buttons{
padding:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
background:#f4f7fc;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
cursor:pointer;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid #1e63ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
  /* TITLE */
.chart-title{
  text-align:center;
  margin-bottom:10px;
  font-size:16px;
  font-weight:600;
}

/* FLEX LAYOUT */
.chart-flex{
  display:flex;
  gap:15px;
  align-items:center;
  justify-content:space-between;
}

/* PIE LEFT */
.pie-box{
  flex:1;
  display:flex;
  justify-content:center;
}

.pie{
  width:140px;
  height:140px;
  border-radius:50%;
}

/* LEGEND RIGHT */
.legend{
  flex:1.5;
  font-size:13px;
}

/* LEGEND ITEMS */
.legend-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4px 0;
}

/* COLOR DOT */
.color{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

/* MOBILE RESPONSIVE */
@media(max-width:600px){
  .chart-flex{
    flex-direction:column;
    align-items:center;
  }

  .legend{
    width:100%;
  }
}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<div class="top">Salary Overview</div>

<!-- SUMMARY -->
<div class="summary">
  <div class="card">
    Last Month<br>
    <b id="earn">₹ 0</b>
  </div>

  <div class="card">
    Deductions<br>
    <b id="ded">₹ 0</b>
  </div>
</div>

<!-- NET -->
<div class="net">
  Net Salary: ₹ <span id="net">0</span>
</div>

<!-- PIE -->
<div class="chart-card">

<h3 class="chart-title">Distribution</h3>

<div class="chart-flex">

  <!-- LEFT: PIE -->
  <div class="pie-box">
    <div id="pie" class="pie"></div>
  </div>

  <!-- RIGHT: DETAILS -->
  <div id="legend" class="legend"></div>

</div>

</div>

<!-- BUTTONS -->
<div class="buttons">
  <div class="btn" onclick="go('salary.html')">Salary ›</div>
  <div class="btn" onclick="go('reports_menu.html')">Reports ›</div>
  <div class="btn" onclick="go('holidays.html')">Holidays ›</div>
  <div class="btn" onclick="go('assets_liability.html')">Assets ›</div>
</div>

<script>
const loader = document.getElementById("loader");

function go(page){
  loader.style.display="flex";
  setTimeout(()=>{ location = page },600);
}

const user = localStorage.getItem("currentUser");

/* PREVIOUS MONTH */
let d = new Date();
d.setMonth(d.getMonth()-1);
let year = d.getFullYear().toString();
let month = String(d.getMonth()+1).padStart(2,"0");

fetch("https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv")
.then(r=>r.text())
.then(data=>{

let rows = data.trim().split("\n");
let row = null;

for(let i=1;i<rows.length;i++){
  let c = rows[i].split(",");
  if(c[0]===user && c[1]===year && c[2]===month){
    row = c;
    break;
  }
}

if(!row){
  loader.style.display="none";
  alert("No data found for previous month");
  return;
}

function num(v){ return Number(v) || 0 }

/* ===== EARNINGS (same as salary.html) ===== */
let earnings =
num(row[3]) + num(row[4]) + num(row[5]) + num(row[6]) +
num(row[7]) + num(row[8]) + num(row[9]) + num(row[10]) +
num(row[11]) + num(row[12]) + num(row[13]) + num(row[14]) +
num(row[15]) + num(row[16]) + num(row[17]) + num(row[18]) +
num(row[19]);

/* ===== ALL DEDUCTIONS (EXACT MATCH) ===== */
let deductionsList = [
{name:"LIC", value:num(row[20])},
{name:"Income Tax", value:num(row[21])},
{name:"Professional Tax", value:num(row[22])},
{name:"Society", value:num(row[23])},
{name:"PLI", value:num(row[24])},
{name:"Union Fund", value:num(row[25])},
{name:"SC/ST Fund", value:num(row[26])},
{name:"House Rent", value:num(row[27])},
{name:"Urban Bank", value:num(row[28])},
{name:"Family Fund", value:num(row[29])},
{name:"Festival Advance", value:num(row[30])},
{name:"PC 10%", value:num(row[31])},
{name:"PC 14%", value:num(row[32])},
{name:"LWF", value:num(row[33])},
{name:"Recovery", value:num(row[34])},
{name:"Other Deduction", value:num(row[35])}
].filter(d => d.value > 0);   // ✅ THIS LINE ADDED

/* 👉 IMPORTANT: DO NOT FILTER (show all items) */
let totalDed = deductionsList.reduce((a,b)=>a+b.value,0);
let netVal = earnings - totalDed;

/* UI */
document.getElementById("earn").innerText = "₹ " + earnings;
document.getElementById("ded").innerText = "₹ " + totalDed;
document.getElementById("net").innerText = netVal;

/* ===== PIE DATA ===== */
let dataArr = [
{name:"Earnings", value:earnings, color:"#00c853"},
...deductionsList.map((d,i)=>({
  name:d.name,
  value:d.value,
  color:`hsl(${i*22},70%,50%)`
}))
];

/* PIE */
let total = dataArr.reduce((a,b)=>a+b.value,0);
let angle = 0;
let grad = [];

dataArr.forEach(d=>{
  let p = total>0 ? (d.value/total)*100 : 0;
  grad.push(`${d.color} ${angle}% ${angle+p}%`);
  angle += p;
});

document.getElementById("pie").style.background =
  `conic-gradient(${grad.join(",")})`;

/* LEGEND (ALL ITEMS SHOWN) */
let html="";
dataArr.forEach(d=>{
html+=`
<div class="legend-item">
<span><span class="color" style="background:${d.color}"></span>${d.name}</span>
<span>₹ ${d.value}</span>
</div>`;
});

document.getElementById("legend").innerHTML = html;

loader.style.display="none";

})
.catch(()=>{
loader.style.display="none";
alert("Error loading data");
});
</script>

</body>
</html>
