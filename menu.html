<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:20px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.top-row{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:36px;
height:36px;
background:white;
color:#4b2dd8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* CHART CARD */
.chart-card{
margin:12px;
padding:15px;
background:white;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.chart{
position:relative;
height:160px;
display:flex;
align-items:flex-end;
justify-content:space-around;
}

/* BARS */
.bar{
width:18%;
border-radius:8px;
background:linear-gradient(180deg,#9fd3ff,#0052cc);
}

/* LINE */
svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

circle{
fill:white;
stroke:#f4a300;
stroke-width:3;
}

/* COIN */
.coin{
position:absolute;
top:-10px;
right:10px;
width:45px;
height:45px;
background:#f4a300;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* CONTENT */
.content{
padding:10px 15px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* BUTTON */
.card{
background:white;
border-radius:16px;
padding:16px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
cursor:pointer;
}

.circle{
width:50px;
height:50px;
background:#4b2dd8;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="top">
<div class="top-row">
<div class="icon">₹</div>
<h2>Salary Menu</h2>
</div>
</div>

<!-- 🔥 CHART -->
<div class="chart-card">
<div class="chart" id="chart"></div>
<div class="coin">₹</div>
</div>

<!-- BUTTONS -->
<div class="content">
<div class="grid">

<div class="card" onclick="showLoader('salary.html')">
<div class="circle">💰</div>
<p>Salary</p>
</div>

<div class="card" onclick="showLoader('reports_menu.html')">
<div class="circle">📊</div>
<p>Reports</p>
</div>

<div class="card" onclick="showLoader('holidays.html')">
<div class="circle">🎉</div>
<p>Holiday List</p>
</div>

</div>
</div>

<script>

// LOAD CSV (place your CSV file in same folder)
fetch("salary.csv")
.then(res => res.text())
.then(data => {

let rows = data.split("\n").slice(1);

let monthly = {};

rows.forEach(r=>{
let cols = r.split(",");

let month = cols[2];

// earnings (adjust indexes if needed)
let earnings =
Number(cols[3]) + Number(cols[4]) + Number(cols[5]) +
Number(cols[6]) + Number(cols[7]) + Number(cols[8]) +
Number(cols[9]) + Number(cols[10]) + Number(cols[11]);

// deductions
let deductions =
Number(cols[20]) + Number(cols[21]) + Number(cols[22]) +
Number(cols[23]) + Number(cols[24]) + Number(cols[25]);

let net = earnings - deductions;

monthly[month] = net;
});

// CREATE CHART
let values = Object.values(monthly);
let max = Math.max(...values);

let chart = document.getElementById("chart");

values.forEach((v,i)=>{
let bar = document.createElement("div");
bar.className="bar";
bar.style.height = (v/max*100)+"%";
chart.appendChild(bar);
});

// LINE SVG
let svg = document.createElementNS("http://www.w3.org/2000/svg","svg");

let points = values.map((v,i)=>{
let x = (i/(values.length-1))*100;
let y = 100-(v/max*100);
return `${x},${y}`;
}).join(" ");

let poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");
poly.setAttribute("points",points);
poly.setAttribute("fill","none");
poly.setAttribute("stroke","#f4a300");
poly.setAttribute("stroke-width","3");

svg.appendChild(poly);

chart.appendChild(svg);

});

function showLoader(url){
window.location=url;
}

</script>

</body>
</html>
