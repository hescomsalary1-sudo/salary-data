<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

/* TITLE */
.title{
padding:25px 20px 10px;
font-size:28px;
font-weight:600;
color:#2d3748;
}

/* TOP SECTION */
.top{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:0 20px;
}

/* CARD BASE */
.card{
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
border-radius:25px;
padding:18px;
box-shadow:
10px 10px 25px rgba(0,0,0,0.08),
-10px -10px 25px rgba(255,255,255,0.9);
position:relative;
}

/* SALARY BOX */
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
padding:15px;
border-radius:14px;
background:#e9edf4;
box-shadow: inset 4px 4px 10px rgba(0,0,0,0.05),
            inset -4px -4px 10px rgba(255,255,255,0.8);
}

.box h4{
margin:0;
font-size:14px;
color:#6b7280;
}

.box p{
margin:5px 0 0;
font-size:22px;
font-weight:600;
}

.blue{color:#2b6cb0;}
.red{color:#c53030;}
.green{color:#2f855a;}

.net{
margin-top:12px;
padding:18px;
border-radius:14px;
background:#e9edf4;
box-shadow: inset 4px 4px 10px rgba(0,0,0,0.05),
            inset -4px -4px 10px rgba(255,255,255,0.8);
}

/* FLOAT ₹ */
.float{
position:absolute;
left:50%;
top:60%;
transform:translate(-50%,-50%);
width:60px;
height:60px;
border-radius:50%;
background:#eef2f7;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:#2b6cb0;
box-shadow:
8px 8px 18px rgba(0,0,0,0.15),
-8px -8px 18px rgba(255,255,255,0.9);
}

/* CHART */
.chart{
position:relative;
height:220px;
display:flex;
align-items:flex-end;
justify-content:space-around;
}

/* BARS */
.bar{
width:18%;
border-radius:12px;
background:linear-gradient(180deg,
rgba(173,216,230,0.5),
rgba(0,102,204,0.95));
box-shadow:inset 0 0 10px rgba(255,255,255,0.4);
}

.bar:nth-child(1){height:60%;}
.bar:nth-child(2){height:70%;}
.bar:nth-child(3){height:80%;}
.bar:nth-child(4){height:90%;}

/* LINE */
.line{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

.line circle{
fill:white;
stroke:#f4a300;
stroke-width:3;
}

/* COIN */
.coin{
position:absolute;
top:-15px;
right:20px;
width:65px;
height:65px;
border-radius:50%;
background:linear-gradient(145deg,#ffd54f,#f4a300);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

/* BUTTON GRID */
.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:25px 20px;
}

/* BUTTON */
.btn{
padding:25px;
border-radius:25px;
background:linear-gradient(145deg,#eef2f7,#dfe5ef);
text-align:center;
box-shadow:
12px 12px 25px rgba(0,0,0,0.1),
-12px -12px 25px rgba(255,255,255,0.9);
transition:0.3s;
cursor:pointer;
}

.btn:active{
transform:scale(0.94);
}

/* ICON BOX */
.icon{
width:70px;
height:70px;
margin:auto;
border-radius:20px;
margin-bottom:12px;
box-shadow:
6px 6px 15px rgba(0,0,0,0.15),
-6px -6px 15px rgba(255,255,255,0.9);
}

/* COLORS */
.blue-bg{background:linear-gradient(145deg,#90cdf4,#3182ce);}
.purple-bg{background:linear-gradient(145deg,#b794f4,#6b46c1);}
.orange-bg{background:linear-gradient(145deg,#f6ad55,#dd6b20);}
.green-bg{background:linear-gradient(145deg,#68d391,#2f855a);}

.btn p{
margin:0;
font-weight:600;
color:#4a5568;
font-size:14px;
}

</style>
</head>

<body>

<div class="title">Salary Overview</div>

<div class="top">

<!-- LEFT CARD -->
<div class="card">

<div class="grid2">
<div class="box">
<h4>Current Salary</h4>
<p class="blue">₹85,000</p>
</div>

<div class="box">
<h4>Deductions</h4>
<p class="red">₹5,000</p>
</div>
</div>

<div class="net">
<h4>Net Salary:</h4>
<p class="green" style="font-size:28px;">₹80,000</p>
</div>

<div class="float">₹</div>

</div>

<!-- RIGHT CHART -->
<div class="card">

<div class="chart">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

<svg class="line" viewBox="0 0 300 150">
<polyline points="20,110 90,80 150,80 220,50 280,20"
fill="none" stroke="#f4a300" stroke-width="3"/>

<circle cx="20" cy="110" r="5"/>
<circle cx="90" cy="80" r="5"/>
<circle cx="150" cy="80" r="5"/>
<circle cx="220" cy="50" r="5"/>
<circle cx="280" cy="20" r="5"/>
</svg>

<div class="coin">₹</div>

</div>

</div>

</div>

<!-- BUTTONS -->
<div class="buttons">

<div class="btn" onclick="alert('View Payslip')">
<div class="icon blue-bg"></div>
<p>View Payslip</p>
</div>

<div class="btn" onclick="alert('Salary Breakdown')">
<div class="icon purple-bg"></div>
<p>Salary Breakdown</p>
</div>

<div class="btn" onclick="alert('Allowances')">
<div class="icon orange-bg"></div>
<p>Allowances & Deductions</p>
</div>

<div class="btn" onclick="alert('Download')">
<div class="icon green-bg"></div>
<p>Download Payslip</p>
</div>

</div>

</body>
</html>
