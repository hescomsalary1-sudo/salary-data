<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Menu</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#e9efff,#dfe7f5);
}

/* HEADER */
.top{
padding:18px;
text-align:center;
font-size:20px;
font-weight:700;
}

/* FLEX MAIN */
.chart-flex{
display:flex;
gap:15px;
padding:12px;
}

/* PIE */
.pie-box{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.pie{
width:140px;
height:140px;
border-radius:50%;
}

/* RIGHT DETAILS */
.details-box{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.detail{
background:#fff;
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
font-size:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.net{
background:#1e63ff;
color:white;
font-weight:bold;
}

/* DEDUCTION LIST */
.list{
margin-top:10px;
font-size:13px;
max-height:150px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
padding:4px 0;
}

/* BUTTONS */
.buttons{
padding:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
background:#f4f7fc;
padding:14px;
border-radius:15px;
display:flex;
justify-content:space-between;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
cursor:pointer;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
justify-content:center;
align-items:center;
}

.spinner{
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid #1e63ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:600px){
.chart-flex{
flex-direction:row;
}
}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<div class="top">Salary Overview</div>

<div class="chart-flex">

<!-- LEFT PIE -->
<div class="pie-box">
<div id="pie" class="pie"></div>
</div>

<!-- RIGHT DETAILS -->
<div class="details-box">

<div class="detail">Earnings <b id="earn">₹0</b></div>
<div class="detail">Deductions <b id="ded">₹0</b></div>
<div class="detail net">Net <b id="net">₹0</b></div>

<div class="list" id="list"></div>

</div>

</div>

<!-- BUTTONS -->
<div class="buttons">
<div class="btn" onclick="go('salary.html')">Salary ›</div>
<div class="btn" onclick="go('reports_menu.html')">Reports ›</div>
<div class="btn" onclick="go('holidays.html')">Holidays ›</div>
<div class="btn" onclick="go('assets_liability.html')">Assets ›</div>
</div>

<script>
const loader=document.getElementById("loader");

function go(p){
loader.style.display="flex";
setTimeout(()=>location=p,600);
}

let user=localStorage.getItem("currentUser");

/* PREVIOUS MONTH */
let d=new Date();
d.setMonth(d.getMonth()-1);
let year=d.getFullYear();
let month=String(d.getMonth()+1).padStart(2,"0");

fetch("https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv")
.then(r=>r.text())
.then(data=>{

let rows=data.trim().split("\n");
let row=null;

for(let i=1;i<rows.length;i++){
let c=rows[i].split(",");
if(c[0]===user && c[1]==year && c[2]==month){
row=c; break;
}
}

if(!row){
loader.style.display="none";
return;
}

function num(v){return Number(v)||0}

/* EARNINGS */
let earn=0;
for(let i=3;i<=19;i++) earn+=num(row[i]);

/* DEDUCTIONS */
let names=[
"LIC","IT","PT","Society","PLI","Union","SC/ST","Rent",
"Bank","Family","Festival","PC10","PC14","LWF","Recovery","Other"
];

let deductions=[];
for(let i=20;i<=35;i++){
let v=num(row[i]);
if(v>0) deductions.push({name:names[i-20],value:v});
}

let totalDed=deductions.reduce((a,b)=>a+b.value,0);
let net=earn-totalDed;

/* UI */
document.getElementById("earn").innerText="₹"+earn;
document.getElementById("ded").innerText="₹"+totalDed;
document.getElementById("net").innerText="₹"+net;

/* PIE */
let dataArr=[{name:"Earnings",value:earn,color:"#00c853"},
...deductions.map((d,i)=>({
name:d.name,value:d.value,color:`hsl(${i*25},70%,50%)`
}))];

let total=dataArr.reduce((a,b)=>a+b.value,0);
let angle=0,grad=[];

dataArr.forEach(d=>{
let p=(d.value/total)*100;
grad.push(`${d.color} ${angle}% ${angle+p}%`);
angle+=p;
});

document.getElementById("pie").style.background=
`conic-gradient(${grad.join(",")})`;

/* LIST */
let html="";
deductions.forEach(d=>{
html+=`<div class="item">${d.name}<span>₹${d.value}</span></div>`;
});
document.getElementById("list").innerHTML=html;

loader.style.display="none";

})
.catch(()=>{
loader.style.display="none";
});
</script>

</body>
</html>
