<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Overview</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#e9efff,#dfe7f5);
}

/* HEADER */
.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
}

.top-title{
font-size:20px;
font-weight:700;
}

.icon-btn{
width:45px;
height:45px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

/* SUMMARY */
.summary{
display:flex;
gap:10px;
padding:10px;
}

.card{
flex:1;
background:#f4f7fc;
border-radius:20px;
padding:12px;
display:flex;
gap:10px;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.icon{
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.green{background:linear-gradient(135deg,#4facfe,#00c853);}
.red{background:linear-gradient(135deg,#ff4d6d,#ff1744);}

/* NET */
.net-card{
margin:10px;
padding:20px;
border-radius:25px;
background:linear-gradient(135deg,#1e63ff,#0039cb);
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHART */
.chart-card{
margin:10px;
background:#f4f7fc;
border-radius:20px;
padding:10px;
}

.chart{
height:160px;
display:flex;
align-items:flex-end;
gap:5px;
position:relative;
}

.bar{
width:10px;
background:blue;
border-radius:5px;
}

.line{
position:absolute;
width:100%;
height:100%;
}

/* BUTTONS */
.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.btn{
background:#f4f7fc;
padding:15px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader-spin{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #1e63ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-spin"></div>
</div>

<!-- HEADER -->
<div class="top">
<div class="icon-btn" onclick="goBack()">⬅</div>
<div class="top-title">Salary overview</div>
<div class="icon-btn">🔔</div>
</div>

<!-- SUMMARY -->
<div class="summary">
<div class="card">
<div class="icon green">💼</div>
<div>
<div>Last Month</div>
<div id="currentSalary">₹ 0</div>
</div>
</div>

<div class="card">
<div class="icon red">⬇</div>
<div>
<div>Deductions</div>
<div id="deduction">₹ 0</div>
</div>
</div>
</div>

<!-- NET -->
<div class="net-card">
<div>
<div>Net Salary</div>
<div id="netSalary">₹ 0</div>
</div>
<div>💰</div>
</div>

<!-- CHART -->
<div class="chart-card">
<h3>Salary Growth</h3>

<div style="display:flex;">
<div id="yAxis" style="width:40px;font-size:10px;"></div>

<div style="flex:1;">
<div class="chart" id="chart">
<svg id="line" class="line"></svg>
</div>
<div id="xAxis" style="display:flex;justify-content:space-around;font-size:10px;"></div>
</div>

</div>
</div>

<!-- BUTTONS -->
<div class="buttons">

<div class="btn" onclick="showLoader('salary.html')">
<span>Salary</span> ›
</div>

<div class="btn" onclick="showLoader('reports_menu.html')">
<span>Reports</span> ›
</div>

<div class="btn" onclick="showLoader('holidays.html')">
<span>Holiday</span> ›
</div>

<div class="btn" onclick="showLoader('assets_liability.html')">
<span>Assets</span> ›
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let user = localStorage.getItem("currentUser");
let loader = document.getElementById("loader");
if(loader) loader.style.display="flex";

let url = "https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv";

function showLoader(url){
if(loader) loader.style.display="flex";
setTimeout(()=>{ window.location=url },800);
}

window.showLoader = showLoader;

fetch(url)
.then(res => res.text())
.then(data => {

let rows = data.trim().split("\n").slice(1);
let monthly = [];

rows.forEach(r=>{
let cols = r.split(",");
if(cols[0] !== user) return;

let year = Number(cols[1]);
let month = Number(cols[2]);

let earnings = 0;
for(let i=3;i<=19;i++) earnings += Number(cols[i]) || 0;

let deductions = 0;
for(let i=20;i<cols.length;i++) deductions += Number(cols[i])||0;

let net = earnings - deductions;
monthly.push({year,month,net,earnings,deductions});
});

monthly.sort((a,b)=> (a.year*100+a.month)-(b.year*100+b.month));

let last = monthly.length>=2 ? monthly[monthly.length-2] : monthly[0];

if(last){
document.getElementById("currentSalary").innerText="₹ "+last.earnings;
document.getElementById("deduction").innerText="₹ "+last.deductions;
document.getElementById("netSalary").innerText="₹ "+last.net;
}

let chart=document.getElementById("chart");
let line=document.getElementById("line");
let yAxis=document.getElementById("yAxis");
let xAxis=document.getElementById("xAxis");

chart.innerHTML="";
line.innerHTML="";
yAxis.innerHTML="";
xAxis.innerHTML="";

let last12 = monthly.slice(-12);
let values = last12.map(m=>m.net);

let max = Math.max(...values);
let step=25000;
let yMax = Math.ceil(max/step)*step;

for(let i=yMax;i>=0;i-=step){
let d=document.createElement("div");
d.innerText=(i/1000)+"K";
yAxis.appendChild(d);
}

values.forEach(v=>{
let bar=document.createElement("div");
bar.className="bar";
bar.style.height=(v/yMax)*100+"%";
chart.appendChild(bar);
});

let points=values.map((v,i)=>{
let x=(i/(values.length-1))*300;
let y=150-(v/yMax)*120;
return `${x},${y}`;
}).join(" ");

let poly=document.createElementNS("http://www.w3.org/2000/svg","polyline");
poly.setAttribute("points",points);
poly.setAttribute("stroke","orange");
poly.setAttribute("fill","none");

line.appendChild(poly);

if(loader) loader.style.display="none";

});

window.goBack = function(){
window.history.back();
}

});
</script>

</body>
</html>
