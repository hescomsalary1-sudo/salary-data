<!DOCTYPE html>
<html>
<head>
<title>Forms & Formats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  background: linear-gradient(135deg,#eef2ff,#f3e8ff);
  padding-bottom:90px;
}

/* HEADER */
.top{
  padding:25px 20px 30px;
  background: linear-gradient(135deg,#6c39ff,#4b2dd8);
  color:white;
  display:flex;
  align-items:center;
  gap:12px;
  border-radius:0 0 35px 35px;
}

.top .icon{
  width:40px;
  height:40px;
  background:white;
  color:#4b2dd8;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.top h2{
  margin:0;
  font-size:20px;
}

/* CONTENT */
.content{
  padding:16px;
}

/* GRID (SMALL CARDS) */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* SMALL CARD */
.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  padding:14px 10px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card:active{
  transform:scale(0.95);
}

/* ICON */
.card span{
  font-size:24px;
}

/* TEXT */
.card p{
  margin-top:6px;
  font-size:12px;
  font-weight:600;
  color:#4b2dd8;
}

/* 🔥 EXTRA SECTION */
.extra-box{
  margin-top:20px;
  background:white;
  padding:18px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.extra-box h3{
  margin:0 0 10px;
  font-size:15px;
  color:#4b2dd8;
}

.extra-box p{
  margin:5px 0;
  font-size:13px;
  color:#666;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ffffff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 15px rgba(0,0,0,0.1);
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

.footer a{
  text-decoration:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#777;
  font-size:18px;
}

.footer small{
  font-size:12px;
}

.footer a.active{
  color:#4b2dd8;
  font-weight:600;
}

/* PDF MODAL (UNCHANGED) */
.pdf-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.pdf-box{
width:90%;
height:85%;
background:white;
border-radius:18px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.pdf-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#4b2dd8;
color:white;
font-weight:600;
}

.pdf-header button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

#pdfFrame{
flex:1;
border:none;
}

.pdf-actions{
padding:10px;
text-align:center;
}

.pdf-actions button{
padding:10px 20px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<div class="icon">📄</div>
<h2>Forms & Formats</h2>
</div>

<!-- CONTENT -->
<div class="content">

<div class="grid">

<div class="card" onclick="openPDF('els_format.pdf')"><span>📘</span><p>ELS</p></div>
<div class="card" onclick="openPDF('medical_bill.pdf')"><span>🏥</span><p>Medical</p></div>
<div class="card" onclick="openPDF('leave_format.pdf')"><span>📝</span><p>Leave</p></div>
<div class="card" onclick="openPDF('salary_bill.pdf')"><span>💰</span><p>Salary</p></div>
<div class="card" onclick="openPDF('cr_format.pdf')"><span>📑</span><p>CR</p></div>
<div class="card" onclick="openPDF('group_pr_format.pdf')"><span>👥</span><p>PR</p></div>
<div class="card" onclick="openPDF('performance_report.pdf')"><span>📊</span><p>Report</p></div>
<div class="card" onclick="openPDF('ta_bill_format.pdf')"><span>🚗</span><p>TA</p></div>
<div class="card" onclick="openPDF('other_format.pdf')"><span>📂</span><p>Other</p></div>

</div>

<!-- 🔥 EXTRA MODERN SECTION -->
<div class="extra-box">
<h3>📌 Quick Info</h3>
<p>• Tap any format to preview before opening</p>
<p>• Use "Open Full" for download or print</p>
<p>• Keep documents updated regularly</p>
</div>

</div>

<!-- PDF MODAL -->
<div id="pdfModal" class="pdf-modal">
  <div class="pdf-box">
    <div class="pdf-header">
      <span>PDF Preview</span>
      <button onclick="closePDF()">✖</button>
    </div>
    <iframe id="pdfFrame"></iframe>
    <div class="pdf-actions">
      <button onclick="openFullPDF()">Open Full</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html">🏠<small>Home</small></a>
<a href="page1.html">👤<small>Profile</small></a>
<a href="salary.html">💰<small>Salary</small></a>
<a href="page3.html">📅<small>Attendance</small></a>
<a href="page4.html" class="active">⚙<small>Formats</small></a>
</div>

<script>

let currentPDF = "";

function openPDF(file){
currentPDF = "https://hescomsalary1-sudo.github.io/salary-data/" + file;
document.getElementById("pdfFrame").src = currentPDF;
document.getElementById("pdfModal").style.display = "flex";
}

function closePDF(){
document.getElementById("pdfModal").style.display = "none";
document.getElementById("pdfFrame").src = "";
}

function openFullPDF(){
window.location.href = currentPDF;
}

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

</script>

</body>
</html>
