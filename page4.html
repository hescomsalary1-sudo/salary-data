<!DOCTYPE html>
<html>
<head>
<title>Forms & Formats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary-color: #4b2dd8;
  --bg-gradient: linear-gradient(160deg, #f0f3f9 0%, #e8eef6 100%);
  --card-bg: rgba(255, 255, 255, 0.8);
  --text-main: #2d3436;
  --text-muted: #636e72;
}

body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
  background: var(--bg-gradient);
  min-height: 100vh;
  padding-bottom: 40px;
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER - Updated with Back Button */
.top {
  padding: 45px 20px 30px;
  background: white;
  color: var(--primary-color);
  display: flex;
  align-items: center;
  gap: 12px;
  border-radius: 0 0 40px 40px;
  box-shadow: 0 10px 30px rgba(75, 45, 216, 0.05);
  position: sticky;
  top: 0;
  z-index: 100;
}

.back-btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
  color: var(--text-main);
}

.back-btn:active {
  background: rgba(0, 0, 0, 0.05);
  transform: scale(0.9);
}

.top .icon {
  width: 40px;
  height: 40px;
  background: var(--primary-color);
  color: white;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px rgba(75, 45, 216, 0.2);
}

.top h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  flex-grow: 1;
}

/* CONTENT */
.content { padding: 20px; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* CARD */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 24px 16px;
  border-radius: 24px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow: 0 12px 24px rgba(149, 157, 165, 0.1);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideUp 0.5s ease forwards;
  opacity: 0;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:active { transform: scale(0.94); }

.card span {
  font-size: 32px;
  display: block;
  margin-bottom: 12px;
}

.card p {
  margin: 0;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text-main);
}

/* INFO BOX */
.info-box {
  margin-top: 25px;
  background: white;
  padding: 20px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}

.info-box h3 { margin: 0 0 10px; font-size: 16px; color: var(--primary-color); }
.info-box p { margin: 6px 0; font-size: 13px; color: var(--text-muted); }

/* DARK MODE */
.dark-mode {
  background: #000;
  color: #fff;
  --text-main: #fff;
}
.dark-mode .top { background: #111; color: #fff; }
.dark-mode .back-btn { color: #fff; }
.dark-mode .card { background: #1a1a1a; border-color: #333; }
.dark-mode .info-box { background: #1a1a1a; }

</style>
</head>

<body>

<div class="top">
  <div class="back-btn" onclick="history.back()">❮</div>
  <div class="icon">📄</div>
  <h2>Forms & Formats</h2>
</div>

<div class="content">

<div class="grid">
    <div class="card" onclick="openPDF('els_format.pdf')">
        <span>📘</span>
        <p>ELS Format</p>
    </div>

    <div class="card" onclick="openPDF('medical_bill.pdf')">
        <span>🏥</span>
        <p>Medical Bill</p>
    </div>

    <div class="card" onclick="openPDF('leave_format.pdf')">
        <span>📝</span>
        <p>Leave Format</p>
    </div>

    <div class="card" onclick="openPDF('salary_bill.pdf')">
        <span>💰</span>
        <p>Salary Bill</p>
    </div>

    <div class="card" onclick="openPDF('cr_format.pdf')">
        <span>📑</span>
        <p>CR Format</p>
    </div>

    <div class="card" onclick="openPDF('group_pr_format.pdf')">
        <span>👥</span>
        <p>Group A & B</p>
    </div>

    <div class="card" onclick="openPDF('performance_report.pdf')">
        <span>📊</span>
        <p>Performance</p>
    </div>

    <div class="card" onclick="openPDF('ta_bill_format.pdf')">
        <span>🚗</span>
        <p>TA Bill</p>
    </div>

    <div class="card" onclick="openPDF('other_format.pdf')" style="grid-column: span 2;">
        <span>📂</span>
        <p>Other Formats</p>
    </div>
</div>

<div class="info-box">
    <h3>📌 Quick Tips</h3>
    <p>• Tap any card to open PDF</p>
    <p>• Use these formats for official work</p>
</div>

</div>

<script>
function openPDF(file){
    const url="https://hescomsalary1-sudo.github.io/salary-data/"+file;
    window.location.href=url;
}

if(localStorage.getItem("darkMode")==="true"){
    document.body.classList.add("dark-mode");
}
</script>

</body>
</html>
