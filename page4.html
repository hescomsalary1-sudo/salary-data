<!DOCTYPE html>
<html>
<head>
<title>Forms & Formats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary-color: #4b2dd8;
  --bg-gradient: linear-gradient(160deg, #f0f3f9 0%, #e8eef6 100%);
  --card-bg: rgba(255, 255, 255, 0.8);
  --text-main: #2d3436;
  --text-muted: #636e72;
}

body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
  background: var(--bg-gradient);
  min-height: 100vh;
  padding-bottom: 40px;
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
.top {
  padding: 45px 20px 30px;
  background: white;
  color: var(--primary-color);
  display: flex;
  align-items: center;
  gap: 12px;
  border-radius: 0 0 40px 40px;
  box-shadow: 0 10px 30px rgba(75, 45, 216, 0.05);
  position: sticky;
  top: 0;
  z-index: 100;
}

.back-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; border-radius: 12px;
  transition: 0.2s; color: var(--text-main);
}

.top .icon {
  width: 40px; height: 40px;
  background: var(--primary-color); color: white;
  border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 20px;
}

.top h2 { margin: 0; font-size: 20px; font-weight: 700; flex-grow: 1; }

/* CONTENT */
.content { padding: 20px; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* CARD with Spinner Logic */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 24px 16px;
  border-radius: 24px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow: 0 12px 24px rgba(149, 157, 165, 0.1);
  cursor: pointer;
  position: relative; /* For spinner positioning */
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

.card:active { transform: scale(0.94); }

.card span { font-size: 32px; display: block; margin-bottom: 12px; transition: 0.3s; }
.card p { margin: 0; font-size: 13.5px; font-weight: 600; color: var(--text-main); transition: 0.3s; }

/* SPINNER ELEMENT */
.spinner {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 28px;
  height: 28px;
  border: 3px solid rgba(75, 45, 216, 0.2);
  border-top: 3px solid var(--primary-color);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  z-index: 2;
}

@keyframes spin {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* LOADING STATE */
.card.is-loading span, .card.is-loading p {
  opacity: 0.1;
  filter: blur(2px);
}
.card.is-loading .spinner {
  display: block;
}

/* INFO BOX */
.info-box {
  margin-top: 25px;
  background: white;
  padding: 20px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}
.info-box h3 { margin: 0 0 10px; font-size: 16px; color: var(--primary-color); }
.info-box p { margin: 6px 0; font-size: 13px; color: var(--text-muted); }

</style>
</head>

<body>

<div class="top">
  <div class="back-btn" onclick="history.back()">❮</div>
  <div class="icon">📄</div>
  <h2>Forms & Formats</h2>
</div>

<div class="content">

<div class="grid">
    <div class="card" onclick="openPDF(this, 'els_format.pdf')">
        <div class="spinner"></div>
        <span>📘</span>
        <p>ELS Format</p>
    </div>

    <div class="card" onclick="openPDF(this, 'medical_bill.pdf')">
        <div class="spinner"></div>
        <span>🏥</span>
        <p>Medical Bill</p>
    </div>

    <div class="card" onclick="openPDF(this, 'leave_format.pdf')">
        <div class="spinner"></div>
        <span>📝</span>
        <p>Leave Format</p>
    </div>

    <div class="card" onclick="openPDF(this, 'salary_bill.pdf')">
        <div class="spinner"></div>
        <span>💰</span>
        <p>Salary Bill</p>
    </div>

    <div class="card" onclick="openPDF(this, '')">
        <div class="spinner"></div>
        <span>📑</span>
        <p>CR Format</p>
    </div>

    <div class="card" onclick="openPDF(this, 'performance_report.pdf')">
        <div class="spinner"></div>
        <span>👥</span>
        <p>Group A & B</p>
    </div>

    <div class="card" onclick="openPDF(this, 'performance_report.pdf')">
        <div class="spinner"></div>
        <span>📊</span>
        <p>Performance</p>
    </div>

    <div class="card" onclick="openPDF(this, 'ta_bill_format.pdf')">
        <div class="spinner"></div>
        <span>🚗</span>
        <p>TA Bill</p>
    </div>
</div>

<div class="info-box">
    <h3>📌 Quick Tips</h3>
    <p>• Tap any card to download PDF</p>
    <p>• A spinner will appear while the file is being fetched</p>
</div>

</div>

<script>
function openPDF(card, file){
    // Check if file is empty
    if(!file || file.trim() === ""){
        alert("No data found for this file.");
        return;
    }

    // Start loading animation
    card.classList.add('is-loading');
    card.style.pointerEvents = 'none';

    const baseUrl = "https://hescomsalary1-sudo.github.io/salary-data/";
    const url = baseUrl + file;

    // Create a hidden download link to force .pdf extension
    const link = document.createElement('a');
    link.href = url;
    link.download = file; // Forces browser to keep .pdf extension
    document.body.appendChild(link);

    // Simulate a small delay so the beautiful spinner is visible
    setTimeout(() => {
        link.click();
        document.body.removeChild(link);

        // Reset the card after download starts
        setTimeout(() => {
            card.classList.remove('is-loading');
            card.style.pointerEvents = 'auto';
        }, 1500);
    }, 800);
}

if(localStorage.getItem("darkMode")==="true"){
    document.body.classList.add("dark-mode");
}
</script>

</body>
</html>
