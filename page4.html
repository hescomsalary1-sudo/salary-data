<!DOCTYPE html>
<html>
<head>
<title>Forms & Formats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  background: linear-gradient(135deg,#eef2ff,#f3e8ff);
  padding-bottom:90px;
}

/* HEADER */
.top{
  padding:25px 20px 30px;
  background: linear-gradient(135deg,#6c39ff,#4b2dd8);
  color:white;
  display:flex;
  align-items:center;
  gap:12px;
  border-radius:0 0 35px 35px;
}

.top .icon{
  width:40px;
  height:40px;
  background:white;
  color:#4b2dd8;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.top h2{
  margin:0;
  font-size:20px;
}

/* CONTENT */
.content{
  padding:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.25s;
}

/* HOVER */
.card:hover{
  transform:translateY(-4px);
}

/* CLICK */
.card:active{
  transform:scale(0.96);
}

/* ICON */
.card span{
  font-size:32px;
  display:block;
}

/* TEXT */
.card p{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color:#4b2dd8;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ffffff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 15px rgba(0,0,0,0.1);
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

.footer a{
  text-decoration:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#777;
  font-size:18px;
}

.footer small{
  font-size:12px;
  margin-top:3px;
}

/* ACTIVE FOOTER */
.footer a.active{
  color:#4b2dd8;
  font-weight:600;
}

/* DARK MODE */
.dark-mode{
  background:#121212;
  color:white;
}

.dark-mode .card{
  background:#1f1f1f;
  color:white;
}

.dark-mode .footer{
  background:#1a1a1a;
}

.dark-mode .footer a{
  color:white;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<div class="icon">📄</div>
<h2>Forms & Formats</h2>
</div>

<!-- CONTENT -->
<div class="content">

<div class="grid">

<div class="card" onclick="openPDF('els_format.pdf')">
<span>📘</span>
<p>ELS Format</p>
</div>

<div class="card" onclick="openPDF('medical_bill.pdf')">
<span>🏥</span>
<p>Medical Bill</p>
</div>

<div class="card" onclick="openPDF('leave_format.pdf')">
<span>📝</span>
<p>All Leave Format</p>
</div>

<div class="card" onclick="openPDF('salary_bill.pdf')">
<span>💰</span>
<p>Salary Bill</p>
</div>

<div class="card" onclick="openPDF('cr_format.pdf')">
<span>📑</span>
<p>CR Format</p>
</div>

<div class="card" onclick="openPDF('group_pr_format.pdf')">
<span>👥</span>
<p>Group A & B PR</p>
</div>

<div class="card" onclick="openPDF('performance_report.pdf')">
<span>📊</span>
<p>Performance Report</p>
</div>

<div class="card" onclick="openPDF('ta_bill_format.pdf')">
<span>🚗</span>
<p>TA Bill Format</p>
</div>

<div class="card" onclick="openPDF('other_format.pdf')">
<span>📂</span>
<p>Other Formats</p>
</div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html">🏠<small>Home</small></a>
<a href="page1.html">👤<small>Profile</small></a>
<a href="salary.html">💰<small>Salary</small></a>
<a href="page3.html">📅<small>Attendance</small></a>
<a href="page4.html" class="active">⚙<small>Formats</small></a>
</div>

<script>

function openPDF(file){
const url="https://hescomsalary1-sudo.github.io/salary-data/"+file;
window.location.href=url;
}

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

</script>

</body>
</html>
