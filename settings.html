<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>

body{
font-family:'Segoe UI', sans-serif;
margin:0;
background:#f5f6fb;
}

/* PAGE ANIMATION */
#appPage{
transform:translateX(-100%);
transition:0.35s ease;
min-height:100vh;
}

/* HEADER */
.header{
background:#2400b7;
color:white;
padding:20px;
font-size:20px;
font-weight:600;
display:flex;
align-items:center;
gap:15px;
}

.back{
font-size:22px;
cursor:pointer;
}

/* LIST */
.list{
padding:12px;
}

/* ITEM */
.item{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.item:active{
transform:scale(0.97);
}

.left{
display:flex;
align-items:center;
gap:12px;
font-weight:600;
}

.icon{
width:36px;
height:36px;
border-radius:10px;
background:#eef0ff;
display:flex;
align-items:center;
justify-content:center;
}

/* EXPAND */
.expand{
max-height:0;
overflow:hidden;
transition:0.3s ease;
padding:0 5px;
}

.expand.active{
max-height:250px;
padding-top:10px;
}

/* INPUT */
.input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:8px;
}

/* BUTTON */
.btn{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2400b7;
color:white;
font-weight:bold;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.popup-box{
background:white;
padding:20px;
border-radius:16px;
width:85%;
max-width:320px;
text-align:center;
}

.popup-btn{
margin-top:15px;
display:flex;
gap:10px;
}

.popup-btn button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

.cancel{
background:#eee;
}

.confirm{
background:#2400b7;
color:white;
}

</style>
</head>

<body>

<div id="appPage">

<!-- HEADER -->
<div class="header">
<div class="back" onclick="goBack()">←</div>
Settings
</div>

<div class="list">

<!-- CHANGE PASSWORD -->
<div class="item" onclick="toggleExpand('passBox')">
<div class="left">
<div class="icon">🔐</div> Change Password
</div>
<span>›</span>
</div>

<div class="expand" id="passBox">
<input type="password" id="newPass" class="input" placeholder="Enter new password">
<button class="btn" onclick="changePassword()">Update Password</button>
</div>

<!-- UPDATE NAME -->
<div class="item" onclick="toggleExpand('nameBox')">
<div class="left">
<div class="icon">👤</div> Update Name
</div>
<span>›</span>
</div>

<div class="expand" id="nameBox">
<input type="text" id="newName" class="input" placeholder="Enter new name">
<button class="btn" onclick="updateName()">Save Name</button>
</div>

<!-- CLEAR CACHE -->
<div class="item" onclick="openPopup('cachePopup')">
<div class="left">
<div class="icon">🧹</div> Clear App Data
</div>
<span>›</span>
</div>

<!-- DOWNLOAD DATA -->
<div class="item" onclick="downloadData()">
<div class="left">
<div class="icon">⬇️</div> Download My Data
</div>
</div>

<!-- APP VERSION -->
<div class="item">
<div class="left">
<div class="icon">ℹ️</div> App Version
</div>
<span>v1.0</span>
</div>

<!-- LOGOUT -->
<div class="item" onclick="openPopup('logoutPopup')">
<div class="left">
<div class="icon">🚪</div> Logout
</div>
<span>›</span>
</div>

</div>

</div>

<!-- POPUPS -->

<div class="popup" id="cachePopup">
<div class="popup-box">
<h3>Clear App Data?</h3>
<p>This will remove all stored data</p>
<div class="popup-btn">
<button class="cancel" onclick="closePopup()">Cancel</button>
<button class="confirm" onclick="clearData()">Clear</button>
</div>
</div>
</div>

<div class="popup" id="logoutPopup">
<div class="popup-box">
<h3>Logout?</h3>
<p>Are you sure you want to logout?</p>
<div class="popup-btn">
<button class="cancel" onclick="closePopup()">Cancel</button>
<button class="confirm" onclick="logout()">Logout</button>
</div>
</div>
</div>

<script>

/* PAGE OPEN */
window.onload = ()=>{
setTimeout(()=>{
document.getElementById("appPage").style.transform="translateX(0)";
},10);
};

/* BACK */
function goBack(){
document.getElementById("appPage").style.transform="translateX(-100%)";
setTimeout(()=>window.history.back(),300);
}

/* EXPAND */
function toggleExpand(id){
let el = document.getElementById(id);
el.classList.toggle("active");
}

/* PASSWORD */
function changePassword(){
let pass = document.getElementById("newPass").value;

if(pass.length < 4){
alert("Password too short");
return;
}

localStorage.setItem("password", pass);
alert("Password updated");
}

/* NAME */
function updateName(){
let name = document.getElementById("newName").value;

if(name.length < 2){
alert("Enter valid name");
return;
}

localStorage.setItem("userName", name);
alert("Name updated");
}

/* DOWNLOAD DATA */
function downloadData(){
let data = JSON.stringify(localStorage);
let blob = new Blob([data], {type:"application/json"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "my_data.json";
a.click();
}

/* POPUP */
function openPopup(id){
document.getElementById(id).style.display="flex";
}

function closePopup(){
document.querySelectorAll(".popup").forEach(p=>p.style.display="none");
}

/* CLEAR DATA */
function clearData(){
localStorage.clear();
alert("Data cleared");
location.reload();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
window.location="login.html";
}

/* SWIPE BACK */
let startX=0;
document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
},{passive:true});

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(endX < startX - 60){
goBack();
}
});

</script>

</body>
</html>
