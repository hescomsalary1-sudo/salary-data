<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>

body{
font-family:'Segoe UI', sans-serif;
margin:0;
background:#f4f6ff;
}

/* PAGE */
#appPage{
transform:translateX(-100%);
transition:0.35s ease;
min-height:100vh;
}

/* HEADER */
.header{
padding:45px 20px 30px;
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
border-bottom-right-radius:40px;
}

.close-btn{
font-size:26px;
cursor:pointer;
margin-bottom:15px;
}

/* PROFILE */
.profile{
display:flex;
align-items:center;
gap:15px;
}

.profile img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.4);
}

/* SECTION */
.section{
padding:15px;
}

/* CARD */
.card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* ITEM */
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #eee;
}

.item:last-child{
border:none;
}

.left{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.icon{
width:35px;
height:35px;
border-radius:10px;
background:#eef0ff;
display:flex;
align-items:center;
justify-content:center;
}

/* SWITCH */
.switch{
position:relative;
width:45px;
height:24px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
border-radius:20px;
transition:.3s;
}

.slider:before{
position:absolute;
content:"";
height:18px;
width:18px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#2400b7;
}

input:checked + .slider:before{
transform:translateX(20px);
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#2400b7;
color:white;
font-weight:bold;
margin-top:10px;
}

/* LOGOUT */
.logout{
background:#ff3d3d;
}

/* DARK MODE */
.dark{
background:#121212;
color:white;
}

.dark .card{
background:#1e1e1e;
}

</style>
</head>

<body>

<div id="appPage">

<!-- HEADER -->
<div class="header">

<div class="close-btn" onclick="goBack()">✕</div>

<div class="profile">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<div>
<h2 id="userName">User</h2>
<p id="userRole">Employee</p>
</div>
</div>

</div>

<div class="section">

<!-- 🔔 GENERAL -->
<div class="card">

<div class="item">
<div class="left">
<div class="icon">🌙</div> Dark Mode
</div>

<label class="switch">
<input type="checkbox" id="darkToggle">
<span class="slider"></span>
</label>
</div>

<div class="item">
<div class="left">
<div class="icon">🔔</div> Notifications
</div>

<label class="switch">
<input type="checkbox" id="notifyToggle" checked>
<span class="slider"></span>
</label>
</div>

</div>

<!-- 🔐 SECURITY -->
<div class="card">

<div class="item">
<div class="left">
<div class="icon">🔐</div> Change Password
</div>
</div>

<input type="password" placeholder="New Password" id="newPass" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:10px;">

<button class="btn" onclick="changePassword()">Update Password</button>

</div>

<!-- 🧹 APP CONTROL -->
<div class="card">

<div class="item" onclick="clearCache()">
<div class="left">
<div class="icon">🧹</div> Clear Cache
</div>
</div>

<div class="item">
<div class="left">
<div class="icon">📊</div> App Version
</div>
<span>v1.0</span>
</div>

</div>

<!-- 🚪 LOGOUT -->
<button class="btn logout" onclick="logout()">Logout</button>

</div>

</div>

<script>

/* LOAD USER */
document.addEventListener("DOMContentLoaded", ()=>{
let user = localStorage.getItem("currentUser");
document.getElementById("userName").innerText = user || "User";

/* DARK MODE LOAD */
if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark");
document.getElementById("darkToggle").checked = true;
}
});

/* PAGE OPEN */
window.onload = ()=>{
setTimeout(()=>{
document.getElementById("appPage").style.transform="translateX(0)";
},10);
};

/* BACK */
function goBack(){
let page = document.getElementById("appPage");
page.style.transform="translateX(-100%)";
setTimeout(()=>window.history.back(),300);
}

/* DARK MODE */
document.getElementById("darkToggle").addEventListener("change", function(){
if(this.checked){
document.body.classList.add("dark");
localStorage.setItem("darkMode","true");
}else{
document.body.classList.remove("dark");
localStorage.setItem("darkMode","false");
}
});

/* NOTIFICATION */
document.getElementById("notifyToggle").addEventListener("change", function(){
localStorage.setItem("notifications", this.checked);
});

/* CHANGE PASSWORD */
function changePassword(){
let pass = document.getElementById("newPass").value;

if(pass.length < 4){
alert("Password too short");
return;
}

localStorage.setItem("password", pass);
alert("Password updated successfully");
}

/* CLEAR CACHE */
function clearCache(){

if('caches' in window){
caches.keys().then(names=>{
for(let name of names) caches.delete(name);
});
}

localStorage.clear();

alert("Cache cleared");
location.reload();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}

/* SWIPE CLOSE */
let startX=0;
document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
},{passive:true});

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(endX < startX - 60){
goBack();
}
});

</script>

</body>
</html>
