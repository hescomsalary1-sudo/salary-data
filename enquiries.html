<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help & Enquiries</title>
    <style>
        :root {
            --primary: #4338ca;
            --primary-light: #6366f1;
            --bg: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            padding-bottom: 30px;
        }

        /* HEADER */
        .top {
            padding: 20px;
            background: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .top h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .content {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* FORM CARD */
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 14px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            background: white;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        /* FAQ SECTION */
        .faq-box {
            margin-top: 25px;
        }

        .faq-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .faq-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: var(--primary);
        }

        .faq-item p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* DARK MODE */
        .dark-mode {
            background: #0f172a;
            color: white;
        }
        .dark-mode .top, .dark-mode .card, .dark-mode .faq-item {
            background: #1e293b;
            border-color: #334155;
        }
        .dark-mode input, .dark-mode select, .dark-mode textarea {
            background: #0f172a;
            color: white;
            border-color: #334155;
        }
        .dark-mode h2 { color: white; }
    </style>
</head>
<body>

    <div class="top">
        <button class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M15 18L9 12L15 6" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <h2>Enquiries</h2>
    </div>

    <div class="content">
        <div class="card">
            <span class="section-title">Submit a Request</span>
            
            <form id="enquiryForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>Enquiry Type</label>
                    <select id="type" required>
                        <option value="">Select Category</option>
                        <option value="salary">Salary/Pay Issue</option>
                        <option value="profile">Profile Correction</option>
                        <option value="technical">Technical Support</option>
                        <option value="other">General Enquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Brief topic" required>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" placeholder="Describe your issue in detail..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Enquiry</button>
            </form>
        </div>

        <div class="faq-box">
            <span class="section-title">Quick FAQ</span>
            
            <div class="faq-item">
                <h4>When is salary updated?</h4>
                <p>Salary data is typically uploaded by the 5th of every month.</p>
            </div>

            <div class="faq-item">
                <h4>Data is incorrect?</h4>
                <p>If your profile or pay details are wrong, please contact your administrative department.</p>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function handleSubmit(event) {
            event.preventDefault();
            
            const type = document.getElementById('type').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;
            const user = localStorage.getItem("currentUser") || "Unknown User";

            // Here you would typically send data to a server
            // For now, we will just show an alert
            alert(`Thank you ${user}! Your enquiry regarding "${subject}" has been submitted. We will contact you soon.`);
            
            // Reset form
            document.getElementById('enquiryForm').reset();
        }

        // Apply Dark Mode if enabled
        if(localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
        }
    </script>
</body>
</html>
