<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:75px;
}

.top{
padding:25px 20px 5px 20px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}
/* LIST STYLE */
.tabs{
padding:15px;
}

/* LIST ITEM */
.tab{
display:flex;
align-items:center;
gap:15px;
background:white;
border-radius:18px;
padding:15px;
margin-bottom:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* ICON */
.tab img{
width:45px;
height:45px;
}

/* TEXT AREA */
.tab .text{
flex:1;
}

.tab .text h4{
margin:0;
font-size:15px;
color:#333;
}

.tab .text p{
margin:3px 0 0;
font-size:12px;
color:#777;
}

/* ACTIVE */
.tab.active{
background:linear-gradient(135deg,#3b1eff,#6a5cff);
color:white;
box-shadow:0 10px 25px rgba(59,30,255,0.3);
}

.tab.active h4,
.tab.active p{
color:white;
}

/* ARROW */
.arrow{
font-size:18px;
color:#999;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:60px;
border-radius:12px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}
</style>
</head>

<body>

<div class="top">
<h2>👤 Employee Info</h2>
</div>

<!-- LIST VIEW -->
<div class="tabs">

<!-- NOMINATION -->
<div class="tab active" onclick="openPage(0,'nomination_form.html')">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png">
<div class="text">
<h4>Nomination</h4>
<p>Add your family members and share percentage</p>
</div>
<div class="arrow">›</div>
</div>

<!-- OFFICIAL -->
<div class="tab" onclick="openPage(1,'official_details.html')">
<img src="https://cdn-icons-png.flaticon.com/512/942/942748.png">
<div class="text">
<h4>Official Details</h4>
<p>View and update your official employee records</p>
</div>
<div class="arrow">›</div>
</div>

<!-- ENQUIRIES -->
<div class="tab" onclick="openPage(2,'enquiries.html')">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
<div class="text">
<h4>Enquiries</h4>
<p>Ask questions or get help from support</p>
</div>
<div class="arrow">›</div>
</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

let isLoading = false;

function openPage(index, url){

if(isLoading) return;
isLoading = true;

// loader
document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

// active UI
let tabs = document.querySelectorAll(".tab");
tabs.forEach(t => t.classList.remove("active"));
tabs[index].classList.add("active");

// navigate
setTimeout(()=>{
window.location = url;
}, 700);

}

</script>
  <script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
  document.getElementById("navbar-container").innerHTML = data;
});
</script>
  <div id="navbar-container"></div>
</body>
</html>
