<!DOCTYPE html>
<html>
<head>
<title>Employee Info</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f3f4fa;
padding-bottom:80px;
}

/* HEADER */

.top{
padding:20px;
background:#4b2dd8;
color:white;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

/* PROFILE */

.profile{
text-align:center;
margin-top:20px;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #4b2dd8;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

/* DETAILS */

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:18px;
margin-bottom:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.label{
font-size:12px;
color:#777;
}

.value{
font-size:15px;
font-weight:bold;
}

/* NAVBAR */

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -4px 15px rgba(0,0,0,0.12);
}

.nav-item{
flex:1;
text-align:center;
font-size:11px;
}

.nav-item i{
font-size:20px;
color:#777;
}

.nav-item span{
display:block;
color:#777;
}

.nav-item.active i,
.nav-item.active span{
color:#4b2dd8;
}

</style>
</head>

<body>

<div class="top">Employee Profile</div>

<div class="profile">
<img src="https://i.imgur.com/6VBx3io.png">
<div class="name">Employee Name</div>
</div>

<div class="container">

<div class="card">
<div class="label">Employee ID</div>
<div class="value">EMP001</div>
</div>

<div class="card">
<div class="label">Designation</div>
<div class="value">Junior Engineer</div>
</div>

<div class="card">
<div class="label">Joining Date</div>
<div class="value">12-06-2016</div>
</div>

<div class="card">
<div class="label">Department</div>
<div class="value">Electrical</div>
</div>

</div>

<div class="navbar">

<div class="nav-item" onclick="location='home.html'">
<i>🏠</i>
<span>Home</span>
</div>

<div class="nav-item" onclick="location='forum.html'">
<i>💬</i>
<span>Forum</span>
</div>

<div class="nav-item active">
<i>👤</i>
<span>Employee</span>
</div>

<div class="nav-item" onclick="location='resources.html'">
<i>📂</i>
<span>Resources</span>
</div>

</div>

</body>
</html>
