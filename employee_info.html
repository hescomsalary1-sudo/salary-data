<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:20px;
text-align:center;
}

/* MODERN TABS */
.tabs{
display:flex;
gap:12px;
padding:15px;
}

.tab{
flex:1;
background:white;
border-radius:18px;
padding:14px 10px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.tab span{
display:block;
font-size:20px;
margin-bottom:4px;
}

.tab p{
margin:0;
font-size:12px;
font-weight:600;
color:#555;
}

.tab.active{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
box-shadow:0 8px 20px rgba(59,30,255,0.3);
}

.tab.active p{
color:white;
}

/* ILLUSTRATION CARD */
.illustration-card{
margin:0 15px 15px;
background:white;
border-radius:18px;
padding:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
display:flex;
align-items:center;
gap:12px;
}

/* IMAGE */
.illustration-card img{
width:80px;
height:auto;
}

/* TEXT */
.illustration-text{
flex:1;
}

.illustration-text h4{
margin:0;
font-size:15px;
color:#333;
}

.illustration-text p{
margin:4px 0 0;
font-size:12px;
color:#777;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:60px;
border-radius:12px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}
</style>
</head>

<body>

<div class="top">
<h2>👤 Employee Info</h2>
</div>

<!-- TABS -->
<div class="tabs">

<div class="tab active" onclick="openPage(0,'nomination_form.html')">
<span>👨‍👩‍👧</span>
<p>Nomination</p>
</div>

<div class="tab" onclick="openPage(1,'official_details.html')">
<span>📄</span>
<p>Official</p>
</div>

<div class="tab" onclick="openPage(2,'enquiries.html')">
<span>❓</span>
<p>Enquiries</p>
</div>

</div>

<!-- ILLUSTRATION SECTION -->
<div class="illustration-card">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<div class="illustration-text">
<h4>Manage Your Profile Easily</h4>
<p>Update nomination, official details and enquiries quickly</p>
</div>

</div>

<!-- SECOND SMALL CARD -->
<div class="illustration-card">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<div class="illustration-text">
<h4>Secure & Simple</h4>
<p>Your data is सुरक्षित and easy to manage anytime</p>
</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

let isLoading = false;

function openPage(index, url){

if(isLoading) return;
isLoading = true;

document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

let tabs = document.querySelectorAll(".tab");
tabs.forEach(t => t.classList.remove("active"));
tabs[index].classList.add("active");

setTimeout(()=>{
window.location = url;
}, 700);

}

</script>

</body>
</html>
