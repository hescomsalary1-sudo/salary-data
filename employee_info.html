<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
padding-bottom:75px;
}

/* HEADER */
.top{
padding:25px 20px 20px 20px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:#2400b7;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MENU */
.menu-btn{
width:42px;
height:42px;
border-radius:10px;
background:#2400b7;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* HERO */
.hero-card{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#3b1eff,#6a5cff);
border-radius:22px;
padding:20px;
color:white;
margin:15px;
box-shadow:0 15px 35px rgba(59,30,255,0.3);
}

.hero-text h2{margin:8px 0;font-size:22px;}
.hero-text p{font-size:13px;opacity:0.9;}

.badge{
background:rgba(255,255,255,0.2);
padding:5px 10px;
border-radius:20px;
font-size:11px;
}

.hero-btn{
margin-top:12px;
background:white;
color:#3b1eff;
padding:8px 14px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.hero-img{width:110px;}

/* CARD */
.card{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
border-radius:20px;
padding:15px;
margin:12px 15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.left{display:flex;align-items:center;gap:12px;}

.icon-box{
width:55px;height:55px;border-radius:16px;
display:flex;align-items:center;justify-content:center;
}

.icon-box img{width:28px;}

.blue{background:#e6ecff;}
.green{background:#e8f8f0;}

.circle-arrow{
width:35px;height:35px;border-radius:50%;
background:#eef2ff;
display:flex;align-items:center;justify-content:center;
color:#3b1eff;
}

/* LOADER (ORIGINAL) */
#loader{
position: fixed;
top: 85px;
bottom: 70px;
left: 0;
width: 100%;
background: rgba(243, 244, 250, 0.8);
display: none;
justify-content: center;
align-items: center;
z-index:900;
}

/* NAVBAR (ORIGINAL) */
.navbar{
position:fixed;
bottom:0;
width:100%;
height:75px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-radius:30px 30px 0 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<div style="display:flex;gap:10px;align-items:center;">
<div class="menu-btn" onclick="openSideNav()">☰</div>
<div>
<div style="font-size:13px;">Employee forum</div>
<strong>Employee info.</strong>
</div>
</div>

<div>
<span onclick="refreshApp()">🔄</span>
<span onclick="logout()">🔓</span>
</div>
</div>

<!-- HERO -->
<div class="hero-card" onclick="openPage(0,'nomination_form.html')">
<div class="hero-text">
<div class="badge">★ Important</div>
<h2>Nomination</h2>
<p>Add your family members and share percentage</p>
<div class="hero-btn">Get Started →</div>
</div>
<img class="hero-img" src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">
</div>

<!-- CARDS -->
<div class="card" onclick="openPage(1,'official_details.html')">
<div class="left">
<div class="icon-box blue">
<img src="https://cdn-icons-png.flaticon.com/512/942/942748.png">
</div>
<div>
<b>Official Details</b>
<p>View and update your official employee records</p>
</div>
</div>
<div class="circle-arrow">→</div>
</div>

<div class="card" onclick="openPage(2,'enquiries.html')">
<div class="left">
<div class="icon-box green">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
</div>
<div>
<b>Enquiries</b>
<p>Ask questions or get help from support</p>
</div>
</div>
<div class="circle-arrow">→</div>
</div>

<!-- LOADER -->
<div id="loader"></div>

<script>

/* YOUR ORIGINAL LOGIC (UNCHANGED) */
let isLoading = false;

function openPage(index, url){
if(isLoading) return;
isLoading = true;

document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location = url;
},700);
}

/* KEEP YOUR OTHER ORIGINAL SCRIPTS BELOW EXACTLY SAME */

</script>

</body>
</html>
