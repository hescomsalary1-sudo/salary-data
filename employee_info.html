<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:5px;
text-align:center;
}

/* TAB NAVBAR */
.tabs{
display:flex;
gap:10px;
margin:15px;
}

.tab{
flex:1;
text-align:center;
padding:12px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:#555;
border-radius:25px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.tab.active{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
box-shadow:0 6px 15px rgba(59,30,255,0.3);
}

/* DASHBOARD */
.dashboard{
padding:15px;
}

/* WELCOME CARD */
.welcome-card{
background:linear-gradient(135deg,#3b1eff,#6a5cff);
color:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(59,30,255,0.25);
margin-bottom:15px;
}

.title{
font-size:18px;
font-weight:600;
}

.subtitle{
font-size:13px;
opacity:0.9;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* BOX */
.box{
background:white;
border-radius:16px;
padding:18px;
text-align:center;
font-weight:600;
color:#333;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.3s;
cursor:pointer;
}

.box:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

.icon{
font-size:28px;
margin-bottom:8px;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

/* skeleton */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:60px;
border-radius:12px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}
</style>
</head>

<body>

<div class="top">
<h2>👤 Employee Info</h2>
</div>



<!-- DASHBOARD (NEW UI) -->
<div class="dashboard">

<div class="welcome-card">
<div class="title">Welcome 👋</div>
<div class="subtitle">Manage your employee details easily</div>
</div>

<div class="grid">

<div class="box" onclick="openPage(0,'nomination_form.html')">
<div class="icon">👨‍👩‍👧</div>
<div>Nomination</div>
</div>

<div class="box" onclick="openPage(1,'official_details.html')">
<div class="icon">📄</div>
<div>Official</div>
</div>

<div class="box" onclick="openPage(2,'enquiries.html')">
<div class="icon">❓</div>
<div>Enquiries</div>
</div>

</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

let isLoading = false;

function openPage(index, url){

if(isLoading) return;
isLoading = true;

// show loader
document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

// active tab UI
let tabs = document.querySelectorAll(".tab");
tabs.forEach(t => t.classList.remove("active"));
tabs[index].classList.add("active");

// open page
setTimeout(()=>{
window.location = url;
}, 700);

}

</script>

</body>
</html>
