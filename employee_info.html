<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6fb;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:20px;
text-align:center;
}

/* BUTTON GRID */
.tabs{
display:flex;
gap:12px;
padding:15px;
}

/* CARD BUTTON */
.tab{
flex:1;
background:white;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* IMAGE */
.tab img{
width:55px;
height:auto;
margin-bottom:8px;
}

/* TEXT */
.tab p{
margin:0;
font-size:13px;
font-weight:600;
color:#444;
}

/* ACTIVE */
.tab.active{
background:linear-gradient(135deg,#3b1eff,#6a5cff);
color:white;
box-shadow:0 10px 25px rgba(59,30,255,0.3);
}

.tab.active p{
color:white;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:60px;
border-radius:12px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}
</style>
</head>

<body>

<div class="top">
<h2>👤 Employee Info</h2>
</div>

<!-- ILLUSTRATION STYLE BUTTONS -->
<div class="tabs">

<div class="tab active" onclick="openPage(0,'nomination_form.html')">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
<p>Nomination</p>
</div>

<div class="tab" onclick="openPage(1,'official_details.html')">
<img src="https://cdn-icons-png.flaticon.com/512/2991/2991108.png">
<p>Official</p>
</div>

<div class="tab" onclick="openPage(2,'enquiries.html')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
<p>Enquiries</p>
</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

let isLoading = false;

function openPage(index, url){

if(isLoading) return;
isLoading = true;

// loader
document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

// active UI
let tabs = document.querySelectorAll(".tab");
tabs.forEach(t => t.classList.remove("active"));
tabs[index].classList.add("active");

// navigate
setTimeout(()=>{
window.location = url;
}, 700);

}

</script>

</body>
</html>
