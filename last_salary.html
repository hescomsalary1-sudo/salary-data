<!DOCTYPE html>
<html>
<head>

<title>Last Month Salary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg,#eef2ff,#f8fafc);
padding-bottom:90px;
}

/* HEADER */
.top{
padding:20px;
background: linear-gradient(135deg,#4b2dd8,#6c39ff);
color:white;
display:flex;
align-items:center;
gap:12px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

/* BACK BUTTON */
.back-btn-header{
width:40px;
height:40px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.top .icon{
width:38px;
height:38px;
background:white;
color:#4b2dd8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* CHART */
.chart-box{
padding:15px;
}

/* CONTENT */
.content{
padding:18px;
}

/* CARD */
.salary-card{
background:white;
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.salary-card h4{
margin-top:0;
color:#4b2dd8;
}

/* TABLE */
table{
width:100%;
}

td{
padding:6px 0;
}

/* NET */
.net-card{
margin-top:15px;
background:#4b2dd8;
color:white;
padding:18px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* BUTTON */
.action-btn{
margin-top:15px;
padding:12px;
background:#4b2dd8;
color:white;
border:none;
border-radius:12px;
width:100%;
}

/* LOADER */
.loader{
display:flex;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #4b2dd8;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">

  <div class="back-btn-header" onclick="goBack()">
    ←
  </div>

  <div class="icon">₹</div>
  <h2>Last Month Salary</h2>

</div>

<div class="chart-box">
  <canvas id="salaryChart"></canvas>
</div>

<div class="content" id="result"></div>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

function goBack(){
window.location="home.html";
}

async function loadLastSalary(){

let now = new Date();
let prev = new Date(now.getFullYear(), now.getMonth()-1, 1);

let year = prev.getFullYear().toString();
let month = String(prev.getMonth()+1).padStart(2,"0");

try{

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await response.text();
let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0]===user && c[1]===year && c[2]===month){

let basic = +c[3];
let dearness_pay = +c[4];
let hra = +c[5];
let cca = +c[6];

let totalE = basic+dearness_pay+hra+cca;

// CHART
let labels=["Basic","DA","HRA","CCA"];
let dataArr=[basic,dearness_pay,hra,cca];

new Chart(document.getElementById("salaryChart"),{
type:"doughnut",
data:{labels:labels,datasets:[{data:dataArr}]}
});

// UI
document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML = `
<h3>${month}/${year}</h3>

<div class="salary-card">
<h4>Earnings</h4>
<table>
<tr><td>Basic</td><td>₹ ${basic}</td></tr>
<tr><td>DA</td><td>₹ ${dearness_pay}</td></tr>
<tr><td>HRA</td><td>₹ ${hra}</td></tr>
<tr><td>CCA</td><td>₹ ${cca}</td></tr>
</table>
</div>

<div class="net-card">
Net Salary ₹ ${totalE}
</div>

<button class="action-btn" onclick="downloadPDF()">Download PDF</button>
`;

return;

}

}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found";

}catch(e){
document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="Error loading salary";
}

}

function downloadPDF(){
html2pdf().from(document.getElementById("result")).save();
}

loadLastSalary();

</script>

</body>
</html>
