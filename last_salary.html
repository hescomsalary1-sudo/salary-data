<!DOCTYPE html>
<html>
<head>

<title>Last Month Salary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f4f4f9;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:20px;
background:#4b2dd8;
color:white;
display:flex;
align-items:center;
gap:10px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.top .icon{
width:35px;
height:35px;
background:white;
color:#5e00a3;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* CONTENT */
.content{
padding:20px;
}

/* CARD */
.salary-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:15px;
font-size:14px;
}

.salary-card h4{
margin-top:0;
color:#4b2dd8;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px 0;
}

/* NET */
.net-card{
margin-top:15px;
background:#4b2dd8;
color:white;
padding:15px;
border-radius:12px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* BUTTONS */
.action-btn{
margin-top:15px;
padding:12px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-size:15px;
}

/* BACK */
.back-btn{
margin:15px 20px;
background:#999;
}

/* LOADER */
.loader{
display:flex;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #5e00a3;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">
<div class="icon">₹</div>
<h2>Last Month Salary</h2>
</div>

<div class="content" id="result"></div>

<button class="action-btn back-btn" onclick="goBack()">⬅ Back</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

function goBack(){
window.location="home.html";
}

async function loadLastSalary(){

let now = new Date();
let prev = new Date(now.getFullYear(), now.getMonth()-1, 1);

let year = prev.getFullYear().toString();
let month = String(prev.getMonth()+1).padStart(2,"0");

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/salary .csv?v=" + new Date().getTime()
);

let data = await response.text();
let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0]===user && c[1]===year && c[2]===month){

let basic = +c[3];
let dearness_pay = +c[4];
let hra = +c[5];
let cca = +c[6];
let personal_pay = +c[7];
let special_personal_pay = +c[8];
let conveyance = +c[9];
let washing = +c[10];
let sfta = +c[11];
let locality = +c[12];
let mwa = +c[13];
let hill = +c[14];
let charge = +c[15];
let pension = +c[16];
let lwf_company = +c[17];
let cash_duty = +c[18];
let other = +c[19];

let LIC = +c[20];
let income_tax = +c[21];
let pt = +c[22];
let society = +c[23];
let PLI = +c[24];
let union = +c[25];
let scst = +c[26];
let rent = +c[27];
let bank = +c[28];
let family = +c[29];
let festival = +c[30];
let pc10 = +c[31];
let pc14 = +c[32];
let lwf = +c[33];
let recovery = +c[34];
let other_ded = +c[35];

let totalE =
basic+dearness_pay+hra+cca+personal_pay+special_personal_pay+
conveyance+washing+sfta+locality+mwa+hill+charge+pension+
lwf_company+cash_duty+other;

let totalD =
LIC+income_tax+pt+society+PLI+union+scst+rent+bank+
family+festival+pc10+pc14+lwf+recovery+other_ded;

let net = totalE - totalD;

document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML = `

<h3>${month}/${year}</h3>

<div class="salary-card">
<h4>Earnings</h4>

<table>
${basic>0?`<tr><td>Basic</td><td style="text-align:right">₹ ${basic}</td></tr>`:''}
${dearness_pay>0?`<tr><td>Dearness Pay</td><td style="text-align:right">₹ ${dearness_pay}</td></tr>`:''}
${hra>0?`<tr><td>HRA</td><td style="text-align:right">₹ ${hra}</td></tr>`:''}
${cca>0?`<tr><td>CCA</td><td style="text-align:right">₹ ${cca}</td></tr>`:''}
${personal_pay>0?`<tr><td>Personal Pay</td><td style="text-align:right">₹ ${personal_pay}</td></tr>`:''}
${special_personal_pay>0?`<tr><td>Special Pay</td><td style="text-align:right">₹ ${special_personal_pay}</td></tr>`:''}
${conveyance>0?`<tr><td>Conveyance</td><td style="text-align:right">₹ ${conveyance}</td></tr>`:''}
${washing>0?`<tr><td>Washing</td><td style="text-align:right">₹ ${washing}</td></tr>`:''}
${sfta>0?`<tr><td>SFTA</td><td style="text-align:right">₹ ${sfta}</td></tr>`:''}
${locality>0?`<tr><td>Locality</td><td style="text-align:right">₹ ${locality}</td></tr>`:''}
${mwa>0?`<tr><td>MWA</td><td style="text-align:right">₹ ${mwa}</td></tr>`:''}
${hill>0?`<tr><td>Hill</td><td style="text-align:right">₹ ${hill}</td></tr>`:''}
${charge>0?`<tr><td>Charge</td><td style="text-align:right">₹ ${charge}</td></tr>`:''}
${pension>0?`<tr><td>Pension</td><td style="text-align:right">₹ ${pension}</td></tr>`:''}
${lwf_company>0?`<tr><td>LWF Company</td><td style="text-align:right">₹ ${lwf_company}</td></tr>`:''}
${cash_duty>0?`<tr><td>Cash Duty</td><td style="text-align:right">₹ ${cash_duty}</td></tr>`:''}
${other>0?`<tr><td>Other Earnings</td><td style="text-align:right">₹ ${other}</td></tr>`:''}

<tr style="border-top:1px solid #ddd;font-weight:bold">
<td>Total Earnings</td>
<td style="text-align:right">₹ ${totalE}</td>
</tr>

</table>
</div>

<div class="salary-card">
<h4>Deductions</h4>

<table>
${LIC>0?`<tr><td>LIC</td><td style="text-align:right">₹ ${LIC}</td></tr>`:''}
${income_tax>0?`<tr><td>Income Tax</td><td style="text-align:right">₹ ${income_tax}</td></tr>`:''}
${pt>0?`<tr><td>Professional Tax</td><td style="text-align:right">₹ ${pt}</td></tr>`:''}
${society>0?`<tr><td>Society</td><td style="text-align:right">₹ ${society}</td></tr>`:''}
${PLI>0?`<tr><td>PLI</td><td style="text-align:right">₹ ${PLI}</td></tr>`:''}
${union>0?`<tr><td>Union</td><td style="text-align:right">₹ ${union}</td></tr>`:''}
${scst>0?`<tr><td>SC/ST</td><td style="text-align:right">₹ ${scst}</td></tr>`:''}
${rent>0?`<tr><td>House Rent</td><td style="text-align:right">₹ ${rent}</td></tr>`:''}
${bank>0?`<tr><td>Bank</td><td style="text-align:right">₹ ${bank}</td></tr>`:''}
${family>0?`<tr><td>Family</td><td style="text-align:right">₹ ${family}</td></tr>`:''}
${festival>0?`<tr><td>Festival</td><td style="text-align:right">₹ ${festival}</td></tr>`:''}
${pc10>0?`<tr><td>PC 10%</td><td style="text-align:right">₹ ${pc10}</td></tr>`:''}
${pc14>0?`<tr><td>PC 14%</td><td style="text-align:right">₹ ${pc14}</td></tr>`:''}
${lwf>0?`<tr><td>LWF</td><td style="text-align:right">₹ ${lwf}</td></tr>`:''}
${recovery>0?`<tr><td>Recovery</td><td style="text-align:right">₹ ${recovery}</td></tr>`:''}
${other_ded>0?`<tr><td>Other Deduction</td><td style="text-align:right">₹ ${other_ded}</td></tr>`:''}

<tr style="border-top:1px solid #ddd;font-weight:bold">
<td>Total Deduction</td>
<td style="text-align:right">₹ ${totalD}</td>
</tr>

</table>
</div>

<div class="net-card">
Net Salary ₹ ${net}
</div>

<button class="action-btn" onclick="downloadPDF()">📄 Download PDF</button>

`;

return;

}

}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found";

}catch(e){

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="Error loading salary";

}

}

async function downloadPDF(){

let s = window.salaryData;

/* fetch employee details */

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
let data = await response.text();

let rows = data.trim().split("\n");

let empName = user;
let empDesignation = "";
let empPlace = "";

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0] === user){
empName = cols[1];
empDesignation = cols[2];
empPlace = cols[3];
break;
}

}

let year=document.getElementById("year").value;
let month=document.getElementById("month").options[
document.getElementById("month").selectedIndex].text;


/* row generator */

function pdfRow(name,value){
if(value>0){
return `
<tr>
<td style="padding:4px 6px">${name}</td>
<td style="text-align:right;padding:4px 6px">₹ ${value}</td>
</tr>`;
}
return "";
}

let pdfContent = `

<div style="font-family:sans-serif;padding:20px">

<div style="text-align:center">
<h2>HUBLI ELECTRICITY SUPPLY COMPANY LTD.</h2>
<h4>O & M Division, Sirsi</h4>

<div style="display:flex;justify-content:space-between;margin-top:10px">
<p><b>Name :</b> ${empName}</p>
<p><b>Designation :</b> ${empDesignation}</p>
</div>

<div style="display:flex;justify-content:space-between">
<p><b>Working Place :</b> ${empPlace}</p>
<p><b>Month :</b> ${month} ${year}</p>
</div>

<hr>
</div>

<table style="width:100%;border-collapse:collapse;margin-top:20px">

<tr>
<th style="background:#5e00a3;color:white;padding:8px">Earnings</th>
<th style="background:#5e00a3;color:white;padding:8px">Deductions</th>
</tr>

<tr>

<td style="padding:10px;border-right:1px solid #ddd;vertical-align:top">

<table style="width:100%;border-collapse:collapse;font-size:14px">

${pdfRow("Basic",s.basic)}
${pdfRow("Dearness Pay",s.dearness_pay)}
${pdfRow("House Rent Allowance",s.rouse_rent_allowances)}
${pdfRow("City Compensation Allowance",s.city_compensation_allowances)}
${pdfRow("Personal Pay",s.personal_pay)}
${pdfRow("Special Personal Pay",s.special_personal_pay)}
${pdfRow("Conveyance Allowance",s.conveyance_allowances)}
${pdfRow("Washing Allowance",s.washing_allowances)}
${pdfRow("SFTA",s.sfta)}
${pdfRow("Special Locality Allowance",s.special_locality_allowances)}
${pdfRow("MWA",s.mwa)}
${pdfRow("Hill Allowance",s.hill_allowances)}
${pdfRow("Charge Allowance",s.charge_allowances)}
${pdfRow("Pension Contribution",s.pension_contribution_14_percent)}
${pdfRow("LWF Company Contribution",s.labour_welfare_fund_company_contribution)}
${pdfRow("Cash Duty Allowance",s.cash_duty_allowances)}
${pdfRow("Other Earnings",s.other_earnings)}

<tr style="border-top:1px solid #000;font-weight:bold">
<td>Total Earnings</td>
<td style="text-align:right">₹ ${s.totalEarning}</td>
</tr>

</table>

</td>


<td style="padding:10px;vertical-align:top">

<table style="width:100%;border-collapse:collapse;font-size:14px">

${pdfRow("LIC",s.LIC)}
${pdfRow("Income Tax",s.income_tax)}
${pdfRow("Professional Tax",s.professional_tax)}
${pdfRow("KPTCL Employee Society",s.KPTCL_employes_society)}
${pdfRow("PLI",s.PLI)}
${pdfRow("Union Fund",s.union_fund)}
${pdfRow("SC/ST Union Fund",s.sc_st_union_fund)}
${pdfRow("House Rent",s.house_rent)}
${pdfRow("Urban Bank",s.urban_bank)}
${pdfRow("Family Benefit Fund",s.family_benefit_fund)}
${pdfRow("Festival Advance",s.festival_advance)}
${pdfRow("PC 10% Contribution",s.PC_10_contribution)}
${pdfRow("PC 14% Contribution",s.PC_14_contribution)}
${pdfRow("LWF",s.LWF)}
${pdfRow("Recovery",s.recovery_any)}
${pdfRow("Other Deduction",s.other_deduction)}

<tr style="border-top:1px solid #000;font-weight:bold">
<td>Total Deduction</td>
<td style="text-align:right">₹ ${s.totalDeduction}</td>
</tr>

</table>

</td>

</tr>

</table>

<hr style="margin-top:20px">

<div style="text-align:right;font-size:22px;font-weight:bold;margin-top:20px">
Net Salary : ₹ ${s.net}
</div>

</div>
`;

let div=document.createElement("div");
div.innerHTML=pdfContent;

let opt={
margin:0.8,
filename:'Salary.pdf',
image:{type:'jpeg',quality:0.98},
html2canvas:{scale:2},
pagebreak:{mode:['avoid-all','css','legacy']},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
};

html2pdf().set(opt).from(div).save();

}
loadLastSalary();

</script>

</body>
</html>
