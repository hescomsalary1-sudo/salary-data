<!DOCTYPE html>
<html>
<head>

<title>Last Month Salary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f4f4f9;
padding-bottom:90px;
}

.top{
padding:20px;
background:#4b2dd8;
color:white;
display:flex;
align-items:center;
gap:10px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.top .icon{
width:35px;
height:35px;
background:white;
color:#5e00a3;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.content{
padding:20px;
}

.salary-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:15px;
font-size:14px;
}

.salary-card h4{
margin-top:0;
color:#4b2dd8;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px 0;
}

.net-card{
margin-top:15px;
background:#4b2dd8;
color:white;
padding:15px;
border-radius:12px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.action-btn{
margin-top:15px;
padding:12px;
background:#4b2dd8;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-size:15px;
}

.back-btn{
margin:15px 20px;
background:#999;
}

.loader{
display:flex;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #5e00a3;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">
<div class="icon">₹</div>
<h2>Last Month Salary</h2>
</div>

<div class="content" id="result"></div>

<button class="action-btn back-btn" onclick="goBack()">⬅ Back</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

function goBack(){
window.location="home.html";
}

async function loadLastSalary(){

let now = new Date();
let prev = new Date(now.getFullYear(), now.getMonth()-1, 1);

let year = prev.getFullYear().toString();
let month = String(prev.getMonth()+1).padStart(2,"0");

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/salary .csv?v=" + new Date().getTime()
);

let data = await response.text();
let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0]===user && c[1]===year && c[2]===month){

/* ===== FULL ORIGINAL VARIABLES ===== */

let basic = +c[3];
let dearness_pay = +c[4];
let hra = +c[5];
let cca = +c[6];
let personal_pay = +c[7];
let special_personal_pay = +c[8];
let conveyance = +c[9];
let washing = +c[10];
let sfta = +c[11];
let locality = +c[12];
let mwa = +c[13];
let hill = +c[14];
let charge = +c[15];
let pension = +c[16];
let lwf_company = +c[17];
let cash_duty = +c[18];
let other = +c[19];

let LIC = +c[20];
let income_tax = +c[21];
let pt = +c[22];
let society = +c[23];
let PLI = +c[24];
let union = +c[25];
let scst = +c[26];
let rent = +c[27];
let bank = +c[28];
let family = +c[29];
let festival = +c[30];
let pc10 = +c[31];
let pc14 = +c[32];
let lwf = +c[33];
let recovery = +c[34];
let other_ded = +c[35];

let totalE =
basic+dearness_pay+hra+cca+personal_pay+special_personal_pay+
conveyance+washing+sfta+locality+mwa+hill+charge+pension+
lwf_company+cash_duty+other;

let totalD =
LIC+income_tax+pt+society+PLI+union+scst+rent+bank+
family+festival+pc10+pc14+lwf+recovery+other_ded;

let net = totalE - totalD;

/* STORE FOR PDF */
window.salaryData = {
basic,dearness_pay,hra,cca,personal_pay,special_personal_pay,
conveyance,washing,sfta,locality,mwa,hill,charge,pension,
lwf_company,cash_duty,other,
LIC,income_tax,pt,society,PLI,union,scst,rent,bank,family,
festival,pc10,pc14,lwf,recovery,other_ded,
totalE,totalD,net
};

/* ===== FULL UI ===== */

function row(name,val){
return val>0?`<tr><td>${name}</td><td style="text-align:right">₹ ${val}</td></tr>`:'';
}

document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML = `
<h3>${month}/${year}</h3>

<div class="salary-card">
<h4>Earnings</h4>
<table>
${row("Basic",basic)}
${row("Dearness Pay",dearness_pay)}
${row("HRA",hra)}
${row("CCA",cca)}
${row("Personal Pay",personal_pay)}
${row("Special Pay",special_personal_pay)}
${row("Conveyance",conveyance)}
${row("Washing",washing)}
${row("SFTA",sfta)}
${row("Locality",locality)}
${row("MWA",mwa)}
${row("Hill",hill)}
${row("Charge",charge)}
${row("Pension",pension)}
${row("LWF Company",lwf_company)}
${row("Cash Duty",cash_duty)}
${row("Other",other)}

<tr><td><b>Total Earnings</b></td><td style="text-align:right"><b>₹ ${totalE}</b></td></tr>
</table>
</div>

<div class="salary-card">
<h4>Deductions</h4>
<table>
${row("LIC",LIC)}
${row("Income Tax",income_tax)}
${row("PT",pt)}
${row("Society",society)}
${row("PLI",PLI)}
${row("Union",union)}
${row("SC/ST",scst)}
${row("House Rent",rent)}
${row("Bank",bank)}
${row("Family",family)}
${row("Festival",festival)}
${row("PC 10%",pc10)}
${row("PC 14%",pc14)}
${row("LWF",lwf)}
${row("Recovery",recovery)}
${row("Other",other_ded)}

<tr><td><b>Total Deduction</b></td><td style="text-align:right"><b>₹ ${totalD}</b></td></tr>
</table>
</div>

<div class="net-card">Net Salary ₹ ${net}</div>

<button class="action-btn" onclick="downloadPDF()">📄 Download PDF</button>
`;

return;

}

}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found";

}catch(e){
document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="Error loading salary";
}

}

/* ===== STABLE PDF (NO BLANK / NO CUT) ===== */
function downloadPDF(){

let element = document.getElementById("result");

html2pdf().set({
margin:0.5,
filename:'Salary.pdf',
image:{type:'jpeg',quality:0.98},
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
}).from(element).save();

}

loadLastSalary();

</script>

</body>
</html>
