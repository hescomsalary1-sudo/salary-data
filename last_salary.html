<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<title>Last Month Salary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* SAME STYLE - NOT CHANGED */

body{
font-family:sans-serif;
margin:0;
background:#f4f4f9;
padding-bottom:90px;
}

.top{
padding:20px;
background:#4b2dd8;
color:white;
display:flex;
align-items:center;
gap:10px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.top .icon{
width:35px;
height:35px;
background:white;
color:#5e00a3;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.top h2{
margin:0;
}

.content{
padding:20px;
}

.salary-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
font-size:14px;
line-height:1.6;
margin-bottom:15px;
}

.salary-card h4{
margin-top:0;
color:#4b2dd8;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

.net-card{
margin-top:15px;
background:#4b2dd8;
color:white;
padding:15px;
border-radius:12px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.action-buttons{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:10px 16px;
background:#4b2dd8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.loader{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
z-index:9999;
align-items:center;
justify-content:center;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #5e00a3;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">
<div class="icon">₹</div>
<h2>Last Month Salary</h2>
</div>

<div class="content">

<div class="action-buttons" id="pdfButtons" style="display:none;">
<button onclick="printSalary()">🖨 Print</button>
<button onclick="downloadPDF()">📄 Download PDF</button>
</div>

<div id="result"></div>

</div>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

/* AUTO LOAD LAST MONTH */
loadSalary();

async function loadSalary(){

document.getElementById("loader").style.display="flex";

let now = new Date();
let prev = new Date(now.getFullYear(), now.getMonth()-1, 1);

let year = prev.getFullYear().toString();
let month = String(prev.getMonth()+1).padStart(2,"0");

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary .csv");
let data = await response.text();

let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0] === user && cols[1] === year && cols[2] === month){

/* EXACT SAME VARIABLES */

let basic = +cols[3];
let dearness_pay = +cols[4];
let rouse_rent_allowances = +cols[5];
let city_compensation_allowances = +cols[6];
let personal_pay = +cols[7];
let special_personal_pay = +cols[8];
let conveyance_allowances = +cols[9];
let washing_allowances = +cols[10];
let sfta = +cols[11];
let special_locality_allowances = +cols[12];
let mwa = +cols[13];
let hill_allowances = +cols[14];
let charge_allowances = +cols[15];
let pension_contribution_14_percent = +cols[16];
let labour_welfare_fund_company_contribution = +cols[17];
let cash_duty_allowances = +cols[18];
let other_earnings = +cols[19];

let LIC = +cols[20];
let income_tax = +cols[21];
let professional_tax = +cols[22];
let KPTCL_employes_society = +cols[23];
let PLI = +cols[24];
let union_fund = +cols[25];
let sc_st_union_fund = +cols[26];
let house_rent = +cols[27];
let urban_bank = +cols[28];
let family_benefit_fund = +cols[29];
let festival_advance = +cols[30];
let PC_10_contribution = +cols[31];
let PC_14_contribution = +cols[32];
let LWF = +cols[33];
let recovery_any = +cols[34];
let other_deduction = +cols[35];

let totalEarning =
basic+dearness_pay+rouse_rent_allowances+city_compensation_allowances+
personal_pay+special_personal_pay+conveyance_allowances+washing_allowances+
sfta+special_locality_allowances+mwa+hill_allowances+charge_allowances+
pension_contribution_14_percent+labour_welfare_fund_company_contribution+
cash_duty_allowances+other_earnings;

let totalDeduction =
LIC+income_tax+professional_tax+KPTCL_employes_society+PLI+
union_fund+sc_st_union_fund+house_rent+urban_bank+family_benefit_fund+
festival_advance+PC_10_contribution+PC_14_contribution+LWF+
recovery_any+other_deduction;

let net = totalEarning-totalDeduction;

/* SAME salaryData */
window.salaryData = {
basic,dearness_pay,rouse_rent_allowances,city_compensation_allowances,
personal_pay,special_personal_pay,conveyance_allowances,washing_allowances,
sfta,special_locality_allowances,mwa,hill_allowances,charge_allowances,
pension_contribution_14_percent,labour_welfare_fund_company_contribution,
cash_duty_allowances,other_earnings,
LIC,income_tax,professional_tax,KPTCL_employes_society,PLI,union_fund,
sc_st_union_fund,house_rent,urban_bank,family_benefit_fund,festival_advance,
PC_10_contribution,PC_14_contribution,LWF,recovery_any,other_deduction,
totalEarning,totalDeduction,net
};

let s = window.salaryData;

document.getElementById("loader").style.display="none";
document.getElementById("pdfButtons").style.display="flex";

/* EXACT SAME UI */
document.getElementById("result").innerHTML = `

<h3>${month}/${year}</h3>

<div class="salary-card">

<h4>Earnings</h4>

<table style="width:100%;border-collapse:collapse">

${s.basic>0?`<tr><td>Basic</td><td style="text-align:right">₹ ${s.basic}</td></tr>`:''}
${s.dearness_pay>0?`<tr><td>Dearness Pay</td><td style="text-align:right">₹ ${s.dearness_pay}</td></tr>`:''}
${s.rouse_rent_allowances>0?`<tr><td>House Rent Allowance</td><td style="text-align:right">₹ ${s.rouse_rent_allowances}</td></tr>`:''}
${s.city_compensation_allowances>0?`<tr><td>City Compensation Allowance</td><td style="text-align:right">₹ ${s.city_compensation_allowances}</td></tr>`:''}
${s.personal_pay>0?`<tr><td>Personal Pay</td><td style="text-align:right">₹ ${s.personal_pay}</td></tr>`:''}
${s.special_personal_pay>0?`<tr><td>Special Personal Pay</td><td style="text-align:right">₹ ${s.special_personal_pay}</td></tr>`:''}
${s.conveyance_allowances>0?`<tr><td>Conveyance Allowance</td><td style="text-align:right">₹ ${s.conveyance_allowances}</td></tr>`:''}
${s.washing_allowances>0?`<tr><td>Washing Allowance</td><td style="text-align:right">₹ ${s.washing_allowances}</td></tr>`:''}
${s.sfta>0?`<tr><td>SFTA</td><td style="text-align:right">₹ ${s.sfta}</td></tr>`:''}

<tr style="border-top:1px solid #ddd;font-weight:bold">
<td>Total Earnings</td>
<td style="text-align:right">₹ ${s.totalEarning}</td>
</tr>

</table>

</div>

<div class="salary-card">

<h4>Deductions</h4>

<table style="width:100%;border-collapse:collapse">

${s.LIC>0?`<tr><td>LIC</td><td style="text-align:right">₹ ${s.LIC}</td></tr>`:''}
${s.income_tax>0?`<tr><td>Income Tax</td><td style="text-align:right">₹ ${s.income_tax}</td></tr>`:''}

<tr style="border-top:1px solid #ddd;font-weight:bold">
<td>Total Deduction</td>
<td style="text-align:right">₹ ${s.totalDeduction}</td>
</tr>

</table>

</div>

<div class="net-card">
Net Salary ₹ ${s.net}
</div>

`;

return;

}

}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found.";

}

/* SAME PRINT */
function printSalary(){
let content=document.getElementById("result").innerHTML;
let win=window.open('', '', 'width=800,height=600');
win.document.write('<html><body>'+content+'</body></html>');
win.document.close();
win.print();
}

/* ✅ FIXED PDF (NO BUG) */
async function downloadPDF(){

let user = localStorage.getItem("currentUser");

/* 🔹 FETCH EMPLOYEE DETAILS */
let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
let data = await response.text();
let rows = data.trim().split("\n");

let empName = user;
let empDesignation = "";
let empPlace = "";

for(let i=1;i<rows.length;i++){
let cols = rows[i].split(",");
if(cols[0] === user){
empName = cols[1];
empDesignation = cols[2];
empPlace = cols[3];
break;
}
}

/* 🔹 LAST MONTH */
let now = new Date();
let prev = new Date(now.getFullYear(), now.getMonth()-1, 1);

let year = prev.getFullYear();
let monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
let month = monthNames[prev.getMonth()];

/* 🔹 SALARY DATA */
let s = window.salaryData;

/* 🔹 ROW FUNCTION */
function row(name,value){
if(value>0){
return `<tr>
<td style="padding:4px 6px">${name}</td>
<td style="text-align:right;padding:4px 6px">₹ ${value}</td>
</tr>`;
}
return "";
}

/* 🔥 FULL PDF (ALL FIELDS INCLUDED) */
let pdfContent = `

<div style="font-family:sans-serif;padding:20px">

<div style="text-align:center">
<h2>HUBLI ELECTRICITY SUPPLY COMPANY LTD.</h2>
<h4>O & M Division, Sirsi</h4>

<div style="display:flex;justify-content:space-between;margin-top:10px">
<p><b>Name :</b> ${empName}</p>
<p><b>Designation :</b> ${empDesignation}</p>
</div>

<div style="display:flex;justify-content:space-between">
<p><b>Working Place :</b> ${empPlace}</p>
<p><b>Month :</b> ${month} ${year}</p>
</div>

<hr>
</div>

<table style="width:100%;border-collapse:collapse;margin-top:20px">

<tr>
<th style="background:#5e00a3;color:white;padding:8px">Earnings</th>
<th style="background:#5e00a3;color:white;padding:8px">Deductions</th>
</tr>

<tr>

<td style="padding:10px;border-right:1px solid #ddd;vertical-align:top">

<table style="width:100%;border-collapse:collapse;font-size:14px">

${row("Basic",s.basic)}
${row("Dearness Pay",s.dearness_pay)}
${row("House Rent Allowance",s.rouse_rent_allowances)}
${row("City Compensation Allowance",s.city_compensation_allowances)}
${row("Personal Pay",s.personal_pay)}
${row("Special Personal Pay",s.special_personal_pay)}
${row("Conveyance Allowance",s.conveyance_allowances)}
${row("Washing Allowance",s.washing_allowances)}
${row("SFTA",s.sfta)}
${row("Special Locality Allowance",s.special_locality_allowances)}
${row("MWA",s.mwa)}
${row("Hill Allowance",s.hill_allowances)}
${row("Charge Allowance",s.charge_allowances)}
${row("Pension Contribution",s.pension_contribution_14_percent)}
${row("LWF Company Contribution",s.labour_welfare_fund_company_contribution)}
${row("Cash Duty Allowance",s.cash_duty_allowances)}
${row("Other Earnings",s.other_earnings)}

<tr style="border-top:1px solid #000;font-weight:bold">
<td>Total Earnings</td>
<td style="text-align:right">₹ ${s.totalEarning}</td>
</tr>

</table>

</td>

<td style="padding:10px;vertical-align:top">

<table style="width:100%;border-collapse:collapse;font-size:14px">

${row("LIC",s.LIC)}
${row("Income Tax",s.income_tax)}
${row("Professional Tax",s.professional_tax)}
${row("KPTCL Employee Society",s.KPTCL_employes_society)}
${row("PLI",s.PLI)}
${row("Union Fund",s.union_fund)}
${row("SC/ST Union Fund",s.sc_st_union_fund)}
${row("House Rent",s.house_rent)}
${row("Urban Bank",s.urban_bank)}
${row("Family Benefit Fund",s.family_benefit_fund)}
${row("Festival Advance",s.festival_advance)}
${row("PC 10% Contribution",s.PC_10_contribution)}
${row("PC 14% Contribution",s.PC_14_contribution)}
${row("LWF",s.LWF)}
${row("Recovery",s.recovery_any)}
${row("Other Deduction",s.other_deduction)}

<tr style="border-top:1px solid #000;font-weight:bold">
<td>Total Deduction</td>
<td style="text-align:right">₹ ${s.totalDeduction}</td>
</tr>

</table>

</td>

</tr>

</table>

<hr style="margin-top:20px">

<div style="text-align:right;font-size:22px;font-weight:bold;margin-top:20px">
Net Salary : ₹ ${s.net}
</div>

</div>
`;

/* 🔥 SAFE RENDER */
let container = document.createElement("div");
container.innerHTML = pdfContent;

container.style.position = "fixed";
container.style.top = "0";
container.style.left = "0";
container.style.width = "800px";
container.style.background = "white";
container.style.zIndex = "-1";

document.body.appendChild(container);

html2pdf().set({
margin:0.8,
filename:'Salary.pdf',
image:{type:'jpeg',quality:0.98},
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4'}
}).from(container).save().then(()=>{
document.body.removeChild(container);
});

}

</script>

</body>
</html>
