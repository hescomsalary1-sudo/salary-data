<!DOCTYPE html>
<html>
<head>

<title>Last Month Salary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background: linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* HEADER */
.top{
display:flex;
align-items:center;
gap:12px;
padding:18px 15px;
background: linear-gradient(135deg,#4b2dd8,#6c39ff);
color:white;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

/* BACK BUTTON */
.back-btn{
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* CHART */
.chart-box{
margin:15px;
padding:15px;
background:white;
border-radius:20px;
}

/* CONTENT */
.content{
padding:15px;
}

/* CARD */
.salary-card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:15px;
}

/* TABLE */
table{
width:100%;
}

td{
padding:8px 0;
}

td:last-child{
text-align:right;
font-weight:bold;
}

/* NET */
.net-card{
margin:15px;
padding:18px;
border-radius:20px;
background: linear-gradient(135deg,#4b2dd8,#6c39ff);
color:white;
text-align:center;
font-size:20px;
}

/* BUTTON */
.action-btn{
margin:15px;
padding:14px;
border-radius:15px;
background:#4b2dd8;
color:white;
border:none;
width:calc(100% - 30px);
}

/* LOADER */
.loader{
display:flex;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
align-items:center;
justify-content:center;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #4b2dd8;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">
  <div class="back-btn" onclick="goBack()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M15 18L9 12L15 6" stroke="#4b2dd8" stroke-width="2.5" fill="none"/>
    </svg>
  </div>
  <h2>Last Month Salary</h2>
</div>

<div class="chart-box">
  <canvas id="salaryChart"></canvas>
</div>

<div class="content" id="result"></div>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<script>

let user = localStorage.getItem("currentUser");
if(!user){ window.location="login.html"; }

function goBack(){
window.location="home.html";
}

async function loadLastSalary(){

let now = new Date();
let prev = new Date(now.getFullYear(), now.getMonth()-1, 1);

let year = prev.getFullYear().toString();
let month = String(prev.getMonth()+1).padStart(2,"0");

try{

let response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/salary%20.csv");
let data = await response.text();
let rows = data.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0]===user && c[1]===year && c[2]===month){

let basic = +c[3];
let dearness_pay = +c[4];
let hra = +c[5];
let cca = +c[6];
let personal_pay = +c[7];
let special_personal_pay = +c[8];
let conveyance = +c[9];
let washing = +c[10];
let sfta = +c[11];

let LIC = +c[20];
let income_tax = +c[21];

let totalE = basic+dearness_pay+hra+cca+personal_pay+special_personal_pay+conveyance+washing+sfta;
let totalD = LIC+income_tax;
let net = totalE-totalD;

/* CHART */
let labels=[], dataArr=[];
[
["Basic",basic],["DA",dearness_pay],["HRA",hra],
["CCA",cca],["PP",personal_pay]
].forEach(i=>{
if(i[1]>0){ labels.push(i[0]); dataArr.push(i[1]); }
});

new Chart(document.getElementById("salaryChart"),{
type:"doughnut",
data:{labels:labels,datasets:[{data:dataArr}]},
options:{plugins:{legend:{position:"bottom"}}}
});

/* UI */
document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML = `

<h3>${month}/${year}</h3>

<div class="salary-card">
<h4>Earnings</h4>
<table>
<tr><td>Basic</td><td>₹ ${basic}</td></tr>
<tr><td>DA</td><td>₹ ${dearness_pay}</td></tr>
<tr><td>HRA</td><td>₹ ${hra}</td></tr>
<tr><td>CCA</td><td>₹ ${cca}</td></tr>
<tr><td><b>Total</b></td><td>₹ ${totalE}</td></tr>
</table>
</div>

<div class="salary-card">
<h4>Deductions</h4>
<table>
<tr><td>LIC</td><td>₹ ${LIC}</td></tr>
<tr><td>Income Tax</td><td>₹ ${income_tax}</td></tr>
<tr><td><b>Total</b></td><td>₹ ${totalD}</td></tr>
</table>
</div>

<div class="net-card">
Net Salary ₹ ${net}
</div>

<button class="action-btn" onclick="downloadPDF()">📄 Download PDF</button>

`;

return;

}

}

document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="No salary found";

}catch(e){
document.getElementById("loader").style.display="none";
document.getElementById("result").innerHTML="Error loading salary";
}

}

function downloadPDF(){
html2pdf().from(document.getElementById("result")).save();
}

loadLastSalary();

</script>

</body>
</html>
