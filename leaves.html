<!DOCTYPE html>
<html>
<head>
<title>Leaves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f4f6ff;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:28px 22px;
background:linear-gradient(135deg,#4b2dd8,#7b5cff);
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}

.asdate{font-size:14px;margin-top:5px;opacity:0.9;}

/* CREDIT BOX */
.credit-box{
margin-top:15px;
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
}
.credit-row{
display:flex;
justify-content:space-between;
padding:8px 0;
}

/* BUTTONS */
.btns{
display:flex;
gap:10px;
padding:15px;
}
.btn{
flex:1;
padding:10px;
border:none;
border-radius:12px;
background:#ddd;
font-weight:bold;
}
.active{
background:#4b2dd8;
color:white;
}

/* LIST */
.container{
padding:15px;
}
.card{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.footer a{
text-decoration:none;
color:#4b2dd8;
text-align:center;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<h2>Leave Dashboard</h2>
<div class="asdate" id="asOnDate">As on Date: --</div>

<div class="credit-box">
<div class="credit-row"><span>EL</span><span id="elCredit">0</span></div>
<div class="credit-row"><span>FPL</span><span id="fplCredit">0</span></div>
<div class="credit-row"><span>CL</span><span id="clCredit">0</span></div>
</div>
</div>

<!-- BUTTONS -->
<div class="btns">
<button class="btn active" onclick="filterLeave('EL',this)">EL</button>
<button class="btn" onclick="filterLeave('FPL',this)">FPL</button>
<button class="btn" onclick="filterLeave('CL',this)">CL</button>
</div>

<!-- LIST -->
<div class="container" id="leaveContainer"></div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html">🏠<br>Home</a>
<a href="accounts.html">👤<br>Profile</a>
<a href="salary.html">💰<br>Salary</a>
<a href="page3.html">📅<br>Attendance</a>
</div>

<script>

let user = localStorage.getItem("currentUser");

let currentType = "EL";

/* LOAD CREDIT */
async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0] === user){

elCredit.innerText = c[3];
fplCredit.innerText = c[4];
clCredit.innerText = c[5];

asOnDate.innerText = "As on Date: " + c[6];

}
}

}

/* FILTER BUTTON */
function filterLeave(type,btn){

currentType = type;

/* highlight */
document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

loadAttendance();

}

/* LOAD ATTENDANCE */
async function loadAttendance(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();
let rows = text.trim().split("\n");

let monthMap = {};

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0] !== user) continue;

let year = c[1];
let month = c[2];

let count = 0;

/* check 31 days */
for(let d=3; d<34; d++){
let val = c[d]?.trim();
if(val === currentType){
count++;
}
}

/* store month wise */
if(count>0){
monthMap[month+"-"+year] = (monthMap[month+"-"+year] || 0) + count;
}

}

/* display */
let html = "";

for(let key in monthMap){
html += `<div class="card">${key} : ${monthMap[key]} days</div>`;
}

leaveContainer.innerHTML = html || "No Data";

}

/* INIT */
loadEmployee().then(loadAttendance);

</script>

</body>
</html>
