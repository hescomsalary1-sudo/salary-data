<!DOCTYPE html>
<html>
<head>
<title>Leaves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2ff;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:28px 22px;
background:#4b2dd8;
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}

.asdate{font-size:14px;margin-top:5px;opacity:0.9;}

.credit-box{
margin-top:15px;
background:#25166c;
padding:15px;
border-radius:15px;
}
.credit-row{
display:flex;
justify-content:space-between;
padding:8px 0;
}

/* CURVE */
.curve-box{
margin-top:-20px;
background:#e6ebff;
border-top-left-radius:30px;
border-top-right-radius:30px;
padding:20px 15px;
}

/* BUTTONS */
.btn-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.btn-card{
background:#4b2dd8;
color:white;
padding:18px 10px;
border-radius:18px;
text-align:center;
font-weight:600;
transition:0.2s;
}

.btn-card.active{
background:#25166c;
transform:scale(1.05);
}

/* EXTRA BUTTON */
.extra-btn{
margin-top:15px;
background:#4b2dd8;
color:white;
padding:14px;
border-radius:15px;
text-align:center;
font-weight:600;
transition:0.2s;
}

.extra-btn.active{
background:#25166c;
transform:scale(1.05);
}

/* TITLE */
.section-title{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#990000;
}

/* LIST */
.list-box{
margin-top:10px;
background:white;
border-radius:25px;
padding:20px;
min-height:200px;
}

.month{
font-weight:bold;
color:#4b2dd8;
margin-top:10px;
}

.item{
padding-left:10px;
margin:4px 0;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
}
.footer a{
text-decoration:none;
color:#4b2dd8;
text-align:center;
}

</style>
</head>

<body>

<div class="top">
<h2>Leave Dashboard</h2>
<div class="asdate" id="asOnDate">As on Date: --</div>

<div class="credit-box">
<div class="credit-row"><span>EL</span><span id="elCredit">0</span></div>
<div class="credit-row"><span>FPL</span><span id="fplCredit">0</span></div>
<div class="credit-row"><span>CL</span><span id="clCredit">0</span></div>
</div>
</div>

<div class="curve-box">

<div class="btn-grid">
<div class="btn-card active" onclick="filterLeave('EL',this)">Earned Leave</div>
<div class="btn-card" onclick="filterLeave('FPL',this)">Full Pay Leave</div>
<div class="btn-card" onclick="filterLeave('CL',this)">Casual Leave</div>
</div>

<div class="section-title">Leave History</div>
<div class="list-box" id="leaveContainer"></div>

<div class="extra-btn" onclick="activateExtra(this); showOtherLeaves()">Other Leaves Taken Details</div>
<div class="extra-btn" onclick="activateExtra(this); showBalance()">Leave Balance</div>

</div>

<div class="footer">
<a href="home.html">🏠<br>Home</a>
<a href="accounts.html">👤<br>Profile</a>
<a href="salary.html">💰<br>Salary</a>
<a href="page3.html">📅<br>Attendance</a>
</div>

<script>

let user = localStorage.getItem("currentUser");

let currentType = "EL";

let elCredit=0,fplCredit=0,clCredit=0;
let elTaken=0,fplTaken=0,clTaken=0;

let creditCalculated = false; // 🔥 FIX

/* LOAD CREDIT */
async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user){

elCredit = parseInt(c[3]) || 0;
fplCredit = parseInt(c[4]) || 0;
clCredit = parseInt(c[5]) || 0;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

document.getElementById("asOnDate").innerText =
"As on Date: " + (c[6] || "--");

}
}

}

/* BUTTONS */
function filterLeave(type,el){

currentType = type;

document.querySelectorAll(".btn-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

loadAttendance();

}

function activateExtra(el){

document.querySelectorAll(".btn-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

}

/* RANGE GROUPING */
function groupRanges(arr){

if(arr.length===0) return [];

let res=[];
let start=arr[0];
let prev=arr[0];

for(let i=1;i<arr.length;i++){

let cur=arr[i];

if(cur.day===prev.day+1){
prev=cur;
}else{
res.push({start:start,end:prev,type:start.type});
start=cur;
prev=cur;
}
}

res.push({start:start,end:prev,type:start.type});

return res;
}

/* LOAD ATTENDANCE */
async function loadAttendance(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();
let rows = text.trim().split("\n");

let monthMap={};

let currentYear = new Date().getFullYear();
let prevYear = (currentYear - 1).toString();

elTaken=0;fplTaken=0;clTaken=0;
let prevElTaken=0, prevFplTaken=0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() !== user) continue;

let year=c[1];
let month=c[2];

let list=[];

for(let d=3;d<34;d++){

let val=c[d]?.trim();
if(!val) continue;

/* CURRENT YEAR */
if(year == currentYear){

if(val==="EL") elTaken++;
if(val==="FPL") fplTaken++;
if(val==="CL") clTaken++;

if(val===currentType){
list.push({day:d-2,type:val,month,year});
}

}

/* PREVIOUS YEAR */
if(year == prevYear){

if(val==="EL") prevElTaken++;
if(val==="FPL") prevFplTaken++;

}

}

if(list.length){
monthMap[month+"-"+year]=groupRanges(list);
}

}

/* APPLY POLICY ONLY ONCE */
if(!creditCalculated){

let prevElBalance = elCredit - prevElTaken;
let prevFplBalance = fplCredit - prevFplTaken;

elCredit = prevElBalance + 30;
fplCredit = prevFplBalance + 10;
clCredit = 10;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

creditCalculated = true;
}

renderRanges(monthMap);

}

/* OTHER LEAVES */
async function showOtherLeaves(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();
let rows = text.trim().split("\n");

let monthMap={};

for(let i=1;i<rows.length;i++){

let c=rows[i].split(",");

if(c[0].trim()!==user) continue;

let year=c[1];
let month=c[2];

let list=[];

for(let d=3;d<34;d++){

let val=c[d]?.trim();
if(!val) continue;

if(val==="EL"||val==="FPL"||val==="CL"||val==="GH"||val==="P"||val==="A") continue;

list.push({day:d-2,type:val,month,year});

}

if(list.length){
monthMap[month+"-"+year]=groupRanges(list);
}

}

renderRanges(monthMap);

}

/* BALANCE */
function showBalance(){

let html = `
<div class="item">EL Balance : ${elCredit - elTaken}</div>
<div class="item">FPL Balance : ${fplCredit - fplTaken}</div>
<div class="item">CL Balance : ${clCredit - clTaken}</div>
`;

document.getElementById("leaveContainer").innerHTML = html;

}

/* RENDER */
function renderRanges(map){

let html="";

for(let m in map){

html+=`<div class="month">${m}</div>`;

map[m].forEach(r=>{

let s=("0"+r.start.day).slice(-2);
let e=("0"+r.end.day).slice(-2);

if(s===e){
html+=`<div class="item">• ${s}-${r.start.month}-${r.start.year} - ${r.type}</div>`;
}else{
html+=`<div class="item">• ${r.type} from ${s}-${r.start.month}-${r.start.year} to ${e}-${r.start.month}-${r.start.year}</div>`;
}

});

}

document.getElementById("leaveContainer").innerHTML = html || "No Data found";

}

/* INIT */
loadEmployee().then(loadAttendance);

</script>

</body>
</html>
