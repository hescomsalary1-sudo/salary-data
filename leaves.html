<!DOCTYPE html>
<html>
<head>
<title>Leaves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2ff;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:28px 22px;
background:linear-gradient(135deg,#4b2dd8,#7b5cff);
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}

.asdate{font-size:14px;margin-top:5px;opacity:0.9;}

.credit-box{
margin-top:15px;
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
}
.credit-row{
display:flex;
justify-content:space-between;
padding:8px 0;
}

/* CURVE */
.curve-box{
margin-top:-20px;
background:#e6ebff;
border-top-left-radius:30px;
border-top-right-radius:30px;
padding:20px 15px;
}


/* SLIDER BUTTONS (PREMIUM FIXED) */
.btn-scroll{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 5px;
scroll-snap-type:x mandatory;
}

.btn-scroll::-webkit-scrollbar{
display:none;
}

.btn-card{
flex:0 0 180px;   /* BIG SIZE RESTORED */
background:#0f766e;
color:white;
padding:22px 12px;
border-radius:22px;
text-align:center;
font-weight:700;
font-size:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.18);
transition:0.3s;
scroll-snap-align:start;
}

.btn-card.active{
background:#134e4a;
transform:scale(1.06);
}

/* HISTORY */
.section-title{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0f766e;
}

.list-box{
margin-top:10px;
background:white;
border-radius:25px;
padding:15px;
min-height:200px;
}

/* MONTH */
.month{
font-weight:bold;
margin-top:10px;
color:#4b2dd8;
}

/* ITEM */
.item{
padding-left:10px;
margin:4px 0;
font-size:14px;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
}
.footer a{
text-decoration:none;
color:#4b2dd8;
text-align:center;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
<h2>Leave Dashboard</h2>
<div class="asdate" id="asOnDate">As on Date: --</div>

<div class="credit-box">
<div class="credit-row"><span>EL</span><span id="elCredit">0</span></div>
<div class="credit-row"><span>FPL</span><span id="fplCredit">0</span></div>
<div class="credit-row"><span>CL</span><span id="clCredit">0</span></div>
</div>
</div>

<!-- CURVE -->
<div class="curve-box">

<div class="btn-scroll">
  <div class="btn-card active" onclick="filterLeave('EL',this)">Earned Leave</div>
  <div class="btn-card" onclick="filterLeave('FPL',this)">Full Pay Leave</div>
  <div class="btn-card" onclick="filterLeave('CL',this)">Casual Leave</div>
  <div class="btn-card" onclick="filterLeave('OTHER',this)">Other Leave</div>
</div>
<div class="section-title">Leave History</div>

<div class="list-box" id="leaveContainer">
No Data found
</div>

</div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html">🏠<br>Home</a>
<a href="accounts.html">👤<br>Profile</a>
<a href="salary.html">💰<br>Salary</a>
<a href="page3.html">📅<br>Attendance</a>
</div>

<script>

let user = localStorage.getItem("currentUser");
let currentType = "EL";

/* MONTH MAP */
const monthNum={
Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",
Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"
};

/* LOAD CREDIT */
async function loadEmployee(){
let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){
let c = rows[i].split(",");
if(c[0]===user){
elCredit.innerText=c[3];
fplCredit.innerText=c[4];
clCredit.innerText=c[5];
asOnDate.innerText="As on Date: "+c[6];
}
}
}

/* BUTTON */
function filterLeave(type,el){
currentType=type;
document.querySelectorAll(".btn-card").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
loadAttendance();
}

/* LOAD ATTENDANCE */
async function loadAttendance(){

let res=await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text=await res.text();
let rows=text.trim().split("\n");

let monthMap={};

for(let i=1;i<rows.length;i++){

let c=rows[i].split(",");
if(c[0]!==user) continue;

let year=c[1];
let month=c[2];

for(let d=3; d<34; d++){

let val=c[d]?.trim();
if(!val) continue;

let show=false;

if(currentType==="EL" && val==="EL") show=true;
else if(currentType==="FPL" && val==="FPL") show=true;
else if(currentType==="CL" && val==="CL") show=true;
else if(currentType==="OTHER"){
if(val!=="EL" && val!=="FPL" && val!=="CL" && val!=="P" && val!=="A"){
show=true;
}
}

if(show){

let day=("0"+(d-2)).slice(-2);
let fullDate = `${day}-${monthNum[month]}-${year}`;

if(!monthMap[month+"-"+year]) monthMap[month+"-"+year]=[];

monthMap[month+"-"+year].push(`${fullDate} - ${val}`);

}

}

}

/* DISPLAY */
let html="";

for(let m in monthMap){

html+=`<div class="month">${m}</div>`;

monthMap[m].forEach(x=>{
html+=`<div class="item">• ${x}</div>`;
});

}

leaveContainer.innerHTML = html || "No Data found";

}

/* INIT */
loadEmployee().then(loadAttendance);

</script>

</body>
</html>
