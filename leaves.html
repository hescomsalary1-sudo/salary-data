<!DOCTYPE html>
<html>
<head>
<title>Leaves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:'Segoe UI',sans-serif;margin:0;background:#eef2ff;padding-bottom:90px;}
.top{padding:28px 22px;background:#4b2dd8;color:white;border-bottom-left-radius:35px;border-bottom-right-radius:35px;}
.asdate{font-size:14px;margin-top:5px;opacity:0.9;}
.credit-box{margin-top:15px;background:#25166c;padding:15px;border-radius:15px;}
.credit-row{display:flex;justify-content:space-between;padding:8px 0;}
.curve-box{margin-top:-20px;background:#e6ebff;border-top-left-radius:30px;border-top-right-radius:30px;padding:20px 15px;}
.btn-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.btn-card{background:#4b2dd8;color:white;padding:18px 10px;border-radius:18px;text-align:center;font-weight:600;}
.btn-card.active{background:#25166c;transform:scale(1.05);}
.extra-btn{margin-top:15px;background:#4b2dd8;color:white;padding:14px;border-radius:15px;text-align:center;font-weight:600;}
.extra-btn.active{background:#25166c;transform:scale(1.05);}
.section-title{margin-top:20px;font-size:20px;font-weight:bold;color:#990000;}
.list-box{margin-top:10px;background:white;border-radius:25px;padding:20px;min-height:200px;}
.month{font-weight:bold;color:#4b2dd8;margin-top:10px;}
.item{padding-left:10px;margin:4px 0;}
.footer{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px 0;}
.footer a{text-decoration:none;color:#4b2dd8;text-align:center;}
</style>
</head>

<body>

<div class="top">
<h2>Leave Dashboard</h2>
<div class="asdate" id="asOnDate">As on Date: --</div>

<div class="credit-box">
<div class="credit-row"><span>EL</span><span id="elCredit">0</span></div>
<div class="credit-row"><span>FPL</span><span id="fplCredit">0</span></div>
<div class="credit-row"><span>CL</span><span id="clCredit">0</span></div>
</div>
</div>

<div class="curve-box">

<div class="btn-grid">
<div class="btn-card active" onclick="filterLeave('EL',this)">Earned Leave</div>
<div class="btn-card" onclick="filterLeave('FPL',this)">Full Pay Leave</div>
<div class="btn-card" onclick="filterLeave('CL',this)">Casual Leave</div>
</div>

<div class="section-title">Leave History</div>
<div class="list-box" id="leaveContainer"></div>

<div class="extra-btn" onclick="activateExtra(this); showOtherLeaves()">Other Leaves Taken Details</div>

<div class="extra-btn" onclick="activateExtra(this); showELS()">ELS Bills Details</div>

<div class="extra-btn" onclick="activateExtra(this); showBalance()">Leave Balance</div>

</div>

<div class="footer">
<a href="home.html">🏠<br>Home</a>
<a href="accounts.html">👤<br>Profile</a>
<a href="salary.html">💰<br>Salary</a>
<a href="page3.html">📅<br>Attendance</a>
</div>

<script>

let user = localStorage.getItem("currentUser");
let currentType = "EL";

let elCredit=0,fplCredit=0,clCredit=0;
let elTaken=0,fplTaken=0,clTaken=0;
let totalELS = 0;

/* LOAD CREDIT */
async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){
let c = rows[i].split(",");
if(c[0].trim() === user){

elCredit = parseInt(c[3]) || 0;
fplCredit = parseInt(c[4]) || 0;
clCredit = parseInt(c[5]) || 0;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

document.getElementById("asOnDate").innerText =
"As on Date: " + (c[6] || "--");

}
}

}

/* BUTTONS */
function filterLeave(type,el){
currentType = type;
document.querySelectorAll(".btn-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
loadAttendance();
}

function activateExtra(el){
document.querySelectorAll(".btn-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* LOAD ATTENDANCE */
async function loadAttendance(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();
let rows = text.trim().split("\n");

let html="";
elTaken=0;fplTaken=0;clTaken=0;

for(let i=1;i<rows.length;i++){
let c = rows[i].split(",");
if(c[0]!==user) continue;

for(let d=3;d<34;d++){
let val=c[d]?.trim();
if(!val) continue;

if(val==="EL") elTaken++;
if(val==="FPL") fplTaken++;
if(val==="CL") clTaken++;

if(val===currentType){
html += `<div class="item">${d-2}-${c[2]}-${c[1]} - ${val}</div>`;
}
}
}

leaveContainer.innerHTML = html || "No Data";

}

/* ELS DETAILS */
async function showELS(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");
let text = await res.text();
let rows = text.trim().split("\n");

let html="";
totalELS = 0;

for(let i=1;i<rows.length;i++){
let c = rows[i].split(",");

if(c[0].trim()===user){

let days = parseInt(c[6]) || 0;
totalELS += days;

html += `
<div class="item">
Period: ${c[3]} | Days: ${days} | Status: ${c[4]}
</div>
`;

}
}

leaveContainer.innerHTML = html || "No ELS Data";

}

/* BALANCE */
function showBalance(){

let elBalance = elCredit - elTaken - totalELS;

let html = `
<div class="item">EL Balance : ${elBalance}</div>
<div class="item">FPL Balance : ${fplCredit - fplTaken}</div>
<div class="item">CL Balance : ${clCredit - clTaken}</div>
`;

leaveContainer.innerHTML = html;

}

loadEmployee().then(loadAttendance);

</script>

</body>
</html>
