<!DOCTYPE html>
<html>
<head>
<title>Leaves Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f4f7ff;
color:#1a1a1a;
padding-bottom:120px;
overflow-x:hidden;
}

/* TOP SECTION */

.top-section{
background:linear-gradient(135deg,#081c6b,#2457ff,#5b86ff);
padding:25px 18px 95px;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
position:relative;
overflow:hidden;
}

.top-section::before{
content:'';
position:absolute;
width:220px;
height:220px;
background:rgba(255,255,255,0.08);
border-radius:50%;
top:-80px;
right:-60px;
}

.top-section::after{
content:'';
position:absolute;
width:150px;
height:150px;
background:rgba(255,255,255,0.06);
border-radius:50%;
bottom:-50px;
left:-40px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:15px;
position:relative;
z-index:2;
}

.back-btn{
width:42px;
height:42px;
border-radius:14px;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.back-btn:active{
transform:scale(0.95);
}

.page-title{
color:white;
font-size:24px;
font-weight:700;
letter-spacing:0.5px;
}

.asdate{
margin-top:12px;
margin-left:58px;
color:rgba(255,255,255,0.85);
font-size:13px;
font-weight:400;
position:relative;
z-index:2;
}

/* CREDIT CARD */

.credit-card{
margin-top:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.15);
padding:20px;
border-radius:28px;
position:relative;
z-index:2;
box-shadow:0 10px 35px rgba(0,0,0,0.15);
}

.credit-title{
color:white;
font-size:18px;
font-weight:600;
margin-bottom:18px;
}

.credit-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.credit-box{
background:rgba(255,255,255,0.14);
padding:14px 10px;
border-radius:18px;
text-align:center;
}

.credit-box span{
display:block;
}

.credit-label{
font-size:12px;
color:rgba(255,255,255,0.8);
margin-bottom:8px;
}

.credit-value{
font-size:24px;
font-weight:700;
color:white;
}

/* MAIN CONTENT */

.main{
margin-top:-60px;
padding:0 16px;
position:relative;
z-index:5;
}

/* FILTER CARDS */

.filter-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.filter-card{
background:white;
padding:16px 10px;
border-radius:22px;
text-align:center;
font-size:13px;
font-weight:600;
color:#2457ff;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
}

.filter-card.active{
background:linear-gradient(135deg,#2457ff,#0a2ea8);
color:white;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(36,87,255,0.35);
}

/* SECTION */

.section{
margin-top:22px;
}

.section-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.section-title{
font-size:20px;
font-weight:700;
color:#1b2a5a;
}

.history-card{
background:white;
border-radius:28px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
min-height:250px;
}

/* MONTH */

.month{
font-size:16px;
font-weight:700;
color:#2457ff;
margin-top:18px;
margin-bottom:12px;
padding-bottom:8px;
border-bottom:1px solid #edf1ff;
}

.month:first-child{
margin-top:0;
}

/* ITEM */

.item{
background:#f6f8ff;
padding:14px;
border-radius:16px;
margin-bottom:10px;
font-size:14px;
font-weight:500;
color:#2f2f2f;
line-height:1.5;
border-left:4px solid #2457ff;
}

/* EXTRA BUTTONS */

.extra-section{
margin-top:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.extra-btn{
background:white;
padding:17px;
border-radius:22px;
font-size:15px;
font-weight:600;
color:#2457ff;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.3s;
}

.extra-btn.active{
background:linear-gradient(135deg,#2457ff,#0a2ea8);
color:white;
transform:translateY(-2px);
}

.extra-btn svg{
width:18px;
height:18px;
}

/* NO DATA */

.no-data{
text-align:center;
padding:40px 15px;
font-size:15px;
font-weight:500;
color:#7b7b7b;
}

/* MOBILE */

@media(max-width:380px){

.credit-grid{
grid-template-columns:1fr;
}

.filter-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="top-section">

<div class="header">

<div class="back-btn" onclick="goBack()">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6"
stroke="white"
stroke-width="2.7"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</div>

<div class="page-title">Leave Dashboard</div>

</div>

<div class="asdate" id="asOnDate">As on Date : --</div>

<div class="credit-card">

<div class="credit-title">Leave Credits</div>

<div class="credit-grid">

<div class="credit-box">
<span class="credit-label">Earned Leave</span>
<span class="credit-value" id="elCredit">0</span>
</div>

<div class="credit-box">
<span class="credit-label">Full Pay Leave</span>
<span class="credit-value" id="fplCredit">0</span>
</div>

<div class="credit-box">
<span class="credit-label">Casual Leave</span>
<span class="credit-value" id="clCredit">0</span>
</div>

</div>

</div>

</div>

<div class="main">

<div class="filter-grid">

<div class="filter-card active" onclick="filterLeave('EL',this)">
Earned Leave
</div>

<div class="filter-card" onclick="filterLeave('FPL',this)">
Full Pay Leave
</div>

<div class="filter-card" onclick="filterLeave('CL',this)">
Casual Leave
</div>

</div>

<div class="section">

<div class="section-head">
<div class="section-title">Leave History</div>
</div>

<div class="history-card" id="leaveContainer"></div>

</div>

<div class="extra-section">

<div class="extra-btn" onclick="activateExtra(this); showOtherLeaves()">
<span>Other Leaves Taken Details</span>

<svg fill="none" viewBox="0 0 24 24">
<path d="M9 18L15 12L9 6"
stroke="currentColor"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</div>

<div class="extra-btn" onclick="activateExtra(this); showELS()">
<span>ELS Bills Details</span>

<svg fill="none" viewBox="0 0 24 24">
<path d="M9 18L15 12L9 6"
stroke="currentColor"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</div>

<div class="extra-btn" onclick="activateExtra(this); showBalance()">
<span>Leave Balance</span>

<svg fill="none" viewBox="0 0 24 24">
<path d="M9 18L15 12L9 6"
stroke="currentColor"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</div>

</div>

</div>

<script>

let user = localStorage.getItem("currentUser");
let currentType = "EL";
let elCredit=0,fplCredit=0,clCredit=0;
let elTaken=0,fplTaken=0,clTaken=0;
let creditCalculated = false;
let asOnDay=1, asOnMonth=1, asOnYear=new Date().getFullYear();
let dataReady = false;
let elsDaysCurrentYear = 0;

async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user){

elCredit = parseInt(c[3]) || 0;
fplCredit = parseInt(c[4]) || 0;
clCredit = parseInt(c[5]) || 0;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

let asDate = c[6] || "--";

document.getElementById("asOnDate").innerText = "As on Date : " + asDate;

if(asDate !== "--"){

let parts = asDate.split("-");

asOnDay = parseInt(parts[0]);
asOnMonth = parseInt(parts[1]);
asOnYear = parseInt(parts[2]);

}

}

}

}

function filterLeave(type,el){

currentType = type;

document.querySelectorAll(".filter-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

loadAttendance();

}

function activateExtra(el){

document.querySelectorAll(".filter-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

}

function groupRanges(arr){

if(arr.length===0) return [];

let res=[];
let start=arr[0];
let prev=arr[0];

for(let i=1;i<arr.length;i++){

let cur=arr[i];

if(cur.day===prev.day+1){

prev=cur;

}else{

res.push({start:start,end:prev,type:start.type});
start=cur;
prev=cur;

}

}

res.push({start:start,end:prev,type:start.type});

return res;

}

async function loadAttendance(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();

let rows = text.trim().split("\n");

let monthMap={};

elTaken=0;
fplTaken=0;
clTaken=0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() !== user) continue;

let year=c[1];
let month=c[2];

let list=[];

for(let d=3;d<34;d++){

let val=c[d]?.trim();

if(!val) continue;

let day = d-2;

if(year != asOnYear) continue;
if(month < asOnMonth) continue;
if(month == asOnMonth && day < asOnDay) continue;

if(val==="EL") elTaken++;
if(val==="FPL") fplTaken++;
if(val==="CL") clTaken++;

if(val===currentType){

list.push({day,type:val,month,year});

}

}

if(list.length){

monthMap[month+"-"+year]=groupRanges(list);

}

}

if(!creditCalculated){

let today = new Date();

let year = today.getFullYear();

let jan1 = new Date(year, 0, 1);
let july1 = new Date(year, 6, 1);

let finalEL = elCredit;
let finalFPL = fplCredit;
let finalCL = clCredit;

if(today >= jan1 && today < july1){

finalEL = elCredit + 15;
finalFPL = fplCredit + 5;

}

if(today >= july1){

finalEL = elCredit + 30;
finalFPL = fplCredit + 10;

}

elCredit = finalEL;
fplCredit = finalFPL;
clCredit = finalCL;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

creditCalculated = true;

}

renderRanges(monthMap);

}

async function showOtherLeaves(){

if(!dataReady){

setTimeout(showOtherLeaves,300);
return;

}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();

let rows = text.trim().split("\n");

let monthMap={};

for(let i=1;i<rows.length;i++){

let c=rows[i].split(",");

if(c[0].trim()!==user) continue;

let year=c[1];
let month=c[2];

let list=[];

for(let d=3;d<34;d++){

let val=c[d]?.trim();

if(!val) continue;

let day = d-2;

if(year != asOnYear) continue;
if(month < asOnMonth) continue;
if(month == asOnMonth && day < asOnDay) continue;

if(val==="EL"||val==="FPL"||val==="CL"||val==="GH"||val==="P"||val==="A") continue;

list.push({day,type:val,month,year});

}

if(list.length){

monthMap[month+"-"+year]=groupRanges(list);

}

}

renderRanges(monthMap);

}

async function showELS(){

if(!dataReady){

setTimeout(showELS,300);
return;

}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");
let text = await res.text();

let rows = text.trim().split("\n");

let currentYear = asOnYear.toString();

let html="";

elsDaysCurrentYear = 0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user && c[1].trim() === currentYear){

let days = parseInt(c[6]) || 0;

elsDaysCurrentYear += days;

html += `
<div class="item">
${c[3]} | Days : ${days} | ${c[4]}
</div>
`;

}

}

document.getElementById("leaveContainer").innerHTML = html || `<div class="no-data">No ELS Data</div>`;

}

async function showBalance(){

if(!dataReady){

setTimeout(showBalance,300);
return;

}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");
let text = await res.text();

let rows = text.trim().split("\n");

let currentYear = asOnYear.toString();

let totalELS = 0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user && c[1].trim() === currentYear){

let days = parseInt(c[6]) || 0;

totalELS += days;

}

}

let elBalance = elCredit - elTaken - totalELS;
let fplBalance = fplCredit - fplTaken;
let clBalance = clCredit - clTaken;

let html = `

<div class="month">EL DETAILS</div>

<div class="item">Credit : ${elCredit}</div>
<div class="item">Taken : ${elTaken}</div>
<div class="item">ELS Days : ${totalELS}</div>
<div class="item"><b>Balance : ${elBalance}</b></div>

<div class="month">FPL DETAILS</div>

<div class="item">Credit : ${fplCredit}</div>
<div class="item">Taken : ${fplTaken}</div>
<div class="item"><b>Balance : ${fplBalance}</b></div>

<div class="month">CL DETAILS</div>

<div class="item">Credit : ${clCredit}</div>
<div class="item">Taken : ${clTaken}</div>
<div class="item"><b>Balance : ${clBalance}</b></div>

`;

document.getElementById("leaveContainer").innerHTML = html;

}

function renderRanges(map){

let html="";

for(let m in map){

html+=`<div class="month">${m}</div>`;

map[m].forEach(r=>{

let s=("0"+r.start.day).slice(-2);
let e=("0"+r.end.day).slice(-2);

if(s===e){

html+=`
<div class="item">
${s}-${r.start.month}-${r.start.year} - ${r.type}
</div>
`;

}else{

html+=`
<div class="item">
${r.type} from ${s}-${r.start.month}-${r.start.year} to ${e}-${r.start.month}-${r.start.year}
</div>
`;

}

});

}

document.getElementById("leaveContainer").innerHTML =
html || `<div class="no-data">No Data Found</div>`;

}

loadEmployee().then(()=>{

dataReady = true;
loadAttendance();

});

function goBack(){

window.history.back();

}

</script>

</body>
</html>
