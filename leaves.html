<!DOCTYPE html>
<html>
<head>
<title>Leaves Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background:#eef3ff;
overflow-x:hidden;
padding-bottom:120px;
color:#1b1b1b;
}

/* TOP SECTION */

.top-section{
background: linear-gradient(135deg,#0d1b8f,#1a2edb);
padding:24px 18px 105px;
border-bottom-left-radius:38px;
border-bottom-right-radius:38px;
position:relative;
overflow:hidden;
}

.top-section::before{
content:'';
position:absolute;
width:230px;
height:230px;
background:rgba(255,255,255,0.08);
border-radius:50%;
top:-100px;
right:-70px;
}

.top-section::after{
content:'';
position:absolute;
width:170px;
height:170px;
background:rgba(255,255,255,0.06);
border-radius:50%;
bottom:-70px;
left:-50px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:14px;
position:relative;
z-index:2;
}

.back-btn{
width:45px;
height:45px;
border-radius:16px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(14px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.18);
transition:0.25s;
}

.back-btn:active{
transform:scale(0.95);
}

.page-title{
font-size:24px;
font-weight:700;
color:white;
letter-spacing:0.5px;
}

.asdate{
margin-top:12px;
margin-left:58px;
font-size:13px;
color:rgba(255,255,255,0.88);
position:relative;
z-index:2;
}

/* CREDIT CARD */

.credit-card{
margin-top:24px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(16px);
padding:22px;
border-radius:30px;
position:relative;
z-index:2;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.credit-title{
font-size:18px;
font-weight:600;
color:white;
margin-bottom:18px;
}

.credit-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.credit-box{
background:rgba(255,255,255,0.12);
border-radius:22px;
padding:16px 10px;
text-align:center;
}

.credit-label{
display:block;
font-size:12px;
line-height:1.4;
color:rgba(255,255,255,0.85);
margin-bottom:8px;
}

.credit-value{
font-size:25px;
font-weight:700;
color:white;
}

/* MAIN */

.main{
margin-top:-65px;
padding:0 16px;
position:relative;
z-index:5;
}

/* FILTER */

.filter-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.filter-card{
background:white;
padding:18px 10px;
border-radius:24px;
text-align:center;
font-size:13px;
font-weight:600;
color:#2457ff;
cursor:pointer;
box-shadow:0 10px 24px rgba(0,0,0,0.08);
transition:0.25s;
}

.filter-card.active{
background:linear-gradient(135deg,#2457ff,#0a2ea8);
color:white;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(36,87,255,0.35);
}

/* SECTION */

.section{
margin-top:24px;
}

.section-title{
font-size:22px;
font-weight:700;
color:#1b2d67;
margin-bottom:18px;
padding-left:4px;
}

/* HISTORY CARD */

.history-card{
background:white;
border-radius:34px;
padding:22px 18px;
box-shadow:
0 10px 35px rgba(0,0,0,0.06),
0 2px 8px rgba(0,0,0,0.03);
min-height:260px;
position:relative;
overflow:hidden;
}

/* MONTH */

.month{
display:flex;
align-items:center;
gap:10px;
font-size:15px;
font-weight:700;
color:#2457ff;
margin:22px 0 16px;
padding-left:6px;
}

.month:first-child{
margin-top:0;
}

.month::before{
content:'';
width:14px;
height:14px;
border-radius:50%;
background:linear-gradient(135deg,#2457ff,#0a2ea8);
box-shadow:0 0 0 6px rgba(36,87,255,0.12);
}

/* NEW PREMIUM LEAVE HISTORY DESIGN */

.item{
position:relative;
background:linear-gradient(135deg,#ffffff,#f7f9ff);
border-radius:28px;
padding:18px;
margin-bottom:16px;
border:1px solid rgba(36,87,255,0.08);
box-shadow:
0 8px 24px rgba(0,0,0,0.05),
0 2px 6px rgba(0,0,0,0.03);
overflow:hidden;
transition:0.25s;
}

.item:active{
transform:scale(0.98);
}

/* TOP COLOR LINE */

.item::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:5px;
background:linear-gradient(90deg,#2457ff,#6d8eff,#2457ff);
}

/* FLOAT ICON */

.leave-icon{
width:48px;
height:48px;
border-radius:18px;
background:linear-gradient(135deg,#2457ff,#0a2ea8);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
box-shadow:0 10px 22px rgba(36,87,255,0.25);
flex-shrink:0;
}

.leave-flex{
display:flex;
align-items:flex-start;
gap:14px;
}

.leave-details{
flex:1;
}

.leave-badge{
display:inline-flex;
align-items:center;
justify-content:center;
padding:7px 14px;
border-radius:30px;
background:rgba(36,87,255,0.10);
color:#2457ff;
font-size:11px;
font-weight:700;
letter-spacing:0.5px;
margin-bottom:10px;
}

.leave-date{
font-size:15px;
font-weight:600;
color:#1f2a4d;
line-height:1.7;
}

.leave-sub{
margin-top:8px;
font-size:12px;
color:#8a93b2;
font-weight:500;
}

/* EXTRA BUTTONS */

.extra-section{
margin-top:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.extra-btn{
background:white;
padding:18px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:space-between;
font-size:15px;
font-weight:600;
color:#2457ff;
cursor:pointer;
box-shadow:0 10px 24px rgba(0,0,0,0.08);
transition:0.25s;
}

.extra-btn.active{
background:linear-gradient(135deg,#2457ff,#0a2ea8);
color:white;
transform:translateY(-2px);
box-shadow:0 10px 24px rgba(36,87,255,0.32);
}

.extra-btn svg{
width:18px;
height:18px;
}

/* EMPTY */

.no-data{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
color:#8c95b5;
font-size:15px;
font-weight:500;
}

.no-data::before{
content:'🗂️';
font-size:52px;
margin-bottom:14px;
}

/* MOBILE */

@media(max-width:380px){

.credit-grid{
grid-template-columns:1fr;
}

.filter-grid{
grid-template-columns:1fr;
}

.leave-flex{
flex-direction:column;
}

.leave-icon{
width:42px;
height:42px;
font-size:18px;
}

}

</style>
</head>

<body>

<div class="top-section">

<div class="header">

<div class="back-btn" onclick="goBack()">

<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6"
stroke="white"
stroke-width="2.7"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<div class="page-title">
Leave Dashboard
</div>

</div>

<div class="asdate" id="asOnDate">
As on Date : --
</div>

<div class="credit-card">

<div class="credit-title">
Leave Credits
</div>

<div class="credit-grid">

<div class="credit-box">
<span class="credit-label">Earned Leave</span>
<span class="credit-value" id="elCredit">0</span>
</div>

<div class="credit-box">
<span class="credit-label">Full Pay Leave</span>
<span class="credit-value" id="fplCredit">0</span>
</div>

<div class="credit-box">
<span class="credit-label">Casual Leave</span>
<span class="credit-value" id="clCredit">0</span>
</div>

</div>

</div>

</div>

<div class="main">

<div class="filter-grid">

<div class="filter-card active" onclick="filterLeave('EL',this)">
Earned Leave
</div>

<div class="filter-card" onclick="filterLeave('FPL',this)">
Full Pay Leave
</div>

<div class="filter-card" onclick="filterLeave('CL',this)">
Casual Leave
</div>

</div>

<div class="section">

<div class="section-title">
Leave History
</div>

<div class="history-card" id="leaveContainer"></div>

</div>

<div class="extra-section">

<div class="extra-btn" onclick="activateExtra(this); showOtherLeaves()">

<span>Other Leaves Taken Details</span>

<svg fill="none" viewBox="0 0 24 24">
<path d="M9 18L15 12L9 6"
stroke="currentColor"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<div class="extra-btn" onclick="activateExtra(this); showELS()">

<span>ELS Bills Details</span>

<svg fill="none" viewBox="0 0 24 24">
<path d="M9 18L15 12L9 6"
stroke="currentColor"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

<div class="extra-btn" onclick="activateExtra(this); showBalance()">

<span>Leave Balance</span>

<svg fill="none" viewBox="0 0 24 24">
<path d="M9 18L15 12L9 6"
stroke="currentColor"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</div>

</div>

</div>

<script>

let user = localStorage.getItem("currentUser");
let currentType = "EL";

let elCredit=0,fplCredit=0,clCredit=0;
let elTaken=0,fplTaken=0,clTaken=0;

let creditCalculated = false;

let asOnDay=1, asOnMonth=1, asOnYear=new Date().getFullYear();

let dataReady = false;

let elsDaysCurrentYear = 0;

async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");

let text = await res.text();

let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user){

elCredit = parseInt(c[3]) || 0;
fplCredit = parseInt(c[4]) || 0;
clCredit = parseInt(c[5]) || 0;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

let asDate = c[6] || "--";

document.getElementById("asOnDate").innerText = "As on Date : " + asDate;

if(asDate !== "--"){

let parts = asDate.split("-");

asOnDay = parseInt(parts[0]);
asOnMonth = parseInt(parts[1]);
asOnYear = parseInt(parts[2]);

}

}

}

}

function filterLeave(type,el){

currentType = type;

document.querySelectorAll(".filter-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

loadAttendance();

}

function activateExtra(el){

document.querySelectorAll(".filter-card").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".extra-btn").forEach(b=>b.classList.remove("active"));

el.classList.add("active");

}

function groupRanges(arr){

if(arr.length===0) return [];

let res=[];

let start=arr[0];
let prev=arr[0];

for(let i=1;i<arr.length;i++){

let cur=arr[i];

if(cur.day===prev.day+1){

prev=cur;

}else{

res.push({start:start,end:prev,type:start.type});

start=cur;
prev=cur;

}

}

res.push({start:start,end:prev,type:start.type});

return res;

}

async function loadAttendance(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");

let text = await res.text();

let rows = text.trim().split("\n");

let monthMap={};

elTaken=0;
fplTaken=0;
clTaken=0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() !== user) continue;

let year=c[1];
let month=c[2];

let list=[];

for(let d=3;d<34;d++){

let val=c[d]?.trim();

if(!val) continue;

let day = d-2;

if(year != asOnYear) continue;
if(month < asOnMonth) continue;
if(month == asOnMonth && day < asOnDay) continue;

if(val==="EL") elTaken++;
if(val==="FPL") fplTaken++;
if(val==="CL") clTaken++;

if(val===currentType){

list.push({day,type:val,month,year});

}

}

if(list.length){

monthMap[month+"-"+year]=groupRanges(list);

}

}

if(!creditCalculated){

let today = new Date();

let year = today.getFullYear();

let jan1 = new Date(year,0,1);
let july1 = new Date(year,6,1);

let finalEL = elCredit;
let finalFPL = fplCredit;
let finalCL = clCredit;

if(today >= jan1 && today < july1){

finalEL = elCredit + 15;
finalFPL = fplCredit + 5;

}

if(today >= july1){

finalEL = elCredit + 30;
finalFPL = fplCredit + 10;

}

elCredit = finalEL;
fplCredit = finalFPL;
clCredit = finalCL;

document.getElementById("elCredit").innerText = elCredit;
document.getElementById("fplCredit").innerText = fplCredit;
document.getElementById("clCredit").innerText = clCredit;

creditCalculated = true;

}

renderRanges(monthMap);

}

async function showOtherLeaves(){

if(!dataReady){

setTimeout(showOtherLeaves,300);

return;

}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");

let text = await res.text();

let rows = text.trim().split("\n");

let monthMap={};

for(let i=1;i<rows.length;i++){

let c=rows[i].split(",");

if(c[0].trim()!==user) continue;

let year=c[1];
let month=c[2];

let list=[];

for(let d=3;d<34;d++){

let val=c[d]?.trim();

if(!val) continue;

let day = d-2;

if(year != asOnYear) continue;
if(month < asOnMonth) continue;
if(month == asOnMonth && day < asOnDay) continue;

if(val==="EL"||val==="FPL"||val==="CL"||val==="GH"||val==="P"||val==="A") continue;

list.push({day,type:val,month,year});

}

if(list.length){

monthMap[month+"-"+year]=groupRanges(list);

}

}

renderRanges(monthMap);

}

async function showELS(){

if(!dataReady){

setTimeout(showELS,300);

return;

}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");

let text = await res.text();

let rows = text.trim().split("\n");

let currentYear = asOnYear.toString();

let html="";

elsDaysCurrentYear = 0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user && c[1].trim() === currentYear){

let days = parseInt(c[6]) || 0;

elsDaysCurrentYear += days;

html += `
<div class="item">

<div class="leave-flex">

<div class="leave-icon">💳</div>

<div class="leave-details">

<div class="leave-badge">ELS</div>

<div class="leave-date">
${c[3]} | Days : ${days}
</div>

<div class="leave-sub">
${c[4]}
</div>

</div>

</div>

</div>
`;

}

}

document.getElementById("leaveContainer").innerHTML =
html || `<div class="no-data">No ELS Data</div>`;

}

async function showBalance(){

if(!dataReady){

setTimeout(showBalance,300);

return;

}

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/els_bills.csv");

let text = await res.text();

let rows = text.trim().split("\n");

let currentYear = asOnYear.toString();

let totalELS = 0;

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0].trim() === user && c[1].trim() === currentYear){

let days = parseInt(c[6]) || 0;

totalELS += days;

}

}

let elBalance = elCredit - elTaken - totalELS;
let fplBalance = fplCredit - fplTaken;
let clBalance = clCredit - clTaken;

let html = `

<div class="month">EL DETAILS</div>

<div class="item">

<div class="leave-flex">

<div class="leave-icon">📘</div>

<div class="leave-details">

<div class="leave-date">
Credit : ${elCredit}<br>
Taken : ${elTaken}<br>
ELS Days : ${totalELS}<br>
<b>Balance : ${elBalance}</b>
</div>

</div>

</div>

</div>

<div class="month">FPL DETAILS</div>

<div class="item">

<div class="leave-flex">

<div class="leave-icon">📗</div>

<div class="leave-details">

<div class="leave-date">
Credit : ${fplCredit}<br>
Taken : ${fplTaken}<br>
<b>Balance : ${fplBalance}</b>
</div>

</div>

</div>

</div>

<div class="month">CL DETAILS</div>

<div class="item">

<div class="leave-flex">

<div class="leave-icon">📙</div>

<div class="leave-details">

<div class="leave-date">
Credit : ${clCredit}<br>
Taken : ${clTaken}<br>
<b>Balance : ${clBalance}</b>
</div>

</div>

</div>

</div>

`;

document.getElementById("leaveContainer").innerHTML = html;

}

function renderRanges(map){

let html="";

for(let m in map){

html += `
<div class="month">
${m}
</div>
`;

map[m].forEach(r=>{

let s=("0"+r.start.day).slice(-2);
let e=("0"+r.end.day).slice(-2);

if(s===e){

html += `
<div class="item">

<div class="leave-flex">

<div class="leave-icon">🗓️</div>

<div class="leave-details">

<div class="leave-badge">
${r.type}
</div>

<div class="leave-date">
${s}-${r.start.month}-${r.start.year}
</div>

<div class="leave-sub">
Single Day Leave
</div>

</div>

</div>

</div>
`;

}else{

html += `
<div class="item">

<div class="leave-flex">

<div class="leave-icon">📅</div>

<div class="leave-details">

<div class="leave-badge">
${r.type}
</div>

<div class="leave-date">
${s}-${r.start.month}-${r.start.year}
</div>

<div class="leave-sub">
To ${e}-${r.start.month}-${r.start.year}
</div>

</div>

</div>

</div>
`;

}

});

}

document.getElementById("leaveContainer").innerHTML =
html || `<div class="no-data">No Leave Records Found</div>`;

}

loadEmployee().then(()=>{

dataReady = true;

loadAttendance();

});

function goBack(){

window.history.back();

}

</script>

</body>
</html>
