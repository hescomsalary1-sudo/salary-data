<!DOCTYPE html>
<html>
<head>
<title>Leaves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2ff;
padding-bottom:90px;
}

/* HEADER (UNCHANGED) */
.top{
padding:28px 22px;
background:linear-gradient(135deg,#4b2dd8,#7b5cff);
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
}

.asdate{font-size:14px;margin-top:5px;opacity:0.9;}

.credit-box{
margin-top:15px;
background:#25166c;
padding:15px;
border-radius:15px;
}
.credit-row{
display:flex;
justify-content:space-between;
padding:8px 0;
}

/* CURVED CONTAINER */
.curve-box{
margin-top:-20px;
background:#e6ebff;
border-top-left-radius:30px;
border-top-right-radius:30px;
padding:20px 15px;
}

/* BUTTON CARDS */
.btn-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.btn-card{
background:#4b2dd8;
color:white;
padding:18px 10px;
border-radius:18px;
text-align:center;
font-weight:600;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.btn-card.active{
background:#25166c;
transform:scale(1.05);
}

/* HISTORY TITLE */
.section-title{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0f766e;
}

/* LIST BOX */
.list-box{
margin-top:10px;
background:white;
border-radius:25px;
padding:20px;
min-height:200px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* ITEM */
.item{
padding:10px;
border-bottom:1px solid #eee;
font-weight:600;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
}
.footer a{
text-decoration:none;
color:#4b2dd8;
text-align:center;
}

</style>
</head>

<body>

<!-- HEADER (UNCHANGED) -->
<div class="top">
<h2>Leave Dashboard</h2>
<div class="asdate" id="asOnDate">As on Date: --</div>

<div class="credit-box">
<div class="credit-row"><span>EL</span><span id="elCredit">0</span></div>
<div class="credit-row"><span>FPL</span><span id="fplCredit">0</span></div>
<div class="credit-row"><span>CL</span><span id="clCredit">0</span></div>
</div>
</div>

<!-- CURVED SECTION -->
<div class="curve-box">

<!-- BUTTONS -->
<div class="btn-grid">
<div class="btn-card active" onclick="filterLeave('EL',this)">Earned Leave</div>
<div class="btn-card" onclick="filterLeave('FPL',this)">Full Pay Leave</div>
<div class="btn-card" onclick="filterLeave('CL',this)">Casual Leave</div>
</div>

<!-- TITLE -->
<div class="section-title">Leave History</div>

<!-- LIST -->
<div class="list-box" id="leaveContainer">
No Data found
</div>

</div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html">🏠<br>Home</a>
<a href="accounts.html">👤<br>Profile</a>
<a href="salary.html">💰<br>Salary</a>
<a href="page3.html">📅<br>Attendance</a>
</div>

<script>

let user = localStorage.getItem("currentUser");
let currentType = "EL";

/* LOAD CREDIT */
async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0] === user){

elCredit.innerText = c[3];
fplCredit.innerText = c[4];
clCredit.innerText = c[5];
asOnDate.innerText = "As on Date: " + c[6];

}
}

}

/* BUTTON CLICK */
function filterLeave(type,el){

currentType = type;

/* highlight */
document.querySelectorAll(".btn-card").forEach(b=>b.classList.remove("active"));
el.classList.add("active");

loadAttendance();

}

/* LOAD ATTENDANCE */
async function loadAttendance(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/attendance.csv");
let text = await res.text();
let rows = text.trim().split("\n");

let monthMap = {};

for(let i=1;i<rows.length;i++){

let c = rows[i].split(",");

if(c[0] !== user) continue;

let year = c[1];
let month = c[2];

let count = 0;

for(let d=3; d<34; d++){
if(c[d]?.trim() === currentType){
count++;
}
}

if(count>0){
let key = month+"-"+year;
monthMap[key] = (monthMap[key] || 0) + count;
}

}

/* DISPLAY */
let html = "";

for(let k in monthMap){
html += `<div class="item">${k} : ${monthMap[k]} days</div>`;
}

leaveContainer.innerHTML = html || "No Data found";

}

/* INIT */
loadEmployee().then(loadAttendance);

</script>

</body>
</html>
