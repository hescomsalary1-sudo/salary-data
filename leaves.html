<!DOCTYPE html>
<html>
<head>
<title>Leaves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f4f6ff;
padding-bottom:90px;
}

/* HEADER */
.top{
padding:28px 22px;
background:linear-gradient(135deg,#4b2dd8,#7b5cff);
color:white;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.top h2{
margin:0;
}

/* AS ON DATE */
.asdate{
font-size:14px;
opacity:0.9;
margin-top:6px;
}

/* CREDIT BOX INSIDE HEADER */
.credit-box{
margin-top:18px;
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
backdrop-filter:blur(5px);
}

.credit-row{
display:flex;
justify-content:space-between;
padding:8px 0;
font-weight:600;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:#ffffff;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 15px rgba(0,0,0,0.1);
}

.footer a{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#4b2dd8;
font-size:20px;
}

.footer small{
font-size:11px;
margin-top:4px;
font-weight:600;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">

<h2>Leave Dashboard</h2>

<div class="asdate" id="asOnDate">As on Date: --</div>

<!-- CREDITED LEAVES INSIDE HEADER -->
<div class="credit-box">

<div class="credit-row">
<span>Earned Leave</span>
<span id="elCredit">0</span>
</div>

<div class="credit-row">
<span>Full Pay Leave</span>
<span id="fplCredit">0</span>
</div>

<div class="credit-row">
<span>Casual Leave</span>
<span id="clCredit">0</span>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<a href="home.html"><div>🏠</div><small>Home</small></a>
<a href="accounts.html"><div>👤</div><small>Profile</small></a>
<a href="salary.html"><div>💰</div><small>Salary</small></a>
<a href="page3.html"><div>📅</div><small>Attendance</small></a>
<a href="page4.html"><div>⚙</div><small>Settings</small></a>
</div>

<script>

let user = localStorage.getItem("currentUser");

async function loadEmployee(){

let res = await fetch("https://hescomsalary1-sudo.github.io/salary-data/leaves.csv");
let text = await res.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

if(cols[0].trim() === user){

document.getElementById("elCredit").innerText = cols[3] || 0;
document.getElementById("fplCredit").innerText = cols[4] || 0;
document.getElementById("clCredit").innerText = cols[5] || 0;

document.getElementById("asOnDate").innerText =
"As on Date: " + (cols[6] || "--");

}
}

}

loadEmployee();

</script>

</body>
</html>
