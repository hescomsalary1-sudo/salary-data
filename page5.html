<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 30px; }
        .header { background: #1a1a2e; color: white; padding: 30px; text-align: center; border-radius: 0 0 25px 25px; }
        .container { padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; background: #2400b7; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .status-badge { float: right; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #eef2ff; color: #2400b7; }
        .flow-line { border-left: 2px solid #2400b7; padding-left: 15px; margin-left: 10px; margin-top: 10px; }
        .flow-item { position: relative; margin-bottom: 10px; font-size: 13px; }
        .flow-item::before { content: ''; position: absolute; left: -21px; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: #2400b7; }
    </style>
</head>
<body>

<div class="header">
    <h2>Employee Portal</h2>
    <p>File & Track Grievances</p>
</div>

<div class="container">
    <div class="card">
        <h3>Submit Grievance</h3>
        <form id="gForm" onsubmit="submitGrievance(event)">
            <input type="text" id="empName" placeholder="Your Name" required>
            <select id="cat" required>
                <option value="">Category</option>
                <option>Salary</option><option>Promotion</option><option>Facilities</option>
            </select>
            <input type="text" id="sub" placeholder="Subject" required>
            <textarea id="desc" rows="3" placeholder="Describe issue..." required></textarea>
            <select id="sendTo" required>
                <option value="">Send To Officer</option>
                <option>Section Officer</option><option>Assistant Engineer (AE)</option><option>Executive Engineer (EE)</option>
            </select>
            <button type="submit" class="btn" id="subBtn">Submit Grievance</button>
        </form>
    </div>

    <button class="btn" style="background:#555" onclick="fetchFlow()">Track My Flow</button>
    <button class="btn" style="background:#fff; color:#2400b7; border:1px solid #2400b7" onclick="window.location.href='officer_login.html'">Officer Login</button>

    <div id="flowList" style="margin-top:15px;"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeYQkb84pjRJvNyzDhceex2FvVb05r2f7eduxUY1S-18V4jfK10HPLvy96hWKXuBAs/exec";

    async function submitGrievance(e) {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true; btn.innerText = "Sending...";
        const payload = {
            action: "submit",
            id: "GR-" + Math.floor(1000 + Math.random() * 9000),
            user: document.getElementById('empName').value,
            category: document.getElementById('cat').value,
            subject: document.getElementById('sub').value,
            desc: document.getElementById('desc').value,
            sendTo: document.getElementById('sendTo').value,
            date: new Date().toLocaleDateString()
        };
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Success! ID: " + payload.id);
        e.target.reset();
        btn.disabled = false; btn.innerText = "Submit Grievance";
    }

    async function fetchFlow() {
        const container = document.getElementById('flowList');
        container.innerHTML = "Fetching...";
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        container.innerHTML = data.reverse().map(item => `
            <div class="card">
                <span class="status-badge">${item.status}</span>
                <strong>#${item.id}</strong>
                <div class="flow-line">
                    ${item.history.map(h => `<div class="flow-item"><b>${h.officer}:</b> ${h.note}</div>`).join('')}
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
