<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 40px; }
        .header { background: #1a1a2e; color: white; padding: 25px; text-align: center; border-radius: 0 0 25px 25px; }
        .container { padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; background: #2400b7; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .status-badge { float: right; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #eef2ff; color: #2400b7; }
        .flow-item { border-left: 2px solid #2400b7; padding-left: 15px; margin-left: 10px; margin-bottom: 15px; font-size: 13px; }
        .officer-panel { background: #fff4e5; border: 1px dashed #ff9800; padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="portalTitle">Grievance System</h2>
    <div id="userInfo" style="font-size: 12px; opacity: 0.8;">Public Access</div>
</div>

<div class="container">
    <div id="loginSection" class="card">
        <h3>Officer Login</h3>
        <select id="loginDesig">
            <option>Section Officer</option>
            <option>Assistant Engineer (AE)</option>
            <option>Executive Engineer (EE)</option>
            <option>Division Manager</option>
        </select>
        <input type="password" id="loginKey" placeholder="Enter Login Key">
        <button class="btn" onclick="officerLogin()">Login to Dashboard</button>
    </div>

    <div id="mainDashboard" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn" style="background:#666" onclick="location.reload()">Logout</button>
            <button class="btn" onclick="fetchFlow()">Refresh List</button>
        </div>
        <div id="grievanceList"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL";
    let currentOfficer = null;

    async function officerLogin() {
        const payload = {
            action: "login",
            designation: document.getElementById('loginDesig').value,
            loginKey: document.getElementById('loginKey').value
        };

        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.status === "success") {
            currentOfficer = { name: result.name, designation: payload.designation };
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('mainDashboard').style.display = "block";
            document.getElementById('portalTitle').innerText = "Officer Dashboard";
            document.getElementById('userInfo').innerText = `Logged in: ${currentOfficer.name} (${currentOfficer.designation})`;
            fetchFlow();
        } else {
            alert("Invalid Key or Designation");
        }
    }

    async function fetchFlow() {
        const container = document.getElementById('grievanceList');
        container.innerHTML = "Fetching tickets...";
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        container.innerHTML = data.map(item => {
            const isHandler = item.handler === currentOfficer.designation && item.status !== "Resolved";
            return `
                <div class="card">
                    <span class="status-badge">${item.status}</span>
                    <strong>#${item.id}</strong> | ${item.cat}
                    <p style="font-size:14px;"><b>Subject:</b> ${item.sub}</p>
                    <p style="font-size:13px; color:#555;">${item.desc}</p>
                    <hr>
                    <div class="flow-container">
                        ${item.history.map(h => `<div class="flow-item"><b>${h.officer}:</b> "${h.note}" <br><small>${h.date}</small></div>`).join('')}
                    </div>

                    ${isHandler ? `
                        <div class="officer-panel">
                            <label>Your Opinion/Action</label>
                            <textarea id="opinion-${item.id}" placeholder="Write your remarks..."></textarea>
                            <label>Forward To:</label>
                            <select id="forward-${item.id}">
                                <option>Assistant Engineer (AE)</option>
                                <option>Executive Engineer (EE)</option>
                                <option>Division Manager</option>
                                <option value="Resolved">RESOLVE & CLOSE</option>
                            </select>
                            <button class="btn" style="background:#ff9800" onclick="updateTicket('${item.id}')">Submit & Forward</button>
                        </div>
                    ` : `<p style="font-size:11px; color:#999; text-align:center;">Currently with ${item.handler}</p>`}
                </div>
            `;
        }).join('');
    }

    async function updateTicket(id) {
        const forwardVal = document.getElementById(`forward-${id}`).value;
        const payload = {
            action: "update",
            id: id,
            officerName: currentOfficer.name,
            designation: currentOfficer.designation,
            opinion: document.getElementById(`opinion-${id}`).value,
            newStatus: forwardVal === "Resolved" ? "Resolved" : "Forwarded",
            forwardTo: forwardVal === "Resolved" ? "Closed" : forwardVal
        };

        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("Action successful.");
        fetchFlow();
    }
</script>
</body>
</html>
