<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f7fe; margin: 0; padding-bottom: 50px; }
        .header { background: #1a1a2e; color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { padding: 20px; }
        
        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 12px; background: white; font-weight: bold; cursor: pointer; }
        .tab.active { background: #2400b7; color: white; }

        /* CARDS */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* FORM */
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #2400b7; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* FLOW TIMELINE */
        .flow-container { margin-top: 15px; border-left: 2px dashed #2400b7; padding-left: 20px; position: relative; }
        .flow-step { position: relative; margin-bottom: 20px; font-size: 13px; }
        .flow-step::before { content: '●'; position: absolute; left: -27px; color: #2400b7; background: #f4f7fe; font-size: 18px; }
        .officer-name { font-weight: bold; color: #2400b7; display: block; }
        .officer-note { color: #555; font-style: italic; }
        
        .status-tag { float: right; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .open { background: #eef2ff; color: #2400b7; }
        .resolved { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>

<div class="header">
    <h2>Grievance Tracking</h2>
    <p>Official Workflow & Resolution</p>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('new')">New Issue</button>
        <button class="tab" onclick="switchTab('track')">Track Flow</button>
    </div>

    <div id="newSection" class="card">
        <form id="gForm" onsubmit="submitGrievance(event)">
            <label>Category</label>
            <select id="cat" required><option>Salary</option><option>Promotion</option><option>Facility</option></select>
            <input type="text" id="sub" placeholder="Subject" required>
            <textarea id="desc" rows="4" placeholder="Describe the problem..." required></textarea>
            <button type="submit" class="btn">Submit to Section Officer</button>
        </form>
    </div>

    <div id="trackSection" style="display:none;">
        <div id="flowList"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFQ1edhnGzc2PZ7kyvem45a6LtCwXkjaNqLKD6b8awy98bJBv0zLtHtygaNbzAEXo/exec";

    function switchTab(t) {
        document.getElementById('newSection').style.display = t === 'new' ? 'block' : 'none';
        document.getElementById('trackSection').style.display = t === 'track' ? 'block' : 'none';
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if(t === 'track') fetchFlow();
    }

    async function submitGrievance(e) {
        e.preventDefault();
        const data = {
            action: "submit",
            id: "GR-" + Math.floor(Math.random()*9000 + 1000),
            user: localStorage.getItem("currentUser") || "User",
            category: document.getElementById('cat').value,
            subject: document.getElementById('sub').value,
            desc: document.getElementById('desc').value,
            date: new Date().toLocaleDateString()
        };

        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        alert("Grievance Filed. Current Level: Section Officer");
        document.getElementById('gForm').reset();
    }

    async function fetchFlow() {
        const container = document.getElementById('flowList');
        container.innerHTML = "Loading flow details...";
        
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const user = localStorage.getItem("currentUser");

            container.innerHTML = data.map(item => `
                <div class="card">
                    <span class="status-tag ${item.status.toLowerCase()}">${item.status}</span>
                    <strong style="color:#2400b7">#${item.id}</strong>
                    <p style="font-size:12px; margin: 5px 0;">Currently with: <b>${item.handler}</b></p>
                    
                    <div class="flow-container">
                        ${item.history.map(step => `
                            <div class="flow-step">
                                <span class="officer-name">${step.officer}</span>
                                <span class="officer-note">"${step.note}"</span>
                                <div style="font-size:10px; color:#999;">${step.date}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        } catch(e) { container.innerHTML = "No active grievances."; }
    }
</script>
</body>
</html>
