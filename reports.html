<script>

const sectionData = {

"33 KV Station HESCOM Dasanakoppa"
],

"Siddapur Subdivision":[

"O&M Section HESCOM Bilagi"
],

"Yellapur Subdivision":[

],

"33kV Station HESCOM Pala"
],

"LTMR Section HESCOM Sirsi"
]

};

/* UPDATE SECTION DROPDOWN */

function updateSections(){

let sub=subdivision.value;

section.innerHTML="<option value=''>All</option>";

if(sectionData[sub]){

sectionData[sub].forEach(s=>{

section.innerHTML+=`<option>${s}</option>`;

});

}

}

/* LOAD CSV */

async function loadCSV(){

let r=await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv");
let t=await r.text();

return t.trim().split("\n");

}

/* INIT DROPDOWNS */

async function init(){

let rows=await loadCSV();

let places=new Set();
let posts=new Set();

for(let i=1;i<rows.length;i++){

let c=rows[i].split(",");

places.add(c[3]);
posts.add(c[2]);

}

division.innerHTML="<option value=''>All</option>";
places.forEach(p=>division.innerHTML+=`<option>${p}</option>`);

post.innerHTML="<option value=''>All</option>";
posts.forEach(p=>post.innerHTML+=`<option>${p}</option>`);

}

init();

/* GENERATE REPORT */

async function generateReport(){

let rows=await loadCSV();

let div=division.value;
let sub=subdivision.value;
let sec=section.value;
let pst=post.value;

let sanctioned=0;
let working=0;

let workingRows="";
let vacantRows="";

for(let i=1;i<rows.length;i++){

let c=rows[i].split(",");

let name=c[1];
let post=c[2];
let place=c[3];

if(div && place!=div) continue;
if(pst && post!=pst) continue;

sanctioned++;

if(name){

working++;

workingRows+=`
<tr>
<td>${name}</td>
<td>${post}</td>
<td>${place}</td>
</tr>`;

}else{

vacantRows+=`
<tr>
<td>${post}</td>
<td>${place}</td>
</tr>`;

}

}

let vacant=sanctioned-working;

result.innerHTML=`

<div class="summary">

Sanctioned : ${sanctioned}<br>
Working : ${working}<br>
Vacant : ${vacant}

</div>

<div class="tabs">

<button class="tabbtn active" onclick="showWorking()">Working Details</button>
<button class="tabbtn" onclick="showVacant()">Vacant Details</button>

</div>

<div id="tableArea">

<table>

<tr>
<th>Name</th>
<th>Post</th>
<th>Place</th>
</tr>

${workingRows}

</table>

</div>

`;

window.workingTable=workingRows;
window.vacantTable=vacantRows;

}

function showWorking(){

tableArea.innerHTML=`

<table>

<tr>
<th>Name</th>
<th>Post</th>
<th>Place</th>
</tr>

${workingTable}

</table>`;

}

function showVacant(){

tableArea.innerHTML=`

<table>

<tr>
<th>Post</th>
<th>Place</th>
</tr>

${vacantTable}

</table>`;

}

/* PDF */

function downloadPDF(){

html2pdf().from(result).save("Post_Report.pdf");

}

</script>
