<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Notifications</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: rgba(15, 12, 41, 0.85); /* Semi-transparent dark blue */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .header {
            background: linear-gradient(135deg, #2400b7, #4b2dd8);
            color: white;
            padding: 22px 15px;
            text-align: center;
        }

        .header h3 { margin: 0; font-size: 18px; }

        #grievanceList {
            max-height: 380px;
            min-height: 200px;
            overflow-y: auto;
            padding: 15px;
            background: #fdfdff;
            -webkit-overflow-scrolling: touch;
        }

        /* PREMIUM LIST ITEM STYLE */
        .grievance-item {
            background: #ffffff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            border-left: 5px solid #ff3d3d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        .item-date {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
            display: block;
        }

        /* DISMISS BUTTON */
        .back-btn {
            width: 100%;
            padding: 16px;
            border: none;
            background: #f8f9ff;
            color: #4b2dd8;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            border-top: 1px solid #eee;
            transition: 0.2s;
        }

        .back-btn:active { background: #eef0ff; }

        /* SPINNER */
        .loader-box {
            text-align: center;
            padding: 40px 20px;
        }
        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid rgba(75, 45, 216, 0.1);
            border-top: 4px solid #4b2dd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3>📢 Live Notifications</h3>
    </div>
    
    <div id="grievanceList">
        <div class="loader-box">
            <div class="spinner"></div>
            <p style="font-size:13px; color:#4b2dd8;">Fetching live updates...</p>
        </div>
    </div>

    <button class="back-btn" onclick="goBack()">Dismiss</button>
</div>

<script>
async function loadGrievances() {
    const listContainer = document.getElementById("grievanceList");
    
    // REPLACE THIS URL with your actual Apps Script Exec Link
    const scriptURL = "https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec";

    try {
        const response = await fetch(scriptURL);
        const data = await response.json(); 
        
        let output = "";

        if (Array.isArray(data) && data.length > 0) {
            data.forEach(item => {
                // Assuming your Apps Script returns objects or strings
                const message = typeof item === 'object' ? (item.message || item.text || JSON.stringify(item)) : item;
                const date = typeof item === 'object' && item.date ? item.date : "";

                output += `
                    <div class="grievance-item">
                        ${date ? `<span class="item-date">📅 ${date}</span>` : ''}
                        <div>${message}</div>
                    </div>`;
            });
        } else {
            output = `
                <div style="text-align:center; padding:40px 20px; color:#777;">
                    <div style="font-size:30px; margin-bottom:10px;">📭</div>
                    <p>No active notifications found.</p>
                </div>`;
        }

        listContainer.innerHTML = output;

    } catch (error) {
        console.error("Fetch Error:", error);
        listContainer.innerHTML = `
            <div style="text-align:center; padding:40px 20px; color:#ff3d3d;">
                <p>Unable to connect to server.<br>Please try again later.</p>
            </div>`;
    }
}

function goBack() {
    // Redirect back to your home page
    window.location.href = "home.html";
}

// Load data when page opens
window.onload = loadGrievances;
</script>

</body>
</html>
