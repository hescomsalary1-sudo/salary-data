<!DOCTYPE html>
<html>
<head>
    <title>Grievance Notifications</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --primary: #4b2dd8;
            --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            /* This prevents the "bounce" that causes refreshes */
            overscroll-behavior-y: none;
            padding-top: 75px; 
            padding-bottom: 80px;
        }

        /* FIXED HEADER (Same style as your Assets code) */
        .top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .top h2 {
            margin: 0;
            font-size: 20px;
            background: linear-gradient(to right, #4b2dd8, #9b6dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* SCROLLABLE CONTENT AREA */
        .content {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ITEM CARD DESIGN */
        .notif-card {
            background: white;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.04);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .user-info {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .details-box {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            border: 1px solid #edf0ff;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* FIXED BOTTOM BUTTON */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            border-top: 1px solid #eee;
            z-index: 1000;
        }

        .back-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2400b7;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        /* LOADER */
        #loader { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 100px 20px; 
        }
        .spinner { 
            width: 35px; height: 35px; 
            border: 4px solid #eee; 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="top">
    <h2>Notifications</h2>
    <p style="margin:2px 0 0; font-size:10px; color:#636e72; text-transform:uppercase; letter-spacing:1px;">Live Grievance Tracking</p>
</div>

<div class="content">
    <div id="notifContainer">
        <div id="loader">
            <div class="spinner"></div>
            <p style="font-size:12px; color:#4b2dd8; margin-top:15px; font-weight:600;">Connecting to Server...</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="back-btn" onclick="window.location.href='home.html'">BACK TO DASHBOARD</button>
</div>

<script>
async function loadNotifications() {
    const container = document.getElementById("notifContainer");
    // YOUR APPS SCRIPT URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbz8drDOZ-x5VUNh7bA2ndG13BVzl9o4IQ1r7wrtESIlipYuqcXSD-hK6s9xB5eMkLj8/exec";

    try {
        const response = await fetch(scriptURL);
        const data = await response.json();

        const activeItems = data.filter(item => {
            const status = String(item.status || "").trim().toLowerCase();
            return status !== "resolved" && status !== "";
        });

        if (activeItems.length > 0) {
            let html = "";
            activeItems.forEach(item => {
                const statusColor = (String(item.status).toLowerCase() === "open") ? "#ff3d3d" : "#ffa500";
                
                html += `
                <div class="notif-card" style="border-left: 5px solid ${statusColor}">
                    <div class="notif-header">
                        <span>📅 ${item.date || 'N/A'}</span>
                        <span style="background:#eee; padding:2px 6px; border-radius:4px;">ID: ${item.id}</span>
                    </div>
                    
                    <div class="user-info">👤 ${item.user}</div>
                    <div style="font-size:11px; color:#666;">💼 ${item.empDesig} | 📍 ${item.workPlace}</div>

                    <div class="details-box">
                        <div style="font-size:10px; font-weight:bold; color:#4b2dd8; text-transform:uppercase;">📂 ${item.cat}</div>
                        <div style="font-weight:700; color:#111; font-size:14px; margin:4px 0;">${item.sub}</div>
                        <div style="font-size:12px; color:#444; line-height:1.4;">${item.desc}</div>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="status-badge" style="background:${statusColor}">● ${item.status}</span>
                        <div style="text-align:right;">
                            <div style="font-size:9px; color:#aaa; text-transform:uppercase;">Handled By</div>
                            <div style="font-size:11px; font-weight:bold; color:#333;">${item.handler || 'Not Assigned'}</div>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div style="text-align:center; padding:80px 20px;">
                <div style="font-size:50px;">🎉</div>
                <h3 style="color:#2400b7;">All Clear</h3>
                <p style="font-size:12px; color:#666;">No active records found.</p>
            </div>`;
        }
    } catch (e) {
        container.innerHTML = `<div style="text-align:center; padding:80px 20px; color:red;">
            <p>⚠️ Connection Error</p>
            <button onclick="loadNotifications()" style="background:#2400b7; color:white; border:none; padding:8px 15px; border-radius:8px;">Retry</button>
        </div>`;
    }
}

// Force scroll to top on load to initialize position
window.onload = () => {
    window.scrollTo(0, 0);
    loadNotifications();
};

// This helps prevent the pull-to-refresh on most mobile browsers
document.addEventListener('touchmove', function (e) {
    if (window.scrollY <= 0 && e.touches[0].pageY > lastY) {
        // We are at the top and pulling down
        // On many devices, this stops the browser refresh
    }
    lastY = e.touches[0].pageY;
}, { passive: true });
let lastY = 0;
</script>

</body>
</html>
