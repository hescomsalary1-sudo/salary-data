<!DOCTYPE html>
<html>
<head>
    <title>Grievance Notifications</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --primary: #4b2dd8;
            --card-bg: #ffffff;
            --overlay: rgba(15, 12, 41, 0.9);
        }

        /* 1. THE BACKGROUND OVERLAY */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: var(--overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevent body scroll */
            font-family: 'Segoe UI', sans-serif;
        }

        /* 2. THE POPUP CARD (Like your container) */
        .container {
            width: 92%;
            max-width: 400px;
            height: 80vh; /* Fixed height for the card */
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 3. FIXED HEADER (Based on your Top style) */
        .top {
            background: linear-gradient(135deg, #2400b7, #4b2dd8);
            color: white;
            padding: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .top h2 { margin: 0; font-size: 18px; font-weight: 800; }
        .top p { margin: 3px 0 0; font-size: 10px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }

        /* 4. THE SCROLLABLE CONTENT (The logic that works) */
        .content {
            flex: 1;
            overflow-y: auto !important;
            padding: 15px;
            background: #fdfdff;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain; /* Prevents refresh gesture */
        }

        /* CARD ITEMS */
        .notif-card {
            background: white;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        .user-info { font-size: 13px; font-weight: 700; color: #2400b7; margin-bottom: 5px; }
        
        .details-box {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 12px;
            margin: 8px 0;
            font-size: 12px;
            color: #444;
        }

        /* FIXED BOTTOM BUTTON */
        .footer {
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .back-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2400b7;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        /* LOADER */
        .loader { text-align: center; padding: 40px 0; }
        .spinner { 
            width: 30px; height: 30px; border: 3px solid #eee; 
            border-top: 3px solid var(--primary); border-radius: 50%; 
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="top">
        <h2>Live Records</h2>
        <p>Notification Board</p>
    </div>

    <div class="content" id="notifContainer">
        <div class="loader">
            <div class="spinner"></div>
            <p style="font-size:11px; color:#4b2dd8; margin-top:10px; font-weight:600;">Updating...</p>
        </div>
    </div>

    <div class="footer">
        <button class="back-btn" onclick="window.location.href='home.html'">DISMISS</button>
    </div>
</div>

<script>
    const container = document.getElementById("notifContainer");

    // REFRESH PREVENTION: The "Snap to 1px" logic
    container.addEventListener('scroll', () => {
        if (container.scrollTop <= 0) {
            container.scrollTop = 1;
        }
    });

    async function loadData() {
        const url = "https://script.google.com/macros/s/AKfycbz8drDOZ-x5VUNh7bA2ndG13BVzl9o4IQ1r7wrtESIlipYuqcXSD-hK6s9xB5eMkLj8/exec";
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            const active = data.filter(item => {
                const s = String(item.status || "").toLowerCase().trim();
                return s !== "resolved" && s !== "";
            });

            if (active.length > 0) {
                let html = "";
                active.forEach(item => {
                    const color = (String(item.status).toLowerCase() === "open") ? "#ff3d3d" : "#ffa500";
                    html += `
                    <div class="notif-card" style="border-left: 5px solid ${color}">
                        <div style="font-size:10px; color:#999; margin-bottom:8px; display:flex; justify-content:space-between;">
                            <span>📅 ${item.date}</span><span>ID: ${item.id}</span>
                        </div>
                        <div class="user-info">👤 ${item.user}</div>
                        <div class="details-box">
                            <div style="color:#4b2dd8; font-weight:bold; font-size:10px; text-transform:uppercase;">${item.cat}</div>
                            <div style="font-weight:bold; margin:3px 0;">${item.sub}</div>
                            <div>${item.desc}</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                             <span style="background:${color}; color:white; font-size:9px; padding:3px 10px; border-radius:15px; font-weight:bold;">● ${item.status}</span>
                             <span style="font-size:10px; color:#555; font-weight:bold;">${item.handler || 'Pending'}</span>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                container.scrollTop = 1; // Trigger initial lock
            } else {
                container.innerHTML = "<div style='text-align:center; padding:50px;'>🎉 No active records.</div>";
            }
        } catch (e) {
            container.innerHTML = "<div style='text-align:center; padding:50px; color:red;'>Error Loading.</div>";
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
