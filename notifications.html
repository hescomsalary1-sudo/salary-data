<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Notifications</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: rgba(15, 12, 41, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 92%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.35s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header {
            background: linear-gradient(135deg, #2400b7, #4b2dd8);
            color: white;
            padding: 22px;
            text-align: center;
        }

        #grievanceList {
            height: 450px;
            overflow-y: auto;
            padding: 15px;
            background: #fdfdff;
            -webkit-overflow-scrolling: touch;
        }

        /* Dismiss/Back Button */
        .dismiss-btn {
            width: 100%;
            padding: 18px;
            border: none;
            background: #f8f9ff;
            color: #4b2dd8;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            border-top: 1px solid #eee;
        }

        /* Spinner inside the card */
        .spinner-box { text-align: center; padding: 50px 20px; }
        .spinner {
            width: 35px; height: 35px;
            border: 4px solid rgba(75, 45, 216, 0.1);
            border-top: 4px solid #4b2dd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0;">Live Records</h3>
    </div>
    
    <div id="grievanceList">
        <div class="spinner-box">
            <div class="spinner"></div>
            <p style="font-size:13px; color:#4b2dd8; font-weight:bold;">Checking Database...</p>
        </div>
    </div>

    <button class="dismiss-btn" onclick="window.location.href='home.html'">Dismiss</button>
</div>

<script>
async function loadGrievances() {
    const listContainer = document.getElementById("grievanceList");
    // YOUR APPS SCRIPT URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbz8drDOZ-x5VUNh7bA2ndG13BVzl9o4IQ1r7wrtESIlipYuqcXSD-hK6s9xB5eMkLj8/exec";

    try {
        const response = await fetch(scriptURL);
        const data = await response.json();

        // 1. FILTERING LOGIC (Using your logic)
        // We trim and lowercase to ensure " Resolved" or "RESOLVED" doesn't break it
        const activeItems = data.filter(item => {
            const status = String(item.status || "").trim().toLowerCase();
            return status !== "resolved" && status !== "";
        });

        if (activeItems.length > 0) {
            let html = "";
            activeItems.forEach(item => {
                // Determine color based on status
                const statusLower = String(item.status).toLowerCase();
                const color = (statusLower === "open") ? "#ff3d3d" : "#ffa500";

                // 2. DESIGN (Using your specific professional item design)
                html += `
                <div style="background:#fff; border-left:6px solid ${color}; padding:15px; border-radius:18px; margin-bottom:15px; box-shadow:0 6px 15px rgba(0,0,0,0.08); text-align:left; border: 1px solid #eee;">
                    <div style="display:flex; justify-content:space-between; font-size:10px; color:#999; margin-bottom:10px; border-bottom:1px solid #f8f9ff; padding-bottom:6px;">
                        <span>📅 ${item.date || 'N/A'}</span>
                        <span style="background:#eee; padding:2px 6px; border-radius:4px;">ID: ${item.id}</span>
                    </div>

                    <div style="margin-bottom:10px;">
                        <div style="font-size:13px; font-weight:bold; color:#2400b7;">👤 ${item.user}</div>
                        <div style="font-size:11px; color:#666;">💼 ${item.empDesig} | 📍 ${item.workPlace}</div>
                    </div>

                    <div style="background:#f8f9ff; padding:10px; border-radius:10px; margin-bottom:12px;">
                        <div style="font-size:11px; font-weight:bold; color:#4b2dd8; text-transform:uppercase; margin-bottom:4px;">📂 ${item.cat}</div>
                        <div style="font-weight:bold; color:#111; font-size:14px; margin-bottom:4px;">${item.sub}</div>
                        <div style="font-size:12px; color:#444; line-height:1.5;">${item.desc}</div>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="background:${color}; color:white; font-size:10px; padding:4px 12px; border-radius:20px; font-weight:bold; text-transform:uppercase;">
                            ● ${item.status}
                        </span>
                        <div style="text-align:right;">
                            <div style="font-size:9px; color:#aaa; text-transform:uppercase;">Handled By</div>
                            <div style="font-size:11px; font-weight:bold; color:#333;">${item.handler || 'Not Assigned'}</div>
                        </div>
                    </div>
                </div>`;
            });
            listContainer.innerHTML = html;
        } else {
            // "ALL CLEAR" DESIGN
            listContainer.innerHTML = `
                <div style="text-align:center; padding:40px 20px;">
                    <div style="font-size:50px; margin-bottom:15px;">🎉</div>
                    <h3 style="margin:0; color:#2400b7;">All Clear!</h3>
                    <p style="font-size:12px; color:#777; margin-top:8px;">No active grievances found in the system.</p>
                </div>`;
        }
    } catch (err) {
        listContainer.innerHTML = `
            <div style="text-align:center; padding:30px; color:#ff3d3d;">
                <p>⚠️ Connection Failed.</p>
                <button onclick="loadGrievances()" style="background:#2400b7; color:white; border:none; padding:10px 20px; border-radius:10px;">Retry</button>
            </div>`;
    }
}

window.onload = loadGrievances;
</script>

</body>
</html>
