<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Notifications</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: rgba(15, 12, 41, 0.85); /* Design match */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 92%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header {
            background: linear-gradient(135deg, #2400b7, #4b2dd8);
            color: white;
            padding: 20px;
            text-align: center;
        }
        #grievanceList {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .grievance-item {
            background: #f1efff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #4b2dd8;
            font-size: 13px;
            color: #333;
            line-height: 1.4;
        }
        .close-btn {
            width: 100%;
            padding: 15px;
            border: none;
            background: #f8f9ff;
            color: #4b2dd8;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            border-top: 1px solid #eee;
        }
        /* Loading Spinner */
        .loader-spin {
            width: 25px;
            height: 25px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4b2dd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0;">Grievance Updates</h3>
    </div>
    
    <div id="grievanceList">
        <div class="loader-spin"></div>
    </div>

    <button class="close-btn" onclick="window.location.href='home.html'">Close</button>
</div>

<script>
async function loadFromAppsScript() {
    const list = document.getElementById("grievanceList");
    // USING YOUR DEPLOYMENT LINK
    const scriptURL = "https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec";

    try {
        const response = await fetch(scriptURL);
        const data = await response.json(); // Assuming your script returns JSON
        
        let html = "";
        if (data.length > 0) {
            data.forEach(item => {
                // Adjust 'item.message' to match your actual Apps Script column name
                html += `<div class="grievance-item">${item.message || item}</div>`;
            });
        } else {
            html = "<p style='text-align:center; color:#777;'>No active notifications.</p>";
        }
        list.innerHTML = html;
    } catch (e) {
        list.innerHTML = "<p style='text-align:center; color:red;'>Connection Error. Please check back later.</p>";
    }
}
window.onload = loadFromAppsScript;
</script>

</body>
</html>
