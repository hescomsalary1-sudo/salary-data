<!DOCTYPE html>
<html>
<head>
<title>Assets & Liability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --primary: #4b2dd8;
    --primary-light: #6c39ff;
    --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #2d3436;
    --text-muted: #636e72;
    --border-color: #e0e0e0;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: var(--bg-gradient);
    color: var(--text-main);
    overflow-x: hidden;
    padding-top: 70px; /* Space for the fixed header */
  }

  /* FIXED HEADER SECTION */
  .top {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px); /* Modern blur effect */
    padding: 15px 0;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    z-index: 1000;
  }

  .top h2 {
    margin: 0;
    font-size: 20px;
    background: linear-gradient(to right, #4b2dd8, #9b6dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .top p {
    margin: 2px 0 0;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .content {
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  #grievanceList {
            position: absolute;
            top: 65px; /* Height of header */
            bottom: 70px; /* Height of footer button */
            left: 0;
            right: 0;
            overflow-y: auto !important;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
            /* Prevents browser pull-to-refresh */
            overscroll-behavior-y: contain; 
            touch-action: pan-y;
        }

        /* 4. FOOTER BUTTON - STICKY AT BOTTOM */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 12px 15px;
            border-top: 1px solid #eee;
            z-index: 100;
        }

        .dismiss-btn {
            width: 100%;
            padding: 15px;
            border: none;
            background: #f1f3ff;
            color: #2400b7;
            font-weight: 700;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .dismiss-btn:active { background: #e2e6ff; transform: scale(0.98); }

        /* LIST ITEM STYLING */
        .item-card {
            background: #ffffff;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(36, 0, 183, 0.05);
            border: 1px solid #f0f0f0;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SPINNER STYLES */
        .spinner-box { text-align: center; padding: 60px 20px; }
        .spinner {
            width: 35px; height: 35px;
            border: 4px solid rgba(75, 45, 216, 0.1);
            border-top: 4px solid #4b2dd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h3>Grievance Records</h3>
    </div>
    
    <div id="grievanceList">
        <div class="spinner-box">
            <div class="spinner"></div>
            <p style="font-size:13px; color:#4b2dd8; font-weight:600;">Syncing Live Data...</p>
        </div>
    </div>

    <div class="footer-action">
        <button class="dismiss-btn" onclick="window.location.href='home.html'">Back to Home</button>
    </div>

<script>
    const scrollContainer = document.getElementById('grievanceList');
    let lastY = 0;

    // REFRESH PREVENTION LOGIC
    scrollContainer.addEventListener('touchstart', (e) => {
        if (scrollContainer.scrollTop <= 0) {
            scrollContainer.scrollTop = 1;
        }
    }, { passive: true });

    scrollContainer.addEventListener('touchmove', (e) => {
        const isAtTop = scrollContainer.scrollTop <= 0;
        const currentY = e.touches[0].pageY;
        const isScrollingUp = currentY > lastY;

        if (isAtTop && isScrollingUp) {
            if (e.cancelable) e.preventDefault();
        }
        lastY = currentY;
    }, { passive: false });

    async function loadGrievances() {
        const scriptURL = "https://script.google.com/macros/s/AKfycbz8drDOZ-x5VUNh7bA2ndG13BVzl9o4IQ1r7wrtESIlipYuqcXSD-hK6s9xB5eMkLj8/exec";
        
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            const activeItems = data.filter(item => {
                const status = String(item.status || "").trim().toLowerCase();
                return status !== "resolved" && status !== "";
            });

            let html = "";
            if (activeItems.length > 0) {
                activeItems.forEach(item => {
                    const statusLower = String(item.status).toLowerCase();
                    const color = (statusLower === "open") ? "#ff3d3d" : "#ffa500";

                    html += `
                    <div class="item-card" style="border-left: 6px solid ${color}">
                        <div style="display:flex; justify-content:space-between; font-size:10px; color:#999; margin-bottom:10px;">
                            <span>📅 ${item.date || 'N/A'}</span>
                            <span style="background:#f0f0f0; padding:2px 6px; border-radius:4px; font-weight:bold;">ID: ${item.id}</span>
                        </div>
                        <div style="margin-bottom:10px;">
                            <div style="font-size:14px; font-weight:bold; color:#2400b7;">👤 ${item.user}</div>
                            <div style="font-size:11px; color:#666; margin-top:2px;">💼 ${item.empDesig} | 📍 ${item.workPlace}</div>
                        </div>
                        <div style="background:#f8f9ff; padding:12px; border-radius:12px; margin-bottom:12px; border: 1px solid #edf0ff;">
                            <div style="font-size:10px; font-weight:bold; color:#4b2dd8; text-transform:uppercase; margin-bottom:4px;">📂 ${item.cat}</div>
                            <div style="font-weight:700; color:#111; font-size:14px; margin-bottom:6px;">${item.sub}</div>
                            <div style="font-size:12px; color:#444; line-height:1.5;">${item.desc}</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="background:${color}; color:white; font-size:10px; padding:5px 12px; border-radius:20px; font-weight:bold; text-transform:uppercase;">
                                ● ${item.status}
                            </span>
                            <div style="text-align:right;">
                                <div style="font-size:9px; color:#aaa; text-transform:uppercase;">Handled By</div>
                                <div style="font-size:11px; font-weight:bold; color:#333;">${item.handler || 'Pending'}</div>
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                html = `<div style="text-align:center; padding:100px 20px;">
                            <div style="font-size:60px; margin-bottom:20px;">🎉</div>
                            <h3 style="color:#2400b7; margin:0;">All Clear!</h3>
                            <p style="color:#888; font-size:13px; margin-top:10px;">No active grievances found.</p>
                        </div>`;
            }
            scrollContainer.innerHTML = html;
        } catch (err) {
            scrollContainer.innerHTML = `<div style="text-align:center; padding:100px 20px; color:#ff3d3d;">
                                            <p style="font-weight:bold;">⚠️ Connection Error</p>
                                            <p style="font-size:12px; color:#888;">Unable to reach the server.</p>
                                         </div>`;
        }
    }
    window.onload = loadGrievances;
</script>

</body>
</html>
