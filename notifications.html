<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grievance Notifications</title>
    <style>
        /* 1. LOCK THE BODY */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background: rgba(15, 12, 41, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            /* Physically disables the browser's refresh gesture */
            touch-action: none; 
        }

        .container {
            width: 92%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 80vh; /* Fixed height is safer for scroll locks */
            overflow: hidden;
            /* Allow vertical touch ONLY here */
            touch-action: pan-y; 
        }

        .header {
            background: linear-gradient(135deg, #2400b7, #4b2dd8);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        /* 2. THE SCROLL BOX */
        #grievanceList {
            flex: 1;
            overflow-y: auto !important;
            padding: 15px;
            background: #fdfdff;
            -webkit-overflow-scrolling: touch;
            /* Tells browser: do not bounce or refresh here */
            overscroll-behavior: contain; 
        }

        .dismiss-btn {
            width: 100%;
            padding: 18px;
            border: none;
            background: #f8f9ff;
            color: #4b2dd8;
            font-weight: bold;
            cursor: pointer;
            border-top: 1px solid #eee;
        }

        /* ITEM DESIGN */
        .item-card {
            background:#fff; padding:15px; border-radius:18px; 
            margin-bottom:15px; border: 1px solid #eee;
            box-shadow:0 4px 10px rgba(0,0,0,0.05);
        }

        .spinner {
            width: 30px; height: 30px; border: 3px solid #eee;
            border-top: 3px solid #4b2dd8; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 40px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h3 style="margin:0;">Live Records</h3></div>
    
    <div id="grievanceList">
        <div class="spinner"></div>
    </div>

    <button class="dismiss-btn" onclick="window.location.href='home.html'">Dismiss</button>
</div>

<script>
    const list = document.getElementById('grievanceList');

    // THE MAGIC LOCK
    // This forces the scroll to always be at least 1px down. 
    // If it's not at 0, the browser cannot trigger "Pull-to-Refresh".
    list.addEventListener('scroll', () => {
        if (list.scrollTop <= 0) {
            list.scrollTop = 1;
        }
        // Also prevent scrolling to the absolute bottom to stop the "bounce"
        if (list.scrollTop + list.offsetHeight >= list.scrollHeight) {
            list.scrollTop = list.scrollHeight - list.offsetHeight - 1;
        }
    });

    async function loadData() {
        const url = "https://script.google.com/macros/s/AKfycbz8drDOZ-x5VUNh7bA2ndG13BVzl9o4IQ1r7wrtESIlipYuqcXSD-hK6s9xB5eMkLj8/exec";
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            const active = data.filter(item => {
                const s = String(item.status || "").toLowerCase().trim();
                return s !== "resolved" && s !== "";
            });

            if (active.length > 0) {
                let html = "";
                active.forEach(item => {
                    const color = (String(item.status).toLowerCase() === "open") ? "#ff3d3d" : "#ffa500";
                    html += `
                    <div class="item-card" style="border-left: 6px solid ${color}">
                        <div style="font-size:10px; color:#999; margin-bottom:8px; display:flex; justify-content:space-between;">
                            <span>📅 ${item.date}</span><span>ID: ${item.id}</span>
                        </div>
                        <div style="font-size:13px; font-weight:bold; color:#2400b7; margin-bottom:4px;">👤 ${item.user}</div>
                        <div style="background:#f8f9ff; padding:10px; border-radius:10px; font-size:12px;">
                            <div style="color:#4b2dd8; font-weight:bold; font-size:10px;">${item.cat}</div>
                            <div style="font-weight:bold; margin:3px 0;">${item.sub}</div>
                            <div>${item.desc}</div>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
                // Move 1px down immediately after content loads
                list.scrollTop = 1;
            } else {
                list.innerHTML = "<div style='text-align:center; padding:50px;'>🎉 No active records.</div>";
            }
        } catch (e) {
            list.innerHTML = "<div style='text-align:center; padding:50px; color:red;'>Error.</div>";
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
