<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home | Grievance Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0062ff;
            --bg-start: #ffffff;
            --bg-end: #f0f4f8;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-dark);
            display: flex; flex-direction: column;
        }

        /* Header Section */
        header {
            padding: 30px 20px;
            text-align: center;
            animation: fadeInDown 0.8s ease;
        }

        header h1 { font-size: 1.8rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        /* Main Menu Grid */
        .menu-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 10px 20px 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); max-width: 900px; }
        }

        /* Modern Button Cards */
        .menu-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 25px 15px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            animation: fadeInUp 0.6s both;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0, 98, 255, 0.1);
            border-color: var(--primary);
        }

        .menu-card i {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .menu-card span {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Loading Overlay */
        #loaderOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0, 98, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 15px;
            font-weight: 700;
            font-size: 14px;
            color: var(--primary);
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered Delay for Cards */
        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }
        .menu-card:nth-child(4) { animation-delay: 0.4s; }
        .menu-card:nth-child(5) { animation-delay: 0.5s; }
        .menu-card:nth-child(6) { animation-delay: 0.6s; }

        /* Authority Login Specific Style */
        .auth-card { background: var(--text-dark); }
        .auth-card span { color: #fff; }
        .auth-card i { color: #fff; }
        .auth-card:hover { background: #000; }
    </style>
</head>
<body>

    <header>
        <h1>Grievance Hub</h1>
        <p>Select a service to proceed</p>
    </header>

    <div class="menu-grid">
        <div class="menu-card" onclick="navigateTo('grievance.html', 'Preparing Form...')">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>Lodge Grievance</span>
        </div>

        <div class="menu-card" onclick="navigateTo('view_status.html', 'Fetching Status...')">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>View Status</span>
        </div>

        <div class="menu-card" onclick="navigateTo('appeal.html', 'Opening Appeal...')">
            <i class="fa-solid fa-scale-balanced"></i>
            <span>Appeal</span>
        </div>

        <div class="menu-card" onclick="navigateTo('redress_process.html', 'Loading Workflow...')">
            <i class="fa-solid fa-diagram-project"></i>
            <span>Redress Process</span>
        </div>

        <div class="menu-card" onclick="navigateTo('about_us.html', 'Loading Info...')">
            <i class="fa-solid fa-circle-info"></i>
            <span>About Us</span>
        </div>

        <div class="menu-card auth-card" onclick="navigateTo('authority_login.html', 'Securing Channel...')">
            <i class="fa-solid fa-user-lock"></i>
            <span>Authority Login</span>
        </div>
    </div>

    <div id="loaderOverlay">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">LOADING...</div>
    </div>

    <script>
        function navigateTo(page, message) {
            const loader = document.getElementById('loaderOverlay');
            const loaderText = document.getElementById('loaderText');
            
            // Set message and show loader
            loaderText.innerText = message.toUpperCase();
            loader.style.display = 'flex';

            // Simulate smooth loading transition
            setTimeout(() => {
                window.location.href = page;
            }, 800);
        }

        // Handle page visibility for smooth back-navigation transitions
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                document.getElementById('loaderOverlay').style.display = 'none';
            }
        });
    </script>
</body>
</html>
