<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grievance Hub | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #0062ff;
            --accent-light: #e0ebff;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #f8fafc;
            background: radial-gradient(at 0% 0%, rgba(0, 98, 255, 0.05) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.05) 0px, transparent 50%);
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* Fixed App Bar */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--bg-dark); display: flex; align-items: center;
            justify-content: space-between; padding: 0 24px; z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .app-title { color: white; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
        .app-title span { color: var(--accent); }
        .bell-icon { color: white; opacity: 0.6; font-size: 1.1rem; position: relative; }
        .bell-dot { position: absolute; top: 0; right: 0; width: 6px; height: 6px; background: #ff4d4d; border-radius: 50%; }

        /* Dashboard Content */
        .app-body {
            margin-top: 90px; padding: 0 20px 40px;
            max-width: 480px; margin-left: auto; margin-right: auto; width: 100%;
        }

        /* Modern Status Dashboard */
        .status-hero {
            background: #ffffff; border-radius: 30px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
            margin-bottom: 25px; position: relative;
        }
        .live-tag {
            position: absolute; top: 20px; right: 25px;
            background: #ecfdf5; color: #10b981; font-size: 9px;
            padding: 4px 10px; border-radius: 20px; font-weight: 800;
            display: flex; align-items: center; gap: 5px;
        }
        .pulse { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }

        .status-hero h3 { font-size: 13px; color: #94a3b8; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        .stats-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .stat-group .val { font-size: 2.2rem; font-weight: 900; display: block; color: var(--bg-dark); line-height: 1; }
        .stat-group .lbl { font-size: 11px; font-weight: 600; color: #64748b; margin-top: 5px; display: block; }

        /* Ultra-Modern Grid */
        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px; padding: 22px 10px;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0, 98, 255, 0.1);
            border-color: var(--accent);
        }

        .glass-card:active { transform: scale(0.95); }

        .icon-sphere {
            width: 56px; height: 56px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 15px;
            background: white; box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            color: var(--accent);
            transition: 0.3s;
        }

        .glass-card:hover .icon-sphere { background: var(--accent); color: white; }

        .glass-card span { font-size: 0.85rem; font-weight: 700; color: var(--bg-dark); }

        /* Full Screen Spinner */
        #pageLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .liquid-spinner {
            width: 50px; height: 50px; border: 4px solid var(--accent-light);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        /* Entrance Animation */
        .slide-up { animation: slideUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="app-title">SECURE<span>CORE</span></div>
        <div class="bell-icon"><i class="fa-solid fa-bell"></i><div class="bell-dot"></div></div>
    </nav>

    <div class="app-body">
        <div class="status-hero slide-up">
            <div class="live-tag"><div class="pulse"></div> LIVE SYNC</div>
            <h3>Overview</h3>
            <div class="stats-row">
                <div class="stat-group">
                    <span class="val" id="p_count">--</span>
                    <span class="lbl">Pending Cases</span>
                </div>
                <div class="stat-group" style="text-align: right;">
                    <span class="val" id="r_count" style="color: #10b981;">--</span>
                    <span class="lbl">Resolved</span>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div class="glass-card slide-up" style="animation-delay: 0.1s;" onclick="route('lodge_grievance.html', 'Preparing Form')">
                <div class="icon-sphere"><i class="fa-solid fa-feather-pointed"></i></div>
                <span>Lodge</span>
            </div>

            <div class="glass-card slide-up" style="animation-delay: 0.2s;" onclick="route('view_status.html', 'Syncing Records')">
                <div class="icon-sphere"><i class="fa-solid fa-chart-line"></i></div>
                <span>Status</span>
            </div>

            <div class="glass-card slide-up" style="animation-delay: 0.3s;" onclick="route('appeal.html', 'Opening Appeal')">
                <div class="icon-sphere"><i class="fa-solid fa-shield-halved"></i></div>
                <span>Appeal</span>
            </div>

            <div class="glass-card slide-up" style="animation-delay: 0.4s;" onclick="route('redress_process.html', 'Loading Flow')">
                <div class="icon-sphere"><i class="fa-solid fa-code-branch"></i></div>
                <span>Process</span>
            </div>

            <div class="glass-card slide-up" style="animation-delay: 0.5s;" onclick="route('about_us.html', 'Information')">
                <div class="icon-sphere"><i class="fa-solid fa-fingerprint"></i></div>
                <span>About Us</span>
            </div>

            <div class="glass-card slide-up" style="animation-delay: 0.6s;" onclick="route('authority_login.html', 'Secure Login')">
                <div class="icon-sphere" style="background: var(--bg-dark); color: white;"><i class="fa-solid fa-lock"></i></div>
                <span>Admin</span>
            </div>
        </div>
    </div>

    <div id="pageLoader">
        <div class="liquid-spinner"></div>
        <p id="loaderMsg" style="margin-top:20px; font-weight:800; font-size:11px; color:var(--bg-dark); letter-spacing:1px;"></p>
    </div>

    <script>
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbzOqDDARIyXSnqaJth9fE2HSVGr7Vs1uYCEgYmX1gDIxxRcAoitVqed1HkqaLmK3SL2/exec";

        // Fetch Data for Hero Dashboard
        async function fetchDashboard() {
            try {
                const res = await fetch(DATABASE_URL);
                const data = await res.json();
                
                const pending = data.filter(x => x.status !== 'Resolved').length;
                const resolved = data.filter(x => x.status === 'Resolved').length;

                document.getElementById('p_count').innerText = pending;
                document.getElementById('r_count').innerText = resolved;
            } catch (e) {
                document.getElementById('p_count').innerText = "0";
                document.getElementById('r_count').innerText = "0";
            }
        }

        // Beautiful Navigation Transition
        function route(path, msg) {
            const loader = document.getElementById('pageLoader');
            document.getElementById('loaderMsg').innerText = msg.toUpperCase();
            loader.style.display = 'flex';
            setTimeout(() => { window.location.href = path; }, 800);
        }

        window.onload = fetchDashboard;

        // Ensure back-button doesn't show stuck loader
        window.onpageshow = (event) => { if (event.persisted) document.getElementById('pageLoader').style.display = 'none'; };
    </script>
</body>
</html>
