<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grievance Hub | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0062ff;
            --accent: #00d2ff;
            --bg: #f4f7fb;
            --text: #1e293b;
            --muted: #94a3b8;
            --white: #ffffff;
            --header: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column;
        }

        /* High-End Fixed Header */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--header); display: flex; align-items: center;
            justify-content: space-between; padding: 0 25px; z-index: 1000;
        }
        .logo { font-weight: 900; color: white; letter-spacing: -0.5px; font-size: 1.2rem; }
        .logo span { color: var(--primary); }
        .profile-trigger { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); }

        /* Main App Body */
        .app-container {
            margin-top: 70px; flex: 1; padding: 25px 20px;
            max-width: 500px; margin-left: auto; margin-right: auto; width: 100%;
        }

        .app-greeting { margin-bottom: 25px; }
        .app-greeting h1 { font-size: 1.6rem; margin: 0; font-weight: 800; }
        .app-greeting p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

        /* System Health (Summary) */
        .system-health {
            background: linear-gradient(135deg, var(--header) 0%, #1e293b 100%);
            border-radius: 28px; padding: 25px; margin-bottom: 30px;
            color: white; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            position: relative; overflow: hidden;
        }
        .system-health::after {
            content: ''; position: absolute; top: -50%; right: -20%; width: 150px; height: 150px;
            background: var(--primary); filter: blur(70px); opacity: 0.3;
        }

        .health-title { font-size: 10px; font-weight: 700; opacity: 0.5; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .health-grid { display: flex; gap: 20px; position: relative; z-index: 1; }
        .health-stat { flex: 1; }
        .health-stat .val { font-size: 1.8rem; font-weight: 800; display: block; }
        .health-stat .lab { font-size: 11px; opacity: 0.6; }

        /* Action Hub Grid */
        .action-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
        }

        .action-item {
            background: var(--white); border-radius: 24px; padding: 22px 15px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .action-item:hover { transform: scale(1.03); box-shadow: 0 15px 30px rgba(0,98,255,0.08); }
        .action-item:active { transform: scale(0.95); opacity: 0.8; }

        /* Themed Icon Circles */
        .icon-circ {
            width: 54px; height: 54px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 12px;
        }

        /* Specific Brand Colors */
        .blue { background: #eef5ff; color: #0062ff; }
        .green { background: #ecfdf5; color: #10b981; }
        .orange { background: #fff7ed; color: #f59e0b; }
        .purple { background: #f5f3ff; color: #8b5cf6; }
        .teal { background: #f0fdfa; color: #14b8a6; }
        .dark { background: #f1f5f9; color: var(--header); }

        .action-item span { font-size: 0.85rem; font-weight: 700; color: var(--text); }

        /* Loading Animation Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .spinner-ring {
            width: 50px; height: 50px; border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Animation for stats entry */
        .reveal { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Grievance Hub<span>PORTAL</span></div>
        <div class="profile-trigger"><i class="fa-solid fa-user-gear"></i></div>
    </nav>

    <div class="app-container">
        <div class="app-greeting">
            <h1>Employee Grievance Portal</h1>
            <p>Welcome to your central hub</p>
        </div>

        <div class="system-health">
            <span class="health-title">System Health & Metrics</span>
            <div class="health-grid" id="statsLoader">
                <div class="spinner-ring" style="width:25px; height:25px; border-width:2px;"></div>
            </div>
            <div class="health-grid" id="statsContainer" style="display: none;">
                <div class="health-stat">
                    <span class="val" id="pendingNum" style="color: #ff5e5e;">0</span>
                    <span class="lab">Pending</span>
                </div>
                <div class="health-stat">
                    <span class="val" id="resolvedNum" style="color: #00ffaa;">0</span>
                    <span class="lab">Resolved</span>
                </div>
                <div class="health-stat">
                    <span class="val">98%</span>
                    <span class="lab">Uptime</span>
                </div>
            </div>
        </div>

        <div class="action-grid">
            <div class="action-item reveal" onclick="navTo('grievance.html', 'Preparing Form')">
                <div class="icon-circ blue"><i class="fa-solid fa-file-signature"></i></div>
                <span>Lodge Grievance</span>
            </div>

            <div class="action-item reveal" onclick="navTo('status.html', 'Syncing Data')">
                <div class="icon-circ green"><i class="fa-solid fa-bolt-lightning"></i></div>
                <span>View Status</span>
            </div>

            <div class="action-item reveal" onclick="navTo('appeal.html', 'Opening Case')">
                <div class="icon-circ orange"><i class="fa-solid fa-building-shield"></i></div>
                <span>Appeal</span>
            </div>

            <div class="action-item reveal" onclick="navTo('process_about.html', 'Loading Flow')">
                <div class="icon-circ purple"><i class="fa-solid fa-network-wired"></i></div>
                <span>Redress Process flow </span>
            </div>

            <div class="action-item reveal" onclick="navTo('statistics.html', 'About Portal')">
                <div class="icon-circ teal"><i class="fa-solid fa-fingerprint"></i></div>
                <span>Statistics</span>
            </div>

            <div class="action-item reveal" onclick="navTo('officer_login.html', 'Secure Area')">
                <div class="icon-circ dark"><i class="fa-solid fa-key"></i></div>
                <span>Authority Login</span>
            </div>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-ring"></div>
        <p id="loaderMsg" style="margin-top:20px; font-weight:700; font-size:12px; letter-spacing:1px; color:var(--header);"></p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzOqDDARIyXSnqaJth9fE2HSVGr7Vs1uYCEgYmX1gDIxxRcAoitVqed1HkqaLmK3SL2/exec";

        // Load Live Metrics
        async function loadMetrics() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const pending = data.filter(i => i.status !== 'Resolved').length;
                const resolved = data.filter(i => i.status === 'Resolved').length;

                document.getElementById('pendingNum').innerText = pending;
                document.getElementById('resolvedNum').innerText = resolved;
                
                document.getElementById('statsLoader').style.display = 'none';
                document.getElementById('statsContainer').style.display = 'flex';
            } catch (err) {
                document.getElementById('statsLoader').innerHTML = "<span style='font-size:11px; opacity:0.5;'>System Syncing...</span>";
            }
        }

        // Animated Navigation
        function navTo(page, msg) {
            const loader = document.getElementById('loader');
            document.getElementById('loaderMsg').innerText = msg.toUpperCase();
            loader.style.display = 'flex';
            setTimeout(() => { window.location.href = page; }, 800);
        }

        // Initialize app
        window.onload = loadMetrics;

        // Cleanup on back button
        window.onpageshow = (e) => { if (e.persisted) document.getElementById('loader').style.display = 'none'; };
    </script>
</body>
</html>
