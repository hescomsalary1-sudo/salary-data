<!DOCTYPE html>
<html lang="en">
<head>
    <title>Holiday Calendar 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #4b2dd8;
            --primary-light: #7a5cff;
            --bg: #f8f9fd;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER */
        .top {
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px rgba(75, 45, 216, 0.15);
        }

        .top .icon {
            width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        /* GRID */
        .content { padding: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* CARD - FIXED IMAGE VIEW */
        .holiday-btn {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .holiday-btn:active { transform: scale(0.95); }

        .holiday-img {
            width: 100%;
            height: 120px;
            object-fit: cover; /* This fixes the 'cut' or white space issue */
            display: block;
        }

        .holiday-info {
            padding: 12px;
            text-align: center;
        }

        .holiday-info b {
            background: #f0edff;
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 11px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .holiday-info span {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        /* POPUP - MODERN GLASS LOOK */
        .popup {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .popup.show {
            visibility: visible;
            opacity: 1;
        }

        .popup-box {
            background: white;
            padding: 25px;
            border-radius: 25px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            transform: translateY(30px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup.show .popup-box {
            transform: translateY(0);
        }

        .popup-box img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .popup-box h3 { color: var(--primary); margin: 10px 0; }
        .popup-box p { font-size: 14px; color: #555; line-height: 1.5; }

        .close-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        @media(max-width: 350px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="top">
    <div class="icon">🎊</div>
    <h2>Holiday List</h2>
</div>

<div class="content">
    <div class="grid" id="holidayList"></div>
</div>

<div class="popup" id="popup" onclick="closePopup()">
    <div class="popup-box" onclick="event.stopPropagation()">
        <img id="popupImg" src="">
        <h3 id="holidayName"></h3>
        <p id="holidayReason"></p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <p><strong>Importance:</strong></p>
        <p id="holidayImportance"></p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
    // Improved Image Mapping
    function getImage(name) {
        name = name.toLowerCase();
        if(name.includes("makara")) return "https://images.unsplash.com/photo-1590013330462-094d38ba0d5c?auto=format&fit=crop&w=500";
        if(name.includes("republic")) return "https://images.unsplash.com/photo-1532375810709-75b1da00537c?auto=format&fit=crop&w=500";
        if(name.includes("yugadi")) return "https://images.unsplash.com/photo-1614705827065-65c3db4d86cb?auto=format&fit=crop&w=500";
        if(name.includes("ramzan")) return "https://images.unsplash.com/photo-1564769662533-4f00a87b4056?auto=format&fit=crop&w=500";
        if(name.includes("christmas")) return "https://images.unsplash.com/photo-1543589077-47d81606c1bf?auto=format&fit=crop&w=500";
        if(name.includes("ganesha")) return "https://images.unsplash.com/photo-1621644788118-2490b790d981?auto=format&fit=crop&w=500";
        if(name.includes("diwali")) return "https://images.unsplash.com/photo-1547949003-9792a18a2601?auto=format&fit=crop&w=500";
        
        return "https://images.unsplash.com/photo-1459749411177-042180ce673c?auto=format&fit=crop&w=500";
    }

    // Modern CSV Parser (handles quotes and commas)
    function parseCSV(text) {
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        return text.split('\n').map(line => line.split(regex).map(val => val.replace(/^"|"$/g, '').trim()));
    }

    fetch("https://hescomsalary1-sudo.github.io/salary-data/holidays.csv")
    .then(res => res.text())
    .then(data => {
        const rows = parseCSV(data).slice(1);
        let html = "";

        rows.forEach(cols => {
            if(cols.length >= 3) {
                const date = cols[0];
                const name = cols[1];
                const reason = cols[2];
                const importance = cols[3] || "N/A";
                const img = getImage(name);

                // We use base64 encoding or simple escaping to ensure data passes safely to the function
                html += `
                <div class="holiday-btn" onclick="openPopup('${name.replace(/'/g, "\\'")}', '${reason.replace(/'/g, "\\'")}', '${importance.replace(/'/g, "\\'")}', '${img}')">
                    <img src="${img}" class="holiday-img">
                    <div class="holiday-info">
                        <b>${date}</b>
                        <span>${name}</span>
                    </div>
                </div>`;
            }
        });

        document.getElementById("holidayList").innerHTML = html;
    })
    .catch(err => console.error("Error loading CSV:", err));

    function openPopup(name, reason, importance, img) {
        document.getElementById("holidayName").innerText = name;
        document.getElementById("holidayReason").innerText = reason;
        document.getElementById("holidayImportance").innerText = importance;
        document.getElementById("popupImg").src = img;
        document.getElementById("popup").classList.add("show");
    }

    function closePopup() {
        document.getElementById("popup").classList.remove("show");
    }
</script>

</body>
</html>
