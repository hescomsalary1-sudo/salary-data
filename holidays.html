<!DOCTYPE html>
<html lang="en">
<head>
<title>Holiday Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f6f7ff);
padding-top:110px;
}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
background:linear-gradient(135deg,#6a5cff,#4b2dd8);
padding:25px 18px 40px;
color:white;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px;
box-sizing:border-box;
}

*{box-sizing:border-box;}

.back-btn{
position:absolute;
top:20px;
left:15px;
width:40px;
height:40px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.add-btn{
position:absolute;
top:20px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:linear-gradient(135deg,#7a5cff,#4b2dd8);
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
}

.header h1{margin:0;font-size:26px;}
.header p{margin-top:5px;font-size:13px;opacity:0.9;}

/* TABS */
.tabs{
margin-top:25px;
padding:12px;
display:flex;
gap:10px;
overflow:auto;
}

.tab{
padding:10px 14px;
border-radius:12px;
background:white;
font-size:13px;
white-space:nowrap;
cursor:pointer;
}

.tab.active{
background:linear-gradient(135deg,#6a5cff,#4b2dd8);
color:white;
}

/* GRID */
.content{padding:15px;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

/* CARD */
.holiday-btn{
position:relative;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
cursor:pointer;
}

.holiday-btn::before{
content:"";
position:absolute;
left:0;
top:0;
bottom:0;
width:6px;
background:linear-gradient(#ff9a00,#ff4d4d);
}

.holiday-icon{font-size:36px;}

.date-badge{
position:absolute;
top:10px;
right:10px;
background:#eef1ff;
padding:5px 10px;
border-radius:8px;
font-size:12px;
}

.holiday-info span{
display:block;
margin-top:10px;
font-weight:600;
}

/* POPUP (UNCHANGED) */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:0.3s;
}

.popup.show{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
padding:20px;
border-radius:20px;
width:85%;
max-width:330px;
text-align:center;
}

.popup-icon{font-size:40px;}

.popup-box button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#4b2dd8;
color:white;
}

</style>
</head>

<body>

<div class="header">
<div class="back-btn" onclick="history.back()">←</div>
<div class="add-btn">+</div>
<h1>Holiday List</h1>
<p>Celebrate every moment ✨</p>
</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" data-type="all">All</div>
<div class="tab" data-type="national">National</div>
<div class="tab" data-type="religious">Religious</div>
<div class="tab" data-type="cultural">Cultural</div>
</div>

<div class="content">
<div class="grid" id="holidayList"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<div class="popup-icon" id="popupIcon"></div>
<h3 id="holidayName"></h3>
<p id="holidayReason"></p>
<p id="holidayImportance"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* ===== ORIGINAL LOGIC KEPT ===== */
function getIcon(name){
name=name.toLowerCase();
if(name.includes("republic")) return "🇮🇳";
if(name.includes("ramzan")) return "🌙";
return "🎊";
}

let allCards=[];

/* LOAD CSV */
fetch("https://hescomsalary1-sudo.github.io/salary-data/holidays.csv")
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);
let html="";

rows.forEach(row=>{
let c=row.split(",");

if(c.length>3){

let icon=getIcon(c[1]);

html+=`
<div class="holiday-btn"
data-type="${c[2].toLowerCase()}"
data-name="${c[1]}"
data-reason="${c[2]}"
data-importance="${c[3]}"
data-icon="${icon}">

<div class="holiday-icon">${icon}</div>
<div class="date-badge">${c[0]}</div>

<div class="holiday-info">
<span>${c[1]}</span>
</div>

</div>
`;
}
});

document.getElementById("holidayList").innerHTML=html;

/* SAVE ALL */
allCards=document.querySelectorAll(".holiday-btn");

/* CLICK POPUP */
allCards.forEach(btn=>{
btn.addEventListener("click",function(){
popupIcon.innerText=this.dataset.icon;
holidayName.innerText=this.dataset.name;
holidayReason.innerText=this.dataset.reason;
holidayImportance.innerText=this.dataset.importance;
popup.classList.add("show");
});
});

});

/* ===== FILTER (NEW, SAFE ADD) ===== */
document.querySelectorAll(".tab").forEach(tab=>{
tab.addEventListener("click",function(){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
this.classList.add("active");

let type=this.dataset.type;

allCards.forEach(card=>{
if(type==="all"){
card.style.display="block";
}else{
card.style.display = card.dataset.type.includes(type) ? "block":"none";
}
});

});
});

/* POPUP CLOSE */
function closePopup(){
popup.classList.remove("show");
}

</script>

</body>
</html>
