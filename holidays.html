<!DOCTYPE html>
<html>
<head>
<title>Holiday List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(135deg,#eef1ff,#f9faff);
}

/* HEADER */

.top{
padding:20px;
background:linear-gradient(135deg,#4b2dd8,#7a5cff);
color:white;
display:flex;
align-items:center;
gap:12px;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.top .icon{
width:42px;
height:42px;
background:white;
color:#4b2dd8;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* GRID */

.content{padding:16px;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

/* CARD */

.holiday-btn{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.holiday-btn:hover{
transform:translateY(-4px);
}

.holiday-img{
width:100%;
height:90px;
object-fit:cover;
}

.holiday-info{
padding:12px;
text-align:center;
}

.holiday-info b{
background:#4b2dd8;
color:white;
padding:4px 10px;
border-radius:10px;
font-size:11px;
}

.holiday-info span{
display:block;
margin-top:6px;
color:#4b2dd8;
font-weight:600;
font-size:13px;
}

/* POPUP (GLASS STYLE) */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:0.3s;
}

.popup.show{
visibility:visible;
opacity:1;
}

.popup-box{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.85);
padding:22px;
border-radius:20px;
width:85%;
max-width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{transform:translateY(40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.popup-box img{
width:100%;
height:120px;
object-fit:cover;
border-radius:14px;
margin-bottom:10px;
}

.popup-box h3{
color:#4b2dd8;
margin:5px 0;
}

.popup-box p{
font-size:14px;
color:#444;
line-height:1.5;
}

.popup-box button{
margin-top:12px;
padding:10px 22px;
border:none;
border-radius:25px;
background:#4b2dd8;
color:white;
font-weight:bold;
cursor:pointer;
}

/* SMALL DEVICES */

@media(max-width:350px){
.grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="top">
<div class="icon">🎉</div>
<h2>Holiday List</h2>
</div>

<div class="content">
<div class="grid" id="holidayList"></div>
</div>

<!-- POPUP -->

<div class="popup" id="popup">
<div class="popup-box">

<img id="popupImg">

<h3 id="holidayName"></h3>

<p id="holidayReason"></p>

<p><b>Importance:</b></p>

<p id="holidayImportance"></p>

<button onclick="closePopup()">Close</button>

</div>
</div>

<script>

/* IMAGE MAP */

function getImage(name){
name=name.toLowerCase();

if(name.includes("diwali")) return "https://source.unsplash.com/300x200/?diwali";
if(name.includes("christmas")) return "https://source.unsplash.com/300x200/?christmas";
if(name.includes("ramzan")||name.includes("eid")) return "https://source.unsplash.com/300x200/?eid";
if(name.includes("independence")) return "https://source.unsplash.com/300x200/?india-flag";
if(name.includes("ganesha")) return "https://source.unsplash.com/300x200/?ganesha";
if(name.includes("gandhi")) return "https://source.unsplash.com/300x200/?gandhi";
if(name.includes("republic")) return "https://source.unsplash.com/300x200/?india-parade";
if(name.includes("dasara")||name.includes("vijaya")) return "https://source.unsplash.com/300x200/?dussehra";

return "https://source.unsplash.com/300x200/?festival";
}

/* LOAD CSV */

fetch("https://hescomsalary1-sudo.github.io/salary-data/holidays.csv")
.then(res => res.text())
.then(data => {

let rows = data.split("\n").slice(1);
let html="";

rows.forEach(row=>{

let cols=row.split(",");

if(cols.length>3){

let img=getImage(cols[1]);

html+=`

<div class="holiday-btn"

data-name="${cols[1]}"
data-reason="${cols[2]}"
data-importance="${cols[3]}"
data-img="${img}">

<img src="${img}" class="holiday-img">

<div class="holiday-info">
<b>${cols[0]}</b>
<span>${cols[1]}</span>
</div>

</div>

`;

}

});

document.getElementById("holidayList").innerHTML=html;

document.querySelectorAll(".holiday-btn").forEach(btn=>{

btn.addEventListener("click", function(){

document.getElementById("holidayName").innerText=this.dataset.name;
document.getElementById("holidayReason").innerText=this.dataset.reason;
document.getElementById("holidayImportance").innerText=this.dataset.importance;
document.getElementById("popupImg").src=this.dataset.img;

document.getElementById("popup").classList.add("show");

});

});

});

/* CLOSE */

function closePopup(){
document.getElementById("popup").classList.remove("show");
}

</script>

</body>
</html>
