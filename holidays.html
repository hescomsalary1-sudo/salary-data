<!DOCTYPE html>
<html lang="en">
<head>
<title>Holiday Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--primary:#4b2dd8;
--light:#7a5cff;
--bg:#f5f6ff;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg);
}

/* HEADER */
.top{
padding:25px 20px;
background:linear-gradient(135deg,var(--primary),var(--light));
color:white;
display:flex;
align-items:center;
gap:12px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.top .icon{
width:42px;height:42px;
background:rgba(255,255,255,0.2);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

/* GRID */
.content{padding:18px;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* CARD */
.holiday-btn{
background:white;
border-radius:18px;
padding:18px 12px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
cursor:pointer;
transition:0.25s;
}

.holiday-btn:active{
transform:scale(0.96);
}

/* ICON */
.holiday-icon{
font-size:34px;
margin-bottom:8px;
}

/* INFO */
.holiday-info b{
background:#eee9ff;
color:var(--primary);
padding:4px 10px;
border-radius:8px;
font-size:11px;
}

.holiday-info span{
display:block;
margin-top:6px;
font-weight:600;
font-size:14px;
color:#333;
}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:0.3s;
}

.popup.show{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
padding:20px;
border-radius:20px;
width:85%;
max-width:330px;
text-align:center;
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.popup-icon{
font-size:40px;
margin-bottom:10px;
}

.popup-box h3{
color:var(--primary);
margin:5px 0;
}

.popup-box p{
font-size:14px;
color:#555;
line-height:1.5;
}

.popup-box button{
margin-top:12px;
padding:10px 20px;
border:none;
border-radius:20px;
background:var(--primary);
color:white;
font-weight:bold;
}

@media(max-width:350px){
.grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="top">
<div class="icon">🎉</div>
<h2>Holiday List</h2>
</div>

<div class="content">
<div class="grid" id="holidayList"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<div class="popup-icon" id="popupIcon"></div>
<h3 id="holidayName"></h3>
<p id="holidayReason"></p>
<p><b>Importance:</b></p>
<p id="holidayImportance"></p>

<button onclick="closePopup()">Close</button>

</div>
</div>

<script>

/* ICON MAP */
function getIcon(name){
name=name.toLowerCase();

if(name.includes("makara")) return "🪁";
if(name.includes("republic")) return "🇮🇳";
if(name.includes("yugadi")) return "🌸";
if(name.includes("ramzan")) return "🌙";
if(name.includes("bakreed")) return "🐐";
if(name.includes("christmas")) return "🎄";
if(name.includes("ganesha")) return "🐘";
if(name.includes("diwali")) return "🪔";
if(name.includes("independence")) return "🇮🇳";
if(name.includes("gandhi")) return "🕊";
if(name.includes("labour")) return "⚒";
if(name.includes("ambedkar")) return "📘";
if(name.includes("basava")) return "🙏";
if(name.includes("mahaveer")) return "☸";
if(name.includes("good friday")) return "✝";
if(name.includes("moharam")) return "🕌";
if(name.includes("milad")) return "🕌";
if(name.includes("navami")) return "🗡";
if(name.includes("ayudha")) return "🛠";
if(name.includes("dussehra") || name.includes("vijaya")) return "🏹";

return "🎊";
}

/* LOAD CSV */
fetch("https://hescomsalary1-sudo.github.io/salary-data/holidays.csv")
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);
let html="";

rows.forEach(row=>{
let cols=row.split(",");

if(cols.length>3){

let icon=getIcon(cols[1]);

html+=`
<div class="holiday-btn"
data-name="${cols[1]}"
data-reason="${cols[2]}"
data-importance="${cols[3]}"
data-icon="${icon}">

<div class="holiday-icon">${icon}</div>

<div class="holiday-info">
<b>${cols[0]}</b>
<span>${cols[1]}</span>
</div>

</div>
`;
}
});

document.getElementById("holidayList").innerHTML=html;

document.querySelectorAll(".holiday-btn").forEach(btn=>{
btn.addEventListener("click",function(){

document.getElementById("holidayName").innerText=this.dataset.name;
document.getElementById("holidayReason").innerText=this.dataset.reason;
document.getElementById("holidayImportance").innerText=this.dataset.importance;
document.getElementById("popupIcon").innerText=this.dataset.icon;

document.getElementById("popup").classList.add("show");

});
});

});

function closePopup(){
document.getElementById("popup").classList.remove("show");
}

</script>

</body>
</html>
