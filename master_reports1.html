<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Master Analytics Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4338ca;
            --bg: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --career: #4338ca;
            --personal: #059669;
            --identity: #d97706;
            --social: #e11d48;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--bg); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; padding: 20px 0; background: var(--primary);
            color: white; text-align: center; position: sticky; top: 0; z-index: 1000;
        }
        header h1 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }

        .container { width: 94%; max-width: 600px; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }

        /* --- Global Totals --- */
        .total-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .total-card {
            background: white; border-radius: 16px; padding: 15px 5px; text-align: center;
            border: 1px solid #e2e8f0;
        }
        .total-card span { display: block; font-size: 9px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
        .total-card b { font-size: 20px; display: block; }

        /* --- Carousel --- */
        .carousel-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .desig-slider {
            display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth;
            scrollbar-width: none; scroll-snap-type: x mandatory; padding: 10px 0;
        }
        .desig-slider::-webkit-scrollbar { display: none; }
        .desig-card {
            min-width: 85%; scroll-snap-align: center; background:linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 16px; border: 1px solid #e2e8f0;
        }
        .desig-card h3 { margin: 0 0 10px 0; font-size: 13px; font-weight: 700; height: 35px; overflow: hidden; }
        .stats-row { display: flex; justify-content: space-between; gap: 5px; }
        .mini-stat { flex: 1; text-align: center; background: #f8fafc; padding: 8px; border-radius: 10px; }
        .mini-stat label { display: block; font-size: 8px; font-weight: 700; color: var(--text-muted); }
        .mini-stat span { font-size: 14px; font-weight: 800; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; background: white; border: 1px solid #e2e8f0; border-radius: 50%; z-index: 10; color: var(--primary); }

        /* --- Search Bar --- */
        .search-box {
            position: sticky; top: 75px; z-index: 900; background: white;
            border-radius: 16px; padding: 14px 18px; border: 1px solid #e2e8f0;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
        }
        .search-box input { border: none; outline: none; width: 100%; font-size: 15px; font-family: inherit; }

        /* --- MODERN INDIVIDUAL RECORDS --- */
        .emp-card {
            background: white; border-radius: 24px; padding: 18px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .emp-card.active { border-color: var(--primary); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .card-header { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar {
            width: 50px; height: 50px; background: #f1f5f9; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 15px; color: var(--primary); border: 2px solid #fff;
        }
        .name-meta h4 { margin: 0; font-size: 15px; font-weight: 800; }
        .name-meta p { margin: 2px 0 0 0; font-size: 11px; color: var(--text-muted); }
        .chevron { margin-left: auto; color: #cbd5e1; transition: 0.3s; }
        .active .chevron { transform: rotate(180deg); color: var(--primary); }

        /* Expansion Styling */
        .detail-pane { max-height: 0; overflow: hidden; transition: max-height 0.6s ease; }
        .active .detail-pane { max-height: 5000px; margin-top: 20px; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .act-btn { padding: 12px; border-radius: 14px; text-decoration: none; text-align: center; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .act-call { background: #ecfdf5; color: #059669; }
        .act-mail { background: #eff6ff; color: #3b82f6; }

        /* Colorful Section Containers */
        .data-sect { border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .career-bg { background: #f5f3ff; border: 1px solid #ddd6fe; }
        .personal-bg { background: #f0fdf4; border: 1px solid #dcfce7; }
        .identity-bg { background: #fffbeb; border: 1px solid #fef3c7; }
        .social-bg { background: #fff1f2; border: 1px solid #ffe4e6; }

        .sect-head { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .career-head { color: var(--career); }
        .personal-head { color: var(--personal); }
        .identity-head { color: var(--identity); }
        .social-head { color: var(--social); }

        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-box { background: rgba(255,255,255,0.6); padding: 10px; border-radius: 12px; }
        .data-box label { display: block; font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 3px; }
        .data-box span { font-size: 11px; font-weight: 700; color: #1e293b; display: block; }

        #loader { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span style="font-size:13px; font-weight:700;">Building Dashboard...</span></div>

<header><h1>Employee Master Portal</h1></header>

<div class="container">
    
    <div class="total-grid">
        <div class="total-card"><span>SANCTIONED</span><b id="gtS" style="color:#4338ca">0</b></div>
        <div class="total-card"><span>WORKING</span><b id="gtW" style="color:#059669">0</b></div>
        <div class="total-card"><span>VACANT</span><b id="gtV" style="color:#e11d48">0</b></div>
    </div>

    <div class="carousel-wrapper">
        <button class="nav-btn" style="left:-10px" onclick="slide('left')"><i class="fas fa-chevron-left"></i></button>
        <div id="desigSlider" class="desig-slider"></div>
        <button class="nav-btn" style="right:-10px" onclick="slide('right')"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="search-box">
        <i class="fas fa-search" style="color: var(--primary)"></i>
        <input type="text" id="searchInput" placeholder="Search anything..." oninput="handleSearch()">
    </div>

    <div id="employeeList"></div>

</div>

<script>
    const CSV_URL = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
    let masterData = [];

    window.onload = () => {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                masterData = res.data;
                calculateAnalytics();
                renderEmployees(masterData);
                document.getElementById('loader').style.display = 'none';
            }
        });
    };

    function slide(dir) {
        const s = document.getElementById('desigSlider');
        s.scrollBy({ left: dir === 'left' ? -250 : 250, behavior: 'smooth' });
    }

    function calculateAnalytics() {
        const desigMap = {};
        let ts=0, tw=0, tv=0;
        masterData.forEach(r => {
            let d = (r.designation || 'Unknown').trim();
            if (!desigMap[d]) desigMap[d] = {s:0, w:0, v:0};
            let sT = String(r.sanctioned_post||'').toLowerCase();
            let wT = String(r.working_post||'').toLowerCase();
            let vT = String(r.vacant_post||'').toLowerCase();
            if (sT.includes('sanctioned')) { desigMap[d].s++; ts++; }
            if (wT.includes('working')) { desigMap[d].w++; tw++; }
            if (vT.includes('vacant')) { desigMap[d].v++; tv++; }
        });
        document.getElementById('gtS').innerText = ts;
        document.getElementById('gtW').innerText = tw;
        document.getElementById('gtV').innerText = tv;
        const slider = document.getElementById('desigSlider');
        slider.innerHTML = "";
        Object.keys(desigMap).sort().forEach(k => {
            const div = document.createElement('div');
            div.className = 'desig-card';
            div.innerHTML = `<h3>${k}</h3><div class="stats-row"><div class="mini-stat"><label>Sanc.</label><span>${desigMap[k].s}</span></div><div class="mini-stat"><label>Work.</label><span>${desigMap[k].w}</span></div><div class="mini-stat"><label>Vac.</label><span>${desigMap[k].v}</span></div></div>`;
            slider.appendChild(div);
        });
    }

    function renderEmployees(data) {
        const list = document.getElementById('employeeList');
        list.innerHTML = "";

        data.forEach((r, i) => {
            const card = document.createElement('div');
            card.className = 'emp-card';
            
            // Section 1: Professional (Indigo)
            const career = [['Joined', r.Joining_date], ['Joined As', r.Joining_designation], ['Current', r.Current_designation], ['Designation', r.designation], ['Office', r.Lien_office], ['Retirement', r.Retirement_date], ['Type', r.Appointment_type], ['Probation', r.Probationary_period_declaration]];
            
            // Section 2: Personal (Green)
            const personal = [['DOB', r.Date_of_birth], ['Gender', r.male_or_female], ['Religion', r.Religion], ['Caste', r.Caste_name], ['Category', r.Category], ['Town', r.Home_town], ['District', r.District], ['Qualification', r.Qualification]];
            
            // Section 3: Identity & Finance (Amber)
            const identity = [['PAN', r['PAN_No.']], ['KGID/NDCPS', r['NDCPS_No.']], ['Pension', r.Pension_type], ['PIN', r.PIN], ['Marital', r.Marital_status], ['Disabled', r.Physically_Disablity]];

            // Section 4: Contact (Rose)
            const social = [['Mobile', r.mobile], ['Email', r.E_mail], ['Username', r.username]];

            card.innerHTML = `
                <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="avatar">${i+1}</div>
                    <div class="name-meta">
                        <h4>${r.name || 'Staff Member'}</h4>
                        <p>${r.designation} • ${r.place}</p>
                    </div>
                    <i class="fas fa-chevron-down chevron"></i>
                </div>
                <div class="detail-pane">
                    

                    <div class="data-sect career-bg">
                        <div class="sect-head career-head"><i class="fas fa-briefcase"></i> Professional Career</div>
                        <div class="grid-info">${career.map(x => `<div class="data-box"><label>${x[0]}</label><span>${x[1]||'---'}</span></div>`).join('')}</div>
                    </div>

                    <div class="data-sect personal-bg">
                        <div class="sect-head personal-head"><i class="fas fa-user-circle"></i> Personal Background</div>
                        <div class="grid-info">${personal.map(x => `<div class="data-box"><label>${x[0]}</label><span>${x[1]||'---'}</span></div>`).join('')}</div>
                    </div>

                    <div class="data-sect identity-bg">
                        <div class="sect-head identity-head"><i class="fas fa-id-card"></i> Identity & Accounts</div>
                        <div class="grid-info">${identity.map(x => `<div class="data-box"><label>${x[0]}</label><span>${x[1]||'---'}</span></div>`).join('')}</div>
                    </div>

                    <div class="data-sect social-bg">
                        <div class="sect-head social-head"><i class="fas fa-address-book"></i> Communication</div>
                        <div class="grid-info">${social.map(x => `<div class="data-box"><label>${x[0]}</label><span>${x[1]||'---'}</span></div>`).join('')}</div>
                    </div>
                </div>`;
            list.appendChild(card);
        });
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderEmployees(masterData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q))));
    }
</script>
</body>
</html>
