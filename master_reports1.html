<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Master Analytics Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-soft: #eef2ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --career: #6366f1;
            --personal: #10b981;
            --identity: #f59e0b;
            --social: #f43f5e;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--bg); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            padding-bottom: 100px;
        }

        /* --- Modern Header --- */
        header {
            width: 100%; padding: 25px 0; 
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white; text-align: center; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
            border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
        }
        header h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

        .container { width: 92%; max-width: 500px; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }

        /* --- Stat Cards --- */
        .total-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .total-card {
            background: var(--card-bg); border-radius: 20px; padding: 15px 5px; text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: var(--shadow);
        }
        .total-card span { display: block; font-size: 9px; font-weight: 800; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.5px; }
        .total-card b { font-size: 22px; display: block; font-weight: 800; }

        /* --- Designation Carousel --- */
        .carousel-wrapper { position: relative; width: 100%; }
        .desig-slider {
            display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth;
            scrollbar-width: none; padding: 10px 5px;
        }
        .desig-slider::-webkit-scrollbar { display: none; }
        .desig-card {
            min-width: 80%; background: var(--card-bg); border-radius: 24px; padding: 20px; 
            border: 1px solid #e2e8f0; box-shadow: var(--shadow);
        }
        .desig-card h3 { margin: 0 0 15px 0; font-size: 14px; font-weight: 800; color: var(--primary); }
        .stats-row { display: flex; justify-content: space-between; gap: 8px; }
        .mini-stat { flex: 1; text-align: center; background: var(--primary-soft); padding: 10px; border-radius: 16px; }
        .mini-stat label { display: block; font-size: 8px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .mini-stat span { font-size: 16px; font-weight: 800; }

        /* --- App-Style Search --- */
        .search-box {
            position: sticky; top: 95px; z-index: 900; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 15px 20px; border: 1px solid white;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }
        .search-box input { border: none; outline: none; width: 100%; font-size: 16px; font-family: inherit; background: transparent; font-weight: 500; }

        /* --- Individual Employee Cards --- */
        .emp-card {
            background: var(--card-bg); border-radius: 28px; padding: 20px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }
        .emp-card.active { border-color: var(--primary); box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.1); transform: translateY(-2px); }

        .card-header { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar {
            width: 52px; height: 52px; background: linear-gradient(135deg, #eef2ff, #e0e7ff); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px; color: var(--primary);
        }
        .name-meta h4 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
        .name-meta p { margin: 3px 0 0 0; font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .chevron { margin-left: auto; color: #cbd5e1; transition: 0.3s; }
        .active .chevron { transform: rotate(180deg); color: var(--primary); }

        /* Expansion Styling */
        .detail-pane { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .active .detail-pane { max-height: 2000px; margin-top: 25px; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .act-btn { padding: 14px; border-radius: 18px; text-decoration: none; text-align: center; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .act-call { background: #dcfce7; color: #15803d; }
        .act-mail { background: #dbeafe; color: #1d4ed8; }
        .act-btn:active { transform: scale(0.96); }

        /* Data Sections */
        .data-sect { border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .career-bg { background: #f5f3ff; }
        .personal-bg { background: #f0fdf4; }
        .identity-bg { background: #fffbeb; }
        .social-bg { background: #fff1f2; }

        .sect-head { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-box { background: rgba(255,255,255,0.6); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.5); }
        .data-box label { display: block; font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .data-box span { font-size: 12px; font-weight: 700; color: var(--text-main); display: block; }

        /* --- Floating Download Button --- */
        .download-fab {
            position: fixed; bottom: 30px; right: 25px; 
            background: var(--primary); color: white; border: none;
            padding: 16px 24px; border-radius: 50px; font-weight: 800; font-size: 14px;
            display: flex; align-items: center; gap: 10px; z-index: 1001;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .download-fab:hover { transform: translateY(-5px); background: #4338ca; }
        .download-fab:active { transform: scale(0.9); }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <span style="font-size:14px; font-weight:800; color:var(--primary)">Initializing Portal...</span>
</div>

<header><h1>HR Master Portal</h1></header>

<div class="container">
    
    <div class="total-grid">
        <div class="total-card"><span>SANCTIONED</span><b id="gtS" style="color:var(--career)">0</b></div>
        <div class="total-card"><span>WORKING</span><b id="gtW" style="color:var(--personal)">0</b></div>
        <div class="total-card"><span>VACANT</span><b id="gtV" style="color:var(--social)">0</b></div>
    </div>

    <div class="carousel-wrapper">
        <div id="desigSlider" class="desig-slider"></div>
    </div>

    <div class="search-box">
        <i class="fas fa-search" style="color: var(--primary)"></i>
        <input type="text" id="searchInput" placeholder="Search by name, post, town..." oninput="handleSearch()">
    </div>

    <div id="employeeList"></div>

</div>

<button class="download-fab" onclick="downloadCSV()">
    <i class="fas fa-cloud-download-alt"></i> Full Download
</button>

<script>
    const CSV_URL = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
    let masterData = [];

    window.onload = () => {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                masterData = res.data;
                calculateAnalytics();
                renderEmployees(masterData);
                document.getElementById('loader').style.display = 'none';
            }
        });
    };

    function calculateAnalytics() {
        const desigMap = {};
        let ts=0, tw=0, tv=0;
        masterData.forEach(r => {
            let d = (r.designation || 'Unknown').trim();
            if (!desigMap[d]) desigMap[d] = {s:0, w:0, v:0};
            let sT = String(r.sanctioned_post||'').toLowerCase();
            let wT = String(r.working_post||'').toLowerCase();
            let vT = String(r.vacant_post||'').toLowerCase();
            if (sT.includes('sanctioned')) { desigMap[d].s++; ts++; }
            if (wT.includes('working')) { desigMap[d].w++; tw++; }
            if (vT.includes('vacant')) { desigMap[d].v++; tv++; }
        });
        document.getElementById('gtS').innerText = ts;
        document.getElementById('gtW').innerText = tw;
        document.getElementById('gtV').innerText = tv;
        const slider = document.getElementById('desigSlider');
        slider.innerHTML = "";
        Object.keys(desigMap).sort().forEach(k => {
            const div = document.createElement('div');
            div.className = 'desig-card';
            div.innerHTML = `<h3>${k}</h3><div class="stats-row"><div class="mini-stat"><label>Sanc</label><span>${desigMap[k].s}</span></div><div class="mini-stat"><label>Work</label><span>${desigMap[k].w}</span></div><div class="mini-stat"><label>Vac</label><span>${desigMap[k].v}</span></div></div>`;
            slider.appendChild(div);
