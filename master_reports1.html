<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Master Analytics Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4338ca;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; padding: 18px 0; background: var(--primary);
            color: white; text-align: center; position: sticky; top: 0; z-index: 1000;
        }

        .container { width: 95%; max-width: 1100px; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }

        /* Summary Tables Styling */
        .summary-card {
            background: white; border-radius: 16px; padding: 20px;
            border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .summary-card h2 { margin-top: 0; font-size: 14px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; }

        .scroll-x { overflow-x: auto; border-radius: 8px; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 700; color: #64748b; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
        .row-total { font-weight: 700; color: var(--primary); }

        /* Search Box */
        .search-area {
            background: white; border-radius: 12px; padding: 12px 18px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
            position: sticky; top: 75px; z-index: 900;
        }
        .search-area input { border: none; outline: none; width: 100%; font-size: 15px; }

        /* Employee Cards */
        .emp-card {
            background: white; border-radius: 16px; padding: 16px;
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .emp-card.active { background: #f0f7ff; border-color: #bfdbfe; }
        
        .card-header { display: flex; align-items: center; gap: 15px; }
        .circle-id { width: 35px; height: 35px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
        .card-titles { flex: 1; }
        .card-titles h3 { margin: 0; font-size: 14px; font-weight: 700; }
        .card-titles p { margin: 2px 0; font-size: 11px; color: #64748b; }

        /* Detailed Grid (Visible on Click) */
        .detail-pane { max-height: 0; overflow: hidden; transition: 0.3s ease-out; }
        .active .detail-pane { max-height: 2000px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .info-item label { display: block; font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .info-item span { font-size: 11px; font-weight: 600; color: #334155; word-break: break-word; }

        #loader { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i></div>

    <header><h1>HR Master Portal</h1></header>

    <div class="container">
        
        <div class="summary-card">
            <h2>Designation Summary</h2>
            <div class="scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th>Designation</th>
                            <th>Sanctioned</th>
                            <th>Working</th>
                            <th>Vacant</th>
                        </tr>
                    </thead>
                    <tbody id="designationSummary"></tbody>
                </table>
            </div>
        </div>

        <div class="summary-card">
            <h2>Pension Abstract</h2>
            <div class="scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th>Pension Type</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody id="pensionSummary"></tbody>
                </table>
            </div>
        </div>

        <div class="search-area">
            <i class="fas fa-search" style="color: #94a3b8"></i>
            <input type="text" id="searchInput" placeholder="Search any employee detail..." oninput="processSearch()">
        </div>

        <div id="cardList" style="display:flex; flex-direction:column; gap:12px; padding-bottom:50px;"></div>

    </div>

    <script>
        const CSV_URL = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
        let masterData = [];

        window.onload = () => {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(res) {
                    masterData = res.data;
                    generateSummaries();
                    renderCards(masterData);
                    document.getElementById('loader').style.display = 'none';
                }
            });
        };

        function getCol(row, key) {
            return row[key] ? row[key].trim() : '---';
        }

        function generateSummaries() {
            // 1. Designation Summary
            const desigMap = {};
            const pensionMap = { "NDCPS": 0, "OPS": 0 };

            masterData.forEach(r => {
                const d = getCol(r, 'designation');
                if(!desigMap[d]) desigMap[d] = { s: 0, w: 0, v: 0 };
                
                // Add numbers (handling potential empty strings as 0)
                desigMap[d].s += parseInt(getCol(r, 'sanctioned_post')) || 0;
                desigMap[d].w += parseInt(getCol(r, 'working_post')) || 0;
                desigMap[d].v += parseInt(getCol(r, 'vacant_post')) || 0;

                // 2. Pension Summary
                const p = getCol(r, 'Pension_type').toUpperCase();
                if(p.includes("NDCPS")) pensionMap["NDCPS"]++;
                else if(p.includes("OPS")) pensionMap["OPS"]++;
            });

            // Render Designation Table
            const dBody = document.getElementById('designationSummary');
            Object.keys(desigMap).forEach(k => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${k}</td><td>${desigMap[k].s}</td><td>${desigMap[k].w}</td><td class="row-total">${desigMap[k].v}</td>`;
                dBody.appendChild(tr);
            });

            // Render Pension Table
            const pBody = document.getElementById('pensionSummary');
            for (let type in pensionMap) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${type}</td><td class="row-total">${pensionMap[type]}</td>`;
                pBody.appendChild(tr);
            }
        }

        function renderCards(data) {
            const list = document.getElementById('cardList');
            list.innerHTML = "";
            const frag = document.createDocumentFragment();

            data.forEach((r, i) => {
                const card = document.createElement('div');
                card.className = 'emp-card';
                card.onclick = function() { this.classList.toggle('active'); };

                // Define every field you want to show in the expanded view
                const fields = [
                    'username','mobile','Date_of_birth','Retirement_date','PIN','E_mail','PAN_No.',
                    'Physically_Disablity','Marital_status','Qualification','Religion','Category','Caste_name',
                    'District','Home_town','Joining_date','Joining_designation','Appointment_type',
                    'Probationary_period_declaration','Probationary_period_declaration_date','Current_designation',
                    'Curent_designation_Date_of_entry','Entry_quota_current_designation','Pension_type','NDCPS_No.',
                    'Working_from_date','Lien_office','group','Counted_posts_within_division','Counted_posts_other_division',
                    'male_or_female'
                ];

                let detailHtml = fields.map(f => `
                    <div class="info-item">
                        <label>${f.replace(/_/g, ' ')}</label>
                        <span>${getCol(r, f)}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="circle-id">${i+1}</div>
                        <div class="card-titles">
                            <h3>${getCol(r, 'name')}</h3>
                            <p>${getCol(r, 'designation')} | ${getCol(r, 'place')}</p>
                        </div>
                        <i class="fas fa-chevron-down" style="color:#cbd5e1; font-size:12px;"></i>
                    </div>
                    <div class="detail-pane">
                        <div class="info-grid">${detailHtml}</div>
                    </div>
                `;
                frag.appendChild(card);
            });
            list.appendChild(frag);
        }

        function processSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(r => 
                Object.values(r).some(v => String(v).toLowerCase().includes(q))
            );
            renderCards(filtered);
        }
    </script>
</body>
</html>
