<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Master Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #4338ca;
            --primary-gradient: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
            --bg: #f4f7fb;
            --card-bg: #ffffff;
            --border: #eef2f6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--bg); color: var(--text-dark);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* --- Header --- */
        header {
            width: 100%; padding: 20px 0; background: var(--primary-gradient);
            color: white; text-align: center; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.2);
        }
        header h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }

        .container { width: 92%; max-width: 600px; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }

        /* --- Section Titles --- */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .section-header h2 { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        /* --- Designation Stats (Horizontal Scroll) --- */
        .stats-scroll {
            display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px 0;
            scrollbar-width: none; /* Firefox */
        }
        .stats-scroll::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

        .stat-card {
            min-width: 160px; background: var(--card-bg); border-radius: 16px; padding: 16px;
            border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; gap: 10px;
        }
        .stat-card h3 { margin: 0; font-size: 12px; font-weight: 700; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: 500; }
        .stat-val { font-weight: 700; }
        .s-color { color: var(--text-dark); }
        .w-color { color: var(--success); }
        .v-color { color: var(--danger); }

        /* --- Pension Abstract --- */
        .pension-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .pension-card {
            background: var(--card-bg); border-radius: 16px; padding: 15px;
            border: 1px solid var(--border); text-align: center;
        }
        .pension-card span { display: block; font-size: 10px; font-weight: 700; color: var(--text-light); margin-bottom: 4px; }
        .pension-card b { font-size: 20px; color: var(--text-dark); }

        /* --- Search Area --- */
        .search-container {
            position: sticky; top: 75px; z-index: 900; background: rgba(244, 247, 251, 0.8);
            backdrop-filter: blur(8px); padding: 5px 0;
        }
        .search-box {
            background: white; border-radius: 14px; padding: 12px 18px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .search-box input { border: none; outline: none; width: 100%; font-size: 15px; font-family: inherit; }

        /* --- Employee Cards --- */
        .card-list { display: flex; flex-direction: column; gap: 12px; }
        .emp-card {
            background: white; border-radius: 18px; padding: 16px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .emp-card.active { border-color: var(--primary); ring: 2px var(--primary); }

        .emp-header { display: flex; align-items: center; gap: 14px; }
        .emp-icon { 
            width: 40px; height: 40px; background: #eef2ff; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; color: var(--primary); font-size: 12px;
        }
        .emp-info h4 { margin: 0; font-size: 14px; font-weight: 700; }
        .emp-info p { margin: 2px 0 0 0; font-size: 11px; color: var(--text-light); font-weight: 500; }

        .detail-pane { max-height: 0; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .active .detail-pane { max-height: 4000px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-box label { display: block; font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; }
        .info-box span { font-size: 11.5px; font-weight: 600; color: var(--text-dark); word-break: break-all; }

        /* --- Loader --- */
        #loader { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <span style="font-size: 14px; font-weight: 600; color: var(--text-light);">Loading Portal...</span>
</div>

<header><h1>Master Employee Portal</h1></header>

<div class="container">
    
    <div class="section-header"><h2>Designation Statistics</h2></div>
    <div class="stats-scroll" id="statsContainer">
        </div>

    <div class="section-header"><h2>Pension Abstract</h2></div>
    <div class="pension-grid">
        <div class="pension-card"><span>NDCPS TYPE</span><b id="ndcpsCount">0</b></div>
        <div class="pension-card"><span>OPS TYPE</span><b id="opsCount">0</b></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color: var(--primary)"></i>
            <input type="text" id="searchInput" placeholder="Search by name, KGID, place..." oninput="filterData()">
        </div>
    </div>

    <div class="section-header"><h2>Employee Directory</h2></div>
    <div id="cardList" class="card-list"></div>

</div>

<script>
    const CSV_URL = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
    let masterData = [];

    window.onload = () => {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                masterData = results.data;
                processAnalytics();
                renderCards(masterData);
                document.getElementById('loader').style.display = 'none';
            }
        });
    };

    function processAnalytics() {
        const desigMap = {};
        const pension = { ndcps: 0, ops: 0 };

        masterData.forEach(row => {
            let d = (row['designation'] || 'Unknown').trim();
            if (!desigMap[d]) desigMap[d] = { s: 0, w: 0, v: 0 };

            // Logic: Count if text exists
            let sTxt = String(row['sanctioned_post'] || '').toLowerCase();
            let wTxt = String(row['working_post'] || '').toLowerCase();
            let vTxt = String(row['vacant_post'] || '').toLowerCase();

            if (sTxt.includes('sanctioned')) desigMap[d].s++;
            if (wTxt.includes('working')) desigMap[d].w++;
            if (vTxt.includes('vacant')) desigMap[d].v++;

            // Pension logic
            let p = String(row['Pension_type'] || '').toUpperCase();
            if (p.includes('NDCPS')) pension.ndcps++;
            else if (p.includes('OPS')) pension.ops++;
        });

        // Render Designation Stats Cards
        const statsContainer = document.getElementById('statsContainer');
        statsContainer.innerHTML = "";
        Object.keys(desigMap).sort().forEach(key => {
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML = `
                <h3>${key}</h3>
                <div class="stat-row"><span class="s-color">Sanctioned</span><span class="stat-val">${desigMap[key].s}</span></div>
                <div class="stat-row"><span class="w-color">Working</span><span class="stat-val">${desigMap[key].w}</span></div>
                <div class="stat-row"><span class="v-color">Vacant</span><span class="stat-val">${desigMap[key].v}</span></div>
            `;
            statsContainer.appendChild(card);
        });

        document.getElementById('ndcpsCount').innerText = pension.ndcps;
        document.getElementById('opsCount').innerText = pension.ops;
    }

    function renderCards(data) {
        const list = document.getElementById('cardList');
        list.innerHTML = "";
        
        const keysToShow = [
            'username','mobile','Date_of_birth','Retirement_date','PIN','E_mail','PAN_No.',
            'Physically_Disablity','Marital_status','Qualification','Religion','Category','Caste_name',
            'District','Home_town','Joining_date','Joining_designation','Appointment_type','Current_designation',
            'Pension_type','NDCPS_No.','Lien_office','male_or_female'
        ];

        data.forEach((row, i) => {
            const card = document.createElement('div');
            card.className = 'emp-card';
            card.onclick = function() { this.classList.toggle('active'); };

            let detailsHtml = keysToShow.map(k => `
                <div class="info-box">
                    <label>${k.replace(/_/g, ' ')}</label>
                    <span>${row[k] || '---'}</span>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="emp-header">
                    <div class="emp-icon">${i + 1}</div>
                    <div class="emp-info">
                        <h4>${row['name'] || 'Employee'}</h4>
                        <p>${row['designation']} • ${row['place']}</p>
                    </div>
                    <i class="fas fa-chevron-down" style="margin-left:auto; color:#cbd5e1; font-size:12px;"></i>
                </div>
                <div class="detail-pane">
                    <div class="info-grid">${detailsHtml}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function filterData() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = masterData.filter(row => 
            Object.values(row).some(v => String(v).toLowerCase().includes(q))
        );
        renderCards(filtered);
    }
</script>

</body>
</html>
