<!DOCTYPE html>
<html>
<head>
    <title>Master Reports Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        :root { 
            --primary: #4b2dd8; 
            --accent: #00c853;
            --bg: #f8f9ff;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER */
        .top-header {
            width: 100%;
            padding: 40px 20px;
            background: var(--primary);
            color: white;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 20px rgba(75, 45, 216, 0.2);
        }

        .top-header h2 { margin: 0; font-size: 22px; font-weight: 600; }
        .top-header p { margin: 8px 0 0; font-size: 13px; opacity: 0.8; }

        /* BUTTON CONTAINER */
        .button-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        /* PREMIUM BUTTON STYLE */
        .action-card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .action-card:active {
            transform: scale(0.96);
            background: #f1f3f6;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .bg-blue { background: linear-gradient(135deg, #6c39ff, #4b2dd8); }
        .bg-green { background: linear-gradient(135deg, #00e676, #00c853); }

        .btn-text { flex: 1; }
        .btn-text h4 { margin: 0; font-size: 16px; color: #2d3436; }
        .btn-text p { margin: 4px 0 0; font-size: 12px; color: #636e72; }

        .chevron { color: #b2bec3; font-size: 20px; font-weight: bold; }

    </style>
</head>
<body>

    <div class="top-header">
        <h2>Master Data Control</h2>
        <p>Manage and export your employee records</p>
    </div>

    <div class="button-wrapper">
        
        <div class="action-card" onclick="openMasterView()">
            <div class="icon-circle bg-blue">🔍</div>
            <div class="btn-text">
                <h4>View Master Data</h4>
                <p>Browse and filter all employee records</p>
            </div>
            <div class="chevron">›</div>
        </div>

        <div class="action-card" onclick="downloadMasterCSV()">
            <div class="icon-circle bg-green">📥</div>
            <div class="btn-text">
                <h4>Download Full CSV</h4>
                <p>Export employee.csv to your device</p>
            </div>
            <div class="chevron">›</div>
        </div>

    </div>

    <script>
        // Navigates to your master report view page
        function openMasterView() {
            window.location.href = "view_master_reports.html?type=all";
        }

        // Direct file download trigger for stability in mobile apps
        function downloadMasterCSV() {
            window.location.href = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";
        }
    </script>

</body>
</html>
