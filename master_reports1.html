<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Reports Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent),
                              radial-gradient(circle at bottom left, #f0fdf4, transparent);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header Section */
        .header {
            width: 100%;
            padding: 50px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
            margin-bottom: 30px;
        }

        .header h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
        .header p { margin-top: 10px; opacity: 0.9; font-weight: 300; }

        /* Dashboard Container */
        .container {
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding-bottom: 50px;
        }

        /* Action Cards */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .actions-grid { grid-template-columns: 1fr; }
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .blue-grad { background: linear-gradient(135deg, #818cf8, #4f46e5); }
        .green-grad { background: linear-gradient(135deg, #4ade80, #16a34a); }

        .card-info h3 { margin: 0; font-size: 18px; color: var(--text-main); }
        .card-info p { margin: 5px 0 0; font-size: 13px; color: var(--text-muted); }

        /* Data Table Section */
        #data-section {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            display: none; /* Hidden until button clicked */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        #search-input {
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            width: 100%;
            max-width: 300px;
            outline: none;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 12px 15px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            border-bottom: 2px solid #edf2f7;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #edf2f7;
            color: var(--text-main);
        }

        tr:hover { background: #f1f5f9; }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Master Data Intelligence</h1>
        <p>Enterprise Resource Planning & Reporting</p>
    </div>

    <div class="container">
        <div class="actions-grid">
            <div class="premium-card" onclick="loadAndDisplayData()">
                <div class="icon-box blue-grad">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>
                <div class="card-info">
                    <h3>View Master Data</h3>
                    <p>Analyze live employee records</p>
                </div>
            </div>

            <div class="premium-card" onclick="downloadCSV()">
                <div class="icon-box green-grad">
                    <i class="fa-solid fa-file-arrow-down"></i>
                </div>
                <div class="card-info">
                    <h3>Download CSV</h3>
                    <p>Export full database (Excel)</p>
                </div>
            </div>
        </div>

        <div id="loader" class="loader"></div>

        <div id="data-section">
            <div class="table-controls">
                <h3 style="margin:0">Live Data Feed</h3>
                <input type="text" id="search-input" placeholder="Search by name, ID or role..." onkeyup="filterTable()">
            </div>
            <div class="table-wrapper">
                <table id="employee-table">
                    <thead><tr id="table-head"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = "https://hescomsalary1-sudo.github.io/salary-data/employee.csv";

        // Function 1: View Data (Parses CSV and builds table)
        function loadAndDisplayData() {
            const loader = document.getElementById('loader');
            const dataSection = document.getElementById('data-section');
            
            loader.style.display = 'block';
            dataSection.style.display = 'none';

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    loader.style.display = 'none';
                    dataSection.style.display = 'block';
                    renderTable(results);
                },
                error: function(err) {
                    alert("Error loading data. Please check your internet connection.");
                    loader.style.display = 'none';
                }
            });
        }

        function renderTable(results) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            // Clear previous data
            head.innerHTML = "";
            body.innerHTML = "";

            // Create Headers
            const headers = Object.keys(results.data[0]);
            headers.forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                head.appendChild(th);
            });

            // Create Rows
            results.data.forEach(row => {
                const tr = document.createElement('tr');
                headers.forEach(h => {
                    const td = document.createElement('td');
                    td.textContent = row[h];
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        // Search Filter Logic
        function filterTable() {
            const input = document.getElementById("search-input");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("employee-table");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let text = tr[i].textContent || tr[i].innerText;
                tr[i].style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        // Function 2: Download CSV
        function downloadCSV() {
            const link = document.createElement('a');
            link.href = csvUrl;
            link.download = 'employee_master_report.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

</body>
</html>
