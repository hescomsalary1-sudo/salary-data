
<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f3f4fa;
}

/* HEADER */

.top{
padding:25px 20px 110px 20px;
background:linear-gradient(135deg,#1a002b,#5e00a3);
color:white;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

.profile{
width:55px;
height:55px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

.user-box{
display:flex;
align-items:center;
gap:12px;
}

.logout{
cursor:pointer;
font-size:22px;
}

/* CONTENT */

.content{
padding:20px;
margin-top:-90px;
padding-bottom:120px;
}

/* SALARY CARD */

.salary-card{
background:linear-gradient(135deg,#4b2dd8,#6c39ff);
color:white;
border-radius:22px;
padding:25px;
text-align:center;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
margin-bottom:25px;
}

.salary-card h3{
margin:0;
font-weight:500;
}

.salary-amount{
font-size:38px;
font-weight:bold;
margin-top:5px;
}

/* MAIN BUTTON GRID */

.grid-main{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:15px;
}

.card{
padding:20px;
border-radius:20px;
color:white;
text-align:center;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.12);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card span{
font-size:28px;
}

.card p{
margin-top:6px;
font-weight:bold;
}

/* BUTTON COLORS */

.accounts{
background:linear-gradient(135deg,#6a5cff,#8f7bff);
}

.salary{
background:linear-gradient(135deg,#ff7a18,#ffb347);
}

.income{
background:linear-gradient(135deg,#00c9a7,#00e0b8);
}

.forms{
background:linear-gradient(135deg,#ff4e8a,#ff7fb0);
}

/* SMALL BUTTONS */

.grid-small{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.small-card{
padding:14px;
border-radius:20px;
color:white;
text-align:center;
cursor:pointer;
box-shadow:0 8px 18px rgba(0,0,0,0.12);
}

.settings{
background:linear-gradient(135deg,#7b2cff,#9b4dff);
}

.about{
background:linear-gradient(135deg,#00a8ff,#6fd3ff);
}

/* NEWS */

.news-box{
margin-top:25px;
padding:22px;
border-radius:20px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.news-box h3{
margin-top:0;
color:#4b2dd8;
}

.news-item{
padding:10px 0;
border-bottom:1px solid #eee;
}

.news-date{
font-size:12px;
color:#777;
margin-bottom:4px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:white;
border-radius:30px;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.footer a{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#5e00a3;
font-size:20px;
}

.footer small{
font-size:12px;
margin-top:3px;
font-weight:600;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:35px;
height:35px;
border:6px solid #ddd;
border-top:6px solid #5e00a3;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="top">

<div class="user-box">

<img src="https://i.imgur.com/6VBx3io.png" class="profile">

<div>
<div>Welcome</div>
<strong id="empName">Loading...</strong>
<div id="empDesg" style="font-size:12px;opacity:0.8;"></div>
</div>

</div>

<div>
<span style="font-size:22px;margin-right:10px;cursor:pointer;" onclick="refreshApp()">🔄</span>
<span class="logout" onclick="logout()">🔓</span>
</div>

</div>

<div id="adminMenu" style="display:none;">
<button onclick="showLoader('admin_bulk_upload.html')">
Bulk Salary Upload
</button>
</div>

<div id="loader">
<div class="spinner"></div>
</div>

<div class="content">

<!-- SALARY CARD -->

<div class="salary-card">
<h3>Current Month Salary</h3>
<div class="salary-amount">₹<span id="netSalary">--</span></div>
Net Pay
</div>

<!-- MAIN BUTTONS -->

<div class="grid-main">

<div class="card accounts" onclick="showLoader('accounts.html')">
<span>👤</span>
<p>My accounts</p>
</div>

<div class="card salary" onclick="showLoader('menu.html')">
<span>💰</span>
<p>Salary</p>
</div>

<div class="card income" onclick="showLoader('page3.html')">
<span>📅</span>
<p>Non-salary income</p>
</div>

<div class="card forms" onclick="showLoader('page4.html')">
<span>📝</span>
<p>Forms & formats</p>
</div>

</div>

<!-- SMALL BUTTONS -->

<div class="grid-small">

<div class="small-card settings" onclick="showLoader('page5.html')">
⚙ Settings
</div>

<div class="small-card about" onclick="showLoader('page2.html')">
ℹ About us
</div>

</div>

<div class="news-box">
<h3>📢 What's New?</h3>
<div id="newsData">Loading updates...</div>
</div>

</div>

<div class="footer">

<a href="home.html">
<div>🏠</div>
<small>Home</small>
</a>

<a href="page1.html">
<div>👤</div>
<small>Profile</small>
</a>

<a href="page2.html">
<div>💰</div>
<small>Salary</small>
</a>

<a href="page3.html">
<div>📅</div>
<small>Attendance</small>
</a>

<a href="page4.html">
<div>⚙</div>
<small>Settings</small>
</a>

</div>

<script>

/* YOUR ORIGINAL JAVASCRIPT REMAINS EXACTLY THE SAME */

function refreshApp(){
document.getElementById("loader").style.display="flex";

if('caches' in window){
caches.keys().then(function(names){
for(let name of names) caches.delete(name);
});
}

setTimeout(function(){
location.reload(true);
},800);
}

let user = localStorage.getItem("currentUser");
let role = localStorage.getItem("role");

if(!user){
window.location.replace("login.html");
}

if(role === "admin"){
document.getElementById("adminMenu").style.display = "block";
}

function showLoader(url){
document.getElementById("loader").style.display="flex";
setTimeout(function(){
window.location = url;
},1000);
}

async function loadNews(){

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/news.csv?v=" + new Date().getTime(),
{
cache:"no-store"
});

let text = await response.text();
let rows = text.split("\n");

let output="";

for(let i=1;i<rows.length;i++){

if(rows[i].trim()==="") continue;

let cols = rows[i].split(",");

if(cols.length<2) continue;

output+=`
<div class="news-item">
<div class="news-date">${cols[0]}</div>
<div>${cols[1]}</div>
</div>
`;

}

if(output===""){
output="No updates available.";
}

document.getElementById("newsData").innerHTML=output;

}catch(error){

document.getElementById("newsData").innerHTML="Unable to load updates.";

}

}

loadNews();

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

async function loadUserProfile(){

let loginUser = localStorage.getItem("currentUser");

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/employee.csv"
);

let text = await response.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let username = cols[0]?.trim();
let name = cols[1]?.trim();
let designation = cols[2]?.trim();

if(username===loginUser){

document.getElementById("empName").innerText=name;
document.getElementById("empDesg").innerText=designation;
return;

}

}

document.getElementById("empName").innerText=loginUser;

}catch(e){

document.getElementById("empName").innerText=loginUser;

}

}

loadUserProfile();

function logout(){

let confirmLogout = confirm("Are you sure you want to logout?");

if(confirmLogout){
localStorage.removeItem("currentUser");
localStorage.removeItem("role");
window.location.href="login.html";
}

}

</script>

</body>
</html>
