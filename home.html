<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:sans-serif;
  margin:0;
  background:#f4f4f9;
}

/* HEADER */

.top{
  position:relative;
  padding:30px 20px 90px 20px;
  background:linear-gradient(135deg,#1a002b,#5e00a3);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom-left-radius:60px;
  border-bottom-right-radius:60px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.profile{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid white;
  object-fit:cover;
  margin-left:10px;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.user-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-box strong{
  font-size:18px;
}

.logout{
  cursor:pointer;
  font-size:22px;
}

.logout:hover{
  opacity:0.7;
}

/* CONTENT */

.content{
  padding:20px;
  margin-top:-40px;
  padding-bottom:90px;
}

/* GRID BUTTONS */

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.card{
  background:white;
  padding:18px 10px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.25s;
  min-height:95px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.card span{
  font-size:26px;
  display:block;
}

.card p{
  margin-top:8px;
  color:#5e00a3;
  font-weight:600;
  font-size:14px;
}

/* ADMIN MENU */

#adminMenu{
  text-align:center;
  margin-top:10px;
}

#adminMenu button{
  padding:10px 22px;
  border:none;
  background:#ff4081;
  color:white;
  border-radius:25px;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

/* NEWS BOX */

.news-box{
  margin-top:25px;
  padding:22px;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 28px rgba(0,0,0,0.08);
  border-left:6px solid #5e00a3;
}

.news-box h3{
  margin-top:0;
  color:#4b0082;
  font-size:18px;
}

.news-item{
  padding:12px;
  margin-top:10px;
  background:#f8f8ff;
  border-radius:12px;
  font-size:14px;
}

.news-date{
  font-size:12px;
  color:#666;
  margin-bottom:4px;
  font-weight:600;
}

/* FOOTER */

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ffffff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -4px 14px rgba(0,0,0,0.12);
}

.footer a{
  text-decoration:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#5e00a3;
  font-size:20px;
}

.footer small{
  font-size:12px;
  margin-top:3px;
  font-weight:600;
}

/* LOADER */

#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner{
  width:35px;
  height:35px;
  border:6px solid #ddd;
  border-top:6px solid #5e00a3;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* DARK MODE */

.dark-mode{
  background:#121212;
  color:white;
}

.dark-mode .card{
  background:#1f1f1f;
  color:white;
}

.dark-mode .footer{
  background:#1a1a1a;
}

.dark-mode .footer a{
  color:white;
}

.dark-mode select,
.dark-mode input{
  background:#333;
  color:white;
  border:1px solid #555;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="top">

<div class="user-box">
<div>
<div>Welcome</div>
<strong id="empName">Loading...</strong>
<div id="empDesg" style="font-size:12px;opacity:0.8;"></div>
</div>

<img src="https://i.imgur.com/6VBx3io.png" class="profile">
</div>

<div>
<span style="font-size:22px;cursor:pointer;margin-right:10px;" onclick="refreshApp()">🔄</span>
<span class="logout" onclick="logout()">🔓</span>
</div>

</div>

<!-- ADMIN MENU -->
<div id="adminMenu" style="display:none;">
<button onclick="showLoader('admin_bulk_upload.html')">
Bulk Salary Upload
</button>
</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="grid">

<div class="card" onclick="showLoader('accounts.html')">
<span>👤</span>
<p>My accounts</p>
</div>

<div class="card" onclick="showLoader('menu.html')">
<span>💰</span>
<p>Salary</p>
</div>

<div class="card" onclick="showLoader('page3.html')">
<span>📅</span>
<p>Non-salary income</p>
</div>

<div class="card" onclick="showLoader('page4.html')">
<span>📝</span>
<p>Forms and formats</p>
</div>

<div class="card" onclick="showLoader('page5.html')">
<span>⚙</span>
<p>Settings</p>
</div>

<div class="card" onclick="showLoader('page2.html')">
<span>ℹ️</span>
<p>About us</p>
</div>

</div>

<div class="news-box">
<h3>📢 What's New?</h3>
<div id="newsData">Loading updates...</div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">

<a href="home.html">
<div>🏠</div>
<small>Home</small>
</a>

<a href="page1.html">
<div>👤</div>
<small>Profile</small>
</a>

<a href="page2.html">
<div>💰</div>
<small>Salary</small>
</a>

<a href="page3.html">
<div>📅</div>
<small>Attendance</small>
</a>

<a href="page4.html">
<div>⚙</div>
<small>Settings</small>
</a>

</div>

<script>

function refreshApp(){
document.getElementById("loader").style.display="flex";

if('caches' in window){
caches.keys().then(function(names){
for(let name of names) caches.delete(name);
});
}

setTimeout(function(){
location.reload(true);
},800);
}

let user = localStorage.getItem("currentUser");
let role = localStorage.getItem("role");

if(!user){
window.location.replace("login.html");
}

if(role === "admin"){
document.getElementById("adminMenu").style.display = "block";
}

function showLoader(url){
document.getElementById("loader").style.display="flex";
setTimeout(function(){
window.location = url;
},1000);
}

async function loadNews(){

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/news.csv?v=" + new Date().getTime(),
{
    cache: "no-store"
});

let text = await response.text();
let rows = text.split("\n");

let output = "";

for(let i=1;i<rows.length;i++){

if(rows[i].trim()==="") continue;

let cols = rows[i].split(",");

if(cols.length<2) continue;

output += `
<div class="news-item">
<div class="news-date">${cols[0]}</div>
<div>${cols[1]}</div>
</div>
`;
}

if(output===""){
output="No updates available.";
}

document.getElementById("newsData").innerHTML=output;

}catch(error){

document.getElementById("newsData").innerHTML="Unable to load updates.";

}

}

loadNews();

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}

async function loadUserProfile(){

let loginUser = localStorage.getItem("currentUser");

try{

let response = await fetch(
"https://hescomsalary1-sudo.github.io/salary-data/employee.csv"
);

let text = await response.text();
let rows = text.trim().split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let username = cols[0]?.trim();
let name = cols[1]?.trim();
let designation = cols[2]?.trim();

if(username===loginUser){

document.getElementById("empName").innerText=name;
document.getElementById("empDesg").innerText=designation;
return;

}

}

document.getElementById("empName").innerText=loginUser;

}catch(e){

document.getElementById("empName").innerText=loginUser;

}

}

loadUserProfile();

function logout(){

let confirmLogout = confirm("Are you sure you want to logout?");

if(confirmLogout){
localStorage.removeItem("currentUser");
localStorage.removeItem("role");
window.location.href="login.html";
}

}

</script>

</body>
</html>
