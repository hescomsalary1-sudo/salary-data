<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f4f4f9;
}

/* HEADER */

.top{
position:relative;
padding:30px 20px 80px 20px;
background:linear-gradient(135deg,#1a002b,#5e00a3);
color:white;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

.user-box{
display:flex;
align-items:center;
justify-content:space-between;
}

.user-info{
max-width:70%;
}

.user-info strong{
font-size:20px;
display:block;
margin-top:5px;
}

#empDesg{
font-size:13px;
opacity:0.85;
}

.profile{
width:60px;
height:60px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* HEADER ACTIONS */

.header-icons{
position:absolute;
right:20px;
top:20px;
}

.header-icons span{
font-size:22px;
margin-left:10px;
cursor:pointer;
}

/* CONTENT */

.content{
padding:20px;
margin-top:-50px;
padding-bottom:100px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.card{
background:white;
padding:18px;
border-radius:18px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card span{
font-size:26px;
display:block;
}

.card p{
margin-top:8px;
color:#5e00a3;
font-weight:600;
font-size:14px;
}

/* ADMIN BUTTON */

#adminMenu{
text-align:center;
margin-top:10px;
}

#adminMenu button{
padding:10px 20px;
border:none;
background:#ff4081;
color:white;
border-radius:25px;
cursor:pointer;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* NEWS BOX */

.news-box{
margin-top:25px;
padding:20px;
border-radius:20px;
background:white;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.news-box h3{
margin-top:0;
color:#5e00a3;
}

.news-item{
padding:12px;
margin-top:10px;
border-radius:12px;
background:#f8f8ff;
}

.news-date{
font-size:12px;
color:#777;
margin-bottom:4px;
font-weight:600;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 12px rgba(0,0,0,0.1);
}

.footer a{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#5e00a3;
font-size:20px;
}

.footer small{
font-size:12px;
margin-top:3px;
font-weight:600;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:35px;
height:35px;
border:6px solid #ddd;
border-top:6px solid #5e00a3;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

</div>

</div>

<div id="adminMenu" style="display:none;">

Bulk Salary Upload

<div class="card" onclick="showLoader('accounts.html')">

</div>

</div>

</div>

</div>

<p>About Us</p>
</div>

</div>

<div class="news-box">
<h3>📢 What's New?</h3>

</div>

</div>

<div class="footer">

<a href="home.html">
<div>🏠</div>
<small>Home</small>
</a>

<div>⚙</div>
<small>Settings</small>
</a>

</div>

</body>
</html>
