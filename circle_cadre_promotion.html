<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Cadre Promotion</title>

    <style>
        :root {
            --primary: #2563eb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #ffffff, #f1f5f9);
            color: #1e293b;
        }

        /* BACK BUTTON */
        .top-nav {
            padding: 15px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }

        .icon-box {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h3 {
            font-size: 12px;
            margin: 5px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        /* BUTTON */
        .download-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .download-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader {
            text-align: center;
            padding: 30px;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="top-nav">
    <div class="back-btn" onclick="goBack()">←</div>
</div>

<h2 style="text-align:center;">📄 Circle Cadre Promotion</h2>

<div id="loader" class="loader">Loading files...</div>
<div class="grid" id="grid"></div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxmZ9bNMa-_YUz5xo8f7UIbS2pwrv2UKfDjQOtPOKet_OrPiK0Uxxpr3fO-xRRJ_8q4/exec";

    /* BACK */
    function goBack(){
        if(history.length > 1) history.back();
        else location.href = "promotions.html";
    }

    /* DOWNLOAD LOGIC */
    function download(btn, fileId, fileName) {
        const spin = btn.querySelector(".spinner");
        const text = btn.querySelector(".text");

        btn.disabled = true;
        spin.style.display = "block";
        text.innerText = "WAIT...";

        // Construct Google Drive Direct Download URL
        const url = `https://drive.google.com/uc?export=download&id=${fileId}`;

        // Create a temporary hidden link to force PDF extension
        const link = document.createElement('a');
        link.href = url;
        
        // Ensure the filename ends with .pdf
        const safeName = fileName.toLowerCase().endsWith('.pdf') ? fileName : fileName + '.pdf';
        link.setAttribute('download', safeName);
        link.style.display = 'none';
        
        document.body.appendChild(link);

        setTimeout(() => {
            link.click(); // Trigger the download
            document.body.removeChild(link); // Clean up

            // Reset button state after a delay
            setTimeout(() => {
                btn.disabled = false;
                spin.style.display = "none";
                text.innerText = "DOWNLOAD";
            }, 4000);
        }, 800);
    }

    /* LOAD FILES FROM API */
    fetch(API)
    .then(res => res.json())
    .then(data => {
        document.getElementById("loader").style.display = "none";
        const grid = document.getElementById("grid");

        data.forEach(file => {
            // Extract the File ID from the URL provided by the API
            const idMatch = file.url.match(/[-\w]{25,}/);
            const fileId = idMatch ? idMatch[0] : "";

            const card = document.createElement("div");
            card.className = "card";

            // Escaping single quotes in filenames to prevent JS errors
            const escapedName = file.name.replace(/'/g, "\\'");

            card.innerHTML = `
                <div class="icon-box">📄</div>
                <h3 title="${file.name}">${file.name}</h3>
                <button class="download-btn" onclick="download(this, '${fileId}', '${escapedName}')">
                    <span class="spinner"></span>
                    <span class="text">DOWNLOAD</span>
                </button>
            `;

            grid.appendChild(card);
        });
    })
    .catch(err => {
        console.error(err);
        document.getElementById("loader").innerText = "Error loading data. Please check connection.";
    });
</script>

</body>
</html>
