<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Cadre Promotion</title>

<style>
:root { --accent:#6366f1; }

body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:radial-gradient(circle at top,#0f172a,#020617);
    color:#fff;
}

.top-nav {
    display:flex;
    padding:15px;
    background:rgba(255,255,255,0.05);
}

.back-btn {
    width:40px;height:40px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
}

h1 { text-align:center; }

.container { padding:15px; }

.file-card {
    background:rgba(255,255,255,0.06);
    margin:10px 0;
    padding:15px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.download-btn {
    background:var(--accent);
    border:none;
    padding:8px 14px;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
}

/* Loader */
.loader {
    position:fixed;
    width:100%;
    height:100%;
    background:#020617;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.orbit {
    width:60px;height:60px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.1);
    position:relative;
}

.orbit::before {
    content:"";
    position:absolute;
    width:10px;height:10px;
    background:#6366f1;
    border-radius:50%;
    top:-5px;left:50%;
    transform:translateX(-50%);
    animation:spin 1s linear infinite;
}

@keyframes spin {
    0% { transform:rotate(0deg) translateX(25px) rotate(0deg);}
    100% { transform:rotate(360deg) translateX(25px) rotate(-360deg);}
}

.no-data {
    text-align:center;
    margin-top:40px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="loader" id="loader">
    <div class="orbit"></div>
</div>

<div class="top-nav">
    <div class="back-btn" onclick="goBack()">←</div>
</div>

<h1>📄 Circle Cadre Promotion</h1>

<div class="container" id="fileList">
    <div class="no-data">Loading files...</div>
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxmZ9bNMa-_YUz5xo8f7UIbS2pwrv2UKfDjQOtPOKet_OrPiK0Uxxpr3fO-xRRJ_8q4/exec";

function goBack(){
    if(history.length>1){ history.back(); }
    else{ location.href="promotions.html"; }
}

/* FINAL DOWNLOAD FIX */
function downloadFile(url, name){
    const loader = document.getElementById("loader");
    loader.style.display="flex";

    // Convert to direct file URL (important)
    let fileId = url.match(/[-\w]{25,}/);
    if(fileId) fileId = fileId[0];

    const directUrl = "https://drive.google.com/uc?export=download&id=" + fileId;

    // force filename
    let fileName = name.endsWith(".pdf") ? name : name + ".pdf";

    const a = document.createElement("a");
    a.href = directUrl;
    a.setAttribute("download", fileName);
    document.body.appendChild(a);
    a.click();
    a.remove();

    setTimeout(()=>{
        loader.style.display="none";
    },1000);
}

/* FETCH FILES */
fetch(apiURL)
.then(res=>res.json())
.then(data=>{
    const container=document.getElementById("fileList");
    container.innerHTML="";

    if(!data || data.length===0){
        container.innerHTML="<div class='no-data'>No records found</div>";
        return;
    }

    data.forEach(file=>{
        const card=document.createElement("div");
        card.className="file-card";

        card.innerHTML=`
            <div>${file.name}</div>
            <button class="download-btn"
            onclick="downloadFile('${file.url}','${file.name}')">
            Download
            </button>
        `;

        container.appendChild(card);
    });
})
.catch(()=>{
    document.getElementById("fileList").innerHTML =
    "<div class='no-data'>Error loading files</div>";
});
</script>

</body>
</html>
