<!DOCTYPE html>
<html>
<head>
<title>Circle cadre promotion orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary-color: #4b2dd8;
  --text-main: #2d3436;
  --text-muted: #636e72;
}

body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
  color: var(--text-main);
  overflow: hidden;
}

/* HEADER */
.top {
  padding: 25px 15px 20px;
  background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
  color: var(--primary-color);
  display: flex;
  align-items: center;
  gap: 12px;
  border-radius: 0 0 30px 30px;
  box-shadow: 0 10px 30px rgba(75, 45, 216, 0.05);
  width: 100%;
  box-sizing: border-box;
}

.back-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; border-radius: 12px;
  color: var(--text-main);
  transition: 0.2s;
}

.back-btn:active { background: rgba(0,0,0,0.05); transform: scale(0.9); }

.top .icon {
  width: 40px; height: 40px;
  background: var(--primary-color); color: white;
  border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 20px;
}

.top h2 { margin: 0; font-size: 18px; font-weight: 700; flex-grow: 1; }

/* EMPTY STATE AREA */
.container {
  flex-grow: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.no-data-card {
  text-align: center;
  background: rgba(255, 255, 255, 0.7);
  padding: 40px 30px;
  border-radius: 30px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
  
  /* Smooth Opening Animation */
  opacity: 0;
  transform: translateY(20px);
  animation: smoothOpen 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes smoothOpen {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.no-data-card .emoji {
  font-size: 60px;
  display: block;
  margin-bottom: 15px;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
}

.no-data-card h3 {
  margin: 0;
  font-size: 22px;
  color: var(--text-main);
}

.no-data-card p {
  margin: 10px 0 0;
  color: var(--text-muted);
  font-size: 14px;
}

</style>
</head>

<body>

<div class="top">
  <div class="back-btn" onclick="history.back()">❮</div>
  <div class="icon">📄</div>
  <h2>Promotion Orders</h2>
</div>

<div class="container">
  <div class="no-data-card">
    <span class="emoji">📂</span>
    <h3>No Data Found</h3>
    <p>There are no promotion orders available at the moment. Please check back later.</p>
  </div>
</div>
<script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
  window.location.replace("promotions.html");
};
</script>
</body>
</html>
