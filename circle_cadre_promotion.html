<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direct Download PDF</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f7f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }
    .card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
    }
    .download-btn {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        margin-top: 10px;
    }
    .download-btn:hover { background-color: #1d4ed8; }
</style>
</head>
<body>

<h2>📄 Circle Promotion Files</h2>

<div class="grid">
    <!-- Button 1 -->
    <div class="card">
        <div>Promotion List 1</div>
        <button class="download-btn" onclick="startDownload('https://example.com/file1.pdf', 'List_1.pdf')">DOWNLOAD</button>
    </div>

    <!-- Button 2 -->
    <div class="card">
        <div>Promotion List 2</div>
        <button class="download-btn" onclick="startDownload('https://example.com/file2.pdf', 'List_2.pdf')">DOWNLOAD</button>
    </div>

    <!-- Button 3 -->
    <div class="card">
        <div>Promotion List 3</div>
        <button class="download-btn" onclick="startDownload('', '')">DOWNLOAD</button>
    </div>

    <!-- Button 4 -->
    <div class="card">
        <div>Promotion List 4</div>
        <button class="download-btn" onclick="startDownload('', '')">DOWNLOAD</button>
    </div>

    <!-- Button 5 -->
    <div class="card">
        <div>Promotion List 5</div>
        <button class="download-btn" onclick="startDownload('', '')">DOWNLOAD</button>
    </div>

    <!-- Button 6 -->
    <div class="card">
        <div>Promotion List 6</div>
        <button class="download-btn" onclick="startDownload('', '')">DOWNLOAD</button>
    </div>
</div>

<script>
function startDownload(url, filename) {
    // 1. Check if the link is empty
    if (!url || url === "") {
        alert("No data found for this file.");
        return;
    }

    // 2. Create a hidden anchor element
    const link = document.createElement('a');
    link.href = url;
    
    // 3. This 'download' attribute forces the browser to save it as a PDF
    // It also lets you set the filename manually
    link.setAttribute('download', filename || 'document.pdf');
    
    // 4. Append to body, click, and remove
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
