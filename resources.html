<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:75px;
}

.top{
padding:25px 20px 5px 20px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}
/* CONTAINER */
.container{
padding:15px;
}

/* CARD ITEM */
.item{
display:flex;
align-items:center;
gap:15px;
background:white;
border-radius:20px;
padding:16px;
margin-bottom:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
position:relative;
}

/* HOVER EFFECT */
.item:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* ICON */
.item img{
width:45px;
height:45px;
}

/* TEXT */
.text{
flex:1;
}

.text h4{
margin:0;
font-size:15px;
color:#222;
}

.text p{
margin:4px 0 0;
font-size:12px;
color:#777;
}

/* ARROW */
.arrow{
font-size:18px;
color:#bbb;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

/* SKELETON */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:65px;
border-radius:14px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

  .navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:68px;
background:#ffffff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e5e7eb;
box-shadow:0 -3px 12px rgba(0,0,0,0.06);
z-index:1000;
}

.nav-item{
flex:1;
text-align:center;
cursor:pointer;
padding-top:6px;
}

.nav-icon{
font-size:22px;
color:#9ca3af;
}

.nav-item.active .nav-icon{
color:#2400b7;
}
</style>
</head>

<body>

<div class="top">
<h2>📚 Resources</h2>
</div>

<div class="container">

<!-- OLD RECORDS -->
<div class="item" onclick="openPage('resource_view.html')">
<img src="https://cdn-icons-png.flaticon.com/512/2920/2920222.png">
<div class="text">
<h4>Old Records</h4>
<p>Attendance & Leave history</p>
</div>
<div class="arrow">›</div>
</div>

<!-- SENIORITY -->
<div class="item" onclick="openPage('senioity.html')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<div class="text">
<h4>Seniority</h4>
<p>Divisional cadre details</p>
</div>
<div class="arrow">›</div>
</div>

<!-- PROMOTIONS -->
<div class="item" onclick="openPage('promotions.html')">
<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">
<div class="text">
<h4>Promotions</h4>
<p>Promotion updates & history</p>
</div>
<div class="arrow">›</div>
</div>

<!-- SITE MAP -->
<div class="item" onclick="openPage('sitemap.html')">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<div class="text">
<h4>Site Map</h4>
<p>Explore all sections</p>
</div>
<div class="arrow">›</div>
</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

let isLoading = false;

function openPage(url){

if(isLoading) return;
isLoading = true;

// show loader
document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

// navigate
setTimeout(()=>{
window.location = url;
}, 700);

}

</script>
  <script>
function goTab(index, url){

document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

setTimeout(function(){
window.location = url;
}, 800);

}
 </script>   
<script>


// function for active tab
function setActiveTab(){

  let page = location.pathname.split("/").pop();

  let items = document.querySelectorAll(".nav-item");

  items.forEach(item => {

    let onclick = item.getAttribute("onclick");

    if(onclick && onclick.includes(page)){
      item.classList.add("active");
    }else{
      item.classList.remove("active");
    }

  });

}
</script>
<div class="navbar pos0" id="navbar">

<div class="nav-item" onclick="goTab(0,'home.html')">
<div class="nav-icon">🏠</div>
<span>Home</span>
</div>

<div class="nav-item" onclick="goTab(1,'forum.html')">
<div class="nav-icon">💬</div>
<span>Forum</span>
</div>

<div class="nav-item" onclick="goTab(2,'employee_info.html')">
<div class="nav-icon">👤</div>
<span>Employee</span>
</div>

<div class="nav-item" onclick="goTab(3,'resources.html')">
<div class="nav-icon">📂</div>
<span>Resources</span>
</div>

</div>
</body>
</html>
