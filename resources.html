<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
padding-bottom:75px;
}

.top{
padding:25px 20px 5px 20px;
background: linear-gradient(135deg, #f7f8fc, #edf5ff);
color:#2400b7;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}
/* CONTAINER */
.container{
padding:15px;
}

/* CARD ITEM */
.item{
display:flex;
align-items:center;
gap:15px;
background:white;
border-radius:20px;
padding:16px;
margin-bottom:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
position:relative;
}

/* HOVER EFFECT */
.item:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* ICON */
.item img{
width:45px;
height:45px;
}

/* TEXT */
.text{
flex:1;
}

.text h4{
margin:0;
font-size:15px;
color:#222;
}

.text p{
margin:4px 0 0;
font-size:12px;
color:#777;
}

/* ARROW */
.arrow{
font-size:18px;
color:#bbb;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:calc(100vh - 68px);
background:#f3f4fa;
display:none;
flex-direction:column;
padding:20px;
gap:15px;
z-index:500; /* 🔥 BELOW navbar */
overflow:hidden;
}


/* SKELETON */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:65px;
border-radius:14px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #e5e7eb;
box-shadow:0 -3px 12px rgba(0,0,0,0.06);
z-index:1000;
padding:0 5px;
}

/* Equal spacing */

.nav-item{
flex:1;
text-align:center;
cursor:pointer;
position:relative;
padding-top:6px;
transition:0.25s;
}


/* Normal icons */
.nav-icon{
font-size:22px;
color:#9ca3af;
}

.nav-item span{
display:block;
font-size:11px;
color:#9ca3af;
}

/* ⭐ CENTER SPECIAL BUTTON */
.center-item{
display:flex;
justify-content:center;
align-items:center;
}

/* Animated button */
/* CENTER WRAPPER */
.center-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  transform:translateY(-18px);
}

/* NEW PREMIUM BUTTON */
.center-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  animation:float 2s ease-in-out infinite;
}

/* FLOAT EFFECT */
@keyframes float{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}

/* TEXT BELOW BUTTON */
.center-text{
  font-size:11px;
  margin-top:4px;
  color:#ff3d3d;
  font-weight:600;
}

/* 🔥 Animation like GIF */
@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(59,30,255,0.5);
}
70%{
transform:scale(1.1);
box-shadow:0 0 0 12px rgba(59,30,255,0);
}
100%{
transform:scale(1);
}
}

/* Click effect */
.center-btn:active{
transform:scale(0.9);
}

  /* ACTIVE STYLE */
.nav-item.active .nav-icon{
  color:#2400b7;
  transform:scale(0.92);
}

.nav-item.active span{
  color:#2400b7;
  font-weight:600;
}

/* FIXED INDICATOR */
.nav-item.active::before{
content:"";
position:absolute;
top:0;
left:20%;
width:60%;
height:4px;
border-radius:10px;
background:linear-gradient(135deg,#2400b7,#3b1eff);
}
</style>
</head>

<body>

<div class="top">
<h2>📚 Resources</h2>
</div>

<div class="container">

<!-- OLD RECORDS -->
<div class="item" onclick="openPage('resource_view.html')">

</div>

<!-- SENIORITY -->

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<div class="text">

</div>

</div>

<!-- PROMOTIONS -->
<div class="item" onclick="openPage('promotions.html')">
<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">
<div class="text">

<div class="arrow">›</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<script>

let isLoading = false;

function openPage(url){

if(isLoading) return;
isLoading = true;

// show loader
document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

// navigate
setTimeout(()=>{
window.location = url;
}, 700);

}

</script>
  <script>
function goTab(index, url){

  // ✅ mark navigation as NAV click
  sessionStorage.setItem("navClick", "true");

  document.getElementById("loader").style.display = "flex";
  document.body.style.overflow = "hidden";

  setTimeout(function(){
    window.location.replace(url); // already good
  }, 700);

}
 </script>   
<script>
window.addEventListener("load", function(){

  let page = location.pathname.split("/").pop();

  let items = document.querySelectorAll(".nav-item");

  items.forEach(item => {
    let target = item.getAttribute("data-page");

    if(target === page){
      item.classList.add("active");
    }
  });

});
</script>

  <script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
  window.location.replace("home.html");
};
</script>
<div class="navbar" id="navbar">

<script>
(function () {

  const currentPage = location.pathname.split("/").pop();

  const navPages = [
    "home.html",
    "forum.html",
    "info.html",
    "employee_info.html",
    "resources.html"
  ];

  if (navPages.includes(currentPage)) {

    history.pushState(null, "", location.href);

    window.onpopstate = function () {
      window.location.replace("home.html");
    };

  }

})();
</script>
<script>
(function () {

  let isNavClick = sessionStorage.getItem("navClick");

  if(isNavClick === "true"){

    // 🔥 CLEAR HISTORY EFFECT
    history.pushState(null, "", location.href);

    window.onpopstate = function () {
      window.location.replace("home.html");
    };

    // remove flag
    sessionStorage.removeItem("navClick");
  }

})();
</script>
</body>
