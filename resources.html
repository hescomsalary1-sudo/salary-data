<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
margin:0;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
padding-bottom:75px;
}

/* PREMIUM HEADER SAME AS HOME */
.top{
padding:25px 20px 20px 20px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:#2400b7;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

/* LEFT BOX */
.user-box{
display:flex;
align-items:center;
gap:12px;
}
/* CONTAINER */
.container{
padding:15px;
}
    /* CONTAINER */
.container {
    padding: 15px;
    animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
/* MENU BUTTON */
.menu-btn{
width:42px;
height:42px;
border-radius:10px;
background:#2400b7;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.menu-btn:active{
transform:scale(0.9);
}

/* RIGHT ICONS */
.logout{
cursor:pointer;
font-size:22px;
}
/* CARD ITEM */
.item{
display:flex;
align-items:center;
gap:15px;
background:white;
border-radius:20px;
padding:16px;
margin-bottom:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
position:relative;
}

/* HOVER EFFECT */
.item:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* ICON */
.item img{
width:45px;
height:45px;
}

/* TEXT */
.text{
flex:1;
}

.text h4{
margin:0;
font-size:15px;
color:#222;
}

.text p{
margin:4px 0 0;
font-size:12px;
color:#777;
}

/* ARROW */
.arrow{
font-size:18px;
color:#bbb;
}

/* LOADER BELOW HEADER */
#loader {
    position: fixed;
    top: 85px;  /* Below Fixed Header */
    bottom: 70px; /* Above Fixed Footer */
    left: 0;
    width: 100%;
    background: rgba(243, 244, 250, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 900;
}

/* FLUID ORBIT DESIGN */
.fluid-loader {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.orbit {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #2400b7;
    border-bottom-color: #00c9a7;
    animation: rotate-orbit 1.5s linear infinite;
}

.orbit:nth-child(2) {
    width: 70%;
    height: 70%;
    border-top-color: #6a5cff;
    border-bottom-color: #ff4e8a;
    animation-duration: 1s;
    animation-direction: reverse;
}

.orbit:nth-child(3) {
    width: 40%;
    height: 40%;
    border-top-color: #00e0b8;
    border-bottom-color: #2400b7;
    animation-duration: 2s;
}

.core {
    width: 15px;
    height: 15px;
    background: #2400b7;
    border-radius: 50%;
    box-shadow: 0 0 15px #2400b7, 0 0 30px #00c9a7;
    animation: pulse-core 1.5s ease-in-out infinite;
}

/* TEXT STYLE */
.loader-text {
    margin-top: 30px;
    font-weight: 700;
    color: #2400b7;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
}

/* ANIMATIONS */
@keyframes rotate-orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes pulse-core {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.3); opacity: 1; }
}

/* SKELETON */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:65px;
border-radius:14px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #e5e7eb;
box-shadow:0 -3px 12px rgba(0,0,0,0.06);
z-index:1000;
padding:0 5px;
}

/* Equal spacing */

.nav-item{
flex:1;
text-align:center;
cursor:pointer;
position:relative;
padding-top:6px;
transition:0.25s;
}


/* Normal icons */
.nav-icon{
font-size:22px;
color:#9ca3af;
}

.nav-item span{
display:block;
font-size:11px;
color:#9ca3af;
}

/* ⭐ CENTER SPECIAL BUTTON */
.center-item{
display:flex;
justify-content:center;
align-items:center;
}

/* Animated button */
/* CENTER WRAPPER */
.center-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  transform:translateY(-18px);
}

/* NEW PREMIUM BUTTON */
.center-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  animation:float 2s ease-in-out infinite;
}

/* FLOAT EFFECT */
@keyframes float{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}

/* TEXT BELOW BUTTON */
.center-text{
  font-size:11px;
  margin-top:4px;
  color:#ff3d3d;
  font-weight:600;
}

/* 🔥 Animation like GIF */
@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(59,30,255,0.5);
}
70%{
transform:scale(1.1);
box-shadow:0 0 0 12px rgba(59,30,255,0);
}
100%{
transform:scale(1);
}
}

/* Click effect */
.center-btn:active{
transform:scale(0.9);
}

  /* ACTIVE STYLE */
.nav-item.active .nav-icon{
  color:#2400b7;
  transform:scale(0.92);
}

.nav-item.active span{
  color:#2400b7;
  font-weight:600;
}

/* FIXED INDICATOR */
.nav-item.active::before{
content:"";
position:absolute;
top:0;
left:20%;
width:60%;
height:4px;
border-radius:10px;
background:linear-gradient(135deg,#2400b7,#3b1eff);
}
</style>
</head>

<script>

let isLoading = false;

function openPage(url){

document.body.style.overflow = "hidden";

// navigate
setTimeout(()=>{
window.location = url;
}, 700);

}

</script>
  <script>
function goTab(index, url){

  // ✅ mark navigation as NAV click
  sessionStorage.setItem("navClick", "true");

  document.getElementById("loader").style.display = "flex";
  document.body.style.overflow = "hidden";

  setTimeout(function(){
    window.location.replace(url); // already good
  }, 700);

}
 </script>   
<script>
window.addEventListener("load", function(){

  let page = location.pathname.split("/").pop();

  let items = document.querySelectorAll(".nav-item");

  items.forEach(item => {
    let target = item.getAttribute("data-page");

    if(target === page){
      item.classList.add("active");
    }
  });

});
</script>

<script>
(function () {

  const currentPage = location.pathname.split("/").pop();

  const navPages = [
    "home.html",
    "forum.html",
    "info.html",
    "employee_info.html",
    "resources.html"
  ];

  if (navPages.includes(currentPage)) {

    history.pushState(null, "", location.href);

    window.onpopstate = function () {
      window.location.replace("home.html");
    };

  }

})();
</script>
<script>
(function () {

  let isNavClick = sessionStorage.getItem("navClick");

  if(isNavClick === "true"){

    // 🔥 CLEAR HISTORY EFFECT
    history.pushState(null, "", location.href);

    window.onpopstate = function () {
      window.location.replace("home.html");
    };

    // remove flag
    sessionStorage.removeItem("navClick");
  }

})();
