<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Service Records</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            padding-bottom: 40px;
            background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: #f1f5f9;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header h2 { font-size: 18px; margin: 0; font-weight: 700; }

        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* SECTION STYLING */
        .section-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 12px 5px;
            display: block;
        }

        .details-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .detail-row:last-child { border-bottom: none; }

        .label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            text-align: right;
            max-width: 60%;
        }

        /* HIGHLIGHT FOR DATES */
        .date-badge {
            background: #eff6ff;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        /* LOADING OVERLAY */
        #loading {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p style="color:var(--text-muted); font-size:14px; margin-top:10px;">Loading Service Records...</p>
    </div>

    <div class="header">
        <button class="back-btn" onclick="history.back()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h2>Official Details</h2>
    </div>

    <div class="container" id="detailsContainer">
        <span class="section-title">Personal Identity</span>
        <div class="details-card">
            <div class="detail-row"><span class="label">Employee ID</span><span class="value" id="val-0"></span></div>
            <div class="detail-row"><span class="label">Full Name</span><span class="value" id="val-1"></span></div>
            <div class="detail-row"><span class="label">PAN Number</span><span class="value" id="val-9"></span></div>
            <div class="detail-row"><span class="label">Date of Birth</span><span class="value date-badge" id="val-5"></span></div>
            <div class="detail-row"><span class="label">Retirement Date</span><span class="value date-badge" id="val-6"></span></div>
        </div>

        <span class="section-title">Career & Appointment</span>
        <div class="details-card">
            <div class="detail-row"><span class="label">Current Designation</span><span class="value" id="val-2"></span></div>
            <div class="detail-row"><span class="label">Place of Working</span><span class="value" id="val-3"></span></div>
            <div class="detail-row"><span class="label">Joining Date</span><span class="value" id="val-18"></span></div>
            <div class="detail-row"><span class="label">Appointment Type</span><span class="value" id="val-20"></span></div>
            <div class="detail-row"><span class="label">Pension Type</span><span class="value" id="val-26"></span></div>
            <div class="detail-row"><span class="label">NPS/DCPS No.</span><span class="value" id="val-27"></span></div>
        </div>

        <span class="section-title">Demographics</span>
        <div class="details-card">
            <div class="detail-row"><span class="label">Category / Caste</span><span class="value" id="val-14"></span></div>
            <div class="detail-row"><span class="label">Qualification</span><span class="value" id="val-12"></span></div>
            <div class="detail-row"><span class="label">Home Town</span><span class="value" id="val-17"></span></div>
        </div>
    </div>

    <script>
        const currentUser = localStorage.getItem("currentUser");
        if (!currentUser) window.location.href = "login.html";

        async function loadOfficialDetails() {
            try {
                const response = await fetch("https://hescomsalary1-sudo.github.io/salary-data/employee.csv?v=" + new Date().getTime());
                const data = await response.text();
                const rows = data.trim().split("\n");

                let userFound = false;

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(",");
                    if (cols[0].trim() === currentUser.trim()) {
                        userFound = true;
                        
                        // Map all columns to IDs dynamically
                        // We use the index of the column as the ID (e.g., val-0, val-1)
                        for (let j = 0; j < cols.length; j++) {
                            const element = document.getElementById(`val-${j}`);
                            if (element) {
                                element.innerText = cols[j].trim() || "N/A";
                            }
                        }
                        break;
                    }
                }

                if (!userFound) {
                    document.getElementById("detailsContainer").innerHTML = "<p style='text-align:center; padding:50px;'>Record not found.</p>";
                }

            } catch (error) {
                console.error("Error loading CSV:", error);
            } finally {
                document.getElementById("loading").style.display = "none";
            }
        }

        window.onload = loadOfficialDetails;
    </script>
    <script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
  window.location.replace("employee_info.html");
};
</script>
</body>
</html>
