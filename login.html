<!DOCTYPE html>
<html>
<head>
<title>Salary Prompt - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* TOP AREA - Clean White */
.top {
    padding: 40px 20px;
    background: #ffffff;
    color: #2400b7;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.top h1 {
    margin: 0;
    font-size: 34px;
    letter-spacing: 2px;
    font-weight: 700;
}

.top p {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
}

.illustration {
    margin-top: 20px;
}

.illustration img {
    width: 200px;
    max-width: 100%;
    border-radius: 12px;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
}

/* LOGIN AREA */
.bottom {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-bottom: 50px;
}

.login-box {
    width: 85%;
    max-width: 320px;
    background: white;
    padding: 20px;
}

.input-group {
    margin-bottom: 25px;
    position: relative;
}

input {
    width: 100%;
    padding: 10px 0;
    border: none;
    border-bottom: 2px solid #ccc;
    outline: none;
    font-size: 14px;
}

input:focus {
    border-bottom: 2px solid #5e00a3;
}

.toggle-password {
    position: absolute;
    right: 0;
    top: 10px;
    cursor: pointer;
    font-size: 13px;
    color: #5e00a3;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    color: white;
    font-size: 15px;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(36, 0, 183, 0.3);
}

.change-btn {
    background: transparent;
    color: #3b1eff;
    border: 2px solid #3b1eff;
    border-radius: 25px;
    font-weight: 500;
    margin-top: 12px;
    box-shadow: none;
}

/* BLUE FOOTER SECTION */
.footer-wave {
    width: 100%;
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    height: 100px;
    position: relative;
    margin-top: auto;
}

.wave-upside {
    position: absolute;
    top: -49px;
    left: 0;
    width: 100%;
    transform: rotate(180deg);
}

/* LOADERS & SPINNERS */
#loader, #cpLoader {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

.cp-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #eee;
    border-top: 5px solid #3b1eff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin { 0% {transform:rotate(0deg);} 100% {transform:rotate(360deg);} }

@keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
}

.skeleton {
    height: 20px;
    margin-bottom: 10px;
    border-radius: 6px;
    background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%);
    background-size: 400px 100%;
    animation: shimmer 1.2s infinite;
}

#error { color: red; font-size: 13px; margin-bottom: 15px; text-align: center; }

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="loader">
    <div style="width: 80%;">
        <div class="skeleton" style="height: 60px; width: 60px; border-radius: 50%; margin: 0 auto 20px;"></div>
        <div class="skeleton" style="width: 70%; margin: 0 auto;"></div>
        <div class="skeleton" style="height: 100px;"></div>
        <div class="skeleton"></div>
        <div class="skeleton" style="width: 50%;"></div>
    </div>
</div>

<div id="cpLoader">
    <div class="cp-spinner"></div>
    <p style="margin-top:15px; color:#2400b7;">Updating Password...</p>
</div>

<div class="top">
    <h1>Salary Prompt</h1>
    <p>Secure Employee Login</p>
    <div class="illustration">
        <img src="https://media.tenor.com/lgyTXgehpA0AAAAe/blue-man-on-laptop-blue-man.png" alt="illustration">
    </div>
</div>

<div class="bottom">
    <div class="login-box">
        <div id="error"></div>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword()">View</span>
        </div>
        <button onclick="login()">Login</button>
        <button class="change-btn" onclick="openChangePassword()">🔐 Change Password</button>
    </div>
</div>

<div class="footer-wave">
    <svg class="wave-upside" viewBox="0 0 1440 320">
        <path fill="#2400b7" d="M0,160L80,170C160,180,320,200,480,186.7C640,173,800,127,960,112C1120,96,1280,112,1360,120L1440,128L1440,320L0,320Z"></path>
    </svg>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpKkkmsAJiaq0-Be6s3sRrCjn1fRxyNpKYXYHzh7Wug30OaSmq-0mRXz_P3hWxdANv/exec";

function login() {
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!user || !pass) {
        document.getElementById("errorText").innerText="Please enter Username and Password";
        document.getElementById("errorPopup").style.display="flex";
        return;
    }

    document.getElementById("loader").style.display="flex";
    fetch(`${SCRIPT_URL}?username=${user}&password=${pass}`)
    .then(res => res.text())
    .then(text => {
        let data = JSON.parse(text);
        if(data.status === "success") {
            localStorage.setItem("currentUser", user);
            localStorage.setItem("role", data.role);
            window.location = "home.html";
        } else {
            document.getElementById("loader").style.display="none";
            document.getElementById("error").innerText="Invalid Username or Password";
        }
    })
    .catch(() => {
        document.getElementById("loader").style.display="none";
        document.getElementById("error").innerText="Server Connection Error";
    });
}

function changePassword() {
    let user = document.getElementById("cp_user").value;
    let oldPass = document.getElementById("old_pass").value;
    let newPass = document.getElementById("new_pass").value;

    if(!user || !oldPass || !newPass) {
        alert("Please fill all fields");
        return;
    }

    document.getElementById("cpLoader").style.display="flex";

    let formData = new URLSearchParams();
    formData.append("username", user);
    formData.append("oldPassword", oldPass);
    formData.append("newPassword", newPass);

    fetch(SCRIPT_URL, { method: "POST", body: formData })
    .then(res => res.text())
    .then(text => {
        document.getElementById("cpLoader").style.display="none";
        let data = JSON.parse(text);
        if(data.status === "updated") {
            document.getElementById("successPopup").style.display="flex";
        } else {
            document.getElementById("errorText").innerText="Update Failed: Check Old Password";
            document.getElementById("errorPopup").style.display="flex";
        }
    })
    .catch(() => {
        document.getElementById("cpLoader").style.display="none";
        alert("Server Error during update");
    });
}

function togglePassword(){
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}

function openChangePassword() {
    document.getElementById("changeBox").style.display="flex";
    document.getElementById("cp_user").value = document.getElementById("username").value;
}

function closeBox() { document.getElementById("changeBox").style.display="none"; }
function closeSuccess() { document.getElementById("successPopup").style.display="none"; closeBox(); }
function closeError() { document.getElementById("errorPopup").style.display="none"; }

window.onload = () => { document.getElementById("loader").style.display="none"; };
</script>

<div id="changeBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:100000;">
    <div style="background:white;padding:25px;border-radius:15px;width:300px;">
        <h3 style="margin-top:0;">Change Password</h3>
        <input id="cp_user" placeholder="Username" style="margin-bottom:15px;">
        <input id="old_pass" type="password" placeholder="Old Password" style="margin-bottom:15px;">
        <input id="new_pass" type="password" placeholder="New Password" style="margin-bottom:20px;">
        <button onclick="changePassword()">Update Now</button>
        <button onclick="closeBox()" style="background:#888; margin-top:8px; box-shadow:none;">Cancel</button>
    </div>
</div>

<div id="successPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:99999;">
    <div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
        <div style="font-size:40px;color:green;">✔</div>
        <h3 style="margin:10px 0;">Success</h3>
        <p>Password Updated Successfully</p>
        <button onclick="closeSuccess()" style="margin-top:10px;">OK</button>
    </div>
</div>

<div id="errorPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:99999;">
    <div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
        <div style="font-size:40px;color:red;">✖</div>
        <h3 style="margin:10px 0;color:red;">Error</h3>
        <p id="errorText">Invalid Details</p>
        <button onclick="closeError()" style="margin-top:10px;background:red;">OK</button>
    </div>
</div> 

</body>
</html>
