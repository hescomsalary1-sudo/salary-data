<!DOCTYPE html>
<html>
<head>
<title>Salary Prompt - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: #ffffff;
}

/* TOP */
.top {
position: relative;
height: 45vh;
background: linear-gradient(135deg, #2400b7, #3b1eff);
color: white;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
text-align: center;
}

.top h1 {
margin: 0;
font-size: 34px;
letter-spacing: 2px;
}

.top p {
margin-top: 8px;
font-size: 14px;
opacity: 0.85;
}

/* BOTTOM WAVE */
.wave-bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
line-height:0;
z-index:0;
}

.wave-bottom{
transform:rotate(180deg); /* 🔥 IMPORTANT */
}

/* LOGIN */
.bottom {
padding-top: 60px;
padding-bottom:120px; /* 🔥 add this */
display: flex;
justify-content: center;
}

.login-box {
width: 85%;
max-width: 320px;
}

.input-group {
margin-bottom: 25px;
position: relative;
}

input {
width: 100%;
padding: 10px 0;
border: none;
border-bottom: 2px solid #ccc;
outline: none;
font-size: 14px;
}

input:focus {
border-bottom: 2px solid #5e00a3;
}

.toggle-password {
position: absolute;
right: 0;
top: 10px;
cursor: pointer;
font-size: 13px;
color: #5e00a3;
}

button {
width: 100%;
padding: 12px;
border: none;
background: linear-gradient(135deg, #2400b7, #3b1eff);
color: white;
font-size: 15px;
border-radius: 25px;
cursor: pointer;
}

#error {
color: red;
font-size: 13px;
margin-bottom: 15px;
text-align: center;
}

/* ✅ SKELETON LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#ffffff;
display:none;
flex-direction:column;
padding:20px;
gap:15px;
z-index:99999;
}

/* shimmer */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:20px;
border-radius:6px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-circle{width:60px;height:60px;border-radius:50%;}
.skel-big{height:120px;border-radius:20px;}
.skel-line{height:15px;}

.illustration {
margin-top: 20px;
display: flex;
justify-content: center;
align-items: center;
}

/* PERSON */
.person {
position: relative;
width: 140px;
height: 140px;
}

/* HEAD */
.head {
width: 40px;
height: 40px;
background: #ffcc99;
border-radius: 50%;
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
}

/* BODY */
.body {
width: 80px;
height: 60px;
background: #ffffff;
border-radius: 15px;
position: absolute;
top: 40px;
left: 50%;
transform: translateX(-50%);
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* LAPTOP */
.laptop {
width: 90px;
height: 10px;
background: #333;
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
border-radius: 5px;
}
.illustration {
margin-top: 20px;
display: flex;
justify-content: center;
}

  /* CHANGE PASSWORD LOADER */
#cpLoader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffffcc;
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.cp-spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #3b1eff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
  @keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

  button + button{
margin-top: 12px;
}

  .change-btn{
background: transparent;
color: #3b1eff;
border: 2px solid #3b1eff;
border-radius: 25px;
font-weight: 500;
transition: 0.3s;
}

.change-btn:hover{
background: #3b1eff;
color: white;
}

</style>
</head>

<body>

<!-- ✅ SKELETON LOADER -->
<div id="loader">

<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
<div class="skeleton skel-circle"></div>
<div class="skeleton skel-line" style="width:60%;"></div>
</div>

<div class="skeleton skel-big"></div>

<div class="skeleton skel-line"></div>
<div class="skeleton skel-line" style="width:80%;"></div>
<div class="skeleton skel-line"></div>
<div class="skeleton skel-big"></div>

<div class="skeleton skel-line"></div>
<div class="skeleton skel-line" style="width:80%;"></div>
<div class="skeleton skel-line"></div>
  <div class="skeleton skel-big"></div>
  <div class="skeleton skel-big"></div>
</div>

<!-- TOP -->
<div class="top">
<h1>Salary Prompt</h1>
<p>Secure Employee Login</p>



</div>

<!-- LOGIN -->
<div class="bottom">
<div class="login-box">

<div id="error"></div>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<span class="toggle-password" onclick="togglePassword()">View</span>
</div>

<button onclick="login()">Login</button>
  <button class="change-btn" onclick="openChangePassword()">
🔐 Change Password
</button>
</div>
</div>

<script>

// ✅ LOGIN FUNCTION
function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "" || pass === ""){
document.getElementById("errorText").innerText="Invalid Username or Password";
document.getElementById("errorPopup").style.display="flex";
return;
}

// show loader
document.getElementById("loader").style.display="flex";

let url = "https://script.google.com/macros/s/AKfycbwpKkkmsAJiaq0-Be6s3sRrCjn1fRxyNpKYXYHzh7Wug30OaSmq-0mRXz_P3hWxdANv/exec?username=" + user + "&password=" + pass;

fetch(url)
.then(res => res.text())
.then(text => {

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// hide loader


if(data.status === "success"){

localStorage.setItem("currentUser", user);
localStorage.setItem("role", data.role);

// smooth redirect
setTimeout(function(){
window.location = "home.html";
}, 600);

}else{

document.getElementById("loader").style.display="none"; // hide loader on error
document.getElementById("error").innerText="Invalid Username or Password";

}
})
.catch(err => {
document.getElementById("loader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}


// ✅ TOGGLE PASSWORD
function togglePassword(){
let passField=document.getElementById("password");
passField.type = passField.type === "password" ? "text" : "password";
}


// ✅ OPEN CHANGE PASSWORD
function openChangePassword(){
document.getElementById("changeBox").style.display="flex";
document.getElementById("cp_user").value = document.getElementById("username").value;
}


// ✅ CLOSE CHANGE PASSWORD
function closeBox(){
document.getElementById("changeBox").style.display="none";
}


// ✅ CHANGE PASSWORD FUNCTION
function changePassword(){

let user = document.getElementById("cp_user").value;
let oldPass = document.getElementById("old_pass").value;
let newPass = document.getElementById("new_pass").value;

if(user=="" || oldPass=="" || newPass==""){
alert("Please fill all fields");
return;
}

// show loader
document.getElementById("cpLoader").style.display="flex";

let formData = new URLSearchParams();
formData.append("username", user);
formData.append("oldPassword", oldPass);
formData.append("newPassword", newPass);

fetch("https://script.google.com/macros/s/AKfycbwpKkkmsAJiaq0-Be6s3sRrCjn1fRxyNpKYXYHzh7Wug30OaSmq-0mRXz_P3hWxdANv/exec", {
method:"POST",
body: formData
})
.then(res => res.text())
.then(text => {

// hide loader
document.getElementById("cpLoader").style.display="none";

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// ✅ SUCCESS
if(data.status==="updated"){

document.getElementById("successPopup").style.display="flex";

}else{

// show error nicely
document.getElementById("errorText").innerText="Invalid Username or Old Password";
document.getElementById("errorPopup").style.display="flex";

}

})
.catch(err=>{
document.getElementById("cpLoader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}


// ✅ CLOSE SUCCESS POPUP
function closeSuccess(){
document.getElementById("successPopup").style.display="none";
closeBox();
}


// ✅ PAGE LOAD
window.onload=function(){
document.getElementById("loader").style.display="none";
document.body.style.overflow="auto";
};
  function closeError(){
document.getElementById("errorPopup").style.display="none";
}

</script>
<!-- ✅ CHANGE PASSWORD BOX -->
<div id="changeBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;">

<div style="background:white;padding:20px;border-radius:10px;width:300px;">
<h3>Change Password</h3>

<input id="cp_user" placeholder="Username"><br><br>
<input id="old_pass" type="password" placeholder="Old Password"><br><br>
<input id="new_pass" type="password" placeholder="New Password"><br><br>

<button onclick="changePassword()">Update</button>
<button onclick="closeBox()">Cancel</button>

</div>
</div>

<!-- ✅ LOADER -->
<div id="cpLoader">
  <div class="cp-spinner"></div>
</div>

<!-- ✅ SUCCESS POPUP -->
<div id="successPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:99999;">

<div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
  
  <div style="font-size:40px;color:green;">✔</div>
  <h3 style="margin:10px 0;">Success</h3>
  <p>Password Updated Successfully</p>

  <button onclick="closeSuccess()" style="margin-top:10px;">OK</button>

</div>
</div>

 <div id="errorPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:99999;">

<div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
  
  <div style="font-size:40px;color:red;">✖</div>
  <h3 style="margin:10px 0;color:red;">Error</h3>
  <p id="errorText">Invalid Details</p>

  <button onclick="closeError()" style="margin-top:10px;background:red;">OK</button>

</div>
</div> 
  <!-- WAVE AT BOTTOM -->
<svg class="wave-bottom" viewBox="0 0 1440 320">
  <path fill="#2400b7"
  d="M0,160L80,170C160,180,320,200,480,186.7C640,173,800,127,960,112C1120,96,1280,112,1360,120L1440,128L1440,320L0,320Z">
  </path>
</svg>
</body>
</html>
