<!DOCTYPE html>
<html>
<head>
<title>Salary Prompt - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: white;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* TOP */
.top {
    position: relative;
    width: 100%;
    height: 50vh; /* 50% of the screen height */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    margin: 0;
}

.top p {
    position: absolute;
    top: 55px; /* Positioned directly under h1 */
    right: 27px;
    margin: 0;
    font-size: 14px;
    z-index: 10;
    color: white;
    opacity: 0.9;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.top h1 {
    position: absolute;
    top: 20px;
    right: 27px;
    margin: 0;
    font-size: 28px;
    letter-spacing: 1px;
    z-index: 10;
    color: blue;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}



/* LOGIN */
.bottom {
    display: flex;
    justify-content: center;
    padding-bottom: 40px;
}

.login-box {
width: 85%;
max-width: 320px;
}

.input-group {
margin-bottom: 25px;
position: relative;
}

input {
width: 100%;
padding: 10px 0;
border: none;
border-bottom: 2px solid #ccc;
outline: none;
font-size: 14px;
}

input:focus {
border-bottom: 2px solid #5e00a3;
}

.toggle-password {
position: absolute;
right: 0;
top: 10px;
cursor: pointer;
font-size: 13px;
color: #5e00a3;
}

button {
width: 100%;
padding: 12px;
border: none;
background: linear-gradient(135deg, #2400b7, #3b1eff);
color: white;
font-size: 15px;
border-radius: 25px;
cursor: pointer;
}

#error {
color: red;
font-size: 13px;
margin-bottom: 15px;
text-align: center;
}

/* ✅ SKELETON LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#ffffff;
display:none;
flex-direction:column;
padding:20px;
gap:15px;
z-index:99999;
}

/* shimmer */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
height:20px;
border-radius:6px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-circle{width:60px;height:60px;border-radius:50%;}
.skel-big{height:120px;border-radius:20px;}
.skel-line{height:15px;}

.illustration {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

.illustration img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ensures image fills the area without distorting */
    border-radius: 0; /* Remove radius for a full-screen look */
}
/* small animation */
.illustration img:active{
transform:scale(0.95);
}

  /* CHANGE PASSWORD LOADER */
#cpLoader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffffcc;
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.cp-spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #3b1eff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
  @keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

  button + button{
margin-top: 12px;
}

  .change-btn{
background: transparent;
color: #3b1eff;
border: 2px solid #3b1eff;
border-radius: 25px;
font-weight: 500;
transition: 0.3s;
}

.change-btn:hover{
background: #3b1eff;
color: white;
}
/* NEW BLUE SECTION FOR BOTTOM */
/* Update this section */
.footer-blue {
    flex-grow: 1;
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    width: 100%;
    margin-top: 60px; /* Increased margin to make room for the wave */
    position: relative; /* Required for wave positioning */
}

/* Add this new section */
.footer-wave {
    position: absolute;
    top: -59px; /* Pulls the wave above the blue block */
    left: 0;
    width: 100%;
    line-height: 0;
}

.footer-wave svg {
    display: block;
    width: 100%;
    height: 60px;
}

.bottom {
    display: flex;
    justify-content: center;
    padding: 30px 0; /* Space between half-screen image and inputs */
    background: white;
}

</style>
</head>

<body>

<!-- ✅ SKELETON LOADER -->
<div id="loader">

<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
<div class="skeleton skel-circle"></div>
<div class="skeleton skel-line" style="width:60%;"></div>
</div>

<div class="skeleton skel-big"></div>

<div class="skeleton skel-line"></div>
<div class="skeleton skel-line" style="width:80%;"></div>
<div class="skeleton skel-line"></div>
<div class="skeleton skel-big"></div>

<div class="skeleton skel-line"></div>
<div class="skeleton skel-line" style="width:80%;"></div>
<div class="skeleton skel-line"></div>
  <div class="skeleton skel-big"></div>
  <div class="skeleton skel-big"></div>
</div>

<!-- TOP -->
<div class="top">
    <div class="illustration">
        <img src="https://img.freepik.com/premium-vector/man-working-laptop-with-coffee-mug-vector-illustration_1512342-133.jpg?semt=ais_hybrid&w=740&q=80" alt="salary illustration">
    </div>
    <h1>Salary Prompt</h1>
    <p>Secure Employee Login</p>
</div>

<!-- LOGIN -->
<div class="bottom">
<div class="login-box">

<div id="error"></div>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<span class="toggle-password" onclick="togglePassword()">View</span>
</div>

<button onclick="login()">Login</button>
  <button class="change-btn" onclick="openChangePassword()">
🔐 Change Password
</button>
</div>
</div>

<script>

// ✅ LOGIN FUNCTION
function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "" || pass === ""){
document.getElementById("errorText").innerText="Invalid Username or Password";
document.getElementById("errorPopup").style.display="flex";
return;
}

// show loader
document.getElementById("loader").style.display="flex";

let url = "https://script.google.com/macros/s/AKfycbwpKkkmsAJiaq0-Be6s3sRrCjn1fRxyNpKYXYHzh7Wug30OaSmq-0mRXz_P3hWxdANv/exec?username=" + user + "&password=" + pass;

fetch(url)
.then(res => res.text())
.then(text => {

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// hide loader


if(data.status === "success"){

localStorage.setItem("currentUser", user);
localStorage.setItem("role", data.role);

// smooth redirect
setTimeout(function(){
window.location = "home.html";
}, 600);

}else{

document.getElementById("loader").style.display="none"; // hide loader on error
document.getElementById("error").innerText="Invalid Username or Password";

}
})
.catch(err => {
document.getElementById("loader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}


// ✅ TOGGLE PASSWORD
function togglePassword(){
let passField=document.getElementById("password");
passField.type = passField.type === "password" ? "text" : "password";
}


// ✅ OPEN CHANGE PASSWORD
function openChangePassword(){
document.getElementById("changeBox").style.display="flex";
document.getElementById("cp_user").value = document.getElementById("username").value;
}


// ✅ CLOSE CHANGE PASSWORD
function closeBox(){
document.getElementById("changeBox").style.display="none";
}


// ✅ CHANGE PASSWORD FUNCTION
function changePassword(){

let user = document.getElementById("cp_user").value;
let oldPass = document.getElementById("old_pass").value;
let newPass = document.getElementById("new_pass").value;

if(user=="" || oldPass=="" || newPass==""){
alert("Please fill all fields");
return;
}

// show loader
document.getElementById("cpLoader").style.display="flex";

let formData = new URLSearchParams();
formData.append("username", user);
formData.append("oldPassword", oldPass);
formData.append("newPassword", newPass);

fetch("https://script.google.com/macros/s/AKfycbwpKkkmsAJiaq0-Be6s3sRrCjn1fRxyNpKYXYHzh7Wug30OaSmq-0mRXz_P3hWxdANv/exec", {
method:"POST",
body: formData
})
.then(res => res.text())
.then(text => {

// hide loader
document.getElementById("cpLoader").style.display="none";

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// ✅ SUCCESS
if(data.status==="updated"){

document.getElementById("successPopup").style.display="flex";

}else{

// show error nicely
document.getElementById("errorText").innerText="Invalid Username or Old Password";
document.getElementById("errorPopup").style.display="flex";

}

})
.catch(err=>{
document.getElementById("cpLoader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}


// ✅ CLOSE SUCCESS POPUP
function closeSuccess(){
document.getElementById("successPopup").style.display="none";
closeBox();
}


// ✅ PAGE LOAD
window.onload=function(){
document.getElementById("loader").style.display="none";
document.body.style.overflow="auto";
};
  function closeError(){
document.getElementById("errorPopup").style.display="none";
}

</script>
<!-- ✅ CHANGE PASSWORD BOX -->
<div id="changeBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;">

<div style="background:white;padding:20px;border-radius:10px;width:300px;">
<h3>Change Password</h3>

<input id="cp_user" placeholder="Username"><br><br>
<input id="old_pass" type="password" placeholder="Old Password"><br><br>
<input id="new_pass" type="password" placeholder="New Password"><br><br>

<button onclick="changePassword()">Update</button>
<button onclick="closeBox()">Cancel</button>

</div>
</div>

<!-- ✅ LOADER -->
<div id="cpLoader">
  <div class="cp-spinner"></div>
</div>

<!-- ✅ SUCCESS POPUP -->
<div id="successPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:99999;">

<div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
  
  <div style="font-size:40px;color:green;">✔</div>
  <h3 style="margin:10px 0;">Success</h3>
  <p>Password Updated Successfully</p>

  <button onclick="closeSuccess()" style="margin-top:10px;">OK</button>

</div>
</div>

 <div id="errorPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;justify-content:center;align-items:center;z-index:99999;">

<div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
  
  <div style="font-size:40px;color:red;">✖</div>
  <h3 style="margin:10px 0;color:red;">Error</h3>
  <p id="errorText">Invalid Details</p>

  <button onclick="closeError()" style="margin-top:10px;background:red;">OK</button>

</div>
</div> 
  <div class="footer-blue">
    <div class="footer-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#2400b7" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,202.7C960,224,1056,224,1152,197.3C1248,171,1344,117,1392,90.7L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>
</div>
</body>
</html>
