<!DOCTYPE html>
<html lang="kn">
<head>
<title>Salary Prompt - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* --- PREMIUM FLASH-SCREEN MATCHED DESIGN SYSTEM --- */
:root {
    --primary-blue: #1368ff;
    --accent-blue: #4db4ff;
    --bg-gradient: radial-gradient(circle at top, #2b7fff 0%, #1649d8 25%, #0d2f9b 55%, #071c6a 80%, #020d38 100%);
    --card-bg: rgba(18, 50, 130, 0.45);
    --glass-border: rgba(255, 255, 255, 0.15);
    --text-light: #ffffff;
    --text-muted: #d7e9ff;
    --error: #ff4d4d;
    --success: #00e676;
    --radius: 24px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* Stops horizontal & vertical scrolling page wiggle */
}

body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
}

/* --- AMBIENT BACKGROUND ORBS --- */
.bg1, .bg2 {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, .05);
    filter: blur(4px);
    pointer-events: none;
    z-index: 1;
}
.bg1 { width: 260px; height: 260px; left: -80px; top: -80px; }
.bg2 { width: 220px; height: 220px; right: -60px; top: 90px; }

/* --- TOP SPLIT BRANDING AREA --- */
.top {
    position: relative;
    width: 100%;
    height: 28vh; /* Reduced height to stop forcing content out of screen bounds */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
    padding-top: 10px;
}

.illustration {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("https://hescomsalary1-sudo.github.io/salary-data/COVER_IMAGE2.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.15;
}

/* --- BOTTOM WORKSPACE BOUNDED CONTAINER --- */
.bottom {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 20px;
    flex-grow: 1;
    z-index: 2;
}

/* --- PREMIUM BLUR LOGIN BOX --- */
.login-box {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    padding: 30px 24px; /* Slight size refactor for dynamic mobile layout sizing */
    border-radius: var(--radius);
    box-shadow: 0 15px 35px rgba(0,0,0,.35);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
}

/* --- FLASH SCREEN IDENTICAL FEATURES GRID --- */
.features {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 20px;
    margin-bottom: 20px; /* Locked down space metrics */
}

.f {
    background: rgba(255, 255, 255, .08);
    border: 1px solid rgba(255, 255, 255, .1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 10px 2px;
    color: var(--text-light);
    text-align: center;
    transition: all 0.3s ease;
    cursor: default;
}

.f:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
    border-color: var(--accent-blue);
}

.f .i {
    font-size: 20px;
}

.f b {
    display: block;
    font-size: 11px;
    margin-top: 4px;
    font-weight: 600;
}

.f span {
    display: block;
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 1px;
}

/* --- REFINED INPUT FIELDS --- */
.input-group {
    margin-bottom: 16px;
    position: relative;
}

input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    outline: none;
    font-size: 15px;
    background: rgba(255, 255, 255, 0.07);
    border-radius: 12px;
    box-sizing: border-box;
    transition: all 0.25s ease;
    color: var(--text-light);
}

input::placeholder {
    color: rgba(215, 233, 255, 0.6);
}

input:focus {
    border-color: var(--accent-blue);
    background: rgba(255, 255, 255, 0.12);
    box-shadow: 0 0 12px rgba(77, 180, 255, 0.2);
}

.toggle-password {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    user-select: none;
}

.toggle-password:hover {
    color: var(--text-light);
}

/* --- HIGH-END BUTTONS --- */
button {
    width: 100%;
    padding: 14px;
    border: none;
    background: linear-gradient(145deg, #0b45d8, #1368ff, #3fa4ff);
    color: white;
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(19, 104, 255, 0.3);
}

button:hover {
    transform: scale(1.01);
    box-shadow: 0 8px 25px rgba(77, 180, 255, 0.45);
}

button:active {
    transform: scale(0.99);
}

button + button {
    margin-top: 12px;
}

.change-btn {
    background: transparent;
    color: var(--text-light);
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: none;
}

.change-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--accent-blue);
    box-shadow: none;
}

/* --- ALERTS & ERRORS --- */
#error {
    color: var(--error);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
    background: rgba(255, 77, 77, 0.12);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255, 77, 77, 0.2);
    display: none;
}
#error:not(:empty) {
    display: block;
}

/* --- PREMIUM MORPHING GLASS LOADER --- */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(2, 13, 56, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    transition: opacity 0.4s ease;
}

.morph-spinner {
    width: 100px;
    height: 100px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.morph-spinner::before,
.morph-spinner::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
    background: linear-gradient(135deg, #0b45d8, #3fa4ff, #00d2ff);
    opacity: 0.6;
    animation: morph 3s linear infinite;
}

.morph-spinner::after {
    animation-delay: -1.5s;
    background: linear-gradient(135deg, #00c9a7, #1368ff);
    opacity: 0.4;
}

.inner-core {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    z-index: 10;
    box-shadow: inset 0 0 10px rgba(36, 0, 183, 0.2), 0 0 20px rgba(255, 255, 255, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
}

.loader-text {
    margin-top: 40px;
    font-weight: 700;
    color: white;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

@keyframes morph {
    0% { transform: rotate(0deg) scale(1); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    50% { transform: rotate(180deg) scale(1.1); border-radius: 70% 30% 30% 70% / 50% 60% 40% 60%; }
    100% { transform: rotate(360deg) scale(1); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
}

/* --- MODAL DESIGN SYSTEM --- */
#changeBox, #successPopup, #errorPopup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 13, 56, 0.6);
    backdrop-filter: blur(12px);
    justify-content: center;
    align-items: center;
    z-index: 200000;
}

.change-box-content, .popup-content {
    background: #0d2f9b;
    padding: 35px 25px;
    border-radius: var(--radius);
    width: 100%;
    max-width: 340px;
    box-sizing: border-box;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border: 1px solid var(--glass-border);
    text-align: center;
    animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideUpFade {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes pop {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.change-box-content h3 {
    margin: 0 0 20px 0;
    color: var(--text-light);
    font-size: 22px;
}

.change-box-content input {
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.08);
}

.cancel-link {
    display: inline-block;
    margin-top: 18px;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    text-decoration: underline;
}

/* --- INTERIM CHANGE PASSSWORD SPINNER --- */
#cpLoader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 13, 56, 0.7); 
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 250000; 
}

.cp-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-top: 4px solid var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* --- MATCHING SPLASH WAVE DECORATION --- */
.footer-blue {
    width: 100%;
    position: relative;
    height: 40px; /* Reduced to balance vertical layout budget */
    z-index: 2;
}

.footer-wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    line-height: 0;
}

.footer-wave svg {
    display: block;
    width: 100%;
    height: 40px;
}

@media(max-width: 400px) {
    .top { height: 26vh; }
    .features { margin-bottom: 15px; margin-top: 15px; }
    .f .i { font-size: 18px; }
    .f b { font-size: 10px; }
    .f span { font-size: 8px; }
    .login-box { padding: 24px 20px; }
}
</style>
</head>

<body>
<div class="bg1"></div><div class="bg2"></div>

<div class="top">
    <div class="illustration"></div>
    <div style="font-size: 42px; font-weight: 700; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,.3); z-index: 3;">₹</div>
    <div style="margin-top: 5px; color: #fff; font-size: 24px; font-weight: 600; text-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index:3;">Salary Prompt</div>
</div>

<div class="bottom">
    <div class="login-box">
        <div id="error"></div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword()">View</span>
        </div>

        <button onclick="login()">Login</button>
        <button class="change-btn" onclick="openChangePassword()">🔐 Change Password</button>
    </div>

    <div class="features">
        <div class="f"><div class="i">🛡️</div><b>Secure</b><span>ಸುರಕ್ಷತೆ</span></div>
        <div class="f"><div class="i">🤝</div><b>Reliable</b><span>ವಿಶ್ವಾಸಾರ್ಹ</span></div>
        <div class="f"><div class="i">📈</div><b>Efficient</b><span>ದಕ್ಷತೆ</span></div>
        <div class="f"><div class="i">👥</div><b>Employee First</b><span>ಕೇಂದ್ರಬಿಂದು</span></div>
    </div>
</div>

<div id="loader">
    <div class="morph-spinner">
        <div class="inner-core">
             <span style="font-size: 12px;">⚡</span>
        </div>
    </div>
    <div class="loader-text">Securing Session</div>
</div>

<div id="cpLoader">
  <div class="cp-spinner"></div>
</div>

<div id="changeBox">
    <div class="change-box-content">
        <h3>Update Password</h3>
        <input id="cp_user" placeholder="Username">
        <input id="old_pass" type="password" placeholder="Old Password">
        <input id="new_pass" type="password" placeholder="New Password">

        <button onclick="changePassword()">Save New Password</button>
        <span class="cancel-link" onclick="closeBox()">Cancel</span>
    </div>
</div>

<div id="successPopup">
    <div class="popup-content" style="animation: pop 0.3s ease;">
        <div style="font-size: 48px; color: var(--success); margin-bottom: 12px;">✔</div>
        <h3 style="margin: 5px 0; font-size: 22px;">Success</h3>
        <p style="color: var(--text-muted); margin: 6px 0 24px 0; font-size: 14px;">Password Updated Successfully</p>
        <button onclick="closeSuccess()">OK</button>
    </div>
</div>

<div id="errorPopup">
    <div class="popup-content" style="animation: pop 0.3s ease;">
        <div style="font-size: 48px; color: var(--error); margin-bottom: 12px;">✖</div>
        <h3 style="margin: 5px 0; color: var(--error); font-size: 22px;">Error</h3>
        <p id="errorText" style="color: var(--text-muted); margin: 6px 0 24px 0; font-size: 14px;">Invalid Details</p>
        <button onclick="closeError()" style="background: var(--error);">OK</button>
    </div>
</div> 

<div class="footer-blue">
    <div class="footer-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="rgba(255,255,255,0.04)" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,202.7C960,224,1056,224,1152,197.3C1248,171,1344,117,1392,90.7L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>
</div>

<script>
function showLoader(text = "Securing Session"){
    const loader = document.getElementById("loader");
    const txt = document.querySelector(".loader-text");

    loader.style.display = "flex";
    loader.style.opacity = "1";
    txt.innerText = text;
}

function hideLoader(){
    const loader = document.getElementById("loader");

    loader.style.opacity = "0";

    setTimeout(()=>{
        loader.style.display = "none";
    },400);
}

// ✅ LOGIN FUNCTION
function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "" || pass === ""){
document.getElementById("errorText").innerText="Invalid Username or Password";
document.getElementById("errorPopup").style.display="flex";
return;
}
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = "DEV-" + Date.now() + "-" + Math.floor(Math.random()*10000);
  localStorage.setItem("deviceId", deviceId);
}
// show loader
showLoader("Verifying Credentials...");

let url = "https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec"
  + "?username=" + user
  + "&password=" + pass
  + "&deviceId=" + deviceId;

fetch(url)
.then(res => res.text())
.then(text => {

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// ... inside your login() function after success:
if(data.status === "success"){
    localStorage.setItem("currentUser", user);
    localStorage.setItem("role", data.role);

    // Update text for better UX
    document.querySelector(".loader-text").innerText = "Success! Entering App...";

    setTimeout(function(){
        window.location = "home.html";
    }, 1000); 
}else{

hideLoader();
document.getElementById("error").innerText="Invalid Username or Password";

}
})
.catch(err => {
document.getElementById("loader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}

// ✅ TOGGLE PASSWORD
function togglePassword(){
let passField=document.getElementById("password");
passField.type = passField.type === "password" ? "text" : "password";
}

// ✅ OPEN CHANGE PASSWORD
function openChangePassword(){
    document.getElementById("changeBox").style.display="flex";
    document.getElementById("cp_user").value = document.getElementById("username").value;
}

// ✅ CLOSE CHANGE PASSWORD
function closeBox(){
document.getElementById("changeBox").style.none;
document.getElementById("changeBox").style.display="none";
}

// ✅ CHANGE PASSWORD FUNCTION
function changePassword(){

    let user = document.getElementById("cp_user").value.trim();
    let oldPass = document.getElementById("old_pass").value.trim();
    let newPass = document.getElementById("new_pass").value.trim();

    // Check if any fields are empty
    if(user == "" || oldPass == "" || newPass == ""){
        // Set the error message
        document.getElementById("errorText").innerText = "Please fill all fields before updating.";
        // Show your custom error popup instead of alert
        document.getElementById("errorPopup").style.display = "flex";
        return;
    }

    // show loader if fields are filled
    document.getElementById("cpLoader").style.display = "flex";

    let formData = new URLSearchParams();
    formData.append("username", user);
    formData.append("oldPassword", oldPass);
    formData.append("newPassword", newPass);

    fetch("https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec", {
        method:"POST",
        body: formData
    })
    .then(res => res.text())
    .then(text => {
        document.getElementById("cpLoader").style.display = "none";
        let data;
        try {
            data = JSON.parse(text);
        } catch(e) {
            data = {status:"fail"};
        }

        if(data.status === "updated"){
            // Hide the change password box and show success
            document.getElementById("changeBox").style.display = "none";
            document.getElementById("successPopup").style.display = "flex";
        } else {
            document.getElementById("errorText").innerText = "Invalid Username or Old Password";
            document.getElementById("errorPopup").style.display = "flex";
        }
    })
    .catch(err => {
        document.getElementById("cpLoader").style.display = "none";
        document.getElementById("errorText").innerText = "Server Error. Please try again.";
        document.getElementById("errorPopup").style.display = "flex";
    });
}

// ✅ CLOSE SUCCESS POPUP
function closeSuccess(){
document.getElementById("successPopup").style.display="none";
closeBox();
}

window.addEventListener("load", function(){
    setTimeout(() => {
        hideLoader();
    }, 500);
});
    
function closeError(){
document.getElementById("errorPopup").style.display="none";
}
</script>
</body>
</html>
