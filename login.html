<!DOCTYPE html>
<html>
<head>
<title>Salary Prompt - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- MODERN GLOBAL STYLES --- */
:root {
    --primary: #3b1eff;
    --primary-dark: #2400b7;
    --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --error: #ef4444;
    --success: #10b981;
    --radius: 12px;
}

body {
    margin: 0;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: var(--bg-gradient);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    color: var(--text-main);
    justify-content: space-between;
}

/* --- SPLIT TOP ILLUSTRATION --- */
.top {
    position: relative;
    width: 100%;
    height: 38vh;
    overflow: hidden;
    margin: 0;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
}

.illustration {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("https://hescomsalary1-sudo.github.io/salary-data/COVER_IMAGE2.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.top::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(to bottom, rgba(248,250,252,0) 0%, rgba(248,250,252,1) 100%);
    z-index: 2;
}

/* --- LOGIN CONTAINER --- */
.bottom {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    flex-grow: 1;
    z-index: 3;
    margin-top: -40px; /* Pulls login box slightly over the illustration blend */
}

.login-box {
    width: 100%;
    max-width: 360px;
    background: var(--card-bg);
    padding: 35px 30px;
    border-radius: var(--radius);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
}

/* --- MODERN INPUTS --- */
.input-group {
    margin-bottom: 20px;
    position: relative;
}

input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #cbd5e1;
    outline: none;
    font-size: 15px;
    background: #f8fafc;
    border-radius: 8px;
    box-sizing: border-box;
    transition: all 0.25s ease;
    color: var(--text-main);
}

input::placeholder {
    color: #94a3b8;
}

input:focus {
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(59, 30, 255, 0.1);
}

.toggle-password {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    user-select: none;
    transition: color 0.2s;
}

.toggle-password:hover {
    color: var(--primary-dark);
}

/* --- BUTTONS --- */
button {
    width: 100%;
    padding: 14px;
    border: none;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px -1px rgba(59, 30, 255, 0.2);
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 15px -3px rgba(59, 30, 255, 0.3);
}

button:active {
    transform: translateY(1px);
}

button + button {
    margin-top: 12px;
}

.change-btn {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--primary);
    box-shadow: none;
}

.change-btn:hover {
    background: rgba(59, 30, 255, 0.05);
    color: var(--primary-dark);
    border-color: var(--primary-dark);
    box-shadow: none;
    transform: none;
}

/* --- ALERTS & ERRORS --- */
#error {
    color: var(--error);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 15px;
    text-align: center;
    background: rgba(239, 68, 68, 0.1);
    padding: 10px;
    border-radius: 6px;
    display: none; /* Controlled dynamically by text status hidden natively */
}
#error:not(:empty) {
    display: block;
}

/* --- PREMIUM MORPHING GLASS LOADER --- */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(15, 23, 42, 0.3);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    transition: opacity 0.4s ease;
}

.morph-spinner {
    width: 100px;
    height: 100px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.morph-spinner::before,
.morph-spinner::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary), #00d2ff);
    opacity: 0.6;
    animation: morph 3s linear infinite;
}

.morph-spinner::after {
    animation-delay: -1.5s;
    background: linear-gradient(135deg, #00c9a7, var(--primary));
    opacity: 0.4;
}

.inner-core {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    z-index: 10;
    box-shadow: inset 0 0 10px rgba(36, 0, 183, 0.2), 0 0 20px rgba(255, 255, 255, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
}

.loader-text {
    margin-top: 40px;
    font-weight: 700;
    color: white;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

@keyframes morph {
    0% { transform: rotate(0deg) scale(1); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    50% { transform: rotate(180deg) scale(1.1); border-radius: 70% 30% 30% 70% / 50% 60% 40% 60%; }
    100% { transform: rotate(360deg) scale(1); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
}

/* --- CHANGE PASSWORD LOADER --- */
#cpLoader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.6); 
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 250000; 
}

.cp-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top: 4px solid #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* --- MODAL DIALOGS (POP-UPS) --- */
#changeBox, #successPopup, #errorPopup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    justify-content: center;
    align-items: center;
    z-index: 200000;
}

.change-box-content, .popup-content {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: var(--radius);
    width: 100%;
    max-width: 320px;
    box-sizing: border-box;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    text-align: center;
    animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.change-box-content h3 {
    margin: 0 0 20px 0;
    color: var(--text-main);
    font-size: 20px;
    font-weight: 600;
}

.change-box-content input {
    margin-bottom: 15px;
    background: #f1f5f9;
}

.cancel-link {
    display: inline-block;
    margin-top: 16px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
}

.cancel-link:hover {
    color: var(--text-main);
}

/* --- MODERN WAVE FOOTER --- */
.footer-blue {
    width: 100%;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    position: relative;
    height: 80px;
    margin-top: 40px;
}

.footer-wave {
    position: absolute;
    top: -45px;
    left: 0;
    width: 100%;
    line-height: 0;
}

.footer-wave svg {
    display: block;
    width: 100%;
    height: 46px;
}
</style>
</head>

<body>

<div id="loader">
    <div class="morph-spinner">
        <div class="inner-core">
             <span style="font-size: 12px;">⚡</span>
        </div>
    </div>
    <div class="loader-text">Securing Session</div>
</div>

<div class="top">
    <div class="illustration"></div>
</div>

<div class="bottom">
    <div class="login-box">
        <div id="error"></div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword()">View</span>
        </div>

        <button onclick="login()">Login</button>
        <button class="change-btn" onclick="openChangePassword()">🔐 Change Password</button>
    </div>
</div>

<div id="changeBox">
    <div class="change-box-content">
        <h3>Update Password</h3>
        <input id="cp_user" placeholder="Username">
        <input id="old_pass" type="password" placeholder="Old Password">
        <input id="new_pass" type="password" placeholder="New Password">

        <button onclick="changePassword()">Save New Password</button>
        <span class="cancel-link" onclick="closeBox()">Cancel</span>
    </div>
</div>

<div id="cpLoader">
  <div class="cp-spinner"></div>
</div>

<div id="successPopup">
    <div class="popup-content" style="animation: pop 0.3s ease;">
        <div style="font-size: 46px; color: var(--success); margin-bottom: 10px;">✔</div>
        <h3 style="margin: 5px 0; font-size: 20px;">Success</h3>
        <p style="color: var(--text-muted); margin: 5px 0 20px 0; font-size: 14px;">Password Updated Successfully</p>
        <button onclick="closeSuccess()">OK</button>
    </div>
</div>

<div id="errorPopup">
    <div class="popup-content" style="animation: pop 0.3s ease;">
        <div style="font-size: 46px; color: var(--error); margin-bottom: 10px;">✖</div>
        <h3 style="margin: 5px 0; color: var(--error); font-size: 20px;">Error</h3>
        <p id="errorText" style="color: var(--text-muted); margin: 5px 0 20px 0; font-size: 14px;">Invalid Details</p>
        <button onclick="closeError()" style="background: var(--error); box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);">OK</button>
    </div>
</div> 

<div class="footer-blue">
    <div class="footer-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#2400b7" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,202.7C960,224,1056,224,1152,197.3C1248,171,1344,117,1392,90.7L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>
</div>

<script>
function showLoader(text = "Securing Session"){
    const loader = document.getElementById("loader");
    const txt = document.querySelector(".loader-text");

    loader.style.display = "flex";
    loader.style.opacity = "1";   // 🔥 FIX
    txt.innerText = text;
}

function hideLoader(){
    const loader = document.getElementById("loader");

    loader.style.opacity = "0";

    setTimeout(()=>{
        loader.style.display = "none";
    },400);
}
// ✅ LOGIN FUNCTION
function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "" || pass === ""){
document.getElementById("errorText").innerText="Invalid Username or Password";
document.getElementById("errorPopup").style.display="flex";
return;
}
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = "DEV-" + Date.now() + "-" + Math.floor(Math.random()*10000);
  localStorage.setItem("deviceId", deviceId);
}
// show loader
showLoader("Verifying Credentials...");

let url = "https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec"
  + "?username=" + user
  + "&password=" + pass
  + "&deviceId=" + deviceId;

fetch(url)
.then(res => res.text())
.then(text => {

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// hide loader


// ... inside your login() function after success:
if(data.status === "success"){
    localStorage.setItem("currentUser", user);
    localStorage.setItem("role", data.role);

    // Update text for better UX
    document.querySelector(".loader-text").innerText = "Success! Entering App...";

    setTimeout(function(){
        window.location = "home.html";
    }, 1000); // 1 second total for a premium feel
}else{

hideLoader();
document.getElementById("error").innerText="Invalid Username or Password";

}
})
.catch(err => {
document.getElementById("loader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}


// ✅ TOGGLE PASSWORD
function togglePassword(){
let passField=document.getElementById("password");
passField.type = passField.type === "password" ? "text" : "password";
}


// ✅ OPEN CHANGE PASSWORD
function openChangePassword(){
    document.getElementById("changeBox").style.display="flex";
    document.getElementById("cp_user").value = document.getElementById("username").value;
}

// ✅ CLOSE CHANGE PASSWORD
function closeBox(){
document.getElementById("changeBox").style.display="none";
}


// ✅ CHANGE PASSWORD FUNCTION
// ✅ UPDATED CHANGE PASSWORD FUNCTION
function changePassword(){

    let user = document.getElementById("cp_user").value.trim();
    let oldPass = document.getElementById("old_pass").value.trim();
    let newPass = document.getElementById("new_pass").value.trim();

    // Check if any fields are empty
    if(user == "" || oldPass == "" || newPass == ""){
        // Set the error message
        document.getElementById("errorText").innerText = "Please fill all fields before updating.";
        // Show your custom error popup instead of alert
        document.getElementById("errorPopup").style.display = "flex";
        return;
    }

    // show loader if fields are filled
    document.getElementById("cpLoader").style.display = "flex";

    let formData = new URLSearchParams();
    formData.append("username", user);
    formData.append("oldPassword", oldPass);
    formData.append("newPassword", newPass);

    fetch("https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec", {
        method:"POST",
        body: formData
    })
    .then(res => res.text())
    .then(text => {
        document.getElementById("cpLoader").style.display = "none";
        let data;
        try {
            data = JSON.parse(text);
        } catch(e) {
            data = {status:"fail"};
        }

        if(data.status === "updated"){
            // Hide the change password box and show success
            document.getElementById("changeBox").style.display = "none";
            document.getElementById("successPopup").style.display = "flex";
        } else {
            document.getElementById("errorText").innerText = "Invalid Username or Old Password";
            document.getElementById("errorPopup").style.display = "flex";
        }
    })
    .catch(err => {
        document.getElementById("cpLoader").style.display = "none";
        document.getElementById("errorText").innerText = "Server Error. Please try again.";
        document.getElementById("errorPopup").style.display = "flex";
    });
}


// ✅ CLOSE SUCCESS POPUP
function closeSuccess(){
document.getElementById("successPopup").style.display="none";
closeBox();
}


window.addEventListener("load", function(){
    setTimeout(() => {
        hideLoader();
    }, 500);
});
    
  function closeError(){
document.getElementById("errorPopup").style.display="none";
}
</script>
</body>
</html>
