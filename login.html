<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salary Prompt - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2400b7;
            --secondary: #3b1eff;
            --text-dark: #333;
            --bg-light: #f8f9fc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* Container for everything */
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        /* Header Section */
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--primary);
            font-weight: 600;
        }

        .header p {
            margin: 5px 0 20px 0;
            font-size: 14px;
            color: #666;
        }

        /* Illustration */
        .illustration img {
            width: 180px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .illustration img:hover {
            transform: translateY(-5px);
        }

        /* Login Box Card */
        .login-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 2px solid #eee;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus {
            border-bottom: 2px solid var(--secondary);
        }

        .toggle-password {
            position: absolute;
            right: 0;
            top: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--secondary);
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-bottom: 12px;
        }

        button:active {
            transform: scale(0.98);
        }

        .change-btn {
            background: transparent;
            color: var(--secondary);
            border: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .change-btn:hover {
            background: #f0f0ff;
            border-color: var(--secondary);
        }

        /* Popups & Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Skeleton Loader Improvements */
        #loader {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: none;
            flex-direction: column;
            padding: 50px 20px;
            gap: 20px;
        }

        .skeleton {
            background: #f0f0f0;
            background-image: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #error { color: #ff3b3b; font-size: 13px; margin-bottom: 15px; }

    </style>
</head>
<body>

    <div id="loader">
        <div class="skeleton" style="height: 150px; border-radius: 20px;"></div>
        <div class="skeleton" style="height: 30px; width: 60%;"></div>
        <div class="skeleton" style="height: 50px;"></div>
        <div class="skeleton" style="height: 50px;"></div>
    </div>

    <div class="login-wrapper">
        <div class="header">
            <h1>Salary Prompt</h1>
            <p>Secure Employee Login</p>
        </div>

        <div class="illustration">
            <img src="https://media.tenor.com/lgyTXgehpA0AAAAe/blue-man-on-laptop-blue-man.png" alt="illustration">
        </div>

        <div class="login-box">
            <div id="error"></div>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                <span class="toggle-password" onclick="togglePassword()">SHOW</span>
            </div>
            <button onclick="login()">Login to Dashboard</button>
            <button class="change-btn" onclick="openChangePassword()">🔐 Change Password</button>
        </div>
    </div>

    <div id="changeBox" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0">Change Password</h3>
            <div class="input-group">
                <input id="cp_user" placeholder="Username">
            </div>
            <div class="input-group">
                <input id="old_pass" type="password" placeholder="Old Password">
            </div>
            <div class="input-group">
                <input id="new_pass" type="password" placeholder="New Password">
            </div>
            <button onclick="changePassword()">Update Now</button>
            <button class="change-btn" style="border:none" onclick="closeBox()">Cancel</button>
        </div>
    </div>

    <div id="successPopup" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size:50px; color:#4CAF50;">✔</div>
            <h3>Updated!</h3>
            <p>Your password has been changed.</p>
            <button onclick="closeSuccess()">Perfect</button>
        </div>
    </div>

    <div id="errorPopup" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size:50px; color:#ff3b3b;">✖</div>
            <h3 style="color:#ff3b3b;">Error</h3>
            <p id="errorText">Invalid Credentials</p>
            <button onclick="closeError()" style="background:#ff3b3b;">Try Again</button>
        </div>
    </div>

    <script>
        // Use your existing JS logic here - I've kept the function names the same so it works immediately.
        
        function login() {
            let user = document.getElementById("username").value.trim();
            let pass = document.getElementById("password").value.trim();
            if(!user || !pass) {
                document.getElementById("error").innerText = "Fields cannot be empty";
                return;
            }
            document.getElementById("loader").style.display = "flex";
            
            // Your Fetch Logic...
            let url = "https://script.google.com/macros/s/AKfycbwpKkkmsAJiaq0-Be6s3sRrCjn1fRxyNpKYXYHzh7Wug30OaSmq-0mRXz_P3hWxdANv/exec?username=" + user + "&password=" + pass;
            fetch(url).then(res => res.json()).then(data => {
                if(data.status === "success"){
                    localStorage.setItem("currentUser", user);
                    window.location = "home.html";
                } else {
                    document.getElementById("loader").style.display = "none";
                    document.getElementById("error").innerText = "Invalid Username or Password";
                }
            }).catch(() => {
                document.getElementById("loader").style.display = "none";
                alert("Server Error");
            });
        }

        function togglePassword() {
            let p = document.getElementById("password");
            let t = document.querySelector(".toggle-password");
            if (p.type === "password") {
                p.type = "text";
                t.innerText = "HIDE";
            } else {
                p.type = "password";
                t.innerText = "SHOW";
            }
        }

        function openChangePassword() { document.getElementById("changeBox").style.display = "flex"; }
        function closeBox() { document.getElementById("changeBox").style.display = "none"; }
        function closeSuccess() { document.getElementById("successPopup").style.display = "none"; closeBox(); }
        function closeError() { document.getElementById("errorPopup").style.display = "none"; }
        
        window.onload = () => { document.getElementById("loader").style.display = "none"; };
    </script>
</body>
</html>
