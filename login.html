<!DOCTYPE html>
<html>
<head>
<title>Salary Prompt - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: white;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* TOP */
.top {
    position: relative;
    width: 100%;
    height: 50vh; /* 50% of the screen height */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    margin: 0;
}

.top p {
    position: absolute;
    top: 55px; /* Positioned directly under h1 */
    right: 27px;
    margin: 0;
    font-size: 14px;
    z-index: 10;
    color: red;
    opacity: 0.9;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.top h1 {
    position: absolute;
    top: 20px;
    right: 27px;
    margin: 0;
    font-size: 28px;
    letter-spacing: 1px;
    z-index: 10;
    color: blue;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}



/* LOGIN */
.bottom {
    display: flex;
    justify-content: center;
    padding-bottom: 40px;
}

.login-box {
width: 85%;
max-width: 320px;
}

.input-group {
margin-bottom: 25px;
position: relative;
}

input {
width: 100%;
padding: 10px 0;
border: none;
border-bottom: 2px solid #ccc;
outline: none;
font-size: 14px;
}

input:focus {
border-bottom: 2px solid #5e00a3;
}

.toggle-password {
position: absolute;
right: 0;
top: 10px;
cursor: pointer;
font-size: 13px;
color: #5e00a3;
}

button {
width: 100%;
padding: 12px;
border: none;
background: linear-gradient(135deg, #2400b7, #3b1eff);
color: white;
font-size: 15px;
border-radius: 25px;
cursor: pointer;
}

#error {
color: red;
font-size: 13px;
margin-bottom: 15px;
text-align: center;
}

/* ✅ SKELETON LOADER */

/* ✅ MODERN GLASS LOADER */
/* ✅ PREMIUM MORPHING GLASS LOADER */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999999;
}

/* THE MORPHING LIQUID SPINNER */
.morph-spinner {
    width: 100px;
    height: 100px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.morph-spinner::before,
.morph-spinner::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
    background: linear-gradient(135deg, #2400b7, #3b1eff, #00d2ff);
    opacity: 0.6;
    animation: morph 3s linear infinite;
}

.morph-spinner::after {
    animation-delay: -1.5s;
    background: linear-gradient(135deg, #00c9a7, #3b1eff);
    opacity: 0.4;
}

.inner-core {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    z-index: 10;
    box-shadow: inset 0 0 10px rgba(36, 0, 183, 0.2), 0 0 20px rgba(255, 255, 255, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TEXT STYLE */
.loader-text {
    margin-top: 40px;
    font-weight: 800;
    color: #2400b7;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(36, 0, 183, 0.1);
}

/* KEYFRAMES */
@keyframes morph {
    0% { transform: rotate(0deg) scale(1); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    50% { transform: rotate(180deg) scale(1.1); border-radius: 70% 30% 30% 70% / 50% 60% 40% 60%; }
    100% { transform: rotate(360deg) scale(1); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
}
.illustration {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

.illustration img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ensures image fills the area without distorting */
    border-radius: 0; /* Remove radius for a full-screen look */
}
/* small animation */
.illustration img:active{
transform:scale(0.95);
}

  /* CHANGE PASSWORD LOADER */
/* UPDATED CP LOADER */
#cpLoader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Darker semi-transparent background to hide the form while loading */
    background: rgba(0, 0, 0, 0.6); 
    display: none;
    justify-content: center;
    align-items: center;
    /* This must be higher than #changeBox's 100000 */
    z-index: 200000; 
}

.cp-spinner {
    width: 60px;
    height: 60px;
    border: 6px solid rgba(255, 255, 255, 0.3);
    border-top: 6px solid #ffffff; /* White spinner looks better on dark background */
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
  @keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

  button + button{
margin-top: 12px;
}

  .change-btn{
background: transparent;
color: #3b1eff;
border: 2px solid #3b1eff;
border-radius: 25px;
font-weight: 500;
transition: 0.3s;
}

.change-btn:hover{
background: #3b1eff;
color: white;
}
/* NEW BLUE SECTION FOR BOTTOM */
/* Update this section */
.footer-blue {
    flex-grow: 1;
    background: linear-gradient(135deg, #2400b7, #3b1eff);
    width: 100%;
    margin-top: 60px; /* Increased margin to make room for the wave */
    position: relative; /* Required for wave positioning */
}

/* Add this new section */
.footer-wave {
    position: absolute;
    top: -59px; /* Pulls the wave above the blue block */
    left: 0;
    width: 100%;
    line-height: 0;
}

.footer-wave svg {
    display: block;
    width: 100%;
    height: 60px;
}

.bottom {
    display: flex;
    justify-content: center;
    padding: 30px 0; /* Space between half-screen image and inputs */
    background: white;
}

    /* Modern Backdrop with Blur */
#changeBox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.7); /* Deep elegant blue-grey overlay */
    backdrop-filter: blur(8px); /* Blurs the login page behind the popup */
    justify-content: center;
    align-items: center;
    z-index: 100000;
}

/* Beautiful Modal Design */
.change-box-content {
    background: #ffffff;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
    
    /* Animation: Slides down and fades in */
    animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes slideIn {
    from { transform: translateY(-30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.change-box-content h3 {
    margin: 0 0 20px 0;
    color: #2400b7;
    font-size: 22px;
}

/* Styled inputs for the popup */
.change-box-content input {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

.cancel-link {
    display: block;
    margin-top: 15px;
    color: #64748b;
    font-size: 14px;
    cursor: pointer;
    text-decoration: underline;
}

    /* Update both the success and error popup styles */
#successPopup, #errorPopup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); /* Darker overlay */
    justify-content: center;
    align-items: center;
    /* CHANGE THIS TO BE HIGHER THAN 100000 */
    z-index: 200000; 
}
</style>
</head>

<body>

<!-- ✅ PREMIUM MORPHING LOADER -->
<div id="loader">
    <div class="morph-spinner">
        <div class="inner-core">
             <!-- Optional small icon inside -->
             <span style="font-size: 10px;">⚡</span>
        </div>
    </div>
    <div class="loader-text">Securing Session</div>
</div>

<!-- TOP -->
<div class="top">
    <div class="illustration">
        <img src="https://img.freepik.com/premium-vector/man-working-laptop-with-coffee-mug-vector-illustration_1512342-133.jpg?semt=ais_hybrid&w=740&q=80" alt="salary illustration">
    </div>
    <h1>Salary Prompt</h1>
    <p>Secure Employee Login</p>
</div>

<!-- LOGIN -->
<div class="bottom">
<div class="login-box">

<div id="error"></div>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<span class="toggle-password" onclick="togglePassword()">View</span>
</div>

<button onclick="login()">Login</button>
  <button class="change-btn" onclick="openChangePassword()">
🔐 Change Password
</button>
</div>
</div>

<script>

// ✅ LOGIN FUNCTION
function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

if(user === "" || pass === ""){
document.getElementById("errorText").innerText="Invalid Username or Password";
document.getElementById("errorPopup").style.display="flex";
return;
}
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = "DEV-" + Date.now() + "-" + Math.floor(Math.random()*10000);
  localStorage.setItem("deviceId", deviceId);
}
// show loader
document.getElementById("loader").style.display="flex";

let url = "https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec"
  + "?username=" + user
  + "&password=" + pass
  + "&deviceId=" + deviceId;

fetch(url)
.then(res => res.text())
.then(text => {

let data;

try{
data = JSON.parse(text);
}catch(e){
console.log("Server response:", text);
data = {status:"fail"};
}

// hide loader


// ... inside your login() function after success:
if(data.status === "success"){
    localStorage.setItem("currentUser", user);
    localStorage.setItem("role", data.role);

    // Update text for better UX
    document.querySelector(".loader-text").innerText = "Success! Entering App...";

    setTimeout(function(){
        window.location = "home.html";
    }, 1000); // 1 second total for a premium feel
}else{

document.getElementById("loader").style.display="none"; // hide loader on error
document.getElementById("error").innerText="Invalid Username or Password";

}
})
.catch(err => {
document.getElementById("loader").style.display="none";
document.getElementById("error").innerText="Server Error";
});
}


// ✅ TOGGLE PASSWORD
function togglePassword(){
let passField=document.getElementById("password");
passField.type = passField.type === "password" ? "text" : "password";
}


// ✅ OPEN CHANGE PASSWORD
function openChangePassword(){
    document.getElementById("changeBox").style.display="flex";
    document.getElementById("cp_user").value = document.getElementById("username").value;
}

// ✅ CLOSE CHANGE PASSWORD
function closeBox(){
document.getElementById("changeBox").style.display="none";
}


// ✅ CHANGE PASSWORD FUNCTION
// ✅ UPDATED CHANGE PASSWORD FUNCTION
function changePassword(){

    let user = document.getElementById("cp_user").value.trim();
    let oldPass = document.getElementById("old_pass").value.trim();
    let newPass = document.getElementById("new_pass").value.trim();

    // Check if any fields are empty
    if(user == "" || oldPass == "" || newPass == ""){
        // Set the error message
        document.getElementById("errorText").innerText = "Please fill all fields before updating.";
        // Show your custom error popup instead of alert
        document.getElementById("errorPopup").style.display = "flex";
        return;
    }

    // show loader if fields are filled
    document.getElementById("cpLoader").style.display = "flex";

    let formData = new URLSearchParams();
    formData.append("username", user);
    formData.append("oldPassword", oldPass);
    formData.append("newPassword", newPass);

    fetch("https://script.google.com/macros/s/AKfycbzeO5RppL-lE_62OuL4VQ5FYZiehPMPFsH6NC9X2_i40YEIzXPPjW8-QUH1QpfS1Jg1/exec", {
        method:"POST",
        body: formData
    })
    .then(res => res.text())
    .then(text => {
        document.getElementById("cpLoader").style.display = "none";
        let data;
        try {
            data = JSON.parse(text);
        } catch(e) {
            data = {status:"fail"};
        }

        if(data.status === "updated"){
            // Hide the change password box and show success
            document.getElementById("changeBox").style.display = "none";
            document.getElementById("successPopup").style.display = "flex";
        } else {
            document.getElementById("errorText").innerText = "Invalid Username or Old Password";
            document.getElementById("errorPopup").style.display = "flex";
        }
    })
    .catch(err => {
        document.getElementById("cpLoader").style.display = "none";
        document.getElementById("errorText").innerText = "Server Error. Please try again.";
        document.getElementById("errorPopup").style.display = "flex";
    });
}


// ✅ CLOSE SUCCESS POPUP
function closeSuccess(){
document.getElementById("successPopup").style.display="none";
closeBox();
}


// ✅ PAGE LOAD
window.onload=function(){
document.getElementById("loader").style.display="none";
document.body.style.overflow="auto";
};
  function closeError(){
document.getElementById("errorPopup").style.display="none";
}
// 🚫 Prevent going back to home after logout
history.pushState(null, null, location.href);

window.onpopstate = function () {
    history.go(1);
};
</script>
<!-- ✅ CHANGE PASSWORD BOX -->
<div id="changeBox">
    <div class="change-box-content">
        <h3>Update Password</h3>

        <input id="cp_user" placeholder="Username">
        <input id="old_pass" type="password" placeholder="Old Password">
        <input id="new_pass" type="password" placeholder="New Password">

        <button onclick="changePassword()">Save New Password</button>
        <span class="cancel-link" onclick="closeBox()">Cancel</span>
    </div>
</div>

<!-- ✅ LOADER -->
<div id="cpLoader">
  <div class="cp-spinner"></div>
</div>

<!-- ✅ SUCCESS POPUP -->
<div id="successPopup">
<div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
  <div style="font-size:40px;color:green;">✔</div>
  <h3 style="margin:10px 0;">Success</h3>
  <p>Password Updated Successfully</p>

  <button onclick="closeSuccess()" style="margin-top:10px;">OK</button>

</div>
</div>

 <div id="errorPopup">
  <div style="background:white;padding:25px;border-radius:15px;width:280px;text-align:center;animation:pop 0.3s ease;">
  <div style="font-size:40px;color:red;">✖</div>
  <h3 style="margin:10px 0;color:red;">Error</h3>
  <p id="errorText">Invalid Details</p>

  <button onclick="closeError()" style="margin-top:10px;background:red;">OK</button>

</div>
</div> 
  <div class="footer-blue">
    <div class="footer-wave">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#2400b7" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,202.7C960,224,1056,224,1152,197.3C1248,171,1344,117,1392,90.7L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>
</div>
</body>
</html>
