<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden; /* ❌ no body scroll */
  background:#0f172a;
  color:white;
  font-family:Segoe UI;
}

/* SCROLL AREA */
#chatWrapper{
  position:absolute;
  top:0;
  bottom:60px;
  left:0;
  right:0;
  overflow-y:auto;  /* ✅ SCROLL HERE ONLY */
  -webkit-overflow-scrolling:touch;
  padding:10px;
}

/* messages */
.msg{
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  max-width:80%;
}
.user{background:#3b82f6;margin-left:auto}
.bot{background:#334155}

/* input */
#inputBar{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  display:flex;
  padding:10px;
  background:#1e293b;
}
#input{flex:1;padding:10px;border-radius:10px;border:none}
button{margin-left:6px;padding:10px;background:#22c55e;border:none;color:white;border-radius:10px}
</style>
</head>

<body>

<div id="chatWrapper"></div>

<div id="inputBar">
<input id="input">
<button onclick="send()">Send</button>
</div>

<script>
let chat=document.getElementById("chatWrapper");

/* ADD MESSAGE */
function add(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=t;
  chat.appendChild(d);
}

/* SEND */
function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  add("Reply...","bot");
}

/* 🔥 FORCE SCROLL TEST */
for(let i=1;i<=100;i++){
  add("Old message "+i,"bot");
}

/* 🚫 BLOCK PULL-TO-REFRESH (FINAL FIX) */
let startY=0;

chat.addEventListener("touchstart",function(e){
  startY=e.touches[0].clientY;
},{passive:false});

chat.addEventListener("touchmove",function(e){
  let currentY=e.touches[0].clientY;

  if(chat.scrollTop===0 && currentY>startY){
    e.preventDefault(); /* 🔥 stop refresh */
  }
},{passive:false});
</script>

</body>
</html>
