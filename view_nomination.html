<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI';
background:#f4f6fb;
margin:0;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:15px;
text-align:center;
}

/* CONTAINER */
.container{
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* INPUT */
input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#3b1eff;
color:white;
font-weight:600;
}

.edit-btn{background:#ff9800;}
.cancel-btn{background:#999;}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
align-items:center;
justify-content:center;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #3b1eff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="top">
<h3>📋 My Nomination</h3>
</div>

<div id="loader"><div class="spinner"></div></div>

<div class="container">

<div id="viewBox"></div>

<div id="editBox"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwT7GKCLUMvBzv2ytvni_HWYUiWZKUO6tYYg6QvSKsfkRkoFuaL6rHky5yVP6VtMCLdAQ/exec";
const user=localStorage.getItem("currentUser");

/* LOAD DATA */
function loadData(){

fetch(API_URL+"?user="+user)
.then(res=>res.json())
.then(data=>{

document.getElementById("loader").style.display="none";

let html="";

data.forEach(n=>{
html+=`
<div class="card">
<b>${n.name}</b><br>
${n.relation}<br>
Share: ${n.share}%
</div>
`;
});

// EDIT BUTTON
html+=`<button class="edit-btn" onclick='showEdit(${JSON.stringify(data)})'>✏ Edit</button>`;

document.getElementById("viewBox").innerHTML=html;

});

}

loadData();

/* SHOW EDIT FORM */
function showEdit(data){

let html=`<div class="card">
<h3>✏ Edit Nomination</h3>`;

data.forEach(n=>{
html+=`
<div class="nominee">

<input value="${n.name}" class="name">

<select class="relation">
<option>${n.relation}</option>
<option>Father</option>
<option>Mother</option>
<option>Wife</option>
<option>Husband</option>
<option>Son</option>
<option>Daughter</option>
<option>Brother</option>
<option>Sister</option>
<option>Other</option>
</select>

<input type="number" value="${n.share}" class="share">

</div>
`;
});

html+=`
<button onclick="updateData()">Update</button>
<button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
</div>
`;

document.getElementById("editBox").innerHTML=html;

}

/* UPDATE DATA */
function updateData(){

let nominees=[];

document.querySelectorAll(".nominee").forEach(n=>{
nominees.push({
name:n.querySelector(".name").value,
relation:n.querySelector(".relation").value,
share:n.querySelector(".share").value
});
});

document.getElementById("loader").style.display="flex";

// DELETE OLD + SAVE NEW
fetch(API_URL+"?action=delete&user="+user)
.then(()=>{

return fetch(API_URL,{
method:"POST",
body:JSON.stringify({user,nominees})
});

})
.then(res=>res.json())
.then(()=>{

document.getElementById("loader").style.display="none";

alert("Updated Successfully");

// refresh UI
document.getElementById("editBox").innerHTML="";
loadData();

});
}

/* CANCEL */
function cancelEdit(){
document.getElementById("editBox").innerHTML="";
}

</script>

</body>
</html>
