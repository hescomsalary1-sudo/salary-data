<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI';
background:#f4f6fb;
margin:0;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:15px;
text-align:center;
}

/* CONTAINER */
.container{
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* INPUT */
input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#3b1eff;
color:white;
font-weight:600;
}

.edit-btn{background:#ff9800;}
.cancel-btn{background:#999;}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
align-items:center;
justify-content:center;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #3b1eff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="top">
<h3>📋 My Nomination</h3>
</div>

<div id="loader"><div class="spinner"></div></div>

<div class="container">

<div id="viewBox"></div>

<div id="editBox"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzYMFFE-KfL5JamBrzIUC6oOCqP5eynVS3ksV2kkF-dY6g4J1Y08qdAQKErGg64qNS1BQ/exec";
const user=localStorage.getItem("currentUser");

/* LOAD DATA */
function loadData(){

fetch(API_URL+"?user="+user)
.then(res=>res.json())
.then(data=>{

document.getElementById("loader").style.display="none";

let empName = data.length > 0 ? data[0].emp_name : "";

let html = `

<!-- 🔷 EMPLOYEE PREMIUM CARD -->
<div style="
background:linear-gradient(135deg,#3b1eff,#6a5cff);
padding:20px;
border-radius:20px;
color:white;
margin-bottom:15px;
box-shadow:0 12px 30px rgba(59,30,255,0.3);
position:relative;
overflow:hidden;
">

<div style="font-size:13px;opacity:0.8;">Employee Name</div>

<div style="font-size:22px;font-weight:700;margin-top:5px;letter-spacing:0.5px;">
${empName || "Not Available"}
</div>

<!-- decorative circle -->
<div style="
position:absolute;
right:-20px;
bottom:-20px;
width:100px;
height:100px;
background:rgba(255,255,255,0.1);
border-radius:50%;
"></div>

</div>
`;
data.forEach(n=>{
html+=`
<div class="card">
<b>${n.name}</b><br>
Relation: ${n.relation}<br>
DOB: ${n.dob || '-'}<br>
Mobile: ${n.mobile || '-'}<br>
Address: ${n.address || '-'}<br>
Share: ${n.share}%<br>
Aadhar: ${n.aadhar || '-'}<br>
Guardian: ${n.guardian || '-'}
</div>
`;
});

// EDIT BUTTON
html+=`<button class="edit-btn" onclick='showEdit(${JSON.stringify(data)})'>✏ Edit</button>`;

document.getElementById("viewBox").innerHTML=html;

});

}

loadData();

/* SHOW EDIT FORM */
function showEdit(data){

let empName = data.length > 0 ? data[0].emp_name : "";

let html = `<div class="card">
<input id="editEmpName" value="${empName}" placeholder="Employee Name">
`;

data.forEach(n=>{

html+=`
<div class="nominee">

<input value="${n.name || ''}" class="name">

<select class="relation">
<option ${n.relation=="Father"?"selected":""}>Father</option>
<option ${n.relation=="Mother"?"selected":""}>Mother</option>
<option ${n.relation=="Wife"?"selected":""}>Wife</option>
<option ${n.relation=="Husband"?"selected":""}>Husband</option>
<option ${n.relation=="Son"?"selected":""}>Son</option>
<option ${n.relation=="Daughter"?"selected":""}>Daughter</option>
<option ${n.relation=="Brother"?"selected":""}>Brother</option>
<option ${n.relation=="Sister"?"selected":""}>Sister</option>
<option ${n.relation=="Other"?"selected":""}>Other</option>
</select>

<input type="text" value="${formatDate(n.dob)}" placeholder="DD/MM/YYYY" class="dob">

<input placeholder="Mobile" value="${n.mobile || ''}" class="mobile">

<input placeholder="Address" value="${n.address || ''}" class="address">

<!-- ✅ IMPORTANT CHANGE -->
<input type="number" placeholder="Share %" value="${n.share || ''}" class="share" oninput="checkEditShare()">

<input placeholder="Aadhar" value="${n.aadhar || ''}" class="aadhar">

<input placeholder="Guardian" value="${n.guardian || ''}" class="guardian">

</div>
`;

});

// ✅ ADD STATUS DISPLAY
html += `<div id="editShareStatus"></div>`;

html+=`
<button onclick="updateData()">Update</button>
<button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
</div>
`;

document.getElementById("editBox").innerHTML=html;

// ✅ CALL AFTER LOAD
checkEditShare();
}

/* UPDATE DATA */
function updateData(){
let empName = document.getElementById("editEmpName").value;
let shares = document.querySelectorAll(".share");
let total = 0;

shares.forEach(s=>{
total += Number(s.value || 0);
});

// ❌ BLOCK IF NOT 100
if(total > 100){
alert("Total share cannot exceed 100%");
return;
}

let nominees=[];

document.querySelectorAll(".nominee").forEach(n=>{
nominees.push({
name:n.querySelector(".name").value,
relation:n.querySelector(".relation").value,
dob:n.querySelector(".dob").value,
mobile:n.querySelector(".mobile").value,
address:n.querySelector(".address").value,
share:n.querySelector(".share").value,
aadhar:n.querySelector(".aadhar").value,
guardian:n.querySelector(".guardian").value
});
});

document.getElementById("loader").style.display="flex";

// STEP 1: DELETE
fetch(API_URL+"?action=delete&user="+user)
.then(res=>res.json())
.then(delRes=>{

console.log("Delete:", delRes);

// STEP 2: INSERT NEW
return fetch(API_URL,{
method:"POST",
body:JSON.stringify({user, emp_name: empName, nominees})
});

})
.then(res=>res.json())
.then(()=>{
document.getElementById("loader").style.display="none";

showPopup();

})
.catch(err=>{
document.getElementById("loader").style.display="none";
console.log(err);
alert("Error updating");
});

}
/* CANCEL */
function cancelEdit(){
document.getElementById("editBox").innerHTML="";
}
function checkEditShare(){

let shares = document.querySelectorAll(".share");
let total = 0;

shares.forEach(s=>{
total += Number(s.value || 0);
});

let status = document.getElementById("editShareStatus");

status.innerText = "Total Share: " + total + "%";

// ✅ BELOW 100 (allowed)
if(total < 100){
status.style.color = "orange";
}

// ✅ EXACT 100 (perfect)
else if(total === 100){
status.style.color = "green";
}

// ❌ ABOVE 100 (not allowed)
else{
status.style.color = "red";
}
}

  function formatDate(dateStr){

if(!dateStr) return "";

let d = new Date(dateStr);

if(isNaN(d)) return dateStr;

let day = String(d.getDate()).padStart(2,'0');
let month = String(d.getMonth()+1).padStart(2,'0');
let year = d.getFullYear();

return `${day}/${month}/${year}`;
}

  function showPopup(){
document.getElementById("successPopup").style.display = "flex";
}

function closePopup(){
document.getElementById("successPopup").style.display = "none";
location.reload();
}
</script>
<div id="successPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);justify-content:center;align-items:center;z-index:999;">

  <div style="background:white;padding:25px;border-radius:15px;width:80%;max-width:300px;text-align:center;box-shadow:0 8px 25px rgba(0,0,0,0.2);">

    <div style="font-size:40px;color:#28a745;">✔</div>

    <h3 style="margin:10px 0;">Success</h3>

    <p style="color:#555;">Nomination updated successfully</p>

    <button onclick="closePopup()" style="background:#3b1eff;margin-top:15px;">OK</button>

  </div>

</div>
</body>
</html>
