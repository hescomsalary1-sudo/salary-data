<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:'Segoe UI';background:#f4f6fb;padding:15px;}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:12px;}
button{padding:10px;border:none;border-radius:10px;background:#3b1eff;color:white;}
</style>
</head>

<body>

<h3>My Nomination</h3>

<div id="list"></div>

<script>

const API_URL="YOUR_SCRIPT_URL";
const user=localStorage.getItem("currentUser");

fetch(API_URL+"?user="+user)
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(n=>{
html+=`
<div class="card">
<b>${n.name}</b><br>
${n.relation}<br>
Share: ${n.share}%
</div>
`;
});

// store for edit
localStorage.setItem("editNomination", JSON.stringify(data));

html+=`<button onclick="edit()">Edit</button>`;

document.getElementById("list").innerHTML=html;

});

function edit(){
window.location="nomination_form.html";
}

</script>

</body>
</html>
