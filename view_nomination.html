<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI';
background:#f4f6fb;
padding:15px;
margin:0;
}

.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:15px;
text-align:center;
border-radius:0 0 15px 15px;
margin:-15px -15px 15px -15px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#3b1eff;
color:white;
width:100%;
margin-top:10px;
font-weight:600;
}

.edit-btn{
background:#ff9800;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.7);
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #3b1eff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.empty{
text-align:center;
margin-top:50px;
color:#777;
}
</style>
</head>

<body>

<div class="top">
<h3>📋 My Nomination</h3>
</div>

<div id="loader"><div class="spinner"></div></div>

<div id="list"></div>

<script>

const API_URL="YOUR_SCRIPT_URL"; // 🔥 replace
const user=localStorage.getItem("currentUser");

fetch(API_URL+"?user="+user)
.then(res=>res.json())
.then(data=>{

document.getElementById("loader").style.display="none";

let html="";

if(data.length === 0){
html = `<div class="empty">No nomination found</div>`;
}else{

data.forEach(n=>{
html+=`
<div class="card">
<b>${n.name}</b><br>
${n.relation}<br>
Share: ${n.share}%
</div>
`;
});

// 🔥 store data for edit
localStorage.setItem("editNomination", JSON.stringify(data));

// 🔥 working edit button
html+=`<button class="edit-btn" onclick="edit()">✏ Edit Nomination</button>`;
}

document.getElementById("list").innerHTML=html;

})
.catch(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("list").innerHTML="<div class='empty'>Error loading data</div>";
});

// ✅ EDIT FUNCTION (WORKING)
function edit(){

// ensure data exists
let data = localStorage.getItem("editNomination");

if(!data){
alert("No data to edit");
return;
}

// go to form
window.location="nomination_form.html";

}

</script>

</body>
</html>
