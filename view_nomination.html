<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:'Segoe UI';background:#f4f6fb;margin:0;}

.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;padding:15px;text-align:center;
}

.container{padding:15px;}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#3b1eff;
color:white;
font-weight:600;
}

.remove-btn{background:#ff4d4d;}
</style>
</head>

<body>

<div class="top">
<h3>✏ Edit Nomination</h3>
</div>

<div class="container">

<div id="list"></div>

<div id="shareStatus">Total Share: 0%</div>

<button onclick="submitData()">Update Nomination</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbypluGz-gNpj27PwATNGLpytspTNmB1lrCJ6WCcmPjuba394eo54YC5wD30HV1yYmhxUw/exec";
const user=localStorage.getItem("currentUser");

/* LOAD DATA */
function load(){

let data = localStorage.getItem("editNomination");

if(!data){
alert("No data found");
return;
}

data = JSON.parse(data);

let html="";

data.forEach(n=>{
html += `
<div class="card nominee">

<input value="${n.name}" class="name">

<select class="relation">
<option>${n.relation}</option>
<option>Father</option>
<option>Mother</option>
<option>Wife</option>
<option>Husband</option>
<option>Son</option>
<option>Daughter</option>
<option>Brother</option>
<option>Sister</option>
<option>Other</option>
</select>

<input type="number" value="${n.share}" class="share" oninput="checkShare()">

<button class="remove-btn" onclick="this.parentElement.remove();checkShare()">Remove</button>

</div>
`;
});

document.getElementById("list").innerHTML = html;

checkShare();
}

load();

/* SHARE CHECK */
function checkShare(){
let total=0;
document.querySelectorAll(".share").forEach(s=>{
total+=Number(s.value||0);
});
document.getElementById("shareStatus").innerText="Total Share: "+total+"%";
}

/* SUBMIT UPDATE */
function submitData(){

let total=0;
document.querySelectorAll(".share").forEach(s=>{
total+=Number(s.value||0);
});

if(total!==100){
alert("Total must be 100%");
return;
}

let nominees=[];

document.querySelectorAll(".nominee").forEach(n=>{
nominees.push({
name:n.querySelector(".name").value,
relation:n.querySelector(".relation").value,
share:n.querySelector(".share").value
});
});

// DELETE OLD + SAVE NEW
fetch(API_URL+"?action=delete&user="+user)
.then(()=>{

return fetch(API_URL,{
method:"POST",
body:JSON.stringify({user,nominees})
});

})
.then(res=>res.json())
.then(()=>{
alert("Updated Successfully");
localStorage.removeItem("editNomination");
window.location="nomination_form.html";
});
}

</script>

</body>
</html>
