<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI';
background:#f4f6fb;
margin:0;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:15px;
text-align:center;
}

/* CONTAINER */
.container{
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* INPUT */
input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#3b1eff;
color:white;
font-weight:600;
}

.edit-btn{background:#ff9800;}
.cancel-btn{background:#999;}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
display:flex;
align-items:center;
justify-content:center;
}

.spinner{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #3b1eff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="top">
<h3>📋 My Nomination</h3>
</div>

<div id="loader"><div class="spinner"></div></div>

<div class="container">

<div id="viewBox"></div>

<div id="editBox"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzYMFFE-KfL5JamBrzIUC6oOCqP5eynVS3ksV2kkF-dY6g4J1Y08qdAQKErGg64qNS1BQ/exec";
const user=localStorage.getItem("currentUser");

/* LOAD DATA */
function loadData(){

fetch(API_URL+"?user="+user)
.then(res=>res.json())
.then(data=>{

document.getElementById("loader").style.display="none";

let empName = data.length > 0 ? data[0].emp_name : "";

let html = `
<div class="card">
<b>Employee Name:</b> ${empName}
</div>
`;

data.forEach(n=>{
html+=`
<div class="card">
<b>${n.name}</b><br>
Relation: ${n.relation}<br>
DOB: ${n.dob || '-'}<br>
Mobile: ${n.mobile || '-'}<br>
Address: ${n.address || '-'}<br>
Share: ${n.share}%<br>
Aadhar: ${n.aadhar || '-'}<br>
Guardian: ${n.guardian || '-'}
</div>
`;
});

// EDIT BUTTON
html+=`<button class="edit-btn" onclick='showEdit(${JSON.stringify(data)})'>✏ Edit</button>`;

document.getElementById("viewBox").innerHTML=html;

});

}

loadData();

/* SHOW EDIT FORM */
function showEdit(data){

let html = `<div class="card">`;

data.forEach(n=>{

html+=`
<div class="nominee">

<input value="${n.name || ''}" class="name">

<select class="relation">
<option ${n.relation=="Father"?"selected":""}>Father</option>
<option ${n.relation=="Mother"?"selected":""}>Mother</option>
<option ${n.relation=="Wife"?"selected":""}>Wife</option>
<option ${n.relation=="Husband"?"selected":""}>Husband</option>
<option ${n.relation=="Son"?"selected":""}>Son</option>
<option ${n.relation=="Daughter"?"selected":""}>Daughter</option>
<option ${n.relation=="Brother"?"selected":""}>Brother</option>
<option ${n.relation=="Sister"?"selected":""}>Sister</option>
<option ${n.relation=="Other"?"selected":""}>Other</option>
</select>

<input type="date" value="${n.dob || ''}" class="dob">

<input placeholder="Mobile" value="${n.mobile || ''}" class="mobile">

<input placeholder="Address" value="${n.address || ''}" class="address">

<input type="number" placeholder="Share %" value="${n.share || ''}" class="share">

<input placeholder="Aadhar" value="${n.aadhar || ''}" class="aadhar">

<input placeholder="Guardian" value="${n.guardian || ''}" class="guardian">

</div>
`;

});

html+=`
<button onclick="updateData()">Update</button>
<button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
</div>
`;

document.getElementById("editBox").innerHTML=html;

}

/* UPDATE DATA */
function updateData(){

let nominees=[];

document.querySelectorAll(".nominee").forEach(n=>{
nominees.push({
name:n.querySelector(".name").value,
relation:n.querySelector(".relation").value,
dob:n.querySelector(".dob").value,
mobile:n.querySelector(".mobile").value,
address:n.querySelector(".address").value,
share:n.querySelector(".share").value,
aadhar:n.querySelector(".aadhar").value,
guardian:n.querySelector(".guardian").value
});
});

document.getElementById("loader").style.display="flex";

// STEP 1: DELETE
fetch(API_URL+"?action=delete&user="+user)
.then(res=>res.json())
.then(delRes=>{

console.log("Delete:", delRes);

// STEP 2: INSERT NEW
return fetch(API_URL,{
method:"POST",
body:JSON.stringify({user,nominees})
});

})
.then(res=>res.json())
.then(()=>{
document.getElementById("loader").style.display="none";

alert("Updated Successfully");

location.reload();
})
.catch(err=>{
document.getElementById("loader").style.display="none";
console.log(err);
alert("Error updating");
});

}
/* CANCEL */
function cancelEdit(){
document.getElementById("editBox").innerHTML="";
}

</script>

</body>
</html>
