<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
padding-bottom:80px;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:25px 20px 35px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.top h2{
margin:0;
font-weight:600;
}

.top p{
margin:5px 0 0;
font-size:13px;
opacity:0.9;
}

/* CONTAINER */
.container{
padding:15px;
margin-top:-25px;
}

/* SECTION TITLE */
.section-title{
font-size:13px;
color:#666;
margin:15px 5px 8px;
font-weight:600;
}

/* CARD GROUP */
.group{
background:white;
border-radius:18px;
padding:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
margin-bottom:15px;
}

/* ITEM */
.item{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-radius:14px;
cursor:pointer;
transition:0.25s;
}

.item:hover{
background:#f1f4ff;
}

.item:active{
transform:scale(0.97);
}

/* LEFT */
.left{
display:flex;
align-items:center;
gap:12px;
}

/* ICON */
.icon{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
}

/* COLORS */
.blue{background:#2575fc;}
.green{background:#28a745;}
.purple{background:#6f42c1;}
.orange{background:#f6ad55;}
.red{background:#fc5c7d;}
.dark{background:#434343;}

/* TEXT */
.text{
font-size:15px;
font-weight:600;
color:#2d3748;
}

/* ARROW */
.arrow{
color:#aaa;
font-size:16px;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:calc(100vh - 68px);
background:#f3f4fa;
display:none;
flex-direction:column;
padding:20px;
gap:15px;
z-index:500; /* 🔥 BELOW navbar */
overflow:hidden;
}

.skeleton{
height:60px;
border-radius:15px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}
.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:68px;
background:#ffffff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e5e7eb;
box-shadow:0 -3px 12px rgba(0,0,0,0.06);
z-index:1000;
}
  /* NAV ITEM */
.nav-item{
flex:1;
text-align:center;
cursor:pointer;
position:relative;
padding-top:6px;
transition:0.25s;
}

/* ICON */
.nav-icon{
font-size:22px;
color:#9ca3af;
transition:0.3s;
}

/* TEXT */
.nav-item span{
display:block;
font-size:11px;
margin-top:3px;
color:#9ca3af;
transition:0.3s;
}

/* ACTIVE STYLE */
.nav-item.active .nav-icon{
color:#2400b7;
transform:scale(1.15);
}

.nav-item.active span{
color:#2400b7;
font-weight:600;
}

/* TOP INDICATOR BAR */
.nav-item.active::before{
content:"";
position:absolute;
top:0;
left:20%;
width:60%;
height:4px;
border-radius:10px;
background:linear-gradient(135deg,#2400b7,#3b1eff);
}

/* CLICK EFFECT */
.nav-item:active{
transform:scale(0.92);
}

  /* CENTER FLOAT BUTTON */
.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #e5e7eb;
box-shadow:0 -3px 12px rgba(0,0,0,0.06);
z-index:1000;
padding:0 5px;
}

/* Equal spacing */
.nav-item{
flex:1;
text-align:center;
cursor:pointer;
}

/* Normal icons */
.nav-icon{
font-size:22px;
color:#9ca3af;
}

.nav-item span{
display:block;
font-size:11px;
color:#9ca3af;
}

/* ⭐ CENTER SPECIAL BUTTON */
.center-item{
display:flex;
justify-content:center;
align-items:center;
}

/* Animated button */
.center-btn{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
animation:pulse 1.5s infinite;
}

/* 🔥 Animation like GIF */
@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(59,30,255,0.5);
}
70%{
transform:scale(1.1);
box-shadow:0 0 0 12px rgba(59,30,255,0);
}
100%{
transform:scale(1);
}
}

/* Click effect */
.center-btn:active{
transform:scale(0.9);
}

  
</style>
</head>

<body>

<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
  <div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
  <div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
  <br>
  <div class="skeleton"></div>
<div class="skeleton"></div>
   <br>
  <div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<!-- HEADER -->
<div class="top">
<h2>💬 Forum & Help</h2>
<p>Get support, policies & information</p>
</div>

<div class="container">

<!-- PRIMARY ACTIONS -->
<div class="section-title">Quick Actions</div>

<div class="group">

<div class="item" onclick="openPage('ask')">
<div class="left">
<div class="icon blue">❓</div>
<div class="text">Ask Questions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('contact')">
<div class="left">
<div class="icon green">📞</div>
<div class="text">Contact Us</div>
</div>
<div class="arrow">›</div>
</div>

</div>

<!-- INFORMATION -->
<div class="section-title">Information</div>

<div class="group">


<div class="item" onclick="openPage('privacy')">
<div class="left">
<div class="icon dark">🔒</div>
<div class="text">Privacy Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('terms')">
<div class="left">
<div class="icon orange">📜</div>
<div class="text">Terms & Conditions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('copyright')">
<div class="left">
<div class="icon red">©</div>
<div class="text">Copyright Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('org')">
<div class="left">
<div class="icon blue">🏢</div>
<div class="text">Organization Chart</div>
</div>
<div class="arrow">›</div>
</div>

</div>

</div>

<script>
function openPage(type){

document.getElementById("loader").style.display="flex";
document.body.style.overflow="hidden";

setTimeout(()=>{

if(type === "ask"){
window.location = "forum_details.html?type=ask";
}
else if(type === "contact"){
window.location = "contact_us.html";
}
else if(type === "help"){
window.location = "forum_details.html?type=help";
}
else{
window.location = "others_forum.html?type=" + type;
}

},500);

}
</script>


<script>
function goTab(index, url){

document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

setTimeout(function(){
window.location = url;
}, 800);

}
</script>
<script>


// function for active tab


window.onload = function(){

  // hide loader after page load
  let loader = document.getElementById("loader");
  if(loader){
    loader.style.display = "none";
  }

  // active tab
  let page = location.pathname.split("/").pop();

  let items = document.querySelectorAll(".nav-item");

  items.forEach(item => {
    let onclick = item.getAttribute("onclick");

    if(onclick && onclick.includes(page)){
      item.classList.add("active");
    }
  });

}


</script>
  <script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
  window.location.replace("home.html");
};
</script>
<div class="navbar" id="navbar">

<div class="nav-item" onclick="goTab(0,'home.html')">
<div class="nav-icon">🏠</div>
<span>Home</span>
</div>

<div class="nav-item" onclick="goTab(1,'forum.html')">
<div class="nav-icon">💬</div>
<span>Forum</span>
</div>

<div class="nav-item center-item" onclick="goTab(99,'info.html')">
  
  <div class="center-wrapper">
    
    <div class="center-btn">
      ⚡
    </div>

    <div class="center-text">Info</div>

  </div>

</div>

<div class="nav-item" onclick="goTab(2,'employee_info.html')">
<div class="nav-icon">👤</div>
<span>Employee</span>
</div>

<div class="nav-item" onclick="goTab(3,'resources.html')">
<div class="nav-icon">📂</div>
<span>Resources</span>
</div>

</div>
</body>
</html>
