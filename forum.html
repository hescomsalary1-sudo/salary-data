<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:25px 20px 35px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.top h2{
margin:0;
font-weight:600;
}

.top p{
margin:5px 0 0;
font-size:13px;
opacity:0.9;
}

/* CONTAINER */
.container{
padding:15px;
margin-top:-25px;
}

/* SECTION TITLE */
.section-title{
font-size:13px;
color:#666;
margin:15px 5px 8px;
font-weight:600;
}

/* CARD GROUP */
.group{
background:white;
border-radius:18px;
padding:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
margin-bottom:15px;
}

/* ITEM */
.item{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-radius:14px;
cursor:pointer;
transition:0.25s;
}

.item:hover{
background:#f1f4ff;
}

.item:active{
transform:scale(0.97);
}

/* LEFT */
.left{
display:flex;
align-items:center;
gap:12px;
}

/* ICON */
.icon{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
}

/* COLORS */
.blue{background:#2575fc;}
.green{background:#28a745;}
.purple{background:#6f42c1;}
.orange{background:#f6ad55;}
.red{background:#fc5c7d;}
.dark{background:#434343;}

/* TEXT */
.text{
font-size:15px;
font-weight:600;
color:#2d3748;
}

/* ARROW */
.arrow{
color:#aaa;
font-size:16px;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:flex;
flex-direction:column;
gap:12px;
padding:20px;
z-index:9999;
display:none;
}

.skeleton{
height:60px;
border-radius:15px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}
</style>
</head>

<body>

<div id="loader">
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
</div>

<!-- HEADER -->
<div class="top">
<h2>💬 Forum & Help</h2>
<p>Get support, policies & information</p>
</div>

<div class="container">

<!-- PRIMARY ACTIONS -->
<div class="section-title">Quick Actions</div>

<div class="group">

<div class="item" onclick="openPage('ask')">
<div class="left">
<div class="icon blue">❓</div>
<div class="text">Ask Questions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('contact')">
<div class="left">
<div class="icon green">📞</div>
<div class="text">Contact Us</div>
</div>
<div class="arrow">›</div>
</div>

</div>

<!-- INFORMATION -->
<div class="section-title">Information</div>

<div class="group">

<div class="item" onclick="openPage('help')">
<div class="left">
<div class="icon purple">🆘</div>
<div class="text">Help</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('privacy')">
<div class="left">
<div class="icon dark">🔒</div>
<div class="text">Privacy Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('terms')">
<div class="left">
<div class="icon orange">📜</div>
<div class="text">Terms & Conditions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('copyright')">
<div class="left">
<div class="icon red">©</div>
<div class="text">Copyright Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('org')">
<div class="left">
<div class="icon blue">🏢</div>
<div class="text">Organization Chart</div>
</div>
<div class="arrow">›</div>
</div>

</div>

</div>

<script>
function openPage(type){

document.getElementById("loader").style.display="flex";
document.body.style.overflow="hidden";

setTimeout(()=>{

if(type === "ask"){
window.location = "forum_details.html?type=ask";
}
else if(type === "contact"){
window.location = "contact_us.html";
}
else if(type === "help"){
window.location = "forum_details.html?type=help";
}
else{
window.location = "others_forum.html?type=" + type;
}

},500);

}
</script>

</body>
</html>
