<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6fb;
}

/* HEADER */
.top{
background:linear-gradient(135deg,#2400b7,#3b1eff);
color:white;
padding:25px 20px 30px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.top h2{
margin:0;
font-weight:600;
}

.top p{
margin:5px 0 0;
font-size:13px;
opacity:0.9;
}

/* CONTAINER */
.container{
padding:15px;
margin-top:-20px;
}

/* CARD ITEM */
.item{
background:white;
padding:15px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
transition:0.25s;
}

/* LEFT SIDE */
.left{
display:flex;
align-items:center;
gap:12px;
}

/* ICON CIRCLE */
.icon{
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
}

/* COLORS */
.blue{background:linear-gradient(135deg,#4facfe,#0052cc);}
.purple{background:linear-gradient(135deg,#a18cd1,#6b46c1);}
.orange{background:linear-gradient(135deg,#f6ad55,#dd6b20);}
.green{background:linear-gradient(135deg,#48bb78,#2f855a);}
.red{background:linear-gradient(135deg,#fc5c7d,#c0392b);}
.dark{background:linear-gradient(135deg,#434343,#000000);}

/* TEXT */
.text{
font-size:15px;
font-weight:600;
color:#2d3748;
}

/* ARROW */
.arrow{
font-size:18px;
color:#aaa;
}

/* HOVER / CLICK */
.item:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.item:active{
transform:scale(0.96);
}

  /* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
z-index:9999;
}

/* shimmer animation */
@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
border-radius:12px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-title{
height:30px;
width:60%;
margin-bottom:10px;
}

.skel-item{
height:60px;
border-radius:18px;
}
</style>
</head>

<body>
<div id="loader" style="display:none;">

<div class="skeleton skel-title"></div>

<div class="skeleton skel-item"></div>
<div class="skeleton skel-item"></div>
<div class="skeleton skel-item"></div>
<div class="skeleton skel-item"></div>
<div class="skeleton skel-item"></div>
<div class="skeleton skel-item"></div>

</div>
<!-- HEADER -->
<div class="top">
<h2>💬 Forum & Help</h2>
<p>Get support, policies & information</p>
</div>

<!-- LIST -->
<div class="container">

<div class="item" onclick="openPage('ask')">
<div class="left">
<div class="icon blue">❓</div>
<div class="text">Ask Questions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('contact')">
<div class="left">
<div class="icon green">📞</div>
<div class="text">Contact Us</div>
</div>
<div class="arrow">›</div>
</div>


<div class="item" onclick="openPage('privacy')">
<div class="left">
<div class="icon dark">🔒</div>
<div class="text">Privacy Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('terms')">
<div class="left">
<div class="icon orange">📜</div>
<div class="text">Terms & Conditions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('copyright')">
<div class="left">
<div class="icon red">©</div>
<div class="text">Copyright Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('org')">
<div class="left">
<div class="icon blue">🏢</div>
<div class="text">Organization Chart</div>
</div>
<div class="arrow">›</div>
</div>

</div>

<script>
function openPage(type){

// show loader
document.getElementById("loader").style.display = "flex";
document.body.style.overflow = "hidden";

setTimeout(()=>{

// dynamic pages
if(type === "ask"){
  window.location = "forum_details.html?type=ask";
}
else if(type === "contact"){
  window.location = "contact_us.html";
}
else if(type === "help"){
  window.location = "forum_details.html?type=help";
}

// static combined page
else if(type === "privacy" || type === "terms" || type === "copyright" || type === "org"){
  window.location = "others_forum.html?type=" + type;
}

},600);

}
</script>

</body>
</html>
