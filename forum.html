<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
padding-bottom:80px;
}

/* HEADER */
.top{
position:relative;
padding:25px 20px 70px;
background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
color:blue;
display:flex;
justify-content:space-between;
align-items:flex-start;
overflow:hidden;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.top::after{
content:"";
position:absolute;
bottom:-40px;
left:0;
width:100%;
height:80px;
background:#f4f6fb;
border-top-left-radius:100%;
border-top-right-radius:100%;
}

.header-title{font-size:24px;font-weight:700;margin-top:5px;}
.header-sub{font-size:13px;opacity:0.9;}

/* HEADER IMAGE */
.header-img{
position:absolute;
right:10px;
top:20px;
width:110px;
animation:floatImg 3s ease-in-out infinite;
}
@keyframes floatImg{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* MENU */
.menu-btn{
width:42px;height:42px;border-radius:10px;
background:#2400b7;color:white;
display:flex;align-items:center;justify-content:center;
font-size:20px;cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logout{cursor:pointer;font-size:22px;}

/* CONTAINER */
.container{
padding:15px;
margin-top:-25px;
animation:slideUp 0.4s ease-out;
}
@keyframes slideUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* MODERN UI */
.section-title{
display:flex;
align-items:center;
gap:8px;
font-size:15px;
font-weight:700;
color:#1e3a8a;
margin:20px 5px 10px;
}
.section-title::before{
content:"";
width:5px;height:18px;background:#2563eb;border-radius:10px;
}

.group{
background:white;
border-radius:22px;
padding:8px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
margin-bottom:18px;
border:1px solid #eef2ff;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
border-radius:16px;
cursor:pointer;
transition:0.25s;
}
.item:hover{background:#f1f5ff;}
.item:active{transform:scale(0.97);}
.item:not(:last-child){border-bottom:1px solid #f1f5ff;}

.left{display:flex;align-items:center;gap:12px;}

.icon{
width:48px;height:48px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:white;font-size:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}
.blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.green{background:linear-gradient(135deg,#22c55e,#15803d);}
.orange{background:linear-gradient(135deg,#f59e0b,#d97706);}
.red{background:linear-gradient(135deg,#ef4444,#b91c1c);}
.dark{background:linear-gradient(135deg,#374151,#111827);}

.text{font-size:15px;font-weight:600;color:#1f2937;}

.arrow{
width:30px;height:30px;border-radius:50%;
background:#f1f5ff;
display:flex;align-items:center;justify-content:center;
font-size:14px;color:#2563eb;
}
</style>
</head>

<body>

<!-- KEEP YOUR ORIGINAL SIDE NAV, LOADER, NAVBAR (UNCHANGED) -->

<div class="top">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="menu-btn" onclick="openSideNav()">☰</div>
    <div>
      <div class="header-sub">Support Center</div>
      <div class="header-title">Forum & Help</div>
    </div>
  </div>

  <div>
    <span style="font-size:20px;margin-right:10px;cursor:pointer;" onclick="refreshApp()">🔄</span>
    <span class="logout" onclick="logout()">🔓</span>
  </div>

  <img class="header-img" src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png">
</div>

<div class="container">

<div class="section-title">Quick Actions</div>
<div class="group">

<div class="item" onclick="openPage('ask')">
<div class="left">
<div class="icon blue">❓</div>
<div class="text">Ask Questions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('contact')">
<div class="left">
<div class="icon green">📞</div>
<div class="text">Contact Us</div>
</div>
<div class="arrow">›</div>
</div>

</div>

<div class="section-title">Information</div>
<div class="group">

<div class="item" onclick="openPage('privacy')">
<div class="left">
<div class="icon dark">🔒</div>
<div class="text">Privacy Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('terms')">
<div class="left">
<div class="icon orange">📜</div>
<div class="text">Terms & Conditions</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('copyright')">
<div class="left">
<div class="icon red">©</div>
<div class="text">Copyright Policy</div>
</div>
<div class="arrow">›</div>
</div>

<div class="item" onclick="openPage('org')">
<div class="left">
<div class="icon blue">🏢</div>
<div class="text">Organization Chart</div>
</div>
<div class="arrow">›</div>
</div>

</div>

</div>

<script>
function openPage(type){
document.getElementById("loader").style.display="flex";
document.body.style.overflow="hidden";

setTimeout(()=>{
if(type==="ask"){
window.location.replace("forum_details.html?type=ask");
}else if(type==="contact"){
window.location.replace("contact_us.html");
}else if(type==="help"){
window.location.replace("forum_details.html?type=help");
}else{
window.location.replace("others_forum.html?type="+type);
}
},500);
}
</script>

<!-- ⚠️ KEEP ALL YOUR OTHER ORIGINAL SCRIPTS EXACTLY SAME BELOW -->
</body>
</html>
