<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Dashboard</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
        }

        /* --- SIDE-BY-SIDE HEADER --- */
        .header-bar {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
            animation: fadeInUp 0.5s ease-out;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: none;
            flex-shrink: 0; /* Keeps button circular */
        }

        .header-bar h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Subtitle Section */
        .sub-header {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            margin-bottom: 15px;
            text-align: left;
            animation: fadeInUp 0.6s ease-out both;
            animation-delay: 0.1s;
        }

        .sub-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
            padding-left: 5px;
        }

        /* MAIN CARD */
        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            animation: fadeInUp 0.6s ease-out both;
            animation-delay: 0.2s;
        }

        .select-wrapper { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: white;
            font-size: 16px;
            outline: none;
            appearance: none;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .month-btn {
            padding: 18px 10px;
            border-radius: 16px;
            background: white;
            color: var(--text-main);
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .month-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2);
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            padding: 40px 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 9999;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .sk-title { height: 30px; width: 180px; }
        .sk-card { height: 350px; width: 100%; max-width: 400px; border-radius: 24px; }
    </style>
</head>

<body>

    <!-- SIDE-BY-SIDE HEADER -->
    <div class="header-bar">
        <button class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1>Salary Portal</h1>
    </div>

    <div id="loader">
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-card"></div>
    </div>

    <div class="sub-header">
        <p>Select a period to view details</p>
    </div>

    <div class="card">
        <div class="select-wrapper">
            <label for="year">Fiscal Year</label>
            <select id="year">
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
            </select>
        </div>

        <label>Select Month</label>
        <div class="month-grid">
            <div class="month-btn" onclick="openSalary(1)">Jan</div>
            <div class="month-btn" onclick="openSalary(2)">Feb</div>
            <div class="month-btn" onclick="openSalary(3)">Mar</div>
            <div class="month-btn" onclick="openSalary(4)">Apr</div>
            <div class="month-btn" onclick="openSalary(5)">May</div>
            <div class="month-btn" onclick="openSalary(6)">Jun</div>
            <div class="month-btn" onclick="openSalary(7)">Jul</div>
            <div class="month-btn" onclick="openSalary(8)">Aug</div>
            <div class="month-btn" onclick="openSalary(9)">Sep</div>
            <div class="month-btn" onclick="openSalary(10)">Oct</div>
            <div class="month-btn" onclick="openSalary(11)">Nov</div>
            <div class="month-btn" onclick="openSalary(12)">Dec</div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function openSalary(month) {
            const year = document.getElementById("year").value;
            localStorage.setItem("selectedYear", year);
            localStorage.setItem("selectedMonth", month);

            const loader = document.getElementById("loader");
            loader.style.display = "flex";
            setTimeout(() => { loader.style.opacity = "1"; }, 10);
            
            document.body.style.overflow = "hidden";

            setTimeout(() => {
                window.location.href = "salary_view.html";
            }, 600);
        }
    </script>

</body>
</html>
