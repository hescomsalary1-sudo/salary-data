<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Salary</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

/* HEADER */
.top{
padding:20px;
font-size:20px;
font-weight:600;
text-align:center;
color:#2d3748;
}

/* CARD */
.card{
margin:15px;
padding:20px;
border-radius:18px;
background:linear-gradient(145deg,#ffffff,#e6ebf3);
box-shadow:6px 6px 15px rgba(0,0,0,0.08),
-6px -6px 15px rgba(255,255,255,0.9);
}

/* DROPDOWN */
select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
}

/* MONTH GRID */
.month-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

/* MONTH BUTTON */
.month-btn{
padding:16px 10px;
border-radius:16px;
background:#ffffff;
border:2px solid #3b1eff;
color:#3b1eff;
text-align:center;
font-weight:600;
cursor:pointer;
transition:0.25s;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* hover */
.month-btn:hover{
background:#3b1eff;
color:white;
}

/* click */
.month-btn:active{
transform:scale(0.95);
}

/* icon circle */
.month-icon{
width:30px;
height:30px;
border-radius:50%;
background:#3b1eff;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
}

/* click */
.month-btn:active{
transform:scale(0.95);
}
  /* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f3f4fa;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
z-index:9999;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
border-radius:10px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-title{height:25px;width:50%;}
.skel-dropdown{height:40px;width:100%;}
.skel-btn{height:45px;border-radius:12px;}
</style>
</head>

<body>
<div id="loader" style="display:none;">

<div class="skeleton skel-title"></div>
<div class="skeleton skel-dropdown"></div>

<div class="month-grid">
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
  <div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
</div>
<div class="skeleton skel-title"></div>
<div class="skeleton skel-dropdown"></div>
  <div class="skeleton skel-dropdown"></div>
  <div class="skeleton skel-dropdown"></div>
  <div class="skeleton skel-dropdown"></div>
  <div class="skeleton skel-dropdown"></div>
</div>
<div class="top">Select Salary</div>

<div class="card">

<label>Select Year:</label>
<select id="year">
<option value="2026">2026</option>
<option value="2027">2027</option>

<script>
function openSalary(month){

let year=document.getElementById("year").value;

// save
localStorage.setItem("selectedYear",year);
localStorage.setItem("selectedMonth",month);

// ✅ SHOW SKELETON
document.getElementById("loader").style.display="flex";

// hide main content (optional but better)
document.body.style.overflow="hidden";

// delay then navigate
setTimeout(()=>{
window.location="salary_view.html";
},600);

}

</script>

</html>
