<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Portal</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#eef2ff,#ffffff);
color:#1e293b;
}

/* HEADER */
.hero{
padding:20px;
background:linear-gradient(135deg,#2d0cff,#5f3bff);
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
position:relative;
}

/* BACK BUTTON */
.back-btn{
width:42px;
height:42px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
margin-bottom:10px;
}

.hero h1{
margin:10px 0 5px;
font-size:26px;
}

.hero p{
margin:0;
opacity:0.85;
}

/* FLOAT ₹ */
.rupee{
position:absolute;
right:20px;
bottom:-20px;
background:#ffb020;
color:white;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* YEAR + SUMMARY */
.rowCards{
display:flex;
gap:12px;
padding:15px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.cardTitle{
font-weight:700;
margin-bottom:10px;
color:#2d0cff;
}

select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* MONTH SECTION */
.monthSection{
margin:15px;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
text-align:center;
}

.monthSection h3{
color:#2d0cff;
}

/* CIRCLE */
.circle{
position:relative;
width:300px;
height:300px;
margin:20px auto;
border-radius:50%;
}

/* MONTH BUTTONS */
.month{
position:absolute;
width:52px;
height:52px;
background:#f1f4ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* ACTIVE (JAN like image) */
.month.m1{
background:linear-gradient(135deg,#2d0cff,#5f3bff);
color:white;
transform:translate(-50%,-50%) scale(1.1);
}

/* POSITIONS */
.m1{top:0;left:50%;transform:translate(-50%,-50%);}
.m2{top:20%;right:0;}
.m3{top:50%;right:-10px;}
.m4{bottom:20%;right:0;}
.m5{bottom:0;left:50%;transform:translate(-50%,50%);}
.m6{bottom:20%;left:0;}
.m7{top:50%;left:-10px;}
.m8{top:20%;left:0;}
.m9{top:10%;left:20%;}
.m10{top:10%;right:20%;}
.m11{bottom:10%;right:20%;}
.m12{bottom:10%;left:20%;}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.center h2{
margin:0;
font-size:18px;
color:#2d0cff;
}

.center p{
font-size:12px;
color:#666;
}

.center button{
margin-top:10px;
padding:10px 16px;
border:none;
background:linear-gradient(135deg,#2d0cff,#5f3bff);
color:white;
border-radius:25px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* LOADER */
#loader{
display:none;
position:fixed;
inset:0;
background:white;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:45px;
height:45px;
border:6px solid #eee;
border-top:6px solid #2d0cff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">

<div class="back-btn" onclick="goBack()">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
</div>

<h1>Salary Portal</h1>
<p>View your salary details and payslips</p>

<div class="rupee">₹</div>

</div>

<!-- YEAR -->
<div class="rowCards">

<div class="card">
<div class="cardTitle">Select Year</div>
<select id="year">
<option value="2026">2026</option>
<option value="2027">2027</option>
</select>
</div>

<div class="card">
<div class="cardTitle">Year Summary</div>
<p>Overview of your earnings and deductions</p>
</div>

</div>

<!-- MONTH -->
<div class="monthSection">

<h3>Select Month</h3>

<div class="circle">

<div class="center">
<h2>January 2026</h2>
<p>View your salary details, payslip and more</p>
<button onclick="openSalary(1)">View Details →</button>
</div>

<div class="month m1" onclick="openSalary(1)">Jan</div>
<div class="month m2" onclick="openSalary(2)">Feb</div>
<div class="month m3" onclick="openSalary(3)">Mar</div>
<div class="month m4" onclick="openSalary(4)">Apr</div>
<div class="month m5" onclick="openSalary(5)">May</div>
<div class="month m6" onclick="openSalary(6)">Jun</div>
<div class="month m7" onclick="openSalary(7)">Jul</div>
<div class="month m8" onclick="openSalary(8)">Aug</div>
<div class="month m9" onclick="openSalary(9)">Sep</div>
<div class="month m10" onclick="openSalary(10)">Oct</div>
<div class="month m11" onclick="openSalary(11)">Nov</div>
<div class="month m12" onclick="openSalary(12)">Dec</div>

</div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<script>

function goBack(){
window.history.back();
}

function openSalary(month){
const year = document.getElementById("year").value;

localStorage.setItem("selectedYear", year);
localStorage.setItem("selectedMonth", month);

document.getElementById("loader").style.display="flex";

setTimeout(function(){
window.location.href="salary_view.html";
},700);
}

</script>

</body>
</html>
