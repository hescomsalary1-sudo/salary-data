<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Portal</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
}

/* ✅ SMOOTH OPEN */
@keyframes slideUp {
    from {
        opacity:0;
        transform: translateY(30px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}

/* HEADER */
.top-bar{
    width:100%;
    padding:15px;
    box-sizing:border-box;
}

.back-btn{
    width:40px;
    height:40px;
    border-radius:10px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    cursor:pointer;
}

.back-btn:active{
    transform:scale(0.9);
}

/* CONTAINER */
.container{
    width:100%;
    max-width:450px;
    margin:0 auto;
    padding:15px;
    box-sizing:border-box;

    animation: slideUp 0.4s ease;
}

/* TITLE */
.header{
    text-align:center;
    margin-bottom:15px;
}

.header h1{
    margin:0;
    font-size:24px;
    color:#2400b7;
}

.header p{
    font-size:13px;
    color:#666;
}

/* CARD */
.card{
    width:100%;
    background:#fff;
    border-radius:18px;
    padding:15px;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* SELECT */
label{
    font-size:12px;
    font-weight:600;
    color:#555;
}

select{
    width:100%;
    padding:10px;
    margin:6px 0 12px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* GRID */
.month-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

/* BUTTON */
.month-btn{
    padding:14px;
    border-radius:12px;
    background:#f1efff;
    text-align:center;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

.month-btn:active{
    transform:scale(0.92);
    background:#2400b7;
    color:#fff;
}

/* LOADER */
#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#fff;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader-circle{
    width:40px;
    height:40px;
    border:4px solid #ddd;
    border-top:4px solid #2400b7;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="back-btn" onclick="goBack()">←</div>
</div>

<div class="container">

<div class="header">
    <h1>Salary Portal</h1>
    <p>Select month</p>
</div>

<div class="card">

<label>Year</label>
<select id="year">
    <option value="2026">2026</option>
    <option value="2027">2027</option>
</select>

<label>Month</label>

<div class="month-grid">
    <div class="month-btn" onclick="openSalary(1)">Jan</div>
    <div class="month-btn" onclick="openSalary(2)">Feb</div>
    <div class="month-btn" onclick="openSalary(3)">Mar</div>
    <div class="month-btn" onclick="openSalary(4)">Apr</div>
    <div class="month-btn" onclick="openSalary(5)">May</div>
    <div class="month-btn" onclick="openSalary(6)">Jun</div>
    <div class="month-btn" onclick="openSalary(7)">Jul</div>
    <div class="month-btn" onclick="openSalary(8)">Aug</div>
    <div class="month-btn" onclick="openSalary(9)">Sep</div>
    <div class="month-btn" onclick="openSalary(10)">Oct</div>
    <div class="month-btn" onclick="openSalary(11)">Nov</div>
    <div class="month-btn" onclick="openSalary(12)">Dec</div>
</div>

</div>
</div>

<!-- LOADER -->
<div id="loader">
    <div class="loader-circle"></div>
</div>

<script>

/* BACK */
function goBack(){
    history.back();
}

/* OPEN PAGE */
function openSalary(month){

    let year=document.getElementById("year").value;

    localStorage.setItem("selectedYear",year);
    localStorage.setItem("selectedMonth",month);

    document.getElementById("loader").style.display="flex";

    setTimeout(()=>{
        window.location.href="salary_view.html";
    },500);
}

</script>

</body>
</html>
