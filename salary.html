<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Salary</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f7,#e6ebf3);
}

/* HEADER */
.top{
padding:25px 20px;
font-size:22px;
font-weight:600;
text-align:center;
color:white;
background:linear-gradient(135deg,#2400b7,#3b1eff);
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

/* CARD */
.card{
margin:20px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* LABEL */
label{
font-weight:600;
color:#333;
}

/* DROPDOWN */
select{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin:10px 0 20px;
background:#f4f6fb;
font-size:14px;
box-shadow:inset 2px 2px 5px rgba(0,0,0,0.05);
}

/* MONTH GRID */
.month-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* MONTH BUTTON */
.month-btn{
padding:16px;
border-radius:16px;
background:linear-gradient(135deg,#4facfe,#0052cc);
color:white;
text-align:center;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,82,204,0.3);
}

.month-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,82,204,0.4);
}

.month-btn:active{
transform:scale(0.95);
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f3f4fa;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
z-index:9999;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
border-radius:10px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-title{height:25px;width:50%;}
.skel-dropdown{height:40px;width:100%;}
.skel-btn{height:50px;border-radius:15px;}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" style="display:none;">
<div class="skeleton skel-title"></div>
<div class="skeleton skel-dropdown"></div>

<div class="month-grid">
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
</div>
</div>

<!-- HEADER -->
<div class="top">💼 Select Salary</div>

<!-- CARD -->
<div class="card">

<label>Select Year</label>
<select id="year">
<option value="2026">2026</option>
<option value="2027">2027</option>
<option value="2028">2028</option>
</select>

<div class="month-grid">

<div class="month-btn" onclick="openSalary(1)">Jan</div>
<div class="month-btn" onclick="openSalary(2)">Feb</div>
<div class="month-btn" onclick="openSalary(3)">Mar</div>
<div class="month-btn" onclick="openSalary(4)">Apr</div>
<div class="month-btn" onclick="openSalary(5)">May</div>
<div class="month-btn" onclick="openSalary(6)">Jun</div>
<div class="month-btn" onclick="openSalary(7)">Jul</div>
<div class="month-btn" onclick="openSalary(8)">Aug</div>
<div class="month-btn" onclick="openSalary(9)">Sep</div>
<div class="month-btn" onclick="openSalary(10)">Oct</div>
<div class="month-btn" onclick="openSalary(11)">Nov</div>
<div class="month-btn" onclick="openSalary(12)">Dec</div>

</div>

</div>

<script>
function openSalary(month){

let year=document.getElementById("year").value;

localStorage.setItem("selectedYear",year);
localStorage.setItem("selectedMonth",month);

// show loader
document.getElementById("loader").style.display="flex";
document.body.style.overflow="hidden";

setTimeout(()=>{
window.location="salary_view.html";
},600);

}
</script>

</body>
</html>
