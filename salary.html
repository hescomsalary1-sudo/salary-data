<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Salary</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#2400b7 0%, #3b1eff 40%, #f5f7fb 40%);
}

/* HEADER */
.header{
padding:25px 20px 60px;
color:white;
font-size:22px;
font-weight:600;
}

/* CARD */
.container{
margin:-40px 15px 20px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* DROPDOWN */
.select-box{
background:#f1f3f9;
padding:12px;
border-radius:30px;
margin-bottom:20px;
}

select{
width:100%;
border:none;
background:transparent;
font-size:15px;
outline:none;
}

/* MONTH GRID */
.month-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* MONTH BUTTON */
.month-btn{
padding:16px 10px;
border-radius:14px;
background:#f4f6fb;
text-align:center;
font-weight:600;
color:#333;
cursor:pointer;
transition:0.25s;
}

/* hover */
.month-btn:hover{
background:#e0e7ff;
}

/* click */
.month-btn:active{
transform:scale(0.95);
}

/* ACTIVE MONTH */
.month-btn.active{
background:#3b1eff;
color:white;
box-shadow:0 5px 15px rgba(59,30,255,0.4);
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
flex-direction:column;
gap:15px;
padding:20px;
z-index:9999;
}

@keyframes shimmer{
0%{background-position:-400px 0;}
100%{background-position:400px 0;}
}

.skeleton{
border-radius:10px;
background:linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
background-size:400px 100%;
animation:shimmer 1.2s infinite;
}

.skel-title{height:25px;width:50%;}
.skel-btn{height:50px;border-radius:15px;}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="skeleton skel-title"></div>

<div class="month-grid">
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
<div class="skeleton skel-btn"></div>
</div>
</div>

<!-- HEADER -->
<div class="header">💼 Salary</div>

<!-- CARD -->
<div class="container">

<div class="select-box">
<select id="year">
<option value="2026">2026</option>
<option value="2027">2027</option>
<option value="2028">2028</option>
</select>
</div>

<div class="month-grid">

<div class="month-btn" onclick="selectMonth(this,1)">Jan</div>
<div class="month-btn" onclick="selectMonth(this,2)">Feb</div>
<div class="month-btn" onclick="selectMonth(this,3)">Mar</div>
<div class="month-btn" onclick="selectMonth(this,4)">Apr</div>
<div class="month-btn" onclick="selectMonth(this,5)">May</div>
<div class="month-btn" onclick="selectMonth(this,6)">Jun</div>
<div class="month-btn" onclick="selectMonth(this,7)">Jul</div>
<div class="month-btn" onclick="selectMonth(this,8)">Aug</div>
<div class="month-btn" onclick="selectMonth(this,9)">Sep</div>
<div class="month-btn" onclick="selectMonth(this,10)">Oct</div>
<div class="month-btn" onclick="selectMonth(this,11)">Nov</div>
<div class="month-btn" onclick="selectMonth(this,12)">Dec</div>

</div>

</div>

<script>

function selectMonth(el,month){

// remove previous active
document.querySelectorAll(".month-btn").forEach(btn=>{
btn.classList.remove("active");
});

// add active
el.classList.add("active");

let year=document.getElementById("year").value;

localStorage.setItem("selectedYear",year);
localStorage.setItem("selectedMonth",month);

// show loader
document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location="salary_view.html";
},600);

}

</script>

</body>
</html>
