<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Dashboard</title>
    <style>
        :root {
            --primary: #2400b7;
            --bg-gradient: linear-gradient(135deg, #e6ecff, #dfe7ff, #f0ebff);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
        }

        /* --- HEADER --- */
        .header-bar {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
            animation: fadeInUp 0.5s ease-out;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: none;
            flex-shrink: 0;
        }

        .header-bar h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #2400b7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-header {
            width: 90%;
            max-width: 400px;
            margin: 20px 0 15px 0;
            animation: fadeInUp 0.6s ease-out both;
            animation-delay: 0.1s;
        }

        .sub-header p { color: var(--text-muted); font-size: 14px; margin: 0; }

        /* --- CARD --- */
        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            animation: fadeInUp 0.6s ease-out both;
            animation-delay: 0.2s;
            box-sizing: border-box;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .month-btn {
            padding: 18px 10px;
            border-radius: 16px;
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .month-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        /* --- PREMIUM FLUID LOADER (SAME AS FORUM) --- */
        #loader {
            position: fixed;
            inset: 0;
            background: rgba(243, 244, 250, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fluid-loader {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #2400b7;
            border-bottom-color: #00c9a7;
            animation: rotate-orbit 1.5s linear infinite;
        }

        .orbit:nth-child(2) {
            width: 70%;
            height: 70%;
            border-top-color: #6a5cff;
            border-bottom-color: #ff4e8a;
            animation-duration: 1s;
            animation-direction: reverse;
        }

        .orbit:nth-child(3) {
            width: 40%;
            height: 40%;
            border-top-color: #00e0b8;
            border-bottom-color: #2400b7;
            animation-duration: 2s;
        }

        .core {
            width: 15px;
            height: 15px;
            background: #2400b7;
            border-radius: 50%;
            box-shadow: 0 0 15px #2400b7, 0 0 30px #00c9a7;
            animation: pulse-core 1.5s ease-in-out infinite;
        }

        .loader-text {
            margin-top: 30px;
            font-weight: 700;
            color: #2400b7;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        @keyframes rotate-orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-core {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* --- FORM ELEMENTS --- */
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 20px;
            font-size: 16px;
        }

        label { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 8px;
            margin-left: 5px;
        }

    </style>
</head>
<body>

    <!-- SIDE-BY-SIDE HEADER -->
    <div class="header-bar">
        <button class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1>Salary Portal</h1>
    </div>

    <!-- PREMIUM FLUID LOADER -->
    <div id="loader">
        <div class="fluid-loader">
            <div class="orbit"></div>
            <div class="orbit"></div>
            <div class="orbit"></div>
            <div class="core"></div>
        </div>
        <div class="loader-text">Syncing Secure Data...</div>
    </div>

    <div class="sub-header">
        <p>Select a period to view details</p>
    </div>

    <div class="card">
        <label>Fiscal Year</label>
        <select id="year">
            <option value="2026">2026</option>
            <option value="2027">2027</option>
        </select>

        <label>Select Month</label>
        <div class="month-grid">
            <div class="month-btn" onclick="openSalary(1)">Jan</div>
            <div class="month-btn" onclick="openSalary(2)">Feb</div>
            <div class="month-btn" onclick="openSalary(3)">Mar</div>
            <div class="month-btn" onclick="openSalary(4)">Apr</div>
            <div class="month-btn" onclick="openSalary(5)">May</div>
            <div class="month-btn" onclick="openSalary(6)">Jun</div>
            <div class="month-btn" onclick="openSalary(7)">Jul</div>
            <div class="month-btn" onclick="openSalary(8)">Aug</div>
            <div class="month-btn" onclick="openSalary(9)">Sep</div>
            <div class="month-btn" onclick="openSalary(10)">Oct</div>
            <div class="month-btn" onclick="openSalary(11)">Nov</div>
            <div class="month-btn" onclick="openSalary(12)">Dec</div>
        </div>
    </div>

    <script>
        function goBack() { 
            window.history.back(); 
        }

        function openSalary(month) {
            const year = document.getElementById("year").value;
            localStorage.setItem("selectedYear", year);
            localStorage.setItem("selectedMonth", month);

            const loader = document.getElementById("loader");
            loader.style.display = "flex";
            
            // Small delay to allow the browser to process the display:flex 
            // before changing opacity for a smooth fade
            setTimeout(() => { 
                loader.style.opacity = "1"; 
            }, 10);
            
            document.body.style.overflow = "hidden";

            // Redirect after the spinner animation (1.2 seconds feels premium)
            setTimeout(() => {
                window.location.href = "salary_view.html";
            }, 1200);
        }
    </script>
</body>
</html>
