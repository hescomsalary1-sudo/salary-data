<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Portal</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#eef2ff,#f5f7ff);
color:#1e293b;
}

/* HEADER */
.hero{
padding:20px;
background:linear-gradient(135deg,#e6ecff,#f0ebff);
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
position:relative;
}

.menuBtn{
width:42px;
height:42px;
border-radius:50%;
background:white;
border:none;
font-size:20px;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.hero h1{
margin:15px 0 5px;
font-size:26px;
}

.hero p{
margin:0;
color:#666;
}

.rupee{
position:absolute;
right:20px;
bottom:-20px;
background:#ffb020;
color:white;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* YEAR + SUMMARY */
.rowCards{
display:flex;
gap:12px;
padding:15px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.cardTitle{
font-weight:700;
margin-bottom:10px;
}

select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* MONTH SECTION */
.monthSection{
margin:15px;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
text-align:center;
}

.circle{
position:relative;
width:300px;
height:300px;
margin:20px auto;
border-radius:50%;
}

.month{
position:absolute;
width:50px;
height:50px;
background:#f5f7ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:12px;
}

/* POSITION */
.m1{top:0;left:50%;transform:translate(-50%,-50%);}
.m2{top:20%;right:0;}
.m3{top:50%;right:-10px;}
.m4{bottom:20%;right:0;}
.m5{bottom:0;left:50%;transform:translate(-50%,50%);}
.m6{bottom:20%;left:0;}
.m7{top:50%;left:-10px;}
.m8{top:20%;left:0;}
.m9{top:10%;left:20%;}
.m10{top:10%;right:20%;}
.m11{bottom:10%;right:20%;}
.m12{bottom:10%;left:20%;}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.center h2{
margin:0;
font-size:18px;
}

.center button{
margin-top:10px;
padding:8px 14px;
border:none;
background:#5f3bff;
color:white;
border-radius:20px;
cursor:pointer;
}

/* SNAPSHOT */
.snapshot{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.snapBox{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

/* LOADER */
#loader{
display:none;
position:fixed;
inset:0;
background:white;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:45px;
height:45px;
border:6px solid #eee;
border-top:6px solid #6c39ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">
<button class="menuBtn">☰</button>
<h1>Salary Portal</h1>
<p>View your salary details and payslips</p>
<div class="rupee">₹</div>
</div>

<!-- YEAR -->
<div class="rowCards">

<div class="card">
<div class="cardTitle">Select Year</div>
<select id="year">
<option value="2026">2026</option>
<option value="2027">2027</option>
</select>
</div>

<div class="card">
<div class="cardTitle">Year Summary</div>
<p>Overview of your earnings and deductions</p>
</div>

</div>

<!-- MONTH -->
<div class="monthSection">

<h3>Select Month</h3>

<div class="circle">

<div class="center">
<h2>January 2026</h2>
<button onclick="openSalary(1)">View Details →</button>
</div>

<div class="month m1" onclick="openSalary(1)">Jan</div>
<div class="month m2" onclick="openSalary(2)">Feb</div>
<div class="month m3" onclick="openSalary(3)">Mar</div>
<div class="month m4" onclick="openSalary(4)">Apr</div>
<div class="month m5" onclick="openSalary(5)">May</div>
<div class="month m6" onclick="openSalary(6)">Jun</div>
<div class="month m7" onclick="openSalary(7)">Jul</div>
<div class="month m8" onclick="openSalary(8)">Aug</div>
<div class="month m9" onclick="openSalary(9)">Sep</div>
<div class="month m10" onclick="openSalary(10)">Oct</div>
<div class="month m11" onclick="openSalary(11)">Nov</div>
<div class="month m12" onclick="openSalary(12)">Dec</div>

</div>

</div>

<!-- SNAPSHOT -->
<div class="snapshot">
<div class="snapBox">Gross ₹1,25,000</div>
<div class="snapBox">Net ₹98,750</div>
<div class="snapBox">Deduction ₹26,250</div>
<div class="snapBox">Payslips 12</div>
</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<script>

function openSalary(month){
const year = document.getElementById("year").value;

localStorage.setItem("selectedYear", year);
localStorage.setItem("selectedMonth", month);

document.getElementById("loader").style.display="flex";

setTimeout(function(){
window.location.href="salary_view.html";
},700);
}

</script>

</body>
</html>
