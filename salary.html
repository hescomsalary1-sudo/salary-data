<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Portal</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#eef2ff,#ffffff);
}

/* HEADER */
.hero{
padding:20px;
background:linear-gradient(135deg,#2d0cff,#5f3bff);
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.back-btn{
width:42px;
height:42px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
margin-bottom:10px;
}

/* TOGGLE */
.toggle{
display:flex;
gap:10px;
margin:15px;
}

.toggle button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#e5e9ff;
cursor:pointer;
}

.toggle .active{
background:#2d0cff;
color:white;
}

/* CARD */
.card{
margin:15px;
background:white;
border-radius:20px;
padding:15px;
}

/* CENTER */
.center{
text-align:center;
margin:15px 0;
}

.center h2{
color:#2d0cff;
margin:0;
}

.center button{
margin-top:10px;
padding:10px 16px;
border:none;
background:#2d0cff;
color:white;
border-radius:20px;
}

/* CIRCLE */
.circle{
position:relative;
width:300px;
height:300px;
margin:20px auto;
}

.month{
position:absolute;
width:50px;
height:50px;
background:#f1f4ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.month.active{
background:#2d0cff;
color:white;
}

/* POSITION */
.m1{top:0;left:50%;transform:translate(-50%,-50%);}
.m2{top:20%;right:0;}
.m3{top:50%;right:-10px;}
.m4{bottom:20%;right:0;}
.m5{bottom:0;left:50%;transform:translate(-50%,50%);}
.m6{bottom:20%;left:0;}
.m7{top:50%;left:-10px;}
.m8{top:20%;left:0;}
.m9{top:10%;left:20%;}
.m10{top:10%;right:20%;}
.m11{bottom:10%;right:20%;}
.m12{bottom:10%;left:20%;}

/* LIST VIEW */
.list{
display:none;
padding:10px;
}

.list-item{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

#loader{
display:none;
position:fixed;
inset:0;
background:white;
justify-content:center;
align-items:center;
}

.spinner{
width:40px;
height:40px;
border:5px solid #eee;
border-top:5px solid #2d0cff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="hero">

<div class="back-btn" onclick="goBack()">
<svg width="20" height="20" viewBox="0 0 24 24">
<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2"/>
</svg>
</div>

<h2>Salary Portal</h2>
<p>Select month to view salary</p>

</div>

<!-- TOGGLE -->
<div class="toggle">
<button class="active" onclick="showCircle()">Calendar</button>
<button onclick="showList()">List</button>
</div>

<!-- MAIN CARD -->
<div class="card">

<div class="center">
<h2 id="monthText">January 2026</h2>
<button onclick="openSalary(selectedMonth)">View Details</button>
</div>

<!-- CIRCLE -->
<div id="circleView" class="circle">

<div class="month m1 active" onclick="selectMonth(1,this)">Jan</div>
<div class="month m2" onclick="selectMonth(2,this)">Feb</div>
<div class="month m3" onclick="selectMonth(3,this)">Mar</div>
<div class="month m4" onclick="selectMonth(4,this)">Apr</div>
<div class="month m5" onclick="selectMonth(5,this)">May</div>
<div class="month m6" onclick="selectMonth(6,this)">Jun</div>
<div class="month m7" onclick="selectMonth(7,this)">Jul</div>
<div class="month m8" onclick="selectMonth(8,this)">Aug</div>
<div class="month m9" onclick="selectMonth(9,this)">Sep</div>
<div class="month m10" onclick="selectMonth(10,this)">Oct</div>
<div class="month m11" onclick="selectMonth(11,this)">Nov</div>
<div class="month m12" onclick="selectMonth(12,this)">Dec</div>

</div>

<!-- LIST VIEW -->
<div id="listView" class="list"></div>

</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
</div>

<script>

let selectedMonth = 1;

const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* SELECT MONTH */
function selectMonth(m,el){
selectedMonth = m;

document.getElementById("monthText").innerText = months[m-1] + " 2026";

/* active remove */
document.querySelectorAll(".month").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
}

/* LIST VIEW */
function showList(){
document.getElementById("circleView").style.display="none";
let list = document.getElementById("listView");
list.style.display="block";

list.innerHTML = "";

months.forEach((m,i)=>{
list.innerHTML += `
<div class="list-item" onclick="selectMonth(${i+1});openSalary(${i+1})">
<span>${m}</span>
<span>›</span>
</div>`;
});

/* toggle active */
document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

/* CIRCLE VIEW */
function showCircle(){
document.getElementById("circleView").style.display="block";
document.getElementById("listView").style.display="none";

document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

/* BACK */
function goBack(){
window.history.back();
}

/* SAME LOGIC */
function openSalary(month){
localStorage.setItem("selectedYear","2026");
localStorage.setItem("selectedMonth",month);

document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location="salary_view.html";
},700);
}

</script>

</body>
</html>
